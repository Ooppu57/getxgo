              "continue", "proceed", "confirm", "accept",
          ]

          # ══════════════════════════════════════════════════════════════════════
          # MULTILINGUAL KEYWORD LISTS
          # ══════════════════════════════════════════════════════════════════════
          MULTI_DOWNLOAD_KEYWORDS_OPERA = [
