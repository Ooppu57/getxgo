name: Parallel Windows Auto-Installer

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Select OS Runner Version'
        required: true
        type: choice
        options:
          - 'windows-2025'
          - 'windows-2022'
          - 'windows-11-arm'
        default: 'windows-2025'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'techx@justzeus.com'
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '5'
      num_clicks:
        description: 'Number of Clicks (remaining devices will install)'
        required: true
        type: choice
        options:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '0'
      software_choice:
        description: 'Select Software & Link'
        required: true
        type: choice
        options:
          - 'AVG - TechxTrader'
          - 'AVG - B4Books'
          - 'AVG - F.Ahmad'
          - 'OperaGX - B4Books'
          - 'Opera - Techx'
          - 'Opera - Fatradez'
          - 'Opera - James'
          - 'Opera - Oliver'
          - 'Opera - Mahal'
          - 'Opera-One - Esmeel'
          - 'Opera-One - Harrari'
          - 'Opera-One - Chloe'
          - 'Opera-One - Daisy'
          - 'Opera-One - Jimmy'
          - 'Ad-MVN - Techx'
          - 'Ad-MVN - B4Books'
          - 'Ad-MVN - Orderflowz'
          - 'Ad-MVN - A2Z'
        default: 'Ad-MVN - Techx'
      manual_software_url:
        description: 'Manual Software URL'
        required: false
        type: string
        default: ''
      run_manual_link:
        description: 'Run manual link'
        required: true
        type: boolean
        default: false
      scrapeops_api_key:
        description: |
          ScrapeOps API Key or Manual Proxies (space/comma/pipe/newline separated).
          Formats: host:port, user:pass@host:port, http://user:pass@host:port, socks5://user:pass@host:port,
                   host:port:user:pass, geolocation://user:pass@host:port:Country
        required: false
        type: string
        default: ''
      use_without_proxy:
        description: 'Run without proxy'
        required: true
        type: boolean
        default: false
      proxy_country:
        description: 'Proxy Country Geotargeting (ScrapeOps only)'
        required: true
        type: choice
        options:
          - 'USA'
          - 'UK'
          - 'Canada'
          - 'Australia'
          - 'Germany'
          - 'France'
          - 'Brazil'
          - 'Mexico'
          - 'Spain'
          - 'Vietnam'
          - 'Switzerland'
          - 'Indonesia'
          - 'Italy'
          - 'Netherlands'
          - 'Poland'
        default: 'USA'
      mobile_proxies:
        description: 'Use Mobile Proxies (ScrapeOps only)'
        required: true
        type: boolean
        default: false
      sticky_sessions:
        description: 'Enable Unique Sticky Sessions (ScrapeOps only)'
        required: true
        type: boolean
        default: true

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install Python proxy-check dependencies
        run: pip install requests PySocks --quiet

      - name: Generate Dynamic Matrix & Proxy Config
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          NUM_CLICKS: ${{ inputs.num_clicks }}
          OS_VERSION: ${{ inputs.os_version }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          MANUAL_URL: ${{ inputs.manual_software_url }}
          RUN_MANUAL: ${{ inputs.run_manual_link }}
          PROXY_INPUT: ${{ inputs.scrapeops_api_key }}
          WITHOUT_PROXY: ${{ inputs.use_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import os, json, uuid, random, re, time, sys
          import urllib.request, urllib.error

          print("========== INITIALIZING MATRIX GENERATION ==========")

          # ------------------------------------------------------------------
          # 1. PROXY INPUT CLASSIFICATION
          # ------------------------------------------------------------------
          def classify_proxy_input(raw):
              raw = (raw or "").strip()
              NULLS = {"", "none", "null", "false", "blank", "empty", "''", '""'}
              if raw.lower() in NULLS:
                  return ("none", [])
              tokens = [t.strip() for t in re.split(r'[\s,;|]+', raw) if t.strip()]
              if not tokens:
                  return ("none", [])
              proxy_like = []
              for t in tokens:
                  if ('://' in t) or (':' in t and re.search(r'\d{2,5}$', t.split('@')[-1])):
                      proxy_like.append(t)
              if proxy_like:
                  print(f"[Classifier] Detected MANUAL PROXY mode. {len(tokens)} token(s).")
                  return ("manual", tokens)
              if len(tokens) == 1:
                  print("[Classifier] Detected SCRAPEOPS API KEY mode.")
                  return ("scrapeops", [tokens[0]])
              joined = "".join(tokens)
              print(f"[Classifier] Multi-token non-proxy input. Treating as SCRAPEOPS API KEY (joined).")
              return ("scrapeops", [joined])

          # ------------------------------------------------------------------
          # 2. PROXY PARSER (supports all formats including geolocation://)
          # ------------------------------------------------------------------
          def parse_proxy_token(token):
              token = token.strip()
              scheme = None
              m = re.match(r'^(geolocation|https?|socks[45])://', token, re.I)
              if m:
                  scheme = m.group(1).lower()
                  token = token[m.end():]

              if scheme == "geolocation":
                  # geolocation://user:pass@host:port:Country - Number
                  if '@' not in token:
                      return None
                  userpass, rest = token.split('@', 1)
                  if ':' not in userpass:
                      return None
                  user, password = userpass.split(':', 1)
                  hostport_country = rest.split(':', 2)
                  if len(hostport_country) < 2:
                      return None
                  host = hostport_country[0]
                  port_str = hostport_country[1]
                  country_rest = hostport_country[2] if len(hostport_country) > 2 else ""
                  country_match = re.match(r'(.+?)\s*-\s*\d+', country_rest)
                  country = country_match.group(1).strip() if country_match else country_rest.strip()
                  port = int(port_str) if port_str.isdigit() else None
                  if not host or not port:
                      return None
                  return _build_proxy_dict(scheme="http", host=host, port=port,
                                           user=user, password=password,
                                           country=country)
              else:
                  if '@' in token:
                      userpass, hostport = token.rsplit('@', 1)
                      if ':' not in userpass:
                          return None
                      user, password = userpass.split(':', 1)
                      host_parts = hostport.split(':')
                      if len(host_parts) != 2:
                          return None
                      host, port = host_parts[0], int(host_parts[1])
                      if scheme is None:
                          scheme = "http"
                      return _build_proxy_dict(scheme=scheme, host=host, port=port,
                                               user=user, password=password)
                  else:
                      parts = token.split(':')
                      if len(parts) == 4:
                          host = parts[0]
                          port = int(parts[1])
                          user = parts[2]
                          password = parts[3]
                          if scheme is None:
                              scheme = "http"
                          return _build_proxy_dict(scheme=scheme, host=host, port=port,
                                                   user=user, password=password)
                      elif len(parts) == 2:
                          host = parts[0]
                          port = int(parts[1])
                          if scheme is None:
                              scheme = "http"
                          return _build_proxy_dict(scheme=scheme, host=host, port=port,
                                                   user=None, password=None)
                      else:
                          return None

          def _build_proxy_dict(scheme, host, port, user=None, password=None, country=None):
              d = {
                  "scheme": scheme,
                  "host": host,
                  "port": port,
                  "user": user,
                  "pass": password,
                  "country": country,
              }
              auth = f"{user}:{password}@" if user and password else ""
              d["raw_http"]   = f"http://{auth}{host}:{port}"
              d["raw_socks5"] = f"socks5://{auth}{host}:{port}"
              d["proxies_http"]   = {"http": d["raw_http"], "https": d["raw_http"]}
              d["proxies_socks5"] = {"http": d["raw_socks5"], "https": d["raw_socks5"]}
              return d

          # ------------------------------------------------------------------
          # 3. PROXY CHECKER
          # ------------------------------------------------------------------
          CHECK_URL     = "https://httpbin.org/ip"
          CHECK_TIMEOUT = 12

          def get_country_from_ip(ip):
              try:
                  import requests
                  r = requests.get(f"http://ip-api.com/json/{ip}?fields=countryCode", timeout=8)
                  if r.status_code == 200:
                      return r.json().get("countryCode", "US")
              except Exception:
                  pass
              return "US"

          def check_proxy(proxy_dict):
              import requests, warnings
              warnings.filterwarnings("ignore")
              label = f"{proxy_dict['host']}:{proxy_dict['port']}"
              if "socks" in proxy_dict.get("scheme", ""):
                  attempts = [("socks5", proxy_dict["proxies_socks5"])]
              else:
                  attempts = [("http", proxy_dict["proxies_http"])]
              if len(attempts) < 2:
                  attempts.append(("socks5", proxy_dict["proxies_socks5"]) if not "socks" in proxy_dict.get("scheme", "")
                                  else ("http", proxy_dict["proxies_http"]))
              for scheme_label, proxies in attempts:
                  print(f"    [Check] {label} via {scheme_label.upper()} ... ", end="", flush=True)
                  try:
                      resp = requests.get(CHECK_URL, proxies=proxies, timeout=CHECK_TIMEOUT, verify=False)
                      if resp.status_code == 200:
                          data = resp.json()
                          exit_ip = data.get("origin", "").split(",")[0].strip()
                          if proxy_dict.get("country"):
                              cc_raw = proxy_dict["country"].split()[0].upper()[:2]
                              cc = cc_raw if re.match(r'^[A-Z]{2}$', cc_raw) else get_country_from_ip(exit_ip)
                          else:
                              cc = get_country_from_ip(exit_ip)
                          print(f"OK  →  exit IP: {exit_ip}  country: {cc}")
                          proxy_dict["exit_ip"] = exit_ip
                          proxy_dict["country_code"] = cc.lower()
                          proxy_dict["working_scheme"] = scheme_label
                          return True, exit_ip, cc
                  except Exception:
                      pass
                  print("FAILED")
              return False, None, None

          # ------------------------------------------------------------------
          # 4. MAIN LOGIC
          # ------------------------------------------------------------------
          email       = os.environ.get("EMAIL", "").strip()
          num_devices = int(os.environ.get("NUM_DEVICES", "1"))
          os_version  = os.environ.get("OS_VERSION", "windows-2025")
          without_proxy = os.environ.get("WITHOUT_PROXY", "false").lower() == "true"
          proxy_raw   = os.environ.get("PROXY_INPUT", "").strip()
          country_input = os.environ.get("COUNTRY", "USA")
          mobile      = os.environ.get("MOBILE", "false").lower() == "true"
          sticky      = os.environ.get("STICKY", "false").lower() == "true"
          software_choice = os.environ.get("SOFTWARE_CHOICE", "AVG - B4Books")

          num_clicks_raw = int(os.environ.get("NUM_CLICKS", "0"))
          num_clicks  = min(num_clicks_raw, num_devices)
          num_installs = num_devices - num_clicks
          action_list = ["install"] * num_installs + ["click"] * num_clicks
          random.shuffle(action_list)

          run_manual      = os.environ.get("RUN_MANUAL", "false").lower() == "true"
          manual_url_input = os.environ.get("MANUAL_URL", "").strip()
          manual_url      = manual_url_input if run_manual else ""

          country_map = {
              "USA": "us", "UK": "uk", "Canada": "ca",
              "Australia": "au", "Germany": "de", "France": "fr",
              "Brazil": "br", "Mexico": "mx", "Spain": "es",
              "Vietnam": "vn", "Switzerland": "ch", "Indonesia": "id",
              "Italy": "it", "Netherlands": "nl", "Poland": "pl"
          }
          cc_default = country_map.get(country_input, "us")

          if without_proxy:
              proxy_mode = "none"
              print("[Proxy] 'Run without proxy' checked. No proxies.")
          else:
              proxy_mode, raw_tokens = classify_proxy_input(proxy_raw)
              if proxy_mode == "scrapeops":
                  scrapeops_key = raw_tokens[0] if raw_tokens else proxy_raw.strip()
                  if not scrapeops_key or scrapeops_key.lower() in {"none", "null", "false", "blank", "empty", "''", '""'}:
                      proxy_mode = "none"
                      print("[Proxy] ScrapeOps key invalid. Disabling proxy.")
                  else:
                      print(f"[Proxy] ScrapeOps key: {scrapeops_key[:8]}****")
              elif proxy_mode == "manual":
                  parsed = []
                  for t in raw_tokens:
                      p = parse_proxy_token(t)
                      if p:
                          parsed.append(p)
                      else:
                          print(f"[Parser] Could not parse: '{t}'")
                  active = []
                  for p in parsed:
                      ok, _, cc = check_proxy(p)
                      if ok:
                          active.append(p)
                  if active:
                      print(f"[Proxy] Active manual proxies: {len(active)}")
                  else:
                      print("[Proxy] No active manual proxies found. Disabling proxy.")
                      proxy_mode = "none"
              else:
                  proxy_mode = "none"

          # Software URL mapping (unchanged)
          avg_urls = {
              "AVG - TechxTrader": "https://u.to/a-trdr/GoeNIg",
              "AVG - B4Books":     "https://u.to/a-b4b/O4eNIg",
              "AVG - F.Ahmad":     "https://u.to/a-fahmad/ooeNIg",
          }
          opera_urls = {
              "OperaGX - B4Books":  "https://u.to/opx-b4b/2nh4Ig",
              "Opera - Techx":      "https://u.to/techxsm/xVyFIg",
              "Opera - Fatradez":   "https://u.to/fatradezsm/cF2FIg",
              "Opera - James":      "https://u.to/jamesxsm/eV2FIg",
              "Opera - Oliver":     "https://u.to/oliverxsm/f12FIg",
              "Opera - Mahal":      "https://u.to/mahalxsm/iF2FIg",
          }
          opera_one_urls = {
              "Opera-One - Esmeel":  "https://u.to/esmlxopo/cTOGIg",
              "Opera-One - Harrari": "https://u.to/hararixopo/zTOGIg",
              "Opera-One - Chloe":   "https://u.to/chloexopo/_DOGIg",
              "Opera-One - Daisy":   "https://u.to/daisyxopo/LjSGIg",
              "Opera-One - Jimmy":   "https://u.to/jmy/mUZ4Ig",
          }
          ad_mvn_urls = {
              "Ad-MVN - Techx":      "https://u.to/techxadmvnxsmrt/gvd7Ig",
              "Ad-MVN - B4Books":    "https://u.to/b4bxadmvnxsmrt/5-h7Ig",
              "Ad-MVN - Orderflowz": "https://u.to/ordrflzadmvnxsmrt/-fZ7Ig",
              "Ad-MVN - A2Z":        "https://u.to/a2zadmvnxsmrt/Y-t7Ig",
          }
          all_urls = {**avg_urls, **opera_urls, **opera_one_urls, **ad_mvn_urls}
          dynamic_links = ["Opera - Techx", "Opera - Fatradez", "Opera - James",
                           "Opera - Oliver", "Opera - Mahal"]

          if manual_url:
              target_url    = manual_url
              software_type = "dynamic_opera"
              exe_filter    = "*.exe"
          else:
              target_url = all_urls.get(software_choice,
                           avg_urls.get("AVG - B4Books", "https://u.to/a-b4b/O4eNIg"))
              if software_choice in dynamic_links:
                  software_type = "opera_smart_link"
                  exe_filter    = "*Opera*Setup*.exe"
              elif software_choice.startswith("Ad-MVN"):
                  software_type = "dynamic_opera"
                  exe_filter    = "*Opera*Setup*.exe"
              elif software_choice.startswith("OperaGX"):
                  software_type = "opera_gx"
                  exe_filter    = "OperaGXSetup*.exe"
              elif software_choice.startswith("Opera-One"):
                  software_type = "opera_one"
                  exe_filter    = "OperaSetup*.exe"
              else:
                  software_type = "avg"
                  exe_filter    = "*avg*.exe"

          def short_os(os_ver):
              if os_ver == "windows-2025": return "W25"
              elif os_ver == "windows-2022": return "W22"
              elif os_ver == "windows-11-arm": return "W11A"
              else: return "W" + os_ver.replace("windows-", "").replace("-", "")

          def short_software(choice):
              prefix_map = {"OperaGX": "OPX", "Opera-One": "OPO",
                            "Ad-MVN": "MVN", "AVG": "AVG", "Opera": "OP"}
              for key, prefix in prefix_map.items():
                  if choice.startswith(key):
                      parts = choice.split(" - ", 1)
                      list_name = parts[1].replace(" ", "") if len(parts) > 1 else ""
                      return f"{prefix}-{list_name}"
              return choice.replace(" ", "").replace("-", "")

          short_os_tag = short_os(os_version)
          short_sw_tag = "MANUAL" if manual_url else short_software(software_choice)

          # ------------------------------------------------------------------
          # 5. BUILD MATRIX (atomic proxy fields to avoid secret masking)
          # ------------------------------------------------------------------
          includes = []
          if email:
              if proxy_mode == "manual":
                  proxy_pool = active
                  assigned = [proxy_pool[i % len(proxy_pool)] for i in range(num_devices)]
              else:
                  assigned = [None] * num_devices

              for i in range(1, num_devices + 1):
                  action_mode = action_list[i - 1]
                  action_cap  = action_mode.capitalize()

                  proxy_user = proxy_pass = proxy_host = proxy_port = proxy_scheme = ""
                  device_cc = cc_default.upper()
                  proxy_type_str = "none"

                  if proxy_mode == "scrapeops":
                      proxy_user = f"scrapeops.country={cc_default}"
                      if mobile: proxy_user += ".mobile=true"
                      if sticky:
                          session_id = str(uuid.uuid4())[:8]
                          proxy_user += f".sticky_session={session_id}"
                      proxy_pass = scrapeops_key
                      proxy_scheme = "http"
                      proxy_host = "residential-proxy.scrapeops.io"
                      proxy_port = "8181"
                      device_cc = cc_default.upper()
                      proxy_type_str = "scrapeops"

                  elif proxy_mode == "manual":
                      prox = assigned[i - 1]
                      proxy_user     = prox.get("user") or ""
                      proxy_pass     = prox.get("pass") or ""
                      proxy_host     = prox["host"]
                      proxy_port     = str(prox["port"])
                      proxy_scheme   = prox.get("working_scheme") or prox.get("scheme") or "http"
                      proxy_type_str = proxy_scheme
                      device_cc = prox.get("country_code", cc_default).upper()

                  device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_cap}-{device_cc}"

                  includes.append({
                      "device":        device_name,
                      "email":         email,
                      "os":            os_version,
                      "use_proxy":     "true" if proxy_mode != "none" else "false",
                      "proxy_type":    proxy_type_str,
                      "proxy_country": device_cc.lower(),
                      "proxy_scheme":  proxy_scheme,
                      "proxy_host":    proxy_host,
                      "proxy_port":    proxy_port,
                      "proxy_user":    proxy_user,
                      "proxy_pass":    proxy_pass,
                      "target_url":    target_url,
                      "software_type": software_type,
                      "exe_filter":    exe_filter,
                      "action_mode":   action_mode
                  })

          if not includes:
              print("ERROR: No devices configured. Aborting.")
              sys.exit(1)

          matrix_json = json.dumps({"include": includes})
          print(f"[Matrix] Generated {len(includes)} device entries.")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={matrix_json}\n")
          print("========== MATRIX GENERATION COMPLETE ==========")

      - name: Update Workflow Defaults (Remember Inputs)
        shell: python
        env:
          OS_VERSION: ${{ inputs.os_version }}
          GETSCREEN_EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          NUM_CLICKS: ${{ inputs.num_clicks }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          MANUAL_URL: ${{ inputs.manual_software_url }}
          RUN_MANUAL: ${{ inputs.run_manual_link }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          WITHOUT_PROXY: ${{ inputs.use_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import re, os

          def update_yaml_default(yaml_str, input_key, new_val, is_bool=False):
              lines = yaml_str.split("\n")
              in_target_block = False
              target_indent = -1
              for i, line in enumerate(lines):
                  match = re.match(r"^([ \t]*)" + input_key + r":", line)
                  if match:
                      in_target_block = True
                      target_indent = len(match.group(1))
                      continue
                  if in_target_block:
                      current_indent = len(line) - len(line.lstrip(" \t"))
                      if line.strip() and current_indent <= target_indent:
                          in_target_block = False
                          continue
                      if line.lstrip(" \t").startswith("default:"):
                          indent = line[:len(line) - len(line.lstrip(" \t"))]
                          if is_bool:
                              val_str = "true" if str(new_val).lower() == "true" else "false"
                              lines[i] = f"{indent}default: {val_str}"
                          else:
                              safe_val = str(new_val).replace("'", "\\'") if new_val else ""
                              lines[i] = f"{indent}default: '{safe_val}'"
                          break
              return "\n".join(lines)

          file_path = ".github/workflows/main3.yml"
          if os.path.exists(file_path):
              with open(file_path, "r", encoding="utf-8") as f:
                  content = f.read()

              run_manual = os.environ.get("RUN_MANUAL", "false").lower() == "true"
              proxy_input = os.environ.get("API_KEY", "").strip()
              # Only save ScrapeOps keys, not manual proxies
              if proxy_input and ('://' in proxy_input or re.search(r'\d{2,5}$', proxy_input)):
                  proxy_input_save = ""
              else:
                  proxy_input_save = proxy_input

              content = update_yaml_default(content, "os_version",        os.environ.get("OS_VERSION"))
              content = update_yaml_default(content, "getscreen_email",    os.environ.get("GETSCREEN_EMAIL"))
              content = update_yaml_default(content, "num_devices",        os.environ.get("NUM_DEVICES"))
              content = update_yaml_default(content, "num_clicks",         os.environ.get("NUM_CLICKS"))
              content = update_yaml_default(content, "software_choice",    os.environ.get("SOFTWARE_CHOICE"))
              content = update_yaml_default(content, "manual_software_url",
                                            os.environ.get("MANUAL_URL") if run_manual else "")
              content = update_yaml_default(content, "run_manual_link",   run_manual, is_bool=True)
              content = update_yaml_default(content, "scrapeops_api_key",  proxy_input_save)
              content = update_yaml_default(content, "use_without_proxy",  os.environ.get("WITHOUT_PROXY"), is_bool=True)
              content = update_yaml_default(content, "proxy_country",      os.environ.get("COUNTRY"))
              content = update_yaml_default(content, "mobile_proxies",     os.environ.get("MOBILE"), is_bool=True)
              content = update_yaml_default(content, "sticky_sessions",    os.environ.get("STICKY"), is_bool=True)

              with open(file_path, "w", encoding="utf-8") as f:
                  f.write(content)
              print("[Workflow State] Defaults updated.")
          else:
              print("[Workflow State] YAML file not found, skipping auto-save.")

      - name: Commit and Push New Defaults
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/main3.yml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update last used inputs [skip ci]" && git push)

  remote_session:
    name: Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 6

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      - name: Disable Windows Defender & Edge SmartScreen
        shell: pwsh
        run: |
          Write-Host "========== SYSTEM PREPARATION ==========" -ForegroundColor Cyan
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          Set-MpPreference -PUAProtection 0 -ErrorAction SilentlyContinue
          Set-MpPreference -DisableBlockAtFirstSeen $true -ErrorAction SilentlyContinue
          Set-MpPreference -DisableIOAVProtection $true -ErrorAction SilentlyContinue

          $edgePolicy = "HKLM:\SOFTWARE\Policies\Microsoft\Edge"
          if (-not (Test-Path $edgePolicy)) { New-Item -Path $edgePolicy -Force | Out-Null }
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenEnabled" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenPuaEnabled" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "DownloadRestrictions" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "PreventSmartScreenPromptOverride" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "PreventSmartScreenPromptOverrideForFiles" -Value 0

          $exemptPath = "$edgePolicy\ExemptDomainFileTypePairsFromFileTypeDownloadWarnings"
          if (-not (Test-Path $exemptPath)) { New-Item -Path $exemptPath -Force | Out-Null }
          Set-ItemProperty -Path $exemptPath -Name "1" -Value '{"domains":["*"],"file_extension":"exe"}'
          Write-Host "[Registry] Edge EXEs whitelisted." -ForegroundColor Green

      - name: Install and Start Getscreen.me (Windows)
        shell: pwsh
        run: |
          Write-Host "========== REMOTE ACCESS AGENT ==========" -ForegroundColor Cyan
          $MaxRetries = 3; $RetryCount = 0; $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://getscreen.me/download/getscreen.msi" -OutFile "getscreen.msi" -ErrorAction Stop
                  if ((Get-Item "getscreen.msi").length -gt 1MB) { $Success = $true }
                  else { Write-Host "Small file, retrying..."; $RetryCount++; Start-Sleep 5 }
              } catch { Write-Host "Download error, retrying..."; $RetryCount++; Start-Sleep 5 }
          }
          if (-not $Success) { Write-Host "Failed to download getscreen agent."; exit 1 }

          $proxyCountry = "${{ matrix.proxy_country }}"
          Write-Host "[Getscreen] Registering device for ${{ matrix.email }} (country: $proxyCountry)"
          $InstallArgs = "/i getscreen.msi /qn REGISTER=`"${{ matrix.email }}`" CONFIG=`"name='${{ matrix.device }}' autostart=true nonadmin=true control=true disable_confirmation=true country=$proxyCountry`""
          Start-Process msiexec.exe -Wait -ArgumentList $InstallArgs
          Write-Host "[Getscreen] Agent running." -ForegroundColor Green

      - name: Setup Auto-Downloader & Software Installation
        shell: pwsh
        env:
          USE_PROXY:      ${{ matrix.use_proxy }}
          PROXY_TYPE:     ${{ matrix.proxy_type }}
          PROXY_SCHEME:   ${{ matrix.proxy_scheme }}
          PROXY_HOST:     ${{ matrix.proxy_host }}
          PROXY_PORT:     ${{ matrix.proxy_port }}
          PROXY_USER:     ${{ matrix.proxy_user }}
          PROXY_PASS:     ${{ matrix.proxy_pass }}
          TARGET_URL:     ${{ matrix.target_url }}
          SOFTWARE_TYPE:  ${{ matrix.software_type }}
          EXE_FILTER:     ${{ matrix.exe_filter }}
          ACTION_MODE:    ${{ matrix.action_mode }}
        run: |
          $useProxy  = $env:USE_PROXY -eq "true"
          $proxyType = $env:PROXY_TYPE

          # Reconstruct proxy URL from atomic parts (avoids secret masking in matrix)
          $proxyUrl = ""
          if ($useProxy) {
              if ($proxyType -eq "scrapeops") {
                  $proxyUrl = "http://$($env:PROXY_USER):$($env:PROXY_PASS)@$($env:PROXY_HOST):$($env:PROXY_PORT)"
              } elseif ($env:PROXY_USER -and $env:PROXY_PASS) {
                  $proxyUrl = "$($env:PROXY_SCHEME)://$($env:PROXY_USER):$($env:PROXY_PASS)@$($env:PROXY_HOST):$($env:PROXY_PORT)"
              } else {
                  $proxyUrl = "$($env:PROXY_SCHEME)://$($env:PROXY_HOST):$($env:PROXY_PORT)"
              }
          }

          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host " Zero-Touch Downloader & Installer Active" -ForegroundColor Cyan
          Write-Host " Target URL: $env:TARGET_URL"   -ForegroundColor Gray
          Write-Host " Category  : $env:SOFTWARE_TYPE" -ForegroundColor Cyan
          Write-Host " Action    : $($env:ACTION_MODE.ToUpper()) PATHWAY ASSIGNED" -ForegroundColor Magenta
          if ($useProxy) {
              Write-Host " Proxy Type: $proxyType ($proxyUrl)" -ForegroundColor Cyan
          } else {
              Write-Host " Mode      : Direct (Proxy Completely Bypassed)" -ForegroundColor Yellow
          }
          Write-Host "============================================================" -ForegroundColor Cyan

          Write-Host "[Dependencies] Installing python UIA modules..." -ForegroundColor DarkGray
          python -m pip install pywinauto pyautogui pygetwindow keyboard --quiet

          # ---------- Python UI automation handler ----------
          $handlerPy = @'
          import time, sys, subprocess, random, os, tempfile, ctypes
          from pywinauto import Desktop
          import pyautogui
          from pywinauto.keyboard import send_keys

          def log_msg(tag, msg):
              t = time.strftime('%H:%M:%S')
              print(f"[{t}][{tag}] {msg}", flush=True)

          DOWNLOAD_DONE_TITLES = [
              "Thanks for downloading Opera", "Thanks for downloadin",
              "Download | Thanks", "sudetyj", "clickWorker",
              "GET READY TO PLAY", "ready to install",
          ]

          def _is_download_done_window(text):
              t = text.lower()
              return any(frag.lower() in t for frag in DOWNLOAD_DONE_TITLES)

          def close_download_windows(desktop, attempt_label=""):
              closed_any = False
              try:
                  all_windows = desktop.windows(visible_only=True)
              except Exception: return False
              for window in all_windows:
                  try:
                      wt = window.window_text()
                      if not wt: continue
                      is_match = _is_download_done_window(wt)
                      if not is_match and ("Microsoft Edge" in wt or wt == "Edge"):
                          for child in window.children():
                              child_wt = child.window_text()
                              if child_wt and _is_download_done_window(child_wt):
                                  is_match = True
                                  break
                      if not is_match: continue
                      log_msg("TabClose", f"Targeting window '{wt}' (Attempt {attempt_label})")
                      closed = False
                      try:
                          window.set_focus()
                          time.sleep(0.3)
                          sw, sh = pyautogui.size()
                          cx, cy = sw // 2, sh // 2
                          pyautogui.click(cx, cy)
                          time.sleep(random.uniform(1.0, 2.0))
                          send_keys('^w')
                          closed = True
                      except Exception: pass
                      if not closed:
                          try:
                              window.set_focus()
                              time.sleep(0.3)
                              send_keys('%{F4}')
                              closed = True
                          except Exception: pass
                      if closed: closed_any = True; time.sleep(0.5)
                  except Exception: pass
              return closed_any

          def opera_one_post_install_sequence(opera_window):
              log_msg("PostInstall-OP1", "=== Opera One Post-Install Sequence Starting ===")
              log_msg("PostInstall-OP1", "Phase 1: Waiting 35 seconds for installer...")
              for s in range(1, 36):
                  log_msg("PostInstall-OP1", f"  Installer wait: {s}/35 seconds elapsed...")
                  time.sleep(1)
              log_msg("PostInstall-OP1", "Phase 2: Waiting additional 10 seconds for UI render...")
              for s in range(1, 11):
                  log_msg("PostInstall-OP1", f"  Render wait: {s}/10 seconds elapsed...")
                  time.sleep(1)
              sw, sh = pyautogui.size()
              cx, cy = sw // 2, sh // 2
              log_msg("PostInstall-OP1", f"Phase 3: Center-screen double-click at ({cx}, {cy})...")
              try:
                  pyautogui.click(cx, cy)
                  time.sleep(0.15)
                  pyautogui.click(cx, cy)
              except Exception as e:
                  try:
                      pyautogui.doubleClick(cx, cy)
                  except Exception as e2: pass
              time.sleep(random.uniform(1.0, 2.0))
              log_msg("PostInstall-OP1", "Phase 5: LEFT arrow 8 times...")
              for i in range(1, 9):
                  send_keys('{LEFT}')
                  time.sleep(random.uniform(1.0, 2.0))
              log_msg("PostInstall-OP1", "Phase 6: ENTER...")
              send_keys('{ENTER}')
              time.sleep(random.uniform(1.0, 2.0))
              log_msg("PostInstall-OP1", "Phase 7: Ctrl+T...")
              send_keys('^t')
              time.sleep(random.uniform(1.0, 2.0))
              tab_count = random.randint(6, 12)
              log_msg("PostInstall-OP1", f"Phase 8: TAB {tab_count} times...")
              for i in range(1, tab_count + 1):
                  send_keys('{TAB}')
                  time.sleep(random.uniform(1.0, 2.0))
              log_msg("PostInstall-OP1", "Phase 9: Final ENTER...")
              send_keys('{ENTER}')
              log_msg("PostInstall-OP1", "=== Opera One Post-Install Sequence Completed ===")

          def handle_automation(proxy_user, proxy_pass, proxy_type, software_type, use_proxy, action_mode, timeout=360):
              desktop = Desktop(backend="uia")
              start_time = time.time()
              proxy_auth_time = start_time
              log_msg("UI-Engine", f"Monitoring. Action: {action_mode.upper()} | Type: {software_type} | Proxy: {proxy_type.upper() if use_proxy else 'NONE'}")
              last_ctrl_j_time = time.time()
              last_dl_click_time = 0
              ctrl_j_attempts = 0
              keep_clicked = False
              avg_download_clicked = False
              smart_link_interstitial_done = False
              smart_link_interstitial_time = 0
              opera_launched_time = None
              opera_setup_completed = False
              opera_one_installer_executed_time = None
              opera_one_post_install_done = False
              sentinel_path = os.path.join(tempfile.gettempdir(), "download_done.flag")
              download_windows_closed = False
              installer_executed_sentinel = os.path.join(tempfile.gettempdir(), "installer_executed.flag")
              needs_proxy_auth_dialog = use_proxy and proxy_type == "scrapeops"

              while time.time() - start_time < timeout:
                  try:
                      edge_window = None
                      opera_window = None
                      for window in desktop.windows(visible_only=True):
                          wt = window.window_text()
                          if not wt: continue
                          if "Microsoft Edge" in wt or "sudetyj" in wt or "Chrome Web Store" in wt or "Edge" in wt:
                              edge_window = window
                          if "Opera" in wt or "Speed Dial" in wt or "Start Page" in wt or "Welcome" in wt:
                              if "Microsoft Edge" not in wt and "Edge" not in wt and "Chrome Web Store" not in wt:
                                  opera_window = window

                      if not download_windows_closed and os.path.exists(sentinel_path):
                          log_msg("Sentinel", "Flag detected. Closing download windows...")
                          for attempt in range(1, 6):
                              still_open = close_download_windows(desktop, f"#{attempt}")
                              time.sleep(2)
                              if not still_open: break
                          download_windows_closed = True
                          edge_window = None

                      if (software_type == "opera_one" and action_mode == "install" and not opera_one_post_install_done):
                          if opera_one_installer_executed_time is None and os.path.exists(installer_executed_sentinel):
                              opera_one_installer_executed_time = time.time()
                              log_msg("PostInstall-OP1", "Installer sentinel detected. Will fire in 35s.")
                          if opera_one_installer_executed_time is not None and (time.time() - opera_one_installer_executed_time) >= 35:
                              opera_one_post_install_sequence(opera_window)
                              opera_one_post_install_done = True
                              opera_setup_completed = True

                      if needs_proxy_auth_dialog and (edge_window or opera_window):
                          for w in [edge_window, opera_window]:
                              if w:
                                  user_fields = w.descendants(control_type="Edit", title="Username")
                                  pass_fields = w.descendants(control_type="Edit", title="Password")
                                  if user_fields and pass_fields:
                                      try:
                                          w.set_focus(); time.sleep(0.5)
                                          user_fields[0].click_input()
                                          user_fields[0].type_keys(proxy_user, with_spaces=True, pause=0.02)
                                          pass_fields[0].click_input()
                                          pass_fields[0].type_keys(proxy_pass, with_spaces=True, pause=0.02)
                                          btn = w.descendants(control_type="Button", title="Sign in")
                                          if btn: btn[0].click_input()
                                          else: pass_fields[0].type_keys("{ENTER}")
                                          proxy_auth_time = time.time()
                                          log_msg("Proxy", "Credentials injected.")
                                      except Exception as e: log_msg("Proxy", f"Auth error: {e}")

                      if edge_window:
                          for cookie_btn in ["Accept all", "Accepter tout", "Tout accepter", "Accept Cookies", "Allow all", "Accept selection"]:
                              btns = edge_window.descendants(control_type="Button", title=cookie_btn)
                              if btns:
                                  try: btns[0].click_input(); time.sleep(1); log_msg("Cookies", f"Clicked '{cookie_btn}'.")
                                  except: pass

                      if edge_window and software_type == "opera_smart_link":
                          elapsed = time.time() - proxy_auth_time
                          if not smart_link_interstitial_done and elapsed > 20:
                              try:
                                  edge_window.set_focus(); time.sleep(0.5)
                                  send_keys('{TAB}'); time.sleep(0.5)
                                  send_keys('{ENTER}')
                                  log_msg("SmartLink", "TAB+ENTER sent. Waiting 15s for download page.")
                              except Exception as e: log_msg("SmartLink", f"Error: {e}")
                              smart_link_interstitial_done = True
                              smart_link_interstitial_time = time.time()

                      if action_mode == "click":
                          if software_type == "opera_smart_link":
                              if not smart_link_interstitial_done or time.time() - smart_link_interstitial_time < 15:
                                  time.sleep(1); continue
                          time.sleep(1); continue

                      if edge_window and action_mode == "install":
                          keep_btns = edge_window.descendants(control_type="Button", title="Keep")
                          if keep_btns:
                              keep_btns[0].click_input(); keep_clicked = True; time.sleep(0.5)
                          keep_anyway = edge_window.descendants(control_type="Button", title="Keep anyway")
                          if keep_anyway:
                              keep_anyway[0].click_input(); keep_clicked = True; time.sleep(0.5)

                      can_click_download = True
                      if software_type == "opera_smart_link" and (not smart_link_interstitial_done or time.time() - smart_link_interstitial_time < 15):
                          can_click_download = False

                      if (edge_window and action_mode == "install" and can_click_download and software_type in ["opera_gx", "opera_one", "ad_mvn", "dynamic_opera", "opera_smart_link"]):
                          if time.time() - last_dl_click_time > 5:
                              clicked = False
                              dl_keywords = ["download opera", "download now", "télécharger", "baixar", "herunterladen", "descargar", "download"]
                              for btn in edge_window.descendants(control_type="Button"):
                                  txt = btn.window_text()
                                  if txt and any(k in txt.lower() for k in dl_keywords):
                                      try:
                                          edge_window.set_focus(); time.sleep(0.5); btn.click_input()
                                          last_dl_click_time = time.time(); clicked = True; log_msg("Download", f"Clicked '{txt}'")
                                          break
                                      except Exception: pass
                              if not clicked:
                                  for el in edge_window.descendants():
                                      if el.element_info.control_type in ["Hyperlink", "Text", "Image"]:
                                          wt = el.window_text()
                                          if wt and "opera" in wt.lower() and len(wt) < 150 and "smart link" not in wt.lower() and "http" not in wt.lower() and "playabledownloads" not in wt.lower():
                                              try:
                                                  edge_window.set_focus(); el.click_input(); last_dl_click_time = time.time(); log_msg("Download", f"Clicked link '{wt}'")
                                                  break
                                              except Exception: pass

                      if edge_window and action_mode == "install" and software_type == "avg":
                          elapsed = time.time() - proxy_auth_time
                          if not avg_download_clicked and elapsed > 20:
                              try:
                                  edge_window.set_focus(); time.sleep(0.5)
                                  send_keys('{TAB}'); time.sleep(random.uniform(1,2))
                                  send_keys('{ENTER}'); log_msg("AVG", "Download trigger sent")
                                  for w in range(1,11): time.sleep(1)
                              except Exception as e: log_msg("AVG", f"Error: {e}")
                              avg_download_clicked = True

                      if edge_window and action_mode == "install":
                          add_ext_btns = edge_window.descendants(control_type="Button", title="Add extension")
                          if add_ext_btns:
                              try: add_ext_btns[0].click_input(); time.sleep(2); log_msg("Extension", "Add extension clicked")
                              except: pass
                          else:
                              for btn_name in ["Add to Chrome", "Get"]:
                                  btns = edge_window.descendants(control_type="Button", title=btn_name)
                                  if btns:
                                      try: btns[0].click_input(); time.sleep(2); log_msg("Extension", f"Clicked '{btn_name}'")
                                      except: pass; break

                      can_ctrl_j = True
                      if software_type == "avg" and not avg_download_clicked: can_ctrl_j = False
                      if (action_mode == "install" and not keep_clicked and edge_window and can_ctrl_j and (time.time() - last_ctrl_j_time > 15) and ctrl_j_attempts < 4):
                          try:
                              edge_window.set_focus(); time.sleep(0.5); send_keys('^j')
                              last_ctrl_j_time = time.time(); ctrl_j_attempts += 1; log_msg("Utility", "Ctrl+J sent")
                          except Exception as e: log_msg("Utility", f"Ctrl+J error: {e}")

                      if (action_mode == "install" and software_type in ["opera_gx", "ad_mvn", "dynamic_opera", "opera_smart_link"] and opera_window and not opera_setup_completed):
                          wt = opera_window.window_text()
                          if software_type in ["ad_mvn", "dynamic_opera", "opera_smart_link"]:
                              is_gx_flow = "GX" in wt.upper()
                          else:
                              is_gx_flow = (software_type == "opera_gx")
                          if not opera_launched_time:
                              opera_launched_time = time.time()
                              wait_msg = "15s" if is_gx_flow else "90s"
                              log_msg("PostInstall", f"Browser detected. Waiting {wait_msg}...")
                              try: opera_window.set_focus(); opera_window.maximize()
                              except: pass
                          wait_time = 15 if is_gx_flow else 90
                          if time.time() - opera_launched_time > wait_time:
                              try: opera_window.set_focus()
                              except: pass
                              time.sleep(1)
                              if is_gx_flow:
                                  log_msg("PostInstall", "[Opera GX] Running TAB/ENTER sequence")
                                  try:
                                      for t in range(4): send_keys('{TAB}'); time.sleep(0.5)
                                      for i in range(8): send_keys('{ENTER}'); time.sleep(random.uniform(1,2))
                                      for t in range(random.randint(4,10)): send_keys('{TAB}'); time.sleep(0.3)
                                      send_keys('{ENTER}'); opera_setup_completed = True
                                  except Exception as e: log_msg("PostInstall", f"Error: {e}")
                              else:
                                  log_msg("PostInstall", "[Opera One legacy] Running sequence")
                                  try:
                                      sw, sh = pyautogui.size()
                                      cx, cy = sw // 2, sh // 2
                                      for i in range(3): pyautogui.click(cx, cy); time.sleep(random.uniform(1,2))
                                      for i in range(10): send_keys('{RIGHT}'); time.sleep(random.uniform(1,2))
                                      send_keys('{ENTER}'); opera_setup_completed = True
                                  except Exception as e: log_msg("PostInstall", f"Error: {e}")

                  except Exception as e: pass
                  time.sleep(1)

          if __name__ == "__main__":
              proxy_user    = sys.argv[1] if len(sys.argv) > 1 else ""
              proxy_pass    = sys.argv[2] if len(sys.argv) > 2 else ""
              proxy_type    = sys.argv[3] if len(sys.argv) > 3 else "none"
              software_type = sys.argv[4] if len(sys.argv) > 4 else "avg"
              use_proxy     = (sys.argv[5].lower() == "true") if len(sys.argv) > 5 else False
              action_mode   = sys.argv[6] if len(sys.argv) > 6 else "install"
              handle_automation(proxy_user, proxy_pass, proxy_type, software_type, use_proxy, action_mode)
          '@
          $handlerPy | Out-File -FilePath "$env:TEMP\auto_handler.py" -Encoding utf8

          Write-Host "[UI-Engine] Starting background Python process..."
          Start-Process -FilePath "python" `
            -ArgumentList "-u `"$env:TEMP\auto_handler.py`" `"$env:PROXY_USER`" `"$env:PROXY_PASS`" `"$env:PROXY_TYPE`" `"$env:SOFTWARE_TYPE`" `"$env:USE_PROXY`" `"$env:ACTION_MODE`"" `
            -WindowStyle Hidden

          # ---------- Watcher / Installer background job (INSTALL only) ----------
          $dlFolder    = "$env:USERPROFILE\Downloads"
          $timeoutSecs = 330
          $softwareType = $env:SOFTWARE_TYPE
          $exeFilter   = $env:EXE_FILTER
          $sentinelPath = "$env:TEMP\download_done.flag"
          $installerExecutedSentinel = "$env:TEMP\installer_executed.flag"

          if ($env:ACTION_MODE -eq "install") {
              Write-Host "[Watcher] Install mode. Monitoring downloads folder..."
              $installJob = Start-Job -ScriptBlock {
                  param($dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath, $installerExecutedSentinel)
                  $deadline  = (Get-Date).AddSeconds($timeoutSecs)
                  $installed = $false
                  while (-not $installed -and (Get-Date) -lt $deadline) {
                      $candidates = Get-ChildItem -Path $dlFolder -Filter $exeFilter -ErrorAction SilentlyContinue |
                          Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } |
                          Sort-Object LastWriteTime -Descending
                      if ($candidates.Count -gt 0) {
                          $file = $candidates[0]
                          Write-Output "[WATCHER] Found: $($file.Name)"
                          Set-Content -Path $sentinelPath -Value "done"
                          $actualSoftware = $softwareType
                          if ($softwareType -in @("ad_mvn", "dynamic_opera", "opera_smart_link")) {
                              if ($file.Name -match "OperaGX") { $actualSoftware = "opera_gx" } else { $actualSoftware = "opera_one" }
                          }
                          Write-Output "[INSTALL] Waiting for file unlock..."
                          $locked = $true
                          while ($locked) {
                              Start-Sleep 2
                              try { $s = [System.IO.File]::Open($file.FullName, 'Open', 'Read', 'None'); $s.Close(); $locked = $false } catch {}
                          }
                          Set-Content -Path $installerExecutedSentinel -Value "done"
                          Write-Output "[INSTALL] Executing: $($file.FullName) /silent"
                          try { Start-Process -FilePath $file.FullName -ArgumentList "/silent" -Wait } catch { Write-Output "[INSTALL] Error: $_" }
                          if ($actualSoftware -eq "opera_gx") {
                              $appPaths = @("$env:LOCALAPPDATA\Programs\Opera GX\launcher.exe", "$env:LOCALAPPDATA\Programs\Opera GX\opera.exe",
                                            "C:\Program Files\Opera GX\launcher.exe", "C:\Program Files\Opera GX\opera.exe",
                                            "C:\Program Files (x86)\Opera GX\launcher.exe", "C:\Program Files (x86)\Opera GX\opera.exe")
                          } elseif ($actualSoftware -eq "opera_one") {
                              $appPaths = @("$env:LOCALAPPDATA\Programs\Opera\launcher.exe", "$env:LOCALAPPDATA\Programs\Opera\opera.exe",
                                            "C:\Program Files\Opera\launcher.exe", "C:\Program Files\Opera\opera.exe",
                                            "C:\Program Files (x86)\Opera\launcher.exe", "C:\Program Files (x86)\Opera\opera.exe")
                          } else {
                              $appPaths = @("C:\Program Files\AVG\Browser\Application\AVGBrowser.exe",
                                            "C:\Program Files (x86)\AVG\Browser\Application\AVGBrowser.exe",
                                            "C:\Program Files\AVG\Antivirus\AVGUI.exe",
                                            "C:\Program Files (x86)\AVG\Antivirus\AVGUI.exe")
                          }
                          $launched = $false
                          for ($i = 0; $i -lt 300; $i++) {
                              foreach ($p in $appPaths) {
                                  if (Test-Path $p) { Start-Sleep 3; Start-Process -FilePath $p; $launched = $true; break }
                              }
                              if ($launched) { break }; Start-Sleep 2
                          }
                          if (-not $launched) { Write-Output "[POST] FATAL: Executable not found." }
                          $installed = $true
                      } else { Start-Sleep 5 }
                  }
                  if (-not $installed) { Write-Output "[WATCHER] Timeout. No matching file downloaded." }
              } -ArgumentList $dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath, $installerExecutedSentinel
          }

          # ---------- Launch Edge ----------
          $edgeExe = "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
          if (-Not (Test-Path $edgeExe)) { $edgeExe = "C:\Program Files\Microsoft\Edge\Application\msedge.exe" }
          $edgeArgs = @("--no-first-run", "--no-default-browser-check", "--disable-sync",
                        "--safebrowsing-disable-download-protection",
                        "--disable-features=msSmartScreenProtection,SmartScreenPuaEnabled")
          if ($useProxy -and $proxyUrl) { $edgeArgs += "--proxy-server=`"$proxyUrl`"" }
          $edgeArgs += "`"$env:TARGET_URL`""
          Write-Host "[System] Launching Edge: msedge.exe $($edgeArgs -join ' ')"
          Start-Process -FilePath $edgeExe -ArgumentList ($edgeArgs -join " ")

          # ---------- Install / Click runtime ----------
          if ($env:ACTION_MODE -eq "install") {
              Write-Host "[Runtime] INSTALL pathway. Awaiting installer completion..."
              $deadline = (Get-Date).AddSeconds($timeoutSecs)
              while ($true) {
                  $output = Receive-Job -Job $installJob -ErrorAction SilentlyContinue
                  if ($output) { foreach ($line in $output) { Write-Host $line } }
                  if ($installJob.State -in @('Completed','Failed') -or (Get-Date) -gt $deadline) { break }
                  Start-Sleep 5
              }
              Write-Host "[Runtime] Install job concluded." -ForegroundColor Green
          } else {
              Write-Host "[Runtime] CLICK-ONLY pathway. Holding 75s..."
              $clickTotal = 75; $step = 15
              $reloadFired = $false
              $reloadThreshold = Get-Random -Minimum 20 -Maximum 61
              $reloadChance    = Get-Random -Minimum 10 -Maximum 101
              for ($w = 0; $w -lt $clickTotal; $w += $step) {
                  Write-Host "[Click] $w / $clickTotal seconds..."
                  if (-not $reloadFired -and ([int]((Get-Date).AddSeconds(-$w)).TotalSeconds) -ge $reloadThreshold) {
                      try { (New-Object -ComObject WScript.Shell).SendKeys('{F5}') } catch {}
                      $reloadFired = $true
                  }
                  Start-Sleep $step
              }
              Write-Host "[Runtime] Click session finished. Exiting." -ForegroundColor Magenta
              exit 0
          }

      - name: Keep Runner Alive
        if: always() && matrix.action_mode == 'install'
        shell: pwsh
        run: |
          Write-Host "Session lifecycle fully executed." -ForegroundColor Green
          Write-Host "Leaving runner online to exhaust remaining job timeout margin..." -ForegroundColor DarkGray
          Start-Sleep -Seconds 360
