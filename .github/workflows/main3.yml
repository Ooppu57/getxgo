name: Parallel Windows Auto-Installer

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Select OS Runner Version'
        required: true
        type: choice
        options:
          - 'windows-2025'
          - 'windows-2022'
          - 'windows-11-arm'
        default: 'windows-2025'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'techx@justzeus.com'
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '1'
      software_choice:
        description: 'Select Software & Link'
        required: true
        type: choice
        options:
          - 'AVG - Trader'
          - 'AVG - MlzYT'
          - 'AVG - F.ahmad'
          - 'AVG - B4Books'
          - 'OperaGX - B4Books'
          - 'OperaGX - Techx'
          - 'OperaGX - Fatradez'
          - 'OperaGX - James'
          - 'OperaGX - Oliver'
          - 'OperaGX - Mahal'
          - 'Opera-One - Esmeel'
          - 'Opera-One - Harrari'
          - 'Opera-One - Chloe'
          - 'Opera-One - Daisy'
          - 'Opera-One - Jimmy'
          - 'Ad-MVN - Techx'
          - 'Ad-MVN - B4Books'
          - 'Ad-MVN - Orderflowz'
          - 'Ad-MVN - A2Z'
        default: 'Opera-One - Daisy'
      manual_software_url:
        description: 'Manual Software URL'
        required: false
        type: string
        default: ''
      run_manual_link:
        description: 'Run manual link'
        required: true
        type: boolean
        default: false
      scrapeops_api_key:
        description: 'ScrapeOps API Key'
        required: false
        type: string
        default: '3028b75b-201e-4659-8a8d-2d65632c1a98'
      use_without_proxy:
        description: 'Run without proxy'
        required: true
        type: boolean
        default: false
      proxy_country:
        description: 'Proxy Country Geotargeting'
        required: true
        type: choice
        options:
          - 'USA'
          - 'UK'
          - 'Canada'
          - 'Australia'
          - 'Germany'
          - 'France'
          - 'Brazil'
        default: 'USA'
      mobile_proxies:
        description: 'Use Mobile Proxies'
        required: true
        type: boolean
        default: false
      sticky_sessions:
        description: 'Enable Unique Sticky Sessions'
        required: true
        type: boolean
        default: true

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Generate Dynamic Matrix & Proxy Config
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          OS_VERSION: ${{ inputs.os_version }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          MANUAL_URL: ${{ inputs.manual_software_url }}
          RUN_MANUAL: ${{ inputs.run_manual_link }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          WITHOUT_PROXY: ${{ inputs.use_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import os, json, uuid
          
          email = os.environ.get("EMAIL", "").strip()
          num_devices = int(os.environ.get("NUM_DEVICES", "1"))
          os_version = os.environ.get("OS_VERSION", "windows-2025")
          
          # Smart API Key & Checkbox validation
          api_key = os.environ.get("API_KEY", "").strip()
          without_proxy = os.environ.get("WITHOUT_PROXY", "false").lower() == "true"
          
          if without_proxy:
              api_key = "" # Checkbox overrides API key entirely
          elif not api_key or api_key.lower() in["none", "null", "false", "blank", "empty", "''", '""']:
              api_key = ""
              
          country_input = os.environ.get("COUNTRY", "USA")
          mobile = os.environ.get("MOBILE", "false").lower() == "true"
          sticky = os.environ.get("STICKY", "false").lower() == "true"
          software_choice = os.environ.get("SOFTWARE_CHOICE", "AVG - B4Books")
          
          # Logic for Manual Link vs Software List
          run_manual = os.environ.get("RUN_MANUAL", "false").lower() == "true"
          manual_url_input = os.environ.get("MANUAL_URL", "").strip()
          manual_url = manual_url_input if run_manual else ""
          
          # Final toggle: Use Proxy only if API key actually contains text
          use_proxy = bool(api_key)
          
          # Map Country to ScrapeOps codes
          country_map = {
              "USA": "us", "UK": "uk", "Canada": "ca",
              "Australia": "au", "Germany": "de", "France": "fr",
              "Brazil": "br"
          }
          cc = country_map.get(country_input, "us")
          
          # Software Mappings
          avg_urls = {
              "AVG - Trader":  "https://u.to/a-trdr/xDh4Ig",
              "AVG - MlzYT":   "https://u.to/a-mlz/Agt3Ig",
              "AVG - F.ahmad": "https://u.to/a-fah/4Qp3Ig",
              "AVG - B4Books": "https://u.to/a-b4b/7wp3Ig",
          }
          opera_urls = {
              "OperaGX - B4Books":  "https://u.to/opx-b4b/2nh4Ig",
              "OperaGX - Techx":    "https://u.to/techxsm/xVyFIg",
              "OperaGX - Fatradez": "https://u.to/fatradezsm/cF2FIg",
              "OperaGX - James":    "https://u.to/jamesxsm/eV2FIg",
              "OperaGX - Oliver":   "https://u.to/oliverxsm/f12FIg",
              "OperaGX - Mahal":    "https://u.to/mahalxsm/iF2FIg",
          }
          opera_one_urls = {
              "Opera-One - Esmeel":    "https://u.to/esmlxopo/cTOGIg",
              "Opera-One - Harrari":   "https://u.to/hararixopo/zTOGIg",
              "Opera-One - Chloe":     "https://u.to/chloexopo/_DOGIg",
              "Opera-One - Daisy":     "https://u.to/daisyxopo/LjSGIg",
              "Opera-One - Jimmy":     "https://u.to/jmy/mUZ4Ig",
          }
          ad_mvn_urls = {
              "Ad-MVN - Techx": "https://u.to/techxadmvnxsmrt/gvd7Ig",
              "Ad-MVN - B4Books": "https://u.to/b4bxadmvnxsmrt/5-h7Ig",
              "Ad-MVN - Orderflowz": "https://u.to/ordrflzadmvnxsmrt/-fZ7Ig",
              "Ad-MVN - A2Z": "https://u.to/a2zadmvnxsmrt/Y-t7Ig",
          }
          all_urls = {**avg_urls, **opera_urls, **opera_one_urls, **ad_mvn_urls}
          
          # Determine Target URL and Dynamic Exe Filter
          dynamic_links =["OperaGX - Techx", "OperaGX - Fatradez", "OperaGX - James", "OperaGX - Oliver", "OperaGX - Mahal"]
          
          if manual_url:
              target_url = manual_url
              software_type = "dynamic_opera"
              exe_filter = "*.exe" 
          else:
              target_url = all_urls.get(software_choice, avg_urls["AVG - B4Books"])
              if software_choice in dynamic_links or software_choice.startswith("Ad-MVN"):
                  software_type = "dynamic_opera"
                  exe_filter = "*Opera*Setup*.exe"
              elif software_choice.startswith("OperaGX"):
                  software_type = "opera_gx"
                  exe_filter = "OperaGXSetup*.exe"
              elif software_choice.startswith("Opera-One"):
                  software_type = "opera_one"
                  exe_filter = "OperaSetup*.exe"
              else:
                  software_type = "avg"
                  exe_filter = "*avg*.exe"
                  
          # --- Device Name Builder ---
          def short_os(os_ver):
              if os_ver == "windows-2025":
                  return "W-25"
              elif os_ver == "windows-2022":
                  return "W-22"
              elif os_ver == "windows-11-arm":
                  return "W-11A"
              else:
                  return "W-" + os_ver.replace("windows-", "").replace("-", "")
                  
          def short_software(choice):
              prefix_map = {
                  "OperaGX":   "OPX",
                  "Opera-One": "OPO",
                  "Ad-MVN":    "MVN",
                  "AVG":       "AVG",
              }
              for key, prefix in prefix_map.items():
                  if choice.startswith(key):
                      parts = choice.split(" - ", 1)
                      list_name = parts[1].replace(" ", "") if len(parts) > 1 else ""
                      return f"{prefix}-{list_name}"
              return choice.replace(" ", "").replace("-", "")
              
          short_os_tag = short_os(os_version)
          short_sw_tag = "MANUAL" if manual_url else short_software(software_choice)
              
          includes =[]
          if email:
              for i in range(1, num_devices + 1):
                  device_name = f"{i}-{short_os_tag}-{short_sw_tag}"
                  
                  # Attach proxy settings solely if use_proxy is True
                  if use_proxy:
                      proxy_user = f"scrapeops.country={cc}"
                      if mobile:
                          proxy_user += ".mobile=true"
                      if sticky:
                          session_id = str(uuid.uuid4())[:8]
                          proxy_user += f".sticky_session={session_id}"
                      proxy_pass = api_key
                  else:
                      proxy_user = ""
                      proxy_pass = ""
                      
                  includes.append({
                      "device": device_name,
                      "email": email,
                      "os": os_version,
                      "use_proxy": str(use_proxy).lower(),
                      "proxy_user": proxy_user,
                      "proxy_pass": proxy_pass,
                      "target_url": target_url,
                      "software_type": software_type,
                      "exe_filter": exe_filter,
                  })
                  
          if not includes:
              print("Error: Valid configuration could not be generated. Exiting.")
              exit(1)
              
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")
              
      - name: Update Workflow Defaults (Remember Inputs)
        shell: python
        env:
          OS_VERSION: ${{ inputs.os_version }}
          GETSCREEN_EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          MANUAL_URL: ${{ inputs.manual_software_url }}
          RUN_MANUAL: ${{ inputs.run_manual_link }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          WITHOUT_PROXY: ${{ inputs.use_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import re, os
          
          # Extremely robust block-level YAML parser that never fails on missing quotes
          def update_yaml_default(yaml_str, input_key, new_val, is_bool=False):
              lines = yaml_str.split("\n")
              in_target_block = False
              target_indent = -1
              
              for i, line in enumerate(lines):
                  match = re.match(r"^([ \t]*)" + input_key + r":", line)
                  if match:
                      in_target_block = True
                      target_indent = len(match.group(1))
                      continue
                  
                  if in_target_block:
                      # If we exit the specific input block's indentation, stop looking
                      current_indent = len(line) - len(line.lstrip(" \t"))
                      if line.strip() and current_indent <= target_indent:
                          in_target_block = False
                          continue
                          
                      # Find and overwrite the exact default field for this input
                      if line.lstrip(" \t").startswith("default:"):
                          indent = line[:len(line) - len(line.lstrip(" \t"))]
                          if is_bool:
                              val_str = "true" if str(new_val).lower() == "true" else "false"
                              lines[i] = f"{indent}default: {val_str}"
                          else:
                              # Ensures strict blanking
                              if new_val is None or str(new_val).strip().lower() in["none", "null", "blank", "empty", "''", '""']:
                                  safe_val = ""
                              else:
                                  safe_val = str(new_val).replace("'", "\\'")
                              lines[i] = f"{indent}default: '{safe_val}'"
                          break
              return "\n".join(lines)
              
          # Targeting exclusively main3.yml as requested
          file_path = ".github/workflows/main3.yml"
          if os.path.exists(file_path):
              with open(file_path, "r", encoding="utf-8") as f:
                  content = f.read()
                  
              run_manual = os.environ.get("RUN_MANUAL", "false").lower() == "true"
              
              content = update_yaml_default(content, "os_version", os.environ.get("OS_VERSION"))
              content = update_yaml_default(content, "getscreen_email", os.environ.get("GETSCREEN_EMAIL"))
              content = update_yaml_default(content, "num_devices", os.environ.get("NUM_DEVICES"))
              content = update_yaml_default(content, "software_choice", os.environ.get("SOFTWARE_CHOICE"))
              
              # If 'run manual link' is unchecked, force 'manual_software_url' to save as blank string
              manual_url_to_save = os.environ.get("MANUAL_URL") if run_manual else ""
              content = update_yaml_default(content, "manual_software_url", manual_url_to_save)
              
              content = update_yaml_default(content, "run_manual_link", run_manual, is_bool=True)
              content = update_yaml_default(content, "scrapeops_api_key", os.environ.get("API_KEY"))
              content = update_yaml_default(content, "use_without_proxy", os.environ.get("WITHOUT_PROXY"), is_bool=True)
              content = update_yaml_default(content, "proxy_country", os.environ.get("COUNTRY"))
              content = update_yaml_default(content, "mobile_proxies", os.environ.get("MOBILE"), is_bool=True)
              content = update_yaml_default(content, "sticky_sessions", os.environ.get("STICKY"), is_bool=True)
              
              with open(file_path, "w", encoding="utf-8") as f:
                  f.write(content)
              print(f"Successfully saved new defaults in {file_path}")
          else:
              print(f"File {file_path} not found. Skipping auto-save.")
              
      - name: Commit and Push New Defaults
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/main3.yml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update last used inputs [skip ci]" && git push)

  remote_session:
    name: Remote Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 6

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      - name: Disable Windows Defender & Edge SmartScreen
        shell: pwsh
        run: |
          Write-Host "Disabling Windows Defender & SmartScreen to allow uninterrupted downloads..." -ForegroundColor Yellow
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          Set-MpPreference -PUAProtection 0 -ErrorAction SilentlyContinue
          Set-MpPreference -DisableBlockAtFirstSeen $true -ErrorAction SilentlyContinue
          Set-MpPreference -DisableIOAVProtection $true -ErrorAction SilentlyContinue
          
          # Complete Edge policy override to prevent exe block popups
          $edgePolicy = "HKLM:\SOFTWARE\Policies\Microsoft\Edge"
          if (-not (Test-Path $edgePolicy)) { New-Item -Path $edgePolicy -Force | Out-Null }
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenEnabled" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenPuaEnabled" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "DownloadRestrictions" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "PreventSmartScreenPromptOverride" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "PreventSmartScreenPromptOverrideForFiles" -Value 0
          
          $exemptPath = "$edgePolicy\ExemptDomainFileTypePairsFromFileTypeDownloadWarnings"
          if (-not (Test-Path $exemptPath)) { New-Item -Path $exemptPath -Force | Out-Null }
          Set-ItemProperty -Path $exemptPath -Name "1" -Value '{"domains":["*"],"file_extension":"exe"}'
          
      - name: Install and Start Getscreen.me (Windows)
        shell: pwsh
        run: |
          Write-Host "Downloading Getscreen.me Agent..."
          $MaxRetries = 3
          $RetryCount = 0
          $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://getscreen.me/download/getscreen.msi" -OutFile "getscreen.msi" -ErrorAction Stop
                  if ((Get-Item "getscreen.msi").length -gt 1MB) { $Success = $true }
                  else { Start-Sleep -Seconds 5; $RetryCount++ }
              } catch { Start-Sleep -Seconds 5; $RetryCount++ }
          }
          if (-not $Success) { exit 1 }
          
          $InstallArgs = "/i getscreen.msi /qn REGISTER=`"${{ matrix.email }}`" CONFIG=`"name='${{ matrix.device }}' autostart=true nonadmin=true control=true disable_confirmation=true`""
          Start-Process msiexec.exe -Wait -ArgumentList $InstallArgs
          Write-Host "Getscreen.me is configured and running."
          
      - name: Setup Auto-Downloader & Software Installation
        shell: pwsh
        env:
          USE_PROXY: ${{ matrix.use_proxy }}
          PROXY_USER: ${{ matrix.proxy_user }}
          PROXY_PASS: ${{ matrix.proxy_pass }}
          TARGET_URL: ${{ matrix.target_url }}
          SOFTWARE_TYPE: ${{ matrix.software_type }}
          EXE_FILTER: ${{ matrix.exe_filter }}
        run: |
          $useProxy = $env:USE_PROXY -eq "true"
          
          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host " Zero-Touch Downloader & Installer Active" -ForegroundColor Cyan
          Write-Host " Category  : $env:SOFTWARE_TYPE" -ForegroundColor Cyan
          if ($useProxy) {
              Write-Host " Mode      : Proxy-enabled" -ForegroundColor Cyan
          } else {
              Write-Host " Mode      : Direct (Proxy Completely Bypassed)" -ForegroundColor Yellow
          }
          Write-Host "============================================================" -ForegroundColor Cyan
          
          # 1. Ensure Python dependencies are available
          Write-Host "Checking python UIA modules..." -ForegroundColor DarkGray
          python -m pip install pywinauto pyautogui pygetwindow keyboard --quiet
          
          # 2. Build the UIA background handler
          $handlerPy = @'
          import time, sys, subprocess, random, os, tempfile, ctypes
          from pywinauto import Desktop
          import pyautogui
          from pywinauto.keyboard import send_keys
          
          # ---------------------------------------------------------------
          # Window title fragments that identify "download done" pages.
          # ---------------------------------------------------------------
          DOWNLOAD_DONE_TITLES =[
              "Thanks for downloading Opera",
              "Thanks for downloadin",
              "Download | Thanks",
              "sudetyj",
              "clickWorker",
              "GET READY TO PLAY",
              "ready to install",
          ]
          
          def _is_download_done_window(text):
              t = text.lower()
              return any(frag.lower() in t for frag in DOWNLOAD_DONE_TITLES)
              
          def close_download_windows(desktop, attempt_label=""):
              WM_CLOSE = 0x0010
              closed_any = False
              try:
                  all_windows = desktop.windows(visible_only=True)
              except Exception:
                  return False
                  
              for window in all_windows:
                  try:
                      wt = window.window_text()
                      if not wt:
                          continue
                          
                      is_match = _is_download_done_window(wt)
                      if not is_match and ("Microsoft Edge" in wt or wt == "Edge"):
                          try:
                              for child in window.children():
                                  child_wt = child.window_text()
                                  if child_wt and _is_download_done_window(child_wt):
                                      is_match = True
                                      break
                          except Exception:
                              pass
                              
                      if not is_match:
                          continue
                          
                      print(f"[CloseWindow{attempt_label}] Target: '{wt}'")
                      closed = False
                      
                      if not closed:
                          try:
                              close_btns = window.descendants(control_type="Button", title="Close")
                              if close_btns:
                                  window.set_focus()
                                  time.sleep(0.3)
                                  close_btns[0].click_input()
                                  closed = True
                                  print(f"[CloseWindow{attempt_label}] Closed via UIA button.")
                          except Exception:
                              pass
                              
                      if not closed:
                          try:
                              window.set_focus()
                              time.sleep(0.3)
                              send_keys('%{F4}')
                              closed = True
                              print(f"[CloseWindow{attempt_label}] Closed via Alt+F4.")
                          except Exception:
                              pass
                              
                      if not closed:
                          try:
                              hwnd = window.handle
                              ctypes.windll.user32.PostMessageW(hwnd, WM_CLOSE, 0, 0)
                              closed = True
                              print(f"[CloseWindow{attempt_label}] Closed via WM_CLOSE.")
                          except Exception:
                              pass
                              
                      if closed:
                          closed_any = True
                          time.sleep(0.5)
                  except Exception:
                      pass
                      
              return closed_any
              
          def handle_automation(username, password, software_type, use_proxy, timeout=360):
              desktop = Desktop(backend="uia")
              start_time = time.time()
              
              last_ctrl_j_time = time.time()
              last_dl_click_time = 0
              ctrl_j_attempts = 0
              keep_clicked = False
              
              opera_launched_time = None
              opera_setup_completed = False
              
              sentinel_path = os.path.join(tempfile.gettempdir(), "download_done.flag")
              download_windows_closed = False
              
              while time.time() - start_time < timeout:
                  try:
                      edge_window = None
                      opera_window = None
                      
                      for window in desktop.windows(visible_only=True):
                          wt = window.window_text()
                          if not wt:
                              continue
                          if "Microsoft Edge" in wt or "sudetyj" in wt or "Chrome Web Store" in wt or "Edge" in wt:
                              edge_window = window
                          if "Opera" in wt or "Speed Dial" in wt or "Start Page" in wt or "Welcome" in wt:
                              if "Microsoft Edge" not in wt and "Edge" not in wt and "Chrome Web Store" not in wt:
                                  opera_window = window
                                  
                      # G. Close download/thanks windows once sentinel file is written
                      if not download_windows_closed and os.path.exists(sentinel_path):
                          print("[CloseWindow] Sentinel detected — exe found. Starting download window cleanup...")
                          for attempt in range(1, 6):
                              still_open = close_download_windows(desktop, attempt_label=f"#{attempt}")
                              time.sleep(2)
                              if not still_open:
                                  print(f"[CloseWindow] No more download windows on attempt #{attempt}.")
                                  break
                          download_windows_closed = True
                          print("[CloseWindow] Download window cleanup complete.")
                          edge_window = None
                          
                      # A. Proxy Authentication dialog — ONLY EXECUTED IF PROXY IS ACTIVE
                      if use_proxy and (edge_window or opera_window):
                          for w in [edge_window, opera_window]:
                              if w:
                                  user_fields = w.descendants(control_type="Edit", title="Username")
                                  pass_fields = w.descendants(control_type="Edit", title="Password")
                                  if user_fields and pass_fields:
                                      try:
                                          w.set_focus()
                                          time.sleep(0.5)
                                          user_fields[0].click_input()
                                          user_fields[0].type_keys(username, with_spaces=True, pause=0.02)
                                          pass_fields[0].click_input()
                                          pass_fields[0].type_keys(password, with_spaces=True, pause=0.02)
                                          btn = w.descendants(control_type="Button", title="Sign in")
                                          if btn:
                                              btn[0].click_input()
                                          else:
                                              pass_fields[0].type_keys("{ENTER}")
                                      except Exception:
                                          pass
                                          
                      # B. Edge Download Protection: "Keep" & "Keep anyway"
                      if edge_window:
                          keep_btns = edge_window.descendants(control_type="Button", title="Keep")
                          if keep_btns:
                              keep_clicked = True
                              keep_btns[0].click_input()
                              time.sleep(0.5)
                          keep_anyway = edge_window.descendants(control_type="Button", title="Keep anyway")
                          if keep_anyway:
                              keep_clicked = True
                              keep_anyway[0].click_input()
                              time.sleep(0.5)
                              
                      # C. Interstitial & Final Download Auto-Clicker
                      if edge_window and software_type in["opera_gx", "opera_one", "ad_mvn", "dynamic_opera"]:
                          for cookie_btn in["Accept all", "Accepter tout", "Tout accepter", "Accept Cookies", "Allow all", "Accept selection"]:
                              btns = edge_window.descendants(control_type="Button", title=cookie_btn)
                              if btns:
                                  try:
                                      btns[0].click_input()
                                      print(f"[{software_type}] Clicked Cookie Consent: {cookie_btn}")
                                      time.sleep(1)
                                  except:
                                      pass
                                      
                          if time.time() - last_dl_click_time > 5:
                              clicked_something = False
                              dl_keywords =["download opera", "download now", "télécharger", "baixar", "herunterladen", "descargar", "download"]
                              for btn in edge_window.descendants(control_type="Button"):
                                  btntxt = btn.window_text()
                                  if btntxt and any(k in btntxt.lower() for k in dl_keywords):
                                      try:
                                          edge_window.set_focus()
                                          time.sleep(0.5)
                                          btn.click_input()
                                          last_dl_click_time = time.time()
                                          print(f"[{software_type}] Clicked Final Download Button: {btntxt}")
                                          clicked_something = True
                                          break
                                      except:
                                          pass
                              if not clicked_something:
                                  for el in edge_window.descendants():
                                      if el.element_info.control_type in["Hyperlink", "Text", "Image"]:
                                          wt = el.window_text()
                                          if wt and "opera" in wt.lower() and len(wt) < 150:
                                              if "smart link" not in wt.lower() and "http" not in wt.lower() and "playabledownloads" not in wt.lower():
                                                  try:
                                                      edge_window.set_focus()
                                                      el.click_input()
                                                      last_dl_click_time = time.time()
                                                      print(f"[{software_type}] Clicked Interstitial Element: {wt}")
                                                      break
                                                  except:
                                                      pass
                                                      
                      # D. Browser Extensions Handling
                      if edge_window:
                          add_ext_btns = edge_window.descendants(control_type="Button", title="Add extension")
                          if add_ext_btns:
                              try:
                                  edge_window.set_focus()
                                  time.sleep(0.5)
                                  add_ext_btns[0].click_input()
                                  print("[Extension] Clicked 'Add extension' confirmation.")
                                  time.sleep(2)
                              except Exception:
                                  pass
                          else:
                              for btn_name in["Add to Chrome", "Get"]:
                                  install_btns = edge_window.descendants(control_type="Button", title=btn_name)
                                  if install_btns:
                                      try:
                                          edge_window.set_focus()
                                          time.sleep(0.5)
                                          install_btns[0].click_input()
                                          print(f"[Extension] Clicked '{btn_name}' on web store.")
                                          time.sleep(2)
                                          break
                                      except Exception:
                                          pass
                                          
                      # E. Ctrl+J to open downloads flyout
                      if not keep_clicked and edge_window and (time.time() - last_ctrl_j_time > 15) and ctrl_j_attempts < 4:
                          try:
                              edge_window.set_focus()
                              time.sleep(0.5)
                              send_keys('^j')
                              last_ctrl_j_time = time.time()
                              ctrl_j_attempts += 1
                              print(f"[Handler] Pressed Ctrl+J to open downloads (attempt {ctrl_j_attempts})")
                          except Exception:
                              pass
                              
                      # F. Opera Post-install Keyboard Automation Flow
                      if software_type in["opera_gx", "opera_one", "ad_mvn", "dynamic_opera"] and opera_window and not opera_setup_completed:
                          wt = opera_window.window_text()
                          if software_type in ["ad_mvn", "dynamic_opera"]:
                              is_gx_flow = "GX" in wt.upper()
                          else:
                              is_gx_flow = (software_type == "opera_gx")
                              
                          if not opera_launched_time:
                              opera_launched_time = time.time()
                              wait_msg = "15s" if is_gx_flow else "90s"
                              print(f"[{software_type}] Opera Window Detected: '{wt}'. Waiting {wait_msg} for full rendering...")
                              try:
                                  opera_window.set_focus()
                                  opera_window.maximize()
                              except Exception:
                                  pass
                                  
                          wait_time = 15 if is_gx_flow else 90
                          if time.time() - opera_launched_time > wait_time:
                              try:
                                  opera_window.set_focus()
                              except Exception:
                                  pass
                              time.sleep(1)
                              if is_gx_flow:
                                  print("[Opera GX] Starting TAB/ENTER automation flow...")
                                  try:
                                      for _ in range(4):
                                          send_keys('{TAB}')
                                          time.sleep(0.5)
                                      print("[Opera GX] Pressed TAB 4 times.")
                                      
                                      for i in range(8):
                                          send_keys('{ENTER}')
                                          delay = random.uniform(1.0, 2.0)
                                          print(f"[Opera GX] Pressed ENTER ({i+1}/8), waiting {delay:.2f}s")
                                          time.sleep(delay)
                                          
                                      random_tabs = random.randint(4, 10)
                                      for _ in range(random_tabs):
                                          send_keys('{TAB}')
                                          time.sleep(0.3)
                                      print(f"[Opera GX] Pressed TAB {random_tabs} times.")
                                      
                                      send_keys('{ENTER}')
                                      print("[Opera GX] Pressed final ENTER.")
                                      
                                      opera_setup_completed = True
                                      print("[Opera GX] Setup automation successfully completed.")
                                  except Exception as e:
                                      print(f"[Opera GX] Error in TAB/ENTER flow: {e}")
                              else:
                                  print("[Opera One] Starting automation flow after 90s delay...")
                                  try:
                                      sw, sh = pyautogui.size()
                                      cx, cy = sw // 2, sh // 2
                                      print(f"[Opera One] Clicking center of screen ({cx}, {cy}) 3 times...")
                                      for i in range(3):
                                          pyautogui.click(cx, cy)
                                          delay = random.uniform(1.0, 2.0)
                                          print(f"[Opera One] Center click {i+1}/3 done, waiting {delay:.2f}s")
                                          time.sleep(delay)
                                          
                                      for i in range(10):
                                          send_keys('{RIGHT}')
                                          delay = random.uniform(1.0, 2.0)
                                          print(f"[Opera One] Sent RIGHT arrow ({i+1}/10), waiting {delay:.2f}s")
                                          time.sleep(delay)
                                          
                                      send_keys('{ENTER}')
                                      print("[Opera One] Pressed ENTER.")
                                      
                                      opera_setup_completed = True
                                      print("[Opera One] Setup automation successfully completed.")
                                  except Exception as e:
                                      print(f"[Opera One] Error in Opera One flow: {e}")
                                      
                  except Exception as e:
                      pass
                  time.sleep(1)
                  
          if __name__ == "__main__":
              username      = sys.argv[1] if len(sys.argv) > 1 else ""
              password      = sys.argv[2] if len(sys.argv) > 2 else ""
              software_type = sys.argv[3] if len(sys.argv) > 3 else "avg"
              # Converts the "true" or "false" string passed from PowerShell into a real boolean
              use_proxy     = (sys.argv[4].lower() == "true") if len(sys.argv) > 4 else False
              
              handle_automation(username, password, software_type, use_proxy)
          '@
          $handlerPy | Out-File -FilePath "$env:TEMP\auto_handler.py" -Encoding utf8
          
          # Start the handler concurrently — passing args exactly in sequence
          Start-Process -FilePath "python" `
              -ArgumentList "-u `"$env:TEMP\auto_handler.py`" `"$env:PROXY_USER`" `"$env:PROXY_PASS`" `"$env:SOFTWARE_TYPE`" `"$env:USE_PROXY`"" `
              -WindowStyle Hidden
              
          # 3. Setup the Software Watcher/Installer background job
          $dlFolder    = "$env:USERPROFILE\Downloads"
          $timeoutSecs = 330
          $softwareType = $env:SOFTWARE_TYPE
          $exeFilter   = $env:EXE_FILTER
          $sentinelPath = "$env:TEMP\download_done.flag"
          
          $installJob = Start-Job -ScriptBlock {
              param($dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath)
              $deadline  = (Get-Date).AddSeconds($timeoutSecs)
              $installed = $false
              
              while (-not $installed -and (Get-Date) -lt $deadline) {
                  $candidates = Get-ChildItem -Path $dlFolder -Filter $exeFilter -ErrorAction SilentlyContinue |
                      Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } |
                      Sort-Object LastWriteTime -Descending
                      
                  if ($candidates.Count -gt 0) {
                      $file = $candidates[0]
                      Write-Output "[$softwareType] Download complete! ($($file.Name))"
                      
                      try { Set-Content -Path $sentinelPath -Value "done" -ErrorAction SilentlyContinue } catch {}
                      Write-Output "[$softwareType] Sentinel written — Python handler will close download windows."
                      
                      $actualSoftware = $softwareType
                      if ($softwareType -eq "ad_mvn" -or $softwareType -eq "dynamic_opera") {
                          if ($file.Name -match "OperaGX") {
                              $actualSoftware = "opera_gx"
                              Write-Output "[$softwareType] Detected payload as Opera GX"
                          } else {
                              $actualSoftware = "opera_one"
                              Write-Output "[$softwareType] Detected payload as Opera One Standard"
                          }
                      }
                      
                      $locked = $true
                      while ($locked) {
                          Start-Sleep -Seconds 2
                          try {
                              $s =[System.IO.File]::Open($file.FullName, 'Open', 'Read', 'None')
                              $s.Close()
                              $locked = $false
                          } catch { }
                      }
                      
                      Write-Output "[$actualSoftware] Waiting 4s for download window cleanup before launching installer..."
                      Start-Sleep -Seconds 4
                      
                      Write-Output "[$actualSoftware] Executing silent installer..."
                      try {
                          Start-Process -FilePath $file.FullName -ArgumentList "/silent" -Wait
                          Write-Output "[$actualSoftware] Installer process finished."
                      } catch {
                          Write-Output "[$actualSoftware] ERROR running installer: $_"
                      }
                      
                      Write-Output "[$actualSoftware] Waiting for final application deployment..."
                      if ($actualSoftware -eq "opera_gx") {
                          $appPaths = @(
                              "$env:LOCALAPPDATA\Programs\Opera GX\launcher.exe",
                              "$env:LOCALAPPDATA\Programs\Opera GX\opera.exe",
                              "C:\Program Files\Opera GX\launcher.exe",
                              "C:\Program Files\Opera GX\opera.exe",
                              "C:\Program Files (x86)\Opera GX\launcher.exe",
                              "C:\Program Files (x86)\Opera GX\opera.exe"
                          )
                      } elseif ($actualSoftware -eq "opera_one") {
                          $appPaths = @(
                              "$env:LOCALAPPDATA\Programs\Opera\launcher.exe",
                              "$env:LOCALAPPDATA\Programs\Opera\opera.exe",
                              "C:\Program Files\Opera\launcher.exe",
                              "C:\Program Files\Opera\opera.exe",
                              "C:\Program Files (x86)\Opera\launcher.exe",
                              "C:\Program Files (x86)\Opera\opera.exe"
                          )
                      } else {
                          $appPaths = @(
                              "C:\Program Files\AVG\Browser\Application\AVGBrowser.exe",
                              "C:\Program Files (x86)\AVG\Browser\Application\AVGBrowser.exe",
                              "C:\Program Files\AVG\Antivirus\AVGUI.exe",
                              "C:\Program Files (x86)\AVG\Antivirus\AVGUI.exe"
                          )
                      }
                      
                      $launched = $false
                      for ($i = 0; $i -lt 300; $i++) {
                          foreach ($p in $appPaths) {
                              if (Test-Path $p) {
                                  Start-Sleep -Seconds 3
                                  Write-Output "[$actualSoftware] Launching application: $p"
                                  Start-Process -FilePath $p
                                  $launched = $true
                                  break
                              }
                          }
                          if ($launched) { break }
                          Start-Sleep -Seconds 2
                      }
                      
                      if (-not $launched) {
                          Write-Output "[$actualSoftware] WARNING: Could not find application exe after install."
                      }
                      
                      $installed = $true
                  } else {
                      Start-Sleep -Seconds 5
                  }
              }
          } -ArgumentList $dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath
          
          # 4. Find Edge Path & Build launch args
          $edgeExe = "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
          if (-Not (Test-Path $edgeExe)) {
              $edgeExe = "C:\Program Files\Microsoft\Edge\Application\msedge.exe"
          }
          
          # Base Edge flags (SmartScreen suppression, no first-run)
          $edgeArgs = @(
              "--no-first-run",
              "--no-default-browser-check",
              "--disable-sync",
              "--safebrowsing-disable-download-protection",
              "--disable-features=msSmartScreenProtection,SmartScreenPuaEnabled"
          )
          
          # Only add proxy flag when a key was provided AND NOT BLANK
          if ($useProxy) {
              $proxyServer = "residential-proxy.scrapeops.io:8181"
              $edgeArgs += "--proxy-server=`"http://$proxyServer`""
              Write-Host "Launching Edge WITH proxy -> $env:TARGET_URL" -ForegroundColor Cyan
          } else {
              Write-Host "Launching Edge WITHOUT proxy (direct) -> $env:TARGET_URL" -ForegroundColor Yellow
          }
          
          $edgeArgs += "`"$env:TARGET_URL`""
          Start-Process -FilePath $edgeExe -ArgumentList ($edgeArgs -join " ")
          
          # 5. Monitor Output of Background Job
          $deadline = (Get-Date).AddSeconds($timeoutSecs)
          while ($true) {
              $output = Receive-Job -Job $installJob -ErrorAction SilentlyContinue
              if ($output) { foreach ($line in $output) { Write-Host $line } }
              if ($installJob.State -eq 'Completed' -or $installJob.State -eq 'Failed' -or (Get-Date) -gt $deadline) { break }
              Start-Sleep -Seconds 5
          }
          
      - name: Keep Runner Alive
        if: always()
        shell: pwsh
        run: |
          Write-Host "Session is active. This runner will remain online until the job timeout is reached."
          Start-Sleep -Seconds 360
