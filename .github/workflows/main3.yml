name: Parallel Windows Auto-Installer

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Select OS Runner Version'
        required: true
        type: choice
        options:
          - 'windows-2025'
          - 'windows-2022'
          - 'windows-11-arm'
        default: 'windows-2025'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'techx@highmail.site'
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '5'
      num_clicks:
        description: 'Number of Clicks'
        required: true
        type: choice
        options:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '2'
      software_choice:
        description: 'Select Software & Link'
        required: true
        type: choice
        options:
          - 'AVG - TechxTrader'
          - 'AVG - B4Books'
          - 'AVG - F.Ahmad'
          - 'OperaGX - B4Books'
          - 'Opera - Techx'
          - 'Opera - Fatradez'
          - 'Opera - James'
          - 'Opera - Oliver'
          - 'Opera - Mahal'
          - 'Opera-One - Esmeel'
          - 'Opera-One - Harrari'
          - 'Opera-One - Chloe'
          - 'Opera-One - Daisy'
          - 'Opera-One - Jimmy'
          - 'Ad-MVN - Techx'
          - 'Ad-MVN - B4Books'
          - 'Ad-MVN - Orderflowz'
          - 'Ad-MVN - A2Z'
        default: 'Opera - Fatradez'
      manual_software_url:
        description: 'Manual Software URL'
        required: false
        type: string
        default: ''
      run_manual_link:
        description: 'Run manual link'
        required: true
        type: boolean
        default: false
      scrapeops_api_key:
        description: |
          ScrapeOps / Proxies  
        required: false
        type: string
        default: '7863e946-935d-4b03-b42a-79ebf7f43868'
      use_without_proxy:
        description: 'Run without proxy'
        required: true
        type: boolean
        default: false
      proxy_country:
        description: 'Proxy Country'
        required: true
        type: choice
        options:
          - 'USA'
          - 'UK'
          - 'Canada'
          - 'Australia'
          - 'Germany'
          - 'France'
          - 'Brazil'
          - 'Mexico'
          - 'Spain'
          - 'Vietnam'
          - 'Switzerland'
          - 'Indonesia'
          - 'Italy'
          - 'Netherlands'
          - 'Poland'
        default: 'Australia'
      mobile_proxies:
        description: 'Use Mobile Proxies'
        required: true
        type: boolean
        default: true
      sticky_sessions:
        description: 'Use Unique Sticky Sessions'
        required: true
        type: boolean
        default: true

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Generate Dynamic Matrix & Proxy Config
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          NUM_CLICKS: ${{ inputs.num_clicks }}
          OS_VERSION: ${{ inputs.os_version }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          MANUAL_URL: ${{ inputs.manual_software_url }}
          RUN_MANUAL: ${{ inputs.run_manual_link }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          WITHOUT_PROXY: ${{ inputs.use_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import os, json, uuid, random, re, sys, subprocess, time
          from urllib.parse import urlparse

          # Ensure required packages are available
          subprocess.check_call([sys.executable, "-m", "pip", "install", "requests", "pysocks", "--quiet"])
          import requests

          print("========== INITIALIZING MATRIX GENERATION ==========")

          email = os.environ.get("EMAIL", "").strip()
          num_devices = int(os.environ.get("NUM_DEVICES", "1"))
          os_version = os.environ.get("OS_VERSION", "windows-2025")

          api_key_raw = os.environ.get("API_KEY", "").strip()
          without_proxy = os.environ.get("WITHOUT_PROXY", "false").lower() == "true"

          if without_proxy:
              print("[Proxy] 'Run without proxy' checked. Disabling proxy.")
              api_key_raw = ""
          elif not api_key_raw or api_key_raw.lower() in ["none", "null", "false", "blank", "empty", "''", '""']:
              print("[Proxy] API key empty or invalid. Disabling proxy.")
              api_key_raw = ""

          country_input = os.environ.get("COUNTRY", "USA")
          mobile = os.environ.get("MOBILE", "false").lower() == "true"
          sticky = os.environ.get("STICKY", "false").lower() == "true"
          software_choice = os.environ.get("SOFTWARE_CHOICE", "AVG - B4Books")

          # --- Number of Clicks logic ---
          num_clicks_raw = int(os.environ.get("NUM_CLICKS", "0"))
          num_clicks = min(num_clicks_raw, num_devices)
          num_installs = num_devices - num_clicks
          action_list = ["install"] * num_installs + ["click"] * num_clicks
          random.shuffle(action_list)

          print(f"[Action Matrix] Total Devices : {num_devices}")
          print(f"[Action Matrix] Install Paths : {num_installs}")
          print(f"[Action Matrix] Click Paths   : {num_clicks}")
          print(f"[Action Matrix] Randomized Queue: {action_list}")

          run_manual = os.environ.get("RUN_MANUAL", "false").lower() == "true"
          manual_url_input = os.environ.get("MANUAL_URL", "").strip()
          manual_url = manual_url_input if run_manual else ""

          # Country mapping for ScrapeOps
          country_map = {
              "USA": "us", "UK": "uk", "Canada": "ca",
              "Australia": "au", "Germany": "de", "France": "fr",
              "Brazil": "br", "Mexico": "mx", "Spain": "es",
              "Vietnam": "vn", "Switzerland": "ch", "Indonesia": "id",
              "Italy": "it", "Netherlands": "nl", "Poland": "pl"
          }
          cc = country_map.get(country_input, "us")

          # Software Mappings (unchanged)
          avg_urls = {
              "AVG - TechxTrader": "https://u.to/a-trdr/GoeNIg",
              "AVG - B4Books":     "https://u.to/a-b4b/O4eNIg",
              "AVG - F.Ahmad":     "https://u.to/a-fahmad/ooeNIg",
          }
          opera_urls = {
              "OperaGX - B4Books":  "https://u.to/opx-b4b/2nh4Ig",
              "Opera - Techx":      "https://u.to/techxsm/xVyFIg",
              "Opera - Fatradez":   "https://u.to/fatradezsm/cF2FIg",
              "Opera - James":      "https://u.to/jamesxsm/eV2FIg",
              "Opera - Oliver":     "https://u.to/oliverxsm/f12FIg",
              "Opera - Mahal":      "https://u.to/mahalxsm/iF2FIg",
          }
          opera_one_urls = {
              "Opera-One - Esmeel":  "https://u.to/esmlxopo/cTOGIg",
              "Opera-One - Harrari": "https://u.to/hararixopo/zTOGIg",
              "Opera-One - Chloe":   "https://u.to/chloexopo/_DOGIg",
              "Opera-One - Daisy":   "https://u.to/daisyxopo/LjSGIg",
              "Opera-One - Jimmy":   "https://u.to/jmy/mUZ4Ig",
          }
          ad_mvn_urls = {
              "Ad-MVN - Techx":      "https://u.to/techxadmvnxsmrt/gvd7Ig",
              "Ad-MVN - B4Books":    "https://u.to/b4bxadmvnxsmrt/5-h7Ig",
              "Ad-MVN - Orderflowz": "https://u.to/ordrflzadmvnxsmrt/-fZ7Ig",
              "Ad-MVN - A2Z":        "https://u.to/a2zadmvnxsmrt/Y-t7Ig",
          }
          all_urls = {**avg_urls, **opera_urls, **opera_one_urls, **ad_mvn_urls}
          dynamic_links = ["Opera - Techx", "Opera - Fatradez", "Opera - James", "Opera - Oliver", "Opera - Mahal"]

          if manual_url:
              target_url = manual_url
              software_type = "dynamic_opera"
              exe_filter = "*.exe"
              print(f"[Target] Manual URL selected: {target_url}")
          else:
              target_url = all_urls.get(software_choice, avg_urls.get("AVG - B4Books", "https://u.to/a-b4b/O4eNIg"))
              if software_choice in dynamic_links:
                  software_type = "opera_smart_link"
                  exe_filter = "*Opera*Setup*.exe"
              elif software_choice.startswith("Ad-MVN"):
                  software_type = "dynamic_opera"
                  exe_filter = "*Opera*Setup*.exe"
              elif software_choice.startswith("OperaGX"):
                  software_type = "opera_gx"
                  exe_filter = "OperaGXSetup*.exe"
              elif software_choice.startswith("Opera-One"):
                  software_type = "opera_one"
                  exe_filter = "OperaSetup*.exe"
              else:
                  software_type = "avg"
                  exe_filter = "*avg*.exe"
              print(f"[Target] Software: {software_choice} -> URL: {target_url}")
              print(f"[Target] Engine Type: {software_type} | Filter: {exe_filter}")

          # ============= PROXY DETECTION & MANAGEMENT =============
          use_proxy = False
          proxy_type = "none"
          manual_proxies_list = []

          if api_key_raw:
              # Robust detection: manual if contains @, ://, or whitespace; else ScrapeOps key
              if any(c in api_key_raw for c in ["@", "://", "\n", "\r", " "]):
                  proxy_type = "manual"
                  print("[Proxy] Detected MANUAL proxy list (contains @, ://, or whitespace).")
              else:
                  proxy_type = "scrapeops"
                  print("[Proxy] Detected ScrapeOps API key.")

          if proxy_type == "scrapeops" and api_key_raw:
              use_proxy = True
              print(f"[Proxy] Using ScrapeOps with country={cc}, mobile={mobile}, sticky={sticky}")
              device_country = cc.upper()
          elif proxy_type == "manual":
              print("[Proxy] Starting manual proxy validation...")
              # Split by any whitespace (spaces, newlines, tabs)
              raw_proxies = [p for p in re.split(r'\s+', api_key_raw.strip()) if p]
              print(f"[Proxy] Found {len(raw_proxies)} potential proxy entries.")

              def parse_proxy_entry(entry):
                  """Convert a raw entry (ip:port@user:pass, http://..., etc.) into full HTTP URL."""
                  entry = entry.strip()
                  if "://" not in entry:
                      # No scheme – default to HTTP. But first figure out format.
                      # It could be ip:port@user:pass (host first) or user:pass@ip:port.
                      if "@" in entry:
                          left, right = entry.rsplit("@", 1)
                          if re.match(r'^\d+\.\d+\.\d+\.\d+:\d+$', left):
                              # host:port@user:pass
                              host_port, user_pass = left, right
                          else:
                              # user:pass@host:port (standard)
                              user_pass, host_port = left, right
                          return f"http://{user_pass}@{host_port}"
                      else:
                          # No auth, just host:port
                          return f"http://{entry}"
                  else:
                      # Already has a scheme. Might still need to rearrange if it's e.g. socks5://ip:port
                      return entry

              def test_proxy_http(proxy_url, timeout=8):
                  try:
                      proxies = {"http": proxy_url, "https": proxy_url}
                      r = requests.get("http://httpbin.org/ip", proxies=proxies, timeout=timeout)
                      if r.status_code == 200:
                          return True
                  except Exception:
                      pass
                  return False

              def test_proxy_socks5(proxy_url, timeout=8):
                  try:
                      # Convert to socks5 schema
                      parsed = urlparse(proxy_url)
                      if parsed.scheme in ("socks5", "socks5h"):
                          socks_url = proxy_url
                      else:
                          loc = parsed.hostname
                          port = parsed.port or 1080
                          auth = f"{parsed.username}:{parsed.password}@" if parsed.username else ""
                          socks_url = f"socks5://{auth}{loc}:{port}"
                      proxies = {"http": socks_url, "https": socks_url}
                      r = requests.get("http://httpbin.org/ip", proxies=proxies, timeout=timeout)
                      if r.status_code == 200:
                          return True
                  except Exception:
                      pass
                  return False

              def get_country_via_proxy(proxy_url):
                  api = "http://ip-api.com/json/?fields=countryCode"
                  # Try HTTP first
                  try:
                      proxies = {"http": proxy_url}
                      r = requests.get(api, proxies=proxies, timeout=8)
                      if r.status_code == 200:
                          return r.json().get("countryCode", "").upper()
                  except Exception:
                      pass
                  # Try as SOCKS5
                  try:
                      parsed = urlparse(proxy_url)
                      if parsed.scheme in ("socks5", "socks5h"):
                          socks_url = proxy_url
                      else:
                          loc = parsed.hostname
                          port = parsed.port or 1080
                          auth = f"{parsed.username}:{parsed.password}@" if parsed.username else ""
                          socks_url = f"socks5://{auth}{loc}:{port}"
                      proxies = {"http": socks_url}
                      r = requests.get(api, proxies=proxies, timeout=8)
                      if r.status_code == 200:
                          return r.json().get("countryCode", "").upper()
                  except Exception:
                      pass
                  return ""

              active_proxies = []
              for i, raw in enumerate(raw_proxies, 1):
                  print(f"[Proxy] Testing entry {i}: {raw}")
                  full_http = parse_proxy_entry(raw)
                  http_ok = test_proxy_http(full_http)
                  socks_ok = test_proxy_socks5(full_http)
                  active = http_ok or socks_ok
                  status = "ACTIVE" if active else "DEAD"
                  print(f"   HTTP: {'OK' if http_ok else 'FAIL'} | SOCKS5: {'OK' if socks_ok else 'FAIL'} -> {status}")

                  if active:
                      country = get_country_via_proxy(full_http if http_ok else full_http)  # will try HTTP then SOCKS
                      print(f"   Country: {country or '??'}")
                      final_url = full_http if http_ok else f"socks5://{urlparse(full_http).username}:{urlparse(full_http).password}@{urlparse(full_http).hostname}:{urlparse(full_http).port or 1080}" if socks_ok else full_http
                      active_proxies.append({
                          "url": final_url,
                          "country": country or cc,  # fallback to dropdown if detection fails
                          "http_ok": http_ok,
                          "socks_ok": socks_ok
                      })

              if active_proxies:
                  use_proxy = True
                  manual_proxies_list = active_proxies
                  print(f"[Proxy] {len(active_proxies)} active proxy(es) ready for assignment.")
              else:
                  print("[Proxy] No active proxies found. Proceeding without proxy!")
                  use_proxy = False

          # ============= MATRIX GENERATION =============
          def short_os(os_ver):
              if os_ver == "windows-2025": return "W25"
              elif os_ver == "windows-2022": return "W22"
              elif os_ver == "windows-11-arm": return "W11A"
              else: return "W" + os_ver.replace("windows-", "").replace("-", "")

          def short_software(choice):
              prefix_map = {"OperaGX": "OPX", "Opera-One": "OPO", "Ad-MVN": "MVN", "AVG": "AVG", "Opera": "OP"}
              for key, prefix in prefix_map.items():
                  if choice.startswith(key):
                      parts = choice.split(" - ", 1)
                      list_name = parts[1].replace(" ", "") if len(parts) > 1 else ""
                      return f"{prefix}-{list_name}"
              return choice.replace(" ", "").replace("-", "")

          short_os_tag = short_os(os_version)
          short_sw_tag = "MANUAL" if manual_url else short_software(software_choice)

          includes = []
          if use_proxy and proxy_type == "scrapeops":
              for i in range(1, num_devices + 1):
                  action_mode = action_list[i - 1]
                  device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_mode.capitalize()}-{cc.upper()}"
                  proxy_user = f"scrapeops.country={cc}"
                  if mobile: proxy_user += ".mobile=true"
                  if sticky:
                      session_id = str(uuid.uuid4())[:8]
                      proxy_user += f".sticky_session={session_id}"
                  proxy_pass = api_key_raw
                  includes.append({
                      "device": device_name,
                      "email": email,
                      "os": os_version,
                      "use_proxy": str(use_proxy).lower(),
                      "proxy_server": "",
                      "proxy_user": proxy_user,
                      "proxy_pass": proxy_pass,
                      "target_url": target_url,
                      "software_type": software_type,
                      "exe_filter": exe_filter,
                      "action_mode": action_mode,
                      "country_code": cc.upper()
                  })
          elif use_proxy and proxy_type == "manual":
              proxy_pool = manual_proxies_list
              if len(proxy_pool) < num_devices:
                  print("[Warning] Fewer active proxies than devices. Some devices will share proxies.")
                  proxy_cycle = [proxy_pool[i % len(proxy_pool)] for i in range(num_devices)]
              else:
                  random.shuffle(proxy_pool)
                  proxy_cycle = proxy_pool[:num_devices]
              for i in range(1, num_devices + 1):
                  proxy = proxy_cycle[i-1]
                  action_mode = action_list[i - 1]
                  device_country = proxy["country"]
                  device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_mode.capitalize()}-{device_country}"
                  includes.append({
                      "device": device_name,
                      "email": email,
                      "os": os_version,
                      "use_proxy": str(use_proxy).lower(),
                      "proxy_server": proxy["url"],
                      "proxy_user": "",
                      "proxy_pass": "",
                      "target_url": target_url,
                      "software_type": software_type,
                      "exe_filter": exe_filter,
                      "action_mode": action_mode,
                      "country_code": device_country
                  })
          else:
              for i in range(1, num_devices + 1):
                  action_mode = action_list[i - 1]
                  device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_mode.capitalize()}-NOPROXY"
                  includes.append({
                      "device": device_name,
                      "email": email,
                      "os": os_version,
                      "use_proxy": "false",
                      "proxy_server": "",
                      "proxy_user": "",
                      "proxy_pass": "",
                      "target_url": target_url,
                      "software_type": software_type,
                      "exe_filter": exe_filter,
                      "action_mode": action_mode,
                      "country_code": "NOPROXY"
                  })

          if not includes:
              print("Error: Valid configuration could not be generated. Exiting.")
              exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")
          print("========== MATRIX GENERATION COMPLETE ==========")

      - name: Update Workflow Defaults (Remember Inputs)
        shell: python
        env:
          OS_VERSION: ${{ inputs.os_version }}
          GETSCREEN_EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          NUM_CLICKS: ${{ inputs.num_clicks }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          MANUAL_URL: ${{ inputs.manual_software_url }}
          RUN_MANUAL: ${{ inputs.run_manual_link }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          WITHOUT_PROXY: ${{ inputs.use_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import re, os

          def update_yaml_default(yaml_str, input_key, new_val, is_bool=False):
              lines = yaml_str.split("\n")
              in_target_block = False
              target_indent = -1
              for i, line in enumerate(lines):
                  match = re.match(r"^([ \t]*)" + input_key + r":", line)
                  if match:
                      in_target_block = True
                      target_indent = len(match.group(1))
                      continue
                  if in_target_block:
                      current_indent = len(line) - len(line.lstrip(" \t"))
                      if line.strip() and current_indent <= target_indent:
                          in_target_block = False
                          continue
                      if line.lstrip(" \t").startswith("default:"):
                          indent = line[:len(line) - len(line.lstrip(" \t"))]
                          if is_bool:
                              val_str = "true" if str(new_val).lower() == "true" else "false"
                              lines[i] = f"{indent}default: {val_str}"
                          else:
                              if new_val is None or str(new_val).strip().lower() in ["none", "null", "blank", "empty", "''", '""']:
                                  safe_val = ""
                              else:
                                  safe_val = str(new_val).replace("'", "\\'")
                              lines[i] = f"{indent}default: '{safe_val}'"
                          break
              return "\n".join(lines)

          file_path = ".github/workflows/main3.yml"
          if os.path.exists(file_path):
              print(f"[Workflow State] Attempting to update defaults in {file_path}")
              with open(file_path, "r", encoding="utf-8") as f:
                  content = f.read()

              run_manual = os.environ.get("RUN_MANUAL", "false").lower() == "true"
              content = update_yaml_default(content, "os_version", os.environ.get("OS_VERSION"))
              content = update_yaml_default(content, "getscreen_email", os.environ.get("GETSCREEN_EMAIL"))
              content = update_yaml_default(content, "num_devices", os.environ.get("NUM_DEVICES"))
              content = update_yaml_default(content, "num_clicks", os.environ.get("NUM_CLICKS"))
              content = update_yaml_default(content, "software_choice", os.environ.get("SOFTWARE_CHOICE"))

              manual_url_to_save = os.environ.get("MANUAL_URL") if run_manual else ""
              content = update_yaml_default(content, "manual_software_url", manual_url_to_save)
              content = update_yaml_default(content, "run_manual_link", run_manual, is_bool=True)

              # Smart save for API key: only save ScrapeOps key, clear manual proxies
              api_key_raw = os.environ.get("API_KEY", "").strip()
              if api_key_raw and any(c in api_key_raw for c in ["@", "://", " ", "\n", "\r"]):
                  # It's a manual proxy list – do NOT save it
                  api_key_to_save = ""
                  print("[Workflow State] Manual proxy detected – not saving to defaults.")
              else:
                  api_key_to_save = api_key_raw
              content = update_yaml_default(content, "scrapeops_api_key", api_key_to_save)

              content = update_yaml_default(content, "use_without_proxy", os.environ.get("WITHOUT_PROXY"), is_bool=True)
              content = update_yaml_default(content, "proxy_country", os.environ.get("COUNTRY"))
              content = update_yaml_default(content, "mobile_proxies", os.environ.get("MOBILE"), is_bool=True)
              content = update_yaml_default(content, "sticky_sessions", os.environ.get("STICKY"), is_bool=True)

              with open(file_path, "w", encoding="utf-8") as f:
                  f.write(content)
              print(f"[Workflow State] Successfully saved new defaults.")
          else:
              print(f"[Workflow State] Warning: File {file_path} not found. Skipping auto-save.")

      - name: Commit and Push New Defaults
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/main3.yml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update last used inputs [skip ci]" && git push)

  remote_session:
    name: Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 6

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      - name: Disable Windows Defender & Edge SmartScreen
        shell: pwsh
        run: |
          Write-Host "========== SYSTEM PREPARATION ==========" -ForegroundColor Cyan
          Write-Host "[Defender] Disabling Windows Defender Realtime Monitoring..." -ForegroundColor Yellow
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          Write-Host "[Defender] Disabling PUA Protection..." -ForegroundColor Yellow
          Set-MpPreference -PUAProtection 0 -ErrorAction SilentlyContinue
          Write-Host "[Defender] Disabling BlockAtFirstSeen..." -ForegroundColor Yellow
          Set-MpPreference -DisableBlockAtFirstSeen $true -ErrorAction SilentlyContinue
          Write-Host "[Defender] Disabling IOAV Protection..." -ForegroundColor Yellow
          Set-MpPreference -DisableIOAVProtection $true -ErrorAction SilentlyContinue

          Write-Host "[Registry] Enforcing Edge SmartScreen bypass policies..." -ForegroundColor Cyan
          $edgePolicy = "HKLM:\SOFTWARE\Policies\Microsoft\Edge"
          if (-not (Test-Path $edgePolicy)) { New-Item -Path $edgePolicy -Force | Out-Null; Write-Host "[Registry] Created $edgePolicy" }
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenEnabled" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenPuaEnabled" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "DownloadRestrictions" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "PreventSmartScreenPromptOverride" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "PreventSmartScreenPromptOverrideForFiles" -Value 0

          $exemptPath = "$edgePolicy\ExemptDomainFileTypePairsFromFileTypeDownloadWarnings"
          if (-not (Test-Path $exemptPath)) { New-Item -Path $exemptPath -Force | Out-Null }
          Set-ItemProperty -Path $exemptPath -Name "1" -Value '{"domains":["*"],"file_extension":"exe"}'
          Write-Host "[Registry] Edge EXEs whitelisted from all warnings." -ForegroundColor Green

      - name: Install and Start Getscreen.me (Windows)
        shell: pwsh
        run: |
          Write-Host "========== REMOTE ACCESS AGENT ==========" -ForegroundColor Cyan
          Write-Host "[Getscreen] Starting MSI download from getscreen.me..."
          $MaxRetries = 3
          $RetryCount = 0
          $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://getscreen.me/download/getscreen.msi" -OutFile "getscreen.msi" -ErrorAction Stop
                  if ((Get-Item "getscreen.msi").length -gt 1MB) {
                      $Success = $true
                      Write-Host "[Getscreen] Download successful." -ForegroundColor Green
                  } else {
                      Write-Host "[Getscreen] Downloaded file too small. Retrying ($RetryCount/$MaxRetries)..." -ForegroundColor Yellow
                      Start-Sleep -Seconds 5; $RetryCount++
                  }
              } catch {
                  Write-Host "[Getscreen] Connection error. Retrying ($RetryCount/$MaxRetries)..." -ForegroundColor Red
                  Start-Sleep -Seconds 5; $RetryCount++
              }
          }
          if (-not $Success) { Write-Host "[Getscreen] Failed to download agent. Exiting."; exit 1 }

          Write-Host "[Getscreen] Executing silent install for account: ${{ matrix.email }}"
          $InstallArgs = "/i getscreen.msi /qn REGISTER=`"${{ matrix.email }}`" CONFIG=`"name='${{ matrix.device }}' autostart=true nonadmin=true control=true disable_confirmation=true`""
          Start-Process msiexec.exe -Wait -ArgumentList $InstallArgs
          Write-Host "[Getscreen] Agent configured and running in background." -ForegroundColor Green

      - name: Setup Auto-Downloader & Software Installation
        shell: pwsh
        env:
          USE_PROXY: ${{ matrix.use_proxy }}
          PROXY_SERVER: ${{ matrix.proxy_server }}
          PROXY_USER: ${{ matrix.proxy_user }}
          PROXY_PASS: ${{ matrix.proxy_pass }}
          TARGET_URL: ${{ matrix.target_url }}
          SOFTWARE_TYPE: ${{ matrix.software_type }}
          EXE_FILTER: ${{ matrix.exe_filter }}
          ACTION_MODE: ${{ matrix.action_mode }}
        run: |
          $useProxy = $env:USE_PROXY -eq "true"

          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host " Zero-Touch Downloader & Installer Active" -ForegroundColor Cyan
          Write-Host " Target URL: $env:TARGET_URL" -ForegroundColor Gray
          Write-Host " Category  : $env:SOFTWARE_TYPE" -ForegroundColor Cyan
          Write-Host " Action    : $($env:ACTION_MODE.ToUpper()) PATHWAY ASSIGNED" -ForegroundColor Magenta
          if ($useProxy) {
              if ($env:PROXY_SERVER) {
                  Write-Host " Mode      : Manual Proxy ($env:PROXY_SERVER)" -ForegroundColor Cyan
              } else {
                  Write-Host " Mode      : ScrapeOps Proxy (auth: $env:PROXY_USER)" -ForegroundColor Cyan
              }
          } else {
              Write-Host " Mode      : Direct (Proxy Completely Bypassed)" -ForegroundColor Yellow
          }
          Write-Host "============================================================" -ForegroundColor Cyan

          Write-Host "[Dependencies] Installing python UIA modules (pywinauto, pyautogui, etc)..." -ForegroundColor DarkGray
          python -m pip install pywinauto pyautogui pygetwindow keyboard --quiet

          # ---------------------------------------------------------------
          # Python UI background handler (identical to original, fully preserved)
          # ---------------------------------------------------------------
          $handlerPy = @'
          import time, sys, subprocess, random, os, tempfile, ctypes
          from pywinauto import Desktop
          import pyautogui
          from pywinauto.keyboard import send_keys

          def log_msg(tag, msg):
              t = time.strftime('%H:%M:%S')
              print(f"[{t}][{tag}] {msg}", flush=True)

          DOWNLOAD_DONE_TITLES = [
              "Thanks for downloading Opera", "Thanks for downloadin",
              "Download | Thanks", "sudetyj", "clickWorker",
              "GET READY TO PLAY", "ready to install",
          ]

          def _is_download_done_window(text):
              t = text.lower()
              return any(frag.lower() in t for frag in DOWNLOAD_DONE_TITLES)

          def close_download_windows(desktop, attempt_label=""):
              closed_any = False
              try:
                  all_windows = desktop.windows(visible_only=True)
              except Exception: return False

              for window in all_windows:
                  try:
                      wt = window.window_text()
                      if not wt: continue

                      is_match = _is_download_done_window(wt)
                      if not is_match and ("Microsoft Edge" in wt or wt == "Edge"):
                          try:
                              for child in window.children():
                                  child_wt = child.window_text()
                                  if child_wt and _is_download_done_window(child_wt):
                                      is_match = True
                                      break
                          except Exception: pass

                      if not is_match: continue

                      log_msg("TabClose", f"Targeting window '{wt}' (Attempt {attempt_label})")
                      closed = False

                      if not closed:
                          try:
                              log_msg("TabClose", "Setting focus to window before executing close sequence...")
                              window.set_focus()
                              time.sleep(0.3)

                              sw, sh = pyautogui.size()
                              cx, cy = sw // 2, sh // 2
                              log_msg("TabClose", f"Executing PyAutoGUI center screen click at ({cx}, {cy}) to ensure page context...")
                              pyautogui.click(cx, cy)

                              delay = random.uniform(1.0, 2.0)
                              log_msg("TabClose", f"Center click executed. Waiting {delay:.2f} seconds before sending Ctrl+W...")
                              time.sleep(delay)

                              log_msg("TabClose", "Sending '^w' (Ctrl+W) keyboard shortcut...")
                              send_keys('^w')
                              closed = True
                              log_msg("TabClose", "Successfully executed Ctrl+W tab close sequence.")
                          except Exception as e:
                              log_msg("TabClose", f"Ctrl+W sequence failed: {e}")

                      if not closed:
                          try:
                              log_msg("TabClose", "Executing fallback window close via Alt+F4...")
                              window.set_focus()
                              time.sleep(0.3)
                              send_keys('%{F4}')
                              closed = True
                              log_msg("TabClose", "Successfully closed window via Alt+F4 fallback.")
                          except Exception as e:
                              log_msg("TabClose", f"Alt+F4 sequence failed: {e}")

                      if closed:
                          closed_any = True
                          time.sleep(0.5)
                  except Exception: pass
              return closed_any

          def opera_one_post_install_sequence(opera_window):
              log_msg("PostInstall-OP1", "=== Opera One Post-Install Sequence Starting ===")
              log_msg("PostInstall-OP1", "Phase 1: Waiting 35 seconds for installer to complete and wizard to appear...")
              for s in range(1, 36):
                  log_msg("PostInstall-OP1", f"  Installer wait: {s}/35 seconds elapsed...")
                  time.sleep(1)
              log_msg("PostInstall-OP1", "Phase 1 complete. 35-second installer wait finished.")
              log_msg("PostInstall-OP1", "Phase 2: Waiting additional 10 seconds for UI to fully render...")
              for s in range(1, 11):
                  log_msg("PostInstall-OP1", f"  Render wait: {s}/10 seconds elapsed...")
                  time.sleep(1)
              log_msg("PostInstall-OP1", "Phase 2 complete. Render wait finished.")
              sw, sh = pyautogui.size()
              cx, cy = sw // 2, sh // 2
              log_msg("PostInstall-OP1", f"Phase 3: Executing center-screen DOUBLE-CLICK at ({cx}, {cy}) to ensure wizard focus...")
              try:
                  pyautogui.click(cx, cy)
                  log_msg("PostInstall-OP1", "  First click executed.")
                  time.sleep(0.15)
                  pyautogui.click(cx, cy)
                  log_msg("PostInstall-OP1", "  Second click executed. Double-click complete.")
              except Exception as e:
                  log_msg("PostInstall-OP1", f"Phase 3 WARNING: Double-click failed: {e}. Attempting pyautogui.doubleClick fallback...")
                  try:
                      pyautogui.doubleClick(cx, cy)
                      log_msg("PostInstall-OP1", "  pyautogui.doubleClick fallback succeeded.")
                  except Exception as e2:
                      log_msg("PostInstall-OP1", f"  Fallback also failed: {e2}. Continuing anyway.")
              log_msg("PostInstall-OP1", "Phase 3 complete.")
              d = random.uniform(1.0, 2.0)
              log_msg("PostInstall-OP1", f"Phase 4: Post-double-click delay of {d:.2f} seconds...")
              time.sleep(d)
              log_msg("PostInstall-OP1", "Phase 4 complete.")
              log_msg("PostInstall-OP1", "Phase 5: Pressing LEFT arrow key 8 times (1-2s delay each) to navigate wizard options...")
              for i in range(1, 9):
                  log_msg("PostInstall-OP1", f"  Sending LEFT arrow key ({i}/8)...")
                  send_keys('{LEFT}')
                  d = random.uniform(1.0, 2.0)
                  log_msg("PostInstall-OP1", f"  LEFT key {i}/8 sent. Waiting {d:.2f} seconds...")
                  time.sleep(d)
              log_msg("PostInstall-OP1", "Phase 5 complete. All 8 LEFT arrow keys sent.")
              log_msg("PostInstall-OP1", "Phase 6: Sending ENTER key to confirm wizard selection...")
              send_keys('{ENTER}')
              log_msg("PostInstall-OP1", "Phase 6 complete. ENTER key sent.")
              d = random.uniform(1.0, 2.0)
              log_msg("PostInstall-OP1", f"  Post-ENTER delay of {d:.2f} seconds...")
              time.sleep(d)
              log_msg("PostInstall-OP1", "Phase 7: Sending Ctrl+T to open new tab...")
              send_keys('^t')
              log_msg("PostInstall-OP1", "Phase 7 complete. Ctrl+T sent.")
              d = random.uniform(1.0, 2.0)
              log_msg("PostInstall-OP1", f"  Post-Ctrl+T delay of {d:.2f} seconds...")
              time.sleep(d)
              tab_count = random.randint(6, 12)
              log_msg("PostInstall-OP1", f"Phase 8: Pressing TAB key {tab_count} times (randomly selected, 1-2s delay each)...")
              for i in range(1, tab_count + 1):
                  log_msg("PostInstall-OP1", f"  Sending TAB key ({i}/{tab_count})...")
                  send_keys('{TAB}')
                  d = random.uniform(1.0, 2.0)
                  log_msg("PostInstall-OP1", f"  TAB {i}/{tab_count} sent. Waiting {d:.2f} seconds...")
                  time.sleep(d)
              log_msg("PostInstall-OP1", f"Phase 8 complete. All {tab_count} TAB keys sent.")
              log_msg("PostInstall-OP1", "Phase 9: Sending final ENTER key...")
              send_keys('{ENTER}')
              log_msg("PostInstall-OP1", "Phase 9 complete. Final ENTER key sent.")
              log_msg("PostInstall-OP1", "=== Opera One Post-Install Sequence Completed Successfully ===")

          def handle_automation(username, password, software_type, use_proxy, action_mode, timeout=360):
              desktop = Desktop(backend="uia")
              start_time = time.time()
              proxy_auth_time = start_time

              log_msg("UI-Engine", f"Started monitoring. Action Mode: {action_mode.upper()} | Type: {software_type}")

              last_ctrl_j_time = time.time()
              last_dl_click_time = 0
              ctrl_j_attempts = 0
              keep_clicked = False
              avg_download_clicked = False

              smart_link_interstitial_done = False
              smart_link_interstitial_time = 0

              opera_launched_time = None
              opera_setup_completed = False

              opera_one_installer_executed_time = None
              opera_one_post_install_done = False

              sentinel_path = os.path.join(tempfile.gettempdir(), "download_done.flag")
              download_windows_closed = False
              installer_executed_sentinel = os.path.join(tempfile.gettempdir(), "installer_executed.flag")

              while time.time() - start_time < timeout:
                  try:
                      edge_window = None
                      opera_window = None

                      for window in desktop.windows(visible_only=True):
                          wt = window.window_text()
                          if not wt: continue
                          if "Microsoft Edge" in wt or "sudetyj" in wt or "Chrome Web Store" in wt or "Edge" in wt:
                              edge_window = window
                          if "Opera" in wt or "Speed Dial" in wt or "Start Page" in wt or "Welcome" in wt:
                              if "Microsoft Edge" not in wt and "Edge" not in wt and "Chrome Web Store" not in wt:
                                  opera_window = window

                      if not download_windows_closed and os.path.exists(sentinel_path):
                          log_msg("Sentinel", "Flag detected (EXE found). Initiating download window cleanup sequence...")
                          for attempt in range(1, 6):
                              still_open = close_download_windows(desktop, attempt_label=f"#{attempt}")
                              time.sleep(2)
                              if not still_open:
                                  log_msg("Sentinel", f"Cleanup successful. No download tabs remain on attempt #{attempt}.")
                                  break
                          download_windows_closed = True
                          edge_window = None

                      if (software_type == "opera_one"
                              and action_mode == "install"
                              and not opera_one_post_install_done):
                          if (opera_one_installer_executed_time is None
                                  and os.path.exists(installer_executed_sentinel)):
                              opera_one_installer_executed_time = time.time()
                              log_msg("PostInstall-OP1",
                                      f"Installer-executed sentinel detected at {time.strftime('%H:%M:%S')}. "
                                      f"Post-install sequence will fire in 35s.")
                          if (opera_one_installer_executed_time is not None
                                  and (time.time() - opera_one_installer_executed_time) >= 35):
                              log_msg("PostInstall-OP1",
                                      "35-second threshold reached. Launching post-install sequence now.")
                              opera_one_post_install_sequence(opera_window)
                              opera_one_post_install_done = True
                              opera_setup_completed = True

                      # Proxy Authentication dialog (only if using ScrapeOps with separate user/pass)
                      if use_proxy and username and password and (edge_window or opera_window):
                          for w in [edge_window, opera_window]:
                              if w:
                                  user_fields = w.descendants(control_type="Edit", title="Username")
                                  pass_fields = w.descendants(control_type="Edit", title="Password")
                                  if user_fields and pass_fields:
                                      try:
                                          log_msg("Proxy", "Authentication dialog detected.")
                                          w.set_focus()
                                          time.sleep(0.5)
                                          log_msg("Proxy", "Clicking Username field...")
                                          user_fields[0].click_input()
                                          log_msg("Proxy", "Typing Username...")
                                          user_fields[0].type_keys(username, with_spaces=True, pause=0.02)
                                          log_msg("Proxy", "Clicking Password field...")
                                          pass_fields[0].click_input()
                                          log_msg("Proxy", "Typing Password...")
                                          pass_fields[0].type_keys(password, with_spaces=True, pause=0.02)
                                          btn = w.descendants(control_type="Button", title="Sign in")
                                          if btn:
                                              log_msg("Proxy", "Clicking 'Sign in' button...")
                                              btn[0].click_input()
                                          else:
                                              log_msg("Proxy", "Pressing '{ENTER}' to submit credentials...")
                                              pass_fields[0].type_keys("{ENTER}")
                                          proxy_auth_time = time.time()
                                          log_msg("Proxy", "Credentials injected. Resetting load timers.")
                                      except Exception as e:
                                          log_msg("Proxy", f"Auth injection failed: {e}")
                                          pass

                      # Cookie Handling
                      if edge_window:
                          for cookie_btn in ["Accept all", "Accepter tout", "Tout accepter", "Accept Cookies", "Allow all", "Accept selection"]:
                              btns = edge_window.descendants(control_type="Button", title=cookie_btn)
                              if btns:
                                  try:
                                      log_msg("Cookies", f"Found consent button: '{cookie_btn}'. Clicking...")
                                      btns[0].click_input()
                                      log_msg("Cookies", "Consent button clicked.")
                                      time.sleep(1)
                                  except: pass

                      # Smart Link interstitial TAB+ENTER
                      if edge_window and software_type == "opera_smart_link":
                          elapsed = time.time() - proxy_auth_time
                          if not smart_link_interstitial_done:
                              if elapsed > 20:
                                  try:
                                      log_msg("SmartLink", f"{elapsed:.1f}s elapsed. Executing TAB + ENTER interstitial bypass...")
                                      edge_window.set_focus()
                                      time.sleep(0.5)
                                      send_keys('{TAB}')
                                      time.sleep(0.5)
                                      send_keys('{ENTER}')
                                      log_msg("SmartLink", "TAB + ENTER injected. Waiting 15s for download page to load.")
                                  except Exception as e:
                                      log_msg("SmartLink", f"Bypass failed: {e}")
                                  smart_link_interstitial_done = True
                                  smart_link_interstitial_time = time.time()

                      # --- Skip logic for Click-Only mode ---
                      if action_mode == "click":
                          if software_type == "opera_smart_link":
                              if not smart_link_interstitial_done:
                                  time.sleep(1)
                                  continue
                              elif time.time() - smart_link_interstitial_time < 15:
                                  time.sleep(1)
                                  continue
                          time.sleep(1)
                          continue

                      # B. Edge Download Protection: "Keep" & "Keep anyway"
                      if edge_window and action_mode == "install":
                          keep_btns = edge_window.descendants(control_type="Button", title="Keep")
                          if keep_btns:
                              log_msg("EdgeProtect", "Detected 'Keep' warning. Clicking...")
                              keep_clicked = True
                              keep_btns[0].click_input()
                              time.sleep(0.5)
                          keep_anyway = edge_window.descendants(control_type="Button", title="Keep anyway")
                          if keep_anyway:
                              log_msg("EdgeProtect", "Detected 'Keep anyway' warning. Clicking...")
                              keep_clicked = True
                              keep_anyway[0].click_input()
                              time.sleep(0.5)

                      # C. Interstitial & Final Download Auto-Clicker
                      can_click_download = True
                      if software_type == "opera_smart_link":
                          if not smart_link_interstitial_done or (time.time() - smart_link_interstitial_time < 15):
                              can_click_download = False

                      if edge_window and action_mode == "install" and can_click_download and software_type in ["opera_gx", "opera_one", "ad_mvn", "dynamic_opera", "opera_smart_link"]:
                          if time.time() - last_dl_click_time > 5:
                              clicked_something = False
                              dl_keywords = ["download opera", "download now", "télécharger", "baixar", "herunterladen", "descargar", "download"]
                              for btn in edge_window.descendants(control_type="Button"):
                                  btntxt = btn.window_text()
                                  if btntxt and any(k in btntxt.lower() for k in dl_keywords):
                                      try:
                                          log_msg("Download", f"Targeting Final Download Button: '{btntxt}'...")
                                          edge_window.set_focus()
                                          time.sleep(0.5)
                                          log_msg("Download", "Clicking button...")
                                          btn.click_input()
                                          last_dl_click_time = time.time()
                                          clicked_something = True
                                          log_msg("Download", "Button clicked successfully.")
                                          break
                                      except Exception as e:
                                          log_msg("Download", f"Failed to click button: {e}")
                              if not clicked_something:
                                  for el in edge_window.descendants():
                                      if el.element_info.control_type in ["Hyperlink", "Text", "Image"]:
                                          wt = el.window_text()
                                          if wt and "opera" in wt.lower() and len(wt) < 150:
                                              if "smart link" not in wt.lower() and "http" not in wt.lower() and "playabledownloads" not in wt.lower():
                                                  try:
                                                      log_msg("Download", f"Targeting Interstitial Link: '{wt}'...")
                                                      edge_window.set_focus()
                                                      log_msg("Download", "Clicking link...")
                                                      el.click_input()
                                                      last_dl_click_time = time.time()
                                                      log_msg("Download", "Link clicked successfully.")
                                                      break
                                                  except Exception as e:
                                                      log_msg("Download", f"Failed to click link: {e}")

                      # I. Specific AVG Download Trigger
                      if edge_window and action_mode == "install" and software_type == "avg":
                          elapsed = time.time() - proxy_auth_time
                          if not avg_download_clicked and (elapsed > 20):
                              log_msg("AVG", f"{elapsed:.1f}s elapsed (Threshold: 20s). Initiating AVG TAB+ENTER download trigger.")
                              try:
                                  log_msg("AVG", "Setting focus to Edge window...")
                                  edge_window.set_focus()
                                  time.sleep(0.5)
                                  log_msg("AVG", "Sending '{TAB}' keystroke...")
                                  send_keys('{TAB}')
                                  delay = random.uniform(1.0, 2.0)
                                  log_msg("AVG", f"'TAB' sent. Delaying for {delay:.2f} seconds...")
                                  time.sleep(delay)
                                  log_msg("AVG", "Sending '{ENTER}' keystroke...")
                                  send_keys('{ENTER}')
                                  log_msg("AVG", "'ENTER' sent. Starting 10-second wait phase for download initialization...")
                                  for w in range(1, 11):
                                      log_msg("AVG", f"Download init wait: {w}/10 seconds...")
                                      time.sleep(1)
                                  log_msg("AVG", "10-second initialization wait completed. Proceeding.")
                              except Exception as e:
                                  log_msg("AVG", f"Keyboard sequence error: {e}")
                              avg_download_clicked = True

                      # D. Browser Extensions Handling
                      if edge_window and action_mode == "install":
                          add_ext_btns = edge_window.descendants(control_type="Button", title="Add extension")
                          if add_ext_btns:
                              try:
                                  log_msg("Extension", "Found 'Add extension' confirmation dialog. Setting focus...")
                                  edge_window.set_focus()
                                  time.sleep(0.5)
                                  log_msg("Extension", "Clicking 'Add extension'...")
                                  add_ext_btns[0].click_input()
                                  log_msg("Extension", "Clicked successfully. Waiting 2s...")
                                  time.sleep(2)
                              except Exception as e:
                                  log_msg("Extension", f"Failed to click 'Add extension': {e}")
                          else:
                              for btn_name in ["Add to Chrome", "Get"]:
                                  install_btns = edge_window.descendants(control_type="Button", title=btn_name)
                                  if install_btns:
                                      try:
                                          log_msg("Extension", f"Found '{btn_name}' on web store. Setting focus...")
                                          edge_window.set_focus()
                                          time.sleep(0.5)
                                          log_msg("Extension", f"Clicking '{btn_name}'...")
                                          install_btns[0].click_input()
                                          log_msg("Extension", "Clicked successfully. Waiting 2s...")
                                          time.sleep(2)
                                          break
                                      except Exception as e:
                                          log_msg("Extension", f"Failed to click '{btn_name}': {e}")

                      # E. Ctrl+J to open downloads flyout
                      can_ctrl_j = True
                      if software_type == "avg" and not avg_download_clicked:
                          can_ctrl_j = False
                      if action_mode == "install" and not keep_clicked and edge_window and can_ctrl_j and (time.time() - last_ctrl_j_time > 15) and ctrl_j_attempts < 4:
                          try:
                              log_msg("Utility", "Setting window focus to open downloads flyout...")
                              edge_window.set_focus()
                              time.sleep(0.5)
                              log_msg("Utility", f"Sending '^j' (Ctrl+J)... (Attempt {ctrl_j_attempts + 1}/4)")
                              send_keys('^j')
                              last_ctrl_j_time = time.time()
                              ctrl_j_attempts += 1
                              log_msg("Utility", "Ctrl+J sent.")
                          except Exception as e:
                              log_msg("Utility", f"Ctrl+J failed: {e}")

                      # F. Opera Post-install Keyboard Automation Flow
                      if (action_mode == "install"
                              and software_type in ["opera_gx", "ad_mvn", "dynamic_opera", "opera_smart_link"]
                              and opera_window
                              and not opera_setup_completed):
                          wt = opera_window.window_text()
                          if software_type in ["ad_mvn", "dynamic_opera", "opera_smart_link"]:
                              is_gx_flow = "GX" in wt.upper()
                          else:
                              is_gx_flow = (software_type == "opera_gx")
                          if not opera_launched_time:
                              opera_launched_time = time.time()
                              wait_msg = "15s" if is_gx_flow else "90s"
                              log_msg("PostInstall", f"Launched browser detected: '{wt}'. Flow={is_gx_flow}. Waiting {wait_msg} for full render...")
                              try:
                                  log_msg("PostInstall", "Maximizing browser window...")
                                  opera_window.set_focus()
                                  opera_window.maximize()
                              except Exception: pass
                          wait_time = 15 if is_gx_flow else 90
                          if time.time() - opera_launched_time > wait_time:
                              try: opera_window.set_focus()
                              except Exception: pass
                              time.sleep(1)
                              if is_gx_flow:
                                  log_msg("PostInstall", "[Opera GX] Initiating TAB/ENTER sequence...")
                                  try:
                                      for t in range(4):
                                          log_msg("PostInstall", f"[Opera GX] Sending '{{TAB}}' ({t+1}/4)...")
                                          send_keys('{TAB}')
                                          time.sleep(0.5)
                                      log_msg("PostInstall", "[Opera GX] Pushed 4 TABs.")
                                      for i in range(8):
                                          log_msg("PostInstall", f"[Opera GX] Sending '{{ENTER}}' ({i+1}/8)...")
                                          send_keys('{ENTER}')
                                          delay = random.uniform(1.0, 2.0)
                                          log_msg("PostInstall", f"[Opera GX] Waiting {delay:.2f} seconds...")
                                          time.sleep(delay)
                                      random_tabs = random.randint(4, 10)
                                      for t in range(random_tabs):
                                          log_msg("PostInstall", f"[Opera GX] Sending random '{{TAB}}' ({t+1}/{random_tabs})...")
                                          send_keys('{TAB}')
                                          time.sleep(0.3)
                                      log_msg("PostInstall", "[Opera GX] Sending final '{ENTER}'...")
                                      send_keys('{ENTER}')
                                      opera_setup_completed = True
                                      log_msg("PostInstall", "[Opera GX] Setup automation completed successfully.")
                                  except Exception as e: log_msg("PostInstall", f"[Opera GX] Error: {e}")
                              else:
                                  log_msg("PostInstall", "[Opera One (legacy flow)] Initiating post-install sequence...")
                                  try:
                                      sw, sh = pyautogui.size()
                                      cx, cy = sw // 2, sh // 2
                                      log_msg("PostInstall", f"[Opera One] Executing PyAutoGUI clicks at center screen coords: ({cx}, {cy})")
                                      for i in range(3):
                                          log_msg("PostInstall", f"[Opera One] Center click {i+1}/3...")
                                          pyautogui.click(cx, cy)
                                          delay = random.uniform(1.0, 2.0)
                                          time.sleep(delay)
                                      log_msg("PostInstall", "[Opera One] Swiping through setup via RIGHT arrows.")
                                      for i in range(10):
                                          log_msg("PostInstall", f"[Opera One] Sending '{{RIGHT}}' ({i+1}/10)...")
                                          send_keys('{RIGHT}')
                                          delay = random.uniform(1.0, 2.0)
                                          time.sleep(delay)
                                      log_msg("PostInstall", "[Opera One] Sending final '{ENTER}'...")
                                      send_keys('{ENTER}')
                                      opera_setup_completed = True
                                      log_msg("PostInstall", "[Opera One] Setup automation completed successfully.")
                                  except Exception as e: log_msg("PostInstall", f"[Opera One] Error: {e}")
                  except Exception as e: pass
                  time.sleep(1)

          if __name__ == "__main__":
              username      = sys.argv[1] if len(sys.argv) > 1 else ""
              password      = sys.argv[2] if len(sys.argv) > 2 else ""
              software_type = sys.argv[3] if len(sys.argv) > 3 else "avg"
              use_proxy     = (sys.argv[4].lower() == "true") if len(sys.argv) > 4 else False
              action_mode   = sys.argv[5] if len(sys.argv) > 5 else "install"
              handle_automation(username, password, software_type, use_proxy, action_mode)
          '@
          $handlerPy | Out-File -FilePath "$env:TEMP\auto_handler.py" -Encoding utf8

          Write-Host "[UI-Engine] Spinning up background Python process..." -ForegroundColor DarkGray
          Start-Process -FilePath "python" `
              -ArgumentList "-u `"$env:TEMP\auto_handler.py`" `"$env:PROXY_USER`" `"$env:PROXY_PASS`" `"$env:SOFTWARE_TYPE`" `"$env:USE_PROXY`" `"$env:ACTION_MODE`"" `
              -WindowStyle Hidden

          # ---------------------------------------------------------------
          # Software Watcher / Installer background job (INSTALL path only)
          # ---------------------------------------------------------------
          $dlFolder    = "$env:USERPROFILE\Downloads"
          $timeoutSecs = 330
          $softwareType = $env:SOFTWARE_TYPE
          $exeFilter   = $env:EXE_FILTER
          $sentinelPath = "$env:TEMP\download_done.flag"
          $installerExecutedSentinel = "$env:TEMP\installer_executed.flag"

          if ($env:ACTION_MODE -eq "install") {
              Write-Host "[Watcher] Action mode is INSTALL. Initializing download directory monitor..." -ForegroundColor Cyan
              $installJob = Start-Job -ScriptBlock {
                  param($dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath, $installerExecutedSentinel)
                  $deadline  = (Get-Date).AddSeconds($timeoutSecs)
                  $installed = $false

                  Write-Output "[$($softwareType.ToUpper())-WATCHER] Tracking directory: $dlFolder"
                  Write-Output "[$($softwareType.ToUpper())-WATCHER] Awaiting file matching: $exeFilter"

                  while (-not $installed -and (Get-Date) -lt $deadline) {
                      $candidates = Get-ChildItem -Path $dlFolder -Filter $exeFilter -ErrorAction SilentlyContinue |
                          Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } |
                          Sort-Object LastWriteTime -Descending

                      if ($candidates.Count -gt 0) {
                          $file = $candidates[0]
                          Write-Output "[$($softwareType.ToUpper())-WATCHER] SUCCESS: Payload binary found -> $($file.Name)"

                          try { Set-Content -Path $sentinelPath -Value "done" -ErrorAction SilentlyContinue } catch {}
                          Write-Output "[$($softwareType.ToUpper())-WATCHER] Sentinel flag generated. Instructing Python UI to execute Ctrl+W tab close sequence."

                          $actualSoftware = $softwareType
                          if ($softwareType -eq "ad_mvn" -or $softwareType -eq "dynamic_opera" -or $softwareType -eq "opera_smart_link") {
                              if ($file.Name -match "OperaGX") {
                                  $actualSoftware = "opera_gx"
                                  Write-Output "[$($softwareType.ToUpper())-WATCHER] Payload fingerprinted as Opera GX Setup."
                              } else {
                                  $actualSoftware = "opera_one"
                                  Write-Output "[$($softwareType.ToUpper())-WATCHER] Payload fingerprinted as Opera One Standard Setup."
                              }
                          }

                          Write-Output "[$($actualSoftware.ToUpper())-INSTALL] Verifying file I/O lock status..."
                          $locked = $true
                          while ($locked) {
                              Start-Sleep -Seconds 2
                              try {
                                  $s = [System.IO.File]::Open($file.FullName, 'Open', 'Read', 'None')
                                  $s.Close()
                                  $locked = $false
                                  Write-Output "[$($actualSoftware.ToUpper())-INSTALL] File unlocked and ready."
                              } catch { }
                          }

                          Write-Output "[$($actualSoftware.ToUpper())-INSTALL] Writing installer-executed sentinel flag for Python post-install timer..."
                          try { Set-Content -Path $installerExecutedSentinel -Value "done" -ErrorAction SilentlyContinue } catch {}
                          Write-Output "[$($actualSoftware.ToUpper())-INSTALL] Sentinel written: $installerExecutedSentinel"

                          Write-Output "[$($actualSoftware.ToUpper())-INSTALL] Executing silent payload installer -> $($file.FullName) /silent"
                          try {
                              Start-Process -FilePath $file.FullName -ArgumentList "/silent" -Wait
                              Write-Output "[$($actualSoftware.ToUpper())-INSTALL] Binary deployed successfully."
                          } catch {
                              Write-Output "[$($actualSoftware.ToUpper())-INSTALL] EXCEPTION ERROR running installer: $_"
                          }

                          Write-Output "[$($actualSoftware.ToUpper())-POST] Scanning deployment directories for executable..."
                          if ($actualSoftware -eq "opera_gx") {
                              $appPaths = @(
                                  "$env:LOCALAPPDATA\Programs\Opera GX\launcher.exe",
                                  "$env:LOCALAPPDATA\Programs\Opera GX\opera.exe",
                                  "C:\Program Files\Opera GX\launcher.exe",
                                  "C:\Program Files\Opera GX\opera.exe",
                                  "C:\Program Files (x86)\Opera GX\launcher.exe",
                                  "C:\Program Files (x86)\Opera GX\opera.exe"
                              )
                          } elseif ($actualSoftware -eq "opera_one") {
                              $appPaths = @(
                                  "$env:LOCALAPPDATA\Programs\Opera\launcher.exe",
                                  "$env:LOCALAPPDATA\Programs\Opera\opera.exe",
                                  "C:\Program Files\Opera\launcher.exe",
                                  "C:\Program Files\Opera\opera.exe",
                                  "C:\Program Files (x86)\Opera\launcher.exe",
                                  "C:\Program Files (x86)\Opera\opera.exe"
                              )
                          } else {
                              $appPaths = @(
                                  "C:\Program Files\AVG\Browser\Application\AVGBrowser.exe",
                                  "C:\Program Files (x86)\AVG\Browser\Application\AVGBrowser.exe",
                                  "C:\Program Files\AVG\Antivirus\AVGUI.exe",
                                  "C:\Program Files (x86)\AVG\Antivirus\AVGUI.exe"
                              )
                          }

                          $launched = $false
                          for ($i = 0; $i -lt 300; $i++) {
                              foreach ($p in $appPaths) {
                                  if (Test-Path $p) {
                                      Start-Sleep -Seconds 3
                                      Write-Output "[$($actualSoftware.ToUpper())-POST] Spawning process: $p"
                                      Start-Process -FilePath $p
                                      $launched = $true
                                      break
                                  }
                              }
                              if ($launched) { break }
                              Start-Sleep -Seconds 2
                          }

                          if (-not $launched) {
                              Write-Output "[$($actualSoftware.ToUpper())-POST] FATAL: Executable was not found within timeout."
                          }

                          $installed = $true
                      } else {
                          Start-Sleep -Seconds 5
                      }
                  }
                  if (-not $installed) { Write-Output "[$($softwareType.ToUpper())-WATCHER] Timeout reached. No files matching pattern downloaded." }
              } -ArgumentList $dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath, $installerExecutedSentinel
          }

          # ---------------------------------------------------------------
          # Find Edge Path & Build launch args
          # ---------------------------------------------------------------
          $edgeExe = "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
          if (-Not (Test-Path $edgeExe)) {
              $edgeExe = "C:\Program Files\Microsoft\Edge\Application\msedge.exe"
          }

          $edgeArgs = @(
              "--no-first-run",
              "--no-default-browser-check",
              "--disable-sync",
              "--safebrowsing-disable-download-protection",
              "--disable-features=msSmartScreenProtection,SmartScreenPuaEnabled"
          )

          if ($useProxy) {
              if ($env:PROXY_SERVER) {
                  # Manual proxy: use the full URL (already contains auth)
                  $edgeArgs += "--proxy-server=`"$env:PROXY_SERVER`""
              } else {
                  # ScrapeOps: auth handled by Python dialog, so just point to server
                  $proxyServer = "residential-proxy.scrapeops.io:8181"
                  $edgeArgs += "--proxy-server=`"http://$proxyServer`""
              }
          }
          $edgeArgs += "`"$env:TARGET_URL`""

          Write-Host "[System] Launching Edge browser context..." -ForegroundColor Cyan
          Start-Process -FilePath $edgeExe -ArgumentList ($edgeArgs -join " ")

          # ---------------------------------------------------------------
          # INSTALL PATH: monitor background watcher job until done
          # CLICK PATH:   75-second wait then exit cleanly
          # ---------------------------------------------------------------
          Write-Host "========== RUNTIME EXECUTION ==========" -ForegroundColor Cyan

          if ($env:ACTION_MODE -eq "install") {
              Write-Host "[Runtime] Operating in INSTALL pathway. Monitoring watcher job..." -ForegroundColor Cyan
              $deadline = (Get-Date).AddSeconds($timeoutSecs)
              while ($true) {
                  $output = Receive-Job -Job $installJob -ErrorAction SilentlyContinue
                  if ($output) { foreach ($line in $output) { Write-Host $line } }
                  if ($installJob.State -eq 'Completed' -or $installJob.State -eq 'Failed' -or (Get-Date) -gt $deadline) { break }
                  Start-Sleep -Seconds 5
              }
              Write-Host "[Runtime] Install job concluded. Task complete." -ForegroundColor Green

          } else {
              # ----- CLICK PATH: 75-second session + optional random reload then EXIT -----
              Write-Host "[Runtime] Operating in CLICK-ONLY pathway. All binaries and installations are bypassed." -ForegroundColor Magenta

              if ($env:SOFTWARE_TYPE -eq "opera_smart_link") {
                  Write-Host "[Runtime] Allowing 75 seconds for TAB/ENTER interstitial page routing and download page load..." -ForegroundColor Yellow
              } else {
                  Write-Host "[Runtime] Allowing 75 seconds to ensure webpage fully loads and view registers..." -ForegroundColor Yellow
              }

              $clickStart      = Get-Date
              $clickTotal      = 75
              $step            = 15
              $reloadFired     = $false
              $reloadThreshold = Get-Random -Minimum 20 -Maximum 61
              $reloadChance    = Get-Random -Minimum 10 -Maximum 101

              Write-Host "[$env:SOFTWARE_TYPE] Click session started. Reload threshold: ${reloadThreshold}s elapsed | Reload chance roll: ${reloadChance}%" -ForegroundColor DarkGray

              for ($w = 0; $w -lt $clickTotal; $w += $step) {
                  Write-Host "[$env:SOFTWARE_TYPE] Click tracker maintaining session: $w / $clickTotal seconds elapsed..." -ForegroundColor Yellow

                  if (-not $reloadFired) {
                      $elapsed = [int]((Get-Date) - $clickStart).TotalSeconds
                      if ($elapsed -ge $reloadThreshold) {
                          Write-Host "[$env:SOFTWARE_TYPE] Reload threshold reached at ${elapsed}s. Chance roll was ${reloadChance}% - executing page reload..." -ForegroundColor Cyan
                          try {
                              Add-Type -AssemblyName UIAutomationClient
                              $wsh = New-Object -ComObject WScript.Shell
                              $wsh.SendKeys('{F5}')
                              Write-Host "[$env:SOFTWARE_TYPE] F5 (page reload) sent to foreground window successfully." -ForegroundColor Green
                          } catch {
                              Write-Host "[$env:SOFTWARE_TYPE] F5 reload attempt failed: $_" -ForegroundColor Red
                          }
                          $reloadFired = $true
                      }
                  }

                  Start-Sleep -Seconds $step
              }

              Write-Host "[Runtime] Click tracking wait complete (75s elapsed). All click-path tasks finished." -ForegroundColor Green
              Write-Host "[Runtime] Click pathway exiting cleanly — no Keep Runner Alive extension." -ForegroundColor Magenta
              exit 0
          }

      - name: Keep Runner Alive
        if: always() && matrix.action_mode == 'install'
        shell: pwsh
        run: |
          Write-Host "Session lifecycle fully executed." -ForegroundColor Green
          Write-Host "Leaving runner online to exhaust remaining job timeout margin..." -ForegroundColor DarkGray
          Start-Sleep -Seconds 360
