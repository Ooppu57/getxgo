name: Parallel Windows Auto-Installer

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Select OS Runner Version'
        required: true
        type: choice
        options:
          - 'windows-2025'
          - 'windows-2022'
          - 'windows-11-arm'
        default: 'windows-2025'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'techx@justzeus.com'
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '5'
      num_clicks:
        description: 'Number of Clicks (remaining devices will install)'
        required: true
        type: choice
        options:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '3'
      software_choice:
        description: 'Select Software & Link'
        required: true
        type: choice
        options:
          - 'AVG - TechxTrader'
          - 'AVG - B4Books'
          - 'AVG - F.Ahmad'
          - 'OperaGX - B4Books'
          - 'Opera - Techx'
          - 'Opera - Fatradez'
          - 'Opera - James'
          - 'Opera - Oliver'
          - 'Opera - Mahal'
          - 'Opera-One - Esmeel'
          - 'Opera-One - Harrari'
          - 'Opera-One - Chloe'
          - 'Opera-One - Daisy'
          - 'Opera-One - Jimmy'
          - 'Ad-MVN - Techx'
          - 'Ad-MVN - B4Books'
          - 'Ad-MVN - Orderflowz'
          - 'Ad-MVN - A2Z'
        default: 'OperaGX - B4Books'
      manual_software_url:
        description: 'Manual Software URL'
        required: false
        type: string
        default: ''
      run_manual_link:
        description: 'Run manual link'
        required: true
        type: boolean
        default: false
      scrapeops_api_key:
        description: 'ScrapeOps API Key (or paste manual proxies)'
        required: false
        type: string
        default: ''
      use_without_proxy:
        description: 'Run without proxy'
        required: true
        type: boolean
        default: false
      proxy_country:
        description: 'Proxy Country Geotargeting (ScrapeOps only)'
        required: true
        type: choice
        options:
          - 'USA'
          - 'UK'
          - 'Canada'
          - 'Australia'
          - 'Germany'
          - 'France'
          - 'Brazil'
          - 'Mexico'
          - 'Spain'
          - 'Vietnam'
          - 'Switzerland'
          - 'Indonesia'
          - 'Italy'
          - 'Netherlands'
          - 'Poland'
        default: 'USA'
      mobile_proxies:
        description: 'Use Mobile Proxies (ScrapeOps only)'
        required: true
        type: boolean
        default: false
      sticky_sessions:
        description: 'Enable Unique Sticky Sessions (ScrapeOps only)'
        required: true
        type: boolean
        default: true

env:
  # Opt into node 24 early to suppress checkout Node 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Generate Dynamic Matrix & Proxy Config
        id: set-matrix
        shell: python
        env:
          NUM_DEVICES: ${{ inputs.num_devices }}
          NUM_CLICKS: ${{ inputs.num_clicks }}
          OS_VERSION: ${{ inputs.os_version }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          MANUAL_URL: ${{ inputs.manual_software_url }}
          RUN_MANUAL: ${{ inputs.run_manual_link }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          WITHOUT_PROXY: ${{ inputs.use_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import os, json, uuid, random, re, sys, subprocess
          from urllib.parse import urlparse

          subprocess.check_call([sys.executable, "-m", "pip", "install", "requests", "pysocks", "--quiet"])
          import requests

          print("========== INITIALIZING MATRIX GENERATION ==========")

          num_devices = int(os.environ.get("NUM_DEVICES", "1"))
          os_version = os.environ.get("OS_VERSION", "windows-2025")

          api_key = os.environ.get("API_KEY", "").strip()
          without_proxy = os.environ.get("WITHOUT_PROXY", "false").lower() == "true"

          if without_proxy:
              print("[Proxy] 'Run without proxy' checked. Disabling proxy.")
              api_key = ""
          elif not api_key or api_key.lower() in["none", "null", "false", "blank", "empty", "''", '""']:
              print("[Proxy] API key empty or invalid. Disabling proxy.")
              api_key = ""

          country_input = os.environ.get("COUNTRY", "USA")
          mobile = os.environ.get("MOBILE", "false").lower() == "true"
          sticky = os.environ.get("STICKY", "false").lower() == "true"
          software_choice = os.environ.get("SOFTWARE_CHOICE", "AVG - B4Books")

          num_clicks_raw = int(os.environ.get("NUM_CLICKS", "0"))
          num_clicks = min(num_clicks_raw, num_devices)
          num_installs = num_devices - num_clicks
          action_list =["install"] * num_installs + ["click"] * num_clicks
          random.shuffle(action_list)

          run_manual = os.environ.get("RUN_MANUAL", "false").lower() == "true"
          manual_url_input = os.environ.get("MANUAL_URL", "").strip()
          manual_url = manual_url_input if run_manual else ""

          country_map = {
              "USA": "us", "UK": "uk", "Canada": "ca",
              "Australia": "au", "Germany": "de", "France": "fr",
              "Brazil": "br", "Mexico": "mx", "Spain": "es",
              "Vietnam": "vn", "Switzerland": "ch", "Indonesia": "id",
              "Italy": "it", "Netherlands": "nl", "Poland": "pl"
          }
          cc = country_map.get(country_input, "us")

          avg_urls = {
              "AVG - TechxTrader": "https://u.to/a-trdr/GoeNIg",
              "AVG - B4Books":     "https://u.to/a-b4b/O4eNIg",
              "AVG - F.Ahmad":     "https://u.to/a-fahmad/ooeNIg",
          }
          opera_urls = {
              "OperaGX - B4Books":  "https://u.to/opx-b4b/2nh4Ig",
              "Opera - Techx":      "https://u.to/techxsm/xVyFIg",
              "Opera - Fatradez":   "https://u.to/fatradezsm/cF2FIg",
              "Opera - James":      "https://u.to/jamesxsm/eV2FIg",
              "Opera - Oliver":     "https://u.to/oliverxsm/f12FIg",
              "Opera - Mahal":      "https://u.to/mahalxsm/iF2FIg",
          }
          opera_one_urls = {
              "Opera-One - Esmeel":  "https://u.to/esmlxopo/cTOGIg",
              "Opera-One - Harrari": "https://u.to/hararixopo/zTOGIg",
              "Opera-One - Chloe":   "https://u.to/chloexopo/_DOGIg",
              "Opera-One - Daisy":   "https://u.to/daisyxopo/LjSGIg",
              "Opera-One - Jimmy":   "https://u.to/jmy/mUZ4Ig",
          }
          ad_mvn_urls = {
              "Ad-MVN - Techx":      "https://u.to/techxadmvnxsmrt/gvd7Ig",
              "Ad-MVN - B4Books":    "https://u.to/b4bxadmvnxsmrt/5-h7Ig",
              "Ad-MVN - Orderflowz": "https://u.to/ordrflzadmvnxsmrt/-fZ7Ig",
              "Ad-MVN - A2Z":        "https://u.to/a2zadmvnxsmrt/Y-t7Ig",
          }
          all_urls = {**avg_urls, **opera_urls, **opera_one_urls, **ad_mvn_urls}
          dynamic_links =["Opera - Techx", "Opera - Fatradez", "Opera - James", "Opera - Oliver", "Opera - Mahal"]

          if manual_url:
              target_url = manual_url
              software_type = "dynamic_opera"
              exe_filter = "*.exe"
          else:
              target_url = all_urls.get(software_choice, avg_urls.get("AVG - B4Books", "https://u.to/a-b4b/O4eNIg"))
              if software_choice in dynamic_links:
                  software_type = "opera_smart_link"
                  exe_filter = "*Opera*Setup*.exe"
              elif software_choice.startswith("Ad-MVN"):
                  software_type = "dynamic_opera"
                  exe_filter = "*Opera*Setup*.exe"
              elif software_choice.startswith("OperaGX"):
                  software_type = "opera_gx"
                  exe_filter = "OperaGXSetup*.exe"
              elif software_choice.startswith("Opera-One"):
                  software_type = "opera_one"
                  exe_filter = "OperaSetup*.exe"
              else:
                  software_type = "avg"
                  exe_filter = "*avg*.exe"

          use_proxy = False
          proxy_type = "none"
          manual_proxies_list =[]

          if api_key:
              if "://" in api_key:
                  proxy_type = "manual"
              else:
                  proxy_type = "scrapeops"

          if proxy_type == "scrapeops" and api_key:
              use_proxy = True
              device_country = cc.upper()

          elif proxy_type == "manual":
              scheme_re = r'(https?|socks5|socks4|geolocation)://'
              matches = list(re.finditer(scheme_re, api_key))
              if not matches:
                  api_key = ""
              else:
                  raw_proxies =[]
                  for i, m in enumerate(matches):
                      start = m.start()
                      end = matches[i+1].start() if i+1 < len(matches) else len(api_key)
                      raw_proxies.append(api_key[start:end].strip())

                  country_name_map = {
                      "united states": "US", "usa": "US", "us": "US",
                      "united kingdom": "UK", "uk": "UK", "great britain": "UK",
                      "canada": "CA", "australia": "AU", "germany": "DE",
                      "france": "FR", "brazil": "BR", "mexico": "MX",
                      "spain": "ES", "vietnam": "VN", "switzerland": "CH",
                      "indonesia": "ID", "italy": "IT", "netherlands": "NL",
                      "poland": "PL"
                  }
                  def extract_country_from_extra(extra_str):
                      extra_str = extra_str.strip().lower()
                      extra_str = re.sub(r'\s*-\s*\d+$', '', extra_str)
                      if extra_str in country_name_map: return country_name_map[extra_str]
                      for name, code in country_name_map.items():
                          if name in extra_str: return code
                      return ""

                  def test_proxy_http(proxy_url, timeout=8):
                      try:
                          r = requests.get("http://httpbin.org/ip", proxies={"http": proxy_url, "https": proxy_url}, timeout=timeout)
                          return r.status_code == 200
                      except: return False

                  def test_proxy_socks5(proxy_url, timeout=8):
                      try:
                          parsed = urlparse(proxy_url)
                          if parsed.scheme not in ("socks5", "socks5h"):
                              loc = parsed.hostname
                              port = parsed.port or 1080
                              auth = f"{parsed.username}:{parsed.password}@" if parsed.username else ""
                              socks_url = f"socks5://{auth}{loc}:{port}"
                          else: socks_url = proxy_url
                          r = requests.get("http://httpbin.org/ip", proxies={"http": socks_url, "https": socks_url}, timeout=timeout)
                          return r.status_code == 200
                      except: return False

                  def get_country_via_proxy(proxy_url):
                      try:
                          r = requests.get("http://ip-api.com/json/?fields=countryCode", proxies={"http": proxy_url}, timeout=8)
                          if r.status_code == 200: return r.json().get("countryCode", "").upper()
                      except: pass
                      return ""

                  active_proxies =[]
                  for idx, raw in enumerate(raw_proxies, 1):
                      parsed = urlparse(raw)
                      scheme = parsed.scheme
                      host = parsed.hostname
                      port = parsed.port
                      username = parsed.username
                      password = parsed.password
                      extra = ""
                      if scheme == "geolocation":
                          after_at = raw.split("@", 1)[1] if "@" in raw else raw.split("://", 1)[1]
                          parts = after_at.split(":", 2)
                          if len(parts) >= 3:
                              host, port, extra = parts[0], int(parts[1]), parts[2]
                          else:
                              host, port, extra = parts[0], (int(parts[1]) if len(parts)>1 else 8080), ""
                          clean_proxy = f"http://{username}:{password}@{host}:{port}"
                      else:
                          if not host:
                              if "://" in raw:
                                  raw_no_scheme = raw.split("://", 1)[1]
                                  if "@" in raw_no_scheme:
                                      userpass, hostport = raw_no_scheme.split("@", 1)
                                      host_port_parts = hostport.split(":")
                                      host, port = host_port_parts[0], (int(host_port_parts[1]) if len(host_port_parts)>1 else 8080)
                                      username, password = userpass.split(":", 1)
                                  else:
                                      host_port_parts = raw_no_scheme.split(":")
                                      host, port = host_port_parts[0], (int(host_port_parts[1]) if len(host_port_parts)>1 else 8080)
                              else:
                                  host_port = raw.split(":")
                                  host, port = host_port[0], (int(host_port[1]) if len(host_port)>1 else 8080)
                          if not port: port = 8080
                          if username and password: clean_proxy = f"{scheme}://{username}:{password}@{host}:{port}"
                          else: clean_proxy = f"{scheme}://{host}:{port}"

                      http_ok = test_proxy_http(clean_proxy)
                      socks_ok = test_proxy_socks5(clean_proxy)
                      
                      if http_ok or socks_ok:
                          country = ""
                          if scheme == "geolocation" and extra: country = extract_country_from_extra(extra)
                          if not country: country = get_country_via_proxy(clean_proxy)
                          if not country: country = cc.upper()

                          if http_ok: final_url = clean_proxy
                          else:
                              parsed_clean = urlparse(clean_proxy)
                              if parsed_clean.username: final_url = f"socks5://{parsed_clean.username}:{parsed_clean.password}@{parsed_clean.hostname}:{parsed_clean.port}"
                              else: final_url = f"socks5://{parsed_clean.hostname}:{parsed_clean.port}"

                          active_proxies.append({"url": final_url, "country": country})

                  if active_proxies:
                      use_proxy = True
                      manual_proxies_list = active_proxies
                  else:
                      use_proxy = False

          def short_os(os_ver):
              if os_ver == "windows-2025": return "W25"
              elif os_ver == "windows-2022": return "W22"
              elif os_ver == "windows-11-arm": return "W11A"
              else: return "W" + os_ver.replace("windows-", "").replace("-", "")

          def short_software(choice):
              prefix_map = {"OperaGX": "OPX", "Opera-One": "OPO", "Ad-MVN": "MVN", "AVG": "AVG", "Opera": "OP"}
              for key, prefix in prefix_map.items():
                  if choice.startswith(key):
                      parts = choice.split(" - ", 1)
                      list_name = parts[1].replace(" ", "") if len(parts) > 1 else ""
                      return f"{prefix}-{list_name}"
              return choice.replace(" ", "").replace("-", "")

          short_os_tag = short_os(os_version)
          short_sw_tag = "MANUAL" if manual_url else short_software(software_choice)

          # MATRIX GENERATION: Splitting safe metadata from sensitive parameters
          safe_includes =[]
          full_data = {}

          if use_proxy and proxy_type == "scrapeops":
              for i in range(1, num_devices + 1):
                  action_mode = action_list[i - 1]
                  device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_mode.capitalize()}-{cc.upper()}"
                  proxy_user = f"scrapeops.country={cc}"
                  if mobile: proxy_user += ".mobile=true"
                  if sticky:
                      session_id = str(uuid.uuid4())[:8]
                      proxy_user += f".sticky_session={session_id}"
                  
                  safe_includes.append({
                      "index": i,
                      "os": os_version,
                      "device": device_name,
                      "action_mode": action_mode
                  })
                  full_data[str(i)] = {
                      "use_proxy": "true",
                      "proxy_server": "",
                      "proxy_user": proxy_user,
                      "proxy_pass": api_key,
                      "target_url": target_url,
                      "software_type": software_type,
                      "exe_filter": exe_filter,
                      "action_mode": action_mode,
                      "country_code": cc.upper()
                  }

          elif use_proxy and proxy_type == "manual":
              proxy_pool = manual_proxies_list
              if len(proxy_pool) < num_devices:
                  proxy_cycle = [proxy_pool[i % len(proxy_pool)] for i in range(num_devices)]
              else:
                  random.shuffle(proxy_pool)
                  proxy_cycle = proxy_pool[:num_devices]

              for i in range(1, num_devices + 1):
                  proxy = proxy_cycle[i-1]
                  action_mode = action_list[i - 1]
                  device_country = proxy["country"]
                  device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_mode.capitalize()}-{device_country}"
                  
                  safe_includes.append({
                      "index": i,
                      "os": os_version,
                      "device": device_name,
                      "action_mode": action_mode
                  })
                  full_data[str(i)] = {
                      "use_proxy": "true",
                      "proxy_server": proxy["url"],
                      "proxy_user": "",
                      "proxy_pass": "",
                      "target_url": target_url,
                      "software_type": software_type,
                      "exe_filter": exe_filter,
                      "action_mode": action_mode,
                      "country_code": device_country
                  }

          else:
              for i in range(1, num_devices + 1):
                  action_mode = action_list[i - 1]
                  device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_mode.capitalize()}-NOPROXY"
                  
                  safe_includes.append({
                      "index": i,
                      "os": os_version,
                      "device": device_name,
                      "action_mode": action_mode
                  })
                  full_data[str(i)] = {
                      "use_proxy": "false",
                      "proxy_server": "",
                      "proxy_user": "",
                      "proxy_pass": "",
                      "target_url": target_url,
                      "software_type": software_type,
                      "exe_filter": exe_filter,
                      "action_mode": action_mode,
                      "country_code": "NOPROXY"
                  }

          if not safe_includes:
              print("Error: Valid configuration could not be generated. Exiting.")
              exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': safe_includes})}\n")
          
          # Write full sensitive mapping to securely passed Artifact
          with open("full_data.json", "w", encoding="utf-8") as f:
              json.dump(full_data, f, ensure_ascii=False)

      - name: Upload Secure Job Data Artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrix-data
          path: full_data.json
          retention-days: 1
          include-hidden-files: true

      - name: Update Workflow Defaults (Remember Inputs)
        shell: python
        env:
          OS_VERSION: ${{ inputs.os_version }}
          GETSCREEN_EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          NUM_CLICKS: ${{ inputs.num_clicks }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          MANUAL_URL: ${{ inputs.manual_software_url }}
          RUN_MANUAL: ${{ inputs.run_manual_link }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          WITHOUT_PROXY: ${{ inputs.use_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import re, os

          def update_yaml_default(yaml_str, input_key, new_val, is_bool=False):
              lines = yaml_str.split("\n")
              in_target_block = False
              target_indent = -1
              for i, line in enumerate(lines):
                  match = re.match(r"^([ \t]*)" + input_key + r":", line)
                  if match:
                      in_target_block = True
                      target_indent = len(match.group(1))
                      continue
                  if in_target_block:
                      current_indent = len(line) - len(line.lstrip(" \t"))
                      if line.strip() and current_indent <= target_indent:
                          in_target_block = False
                          continue
                      if line.lstrip(" \t").startswith("default:"):
                          indent = line[:len(line) - len(line.lstrip(" \t"))]
                          if is_bool:
                              val_str = "true" if str(new_val).lower() == "true" else "false"
                              lines[i] = f"{indent}default: {val_str}"
                          else:
                              if new_val is None or str(new_val).strip().lower() in["none", "null", "blank", "empty", "''", '""']: safe_val = ""
                              else: safe_val = str(new_val).replace("'", "\\'")
                              lines[i] = f"{indent}default: '{safe_val}'"
                          break
              return "\n".join(lines)

          file_path = ".github/workflows/main3.yml"
          if os.path.exists(file_path):
              with open(file_path, "r", encoding="utf-8") as f:
                  content = f.read()

              run_manual = os.environ.get("RUN_MANUAL", "false").lower() == "true"
              api_raw = os.environ.get("API_KEY", "")
              is_manual_proxy = False
              if api_raw and "://" in api_raw:
                  is_manual_proxy = True

              content = update_yaml_default(content, "os_version", os.environ.get("OS_VERSION"))
              content = update_yaml_default(content, "getscreen_email", os.environ.get("GETSCREEN_EMAIL"))
              content = update_yaml_default(content, "num_devices", os.environ.get("NUM_DEVICES"))
              content = update_yaml_default(content, "num_clicks", os.environ.get("NUM_CLICKS"))
              content = update_yaml_default(content, "software_choice", os.environ.get("SOFTWARE_CHOICE"))

              manual_url_to_save = os.environ.get("MANUAL_URL") if run_manual else ""
              content = update_yaml_default(content, "manual_software_url", manual_url_to_save)
              content = update_yaml_default(content, "run_manual_link", run_manual, is_bool=True)

              if is_manual_proxy:
                  content = update_yaml_default(content, "scrapeops_api_key", "")
              else:
                  content = update_yaml_default(content, "scrapeops_api_key", api_raw)

              content = update_yaml_default(content, "use_without_proxy", os.environ.get("WITHOUT_PROXY"), is_bool=True)
              content = update_yaml_default(content, "proxy_country", os.environ.get("COUNTRY"))
              content = update_yaml_default(content, "mobile_proxies", os.environ.get("MOBILE"), is_bool=True)
              content = update_yaml_default(content, "sticky_sessions", os.environ.get("STICKY"), is_bool=True)

              with open(file_path, "w", encoding="utf-8") as f:
                  f.write(content)
          else: pass

      - name: Commit and Push New Defaults
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/main3.yml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update last used inputs [skip ci]" && git push)

  # ============================
  # Remote session jobs
  # ============================
  remote_session:
    name: Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 6

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      - name: Disable Windows Defender & Edge SmartScreen
        shell: pwsh
        run: |
          Write-Host "========== SYSTEM PREPARATION ==========" -ForegroundColor Cyan
          Write-Host "[Defender] Disabling Windows Defender Realtime Monitoring..." -ForegroundColor Yellow
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          Set-MpPreference -PUAProtection 0 -ErrorAction SilentlyContinue
          Set-MpPreference -DisableBlockAtFirstSeen $true -ErrorAction SilentlyContinue
          Set-MpPreference -DisableIOAVProtection $true -ErrorAction SilentlyContinue

          Write-Host "[Registry] Enforcing Edge SmartScreen bypass policies..." -ForegroundColor Cyan
          $edgePolicy = "HKLM:\SOFTWARE\Policies\Microsoft\Edge"
          if (-not (Test-Path $edgePolicy)) { New-Item -Path $edgePolicy -Force | Out-Null; Write-Host "[Registry] Created $edgePolicy" }
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenEnabled" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenPuaEnabled" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "DownloadRestrictions" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "PreventSmartScreenPromptOverride" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "PreventSmartScreenPromptOverrideForFiles" -Value 0

          $exemptPath = "$edgePolicy\ExemptDomainFileTypePairsFromFileTypeDownloadWarnings"
          if (-not (Test-Path $exemptPath)) { New-Item -Path $exemptPath -Force | Out-Null }
          Set-ItemProperty -Path $exemptPath -Name "1" -Value '{"domains":["*"],"file_extension":"exe"}'
          Write-Host "[Registry] Edge EXEs whitelisted from all warnings." -ForegroundColor Green

      - name: Download Secure Job Data Artifact
        uses: actions/download-artifact@v4
        with:
          name: matrix-data

      - name: Parse and Load Secure Job Data
        shell: pwsh
        run: |
          Write-Host "========== PARSING SECURE RUNNER DATA ==========" -ForegroundColor Cyan
          $json = Get-Content -Path "full_data.json" -Raw | ConvertFrom-Json
          $idx = "${{ matrix.index }}"
          $myData = $json.$idx

          function Set-EnvVar ($name, $value) {
              if ([string]::IsNullOrEmpty($value)) {
                  "$name=" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
              } elseif ($value -match "[\r\n]") {
                  $eof = "EOF_$([guid]::NewGuid().ToString('N'))"
                  "$name<<$eof`n$value`n$eof" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
              } else {
                  "$name=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
              }
          }

          Set-EnvVar "USE_PROXY" $myData.use_proxy
          Set-EnvVar "PROXY_SERVER" $myData.proxy_server
          Set-EnvVar "PROXY_USER" $myData.proxy_user
          Set-EnvVar "PROXY_PASS" $myData.proxy_pass
          Set-EnvVar "TARGET_URL" $myData.target_url
          Set-EnvVar "SOFTWARE_TYPE" $myData.software_type
          Set-EnvVar "EXE_FILTER" $myData.exe_filter
          Set-EnvVar "ACTION_MODE" $myData.action_mode
          Set-EnvVar "COUNTRY_CODE" $myData.country_code
          Write-Host "Variables mapped straight into system environments successfully without triggering action secrets block." -ForegroundColor Green

      - name: Install and Start Getscreen.me (Windows)
        shell: pwsh
        run: |
          Write-Host "========== REMOTE ACCESS AGENT ==========" -ForegroundColor Cyan
          Write-Host "[Getscreen] Starting MSI download from getscreen.me..."
          $MaxRetries = 3
          $RetryCount = 0
          $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://getscreen.me/download/getscreen.msi" -OutFile "getscreen.msi" -ErrorAction Stop
                  if ((Get-Item "getscreen.msi").length -gt 1MB) {
                      $Success = $true
                  } else {
                      Start-Sleep -Seconds 5; $RetryCount++
                  }
              } catch {
                  Start-Sleep -Seconds 5; $RetryCount++
              }
          }
          if (-not $Success) { Write-Host "[Getscreen] Failed to download agent. Exiting."; exit 1 }

          Write-Host "[Getscreen] Executing silent install for account: ${{ inputs.getscreen_email }}"
          $InstallArgs = "/i getscreen.msi /qn REGISTER=`"${{ inputs.getscreen_email }}`" CONFIG=`"name='${{ matrix.device }}' autostart=true nonadmin=true control=true disable_confirmation=true`""
          Start-Process msiexec.exe -Wait -ArgumentList $InstallArgs

      - name: Setup Auto-Downloader & Software Installation
        shell: pwsh
        run: |
          $useProxy = $env:USE_PROXY -eq "true"

          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host " Zero-Touch Downloader & Installer Active" -ForegroundColor Cyan
          Write-Host " Target URL: $env:TARGET_URL" -ForegroundColor Gray
          Write-Host " Category  : $env:SOFTWARE_TYPE" -ForegroundColor Cyan
          Write-Host " Action    : $($env:ACTION_MODE.ToUpper()) PATHWAY ASSIGNED" -ForegroundColor Magenta
          if ($useProxy) {
              Write-Host " Mode      : Proxy-enabled ($env:PROXY_SERVER)" -ForegroundColor Cyan
          } else {
              Write-Host " Mode      : Direct (Proxy Completely Bypassed)" -ForegroundColor Yellow
          }
          Write-Host "============================================================" -ForegroundColor Cyan

          Write-Host "[Dependencies] Installing python UIA modules (pywinauto, pyautogui, etc)..." -ForegroundColor DarkGray
          python -m pip install pywinauto pyautogui pygetwindow keyboard --quiet

          # Python UI background handler 
          $handlerPy = @'
          import time, sys, subprocess, random, os, tempfile, ctypes
          from pywinauto import Desktop
          import pyautogui
          from pywinauto.keyboard import send_keys

          def log_msg(tag, msg):
              t = time.strftime('%H:%M:%S')
              print(f"[{t}][{tag}] {msg}", flush=True)

          DOWNLOAD_DONE_TITLES =[
              "Thanks for downloading Opera", "Thanks for downloadin",
              "Download | Thanks", "sudetyj", "clickWorker",
              "GET READY TO PLAY", "ready to install",
          ]

          def _is_download_done_window(text):
              t = text.lower()
              return any(frag.lower() in t for frag in DOWNLOAD_DONE_TITLES)

          def close_download_windows(desktop, attempt_label=""):
              closed_any = False
              try:
                  all_windows = desktop.windows(visible_only=True)
              except Exception: return False

              for window in all_windows:
                  try:
                      wt = window.window_text()
                      if not wt: continue

                      is_match = _is_download_done_window(wt)
                      if not is_match and ("Microsoft Edge" in wt or wt == "Edge"):
                          try:
                              for child in window.children():
                                  child_wt = child.window_text()
                                  if child_wt and _is_download_done_window(child_wt):
                                      is_match = True
                                      break
                          except Exception: pass

                      if not is_match: continue

                      log_msg("TabClose", f"Targeting window '{wt}' (Attempt {attempt_label})")
                      closed = False

                      if not closed:
                          try:
                              window.set_focus()
                              time.sleep(0.3)
                              sw, sh = pyautogui.size()
                              cx, cy = sw // 2, sh // 2
                              pyautogui.click(cx, cy)
                              time.sleep(random.uniform(1.0, 2.0))
                              send_keys('^w')
                              closed = True
                          except Exception as e: pass

                      if not closed:
                          try:
                              window.set_focus()
                              time.sleep(0.3)
                              send_keys('%{F4}')
                              closed = True
                          except Exception as e: pass

                      if closed:
                          closed_any = True
                          time.sleep(0.5)
                  except Exception: pass
              return closed_any

          def opera_one_post_install_sequence(opera_window):
              log_msg("PostInstall-OP1", "=== Opera One Post-Install Sequence Starting ===")
              for s in range(1, 36):
                  time.sleep(1)
              for s in range(1, 11):
                  time.sleep(1)
              sw, sh = pyautogui.size()
              cx, cy = sw // 2, sh // 2
              try:
                  pyautogui.click(cx, cy)
                  time.sleep(0.15)
                  pyautogui.click(cx, cy)
              except Exception as e:
                  try: pyautogui.doubleClick(cx, cy)
                  except Exception: pass
              time.sleep(random.uniform(1.0, 2.0))
              for i in range(1, 9):
                  send_keys('{LEFT}')
                  time.sleep(random.uniform(1.0, 2.0))
              send_keys('{ENTER}')
              time.sleep(random.uniform(1.0, 2.0))
              send_keys('^t')
              time.sleep(random.uniform(1.0, 2.0))
              tab_count = random.randint(6, 12)
              for i in range(1, tab_count + 1):
                  send_keys('{TAB}')
                  time.sleep(random.uniform(1.0, 2.0))
              send_keys('{ENTER}')
              log_msg("PostInstall-OP1", "=== Opera One Post-Install Sequence Completed ===")

          def handle_automation(username, password, software_type, use_proxy, action_mode, timeout=360):
              desktop = Desktop(backend="uia")
              start_time = time.time()
              proxy_auth_time = start_time

              last_ctrl_j_time = time.time()
              last_dl_click_time = 0
              ctrl_j_attempts = 0
              keep_clicked = False
              avg_download_clicked = False
              smart_link_interstitial_done = False
              smart_link_interstitial_time = 0
              opera_launched_time = None
              opera_setup_completed = False
              opera_one_installer_executed_time = None
              opera_one_post_install_done = False
              sentinel_path = os.path.join(tempfile.gettempdir(), "download_done.flag")
              download_windows_closed = False
              installer_executed_sentinel = os.path.join(tempfile.gettempdir(), "installer_executed.flag")

              while time.time() - start_time < timeout:
                  try:
                      edge_window = None
                      opera_window = None

                      for window in desktop.windows(visible_only=True):
                          wt = window.window_text()
                          if not wt: continue
                          if "Microsoft Edge" in wt or "sudetyj" in wt or "Chrome Web Store" in wt or "Edge" in wt:
                              edge_window = window
                          if "Opera" in wt or "Speed Dial" in wt or "Start Page" in wt or "Welcome" in wt:
                              if "Microsoft Edge" not in wt and "Edge" not in wt and "Chrome Web Store" not in wt:
                                  opera_window = window

                      if not download_windows_closed and os.path.exists(sentinel_path):
                          for attempt in range(1, 6):
                              still_open = close_download_windows(desktop, attempt_label=f"#{attempt}")
                              time.sleep(2)
                              if not still_open: break
                          download_windows_closed = True
                          edge_window = None

                      if (software_type == "opera_one" and action_mode == "install" and not opera_one_post_install_done):
                          if (opera_one_installer_executed_time is None and os.path.exists(installer_executed_sentinel)):
                              opera_one_installer_executed_time = time.time()
                          if (opera_one_installer_executed_time is not None and (time.time() - opera_one_installer_executed_time) >= 35):
                              opera_one_post_install_sequence(opera_window)
                              opera_one_post_install_done = True
                              opera_setup_completed = True

                      if use_proxy and username and password and (edge_window or opera_window):
                          for w in [edge_window, opera_window]:
                              if w:
                                  user_fields = w.descendants(control_type="Edit", title="Username")
                                  pass_fields = w.descendants(control_type="Edit", title="Password")
                                  if user_fields and pass_fields:
                                      try:
                                          w.set_focus()
                                          time.sleep(0.5)
                                          user_fields[0].click_input()
                                          user_fields[0].type_keys(username, with_spaces=True, pause=0.02)
                                          pass_fields[0].click_input()
                                          pass_fields[0].type_keys(password, with_spaces=True, pause=0.02)
                                          btn = w.descendants(control_type="Button", title="Sign in")
                                          if btn: btn[0].click_input()
                                          else: pass_fields[0].type_keys("{ENTER}")
                                          proxy_auth_time = time.time()
                                      except Exception: pass

                      if edge_window:
                          for cookie_btn in["Accept all", "Accepter tout", "Tout accepter", "Accept Cookies", "Allow all", "Accept selection"]:
                              btns = edge_window.descendants(control_type="Button", title=cookie_btn)
                              if btns:
                                  try:
                                      btns[0].click_input()
                                      time.sleep(1)
                                  except: pass

                      if edge_window and software_type == "opera_smart_link":
                          elapsed = time.time() - proxy_auth_time
                          if not smart_link_interstitial_done:
                              if elapsed > 20:
                                  try:
                                      edge_window.set_focus()
                                      time.sleep(0.5)
                                      send_keys('{TAB}')
                                      time.sleep(0.5)
                                      send_keys('{ENTER}')
                                  except Exception: pass
                                  smart_link_interstitial_done = True
                                  smart_link_interstitial_time = time.time()

                      if action_mode == "click":
                          if software_type == "opera_smart_link":
                              if not smart_link_interstitial_done or (time.time() - smart_link_interstitial_time < 15):
                                  time.sleep(1)
                                  continue
                          time.sleep(1)
                          continue

                      if edge_window and action_mode == "install":
                          keep_btns = edge_window.descendants(control_type="Button", title="Keep")
                          if keep_btns:
                              keep_clicked = True
                              keep_btns[0].click_input()
                              time.sleep(0.5)
                          keep_anyway = edge_window.descendants(control_type="Button", title="Keep anyway")
                          if keep_anyway:
                              keep_clicked = True
                              keep_anyway[0].click_input()
                              time.sleep(0.5)

                      can_click_download = True
                      if software_type == "opera_smart_link":
                          if not smart_link_interstitial_done or (time.time() - smart_link_interstitial_time < 15):
                              can_click_download = False

                      if edge_window and action_mode == "install" and can_click_download and software_type in["opera_gx", "opera_one", "ad_mvn", "dynamic_opera", "opera_smart_link"]:
                          if time.time() - last_dl_click_time > 5:
                              clicked_something = False
                              dl_keywords =["download opera", "download now", "télécharger", "baixar", "herunterladen", "descargar", "download"]
                              for btn in edge_window.descendants(control_type="Button"):
                                  btntxt = btn.window_text()
                                  if btntxt and any(k in btntxt.lower() for k in dl_keywords):
                                      try:
                                          edge_window.set_focus()
                                          time.sleep(0.5)
                                          btn.click_input()
                                          last_dl_click_time = time.time()
                                          clicked_something = True
                                          break
                                      except Exception: pass
                              if not clicked_something:
                                  for el in edge_window.descendants():
                                      if el.element_info.control_type in["Hyperlink", "Text", "Image"]:
                                          wt = el.window_text()
                                          if wt and "opera" in wt.lower() and len(wt) < 150:
                                              if "smart link" not in wt.lower() and "http" not in wt.lower() and "playabledownloads" not in wt.lower():
                                                  try:
                                                      edge_window.set_focus()
                                                      el.click_input()
                                                      last_dl_click_time = time.time()
                                                      break
                                                  except Exception: pass

                      if edge_window and action_mode == "install" and software_type == "avg":
                          elapsed = time.time() - proxy_auth_time
                          if not avg_download_clicked and (elapsed > 20):
                              try:
                                  edge_window.set_focus()
                                  time.sleep(0.5)
                                  send_keys('{TAB}')
                                  time.sleep(random.uniform(1.0, 2.0))
                                  send_keys('{ENTER}')
                                  for w in range(1, 11): time.sleep(1)
                              except Exception: pass
                              avg_download_clicked = True

                      if edge_window and action_mode == "install":
                          add_ext_btns = edge_window.descendants(control_type="Button", title="Add extension")
                          if add_ext_btns:
                              try:
                                  edge_window.set_focus()
                                  time.sleep(0.5)
                                  add_ext_btns[0].click_input()
                                  time.sleep(2)
                              except Exception: pass
                          else:
                              for btn_name in ["Add to Chrome", "Get"]:
                                  install_btns = edge_window.descendants(control_type="Button", title=btn_name)
                                  if install_btns:
                                      try:
                                          edge_window.set_focus()
                                          time.sleep(0.5)
                                          install_btns[0].click_input()
                                          time.sleep(2)
                                          break
                                      except Exception: pass

                      can_ctrl_j = True
                      if software_type == "avg" and not avg_download_clicked: can_ctrl_j = False
                      if action_mode == "install" and not keep_clicked and edge_window and can_ctrl_j and (time.time() - last_ctrl_j_time > 15) and ctrl_j_attempts < 4:
                          try:
                              edge_window.set_focus()
                              time.sleep(0.5)
                              send_keys('^j')
                              last_ctrl_j_time = time.time()
                              ctrl_j_attempts += 1
                          except Exception: pass

                      if (action_mode == "install" and software_type in["opera_gx", "ad_mvn", "dynamic_opera", "opera_smart_link"] and opera_window and not opera_setup_completed):
                          wt = opera_window.window_text()
                          if software_type in["ad_mvn", "dynamic_opera", "opera_smart_link"]: is_gx_flow = "GX" in wt.upper()
                          else: is_gx_flow = (software_type == "opera_gx")
                          
                          if not opera_launched_time:
                              opera_launched_time = time.time()
                              try:
                                  opera_window.set_focus()
                                  opera_window.maximize()
                              except Exception: pass
                              
                          wait_time = 15 if is_gx_flow else 90
                          if time.time() - opera_launched_time > wait_time:
                              try: opera_window.set_focus()
                              except Exception: pass
                              time.sleep(1)
                              if is_gx_flow:
                                  try:
                                      for t in range(4):
                                          send_keys('{TAB}')
                                          time.sleep(0.5)
                                      for i in range(8):
                                          send_keys('{ENTER}')
                                          time.sleep(random.uniform(1.0, 2.0))
                                      random_tabs = random.randint(4, 10)
                                      for t in range(random_tabs):
                                          send_keys('{TAB}')
                                          time.sleep(0.3)
                                      send_keys('{ENTER}')
                                      opera_setup_completed = True
                                  except Exception: pass
                              else:
                                  try:
                                      sw, sh = pyautogui.size()
                                      cx, cy = sw // 2, sh // 2
                                      for i in range(3):
                                          pyautogui.click(cx, cy)
                                          time.sleep(random.uniform(1.0, 2.0))
                                      for i in range(10):
                                          send_keys('{RIGHT}')
                                          time.sleep(random.uniform(1.0, 2.0))
                                      send_keys('{ENTER}')
                                      opera_setup_completed = True
                                  except Exception: pass
                  except Exception: pass
                  time.sleep(1)

          if __name__ == "__main__":
              username      = sys.argv[1] if len(sys.argv) > 1 else ""
              password      = sys.argv[2] if len(sys.argv) > 2 else ""
              software_type = sys.argv[3] if len(sys.argv) > 3 else "avg"
              use_proxy     = (sys.argv[4].lower() == "true") if len(sys.argv) > 4 else False
              action_mode   = sys.argv[5] if len(sys.argv) > 5 else "install"
              handle_automation(username, password, software_type, use_proxy, action_mode)
          '@
          $handlerPy | Out-File -FilePath "$env:TEMP\auto_handler.py" -Encoding utf8

          Write-Host "[UI-Engine] Spinning up background Python process..." -ForegroundColor DarkGray
          Start-Process -FilePath "python" `
              -ArgumentList "-u `"$env:TEMP\auto_handler.py`" `"$env:PROXY_USER`" `"$env:PROXY_PASS`" `"$env:SOFTWARE_TYPE`" `"$env:USE_PROXY`" `"$env:ACTION_MODE`"" `
              -WindowStyle Hidden

          # Watcher Job
          $dlFolder    = "$env:USERPROFILE\Downloads"
          $timeoutSecs = 330
          $softwareType = $env:SOFTWARE_TYPE
          $exeFilter   = $env:EXE_FILTER
          $sentinelPath = "$env:TEMP\download_done.flag"
          $installerExecutedSentinel = "$env:TEMP\installer_executed.flag"

          if ($env:ACTION_MODE -eq "install") {
              Write-Host "[Watcher] Action mode is INSTALL. Initializing download directory monitor..." -ForegroundColor Cyan
              $installJob = Start-Job -ScriptBlock {
                  param($dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath, $installerExecutedSentinel)
                  $deadline  = (Get-Date).AddSeconds($timeoutSecs)
                  $installed = $false

                  while (-not $installed -and (Get-Date) -lt $deadline) {
                      $candidates = Get-ChildItem -Path $dlFolder -Filter $exeFilter -ErrorAction SilentlyContinue |
                          Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } |
                          Sort-Object LastWriteTime -Descending

                      if ($candidates.Count -gt 0) {
                          $file = $candidates[0]
                          try { Set-Content -Path $sentinelPath -Value "done" -ErrorAction SilentlyContinue } catch {}
                          
                          $actualSoftware = $softwareType
                          if ($softwareType -eq "ad_mvn" -or $softwareType -eq "dynamic_opera" -or $softwareType -eq "opera_smart_link") {
                              if ($file.Name -match "OperaGX") { $actualSoftware = "opera_gx" } 
                              else { $actualSoftware = "opera_one" }
                          }

                          $locked = $true
                          while ($locked) {
                              Start-Sleep -Seconds 2
                              try {
                                  $s = [System.IO.File]::Open($file.FullName, 'Open', 'Read', 'None')
                                  $s.Close()
                                  $locked = $false
                              } catch { }
                          }

                          try { Set-Content -Path $installerExecutedSentinel -Value "done" -ErrorAction SilentlyContinue } catch {}

                          try { Start-Process -FilePath $file.FullName -ArgumentList "/silent" -Wait } catch {}

                          if ($actualSoftware -eq "opera_gx") {
                              $appPaths = @(
                                  "$env:LOCALAPPDATA\Programs\Opera GX\launcher.exe", "$env:LOCALAPPDATA\Programs\Opera GX\opera.exe",
                                  "C:\Program Files\Opera GX\launcher.exe", "C:\Program Files\Opera GX\opera.exe",
                                  "C:\Program Files (x86)\Opera GX\launcher.exe", "C:\Program Files (x86)\Opera GX\opera.exe"
                              )
                          } elseif ($actualSoftware -eq "opera_one") {
                              $appPaths = @(
                                  "$env:LOCALAPPDATA\Programs\Opera\launcher.exe", "$env:LOCALAPPDATA\Programs\Opera\opera.exe",
                                  "C:\Program Files\Opera\launcher.exe", "C:\Program Files\Opera\opera.exe",
                                  "C:\Program Files (x86)\Opera\launcher.exe", "C:\Program Files (x86)\Opera\opera.exe"
                              )
                          } else {
                              $appPaths = @(
                                  "C:\Program Files\AVG\Browser\Application\AVGBrowser.exe", "C:\Program Files (x86)\AVG\Browser\Application\AVGBrowser.exe",
                                  "C:\Program Files\AVG\Antivirus\AVGUI.exe", "C:\Program Files (x86)\AVG\Antivirus\AVGUI.exe"
                              )
                          }

                          $launched = $false
                          for ($i = 0; $i -lt 300; $i++) {
                              foreach ($p in $appPaths) {
                                  if (Test-Path $p) {
                                      Start-Sleep -Seconds 3
                                      Start-Process -FilePath $p
                                      $launched = $true
                                      break
                                  }
                              }
                              if ($launched) { break }
                              Start-Sleep -Seconds 2
                          }
                          $installed = $true
                      } else { Start-Sleep -Seconds 5 }
                  }
              } -ArgumentList $dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath, $installerExecutedSentinel
          }

          # Launch Edge
          $edgeExe = "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
          if (-Not (Test-Path $edgeExe)) { $edgeExe = "C:\Program Files\Microsoft\Edge\Application\msedge.exe" }

          $edgeArgs = @("--no-first-run", "--no-default-browser-check", "--disable-sync", "--safebrowsing-disable-download-protection", "--disable-features=msSmartScreenProtection,SmartScreenPuaEnabled")

          if ($useProxy) {
              if ($env:PROXY_SERVER) {
                  $edgeArgs += "--proxy-server=`"$env:PROXY_SERVER`""
              } else {
                  $proxyServer = "residential-proxy.scrapeops.io:8181"
                  $edgeArgs += "--proxy-server=`"http://$proxyServer`""
              }
          }
          $edgeArgs += "`"$env:TARGET_URL`""

          Write-Host "[System] Launching Edge browser context..." -ForegroundColor Cyan
          Start-Process -FilePath $edgeExe -ArgumentList ($edgeArgs -join " ")

          Write-Host "========== RUNTIME EXECUTION ==========" -ForegroundColor Cyan

          if ($env:ACTION_MODE -eq "install") {
              $deadline = (Get-Date).AddSeconds($timeoutSecs)
              while ($true) {
                  $output = Receive-Job -Job $installJob -ErrorAction SilentlyContinue
                  if ($output) { foreach ($line in $output) { Write-Host $line } }
                  if ($installJob.State -eq 'Completed' -or $installJob.State -eq 'Failed' -or (Get-Date) -gt $deadline) { break }
                  Start-Sleep -Seconds 5
              }
          } else {
              $clickStart      = Get-Date
              $clickTotal      = 75
              $step            = 15
              $reloadFired     = $false
              $reloadThreshold = Get-Random -Minimum 20 -Maximum 61
              $reloadChance    = Get-Random -Minimum 10 -Maximum 101

              for ($w = 0; $w -lt $clickTotal; $w += $step) {
                  if (-not $reloadFired) {
                      $elapsed = [int]((Get-Date) - $clickStart).TotalSeconds
                      if ($elapsed -ge $reloadThreshold) {
                          try {
                              Add-Type -AssemblyName UIAutomationClient
                              $wsh = New-Object -ComObject WScript.Shell
                              $wsh.SendKeys('{F5}')
                          } catch { }
                          $reloadFired = $true
                      }
                  }
                  Start-Sleep -Seconds $step
              }
              exit 0
          }

      - name: Keep Runner Alive
        if: always() && matrix.action_mode == 'install'
        shell: pwsh
        run: |
          Write-Host "Leaving runner online to exhaust remaining job timeout margin..." -ForegroundColor DarkGray
          Start-Sleep -Seconds 360
