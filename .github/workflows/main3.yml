          def _is_interference_window(text):
              if not text: return False
              for exact in INTERFERENCE_TITLES:
                  if text.strip().lower() == exact.strip().lower(): return True
              tl = text.lower()
              for sub in INTERFERENCE_SUBSTRINGS:
                  if sub in tl: return True
              return False

          def _is_target_software_window(text, software_type):
              if not text: return False
              tl = text.lower()
              if software_type == "avg": return "avg" in tl
              elif software_type == "opera_gx":
                  return ("opera" in tl and "gx" in tl) or "opera gx" in tl
              elif software_type in ["opera_one", "opera_smart_link", "dynamic_opera", "ad_mvn"]:
                  return "opera" in tl and "edge" not in tl and "chrome web store" not in tl
              return False

          # ══════════════════════════════════════════════════════════════════════
          # DOWNLOAD BUTTON FINDER
          # ══════════════════════════════════════════════════════════════════════
          def find_download_button(edge_window, software_type, label=""):
              if edge_window is None: return None, None

              if software_type in ["opera_gx", "opera_one", "opera_smart_link", "dynamic_opera", "ad_mvn"]:
                  primary_keywords = DOWNLOAD_KEYWORDS_OPERA
              elif software_type == "avg":
                  primary_keywords = DOWNLOAD_KEYWORDS_AVG
              else:
                  primary_keywords = DOWNLOAD_KEYWORDS_UNIVERSAL

              try:
                  for btn in edge_window.descendants(control_type="Button"):
                      try: txt = (btn.window_text() or "").strip()
                      except: txt = ""
                      try: name = (btn.element_info.name or "").strip()
                      except: name = ""
                      combined = (txt + " " + name).strip()
                      if combined and _matches_any(combined, primary_keywords):
                          log_msg("DL-Find", f"[{label}] S1 Button: '{combined[:60]}'")
                          return btn, "s1-button"
              except Exception as e:
                  log_msg("DL-Find", f"[{label}] S1 error: {e}")

              try:
                  for btn in edge_window.descendants(control_type="Button"):
                      try: txt = (btn.window_text() or "").strip()
                      except: txt = ""
                      try: name = (btn.element_info.name or "").strip()
                      except: name = ""
                      combined = (txt + " " + name).strip()
                      if combined and len(combined) > 2 and _matches_any(combined, DOWNLOAD_KEYWORDS_UNIVERSAL):
                          log_msg("DL-Find", f"[{label}] S2 Universal: '{combined[:60]}'")
                          return btn, "s2-universal"
              except Exception as e:
                  log_msg("DL-Find", f"[{label}] S2 error: {e}")

              try:
                  for el in edge_window.descendants():
                      try: ctrl_type = el.element_info.control_type
                      except: continue
                      if ctrl_type not in ["Hyperlink", "Text", "Image"]: continue
                      try: wt = (el.window_text() or "").strip()
                      except: wt = ""
                      if not wt or len(wt) > 200: continue
                      if "http" in wt.lower() or "www." in wt.lower(): continue
                      if _matches_any(wt, primary_keywords + INTERSTITIAL_KEYWORDS) and len(wt) <= 80:
                          log_msg("DL-Find", f"[{label}] S3 Link: '{wt[:60]}'")
                          return el, f"s3-{ctrl_type.lower()}"
              except Exception as e:
                  log_msg("DL-Find", f"[{label}] S3 error: {e}")

              try:
                  all_kw = list(set(primary_keywords + DOWNLOAD_KEYWORDS_UNIVERSAL + INTERSTITIAL_KEYWORDS))
                  for el in edge_window.descendants():
                      try: ctrl_type = el.element_info.control_type
                      except: continue
                      if ctrl_type not in ["Button", "Hyperlink", "Text", "Image", "Custom"]: continue
                      try: wt = (el.window_text() or "").strip()
                      except: wt = ""
                      if not wt or len(wt) > 100: continue
                      if "http" in wt.lower() or "www." in wt.lower(): continue
                      if _matches_any_exact_start(wt, all_kw):
                          log_msg("DL-Find", f"[{label}] S4 Broad: '{wt[:60]}'")
                          return el, f"s4-broad"
              except Exception as e:
                  log_msg("DL-Find", f"[{label}] S4 error: {e}")

              return None, None

          def click_download_button(edge_window, software_type, label=""):
              element, strategy = find_download_button(edge_window, software_type, label=label)
              if element is None: return False
              try:
                  edge_window.set_focus(); time.sleep(0.4)
              except: pass
              try:
                  element.click_input()
                  log_msg("DL-Click", f"[{label}] click_input() via {strategy}.")
                  return True
              except Exception as e1:
                  pass
              try:
                  element.invoke()
                  log_msg("DL-Click", f"[{label}] invoke() via {strategy}.")
                  return True
              except: pass
              try:
                  rect = element.rectangle()
                  cx = (rect.left + rect.right) // 2
                  cy = (rect.top + rect.bottom) // 2
                  pyautogui.moveTo(cx, cy, duration=0.25)
                  time.sleep(0.15)
                  pyautogui.click(cx, cy)
                  log_msg("DL-Click", f"[{label}] pyautogui click via {strategy}.")
                  return True
              except: pass
              return False

          # ══════════════════════════════════════════════════════════════════════
          # KEEP BUTTON — PRIMARY: Ctrl+J then Tab x4 then Enter (language-agnostic)
          # BACKUP: UI automation click on Keep button location
          # ══════════════════════════════════════════════════════════════════════
          def do_keep_via_keyboard(edge_window, label=""):
              """
              Primary Keep strategy: Ctrl+J opens downloads, Tab x4 navigates
              to the Keep button, Enter presses it. Language-agnostic.
              This must run WITHOUT any other mouse/keyboard interference.
              """
              log_msg("Keep-KB", f"[{label}] Starting Ctrl+J -> Tab x4 -> Enter sequence...")
              try:
                  edge_window.set_focus()
                  time.sleep(0.5)
                  # Open downloads panel
                  send_keys('^j')
                  log_msg("Keep-KB", f"[{label}] Ctrl+J sent (downloads panel). Waiting 2s...")
                  time.sleep(2)
                  # Tab to Keep button - 4 times with 1s delay each
                  for i in range(1, 5):
                      edge_window.set_focus()
                      time.sleep(0.3)
                      send_keys('{TAB}')
                      log_msg("Keep-KB", f"[{label}] TAB {i}/4 sent. Waiting 1s...")
                      time.sleep(1)
                  # Press Enter to click Keep
                  edge_window.set_focus()
                  time.sleep(0.3)
                  send_keys('{ENTER}')
                  log_msg("Keep-KB", f"[{label}] ENTER sent — Keep should be clicked.")
                  return True
              except Exception as e:
                  log_msg("Keep-KB", f"[{label}] Keyboard sequence failed: {e}")
                  return False

          def do_keep_via_ui_automation(edge_window, label=""):
              """
              Backup Keep strategy: UI automation scan for Keep button by text.
              Used only when keyboard method didn't result in a download.
              Location of Keep button is same regardless of language - only text changes.
              """
              log_msg("Keep-UI", f"[{label}] Backup UI scan for Keep button...")
              try:
                  # Strategy 1: Button descendants with keyword match
                  for btn in edge_window.descendants(control_type="Button"):
                      try: txt = (btn.window_text() or "").strip()
                      except: txt = ""
                      try: name = (btn.element_info.name or "").strip()
                      except: name = ""
                      combined = (txt + " " + name).strip()
                      if combined and len(combined) <= 60 and _matches_any(combined, KEEP_KEYWORDS):
                          log_msg("Keep-UI", f"[{label}] Found Keep button: '{combined[:40]}'")
                          try:
                              edge_window.set_focus(); time.sleep(0.3)
                              btn.click_input()
                              log_msg("Keep-UI", f"[{label}] Keep clicked via UI automation.")
                              return True
                          except:
                              try:
                                  btn.invoke()
                                  log_msg("Keep-UI", f"[{label}] Keep invoked.")
                                  return True
                              except:
                                  try:
                                      rect = btn.rectangle()
                                      cx = (rect.left + rect.right) // 2
                                      cy = (rect.top + rect.bottom) // 2
                                      pyautogui.click(cx, cy)
                                      log_msg("Keep-UI", f"[{label}] Keep pyautogui click.")
                                      return True
                                  except: pass
              except Exception as e:
                  log_msg("Keep-UI", f"[{label}] S1 error: {e}")

              # Strategy 2: Toolbar/Pane scan
              try:
                  for container_type in ["ToolBar", "Pane", "Group", "Custom"]:
                      try: containers = edge_window.descendants(control_type=container_type)
                      except: continue
                      for container in containers:
                          try:
                              for el in container.descendants():
                                  try: ctrl_type = el.element_info.control_type
                                  except: continue
                                  if ctrl_type not in ["Button", "Hyperlink", "Text"]: continue
                                  try: wt = (el.window_text() or "").strip()
                                  except: wt = ""
                                  try: nm = (el.element_info.name or "").strip()
                                  except: nm = ""
                                  combined = (wt + " " + nm).strip()
                                  if combined and len(combined) <= 60 and _matches_any(combined, KEEP_KEYWORDS):
                                      log_msg("Keep-UI", f"[{label}] S2 ({container_type}): '{combined[:40]}'")
                                      try:
                                          edge_window.set_focus(); time.sleep(0.3)
                                          el.click_input()
                                          return True
                                      except:
                                          try: el.invoke(); return True
                                          except:
                                              try:
                                                  rect = el.rectangle()
                                                  cx = (rect.left + rect.right) // 2
                                                  cy = (rect.top + rect.bottom) // 2
                                                  pyautogui.click(cx, cy)
                                                  return True
                                              except: pass
                          except: pass
              except Exception as e:
                  log_msg("Keep-UI", f"[{label}] S2 error: {e}")

              log_msg("Keep-UI", f"[{label}] UI automation Keep not found.")
              return False

          def dismiss_interference_windows(desktop, software_type, label=""):
              dismissed_any = False
              try:
                  all_windows = desktop.windows(visible_only=True)
              except: return False
              for window in all_windows:
                  try:
                      wt = window.window_text()
                      if not wt: continue
                      if "Microsoft Edge" in wt or "msedge" in wt.lower(): continue
                      if _is_target_software_window(wt, software_type): continue
                      if not _is_interference_window(wt): continue
                      log_msg("WinGuard", f"Interference: '{wt}' [{label}]")
                      closed = False
                      try:
                          window.set_focus(); time.sleep(0.25)
                          send_keys('%{F4}'); time.sleep(0.4); closed = True
                      except:
                          try: window.close(); time.sleep(0.3); closed = True
                          except:
                              try: window.minimize(); time.sleep(0.25); closed = True
                              except: pass
                      if closed: dismissed_any = True
                  except: pass
              return dismissed_any

          def robust_maximize_opera_window(desktop, software_type, label=""):
              found_window = None
              dismiss_interference_windows(desktop, software_type, label=f"{label}-pre-dismiss")
              time.sleep(0.3)
              for attempt in range(1, 6):
                  log_msg("MaximizeOp", f"[{label}] Search attempt {attempt}/5...")
                  try:
                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text()
                          if wt and _is_target_software_window(wt, software_type):
                              found_window = w
                              log_msg("MaximizeOp", f"[{label}] Found: '{wt}'")
                              break
                  except Exception as e:
                      log_msg("MaximizeOp", f"[{label}] Search error: {e}")
                  if found_window: break
                  time.sleep(3)
              if not found_window:
                  log_msg("MaximizeOp", f"[{label}] ERROR: Window not found after 5 attempts.")
                  return None
              try: found_window.set_focus(); time.sleep(0.4); found_window.maximize(); time.sleep(0.5)
              except: pass
              try:
                  found_window.set_focus(); time.sleep(0.3)
                  send_keys('{VK_LWIN down}{UP}{VK_LWIN up}'); time.sleep(0.4)
                  send_keys('{VK_LWIN down}{UP}{VK_LWIN up}'); time.sleep(0.4)
              except: pass
              try:
                  hwnd = found_window.handle
                  ctypes.windll.user32.ShowWindow(hwnd, 9); time.sleep(0.4)
              except: pass
              try:
                  user32 = ctypes.windll.user32
                  sw = user32.GetSystemMetrics(0); sh = user32.GetSystemMetrics(1)
                  hwnd = found_window.handle
                  user32.SetWindowPos(hwnd, -1, 0, 0, sw, sh, 0x0040 | 0x0020); time.sleep(0.3)
                  user32.SetWindowPos(hwnd, -2, 0, 0, sw, sh, 0x0040 | 0x0020); time.sleep(0.3)
              except: pass
              try: found_window.set_focus(); time.sleep(0.2); found_window.maximize(); time.sleep(0.3); found_window.set_focus()
              except: pass
              return found_window

          def force_maximize_and_focus_target(desktop, target_window, software_type, label=""):
              dismiss_interference_windows(desktop, software_type, label=f"{label}-dismiss")
              time.sleep(0.3)
              found_window = target_window
              if found_window is None:
                  try:
                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text()
                          if wt and _is_target_software_window(wt, software_type):
                              found_window = w; break
                  except: pass
              if found_window is None:
                  log_msg("WinGuard", f"[{label}] No target window found.")
                  return None
              try:
                  found_window.set_focus(); time.sleep(0.2)
                  found_window.maximize(); time.sleep(0.3)
                  found_window.set_focus(); time.sleep(0.2)
              except Exception as e:
                  log_msg("WinGuard", f"[{label}] maximize/focus failed: {e}")
              return found_window

          def close_download_windows(desktop, attempt_label=""):
              closed_any = False
              try: all_windows = desktop.windows(visible_only=True)
              except: return False
              for window in all_windows:
                  try:
                      wt = window.window_text()
                      if not wt: continue
                      is_match = _is_download_done_window(wt)
                      if not is_match and ("Microsoft Edge" in wt or wt == "Edge"):
                          try:
                              for child in window.children():
                                  child_wt = child.window_text()
                                  if child_wt and _is_download_done_window(child_wt):
                                      is_match = True; break
                          except: pass
                      if not is_match: continue
                      log_msg("EdgeClose", f"Targeting '{wt}' for close (Attempt {attempt_label})")
                      closed = False
                      try:
                          window.set_focus(); time.sleep(0.4)
                          sw, sh = pyautogui.size()
                          pyautogui.click(sw // 2, sh // 2); time.sleep(0.5)
                          send_keys('^w'); time.sleep(0.5)
                          send_keys('^w'); time.sleep(0.4)
                          closed = True
                      except Exception as e:
                          log_msg("EdgeClose", f"Ctrl+W failed: {e}")
                      if not closed:
                          try:
                              window.set_focus(); time.sleep(0.4)
                              send_keys('^j'); time.sleep(0.6)
                              send_keys('^j'); time.sleep(0.4)
                              closed = True
                          except: pass
                      if not closed:
                          try:
                              window.set_focus(); time.sleep(0.3)
                              send_keys('%{F4}'); closed = True
                          except: pass
                      if closed: closed_any = True; time.sleep(0.5)
                  except: pass
              return closed_any

          # ══════════════════════════════════════════════════════════════════════
          # OPERA BUTTON CLICK (unified, language-aware via NEXT/DONE/SUBMIT lists)
          # ══════════════════════════════════════════════════════════════════════
          def click_opera_button(desktop, opera_window, software_type, keyword_list, label="", fallback_coords=None):
              try:
                  target = opera_window
                  if target is None or not target.is_visible():
                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text()
                          if wt and _is_target_software_window(wt, software_type):
                              target = w; break
                  if not target:
                      if fallback_coords:
                          fx, fy = fallback_coords
                          try: pyautogui.moveTo(fx, fy, duration=0.2); pyautogui.click(fx, fy); return True
                          except: pass
                      return False

                  target.set_focus(); time.sleep(0.3)

                  # Pass 1: exact title match
                  for kw in keyword_list:
                      try:
                          btns = target.descendants(control_type="Button", title=kw)
                          if btns:
                              btns[0].click_input()
                              log_msg("OpBtn", f"[{label}] Exact title '{kw}'.")
                              return True
                      except: pass

                  # Pass 2: partial text match
                  for btn in target.descendants(control_type="Button"):
                      try:
                          txt = (btn.window_text() or "").strip()
                          nm  = (btn.element_info.name or "").strip()
                          combined = (txt + " " + nm).strip()
                      except: continue
                      if combined and _matches_any(combined, keyword_list):
                          try:
                              btn.click_input()
                              log_msg("OpBtn", f"[{label}] Partial '{combined[:40]}'.")
                              return True
                          except: pass

                  # Pass 3: all descendants
                  for el in target.descendants():
                      try: ctrl_type = el.element_info.control_type
                      except: continue
                      if ctrl_type not in ["Button", "Hyperlink", "Text", "Custom"]: continue
                      try: txt = (el.window_text() or "").strip()
                      except: txt = ""
                      if not txt or len(txt) > 80: continue
                      if _matches_any(txt, keyword_list):
                          try:
                              el.click_input()
                              log_msg("OpBtn", f"[{label}] Descendant '{txt[:40]}'.")
                              return True
                          except: pass

              except Exception as e:
                  log_msg("OpBtn", f"[{label}] Exception: {e}")

              if fallback_coords:
                  fx, fy = fallback_coords
                  log_msg("OpBtn", f"[{label}] Fallback click at ({fx},{fy}).")
                  try:
                      pyautogui.moveTo(fx, fy, duration=0.2)
                      pyautogui.click(fx, fy)
                      return True
                  except: pass
              return False

          # ══════════════════════════════════════════════════════════════════════
          # PROXY AUTH INJECTION
          # ══════════════════════════════════════════════════════════════════════
          def inject_proxy_auth(window, label=""):
              if not USE_PROXY or not PROXY_USER or not PROXY_PASS: return False
              try:
                  user_fields = _find_username_fields(window)
                  pass_fields = _find_password_fields(window)
                  if not user_fields or not pass_fields:
                      u_struct, p_struct = _is_auth_dialog_by_structure(window)
                      if u_struct and p_struct:
                          user_fields = [u_struct]; pass_fields = [p_struct]
                  if user_fields and pass_fields:
                      if _is_address_bar_control(user_fields[0]) or _is_address_bar_control(pass_fields[0]):
                          return False
                      window.set_focus(); time.sleep(0.5)
                      try:
                          user_fields[0].click_input(); time.sleep(0.2)
                          send_keys('^a'); time.sleep(0.1); send_keys('{DELETE}'); time.sleep(0.1)
                          user_fields[0].type_keys(PROXY_USER, with_spaces=True, pause=0.02); time.sleep(0.3)
                      except: pass
                      try:
                          pass_fields[0].click_input(); time.sleep(0.2)
                          send_keys('^a'); time.sleep(0.1); send_keys('{DELETE}'); time.sleep(0.1)
                          pass_fields[0].type_keys(PROXY_PASS, with_spaces=True, pause=0.02); time.sleep(0.3)
                      except: pass
                      signed_in = False
                      submit_btn = _find_submit_button(window)
                      if submit_btn:
                          try: submit_btn.click_input(); signed_in = True
                          except: pass
                      if not signed_in:
                          try: pass_fields[0].click_input(); time.sleep(0.2); send_keys('{ENTER}'); signed_in = True
                          except: pass
                      return signed_in
                  else:
                      wt = ""
                      try: wt = window.window_text() or ""
                      except: pass
                      if not _is_proxy_auth_dialog(wt): return False
                      window.set_focus(); time.sleep(0.5)
                      send_keys('^a{DELETE}'); time.sleep(0.1)
                      for ch in PROXY_USER:
                          send_keys(ch if ch.isalnum() or ch in '.-_=@' else '{%s}' % ch); time.sleep(0.01)
                      send_keys('{TAB}'); time.sleep(0.3)
                      send_keys('^a{DELETE}'); time.sleep(0.1)
                      for ch in PROXY_PASS:
                          send_keys(ch if ch.isalnum() or ch in '.-_=@' else '{%s}' % ch); time.sleep(0.01)
                      time.sleep(0.2); send_keys('{ENTER}')
                      return True
              except Exception as e:
                  log_msg("ProxyAuth", f"[{label}] Exception: {e}")
                  return False

          # ══════════════════════════════════════════════════════════════════════
          # OPERA ONE POST-INSTALL — language-aware via NEXT/DONE/SUBMIT lists
          # Button positions are same across languages; only text differs.
          # ══════════════════════════════════════════════════════════════════════
          def opera_one_post_install_sequence(opera_window, software_type="opera_one"):
              log_msg("PostInstall-OP1", f"=== Opera One Post-Install Starting ({LANGUAGE_MODE} mode) ===")
              desktop = Desktop(backend="uia")

              log_msg("PostInstall-OP1", "STEP 1: Waiting 50s for Opera One to initialize...")
              for s in range(1, 51):
                  log_msg("PostInstall-OP1", f"  Init wait: {s}/50s..."); time.sleep(1)

              log_msg("PostInstall-OP1", "STEP 2: Locating & maximizing Opera One window...")
              desktop = Desktop(backend="uia")
              opera_window = robust_maximize_opera_window(desktop, software_type, label="step2")
              if not opera_window:
                  log_msg("PostInstall-OP1", "STEP 2 WARNING: Window not found. Continuing...")
              else:
                  log_msg("PostInstall-OP1", f"STEP 2 COMPLETE: '{opera_window.window_text()}'")

              log_msg("PostInstall-OP1", "STEP 3: Post-maximize wait 5s...")
              for s in range(1, 6): log_msg("PostInstall-OP1", f"  {s}/5s..."); time.sleep(1)

              log_msg("PostInstall-OP1", "STEP 4: Settle wait 5s...")
              for s in range(1, 6): log_msg("PostInstall-OP1", f"  {s}/5s..."); time.sleep(1)

              sw, sh = pyautogui.size()
              cx, cy = sw // 2, sh // 2
              log_msg("PostInstall-OP1", f"STEP 5: Center click at ({cx},{cy})...")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label="step5")
              try:
                  pyautogui.moveTo(cx, cy, duration=0.3); time.sleep(0.2)
                  pyautogui.click(cx, cy)
                  log_msg("PostInstall-OP1", "STEP 5 COMPLETE.")
              except Exception as e:
                  log_msg("PostInstall-OP1", f"STEP 5 ERROR: {e}")

              log_msg("PostInstall-OP1", "STEP 6: Wait 5s after center click...")
              for s in range(1, 6): log_msg("PostInstall-OP1", f"  {s}/5s..."); time.sleep(1)

              # ── STEP 7: Click "Next" 6 times ─────────────────────────────────
              # Button position is same across languages; NEXT_KEYWORDS covers all langs
              log_msg("PostInstall-OP1", f"STEP 7: Clicking Next x6 ({LANGUAGE_MODE} keywords)...")
              for i in range(1, 7):
                  desktop = Desktop(backend="uia")
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label=f"step7-next-{i}")
                  sw_now, sh_now = pyautogui.size()
                  fallback_next = (int(sw_now * 0.90), int(sh_now * 0.90))
                  clicked = click_opera_button(desktop, opera_window, software_type,
                                               keyword_list=NEXT_KEYWORDS, label=f"NEXT-{i}",
                                               fallback_coords=fallback_next)
                  log_msg("PostInstall-OP1", f"  Next {i}/6: {'clicked' if clicked else 'fallback used'}.")
                  time.sleep(2)
              log_msg("PostInstall-OP1", "STEP 7 COMPLETE.")

              # ── STEP 7b: Click "Done"/"Finish" ────────────────────────────────
              log_msg("PostInstall-OP1", f"STEP 7b: Clicking Done ({LANGUAGE_MODE} keywords)...")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label="step7b-done")
              sw_now, sh_now = pyautogui.size()
              fallback_done = (int(sw_now * 0.90), int(sh_now * 0.90))
              clicked_done = click_opera_button(desktop, opera_window, software_type,
                                               keyword_list=DONE_KEYWORDS, label="DONE",
                                               fallback_coords=fallback_done)
              log_msg("PostInstall-OP1", f"STEP 7b: {'clicked' if clicked_done else 'fallback used'}.")

              log_msg("PostInstall-OP1", "STEP 8: Wait 5s after Done...")
              for s in range(1, 6): log_msg("PostInstall-OP1", f"  {s}/5s..."); time.sleep(1)

              log_msg("PostInstall-OP1", "STEP 9: Pressing ENTER...")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label="step9-enter")
              send_keys('{ENTER}')
              log_msg("PostInstall-OP1", "STEP 9 COMPLETE.")

              log_msg("PostInstall-OP1", "STEP 10: Wait 5s after ENTER...")
              for s in range(1, 6): log_msg("PostInstall-OP1", f"  {s}/5s..."); time.sleep(1)

              # ── STEP 11: Click "Submit" ────────────────────────────────────────
              log_msg("PostInstall-OP1", f"STEP 11: Clicking Submit ({LANGUAGE_MODE} keywords)...")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label="step11-submit")
              sw_now, sh_now = pyautogui.size()
              fallback_submit = (sw_now // 2, int(sh_now * 0.85))
              clicked_submit = click_opera_button(desktop, opera_window, software_type,
                                                  keyword_list=SUBMIT_KEYWORDS, label="SUBMIT",
                                                  fallback_coords=fallback_submit)
              log_msg("PostInstall-OP1", f"STEP 11: {'clicked' if clicked_submit else 'fallback used'}.")

              log_msg("PostInstall-OP1", "STEP 12: Wait 5s after Submit...")
              for s in range(1, 6): log_msg("PostInstall-OP1", f"  {s}/5s..."); time.sleep(1)

              log_msg("PostInstall-OP1", "STEP 13: TAB cycle sequence (8->18)...")
              for cycle_idx, tab_count in enumerate(range(8, 19)):
                  log_msg("PostInstall-OP1", f"--- TAB CYCLE {cycle_idx+1}: {tab_count} TABs ---")
                  desktop = Desktop(backend="uia")
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label=f"c{cycle_idx+1}-ctrlT")
                  send_keys('^t')
                  log_msg("PostInstall-OP1", f"  Ctrl+T sent. Wait 5s...")
                  for s in range(1, 6): log_msg("PostInstall-OP1", f"    {s}/5s..."); time.sleep(1)
                  for i in range(1, tab_count + 1):
                      desktop = Desktop(backend="uia")
                      opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label=f"c{cycle_idx+1}-tab{i}")
                      log_msg("PostInstall-OP1", f"    TAB {i}/{tab_count}...")
                      send_keys('{TAB}'); time.sleep(1)
                  desktop = Desktop(backend="uia")
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label=f"c{cycle_idx+1}-enter")
                  send_keys('{ENTER}')
                  for s in range(1, 6): log_msg("PostInstall-OP1", f"    post-enter {s}/5s..."); time.sleep(1)
                  desktop = Desktop(backend="uia")
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label=f"c{cycle_idx+1}-post-ctrlT")
                  send_keys('^t')
                  for s in range(1, 6): log_msg("PostInstall-OP1", f"    post-ctrlT {s}/5s..."); time.sleep(1)
                  log_msg("PostInstall-OP1", f"--- CYCLE {cycle_idx+1} COMPLETE ---")

              log_msg("PostInstall-OP1", "=== Opera One Post-Install Complete ===")

          def opera_gx_post_install_sequence(opera_window):
              log_msg("PostInstall-OPGX", f"=== Opera GX Post-Install Starting ({LANGUAGE_MODE} mode) ===")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label="init")
              time.sleep(0.5)
              sw, sh = pyautogui.size()
              cx, cy = sw // 2, sh // 2
              log_msg("PostInstall-OPGX", f"Double-click center ({cx},{cy})...")
              try:
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label="pre-dblclick")
                  pyautogui.click(cx, cy); time.sleep(0.15); pyautogui.click(cx, cy)
              except Exception as e:
                  log_msg("PostInstall-OPGX", f"Double-click failed: {e}")
              time.sleep(random.uniform(2.0, 3.0))
              for i in range(1, 5):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"TAB4-{i}")
                  send_keys('{TAB}'); time.sleep(random.uniform(1.0, 2.0))
              for i in range(1, 9):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"ENTER8-{i}")
                  send_keys('{ENTER}'); time.sleep(random.uniform(1.0, 2.0))
              time.sleep(random.uniform(2.0, 3.0))
              for i in range(1, 7):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"TAB6-{i}")
                  send_keys('{TAB}'); time.sleep(random.uniform(1.0, 2.0))
              opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label="post-TAB6-ENTER")
              send_keys('{ENTER}')
              for s in range(1, 6):
                  if s % 2 == 0:
                      opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"wait5-{s}")
                  time.sleep(1)
              for tab_count in range(7, 17):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"CtrlT-{tab_count}")
                  send_keys('^t')
                  for i in range(1, tab_count + 1):
                      opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"TAB{tab_count}-{i}")
                      send_keys('{TAB}'); time.sleep(random.uniform(1.0, 2.0))
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"post-TAB{tab_count}-ENTER")
                  send_keys('{ENTER}')
                  for s in range(1, 6):
                      if s % 2 == 0:
                          opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"wait5-{tab_count}-{s}")
                      time.sleep(1)
              log_msg("PostInstall-OPGX", "=== Opera GX Post-Install Complete ===")

          def avg_post_install_sequence(avg_window):
              log_msg("PostInstall-AVG", f"=== AVG Post-Install Starting ({LANGUAGE_MODE} mode) ===")
              desktop = Desktop(backend="uia")
              avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label="init")
              time.sleep(0.5)
              sw, sh = pyautogui.size()
              cx, cy = sw // 2, sh // 2
              try:
                  avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label="pre-dblclick")
                  pyautogui.click(cx, cy); time.sleep(0.15); pyautogui.click(cx, cy)
              except Exception as e:
                  log_msg("PostInstall-AVG", f"Double-click failed: {e}")
              for s in range(1, 6):
                  if s % 2 == 0:
                      avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label=f"init-wait-{s}")
                  time.sleep(1)
              tab_count = 6; tab_ceiling = 17
              while tab_count < tab_ceiling:
                  avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label=f"CtrlT-{tab_count}")
                  send_keys('^t')
                  for i in range(1, tab_count + 1):
                      avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label=f"TAB{tab_count}-{i}")
                      send_keys('{TAB}'); time.sleep(random.uniform(1.0, 2.0))
                  avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label=f"ENTER-{tab_count}")
                  send_keys('{ENTER}')
                  step = random.randint(1, 2); tab_count += step
                  if tab_count < tab_ceiling:
                      for s in range(1, 6):
                          if s % 2 == 0:
                              avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label=f"wait-{tab_count}-{s}")
                          time.sleep(1)
              log_msg("PostInstall-AVG", "=== AVG Post-Install Complete ===")

          # ══════════════════════════════════════════════════════════════════════
          # MAIN AUTOMATION HANDLER
          # ══════════════════════════════════════════════════════════════════════
          def handle_automation(software_type, action_mode, timeout=360):
              desktop = Desktop(backend="uia")
              start_time = time.time()
              proxy_auth_time = start_time

              log_msg("UI-Engine", f"Started. Action={action_mode.upper()} | Type={software_type} | "
                      f"ProxyType={PROXY_TYPE} | UseProxy={USE_PROXY} | Lang={LANGUAGE_MODE}")

              last_ctrl_j_time = time.time()
              last_dl_click_time = 0
              ctrl_j_attempts = 0
              avg_download_clicked = False

              smart_link_interstitial_done = False
              smart_link_interstitial_time = 0

              opera_one_installer_executed_time = None
              opera_one_post_install_done = False
              opera_gx_installer_executed_time = None
              opera_gx_post_install_done = False
              avg_installer_executed_time = None
              avg_post_install_done = False

              sentinel_path = os.path.join(tempfile.gettempdir(), "download_done.flag")
              installer_executed_sentinel = os.path.join(tempfile.gettempdir(), "installer_executed.flag")
              download_windows_closed = False

              last_interference_sweep = 0
              INTERFERENCE_SWEEP_INTERVAL = 2

              last_auth_inject_time = 0
              AUTH_INJECT_COOLDOWN = 8

              last_dl_click_time_engine = 0
              DL_CLICK_COOLDOWN = 5

              # ── Keep button state machine ──────────────────────────────────────
              # Phase 1: After clicking download button, wait 15s then do Ctrl+J->Tab x4->Enter
              # Phase 2: After 5s, if not downloaded, try UI automation as backup
              download_button_clicked = False
              download_button_click_time = 0
              keep_keyboard_done = False
              keep_keyboard_done_time = 0
              keep_ui_backup_done = False
              KEEP_WAIT_AFTER_DL = 15    # seconds to wait after DL click before Ctrl+J sequence
              KEEP_UI_BACKUP_WAIT = 5    # seconds to wait after keyboard before UI backup

              while time.time() - start_time < timeout:
                  try:
                      desktop = Desktop(backend="uia")
                      edge_window = None
                      opera_window = None
                      avg_window = None

                      for window in desktop.windows(visible_only=True):
                          wt = window.window_text()
                          if not wt: continue
                          if "Microsoft Edge" in wt or "sudetyj" in wt or "Chrome Web Store" in wt or "Edge" in wt:
                              edge_window = window
                          if "Opera" in wt or "Speed Dial" in wt or "Start Page" in wt or "Welcome" in wt:
                              if "Microsoft Edge" not in wt and "Edge" not in wt and "Chrome Web Store" not in wt:
                                  opera_window = window
                          if "AVG" in wt:
                              avg_window = window

                      now = time.time()

                      # ── Interference sweep (only when not in Keep keyboard phase) ──
                      if not (keep_keyboard_done and not keep_ui_backup_done):
                          if now - last_interference_sweep >= INTERFERENCE_SWEEP_INTERVAL:
                              dismiss_interference_windows(desktop, software_type, label="continuous")
                              last_interference_sweep = now

                      # ── Proxy auth detection ─────────────────────────────────────
                      if USE_PROXY and (now - last_auth_inject_time > AUTH_INJECT_COOLDOWN):
                          try:
                              for auth_window in desktop.windows(visible_only=True):
                                  awt = auth_window.window_text() or ""
                                  if "Microsoft Edge" in awt and awt != "Microsoft Edge": continue
                                  if _is_target_software_window(awt, software_type): continue
                                  if _is_proxy_auth_dialog(awt):
                                      injected = inject_proxy_auth(auth_window, label=f"toplevel-{awt[:30]}")
                                      if injected:
                                          proxy_auth_time = time.time()
                                          last_auth_inject_time = now; break
                          except: pass
                          if edge_window and (now - last_auth_inject_time > AUTH_INJECT_COOLDOWN):
                              try:
                                  for child in edge_window.children():
                                      cwt = child.window_text() or ""
                                      if _is_proxy_auth_dialog(cwt):
                                          injected = inject_proxy_auth(child, label=f"edge-child-{cwt[:20]}")
                                          if injected: proxy_auth_time = time.time(); last_auth_inject_time = now; break
                              except: pass
                          if edge_window and (now - last_auth_inject_time > AUTH_INJECT_COOLDOWN):
                              try:
                                  u_struct, p_struct = _is_auth_dialog_by_structure(edge_window)
                                  if u_struct and p_struct:
                                      if not _is_address_bar_control(u_struct) and not _is_address_bar_control(p_struct):
                                          injected = inject_proxy_auth(edge_window, label="edge-structural")
                                          if injected: proxy_auth_time = time.time(); last_auth_inject_time = now
                              except: pass

                      # ── Sentinel: download file found ───────────────────────────
                      if not download_windows_closed and os.path.exists(sentinel_path):
                          log_msg("Sentinel", "Download flag detected. Closing download windows...")
                          for attempt in range(1, 8):
                              still_open = close_download_windows(desktop, attempt_label=f"#{attempt}")
                              time.sleep(2)
                              if not still_open: break
                          download_windows_closed = True
                          edge_window = None

                      # ── Post-install triggers ───────────────────────────────────
                      if action_mode == "install" and not opera_one_post_install_done:
                          is_one = (software_type == "opera_one")
                          is_dynamic = software_type in ["ad_mvn", "dynamic_opera", "opera_smart_link"]
                          if is_one or is_dynamic:
                              if opera_one_installer_executed_time is None and os.path.exists(installer_executed_sentinel):
                                  opera_one_installer_executed_time = time.time()
                              if opera_one_installer_executed_time is not None and (time.time() - opera_one_installer_executed_time) >= 50:
                                  if is_dynamic and opera_window and "GX" in opera_window.window_text().upper():
                                      opera_one_post_install_done = True
                                  else:
                                      opera_one_post_install_sequence(opera_window, software_type=software_type)
                                      opera_one_post_install_done = True

                      if action_mode == "install" and not opera_gx_post_install_done:
                          is_gx = (software_type == "opera_gx")
                          is_dynamic = software_type in ["ad_mvn", "dynamic_opera", "opera_smart_link"]
                          if is_gx or is_dynamic:
                              if opera_gx_installer_executed_time is None and os.path.exists(installer_executed_sentinel):
                                  opera_gx_installer_executed_time = time.time()
                              if opera_gx_installer_executed_time is not None and (time.time() - opera_gx_installer_executed_time) >= 40:
                                  if is_dynamic and opera_window and "GX" not in opera_window.window_text().upper():
                                      opera_gx_post_install_done = True
                                  else:
                                      opera_gx_post_install_sequence(opera_window)
                                      opera_gx_post_install_done = True

                      if software_type == "avg" and action_mode == "install" and not avg_post_install_done:
                          if avg_installer_executed_time is None and os.path.exists(installer_executed_sentinel):
                              avg_installer_executed_time = time.time()
                          if avg_installer_executed_time is not None and (time.time() - avg_installer_executed_time) >= 60:
                              avg_post_install_sequence(avg_window)
                              avg_post_install_done = True

                      # ── Cookie consent ──────────────────────────────────────────
                      if edge_window:
                          try:
                              for btn in edge_window.descendants(control_type="Button"):
                                  try: btn_txt = (btn.window_text() or "").strip()
                                  except: btn_txt = ""
                                  if btn_txt and _matches_any(btn_txt, COOKIE_KEYWORDS):
                                      try: btn.click_input(); time.sleep(1); break
                                      except: pass
                          except: pass

                      # ── Smart link interstitial ─────────────────────────────────
                      if edge_window and software_type == "opera_smart_link":
                          elapsed = time.time() - proxy_auth_time
                          if not smart_link_interstitial_done and elapsed > 20:
                              try:
                                  edge_window.set_focus(); time.sleep(0.5)
                                  send_keys('{TAB}'); time.sleep(0.5); send_keys('{ENTER}')
                                  log_msg("SmartLink", "TAB+ENTER interstitial bypass executed.")
                              except Exception as e:
                                  log_msg("SmartLink", f"Bypass failed: {e}")
                              smart_link_interstitial_done = True
                              smart_link_interstitial_time = time.time()

                      if action_mode == "click":
                          if software_type == "opera_smart_link":
                              if not smart_link_interstitial_done: time.sleep(1); continue
                              elif time.time() - smart_link_interstitial_time < 15: time.sleep(1); continue
                          time.sleep(1); continue

                      # ══════════════════════════════════════════════════════════
                      # DOWNLOAD BUTTON CLICK
                      # ══════════════════════════════════════════════════════════
                      can_click_download = True
                      if software_type == "opera_smart_link":
                          if not smart_link_interstitial_done or (time.time() - smart_link_interstitial_time < 15):
                              can_click_download = False

                      if (edge_window and action_mode == "install" and can_click_download
                              and not download_button_clicked
                              and software_type in ["opera_gx", "opera_one", "ad_mvn", "dynamic_opera", "opera_smart_link"]):
                          if now - last_dl_click_time_engine > DL_CLICK_COOLDOWN:
                              log_msg("DL-Engine", f"Opera download scan (type={software_type})...")
                              clicked = click_download_button(edge_window, software_type, label=f"opera-dl-{software_type}")
                              if clicked:
                                  download_button_clicked = True
                                  download_button_click_time = now
                                  last_dl_click_time_engine = now
                                  log_msg("DL-Engine", "Download button clicked. Starting 15s wait before Keep sequence.")
                              else:
                                  last_dl_click_time_engine = now
                                  log_msg("DL-Engine", "DL button not found — will retry next cycle.")

                      if edge_window and action_mode == "install" and software_type == "avg":
                          elapsed = time.time() - proxy_auth_time
                          if not avg_download_clicked and not download_button_clicked and elapsed > 20:
                              clicked = click_download_button(edge_window, software_type, label="avg-dl")
                              if clicked:
                                  log_msg("AVG", "AVG download button clicked.")
                                  download_button_clicked = True
                                  download_button_click_time = now
                                  avg_download_clicked = True
                              else:
                                  log_msg("AVG", "AVG DL not found — keyboard fallback.")
                                  try:
                                      edge_window.set_focus(); time.sleep(0.5)
                                      send_keys('{TAB}'); time.sleep(random.uniform(1.0, 2.0))
                                      send_keys('{ENTER}')
                                      download_button_clicked = True
                                      download_button_click_time = now
                                      avg_download_clicked = True
                                      log_msg("AVG", "TAB+ENTER keyboard fallback sent.")
                                      for w in range(1, 11):
                                          log_msg("AVG", f"Download init wait: {w}/10s...")
                                          time.sleep(1)
                                  except Exception as e:
                                      log_msg("AVG", f"Keyboard sequence error: {e}")

                      # ══════════════════════════════════════════════════════════
                      # KEEP BUTTON — PRIMARY: Keyboard (Ctrl+J -> Tab x4 -> Enter)
                      # After clicking download, wait 15s, then do the keyboard sequence.
                      # No other mouse/keyboard actions happen during this window.
                      # ══════════════════════════════════════════════════════════
                      if (edge_window and action_mode == "install"
                              and download_button_clicked and not keep_keyboard_done
                              and not os.path.exists(sentinel_path)):
                          elapsed_since_dl = now - download_button_click_time
                          if elapsed_since_dl >= KEEP_WAIT_AFTER_DL:
                              log_msg("Keep", f"{elapsed_since_dl:.1f}s elapsed since DL click. Executing keyboard Keep sequence...")
                              do_keep_via_keyboard(edge_window, label="primary-keyboard")
                              keep_keyboard_done = True
                              keep_keyboard_done_time = now
                              log_msg("Keep", "Keyboard Keep sequence done. Waiting 5s before UI backup check...")
                              time.sleep(1)
                          else:
                              log_msg("Keep", f"Waiting for 15s DL delay: {elapsed_since_dl:.1f}/{KEEP_WAIT_AFTER_DL}s...")
                              time.sleep(1); continue

                      # ══════════════════════════════════════════════════════════
                      # KEEP BUTTON — BACKUP: UI Automation (only if not downloaded yet)
                      # Runs 5s after keyboard sequence if file sentinel not yet present
                      # ══════════════════════════════════════════════════════════
                      if (edge_window and action_mode == "install"
                              and keep_keyboard_done and not keep_ui_backup_done
                              and not os.path.exists(sentinel_path)):
                          elapsed_since_kb = now - keep_keyboard_done_time
                          if elapsed_since_kb >= KEEP_UI_BACKUP_WAIT:
                              log_msg("Keep", f"File not yet downloaded {elapsed_since_kb:.1f}s after keyboard. Running UI backup...")
                              do_keep_via_ui_automation(edge_window, label="backup-ui")
                              keep_ui_backup_done = True
                          else:
                              log_msg("Keep", f"Waiting {KEEP_UI_BACKUP_WAIT}s before UI backup: {elapsed_since_kb:.1f}s elapsed...")
                              time.sleep(1); continue

                      # Extension buttons
                      if edge_window and action_mode == "install":
                          add_ext_btns = edge_window.descendants(control_type="Button", title="Add extension")
                          if add_ext_btns:
                              try:
                                  edge_window.set_focus(); time.sleep(0.5)
                                  add_ext_btns[0].click_input()
                                  log_msg("Extension", "Clicked 'Add extension'."); time.sleep(2)
                              except: pass
                          else:
                              for btn_name in ["Add to Chrome", "Get"]:
                                  install_btns = edge_window.descendants(control_type="Button", title=btn_name)
                                  if install_btns:
                                      try:
                                          edge_window.set_focus(); time.sleep(0.5)
                                          install_btns[0].click_input()
                                          log_msg("Extension", f"Clicked '{btn_name}'."); time.sleep(2); break
                                      except: pass

                      # Legacy Ctrl+J (only if Keep keyboard not yet done and no DL button clicked yet)
                      can_ctrl_j = True
                      if software_type == "avg" and not avg_download_clicked: can_ctrl_j = False
                      if download_button_clicked: can_ctrl_j = False  # Don't repeat Ctrl+J after DL click

                      if (action_mode == "install" and not keep_keyboard_done and edge_window
                              and can_ctrl_j and (time.time() - last_ctrl_j_time > 15) and ctrl_j_attempts < 4):
                          try:
                              edge_window.set_focus(); time.sleep(0.5)
                              log_msg("Utility", f"Ctrl+J (attempt {ctrl_j_attempts+1}/4)...")
                              send_keys('^j')
                              last_ctrl_j_time = time.time(); ctrl_j_attempts += 1
                          except Exception as e:
                              log_msg("Utility", f"Ctrl+J failed: {e}")

                  except Exception as e:
                      pass
                  time.sleep(1)

          if __name__ == "__main__":
              software_type = sys.argv[1] if len(sys.argv) > 1 else "avg"
              action_mode   = sys.argv[2] if len(sys.argv) > 2 else "install"
              handle_automation(software_type, action_mode)
          '@
          $handlerPy | Out-File -FilePath "$env:TEMP\auto_handler.py" -Encoding utf8

          Write-Host "[UI-Engine] Spinning up background Python process..." -ForegroundColor DarkGray
          Start-Process -FilePath "python" `
              -ArgumentList "-u `"$env:TEMP\auto_handler.py`" `"$env:SOFTWARE_TYPE`" `"$env:ACTION_MODE`"" `
              -WindowStyle Hidden

          $dlFolder    = "$env:USERPROFILE\Downloads"
          $timeoutSecs = 330
          $softwareType = $env:SOFTWARE_TYPE
          $exeFilter   = $env:EXE_FILTER
          $sentinelPath = "$env:TEMP\download_done.flag"
          $installerExecutedSentinel = "$env:TEMP\installer_executed.flag"

          if ($env:ACTION_MODE -eq "install") {
              Write-Host "[Watcher] INSTALL mode — monitoring download directory..." -ForegroundColor Cyan
              $installJob = Start-Job -ScriptBlock {
                  param($dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath, $installerExecutedSentinel)
                  $deadline  = (Get-Date).AddSeconds($timeoutSecs)
                  $installed = $false
                  Write-Output "[$($softwareType.ToUpper())-WATCHER] Tracking: $dlFolder | Filter: $exeFilter"
                  while (-not $installed -and (Get-Date) -lt $deadline) {
                      $candidates = Get-ChildItem -Path $dlFolder -Filter $exeFilter -ErrorAction SilentlyContinue |
                          Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } |
                          Sort-Object LastWriteTime -Descending
                      if ($candidates.Count -gt 0) {
                          $file = $candidates[0]
                          Write-Output "[$($softwareType.ToUpper())-WATCHER] Payload found: $($file.Name)"
                          try { Set-Content -Path $sentinelPath -Value "done" -ErrorAction SilentlyContinue } catch {}
                          Write-Output "[$($softwareType.ToUpper())-WATCHER] Sentinel flag set."
                          Write-Output "[$($softwareType.ToUpper())-WATCHER] Closing Edge download tabs..."
                          for ($closeAttempt = 1; $closeAttempt -le 4; $closeAttempt++) {
                              try {
                                  $wsh = New-Object -ComObject WScript.Shell
                                  $edgeProcs = Get-Process -Name "msedge" -ErrorAction SilentlyContinue |
                                      Where-Object { $_.MainWindowHandle -ne 0 } | Sort-Object StartTime -Descending
                                  if ($edgeProcs) {
                                      foreach ($edgeProc in $edgeProcs) {
                                          $wsh.AppActivate($edgeProc.Id); Start-Sleep -Milliseconds 600
                                          $wsh.SendKeys("^w"); Start-Sleep -Milliseconds 400
                                          $wsh.SendKeys("^w"); Start-Sleep -Milliseconds 400
                                      }
                                  } else {
                                      $wsh.SendKeys("^w"); Start-Sleep -Milliseconds 500; $wsh.SendKeys("^w")
                                  }
                                  Start-Sleep -Milliseconds 800
                                  $remaining = Get-Process -Name "msedge" -ErrorAction SilentlyContinue | Where-Object { $_.MainWindowHandle -ne 0 }
                                  if (-not $remaining) { Write-Output "[$($softwareType.ToUpper())-WATCHER] Edge closed on attempt $closeAttempt."; break }
                              } catch { Write-Output "[$($softwareType.ToUpper())-WATCHER] Close attempt $closeAttempt failed: $_" }
                              Start-Sleep -Milliseconds 500
                          }
                          $actualSoftware = $softwareType
                          if ($softwareType -in @("ad_mvn","dynamic_opera","opera_smart_link")) {
                              if ($file.Name -match "OperaGX") { $actualSoftware = "opera_gx" }
                              else { $actualSoftware = "opera_one" }
                          }
                          Write-Output "[$($actualSoftware.ToUpper())-INSTALL] Checking file lock..."
                          $locked = $true
                          while ($locked) {
                              Start-Sleep -Seconds 2
                              try {
                                  $s = [System.IO.File]::Open($file.FullName, 'Open', 'Read', 'None')
                                  $s.Close(); $locked = $false
                                  Write-Output "[$($actualSoftware.ToUpper())-INSTALL] File unlocked."
                              } catch {}
                          }
                          try { Set-Content -Path $installerExecutedSentinel -Value "done" -ErrorAction SilentlyContinue } catch {}
                          Write-Output "[$($actualSoftware.ToUpper())-INSTALL] Running installer: $($file.FullName) /silent"
                          try {
                              Start-Process -FilePath $file.FullName -ArgumentList "/silent" -Wait
                              Write-Output "[$($actualSoftware.ToUpper())-INSTALL] Installer complete."
                          } catch {
                              Write-Output "[$($actualSoftware.ToUpper())-INSTALL] Installer error: $_"
                          }
                          Write-Output "[$($actualSoftware.ToUpper())-POST] Scanning for executable..."
                          if ($actualSoftware -eq "opera_gx") {
                              $appPaths = @(
                                  "$env:LOCALAPPDATA\Programs\Opera GX\launcher.exe",
                                  "$env:LOCALAPPDATA\Programs\Opera GX\opera.exe",
                                  "C:\Program Files\Opera GX\launcher.exe",
                                  "C:\Program Files\Opera GX\opera.exe",
                                  "C:\Program Files (x86)\Opera GX\launcher.exe",
                                  "C:\Program Files (x86)\Opera GX\opera.exe"
                              )
                          } elseif ($actualSoftware -eq "opera_one") {
                              $appPaths = @(
                                  "$env:LOCALAPPDATA\Programs\Opera\launcher.exe",
                                  "$env:LOCALAPPDATA\Programs\Opera\opera.exe",
                                  "C:\Program Files\Opera\launcher.exe",
                                  "C:\Program Files\Opera\opera.exe",
                                  "C:\Program Files (x86)\Opera\launcher.exe",
                                  "C:\Program Files (x86)\Opera\opera.exe"
                              )
                          } else {
                              $appPaths = @(
                                  "C:\Program Files\AVG\Browser\Application\AVGBrowser.exe",
                                  "C:\Program Files (x86)\AVG\Browser\Application\AVGBrowser.exe",
                                  "C:\Program Files\AVG\Antivirus\AVGUI.exe",
                                  "C:\Program Files (x86)\AVG\Antivirus\AVGUI.exe"
                              )
                          }
                          $launched = $false
                          for ($i = 0; $i -lt 300; $i++) {
                              foreach ($p in $appPaths) {
                                  if (Test-Path $p) {
                                      Start-Sleep -Seconds 3
                                      Write-Output "[$($actualSoftware.ToUpper())-POST] Launching: $p"
                                      Start-Process -FilePath $p; $launched = $true; break
                                  }
                              }
                              if ($launched) { break }
                              Start-Sleep -Seconds 2
                          }
                          if (-not $launched) {
                              Write-Output "[$($actualSoftware.ToUpper())-POST] FATAL: Executable not found."
                          }
                          $installed = $true
                      } else {
                          Start-Sleep -Seconds 5
                      }
                  }
                  if (-not $installed) { Write-Output "[$($softwareType.ToUpper())-WATCHER] Timeout reached." }
              } -ArgumentList $dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath, $installerExecutedSentinel
          }

          $edgeExe = "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
          if (-Not (Test-Path $edgeExe)) {
              $edgeExe = "C:\Program Files\Microsoft\Edge\Application\msedge.exe"
          }

          # Build locale-aware Edge accept-language header
          $localeTag = $env:WINDOWS_LOCALE
          if (-not $localeTag) { $localeTag = "en-US" }
          # In English mode, always use en-US accept-language even if locale was set for TZ
          if ($langMode -eq "English") { $localeTag = "en-US" }
          $langCode = $localeTag.ToLower()
          $langPrimary = $langCode.Split("-")[0]
          $acceptLang = if ($langMode -eq "English") { "en-US,en;q=0.9" } else { "$langCode,$langPrimary;q=0.9,en;q=0.8" }

          $edgeArgs = @(
              "--no-first-run",
              "--no-default-browser-check",
              "--disable-sync",
              "--safebrowsing-disable-download-protection",
              "--disable-features=msSmartScreenProtection,SmartScreenPuaEnabled",
              "--lang=$langCode",
              "--accept-lang=$acceptLang"
          )
          if ($useProxy) {
              $edgeArgs += "--proxy-server=`"http://$proxyServer`""
          }
          $edgeArgs += "`"$env:TARGET_URL`""

          Write-Host "[System] Launching Edge | Locale: $langCode | Accept-Language: $acceptLang | Mode: $langMode" -ForegroundColor DarkCyan
          Start-Process -FilePath $edgeExe -ArgumentList ($edgeArgs -join " ")
          Write-Host "========== RUNTIME EXECUTION ==========" -ForegroundColor Cyan

          if ($env:ACTION_MODE -eq "install") {
              Write-Host "[Runtime] INSTALL pathway — monitoring watcher job..." -ForegroundColor Cyan
              $deadline = (Get-Date).AddSeconds($timeoutSecs)
              while ($true) {
                  $output = Receive-Job -Job $installJob -ErrorAction SilentlyContinue
                  if ($output) { foreach ($line in $output) { Write-Host $line } }
                  if ($installJob.State -eq 'Completed' -or $installJob.State -eq 'Failed' -or (Get-Date) -gt $deadline) { break }
                  Start-Sleep -Seconds 5
              }
              Write-Host "[Runtime] Install job concluded." -ForegroundColor Green
          } else {
              Write-Host "[Runtime] CLICK-ONLY pathway." -ForegroundColor Magenta
              if ($env:SOFTWARE_TYPE -eq "opera_smart_link") {
                  Write-Host "[Runtime] Allowing 75s for TAB/ENTER interstitial routing..." -ForegroundColor Yellow
              } else {
                  Write-Host "[Runtime] Allowing 75s for page load..." -ForegroundColor Yellow
              }
              $clickStart      = Get-Date
              $clickTotal      = 75
              $step            = 15
              $reloadFired     = $false
              $reloadThreshold = Get-Random -Minimum 20 -Maximum 61
              for ($w = 0; $w -lt $clickTotal; $w += $step) {
                  Write-Host "[$env:SOFTWARE_TYPE] Click tracker: $w/$clickTotal seconds..." -ForegroundColor Yellow
                  if (-not $reloadFired) {
                      $elapsed = [int]((Get-Date) - $clickStart).TotalSeconds
                      if ($elapsed -ge $reloadThreshold) {
                          try {
                              $wsh = New-Object -ComObject WScript.Shell
                              $wsh.SendKeys('{F5}')
                              Write-Host "[$env:SOFTWARE_TYPE] F5 reload sent." -ForegroundColor Green
                          } catch {
                              Write-Host "[$env:SOFTWARE_TYPE] F5 failed: $_" -ForegroundColor Red
                          }
                          $reloadFired = $true
                      }
                  }
                  Start-Sleep -Seconds $step
              }
              Write-Host "[Runtime] Click path complete." -ForegroundColor Green
              exit 0
          }

      - name: Keep Runner Alive
        if: always() && matrix.action_mode == 'install'
        shell: pwsh
        run: |
          Write-Host "Session lifecycle fully executed." -ForegroundColor Green
          Write-Host "Leaving runner online for remaining timeout margin..." -ForegroundColor DarkGray
          Start-Sleep -Seconds 360
