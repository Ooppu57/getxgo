              return None, None

          def _is_download_done_window(text):
              t = text.lower()
              return any(frag.lower() in t for frag in DOWNLOAD_DONE_TITLES)

          def _is_interference_window(text):
              if not text:
                  return False
              for exact in INTERFERENCE_TITLES:
                  if text.strip().lower() == exact.strip().lower():
                      return True
              tl = text.lower()
              for sub in INTERFERENCE_SUBSTRINGS:
                  if sub in tl:
                      return True
              return False

          def _is_target_software_window(text, software_type):
              if not text:
                  return False
              tl = text.lower()
              if software_type == "avg":
                  return "avg" in tl
              elif software_type in ["opera_gx"]:
                  return ("opera" in tl and "gx" in tl) or "opera gx" in tl
              elif software_type in ["opera_one", "opera_smart_link", "dynamic_opera", "ad_mvn"]:
                  return "opera" in tl and "edge" not in tl and "chrome web store" not in tl
              return False

          # ══════════════════════════════════════════════════════════════════════
          # MULTILINGUAL DOWNLOAD BUTTON FINDER
          # ══════════════════════════════════════════════════════════════════════
          def find_download_button_multilingual(edge_window, software_type, label=""):
              if edge_window is None:
                  return None, None

              if software_type in ["opera_gx", "opera_one", "opera_smart_link",
                                    "dynamic_opera", "ad_mvn"]:
                  primary_keywords = OPERA_DOWNLOAD_KEYWORDS
                  brand_label = "Opera"
              elif software_type == "avg":
                  primary_keywords = AVG_DOWNLOAD_KEYWORDS
                  brand_label = "AVG"
              else:
                  primary_keywords = UNIVERSAL_DOWNLOAD_KEYWORDS
                  brand_label = "Generic"

              # Strategy 1: Brand-specific Button match
              try:
                  for btn in edge_window.descendants(control_type="Button"):
                      try:
                          txt = (btn.window_text() or "").strip()
                      except Exception:
                          txt = ""
                      try:
                          name = (btn.element_info.name or "").strip()
                      except Exception:
                          name = ""
                      combined = (txt + " " + name).strip()
                      if combined and _matches_any(combined, primary_keywords):
                          log_msg("DL-Find", f"[{label}] Strategy1 ({brand_label} Button): '{combined[:60]}'")
                          return btn, f"s1-{brand_label}-button"
              except Exception as e:
                  log_msg("DL-Find", f"[{label}] Strategy1 scan error: {e}")

              # Strategy 2: Universal Button keyword match
              try:
                  for btn in edge_window.descendants(control_type="Button"):
                      try:
                          txt = (btn.window_text() or "").strip()
                      except Exception:
                          txt = ""
                      try:
                          name = (btn.element_info.name or "").strip()
                      except Exception:
                          name = ""
                      combined = (txt + " " + name).strip()
                      if combined and _matches_any(combined, UNIVERSAL_DOWNLOAD_KEYWORDS):
                          if len(combined) > 2:
                              log_msg("DL-Find", f"[{label}] Strategy2 (Universal Button): '{combined[:60]}'")
                              return btn, "s2-universal-button"
              except Exception as e:
                  log_msg("DL-Find", f"[{label}] Strategy2 scan error: {e}")

              # Strategy 3: Hyperlink / Text / Image with interstitial keywords
              try:
                  for el in edge_window.descendants():
                      try:
                          ctrl_type = el.element_info.control_type
                      except Exception:
                          continue
                      if ctrl_type not in ["Hyperlink", "Text", "Image"]:
                          continue
                      try:
                          wt = (el.window_text() or "").strip()
                      except Exception:
                          wt = ""
                      if not wt or len(wt) > 200:
                          continue
                      if "http" in wt.lower() or "www." in wt.lower():
                          continue
                      if _matches_any(wt, primary_keywords + INTERSTITIAL_LINK_KEYWORDS):
                          if len(wt) <= 80:
                              log_msg("DL-Find", f"[{label}] Strategy3 ({ctrl_type} link): '{wt[:60]}'")
                              return el, f"s3-{ctrl_type.lower()}-link"
              except Exception as e:
                  log_msg("DL-Find", f"[{label}] Strategy3 scan error: {e}")

              # Strategy 4: Broad last-resort scan
              try:
                  all_keywords_combined = list(set(
                      primary_keywords + UNIVERSAL_DOWNLOAD_KEYWORDS + INTERSTITIAL_LINK_KEYWORDS
                  ))
                  for el in edge_window.descendants():
                      try:
                          ctrl_type = el.element_info.control_type
                      except Exception:
                          continue
                      if ctrl_type not in ["Button", "Hyperlink", "Text", "Image", "Custom"]:
                          continue
                      try:
                          wt = (el.window_text() or "").strip()
                      except Exception:
                          wt = ""
                      if not wt or len(wt) > 100:
                          continue
                      if "http" in wt.lower() or "www." in wt.lower():
                          continue
                      if _matches_any_exact_start(wt, all_keywords_combined):
                          log_msg("DL-Find", f"[{label}] Strategy4 (broad scan, {ctrl_type}): '{wt[:60]}'")
                          return el, f"s4-broad-{ctrl_type.lower()}"
              except Exception as e:
                  log_msg("DL-Find", f"[{label}] Strategy4 scan error: {e}")

              log_msg("DL-Find", f"[{label}] No download element found after all 4 strategies.")
              return None, None

          def click_download_button_multilingual(edge_window, software_type, label=""):
              element, strategy = find_download_button_multilingual(edge_window, software_type, label=label)
              if element is None:
                  return False

              try:
                  edge_window.set_focus()
                  time.sleep(0.4)
              except Exception:
                  pass

              try:
                  element.click_input()
                  log_msg("DL-Click", f"[{label}] click_input() succeeded via {strategy}.")
                  return True
              except Exception as e1:
                  log_msg("DL-Click", f"[{label}] click_input() failed: {e1}")

              try:
                  element.invoke()
                  log_msg("DL-Click", f"[{label}] invoke() succeeded via {strategy}.")
                  return True
              except Exception as e2:
                  log_msg("DL-Click", f"[{label}] invoke() failed: {e2}")

              try:
                  rect = element.rectangle()
                  cx = (rect.left + rect.right) // 2
                  cy = (rect.top + rect.bottom) // 2
                  pyautogui.moveTo(cx, cy, duration=0.25)
                  time.sleep(0.15)
                  pyautogui.click(cx, cy)
                  log_msg("DL-Click", f"[{label}] pyautogui click at ({cx},{cy}) succeeded via {strategy}.")
                  return True
              except Exception as e3:
                  log_msg("DL-Click", f"[{label}] pyautogui click failed: {e3}")

              log_msg("DL-Click", f"[{label}] All click strategies exhausted for element via {strategy}.")
              return False

          # ══════════════════════════════════════════════════════════════════════
          # MULTILINGUAL "KEEP" BUTTON FINDER & CLICKER
          #
          # Searches Edge download warning bar for "Keep" / "Keep anyway" in
          # any supported language. Uses 3 strategies:
          #   1. Exact/partial Button title match against KEEP_DOWNLOAD_KEYWORDS
          #   2. Descendant scan (ToolBar, Pane, notification area)
          #   3. Keyboard fallback (Alt+K shortcut then Tab+Enter)
          # ══════════════════════════════════════════════════════════════════════
          def click_keep_button_multilingual(edge_window, label=""):
              """
              Find and click the multilingual 'Keep' / 'Keep anyway' button in
              Edge's download warning bar. Returns True if clicked successfully.
              """
              if edge_window is None:
                  return False

              clicked = False

              # ── Strategy 1: Direct Button descendants with keyword match ──────
              try:
                  for btn in edge_window.descendants(control_type="Button"):
                      try:
                          txt = (btn.window_text() or "").strip()
                      except Exception:
                          txt = ""
                      try:
                          name = (btn.element_info.name or "").strip()
                      except Exception:
                          name = ""
                      combined = (txt + " " + name).strip()
                      if combined and _matches_any(combined, KEEP_DOWNLOAD_KEYWORDS):
                          # Extra guard: skip if the text is too long (not a button label)
                          if len(combined) <= 60:
                              log_msg("Keep", f"[{label}] Strategy1 (Button): '{combined[:50]}'")
                              try:
                                  edge_window.set_focus()
                                  time.sleep(0.3)
                                  btn.click_input()
                                  log_msg("Keep", f"[{label}] click_input() on '{combined[:30]}' succeeded.")
                                  return True
                              except Exception as e1:
                                  log_msg("Keep", f"[{label}] click_input() failed: {e1}")
                                  try:
                                      btn.invoke()
                                      log_msg("Keep", f"[{label}] invoke() on '{combined[:30]}' succeeded.")
                                      return True
                                  except Exception as e2:
                                      log_msg("Keep", f"[{label}] invoke() failed: {e2}")
                                      try:
                                          rect = btn.rectangle()
                                          cx = (rect.left + rect.right) // 2
                                          cy = (rect.top + rect.bottom) // 2
                                          pyautogui.moveTo(cx, cy, duration=0.2)
                                          time.sleep(0.1)
                                          pyautogui.click(cx, cy)
                                          log_msg("Keep", f"[{label}] pyautogui click at ({cx},{cy}) succeeded.")
                                          return True
                                      except Exception as e3:
                                          log_msg("Keep", f"[{label}] pyautogui click failed: {e3}")
              except Exception as e:
                  log_msg("Keep", f"[{label}] Strategy1 scan error: {e}")

              # ── Strategy 2: Scan ToolBar/Pane/notification area descendants ──
              try:
                  for container_type in ["ToolBar", "Pane", "Group", "Custom"]:
                      try:
                          containers = edge_window.descendants(control_type=container_type)
                      except Exception:
                          continue
                      for container in containers:
                          try:
                              for el in container.descendants():
                                  try:
                                      ctrl_type = el.element_info.control_type
                                  except Exception:
                                      continue
                                  if ctrl_type not in ["Button", "Hyperlink", "Text"]:
                                      continue
                                  try:
                                      wt = (el.window_text() or "").strip()
                                  except Exception:
                                      wt = ""
                                  try:
                                      nm = (el.element_info.name or "").strip()
                                  except Exception:
                                      nm = ""
                                  combined = (wt + " " + nm).strip()
                                  if combined and len(combined) <= 60 and _matches_any(combined, KEEP_DOWNLOAD_KEYWORDS):
                                      log_msg("Keep", f"[{label}] Strategy2 ({container_type}->{ctrl_type}): '{combined[:50]}'")
                                      try:
                                          edge_window.set_focus()
                                          time.sleep(0.3)
                                          el.click_input()
                                          log_msg("Keep", f"[{label}] Strategy2 click_input() succeeded.")
                                          return True
                                      except Exception:
                                          try:
                                              el.invoke()
                                              log_msg("Keep", f"[{label}] Strategy2 invoke() succeeded.")
                                              return True
                                          except Exception:
                                              try:
                                                  rect = el.rectangle()
                                                  cx = (rect.left + rect.right) // 2
                                                  cy = (rect.top + rect.bottom) // 2
                                                  pyautogui.click(cx, cy)
                                                  log_msg("Keep", f"[{label}] Strategy2 pyautogui click succeeded.")
                                                  return True
                                              except Exception:
                                                  pass
                          except Exception:
                              pass
              except Exception as e:
                  log_msg("Keep", f"[{label}] Strategy2 scan error: {e}")

              # ── Strategy 3: Keyboard fallback ──────────────────────────────────
              # Edge download warning bar responds to keyboard shortcuts.
              # Alt+K = "Keep" in English Edge; Tab+Enter navigates to first button.
              log_msg("Keep", f"[{label}] Strategy3: Attempting keyboard fallback for Keep button...")
              try:
                  edge_window.set_focus()
                  time.sleep(0.5)
                  # Try Alt+K shortcut (Edge English shortcut for Keep)
                  send_keys('%k')
                  time.sleep(0.5)
                  log_msg("Keep", f"[{label}] Strategy3: Alt+K sent.")
                  return True
              except Exception as ek:
                  log_msg("Keep", f"[{label}] Strategy3 Alt+K failed: {ek}")
                  try:
                      # Fallback: Tab to navigate download bar buttons then Enter
                      send_keys('{TAB}')
                      time.sleep(0.3)
                      send_keys('{ENTER}')
                      time.sleep(0.3)
                      log_msg("Keep", f"[{label}] Strategy3: Tab+Enter fallback sent.")
                      return True
                  except Exception as et:
                      log_msg("Keep", f"[{label}] Strategy3 Tab+Enter failed: {et}")

              log_msg("Keep", f"[{label}] All Keep strategies exhausted. Button not found/clicked.")
              return False

          def dismiss_interference_windows(desktop, software_type, label=""):
              dismissed_any = False
              try:
                  all_windows = desktop.windows(visible_only=True)
              except Exception:
                  return False

              for window in all_windows:
                  try:
                      wt = window.window_text()
                      if not wt:
                          continue
                      if "Microsoft Edge" in wt or "msedge" in wt.lower():
                          continue
                      if _is_target_software_window(wt, software_type):
                          continue
                      if not _is_interference_window(wt):
                          continue

                      log_msg("WinGuard", f"Interference window detected: '{wt}' [{label}]")
                      closed = False

                      try:
                          window.set_focus()
                          time.sleep(0.25)
                          send_keys('%{F4}')
                          time.sleep(0.4)
                          closed = True
                          log_msg("WinGuard", f"Closed '{wt}' via Alt+F4.")
                      except Exception as e:
                          log_msg("WinGuard", f"Alt+F4 failed for '{wt}': {e}")

                      if not closed:
                          try:
                              window.close()
                              time.sleep(0.3)
                              closed = True
                              log_msg("WinGuard", f"Closed '{wt}' via window.close().")
                          except Exception as e:
                              log_msg("WinGuard", f"window.close() failed for '{wt}': {e}")

                      if not closed:
                          try:
                              window.minimize()
                              time.sleep(0.25)
                              log_msg("WinGuard", f"Minimized '{wt}' as fallback.")
                              closed = True
                          except Exception as e:
                              log_msg("WinGuard", f"minimize() failed for '{wt}': {e}")

                      if closed:
                          dismissed_any = True

                  except Exception:
                      pass

              return dismissed_any

          def robust_maximize_opera_window(desktop, software_type, label=""):
              found_window = None

              dismiss_interference_windows(desktop, software_type, label=f"{label}-pre-dismiss")
              time.sleep(0.3)

              for attempt in range(1, 6):
                  log_msg("MaximizeOp", f"[{label}] Window search attempt {attempt}/5...")
                  try:
                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text()
                          if wt and _is_target_software_window(wt, software_type):
                              found_window = w
                              log_msg("MaximizeOp", f"[{label}] Found Opera window: '{wt}'")
                              break
                  except Exception as e:
                      log_msg("MaximizeOp", f"[{label}] Window search error: {e}")

                  if found_window:
                      break
                  log_msg("MaximizeOp", f"[{label}] Opera window not found yet. Waiting 3s...")
                  time.sleep(3)

              if not found_window:
                  log_msg("MaximizeOp", f"[{label}] ERROR: Opera window not found after 5 attempts.")
                  return None

              log_msg("MaximizeOp", f"[{label}] Starting robust maximize sequence...")

              try:
                  found_window.set_focus()
                  time.sleep(0.4)
                  found_window.maximize()
                  time.sleep(0.5)
                  log_msg("MaximizeOp", f"[{label}] Strategy 1 (pywinauto maximize): Applied.")
              except Exception as e:
                  log_msg("MaximizeOp", f"[{label}] Strategy 1 failed: {e}")

              try:
                  found_window.set_focus()
                  time.sleep(0.3)
                  send_keys('{VK_LWIN down}{UP}{VK_LWIN up}')
                  time.sleep(0.4)
                  send_keys('{VK_LWIN down}{UP}{VK_LWIN up}')
                  time.sleep(0.4)
                  log_msg("MaximizeOp", f"[{label}] Strategy 2 (Win+Up x2): Applied.")
              except Exception as e:
                  log_msg("MaximizeOp", f"[{label}] Strategy 2 failed: {e}")

              try:
                  hwnd = found_window.handle
                  ctypes.windll.user32.ShowWindow(hwnd, 9)
                  time.sleep(0.4)
                  log_msg("MaximizeOp", f"[{label}] Strategy 3 (ctypes SW_MAXIMIZE): Applied.")
              except Exception as e:
                  log_msg("MaximizeOp", f"[{label}] Strategy 3 failed: {e}")

              try:
                  user32 = ctypes.windll.user32
                  sw = user32.GetSystemMetrics(0)
                  sh = user32.GetSystemMetrics(1)
                  hwnd = found_window.handle
                  user32.SetWindowPos(hwnd, -1, 0, 0, sw, sh, 0x0040 | 0x0020)
                  time.sleep(0.3)
                  user32.SetWindowPos(hwnd, -2, 0, 0, sw, sh, 0x0040 | 0x0020)
                  time.sleep(0.3)
                  log_msg("MaximizeOp", f"[{label}] Strategy 4 (SetWindowPos {sw}x{sh}): Applied.")
              except Exception as e:
                  log_msg("MaximizeOp", f"[{label}] Strategy 4 failed: {e}")

              try:
                  found_window.set_focus()
                  time.sleep(0.2)
                  found_window.maximize()
                  time.sleep(0.3)
                  found_window.set_focus()
                  time.sleep(0.2)
                  log_msg("MaximizeOp", f"[{label}] Strategy 5 (final focus+maximize): Applied.")
              except Exception as e:
                  log_msg("MaximizeOp", f"[{label}] Strategy 5 failed: {e}")

              log_msg("MaximizeOp", f"[{label}] Robust maximize sequence complete. Window: '{found_window.window_text()}'")
              return found_window

          def force_maximize_and_focus_target(desktop, target_window, software_type, label=""):
              dismiss_interference_windows(desktop, software_type, label=f"{label}-dismiss")
              time.sleep(0.3)

              found_window = target_window
              if found_window is None:
                  try:
                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text()
                          if wt and _is_target_software_window(wt, software_type):
                              found_window = w
                              break
                  except Exception:
                      pass

              if found_window is None:
                  log_msg("WinGuard", f"[{label}] No target window found to maximize/focus.")
                  return None

              try:
                  found_window.set_focus()
                  time.sleep(0.2)
                  found_window.maximize()
                  time.sleep(0.3)
                  found_window.set_focus()
                  time.sleep(0.2)
                  log_msg("WinGuard", f"[{label}] Target window maximized and focused: '{found_window.window_text()}'")
                  return found_window
              except Exception as e:
                  log_msg("WinGuard", f"[{label}] maximize/focus failed: {e}")
                  return found_window

          def close_download_windows(desktop, attempt_label=""):
              closed_any = False
              try:
                  all_windows = desktop.windows(visible_only=True)
              except Exception: return False

              for window in all_windows:
                  try:
                      wt = window.window_text()
                      if not wt: continue

                      is_match = _is_download_done_window(wt)
                      if not is_match and ("Microsoft Edge" in wt or wt == "Edge"):
                          try:
                              for child in window.children():
                                  child_wt = child.window_text()
                                  if child_wt and _is_download_done_window(child_wt):
                                      is_match = True
                                      break
                          except Exception: pass

                      if not is_match: continue

                      log_msg("EdgeClose", f"Targeting Edge window '{wt}' for close (Attempt {attempt_label})")
                      closed = False

                      try:
                          log_msg("EdgeClose", "Focusing Edge window...")
                          window.set_focus()
                          time.sleep(0.4)
                          sw, sh = pyautogui.size()
                          cx, cy = sw // 2, sh // 2
                          pyautogui.click(cx, cy)
                          time.sleep(0.5)
                          log_msg("EdgeClose", "Sending Ctrl+W (1st) — close current tab...")
                          send_keys('^w')
                          time.sleep(0.5)
                          log_msg("EdgeClose", "Sending Ctrl+W (2nd) — close remaining tabs...")
                          send_keys('^w')
                          time.sleep(0.4)
                          closed = True
                          log_msg("EdgeClose", "Ctrl+W executed successfully.")
                      except Exception as e:
                          log_msg("EdgeClose", f"Ctrl+W sequence failed: {e}")

                      if not closed:
                          try:
                              window.set_focus()
                              time.sleep(0.4)
                              send_keys('^j')
                              time.sleep(0.6)
                              send_keys('^j')
                              time.sleep(0.4)
                              closed = True
                              log_msg("EdgeClose", "Ctrl+J double-tap executed.")
                          except Exception as e:
                              log_msg("EdgeClose", f"Ctrl+J fallback failed: {e}")

                      if not closed:
                          try:
                              window.set_focus()
                              time.sleep(0.3)
                              send_keys('%{F4}')
                              closed = True
                              log_msg("EdgeClose", "Alt+F4 fallback executed.")
                          except Exception as e:
                              log_msg("EdgeClose", f"Alt+F4 fallback failed: {e}")

                      if closed:
                          closed_any = True
                          time.sleep(0.5)
                  except Exception: pass
              return closed_any

          def refocus_target_window(target_window, software_type, label=""):
              desktop = Desktop(backend="uia")
              result = force_maximize_and_focus_target(desktop, target_window, software_type, label=label)
              return result if result else target_window

          # ══════════════════════════════════════════════════════════════════════
          # MULTILINGUAL OPERA BUTTON CLICKER
          #
          # Replaces the original click_opera_button() which only accepted
          # English button name strings. This version uses keyword lists so it
          # works across all supported country languages.
          #
          # keyword_list: one of OPERA_NEXT_KEYWORDS / OPERA_DONE_KEYWORDS /
          #               OPERA_SUBMIT_KEYWORDS (or any custom list)
          # label:        logging label string
          # ══════════════════════════════════════════════════════════════════════
          def click_opera_button_multilingual(desktop, opera_window, software_type,
                                              keyword_list, label="", fallback_coords=None):
              """
              Find and click a button in the Opera window whose text matches any
              keyword in keyword_list (multilingual). Falls back to pyautogui
              coordinate click at fallback_coords if provided.
              Returns True if clicked, False otherwise.
              """
              try:
                  target = opera_window
                  if target is None or not target.is_visible():
                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text()
                          if wt and _is_target_software_window(wt, software_type):
                              target = w
                              break
                  if not target:
                      log_msg("MLBtn", f"[{label}] Target Opera window not found.")
                      if fallback_coords:
                          fx, fy = fallback_coords
                          log_msg("MLBtn", f"[{label}] Fallback click at ({fx}, {fy})...")
                          try:
                              pyautogui.moveTo(fx, fy, duration=0.2)
                              pyautogui.click(fx, fy)
                              return True
                          except Exception as ef:
                              log_msg("MLBtn", f"[{label}] Fallback click failed: {ef}")
                      return False

                  target.set_focus()
                  time.sleep(0.3)

                  # Pass 1: exact title match against each keyword
                  for kw in keyword_list:
                      try:
                          btns = target.descendants(control_type="Button", title=kw)
                          if btns:
                              try:
                                  btns[0].click_input()
                                  log_msg("MLBtn", f"[{label}] Clicked '{kw}' via exact title match.")
                                  return True
                              except Exception as e:
                                  log_msg("MLBtn", f"[{label}] click_input on exact '{kw}' failed: {e}")
                      except Exception:
                          pass

                  # Pass 2: partial text match on all Button descendants
                  for btn in target.descendants(control_type="Button"):
                      try:
                          txt = (btn.window_text() or "").strip()
                          nm  = (btn.element_info.name or "").strip()
                          combined = (txt + " " + nm).strip()
                      except Exception:
                          continue
                      if combined and _matches_any(combined, keyword_list):
                          try:
                              btn.click_input()
                              log_msg("MLBtn", f"[{label}] Clicked '{combined[:40]}' via partial keyword match.")
                              return True
                          except Exception as e:
                              log_msg("MLBtn", f"[{label}] Partial match click failed for '{combined[:40]}': {e}")

                  # Pass 3: scan all descendants (Text, Hyperlink, Custom, etc.)
                  for el in target.descendants():
                      try:
                          ctrl_type = el.element_info.control_type
                      except Exception:
                          continue
                      if ctrl_type not in ["Button", "Hyperlink", "Text", "Custom"]:
                          continue
                      try:
                          txt = (el.window_text() or "").strip()
                      except Exception:
                          txt = ""
                      if not txt or len(txt) > 80:
                          continue
                      if _matches_any(txt, keyword_list):
                          try:
                              el.click_input()
                              log_msg("MLBtn", f"[{label}] Clicked '{txt[:40]}' via generic descendant scan.")
                              return True
                          except Exception as e:
                              log_msg("MLBtn", f"[{label}] Descendant click failed for '{txt[:40]}': {e}")

              except Exception as e:
                  log_msg("MLBtn", f"[{label}] Exception during multilingual button click: {e}")

              # Fallback: coordinate click
              if fallback_coords:
                  fx, fy = fallback_coords
                  log_msg("MLBtn", f"[{label}] All passes failed — fallback click at ({fx}, {fy}).")
                  try:
                      pyautogui.moveTo(fx, fy, duration=0.2)
                      pyautogui.click(fx, fy)
                      return True
                  except Exception as ef:
                      log_msg("MLBtn", f"[{label}] Fallback click also failed: {ef}")

              return False

          # Keep the original click_opera_button for backward compatibility,
          # now internally delegating to click_opera_button_multilingual.
          def click_opera_button(desktop, opera_window, software_type, button_names, label=""):
              sw, sh = pyautogui.size()
              fallback = (int(sw * 0.90), int(sh * 0.90))
              return click_opera_button_multilingual(
                  desktop, opera_window, software_type,
                  keyword_list=button_names,
                  label=label,
                  fallback_coords=fallback
              )

          # ══════════════════════════════════════════════════════════════════════
          # MULTILINGUAL PROXY AUTH INJECTION
          # ══════════════════════════════════════════════════════════════════════
          def inject_proxy_auth(window, label=""):
              if not USE_PROXY or not PROXY_USER or not PROXY_PASS:
                  return False

              try:
                  user_fields = _find_username_fields(window)
                  pass_fields = _find_password_fields(window)

                  if not user_fields or not pass_fields:
                      u_struct, p_struct = _is_auth_dialog_by_structure(window)
                      if u_struct and p_struct:
                          log_msg("ProxyAuth", f"[{label}] Using structural detection (2-field dialog).")
                          user_fields = [u_struct]
                          pass_fields = [p_struct]

                  if user_fields and pass_fields:
                      if _is_address_bar_control(user_fields[0]) or _is_address_bar_control(pass_fields[0]):
                          log_msg("ProxyAuth", f"[{label}] BLOCKED — detected fields are address/URL bars. Skipping.")
                          return False

                      log_msg("ProxyAuth", f"[{label}] Auth dialog — injecting {PROXY_TYPE} credentials. "
                              f"User={PROXY_USER[:25]}... | Fields found via multilingual match.")
                      window.set_focus()
                      time.sleep(0.5)

                      try:
                          user_fields[0].click_input()
                          time.sleep(0.2)
                          send_keys('^a')
                          time.sleep(0.1)
                          send_keys('{DELETE}')
                          time.sleep(0.1)
                          user_fields[0].type_keys(PROXY_USER, with_spaces=True, pause=0.02)
                          time.sleep(0.3)
                      except Exception as eu:
                          log_msg("ProxyAuth", f"[{label}] Username field type failed: {eu}")

                      try:
                          pass_fields[0].click_input()
                          time.sleep(0.2)
                          send_keys('^a')
                          time.sleep(0.1)
                          send_keys('{DELETE}')
                          time.sleep(0.1)
                          pass_fields[0].type_keys(PROXY_PASS, with_spaces=True, pause=0.02)
                          time.sleep(0.3)
                      except Exception as ep:
                          log_msg("ProxyAuth", f"[{label}] Password field type failed: {ep}")

                      signed_in = False
                      submit_btn = _find_submit_button(window)
                      if submit_btn:
                          try:
                              submit_btn.click_input()
                              btn_text = submit_btn.window_text() or "?"
                              log_msg("ProxyAuth", f"[{label}] Clicked submit button: '{btn_text}'. Auth submitted.")
                              signed_in = True
                          except Exception as eb:
                              log_msg("ProxyAuth", f"[{label}] Submit button click failed: {eb}")

                      if not signed_in:
                          try:
                              pass_fields[0].click_input()
                              time.sleep(0.2)
                              send_keys('{ENTER}')
                              log_msg("ProxyAuth", f"[{label}] Submitted via ENTER key fallback.")
                              signed_in = True
                          except Exception as ek:
                              log_msg("ProxyAuth", f"[{label}] ENTER fallback also failed: {ek}")

                      return signed_in

                  else:
                      wt = ""
                      try:
                          wt = window.window_text() or ""
                      except Exception:
                          pass

                      if not _is_proxy_auth_dialog(wt):
                          log_msg("ProxyAuth", f"[{label}] No auth fields found and window '{wt}' "
                                  "does not look like an auth dialog. Skipping keyboard injection.")
                          return False

                      log_msg("ProxyAuth", f"[{label}] No Edit fields found — trying keyboard Tab injection "
                              f"(window='{wt}').")
                      window.set_focus()
                      time.sleep(0.5)
                      send_keys('^a{DELETE}')
                      time.sleep(0.1)
                      for ch in PROXY_USER:
                          send_keys(ch if ch.isalnum() or ch in '.-_=@' else '{%s}' % ch)
                          time.sleep(0.01)
                      send_keys('{TAB}')
                      time.sleep(0.3)
                      send_keys('^a{DELETE}')
                      time.sleep(0.1)
                      for ch in PROXY_PASS:
                          send_keys(ch if ch.isalnum() or ch in '.-_=@' else '{%s}' % ch)
                          time.sleep(0.01)
                      time.sleep(0.2)
                      send_keys('{ENTER}')
                      log_msg("ProxyAuth", f"[{label}] Keyboard-only auth submitted.")
                      return True

              except Exception as e:
                  log_msg("ProxyAuth", f"[{label}] inject_proxy_auth exception: {e}")
                  return False

          # ══════════════════════════════════════════════════════════════════════
          # OPERA ONE POST-INSTALL SEQUENCE — FULLY MULTILINGUAL
          #
          # All button searches now use OPERA_NEXT_KEYWORDS, OPERA_DONE_KEYWORDS,
          # and OPERA_SUBMIT_KEYWORDS instead of English-only string literals.
          # Every click_opera_button() call is replaced with
          # click_opera_button_multilingual() with proper fallback coords.
          # ══════════════════════════════════════════════════════════════════════
          def opera_one_post_install_sequence(opera_window, software_type="opera_one"):
              log_msg("PostInstall-OP1", "=== Opera One Post-Install Sequence Starting (Multilingual) ===")
              desktop = Desktop(backend="uia")

              log_msg("PostInstall-OP1", "STEP 1: Waiting 50 seconds for Opera One to fully initialize...")
              for s in range(1, 51):
                  log_msg("PostInstall-OP1", f"  Initialization wait: {s}/50 seconds...")
                  time.sleep(1)
              log_msg("PostInstall-OP1", "STEP 1 COMPLETE: 50-second initialization wait finished.")

              log_msg("PostInstall-OP1", "STEP 2: Locating Opera One window and applying full-screen maximize...")
              desktop = Desktop(backend="uia")
              opera_window = robust_maximize_opera_window(desktop, software_type, label="step2-fullscreen")
              if opera_window is None:
                  log_msg("PostInstall-OP1", "STEP 2 WARNING: Could not find Opera window. Proceeding anyway...")
              else:
                  log_msg("PostInstall-OP1", f"STEP 2 COMPLETE: Opera window maximized -> '{opera_window.window_text()}'")

              log_msg("PostInstall-OP1", "STEP 3: Waiting 5 seconds after maximize...")
              for s in range(1, 6):
                  log_msg("PostInstall-OP1", f"  Post-maximize wait: {s}/5 seconds...")
                  time.sleep(1)
              log_msg("PostInstall-OP1", "STEP 3 COMPLETE.")

              log_msg("PostInstall-OP1", "STEP 4: Additional 5-second settle wait...")
              for s in range(1, 6):
                  log_msg("PostInstall-OP1", f"  Settle wait: {s}/5 seconds...")
                  time.sleep(1)
              log_msg("PostInstall-OP1", "STEP 4 COMPLETE.")

              sw, sh = pyautogui.size()
              cx, cy = sw // 2, sh // 2
              log_msg("PostInstall-OP1", f"STEP 5: Clicking center of screen at ({cx}, {cy}) using mouse...")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label="step5-pre-click")
              try:
                  pyautogui.moveTo(cx, cy, duration=0.3)
                  time.sleep(0.2)
                  pyautogui.click(cx, cy)
                  log_msg("PostInstall-OP1", f"STEP 5 COMPLETE: Mouse click executed at ({cx}, {cy}).")
              except Exception as e:
                  log_msg("PostInstall-OP1", f"STEP 5 ERROR: Mouse click failed: {e}")

              log_msg("PostInstall-OP1", "STEP 6: Waiting 5 seconds after center click...")
              for s in range(1, 6):
                  log_msg("PostInstall-OP1", f"  Post-click wait: {s}/5 seconds...")
                  time.sleep(1)
              log_msg("PostInstall-OP1", "STEP 6 COMPLETE.")

              # ── STEP 7: Click "Next" 6 times — MULTILINGUAL ────────────────────
              log_msg("PostInstall-OP1", "STEP 7: Clicking 'Next' button 6 times (multilingual, 2s delay each)...")
              for i in range(1, 7):
                  desktop = Desktop(backend="uia")
                  opera_window = force_maximize_and_focus_target(
                      desktop, opera_window, software_type, label=f"step7-NEXT-{i}"
                  )
                  log_msg("PostInstall-OP1", f"  Next click attempt {i}/6 (multilingual)...")
                  sw_now, sh_now = pyautogui.size()
                  fallback_next = (int(sw_now * 0.90), int(sh_now * 0.90))
                  clicked = click_opera_button_multilingual(
                      desktop, opera_window, software_type,
                      keyword_list=OPERA_NEXT_KEYWORDS,
                      label=f"NEXT-{i}",
                      fallback_coords=fallback_next
                  )
                  if clicked:
                      log_msg("PostInstall-OP1", f"  Next {i}/6 clicked successfully (multilingual).")
                  else:
                      log_msg("PostInstall-OP1", f"  Next {i}/6 not found via multilingual scan — fallback already attempted.")
                  log_msg("PostInstall-OP1", f"  Waiting 2 seconds after Next click {i}...")
                  time.sleep(2)
              log_msg("PostInstall-OP1", "STEP 7 COMPLETE: All 6 Next clicks attempted (multilingual).")

              # ── STEP 7b: Click "Done" — MULTILINGUAL ──────────────────────────
              log_msg("PostInstall-OP1", "STEP 7b: Clicking 'Done'/'Finish' button (multilingual)...")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(
                  desktop, opera_window, software_type, label="step7b-DONE"
              )
              sw_now, sh_now = pyautogui.size()
              fallback_done = (int(sw_now * 0.90), int(sh_now * 0.90))
              clicked_done = click_opera_button_multilingual(
                  desktop, opera_window, software_type,
                  keyword_list=OPERA_DONE_KEYWORDS,
                  label="DONE",
                  fallback_coords=fallback_done
              )
              if clicked_done:
                  log_msg("PostInstall-OP1", "STEP 7b COMPLETE: 'Done'/'Finish' clicked successfully (multilingual).")
              else:
                  log_msg("PostInstall-OP1", "STEP 7b: Multilingual Done not found — fallback already attempted.")

              log_msg("PostInstall-OP1", "STEP 8: Waiting 5 seconds after Done click...")
              for s in range(1, 6):
                  log_msg("PostInstall-OP1", f"  Post-Done wait: {s}/5 seconds...")
                  time.sleep(1)
              log_msg("PostInstall-OP1", "STEP 8 COMPLETE.")

              log_msg("PostInstall-OP1", "STEP 9: Pressing ENTER key...")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(
                  desktop, opera_window, software_type, label="step9-ENTER"
              )
              send_keys('{ENTER}')
              log_msg("PostInstall-OP1", "STEP 9 COMPLETE: ENTER key pressed.")

              log_msg("PostInstall-OP1", "STEP 10: Waiting 5 seconds after ENTER...")
              for s in range(1, 6):
                  log_msg("PostInstall-OP1", f"  Post-ENTER wait: {s}/5 seconds...")
                  time.sleep(1)
              log_msg("PostInstall-OP1", "STEP 10 COMPLETE.")

              # ── STEP 11: Click "Submit" — MULTILINGUAL ─────────────────────────
              log_msg("PostInstall-OP1", "STEP 11: Clicking 'Submit' button (multilingual)...")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(
                  desktop, opera_window, software_type, label="step11-SUBMIT"
              )
              sw_now, sh_now = pyautogui.size()
              fallback_submit = (sw_now // 2, int(sh_now * 0.85))
              clicked_submit = click_opera_button_multilingual(
                  desktop, opera_window, software_type,
                  keyword_list=OPERA_SUBMIT_KEYWORDS,
                  label="SUBMIT",
                  fallback_coords=fallback_submit
              )
              if clicked_submit:
                  log_msg("PostInstall-OP1", "STEP 11 COMPLETE: 'Submit' clicked successfully (multilingual).")
              else:
                  log_msg("PostInstall-OP1", "STEP 11: Multilingual Submit not found — fallback already attempted.")

              log_msg("PostInstall-OP1", "STEP 12: Waiting 5 seconds after Submit click...")
              for s in range(1, 6):
                  log_msg("PostInstall-OP1", f"  Post-Submit wait: {s}/5 seconds...")
                  time.sleep(1)
              log_msg("PostInstall-OP1", "STEP 12 COMPLETE.")

              log_msg("PostInstall-OP1", "STEP 13: Starting TAB cycle sequence (8 TABs → 18 TABs)...")
              tab_sequence = list(range(8, 19))
              log_msg("PostInstall-OP1", f"  TAB sequence plan: {tab_sequence}")

              for cycle_idx, tab_count in enumerate(tab_sequence):
                  log_msg("PostInstall-OP1", f"--- TAB CYCLE {cycle_idx + 1}/{len(tab_sequence)}: {tab_count} TAB presses ---")

                  desktop = Desktop(backend="uia")
                  opera_window = force_maximize_and_focus_target(
                      desktop, opera_window, software_type, label=f"cycle{cycle_idx+1}-pre-CtrlT"
                  )
                  log_msg("PostInstall-OP1", f"  Cycle {cycle_idx + 1}: Pressing Ctrl+T (before TABs)...")
                  send_keys('^t')
                  log_msg("PostInstall-OP1", f"  Cycle {cycle_idx + 1}: Ctrl+T sent. Waiting 5 seconds...")
                  for s in range(1, 6):
                      log_msg("PostInstall-OP1", f"    Pre-TAB wait: {s}/5 seconds...")
                      time.sleep(1)
                  log_msg("PostInstall-OP1", f"  Cycle {cycle_idx + 1}: Pre-TAB wait complete.")

                  log_msg("PostInstall-OP1", f"  Pressing TAB key {tab_count} times (1 second delay between each)...")
                  for i in range(1, tab_count + 1):
                      desktop = Desktop(backend="uia")
                      opera_window = force_maximize_and_focus_target(
                          desktop, opera_window, software_type,
                          label=f"cycle{cycle_idx+1}-TAB{tab_count}-press{i}"
                      )
                      log_msg("PostInstall-OP1", f"    TAB press {i}/{tab_count} (cycle {cycle_idx + 1})...")
                      send_keys('{TAB}')
                      log_msg("PostInstall-OP1", f"    TAB {i}/{tab_count} sent. Waiting 1 second...")
                      time.sleep(1)

                  desktop = Desktop(backend="uia")
                  opera_window = force_maximize_and_focus_target(
                      desktop, opera_window, software_type, label=f"cycle{cycle_idx+1}-ENTER"
                  )
                  log_msg("PostInstall-OP1", f"  Cycle {cycle_idx + 1}: Pressing ENTER after {tab_count} TABs...")
                  send_keys('{ENTER}')
                  log_msg("PostInstall-OP1", f"  Cycle {cycle_idx + 1}: ENTER sent.")

                  log_msg("PostInstall-OP1", f"  Cycle {cycle_idx + 1}: Waiting 5 seconds after ENTER...")
                  for s in range(1, 6):
                      log_msg("PostInstall-OP1", f"    Post-ENTER wait: {s}/5 seconds...")
                      time.sleep(1)

                  desktop = Desktop(backend="uia")
                  opera_window = force_maximize_and_focus_target(
                      desktop, opera_window, software_type, label=f"cycle{cycle_idx+1}-post-CtrlT"
                  )
                  log_msg("PostInstall-OP1", f"  Cycle {cycle_idx + 1}: Pressing Ctrl+T (after TABs)...")
                  send_keys('^t')
                  log_msg("PostInstall-OP1", f"  Cycle {cycle_idx + 1}: Ctrl+T sent. Waiting 5 seconds...")
                  for s in range(1, 6):
                      log_msg("PostInstall-OP1", f"    Post-CtrlT wait: {s}/5 seconds...")
                      time.sleep(1)
                  log_msg("PostInstall-OP1", f"--- TAB CYCLE {cycle_idx + 1}/{len(tab_sequence)} COMPLETE ---")

              log_msg("PostInstall-OP1", "STEP 13 COMPLETE: All TAB cycles finished.")
              log_msg("PostInstall-OP1", "=== Opera One Post-Install Sequence Completed Successfully (Multilingual) ===")

          def opera_gx_post_install_sequence(opera_window):
              log_msg("PostInstall-OPGX", "=== Opera GX Post-Install Sequence Starting ===")
              desktop = Desktop(backend="uia")

              opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label="init")
              time.sleep(0.5)

              sw, sh = pyautogui.size()
              cx, cy = sw // 2, sh // 2

              log_msg("PostInstall-OPGX", f"Double-clicking center screen ({cx}, {cy})...")
              try:
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label="pre-dblclick")
                  pyautogui.click(cx, cy)
                  time.sleep(0.15)
                  pyautogui.click(cx, cy)
                  log_msg("PostInstall-OPGX", "Double-click executed.")
              except Exception as e:
                  log_msg("PostInstall-OPGX", f"Double-click failed: {e}")

              d = random.uniform(2.0, 3.0)
              time.sleep(d)

              log_msg("PostInstall-OPGX", "Pressing TAB key 4 times (1-2s delay each)...")
              for i in range(1, 5):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"pre-TAB4-{i}")
                  log_msg("PostInstall-OPGX", f"  Sending TAB ({i}/4)...")
                  send_keys('{TAB}')
                  d = random.uniform(1.0, 2.0)
                  time.sleep(d)

              log_msg("PostInstall-OPGX", "Pressing ENTER key 8 times (1-2s delay each)...")
              for i in range(1, 9):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"ENTER8-{i}")
                  log_msg("PostInstall-OPGX", f"  Sending ENTER ({i}/8)...")
                  send_keys('{ENTER}')
                  d = random.uniform(1.0, 2.0)
                  time.sleep(d)

              d = random.uniform(2.0, 3.0)
              time.sleep(d)

              log_msg("PostInstall-OPGX", "Pressing TAB key 6 times (1-2s delay each)...")
              for i in range(1, 7):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"TAB6-{i}")
                  log_msg("PostInstall-OPGX", f"  Sending TAB ({i}/6)...")
                  send_keys('{TAB}')
                  d = random.uniform(1.0, 2.0)
                  time.sleep(d)

              opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label="post-TAB6-ENTER")
              log_msg("PostInstall-OPGX", "Sending ENTER...")
              send_keys('{ENTER}')
              log_msg("PostInstall-OPGX", "Waiting 5 seconds...")
              for s in range(1, 6):
                  if s % 2 == 0:
                      opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"wait5-{s}")
                  time.sleep(1)

              for tab_count in range(7, 17):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"pre-CtrlT-{tab_count}")
                  log_msg("PostInstall-OPGX", f"Sending Ctrl+T for cycle TAB {tab_count}...")
                  send_keys('^t')
                  log_msg("PostInstall-OPGX", f"Pressing TAB key {tab_count} times (1-2s delay each)...")
                  for i in range(1, tab_count + 1):
                      opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"TAB{tab_count}-{i}")
                      log_msg("PostInstall-OPGX", f"  Sending TAB ({i}/{tab_count})...")
                      send_keys('{TAB}')
                      d = random.uniform(1.0, 2.0)
                      time.sleep(d)
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"post-TAB{tab_count}-ENTER")
                  log_msg("PostInstall-OPGX", f"Sending ENTER after {tab_count} TABs...")
                  send_keys('{ENTER}')
                  log_msg("PostInstall-OPGX", "Waiting 5 seconds...")
                  for s in range(1, 6):
                      if s % 2 == 0:
                          opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"wait5-loop{tab_count}-{s}")
                      time.sleep(1)

              log_msg("PostInstall-OPGX", "=== Opera GX Post-Install Sequence Completed Successfully ===")

          def avg_post_install_sequence(avg_window):
              log_msg("PostInstall-AVG", "=== AVG Post-Install Sequence Starting ===")
              desktop = Desktop(backend="uia")

              avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label="init")
              time.sleep(0.5)

              sw, sh = pyautogui.size()
              cx, cy = sw // 2, sh // 2

              log_msg("PostInstall-AVG", f"Double-clicking center screen ({cx}, {cy})...")
              try:
                  avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label="pre-dblclick")
                  pyautogui.click(cx, cy)
                  time.sleep(0.15)
                  pyautogui.click(cx, cy)
                  log_msg("PostInstall-AVG", "Double-click executed.")
              except Exception as e:
                  log_msg("PostInstall-AVG", f"Double-click failed: {e}")

              log_msg("PostInstall-AVG", "Waiting 5 seconds...")
              for s in range(1, 6):
                  if s % 2 == 0:
                      avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label=f"init-wait-{s}")
                  time.sleep(1)

              tab_count = 6
              tab_ceiling = 17

              while tab_count < tab_ceiling:
                  log_msg("PostInstall-AVG", f"--- Cycle: {tab_count} TAB presses ---")

                  avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label=f"pre-CtrlT-{tab_count}")
                  log_msg("PostInstall-AVG", f"Sending Ctrl+T for cycle TAB {tab_count}...")
                  send_keys('^t')

                  log_msg("PostInstall-AVG", f"Pressing TAB key {tab_count} times (1-2s delay each)...")
                  for i in range(1, tab_count + 1):
                      avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label=f"TAB{tab_count}-press{i}")
                      log_msg("PostInstall-AVG", f"  Sending TAB ({i}/{tab_count})...")
                      send_keys('{TAB}')
                      d = random.uniform(1.0, 2.0)
                      time.sleep(d)

                  avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label=f"pre-ENTER-{tab_count}")
                  log_msg("PostInstall-AVG", f"Sending ENTER after {tab_count} TABs...")
                  send_keys('{ENTER}')

                  step = random.randint(1, 2)
                  log_msg("PostInstall-AVG", f"Next cycle increment: +{step}. Next tab_count: {tab_count + step}.")
                  tab_count += step

                  if tab_count < tab_ceiling:
                      log_msg("PostInstall-AVG", "Waiting 5 seconds before next cycle...")
                      for s in range(1, 6):
                          if s % 2 == 0:
                              avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label=f"cycle-wait-{tab_count}-{s}")
                          time.sleep(1)

              log_msg("PostInstall-AVG", "=== AVG Post-Install Sequence Completed Successfully ===")

          def handle_automation(software_type, action_mode, timeout=360):
              desktop = Desktop(backend="uia")
              start_time = time.time()
              proxy_auth_time = start_time

              log_msg("UI-Engine", f"Started monitoring. Action Mode: {action_mode.upper()} | "
                      f"Type: {software_type} | ProxyType: {PROXY_TYPE} | UseProxy: {USE_PROXY}")
              log_msg("UI-Engine", f"Proxy credentials ready: User={PROXY_USER[:25]}... | "
                      f"Server={PROXY_SERVER}")

              last_ctrl_j_time = time.time()
              last_dl_click_time = 0
              ctrl_j_attempts = 0
              keep_clicked = False
              avg_download_clicked = False

              smart_link_interstitial_done = False
              smart_link_interstitial_time = 0

              opera_one_installer_executed_time = None
              opera_one_post_install_done = False

              opera_gx_installer_executed_time = None
              opera_gx_post_install_done = False

              avg_installer_executed_time = None
              avg_post_install_done = False

              sentinel_path = os.path.join(tempfile.gettempdir(), "download_done.flag")
              download_windows_closed = False

              installer_executed_sentinel = os.path.join(tempfile.gettempdir(), "installer_executed.flag")

              last_interference_sweep = 0
              INTERFERENCE_SWEEP_INTERVAL = 2

              last_auth_inject_time = 0
              AUTH_INJECT_COOLDOWN = 8

              last_dl_multilingual_time = 0
              DL_MULTILINGUAL_COOLDOWN = 5

              # Cooldown for Keep button clicks — prevents hammering
              last_keep_click_time = 0
              KEEP_CLICK_COOLDOWN = 6

              while time.time() - start_time < timeout:
                  try:
                      desktop = Desktop(backend="uia")
                      edge_window = None
                      opera_window = None
                      avg_window = None

                      for window in desktop.windows(visible_only=True):
                          wt = window.window_text()
                          if not wt: continue
                          if "Microsoft Edge" in wt or "sudetyj" in wt or "Chrome Web Store" in wt or "Edge" in wt:
                              edge_window = window
                          if "Opera" in wt or "Speed Dial" in wt or "Start Page" in wt or "Welcome" in wt:
                              if "Microsoft Edge" not in wt and "Edge" not in wt and "Chrome Web Store" not in wt:
                                  opera_window = window
                          if "AVG" in wt:
                              avg_window = window

                      now = time.time()
                      if now - last_interference_sweep >= INTERFERENCE_SWEEP_INTERVAL:
                          dismiss_interference_windows(desktop, software_type, label="continuous")
                          last_interference_sweep = now

                      # ── UNIVERSAL MULTILINGUAL PROXY AUTH DETECTION ────────────
                      if USE_PROXY and (now - last_auth_inject_time > AUTH_INJECT_COOLDOWN):
                          try:
                              for auth_window in desktop.windows(visible_only=True):
                                  awt = auth_window.window_text() or ""
                                  if "Microsoft Edge" in awt and awt != "Microsoft Edge":
                                      continue
                                  if _is_target_software_window(awt, software_type):
                                      continue
                                  if _is_proxy_auth_dialog(awt):
                                      log_msg("ProxyAuth", f"[TopLevel] Auth dialog detected: '{awt}' "
                                              f"— injecting {PROXY_TYPE} credentials...")
                                      injected = inject_proxy_auth(auth_window, label=f"toplevel-{awt[:30]}")
                                      if injected:
                                          proxy_auth_time = time.time()
                                          last_auth_inject_time = now
                                          log_msg("ProxyAuth", f"[TopLevel] Credentials injected for '{awt}'.")
                                          break
                          except Exception as auth_ex:
                              log_msg("ProxyAuth", f"Auth scan error: {auth_ex}")

                          if edge_window and (now - last_auth_inject_time > AUTH_INJECT_COOLDOWN):
                              try:
                                  for child in edge_window.children():
                                      cwt = child.window_text() or ""
                                      if _is_proxy_auth_dialog(cwt):
                                          log_msg("ProxyAuth", f"[EdgeChild] Embedded auth dialog: '{cwt}'")
                                          injected = inject_proxy_auth(child, label=f"edge-child-{cwt[:20]}")
                                          if injected:
                                              proxy_auth_time = time.time()
                                              last_auth_inject_time = now
                                              break
                              except Exception:
                                  pass

                          if edge_window and (now - last_auth_inject_time > AUTH_INJECT_COOLDOWN):
                              try:
                                  u_struct, p_struct = _is_auth_dialog_by_structure(edge_window)
                                  if u_struct and p_struct:
                                      if (not _is_address_bar_control(u_struct) and
                                              not _is_address_bar_control(p_struct)):
                                          log_msg("ProxyAuth", "[EdgeStructural] 2-field dialog found inside Edge — "
                                                  "attempting structural credential injection.")
                                          injected = inject_proxy_auth(edge_window, label="edge-structural")
                                          if injected:
                                              proxy_auth_time = time.time()
                                              last_auth_inject_time = now
                              except Exception:
                                  pass

                      if not download_windows_closed and os.path.exists(sentinel_path):
                          log_msg("Sentinel", "Flag detected (EXE found). Initiating download window cleanup sequence...")
                          for attempt in range(1, 8):
                              still_open = close_download_windows(desktop, attempt_label=f"#{attempt}")
                              time.sleep(2)
                              if not still_open:
                                  log_msg("Sentinel", f"Cleanup successful on attempt #{attempt}.")
                                  break
                          download_windows_closed = True
                          edge_window = None

                      if action_mode == "install" and not opera_one_post_install_done:
                          is_one = (software_type == "opera_one")
                          is_dynamic = software_type in ["ad_mvn", "dynamic_opera", "opera_smart_link"]
                          if is_one or is_dynamic:
                              if opera_one_installer_executed_time is None and os.path.exists(installer_executed_sentinel):
                                  opera_one_installer_executed_time = time.time()
                                  log_msg("PostInstall-OP1", f"Installer sentinel detected. Post-install sequence fires in 50s.")
                              if opera_one_installer_executed_time is not None and (time.time() - opera_one_installer_executed_time) >= 50:
                                  if is_dynamic and opera_window and "GX" in opera_window.window_text().upper():
                                      log_msg("PostInstall-OP1", "Dynamic resolved to GX. Skipping One sequence.")
                                      opera_one_post_install_done = True
                                  else:
                                      log_msg("PostInstall-OP1", "50s threshold reached. Launching Opera One post-install sequence.")
                                      opera_one_post_install_sequence(opera_window, software_type=software_type)
                                      opera_one_post_install_done = True

                      if action_mode == "install" and not opera_gx_post_install_done:
                          is_gx = (software_type == "opera_gx")
                          is_dynamic = software_type in ["ad_mvn", "dynamic_opera", "opera_smart_link"]
                          if is_gx or is_dynamic:
                              if opera_gx_installer_executed_time is None and os.path.exists(installer_executed_sentinel):
                                  opera_gx_installer_executed_time = time.time()
                                  log_msg("PostInstall-OPGX", f"Sentinel detected. Post-install fires in 40s.")
                              if opera_gx_installer_executed_time is not None and (time.time() - opera_gx_installer_executed_time) >= 40:
                                  if is_dynamic and opera_window and "GX" not in opera_window.window_text().upper():
                                      log_msg("PostInstall-OPGX", "Dynamic resolved to One. Skipping GX sequence.")
                                      opera_gx_post_install_done = True
                                  else:
                                      log_msg("PostInstall-OPGX", "40s threshold reached. Launching Opera GX post-install.")
                                      opera_gx_post_install_sequence(opera_window)
                                      opera_gx_post_install_done = True

                      if software_type == "avg" and action_mode == "install" and not avg_post_install_done:
                          if avg_installer_executed_time is None and os.path.exists(installer_executed_sentinel):
                              avg_installer_executed_time = time.time()
                              log_msg("PostInstall-AVG", f"Sentinel detected. Post-install fires in 60s.")
                          if avg_installer_executed_time is not None and (time.time() - avg_installer_executed_time) >= 60:
                              log_msg("PostInstall-AVG", "60s threshold reached. Launching AVG post-install.")
                              avg_post_install_sequence(avg_window)
                              avg_post_install_done = True

                      # ── MULTILINGUAL COOKIE CONSENT ────────────────────────────
                      if edge_window:
                          try:
                              for btn in edge_window.descendants(control_type="Button"):
                                  try:
                                      btn_txt = (btn.window_text() or "").strip()
                                  except Exception:
                                      btn_txt = ""
                                  if btn_txt and _matches_any(btn_txt, COOKIE_CONSENT_KEYWORDS):
                                      try:
                                          log_msg("Cookies", f"Found consent button: '{btn_txt}'. Clicking...")
                                          btn.click_input()
                                          time.sleep(1)
                                          break
                                      except Exception:
                                          pass
                          except Exception:
                              pass

                      if edge_window and software_type == "opera_smart_link":
                          elapsed = time.time() - proxy_auth_time
                          if not smart_link_interstitial_done:
                              if elapsed > 20:
                                  try:
                                      log_msg("SmartLink", f"{elapsed:.1f}s elapsed. Executing TAB + ENTER interstitial bypass...")
                                      edge_window.set_focus()
                                      time.sleep(0.5)
                                      send_keys('{TAB}')
                                      time.sleep(0.5)
                                      send_keys('{ENTER}')
                                      log_msg("SmartLink", "TAB + ENTER injected. Waiting 15s.")
                                  except Exception as e:
                                      log_msg("SmartLink", f"Bypass failed: {e}")
                                  smart_link_interstitial_done = True
                                  smart_link_interstitial_time = time.time()

                      if action_mode == "click":
                          if software_type == "opera_smart_link":
                              if not smart_link_interstitial_done:
                                  time.sleep(1)
                                  continue
                              elif time.time() - smart_link_interstitial_time < 15:
                                  time.sleep(1)
                                  continue
                          time.sleep(1)
                          continue

                      # ══════════════════════════════════════════════════════════
                      # MULTILINGUAL "KEEP" / "KEEP ANYWAY" BUTTON DETECTION
                      #
                      # Replaces the original English-only Keep/Keep anyway search.
                      # Uses click_keep_button_multilingual() which covers all
                      # supported country languages with 3 fallback strategies.
                      # ══════════════════════════════════════════════════════════
                      if edge_window and action_mode == "install":
                          if now - last_keep_click_time > KEEP_CLICK_COOLDOWN:
                              # Quick pre-scan: check if any Keep-like button exists
                              # before doing the full multilingual search
                              keep_button_found = False
                              try:
                                  for btn in edge_window.descendants(control_type="Button"):
                                      try:
                                          txt = (btn.window_text() or "").strip()
                                          nm  = (btn.element_info.name or "").strip()
                                      except Exception:
                                          txt, nm = "", ""
                                      combined = (txt + " " + nm).strip()
                                      if combined and _matches_any(combined, KEEP_DOWNLOAD_KEYWORDS):
                                          keep_button_found = True
                                          break
                              except Exception:
                                  pass

                              if keep_button_found:
                                  log_msg("EdgeProtect", "Keep button detected (multilingual). Clicking...")
                                  clicked_keep = click_keep_button_multilingual(
                                      edge_window, label="keep-multilingual"
                                  )
                                  if clicked_keep:
                                      keep_clicked = True
                                      last_keep_click_time = now
                                      log_msg("EdgeProtect", "Keep button clicked successfully (multilingual).")

                      can_click_download = True
                      if software_type == "opera_smart_link":
                          if not smart_link_interstitial_done or (time.time() - smart_link_interstitial_time < 15):
                              can_click_download = False

                      # ── MULTILINGUAL DOWNLOAD BUTTON CLICK ─────────────────────
                      if (edge_window and action_mode == "install" and can_click_download
                              and software_type in ["opera_gx", "opera_one", "ad_mvn",
                                                    "dynamic_opera", "opera_smart_link"]):
                          if now - last_dl_multilingual_time > DL_MULTILINGUAL_COOLDOWN:
                              log_msg("DL-Engine", f"Opera download scan triggered (type={software_type})...")
                              clicked = click_download_button_multilingual(
                                  edge_window, software_type, label=f"opera-dl-{software_type}"
                              )
                              if clicked:
                                  last_dl_multilingual_time = now
                                  last_dl_click_time = now
                                  log_msg("DL-Engine", "Opera download button clicked successfully (multilingual).")
                              else:
                                  log_msg("DL-Engine", "Opera download button not found this cycle. Will retry.")

                      if edge_window and action_mode == "install" and software_type == "avg":
                          elapsed = time.time() - proxy_auth_time
                          if not avg_download_clicked and elapsed > 20:
                              log_msg("AVG", f"{elapsed:.1f}s elapsed. Initiating multilingual AVG download click.")
                              clicked = click_download_button_multilingual(
                                  edge_window, software_type, label="avg-dl-multilingual"
                              )
                              if clicked:
                                  log_msg("AVG", "Multilingual AVG download button clicked successfully.")
                                  avg_download_clicked = True
                              else:
                                  log_msg("AVG", "Multilingual button not found — falling back to TAB+ENTER keyboard method.")
                                  try:
                                      edge_window.set_focus()
                                      time.sleep(0.5)
                                      send_keys('{TAB}')
                                      delay = random.uniform(1.0, 2.0)
                                      time.sleep(delay)
                                      send_keys('{ENTER}')
                                      log_msg("AVG", "TAB+ENTER fallback sent. Waiting 10s...")
                                      for w in range(1, 11):
                                          log_msg("AVG", f"Download init wait: {w}/10 seconds...")
                                          time.sleep(1)
                                      log_msg("AVG", "10s init wait complete.")
                                  except Exception as e:
                                      log_msg("AVG", f"Keyboard sequence error: {e}")
                                  avg_download_clicked = True

                      if edge_window and action_mode == "install":
                          add_ext_btns = edge_window.descendants(control_type="Button", title="Add extension")
                          if add_ext_btns:
                              try:
                                  edge_window.set_focus()
                                  time.sleep(0.5)
                                  add_ext_btns[0].click_input()
                                  log_msg("Extension", "Clicked 'Add extension'. Waiting 2s...")
                                  time.sleep(2)
                              except Exception as e:
                                  log_msg("Extension", f"Failed to click 'Add extension': {e}")
                          else:
                              for btn_name in ["Add to Chrome", "Get"]:
                                  install_btns = edge_window.descendants(control_type="Button", title=btn_name)
                                  if install_btns:
                                      try:
                                          edge_window.set_focus()
                                          time.sleep(0.5)
                                          install_btns[0].click_input()
                                          log_msg("Extension", f"Clicked '{btn_name}'. Waiting 2s...")
                                          time.sleep(2)
                                          break
                                      except Exception as e:
                                          log_msg("Extension", f"Failed to click '{btn_name}': {e}")

                      can_ctrl_j = True
                      if software_type == "avg" and not avg_download_clicked:
                          can_ctrl_j = False

                      if action_mode == "install" and not keep_clicked and edge_window and can_ctrl_j and (time.time() - last_ctrl_j_time > 15) and ctrl_j_attempts < 4:
                          try:
                              edge_window.set_focus()
                              time.sleep(0.5)
                              log_msg("Utility", f"Sending Ctrl+J... (Attempt {ctrl_j_attempts + 1}/4)")
                              send_keys('^j')
                              last_ctrl_j_time = time.time()
                              ctrl_j_attempts += 1
                          except Exception as e:
                              log_msg("Utility", f"Ctrl+J failed: {e}")

                  except Exception as e:
                      pass
                  time.sleep(1)

          if __name__ == "__main__":
              software_type = sys.argv[1] if len(sys.argv) > 1 else "avg"
              action_mode   = sys.argv[2] if len(sys.argv) > 2 else "install"
              handle_automation(software_type, action_mode)
          '@
          $handlerPy | Out-File -FilePath "$env:TEMP\auto_handler.py" -Encoding utf8

          Write-Host "[UI-Engine] Spinning up background Python process..." -ForegroundColor DarkGray
          Start-Process -FilePath "python" `
              -ArgumentList "-u `"$env:TEMP\auto_handler.py`" `"$env:SOFTWARE_TYPE`" `"$env:ACTION_MODE`"" `
              -WindowStyle Hidden

          $dlFolder    = "$env:USERPROFILE\Downloads"
          $timeoutSecs = 330
          $softwareType = $env:SOFTWARE_TYPE
          $exeFilter   = $env:EXE_FILTER
          $sentinelPath = "$env:TEMP\download_done.flag"
          $installerExecutedSentinel = "$env:TEMP\installer_executed.flag"

          if ($env:ACTION_MODE -eq "install") {
              Write-Host "[Watcher] Action mode is INSTALL. Initializing download directory monitor..." -ForegroundColor Cyan
              $installJob = Start-Job -ScriptBlock {
                  param($dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath, $installerExecutedSentinel)
                  $deadline  = (Get-Date).AddSeconds($timeoutSecs)
                  $installed = $false

                  Write-Output "[$($softwareType.ToUpper())-WATCHER] Tracking directory: $dlFolder"
                  Write-Output "[$($softwareType.ToUpper())-WATCHER] Awaiting file matching: $exeFilter"

                  while (-not $installed -and (Get-Date) -lt $deadline) {
                      $candidates = Get-ChildItem -Path $dlFolder -Filter $exeFilter -ErrorAction SilentlyContinue |
                          Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } |
                          Sort-Object LastWriteTime -Descending

                      if ($candidates.Count -gt 0) {
                          $file = $candidates[0]
                          Write-Output "[$($softwareType.ToUpper())-WATCHER] SUCCESS: Payload binary found -> $($file.Name)"

                          try { Set-Content -Path $sentinelPath -Value "done" -ErrorAction SilentlyContinue } catch {}
                          Write-Output "[$($softwareType.ToUpper())-WATCHER] Sentinel flag generated."

                          Write-Output "[$($softwareType.ToUpper())-WATCHER] Aggressively closing Edge download tabs..."
                          for ($closeAttempt = 1; $closeAttempt -le 4; $closeAttempt++) {
                              try {
                                  $wsh = New-Object -ComObject WScript.Shell
                                  $edgeProcs = Get-Process -Name "msedge" -ErrorAction SilentlyContinue |
                                      Where-Object { $_.MainWindowHandle -ne 0 } |
                                      Sort-Object StartTime -Descending

                                  if ($edgeProcs) {
                                      foreach ($edgeProc in $edgeProcs) {
                                          Write-Output "[$($softwareType.ToUpper())-WATCHER] Close attempt $closeAttempt — focusing Edge PID $($edgeProc.Id)..."
                                          $wsh.AppActivate($edgeProc.Id)
                                          Start-Sleep -Milliseconds 600
                                          $wsh.SendKeys("^w")
                                          Start-Sleep -Milliseconds 400
                                          $wsh.SendKeys("^w")
                                          Start-Sleep -Milliseconds 400
                                          Write-Output "[$($softwareType.ToUpper())-WATCHER] Ctrl+W x2 sent to Edge PID $($edgeProc.Id)."
                                      }
                                  } else {
                                      Write-Output "[$($softwareType.ToUpper())-WATCHER] No visible Edge window — blind Ctrl+W attempt $closeAttempt..."
                                      $wsh.SendKeys("^w")
                                      Start-Sleep -Milliseconds 500
                                      $wsh.SendKeys("^w")
                                  }

                                  Start-Sleep -Milliseconds 800
                                  $remaining = Get-Process -Name "msedge" -ErrorAction SilentlyContinue | Where-Object { $_.MainWindowHandle -ne 0 }
                                  if (-not $remaining) {
                                      Write-Output "[$($softwareType.ToUpper())-WATCHER] Edge fully closed on attempt $closeAttempt."
                                      break
                                  } else {
                                      Write-Output "[$($softwareType.ToUpper())-WATCHER] Edge still has windows. Retrying (attempt $closeAttempt)..."
                                  }
                              } catch {
                                  Write-Output "[$($softwareType.ToUpper())-WATCHER] Close attempt $closeAttempt failed: $_"
                              }
                              Start-Sleep -Milliseconds 500
                          }

                          $actualSoftware = $softwareType
                          if ($softwareType -eq "ad_mvn" -or $softwareType -eq "dynamic_opera" -or $softwareType -eq "opera_smart_link") {
                              if ($file.Name -match "OperaGX") {
                                  $actualSoftware = "opera_gx"
                                  Write-Output "[$($softwareType.ToUpper())-WATCHER] Payload fingerprinted as Opera GX Setup."
                              } else {
                                  $actualSoftware = "opera_one"
                                  Write-Output "[$($softwareType.ToUpper())-WATCHER] Payload fingerprinted as Opera One Standard Setup."
                              }
                          }

                          Write-Output "[$($actualSoftware.ToUpper())-INSTALL] Verifying file I/O lock status..."
                          $locked = $true
                          while ($locked) {
                              Start-Sleep -Seconds 2
                              try {
                                  $s = [System.IO.File]::Open($file.FullName, 'Open', 'Read', 'None')
                                  $s.Close()
                                  $locked = $false
                                  Write-Output "[$($actualSoftware.ToUpper())-INSTALL] File unlocked and ready."
                              } catch { }
                          }

                          Write-Output "[$($actualSoftware.ToUpper())-INSTALL] Writing installer-executed sentinel flag..."
                          try { Set-Content -Path $installerExecutedSentinel -Value "done" -ErrorAction SilentlyContinue } catch {}
                          Write-Output "[$($actualSoftware.ToUpper())-INSTALL] Sentinel written: $installerExecutedSentinel"

                          Write-Output "[$($actualSoftware.ToUpper())-INSTALL] Executing silent payload installer -> $($file.FullName) /silent"
                          try {
                              Start-Process -FilePath $file.FullName -ArgumentList "/silent" -Wait
                              Write-Output "[$($actualSoftware.ToUpper())-INSTALL] Binary deployed successfully."
                          } catch {
                              Write-Output "[$($actualSoftware.ToUpper())-INSTALL] EXCEPTION ERROR running installer: $_"
                          }

                          Write-Output "[$($actualSoftware.ToUpper())-POST] Scanning deployment directories for executable..."
                          if ($actualSoftware -eq "opera_gx") {
                              $appPaths = @(
                                  "$env:LOCALAPPDATA\Programs\Opera GX\launcher.exe",
                                  "$env:LOCALAPPDATA\Programs\Opera GX\opera.exe",
                                  "C:\Program Files\Opera GX\launcher.exe",
                                  "C:\Program Files\Opera GX\opera.exe",
                                  "C:\Program Files (x86)\Opera GX\launcher.exe",
                                  "C:\Program Files (x86)\Opera GX\opera.exe"
                              )
                          } elseif ($actualSoftware -eq "opera_one") {
                              $appPaths = @(
                                  "$env:LOCALAPPDATA\Programs\Opera\launcher.exe",
                                  "$env:LOCALAPPDATA\Programs\Opera\opera.exe",
                                  "C:\Program Files\Opera\launcher.exe",
                                  "C:\Program Files\Opera\opera.exe",
                                  "C:\Program Files (x86)\Opera\launcher.exe",
                                  "C:\Program Files (x86)\Opera\opera.exe"
                              )
                          } else {
                              $appPaths = @(
                                  "C:\Program Files\AVG\Browser\Application\AVGBrowser.exe",
                                  "C:\Program Files (x86)\AVG\Browser\Application\AVGBrowser.exe",
                                  "C:\Program Files\AVG\Antivirus\AVGUI.exe",
                                  "C:\Program Files (x86)\AVG\Antivirus\AVGUI.exe"
                              )
                          }

                          $launched = $false
                          for ($i = 0; $i -lt 300; $i++) {
                              foreach ($p in $appPaths) {
                                  if (Test-Path $p) {
                                      Start-Sleep -Seconds 3
                                      Write-Output "[$($actualSoftware.ToUpper())-POST] Spawning process: $p"
                                      Start-Process -FilePath $p
                                      $launched = $true
                                      break
                                  }
                              }
                              if ($launched) { break }
                              Start-Sleep -Seconds 2
                          }

                          if (-not $launched) {
                              Write-Output "[$($actualSoftware.ToUpper())-POST] FATAL: Executable was not found within timeout."
                          }

                          $installed = $true
                      } else {
                          Start-Sleep -Seconds 5
                      }
                  }
                  if (-not $installed) { Write-Output "[$($softwareType.ToUpper())-WATCHER] Timeout reached. No files matching pattern downloaded." }
              } -ArgumentList $dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath, $installerExecutedSentinel
          }

          $edgeExe = "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
          if (-Not (Test-Path $edgeExe)) {
              $edgeExe = "C:\Program Files\Microsoft\Edge\Application\msedge.exe"
          }

          # ── Build locale-aware Edge accept-language header ────────────────────
          $localeTag = $env:WINDOWS_LOCALE
          if (-not $localeTag) { $localeTag = "en-US" }
          $langCode = $localeTag.ToLower()
          $langPrimary = $langCode.Split("-")[0]
          $acceptLang = "$langCode,$langPrimary;q=0.9,en;q=0.8"

          $edgeArgs = @(
              "--no-first-run",
              "--no-default-browser-check",
              "--disable-sync",
              "--safebrowsing-disable-download-protection",
              "--disable-features=msSmartScreenProtection,SmartScreenPuaEnabled",
              "--lang=$langCode",
              "--accept-lang=$acceptLang"
          )

          if ($useProxy) {
              $edgeArgs += "--proxy-server=`"http://$proxyServer`""
          }
          $edgeArgs += "`"$env:TARGET_URL`""

          Write-Host "[System] Launching Edge with locale: $langCode | Accept-Language: $acceptLang" -ForegroundColor DarkCyan
          Write-Host "[System] Launching Edge browser context..." -ForegroundColor Cyan
          Write-Host "[System] Command: msedge.exe $(($edgeArgs | ForEach-Object { $_ -replace '"','\"' }) -join ' ')" -ForegroundColor DarkGray
          Start-Process -FilePath $edgeExe -ArgumentList ($edgeArgs -join " ")

          Write-Host "========== RUNTIME EXECUTION ==========" -ForegroundColor Cyan

          if ($env:ACTION_MODE -eq "install") {
              Write-Host "[Runtime] Operating in INSTALL pathway. Monitoring watcher job..." -ForegroundColor Cyan
              $deadline = (Get-Date).AddSeconds($timeoutSecs)
              while ($true) {
                  $output = Receive-Job -Job $installJob -ErrorAction SilentlyContinue
                  if ($output) { foreach ($line in $output) { Write-Host $line } }
                  if ($installJob.State -eq 'Completed' -or $installJob.State -eq 'Failed' -or (Get-Date) -gt $deadline) { break }
                  Start-Sleep -Seconds 5
              }
              Write-Host "[Runtime] Install job concluded. Task complete." -ForegroundColor Green

          } else {
              Write-Host "[Runtime] Operating in CLICK-ONLY pathway. All binaries and installations are bypassed." -ForegroundColor Magenta

              if ($env:SOFTWARE_TYPE -eq "opera_smart_link") {
                  Write-Host "[Runtime] Allowing 75 seconds for TAB/ENTER interstitial page routing..." -ForegroundColor Yellow
              } else {
                  Write-Host "[Runtime] Allowing 75 seconds to ensure webpage fully loads..." -ForegroundColor Yellow
              }

              $clickStart      = Get-Date
              $clickTotal      = 75
              $step            = 15
              $reloadFired     = $false
              $reloadThreshold = Get-Random -Minimum 20 -Maximum 61
              $reloadChance    = Get-Random -Minimum 10 -Maximum 101

              Write-Host "[$env:SOFTWARE_TYPE] Click session started. Reload threshold: ${reloadThreshold}s | Reload chance: ${reloadChance}%" -ForegroundColor DarkGray

              for ($w = 0; $w -lt $clickTotal; $w += $step) {
                  Write-Host "[$env:SOFTWARE_TYPE] Click tracker: $w / $clickTotal seconds elapsed..." -ForegroundColor Yellow

                  if (-not $reloadFired) {
                      $elapsed = [int]((Get-Date) - $clickStart).TotalSeconds
                      if ($elapsed -ge $reloadThreshold) {
                          Write-Host "[$env:SOFTWARE_TYPE] Reload threshold reached at ${elapsed}s. Executing page reload..." -ForegroundColor Cyan
                          try {
                              Add-Type -AssemblyName UIAutomationClient
                              $wsh = New-Object -ComObject WScript.Shell
                              $wsh.SendKeys('{F5}')
                              Write-Host "[$env:SOFTWARE_TYPE] F5 (page reload) sent successfully." -ForegroundColor Green
                          } catch {
                              Write-Host "[$env:SOFTWARE_TYPE] F5 reload attempt failed: $_" -ForegroundColor Red
                          }
                          $reloadFired = $true
                      }
                  }

                  Start-Sleep -Seconds $step
              }

              Write-Host "[Runtime] Click tracking wait complete (75s elapsed). All click-path tasks finished." -ForegroundColor Green
              Write-Host "[Runtime] Click pathway exiting cleanly." -ForegroundColor Magenta
              exit 0
          }

      - name: Keep Runner Alive
        if: always() && matrix.action_mode == 'install'
        shell: pwsh
        run: |
          Write-Host "Session lifecycle fully executed." -ForegroundColor Green
          Write-Host "Leaving runner online to exhaust remaining job timeout margin..." -ForegroundColor DarkGray
          Start-Sleep -Seconds 360
