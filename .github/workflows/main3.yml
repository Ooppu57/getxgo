              SUBMIT_BTN_KW       = ML_SUBMIT_BTN_KEYWORDS
          else:
              DOWNLOAD_OPERA_KW   = EN_DOWNLOAD_OPERA_KEYWORDS
              DOWNLOAD_AVG_KW     = EN_DOWNLOAD_AVG_KEYWORDS
              DOWNLOAD_UNIV_KW    = EN_DOWNLOAD_UNIVERSAL_KEYWORDS
              INTERSTITIAL_KW     = EN_INTERSTITIAL_KEYWORDS
              COOKIE_KW           = EN_COOKIE_KEYWORDS
              KEEP_KW             = EN_KEEP_KEYWORDS
              NEXT_KW             = EN_NEXT_KEYWORDS
              DONE_KW             = EN_DONE_KEYWORDS
              SUBMIT_KW           = EN_SUBMIT_KEYWORDS
              AUTH_TITLE_KW       = EN_PROXY_AUTH_TITLES
              USERNAME_KW         = EN_USERNAME_KEYWORDS
              PASSWORD_KW         = EN_PASSWORD_KEYWORDS
              SUBMIT_BTN_KW       = EN_SUBMIT_BTN_KEYWORDS

          DOWNLOAD_DONE_TITLES = [
              "Thanks for downloading Opera","Thanks for downloadin",
              "Download | Thanks","sudetyj","clickWorker",
              "GET READY TO PLAY","ready to install",
          ]
          INTERFERENCE_TITLES = [
              "Settings","Windows Settings","Default apps","System Settings","Choose an app",
              "How do you want to open","Open with","Windows PowerShell",
              "Administrator: Windows PowerShell","Command Prompt","Administrator: Command Prompt",
              "cmd.exe","PowerShell","Console Host","Windows Terminal",
              "Administrator: C:\\Program Files","Administrator: C:\\Windows","User Account Control",
          ]
          INTERFERENCE_SUBSTRINGS = [
              "default apps","choose a default","set as default","open with",
              "how do you want to open","administrator: c:\\","user account control",
          ]
          ADDRESS_BAR_NAMES = [
              "address and search bar","address bar","search bar","omnibox","location bar",
              "url bar","address","barre d'adresse","barra de endereços","adressleiste",
              "barra de direcciones","barra degli indirizzi","adresbalk","pasek adresu",
              "thanh địa chỉ","bilah alamat",
          ]
          ADDRESS_BAR_AUTOMATION_IDS = [
              "addressEditBox","addressField","locationBar","view_1","omnibox",
          ]

          def _is_address_bar_control(ctrl):
              try:
                  wt  = (ctrl.window_text() or "").lower().strip()
                  aid = ""
                  cls = ""
                  try: aid = (ctrl.element_info.automation_id or "").lower()
                  except: pass
                  try: cls = (ctrl.element_info.class_name or "").lower()
                  except: pass
                  for name in ADDRESS_BAR_NAMES:
                      if name in wt or name in aid: return True
                  for aid_kw in ADDRESS_BAR_AUTOMATION_IDS:
                      if aid_kw.lower() in aid: return True
                  if "omnibox" in cls or "addressbar" in cls: return True
              except: pass
              return False

          def _matches_any(text, keyword_list):
              if not text: return False
              tl = text.lower().strip()
              return any(kw.lower() in tl for kw in keyword_list)

          def _matches_any_exact_start(text, keyword_list):
              if not text: return False
              tl = text.lower().strip()
              for kw in keyword_list:
                  kwl = kw.lower().strip()
                  if tl == kwl or tl.startswith(kwl): return True
              return False

          def _is_proxy_auth_dialog(window_text):
              if not window_text: return False
              return _matches_any(window_text, AUTH_TITLE_KW)

          def _find_username_fields(container):
              results = []
              try:
                  all_edits = container.descendants(control_type="Edit")
                  for ctrl in all_edits:
                      if _is_address_bar_control(ctrl): continue
                      try: wt = ctrl.window_text() or ""
                      except: wt = ""
                      try: name = ctrl.element_info.name or ""
                      except: name = ""
                      label = (wt + " " + name).lower()
                      if _matches_any(label, USERNAME_KW): results.append(ctrl)
              except: pass
              return results

          def _find_password_fields(container):
              results = []
              try:
                  all_edits = container.descendants(control_type="Edit")
                  for ctrl in all_edits:
                      if _is_address_bar_control(ctrl): continue
                      try: wt = ctrl.window_text() or ""
                      except: wt = ""
                      try: name = ctrl.element_info.name or ""
                      except: name = ""
                      label = (wt + " " + name).lower()
                      if _matches_any(label, PASSWORD_KW):
                          results.append(ctrl); continue
                      try:
                          is_pwd = ctrl.get_property("IsPassword")
                          if is_pwd: results.append(ctrl); continue
                      except: pass
                      try:
                          cls = ctrl.element_info.class_name or ""
                          if "password" in cls.lower(): results.append(ctrl)
                      except: pass
              except: pass
              return results

          def _find_submit_button(container):
              try:
                  for btn in container.descendants(control_type="Button"):
                      try: wt = btn.window_text() or ""
                      except: wt = ""
                      try: name = btn.element_info.name or ""
                      except: name = ""
                      label = (wt + " " + name).strip()
                      if _matches_any(label, SUBMIT_BTN_KW): return btn
              except: pass
              return None

          def _is_auth_dialog_by_structure(window):
              try:
                  all_edits = [c for c in window.descendants(control_type="Edit") if not _is_address_bar_control(c)]
                  if len(all_edits) == 2: return all_edits[0], all_edits[1]
              except: pass
              return None, None

          def _is_download_done_window(text):
              t = text.lower()
              return any(frag.lower() in t for frag in DOWNLOAD_DONE_TITLES)

          def _is_interference_window(text):
              if not text: return False
              for exact in INTERFERENCE_TITLES:
                  if text.strip().lower() == exact.strip().lower(): return True
              tl = text.lower()
              for sub in INTERFERENCE_SUBSTRINGS:
                  if sub in tl: return True
              return False

          def _is_target_software_window(text, software_type):
              if not text: return False
              tl = text.lower()
              if software_type == "avg": return "avg" in tl
              elif software_type in ["opera_gx"]:
                  return ("opera" in tl and "gx" in tl) or "opera gx" in tl
              elif software_type in ["opera_one","opera_smart_link","dynamic_opera","ad_mvn"]:
                  return "opera" in tl and "edge" not in tl and "chrome web store" not in tl
              return False

          def find_download_button(edge_window, software_type, label=""):
              if edge_window is None: return None, None
              if software_type in ["opera_gx","opera_one","opera_smart_link","dynamic_opera","ad_mvn"]:
                  primary_kw  = DOWNLOAD_OPERA_KW
                  brand_label = "Opera"
              elif software_type == "avg":
                  primary_kw  = DOWNLOAD_AVG_KW
                  brand_label = "AVG"
              else:
                  primary_kw  = DOWNLOAD_UNIV_KW
                  brand_label = "Generic"

              # Strategy 1: Brand-specific Button match
              try:
                  for btn in edge_window.descendants(control_type="Button"):
                      try: txt = (btn.window_text() or "").strip()
                      except: txt = ""
                      try: name = (btn.element_info.name or "").strip()
                      except: name = ""
                      combined = (txt + " " + name).strip()
                      if combined and _matches_any(combined, primary_kw):
                          log_msg("DL-Find", f"[{label}] S1 ({brand_label} Button): '{combined[:60]}'")
                          return btn, f"s1-{brand_label}-button"
              except Exception as e:
                  log_msg("DL-Find", f"[{label}] S1 scan error: {e}")

              # Strategy 2: Universal Button keyword match
              try:
                  for btn in edge_window.descendants(control_type="Button"):
                      try: txt = (btn.window_text() or "").strip()
                      except: txt = ""
                      try: name = (btn.element_info.name or "").strip()
                      except: name = ""
                      combined = (txt + " " + name).strip()
                      if combined and _matches_any(combined, DOWNLOAD_UNIV_KW) and len(combined) > 2:
                          log_msg("DL-Find", f"[{label}] S2 (Universal Button): '{combined[:60]}'")
                          return btn, "s2-universal-button"
              except Exception as e:
                  log_msg("DL-Find", f"[{label}] S2 scan error: {e}")

              # Strategy 3: Hyperlink/Text/Image
              try:
                  for el in edge_window.descendants():
                      try: ctrl_type = el.element_info.control_type
                      except: continue
                      if ctrl_type not in ["Hyperlink","Text","Image"]: continue
                      try: wt = (el.window_text() or "").strip()
                      except: wt = ""
                      if not wt or len(wt) > 200: continue
                      if "http" in wt.lower() or "www." in wt.lower(): continue
                      if _matches_any(wt, primary_kw + INTERSTITIAL_KW) and len(wt) <= 80:
                          log_msg("DL-Find", f"[{label}] S3 ({ctrl_type} link): '{wt[:60]}'")
                          return el, f"s3-{ctrl_type.lower()}-link"
              except Exception as e:
                  log_msg("DL-Find", f"[{label}] S3 scan error: {e}")

              # Strategy 4: Broad last-resort
              try:
                  all_kw = list(set(primary_kw + DOWNLOAD_UNIV_KW + INTERSTITIAL_KW))
                  for el in edge_window.descendants():
                      try: ctrl_type = el.element_info.control_type
                      except: continue
                      if ctrl_type not in ["Button","Hyperlink","Text","Image","Custom"]: continue
                      try: wt = (el.window_text() or "").strip()
                      except: wt = ""
                      if not wt or len(wt) > 100: continue
                      if "http" in wt.lower() or "www." in wt.lower(): continue
                      if _matches_any_exact_start(wt, all_kw):
                          log_msg("DL-Find", f"[{label}] S4 (broad, {ctrl_type}): '{wt[:60]}'")
                          return el, f"s4-broad-{ctrl_type.lower()}"
              except Exception as e:
                  log_msg("DL-Find", f"[{label}] S4 scan error: {e}")

              log_msg("DL-Find", f"[{label}] No download element found after all 4 strategies.")
              return None, None

          def click_download_button(edge_window, software_type, label=""):
              element, strategy = find_download_button(edge_window, software_type, label=label)
              if element is None: return False
              try: edge_window.set_focus(); time.sleep(0.4)
              except: pass
              try: element.click_input(); log_msg("DL-Click", f"[{label}] click_input() via {strategy}."); return True
              except Exception as e1: log_msg("DL-Click", f"[{label}] click_input() failed: {e1}")
              try: element.invoke(); log_msg("DL-Click", f"[{label}] invoke() via {strategy}."); return True
              except Exception as e2: log_msg("DL-Click", f"[{label}] invoke() failed: {e2}")
              try:
                  rect = element.rectangle()
                  cx = (rect.left + rect.right) // 2
                  cy = (rect.top + rect.bottom) // 2
                  pyautogui.moveTo(cx, cy, duration=0.25)
                  time.sleep(0.15)
                  pyautogui.click(cx, cy)
                  log_msg("DL-Click", f"[{label}] pyautogui at ({cx},{cy}) via {strategy}."); return True
              except Exception as e3:
                  log_msg("DL-Click", f"[{label}] pyautogui failed: {e3}")
              return False

          # ======================================================================
          # KEEP BUTTON — ROBUST KEYBOARD-FIRST + UI FALLBACK
          #
          # After clicking the download button we wait 15 seconds, then:
          #   1. Send Ctrl+J  → opens Edge Downloads panel
          #   2. Wait 2s
          #   3. Press Tab 4×  (1s delay each)
          #   4. Press Enter    → activates "Keep" regardless of language
          #
          # If the file is still not downloaded 5 seconds later we also try the
          # UI-automation approach (same position as English "Keep" button).
          # ======================================================================
          def click_keep_keyboard(edge_window, label=""):
              """
              Keyboard-only Keep flow:
                Ctrl+J → 2s delay → Tab x4 (1s each) → Enter
              Returns True always (best-effort; we cannot confirm from keyboard alone).
              """
              log_msg("Keep-KB", f"[{label}] Starting keyboard Keep sequence (Ctrl+J → Tab×4 → Enter)...")
              try:
                  if edge_window:
                      try: edge_window.set_focus(); time.sleep(0.5)
                      except: pass
                  # Ctrl+J: open downloads panel
                  send_keys('^j')
                  log_msg("Keep-KB", f"[{label}] Ctrl+J sent. Waiting 2s for panel...")
                  time.sleep(2)
                  # Tab × 4 with 1s delay each
                  for i in range(1, 5):
                      send_keys('{TAB}')
                      log_msg("Keep-KB", f"[{label}] TAB {i}/4 sent.")
                      time.sleep(1)
                  # Enter to activate the focused (Keep) button
                  send_keys('{ENTER}')
                  log_msg("Keep-KB", f"[{label}] ENTER sent. Keyboard Keep sequence complete.")
                  return True
              except Exception as e:
                  log_msg("Keep-KB", f"[{label}] Keyboard Keep sequence error: {e}")
                  return False

          def click_keep_ui(edge_window, label=""):
              """
              UI-automation Keep: searches for Keep button by keyword in any language.
              Falls back through 3 strategies then Alt+K keyboard shortcut.
              """
              if edge_window is None: return False
              clicked = False

              # S1: Button descendants keyword match
              try:
                  for btn in edge_window.descendants(control_type="Button"):
                      try: txt = (btn.window_text() or "").strip()
                      except: txt = ""
                      try: nm = (btn.element_info.name or "").strip()
                      except: nm = ""
                      combined = (txt + " " + nm).strip()
                      if combined and len(combined) <= 60 and _matches_any(combined, KEEP_KW):
                          log_msg("Keep-UI", f"[{label}] S1 (Button): '{combined[:50]}'")
                          try:
                              edge_window.set_focus(); time.sleep(0.3)
                              btn.click_input()
                              log_msg("Keep-UI", f"[{label}] click_input() succeeded."); return True
                          except:
                              try: btn.invoke(); log_msg("Keep-UI", f"[{label}] invoke() succeeded."); return True
                              except:
                                  try:
                                      rect = btn.rectangle()
                                      cx = (rect.left + rect.right) // 2
                                      cy = (rect.top + rect.bottom) // 2
                                      pyautogui.moveTo(cx, cy, duration=0.2); time.sleep(0.1)
                                      pyautogui.click(cx, cy)
                                      log_msg("Keep-UI", f"[{label}] pyautogui click succeeded."); return True
                                  except: pass
              except Exception as e:
                  log_msg("Keep-UI", f"[{label}] S1 error: {e}")

              # S2: ToolBar/Pane scan
              try:
                  for container_type in ["ToolBar","Pane","Group","Custom"]:
                      try: containers = edge_window.descendants(control_type=container_type)
                      except: continue
                      for container in containers:
                          try:
                              for el in container.descendants():
                                  try: ctrl_type = el.element_info.control_type
                                  except: continue
                                  if ctrl_type not in ["Button","Hyperlink","Text"]: continue
                                  try: wt = (el.window_text() or "").strip()
                                  except: wt = ""
                                  try: nm = (el.element_info.name or "").strip()
                                  except: nm = ""
                                  combined = (wt + " " + nm).strip()
                                  if combined and len(combined) <= 60 and _matches_any(combined, KEEP_KW):
                                      log_msg("Keep-UI", f"[{label}] S2 ({container_type}->{ctrl_type}): '{combined[:50]}'")
                                      try:
                                          edge_window.set_focus(); time.sleep(0.3)
                                          el.click_input(); log_msg("Keep-UI", f"[{label}] S2 click_input() succeeded."); return True
                                      except:
                                          try: el.invoke(); log_msg("Keep-UI", f"[{label}] S2 invoke() succeeded."); return True
                                          except:
                                              try:
                                                  rect = el.rectangle()
                                                  cx = (rect.left + rect.right) // 2
                                                  cy = (rect.top + rect.bottom) // 2
                                                  pyautogui.click(cx, cy)
                                                  log_msg("Keep-UI", f"[{label}] S2 pyautogui succeeded."); return True
                                              except: pass
                          except: pass
              except Exception as e:
                  log_msg("Keep-UI", f"[{label}] S2 error: {e}")

              # S3: Alt+K keyboard fallback (English Edge shortcut)
              log_msg("Keep-UI", f"[{label}] S3: Alt+K keyboard fallback...")
              try:
                  edge_window.set_focus(); time.sleep(0.5)
                  send_keys('%k'); time.sleep(0.5)
                  log_msg("Keep-UI", f"[{label}] Alt+K sent."); return True
              except Exception as ek:
                  log_msg("Keep-UI", f"[{label}] Alt+K failed: {ek}")
                  try:
                      send_keys('{TAB}'); time.sleep(0.3); send_keys('{ENTER}')
                      log_msg("Keep-UI", f"[{label}] Tab+Enter fallback sent."); return True
                  except Exception as et:
                      log_msg("Keep-UI", f"[{label}] Tab+Enter failed: {et}")

              log_msg("Keep-UI", f"[{label}] All UI Keep strategies exhausted.")
              return False

          def dismiss_interference_windows(desktop, software_type, label=""):
              try: all_windows = desktop.windows(visible_only=True)
              except: return False
              dismissed_any = False
              for window in all_windows:
                  try:
                      wt = window.window_text()
                      if not wt: continue
                      if "Microsoft Edge" in wt or "msedge" in wt.lower(): continue
                      if _is_target_software_window(wt, software_type): continue
                      if not _is_interference_window(wt): continue
                      log_msg("WinGuard", f"Interference window: '{wt}' [{label}]")
                      closed = False
                      try: window.set_focus(); time.sleep(0.25); send_keys('%{F4}'); time.sleep(0.4); closed = True; log_msg("WinGuard", f"Closed '{wt}' via Alt+F4.")
                      except: pass
                      if not closed:
                          try: window.close(); time.sleep(0.3); closed = True; log_msg("WinGuard", f"Closed '{wt}' via window.close().")
                          except: pass
                      if not closed:
                          try: window.minimize(); time.sleep(0.25); closed = True; log_msg("WinGuard", f"Minimized '{wt}'.")
                          except: pass
                      if closed: dismissed_any = True
                  except: pass
              return dismissed_any

          def robust_maximize_opera_window(desktop, software_type, label=""):
              dismiss_interference_windows(desktop, software_type, label=f"{label}-pre-dismiss")
              time.sleep(0.3)
              found_window = None
              for attempt in range(1, 6):
                  log_msg("MaximizeOp", f"[{label}] Search attempt {attempt}/5...")
                  try:
                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text()
                          if wt and _is_target_software_window(wt, software_type):
                              found_window = w
                              log_msg("MaximizeOp", f"[{label}] Found: '{wt}'")
                              break
                  except Exception as e:
                      log_msg("MaximizeOp", f"[{label}] Search error: {e}")
                  if found_window: break
                  log_msg("MaximizeOp", f"[{label}] Not found yet. Waiting 3s...")
                  time.sleep(3)
              if not found_window:
                  log_msg("MaximizeOp", f"[{label}] ERROR: Opera window not found after 5 attempts.")
                  return None

              try: found_window.set_focus(); time.sleep(0.4); found_window.maximize(); time.sleep(0.5)
              except Exception as e: log_msg("MaximizeOp", f"[{label}] S1 failed: {e}")
              try:
                  found_window.set_focus(); time.sleep(0.3)
                  send_keys('{VK_LWIN down}{UP}{VK_LWIN up}'); time.sleep(0.4)
                  send_keys('{VK_LWIN down}{UP}{VK_LWIN up}'); time.sleep(0.4)
              except Exception as e: log_msg("MaximizeOp", f"[{label}] S2 failed: {e}")
              try:
                  hwnd = found_window.handle
                  ctypes.windll.user32.ShowWindow(hwnd, 9); time.sleep(0.4)
              except Exception as e: log_msg("MaximizeOp", f"[{label}] S3 failed: {e}")
              try:
                  user32 = ctypes.windll.user32
                  sw = user32.GetSystemMetrics(0); sh = user32.GetSystemMetrics(1)
                  hwnd = found_window.handle
                  user32.SetWindowPos(hwnd, -1, 0, 0, sw, sh, 0x0040 | 0x0020); time.sleep(0.3)
                  user32.SetWindowPos(hwnd, -2, 0, 0, sw, sh, 0x0040 | 0x0020); time.sleep(0.3)
              except Exception as e: log_msg("MaximizeOp", f"[{label}] S4 failed: {e}")
              try: found_window.set_focus(); time.sleep(0.2); found_window.maximize(); time.sleep(0.3); found_window.set_focus(); time.sleep(0.2)
              except Exception as e: log_msg("MaximizeOp", f"[{label}] S5 failed: {e}")
              log_msg("MaximizeOp", f"[{label}] Maximize complete: '{found_window.window_text()}'")
              return found_window

          def force_maximize_and_focus_target(desktop, target_window, software_type, label=""):
              dismiss_interference_windows(desktop, software_type, label=f"{label}-dismiss")
              time.sleep(0.3)
              found_window = target_window
              if found_window is None:
                  try:
                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text()
                          if wt and _is_target_software_window(wt, software_type):
                              found_window = w; break
                  except: pass
              if found_window is None:
                  log_msg("WinGuard", f"[{label}] No target window found.")
                  return None
              try:
                  found_window.set_focus(); time.sleep(0.2)
                  found_window.maximize(); time.sleep(0.3)
                  found_window.set_focus(); time.sleep(0.2)
                  log_msg("WinGuard", f"[{label}] Maximized/focused: '{found_window.window_text()}'")
                  return found_window
              except Exception as e:
                  log_msg("WinGuard", f"[{label}] maximize/focus failed: {e}")
                  return found_window

          def close_download_windows(desktop, attempt_label=""):
              closed_any = False
              try: all_windows = desktop.windows(visible_only=True)
              except: return False
              for window in all_windows:
                  try:
                      wt = window.window_text()
                      if not wt: continue
                      is_match = _is_download_done_window(wt)
                      if not is_match and ("Microsoft Edge" in wt or wt == "Edge"):
                          try:
                              for child in window.children():
                                  child_wt = child.window_text()
                                  if child_wt and _is_download_done_window(child_wt): is_match = True; break
                          except: pass
                      if not is_match: continue
                      log_msg("EdgeClose", f"Targeting '{wt}' for close (Attempt {attempt_label})")
                      closed = False
                      try:
                          window.set_focus(); time.sleep(0.4)
                          sw, sh = pyautogui.size(); pyautogui.click(sw//2, sh//2); time.sleep(0.5)
                          send_keys('^w'); time.sleep(0.5); send_keys('^w'); time.sleep(0.4)
                          closed = True; log_msg("EdgeClose", "Ctrl+W x2 executed.")
                      except Exception as e: log_msg("EdgeClose", f"Ctrl+W failed: {e}")
                      if not closed:
                          try: window.set_focus(); time.sleep(0.4); send_keys('^j'); time.sleep(0.6); send_keys('^j'); time.sleep(0.4); closed = True
                          except: pass
                      if not closed:
                          try: window.set_focus(); time.sleep(0.3); send_keys('%{F4}'); closed = True
                          except: pass
                      if closed: closed_any = True; time.sleep(0.5)
                  except: pass
              return closed_any

          def click_opera_button(desktop, opera_window, software_type, keyword_list, label="", fallback_coords=None):
              try:
                  target = opera_window
                  if target is None or not target.is_visible():
                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text()
                          if wt and _is_target_software_window(wt, software_type):
                              target = w; break
                  if not target:
                      log_msg("OperaBtn", f"[{label}] Target window not found.")
                      if fallback_coords:
                          fx, fy = fallback_coords
                          try: pyautogui.moveTo(fx, fy, duration=0.2); pyautogui.click(fx, fy); return True
                          except: pass
                      return False

                  target.set_focus(); time.sleep(0.3)

                  # Pass 1: exact title match
                  for kw in keyword_list:
                      try:
                          btns = target.descendants(control_type="Button", title=kw)
                          if btns:
                              try: btns[0].click_input(); log_msg("OperaBtn", f"[{label}] Exact title '{kw}' clicked."); return True
                              except: pass
                      except: pass

                  # Pass 2: partial text match
                  for btn in target.descendants(control_type="Button"):
                      try:
                          txt = (btn.window_text() or "").strip()
                          nm  = (btn.element_info.name or "").strip()
                          combined = (txt + " " + nm).strip()
                      except: continue
                      if combined and _matches_any(combined, keyword_list):
                          try: btn.click_input(); log_msg("OperaBtn", f"[{label}] Partial match '{combined[:40]}' clicked."); return True
                          except: pass

                  # Pass 3: all descendants
                  for el in target.descendants():
                      try: ctrl_type = el.element_info.control_type
                      except: continue
                      if ctrl_type not in ["Button","Hyperlink","Text","Custom"]: continue
                      try: txt = (el.window_text() or "").strip()
                      except: txt = ""
                      if not txt or len(txt) > 80: continue
                      if _matches_any(txt, keyword_list):
                          try: el.click_input(); log_msg("OperaBtn", f"[{label}] Descendant '{txt[:40]}' clicked."); return True
                          except: pass

              except Exception as e:
                  log_msg("OperaBtn", f"[{label}] Exception: {e}")

              # Fallback: coordinate click
              if fallback_coords:
                  fx, fy = fallback_coords
                  log_msg("OperaBtn", f"[{label}] Fallback click at ({fx}, {fy}).")
                  try: pyautogui.moveTo(fx, fy, duration=0.2); pyautogui.click(fx, fy); return True
                  except: pass
              return False

          def inject_proxy_auth(window, label=""):
              if not USE_PROXY or not PROXY_USER or not PROXY_PASS: return False
              try:
                  user_fields = _find_username_fields(window)
                  pass_fields = _find_password_fields(window)
                  if not user_fields or not pass_fields:
                      u_struct, p_struct = _is_auth_dialog_by_structure(window)
                      if u_struct and p_struct:
                          log_msg("ProxyAuth", f"[{label}] Structural detection (2-field dialog).")
                          user_fields = [u_struct]; pass_fields = [p_struct]
                  if user_fields and pass_fields:
                      if _is_address_bar_control(user_fields[0]) or _is_address_bar_control(pass_fields[0]):
                          log_msg("ProxyAuth", f"[{label}] BLOCKED — fields are address bars. Skipping."); return False
                      log_msg("ProxyAuth", f"[{label}] Auth dialog — injecting credentials. User={PROXY_USER[:25]}...")
                      window.set_focus(); time.sleep(0.5)
                      try:
                          user_fields[0].click_input(); time.sleep(0.2)
                          send_keys('^a'); time.sleep(0.1); send_keys('{DELETE}'); time.sleep(0.1)
                          user_fields[0].type_keys(PROXY_USER, with_spaces=True, pause=0.02); time.sleep(0.3)
                      except Exception as eu: log_msg("ProxyAuth", f"[{label}] Username field error: {eu}")
                      try:
                          pass_fields[0].click_input(); time.sleep(0.2)
                          send_keys('^a'); time.sleep(0.1); send_keys('{DELETE}'); time.sleep(0.1)
                          pass_fields[0].type_keys(PROXY_PASS, with_spaces=True, pause=0.02); time.sleep(0.3)
                      except Exception as ep: log_msg("ProxyAuth", f"[{label}] Password field error: {ep}")
                      signed_in = False
                      submit_btn = _find_submit_button(window)
                      if submit_btn:
                          try: submit_btn.click_input(); log_msg("ProxyAuth", f"[{label}] Submit clicked."); signed_in = True
                          except: pass
                      if not signed_in:
                          try: pass_fields[0].click_input(); time.sleep(0.2); send_keys('{ENTER}'); signed_in = True
                          except: pass
                      return signed_in
                  else:
                      wt = ""
                      try: wt = window.window_text() or ""
                      except: pass
                      if not _is_proxy_auth_dialog(wt):
                          log_msg("ProxyAuth", f"[{label}] Not auth dialog: '{wt}'. Skipping."); return False
                      log_msg("ProxyAuth", f"[{label}] Keyboard Tab injection (window='{wt}').")
                      window.set_focus(); time.sleep(0.5)
                      send_keys('^a{DELETE}'); time.sleep(0.1)
                      for ch in PROXY_USER:
                          send_keys(ch if ch.isalnum() or ch in '.-_=@' else '{%s}' % ch); time.sleep(0.01)
                      send_keys('{TAB}'); time.sleep(0.3)
                      send_keys('^a{DELETE}'); time.sleep(0.1)
                      for ch in PROXY_PASS:
                          send_keys(ch if ch.isalnum() or ch in '.-_=@' else '{%s}' % ch); time.sleep(0.01)
                      time.sleep(0.2); send_keys('{ENTER}')
                      log_msg("ProxyAuth", f"[{label}] Keyboard auth submitted."); return True
              except Exception as e:
                  log_msg("ProxyAuth", f"[{label}] inject_proxy_auth exception: {e}"); return False

          # ======================================================================
          # OPERA ONE POST-INSTALL (uses active NEXT_KW / DONE_KW / SUBMIT_KW)
          # ======================================================================
          def opera_one_post_install_sequence(opera_window, software_type="opera_one"):
              log_msg("PostInstall-OP1", f"=== Opera One Post-Install Starting (Mode: {LANGUAGE_MODE}) ===")
              desktop = Desktop(backend="uia")

              log_msg("PostInstall-OP1", "STEP 1: Waiting 50s for Opera One to initialize...")
              for s in range(1, 51):
                  log_msg("PostInstall-OP1", f"  Init wait: {s}/50s..."); time.sleep(1)

              log_msg("PostInstall-OP1", "STEP 2: Locating and maximizing Opera One window...")
              desktop = Desktop(backend="uia")
              opera_window = robust_maximize_opera_window(desktop, software_type, label="step2-fullscreen")
              if opera_window is None:
                  log_msg("PostInstall-OP1", "STEP 2 WARNING: Opera window not found. Continuing...")
              else:
                  log_msg("PostInstall-OP1", f"STEP 2 COMPLETE: '{opera_window.window_text()}'")

              log_msg("PostInstall-OP1", "STEP 3: Waiting 5s after maximize...")
              for s in range(1, 6): log_msg("PostInstall-OP1", f"  {s}/5s..."); time.sleep(1)

              log_msg("PostInstall-OP1", "STEP 4: Additional 5s settle wait...")
              for s in range(1, 6): log_msg("PostInstall-OP1", f"  {s}/5s..."); time.sleep(1)

              sw, sh = pyautogui.size(); cx, cy = sw // 2, sh // 2
              log_msg("PostInstall-OP1", f"STEP 5: Center click at ({cx},{cy})...")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label="step5-pre-click")
              try:
                  pyautogui.moveTo(cx, cy, duration=0.3); time.sleep(0.2)
                  pyautogui.click(cx, cy)
                  log_msg("PostInstall-OP1", "STEP 5 COMPLETE.")
              except Exception as e: log_msg("PostInstall-OP1", f"STEP 5 ERROR: {e}")

              log_msg("PostInstall-OP1", "STEP 6: Waiting 5s after center click...")
              for s in range(1, 6): log_msg("PostInstall-OP1", f"  {s}/5s..."); time.sleep(1)

              # ── STEP 7: Click "Next" 6 times ─────────────────────────────────
              log_msg("PostInstall-OP1", f"STEP 7: Clicking 'Next' 6 times [{LANGUAGE_MODE}]...")
              for i in range(1, 7):
                  desktop = Desktop(backend="uia")
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label=f"step7-NEXT-{i}")
                  log_msg("PostInstall-OP1", f"  Next click {i}/6...")
                  sw_now, sh_now = pyautogui.size()
                  fallback_next  = (int(sw_now * 0.90), int(sh_now * 0.90))
                  clicked = click_opera_button(desktop, opera_window, software_type,
                                              keyword_list=NEXT_KW, label=f"NEXT-{i}", fallback_coords=fallback_next)
                  if clicked: log_msg("PostInstall-OP1", f"  Next {i}/6 clicked.")
                  else:       log_msg("PostInstall-OP1", f"  Next {i}/6 — fallback used.")
                  time.sleep(2)
              log_msg("PostInstall-OP1", "STEP 7 COMPLETE.")

              # ── STEP 7b: Click "Done" ─────────────────────────────────────────
              log_msg("PostInstall-OP1", f"STEP 7b: Clicking 'Done'/'Finish' [{LANGUAGE_MODE}]...")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label="step7b-DONE")
              sw_now, sh_now = pyautogui.size()
              fallback_done  = (int(sw_now * 0.90), int(sh_now * 0.90))
              clicked_done = click_opera_button(desktop, opera_window, software_type,
                                               keyword_list=DONE_KW, label="DONE", fallback_coords=fallback_done)
              if clicked_done: log_msg("PostInstall-OP1", "STEP 7b COMPLETE: Done clicked.")
              else:            log_msg("PostInstall-OP1", "STEP 7b: Done fallback used.")

              log_msg("PostInstall-OP1", "STEP 8: Waiting 5s after Done...")
              for s in range(1, 6): log_msg("PostInstall-OP1", f"  {s}/5s..."); time.sleep(1)

              log_msg("PostInstall-OP1", "STEP 9: Pressing ENTER key...")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label="step9-ENTER")
              send_keys('{ENTER}')
              log_msg("PostInstall-OP1", "STEP 9 COMPLETE.")

              log_msg("PostInstall-OP1", "STEP 10: Waiting 5s after ENTER...")
              for s in range(1, 6): log_msg("PostInstall-OP1", f"  {s}/5s..."); time.sleep(1)

              # ── STEP 11: Click "Submit" ───────────────────────────────────────
              log_msg("PostInstall-OP1", f"STEP 11: Clicking 'Submit' [{LANGUAGE_MODE}]...")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label="step11-SUBMIT")
              sw_now, sh_now = pyautogui.size()
              fallback_submit = (sw_now // 2, int(sh_now * 0.85))
              clicked_submit = click_opera_button(desktop, opera_window, software_type,
                                                  keyword_list=SUBMIT_KW, label="SUBMIT", fallback_coords=fallback_submit)
              if clicked_submit: log_msg("PostInstall-OP1", "STEP 11 COMPLETE: Submit clicked.")
              else:              log_msg("PostInstall-OP1", "STEP 11: Submit fallback used.")

              log_msg("PostInstall-OP1", "STEP 12: Waiting 5s after Submit...")
              for s in range(1, 6): log_msg("PostInstall-OP1", f"  {s}/5s..."); time.sleep(1)

              log_msg("PostInstall-OP1", "STEP 13: Starting TAB cycle sequence (8→18 TABs)...")
              tab_sequence = list(range(8, 19))
              log_msg("PostInstall-OP1", f"  TAB plan: {tab_sequence}")

              for cycle_idx, tab_count in enumerate(tab_sequence):
                  log_msg("PostInstall-OP1", f"--- TAB CYCLE {cycle_idx+1}/{len(tab_sequence)}: {tab_count} TABs ---")
                  desktop = Desktop(backend="uia")
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label=f"cycle{cycle_idx+1}-pre-CtrlT")
                  log_msg("PostInstall-OP1", f"  Ctrl+T before TABs..."); send_keys('^t')
                  log_msg("PostInstall-OP1", f"  Waiting 5s...")
                  for s in range(1, 6): log_msg("PostInstall-OP1", f"    Pre-TAB {s}/5s..."); time.sleep(1)

                  log_msg("PostInstall-OP1", f"  Pressing TAB {tab_count} times...")
                  for i in range(1, tab_count + 1):
                      desktop = Desktop(backend="uia")
                      opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label=f"cycle{cycle_idx+1}-TAB{tab_count}-{i}")
                      log_msg("PostInstall-OP1", f"    TAB {i}/{tab_count}..."); send_keys('{TAB}')
                      log_msg("PostInstall-OP1", f"    TAB {i} sent. Waiting 1s..."); time.sleep(1)

                  desktop = Desktop(backend="uia")
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label=f"cycle{cycle_idx+1}-ENTER")
                  log_msg("PostInstall-OP1", f"  ENTER after {tab_count} TABs..."); send_keys('{ENTER}')
                  log_msg("PostInstall-OP1", f"  Waiting 5s...")
                  for s in range(1, 6): log_msg("PostInstall-OP1", f"    Post-ENTER {s}/5s..."); time.sleep(1)

                  desktop = Desktop(backend="uia")
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label=f"cycle{cycle_idx+1}-post-CtrlT")
                  log_msg("PostInstall-OP1", f"  Ctrl+T after TABs..."); send_keys('^t')
                  log_msg("PostInstall-OP1", f"  Waiting 5s...")
                  for s in range(1, 6): log_msg("PostInstall-OP1", f"    Post-CtrlT {s}/5s..."); time.sleep(1)
                  log_msg("PostInstall-OP1", f"--- TAB CYCLE {cycle_idx+1}/{len(tab_sequence)} COMPLETE ---")

              log_msg("PostInstall-OP1", "STEP 13 COMPLETE.")
              log_msg("PostInstall-OP1", f"=== Opera One Post-Install Sequence Completed [{LANGUAGE_MODE}] ===")

