                  log("[Opera GX] Opera GX did not launch within 120s. Aborting post-install.")
                  return
              log("[Opera GX] STEP 1: Opera GX detected. Activating window...")
              run_as('tell application "Opera GX" to activate', silent=True)
              time.sleep(2)

              log("[Opera GX] STEP 2: Dismissing system popups for 10 seconds...")
              t0 = time.time()
