name: Parallel macOS Auto-Installer

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Select macOS Runner Version'
        required: true
        type: choice
        options:
          - 'macos-15'
          - 'macos-14'
          - 'macos-13'
          - 'macos-15-xlarge'
          - 'macos-26'
          - 'macos-26-intel'
        default: 'macos-14'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'techx@justzeus.com'
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '1'
      software_choice:
        description: 'Select Software & Link'
        required: true
        type: choice
        options:
          - 'OperaGX - B4Books'
          - 'OperaGX - Techx'
          - 'OperaGX - Fatradez'
          - 'OperaGX - James'
          - 'OperaGX - Oliver'
          - 'OperaGX - Mahal'
          - 'Opera-One - Esmeel'
          - 'Opera-One - Harrari'
          - 'Opera-One - Chloe'
          - 'Opera-One - Daisy'
          - 'Opera-One - Jimmy'
          - 'Ad-MVN - Techx'
          - 'Ad-MVN - B4Books'
          - 'Ad-MVN - Orderflowz'
          - 'Ad-MVN - A2Z'
        default: 'Ad-MVN - B4Books'
      scrapeops_api_key:
        description: 'ScrapeOps API Key'
        required: false
        type: string
        default: '2f2622aa-3db7-4033-8b94-f0657bdf0cb3'
      run_without_proxy:
        description: 'Run without proxy (Bypass all proxies)'
        required: true
        type: boolean
        default: true
      proxy_country:
        description: 'Proxy Country Geotargeting'
        required: true
        type: choice
        options:
          - 'USA'
          - 'UK'
          - 'Canada'
          - 'Australia'
          - 'Germany'
          - 'France'
          - 'Brazil'
        default: 'USA'
      mobile_proxies:
        description: 'Use Mobile Proxies'
        required: true
        type: boolean
        default: false
      sticky_sessions:
        description: 'Enable Unique Sticky Sessions'
        required: true
        type: boolean
        default: true

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Generate Dynamic Matrix & Proxy Config
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          OS_VERSION: ${{ inputs.os_version }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          RUN_WITHOUT_PROXY: ${{ inputs.run_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import os, json, uuid
          email = os.environ.get("EMAIL", "").strip()
          num_devices = int(os.environ.get("NUM_DEVICES", "1"))
          os_version = os.environ.get("OS_VERSION", "macos-15")
          api_key = os.environ.get("API_KEY", "").strip()
          run_without_proxy = os.environ.get("RUN_WITHOUT_PROXY", "false").lower() == "true"
          country_input = os.environ.get("COUNTRY", "USA")
          mobile = os.environ.get("MOBILE", "false").lower() == "true"
          sticky = os.environ.get("STICKY", "false").lower() == "true"
          software_choice = os.environ.get("SOFTWARE_CHOICE", "OperaGX - James")

          use_proxy = bool(api_key) and not run_without_proxy

          country_map = {
              "USA": "us", "UK": "uk", "Canada": "ca",
              "Australia": "au", "Germany": "de", "France": "fr",
              "Brazil": "br"
          }
          cc = country_map.get(country_input, "us")

          opera_urls = {
              "OperaGX - B4Books":  "https://u.to/opx-b4b/2nh4Ig",
              "OperaGX - Techx":    "https://u.to/techxsm/xVyFIg",
              "OperaGX - Fatradez": "https://u.to/fatradezsm/cF2FIg",
              "OperaGX - James":    "https://u.to/jamesxsm/eV2FIg",
              "OperaGX - Oliver":   "https://u.to/oliverxsm/f12FIg",
              "OperaGX - Mahal":    "https://u.to/mahalxsm/iF2FIg",
          }
          opera_one_urls = {
              "Opera-One - Esmeel":  "https://u.to/esmlxopo/cTOGIg",
              "Opera-One - Harrari": "https://u.to/hararixopo/zTOGIg",
              "Opera-One - Chloe":   "https://u.to/chloexopo/_DOGIg",
              "Opera-One - Daisy":   "https://u.to/daisyxopo/LjSGIg",
              "Opera-One - Jimmy":   "https://u.to/jmy/mUZ4Ig",
          }
          ad_mvn_urls = {
              "Ad-MVN - Techx":      "https://u.to/techxadmvnxsmrt/gvd7Ig",
              "Ad-MVN - B4Books":    "https://u.to/b4bxadmvnxsmrt/5-h7Ig",
              "Ad-MVN - Orderflowz": "https://u.to/ordrflzadmvnxsmrt/-fZ7Ig",
              "Ad-MVN - A2Z":        "https://u.to/a2zadmvnxsmrt/Y-t7Ig",
          }
          all_urls = {**opera_urls, **opera_one_urls, **ad_mvn_urls}
          target_url = all_urls.get(software_choice, opera_urls["OperaGX - James"])

          dynamic_links = [
              "OperaGX - Techx", "OperaGX - Fatradez", "OperaGX - James",
              "OperaGX - Oliver", "OperaGX - Mahal"
          ]
          if software_choice in dynamic_links or software_choice.startswith("Ad-MVN"):
              software_type = "dynamic_opera"
              dmg_filter = "*Opera*"
          elif software_choice.startswith("OperaGX"):
              software_type = "opera_gx"
              dmg_filter = "*OperaGX*"
          elif software_choice.startswith("Opera-One"):
              software_type = "opera_one"
              dmg_filter = "*Opera*"
          else:
              software_type = "opera_gx"
              dmg_filter = "*Opera*"

          def short_os(os_ver):
              mapping = {
                  "macos-15":        "M15",
                  "macos-14":        "M14",
                  "macos-13":        "M13",
                  "macos-15-xlarge": "M15X",
                  "macos-26":        "M26",
                  "macos-26-intel":  "M26I",
              }
              return mapping.get(os_ver, "MAC")

          def short_software(choice):
              prefix_map = {
                  "OperaGX":   "OPX",
                  "Opera-One": "OPO",
                  "Ad-MVN":    "MVN",
              }
              for key, prefix in prefix_map.items():
                  if choice.startswith(key):
                      parts = choice.split(" - ", 1)
                      list_name = parts[1].replace(" ", "") if len(parts) > 1 else ""
                      return f"{prefix}-{list_name}"
              return choice.replace(" ", "").replace("-", "")

          short_os_tag = short_os(os_version)
          short_sw_tag = short_software(software_choice)
          includes = []
          if email:
              for i in range(1, num_devices + 1):
                  device_name = f"{i}-{short_os_tag}-{short_sw_tag}"
                  if use_proxy:
                      proxy_user = f"scrapeops.country={cc}"
                      if mobile:
                          proxy_user += ".mobile=true"
                      if sticky:
                          session_id = str(uuid.uuid4())[:8]
                          proxy_user += f".sticky_session={session_id}"
                      proxy_pass = api_key
                  else:
                      proxy_user = ""
                      proxy_pass = ""
                  includes.append({
                      "device":        device_name,
                      "email":         email,
                      "os":            os_version,
                      "use_proxy":     str(use_proxy).lower(),
                      "proxy_user":    proxy_user,
                      "proxy_pass":    proxy_pass,
                      "target_url":    target_url,
                      "software_type": software_type,
                      "dmg_filter":    dmg_filter,
                  })
          if not includes:
              print("Error: Valid configuration could not be generated.")
              exit(1)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")

      - name: Update Workflow Defaults (Remember Inputs)
        shell: python
        env:
          OS_VERSION: ${{ inputs.os_version }}
          GETSCREEN_EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          RUN_WITHOUT_PROXY: ${{ inputs.run_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import re, os
          file_path = ".github/workflows/main6.yml"
          if os.path.exists(file_path):
              with open(file_path, "r") as f:
                  content = f.read()
              def update_default_str(input_name, new_val):
                  global content
                  pattern = r"(" + input_name + r":[\s\S]*?default:\s*')[^']*(')"
                  content = re.sub(pattern, rf"\g<1>{new_val}\g<2>", content, count=1)
              def update_default_bool(input_name, new_val):
                  global content
                  pattern = r"(" + input_name + r":[\s\S]*?default:\s*)(true|false)"
                  content = re.sub(pattern, rf"\g<1>{new_val.lower()}", content, count=1)
              update_default_str("os_version",        os.environ.get("OS_VERSION"))
              update_default_str("getscreen_email",   os.environ.get("GETSCREEN_EMAIL"))
              update_default_str("num_devices",       os.environ.get("NUM_DEVICES"))
              update_default_str("software_choice",   os.environ.get("SOFTWARE_CHOICE"))
              update_default_str("scrapeops_api_key", os.environ.get("API_KEY"))
              update_default_bool("run_without_proxy",os.environ.get("RUN_WITHOUT_PROXY"))
              update_default_str("proxy_country",     os.environ.get("COUNTRY"))
              update_default_bool("mobile_proxies",   os.environ.get("MOBILE"))
              update_default_bool("sticky_sessions",  os.environ.get("STICKY"))
              with open(file_path, "w") as f:
                  f.write(content)
          else:
              print(f"File {file_path} not found. Skipping auto-save.")

      - name: Commit and Push New Defaults
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/main6.yml
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Update last used inputs[skip ci]" && git push)

  remote_session:
    name: Remote Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 8

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      # ================================================================== #
      # STEP 1 — Disable Gatekeeper & macOS security                       #
      # ================================================================== #
      - name: Disable Gatekeeper & Configure macOS Security
        shell: bash
        run: |
          echo "=== Configuring macOS Security Settings ==="
          sudo spctl --master-disable || true
          sudo defaults write /Library/Preferences/com.apple.security GKAutoRearm -bool false || true
          sudo defaults write /Library/Preferences/com.apple.security AssessmentEnable -bool false || true
          defaults write com.apple.LaunchServices LSQuarantine -bool false || true
          defaults write com.apple.Safari AutoOpenSafeDownloads -bool true || true
          defaults write com.apple.Safari DownloadValidation -bool false || true
          sudo spctl --global-disable || true
          echo "macOS security configuration complete."

      # ================================================================== #
      # STEP 2 — Python venv + Homebrew + cliclick                         #
      # ================================================================== #
      - name: Install Dependencies (Python + Browser Tools)
        shell: bash
        run: |
          echo "=== Installing Python UI Automation Dependencies ==="

          VENV_DIR="/tmp/uienv"
          PYTHON_BIN=""
          for candidate in python3.12 python3.11 python3.10 python3; do
            if command -v "$candidate" &>/dev/null; then
              PYTHON_BIN="$candidate"
              break
            fi
          done

          if [ -z "$PYTHON_BIN" ]; then
            echo "ERROR: No Python3 found on runner."
            exit 1
          fi

          echo "Using Python: $PYTHON_BIN ($($PYTHON_BIN --version 2>&1))"

          rm -rf "$VENV_DIR"
          "$PYTHON_BIN" -m venv "$VENV_DIR"
          source "$VENV_DIR/bin/activate"
          pip install --upgrade pip --quiet
          pip install pyobjc-core pyobjc-framework-Cocoa \
                      pyobjc-framework-ApplicationServices --quiet || true
          pip install atomacos --quiet || true
          pip install Pillow requests --quiet || true
          deactivate

          echo "UIENV_PYTHON=$VENV_DIR/bin/python3" >> "$GITHUB_ENV"
          echo "Python venv ready at $VENV_DIR"

          if ! command -v brew &>/dev/null; then
            echo "Installing Homebrew..."
            NONINTERACTIVE=1 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || true
            for bp in /opt/homebrew/bin /usr/local/bin; do
              if [ -x "$bp/brew" ]; then
                export PATH="$bp:$PATH"
                echo "PATH=$bp:$PATH" >> "$GITHUB_ENV"
                break
              fi
            done
          fi

          brew install cliclick --quiet || true
          echo "All dependencies installed."

      # ================================================================== #
      # STEP 3 — Pre-Grant ALL TCC permissions upfront (CLI-first)         #
      # ================================================================== #
      - name: Pre-Grant TCC Permissions (CLI-first, comprehensive)
        shell: bash
        run: |
          echo "=== Pre-Granting TCC Permissions via SQLite (CLI) ==="
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"

          grant_tcc() {
            local SERVICE="$1"
            local CLIENT="$2"
            local CLIENT_TYPE="$3"
            sudo sqlite3 "$TCC_DB" \
              "INSERT OR REPLACE INTO access \
               (service, client, client_type, auth_value, auth_reason, auth_version, flags) \
               VALUES ('$SERVICE', '$CLIENT', $CLIENT_TYPE, 2, 4, 1, 0);" 2>/dev/null || true
          }

          # ---- Accessibility ----
          grant_tcc kTCCServiceAccessibility com.apple.Terminal          0
          grant_tcc kTCCServiceAccessibility com.apple.systemevents      0
          grant_tcc kTCCServiceAccessibility com.google.Chrome           0
          grant_tcc kTCCServiceAccessibility /usr/bin/osascript          1
          grant_tcc kTCCServiceAccessibility /bin/bash                   1
          grant_tcc kTCCServiceAccessibility /usr/bin/python3            1

          # ---- Screen Recording ----
          grant_tcc kTCCServiceScreenCapture com.google.Chrome           0
          grant_tcc kTCCServiceScreenCapture com.apple.Terminal          0
          # Getscreen bundle IDs (all known variants)
          grant_tcc kTCCServiceScreenCapture me.getscreen.agent          0
          grant_tcc kTCCServiceScreenCapture com.getscreen.agent         0
          grant_tcc kTCCServiceScreenCapture com.getscreen.mac           0
          grant_tcc kTCCServiceScreenCapture me.getscreen.mac            0
          grant_tcc kTCCServiceScreenCapture me.getscreen.desktop        0
          grant_tcc kTCCServiceScreenCapture com.getscreen.desktop       0

          # ---- Local Network (hosted-compute runner + getscreen + chrome) ----
          grant_tcc kTCCServiceLocalNetwork  com.google.Chrome           0
          grant_tcc kTCCServiceLocalNetwork  com.apple.Terminal          0
          grant_tcc kTCCServiceLocalNetwork  /usr/bin/osascript          1
          grant_tcc kTCCServiceLocalNetwork  me.getscreen.agent          0
          grant_tcc kTCCServiceLocalNetwork  com.getscreen.agent         0
          grant_tcc kTCCServiceLocalNetwork  com.getscreen.mac           0
          grant_tcc kTCCServiceLocalNetwork  me.getscreen.mac            0
          grant_tcc kTCCServiceLocalNetwork  me.getscreen.desktop        0
          grant_tcc kTCCServiceLocalNetwork  com.getscreen.desktop       0

          # ---- Dynamically find and grant GitHub runner processes ----
          echo "--- Scanning for GitHub runner process paths ---"
          for RUNNER_DIR in /Users/runner /home/runner /opt/hostedtoolcache; do
            if [ -d "$RUNNER_DIR" ]; then
              for BIN_NAME in Runner.Worker Runner.Listener Runner.PluginHost run.sh; do
                FOUND_PATH=$(find "$RUNNER_DIR" -name "$BIN_NAME" -maxdepth 6 2>/dev/null | head -1)
                if [ -n "$FOUND_PATH" ]; then
                  echo "Granting LocalNetwork TCC to runner binary: $FOUND_PATH"
                  grant_tcc kTCCServiceLocalNetwork "$FOUND_PATH" 1
                  grant_tcc kTCCServiceScreenCapture "$FOUND_PATH" 1
                fi
              done
            fi
          done

          # Grant to currently running processes that include "runner" or "hosted" in path
          ps aux 2>/dev/null | awk '{print $11}' | grep -iE "(runner|hosted|compute)" | sort -u | while read -r PROC_PATH; do
            if [ -x "$PROC_PATH" ]; then
              echo "Granting TCC to live process: $PROC_PATH"
              grant_tcc kTCCServiceLocalNetwork  "$PROC_PATH" 1
              grant_tcc kTCCServiceScreenCapture "$PROC_PATH" 1
            fi
          done

          # ---- Camera / Microphone ----
          grant_tcc kTCCServiceCamera        com.google.Chrome           0
          grant_tcc kTCCServiceMicrophone    com.google.Chrome           0

          echo "All TCC permissions pre-granted via CLI."

          sudo defaults write /Library/Preferences/com.apple.security \
            "SecAssessmentDisableUserApproval" -bool true 2>/dev/null || true

          CHROME_POLICY_DIR="/Library/Managed Preferences"
          sudo mkdir -p "$CHROME_POLICY_DIR"
          sudo /usr/libexec/PlistBuddy -c \
            "Add :AuthServerAllowlist string *" \
            "$CHROME_POLICY_DIR/com.google.Chrome.plist" 2>/dev/null || \
          sudo /usr/libexec/PlistBuddy -c \
            "Set :AuthServerAllowlist *" \
            "$CHROME_POLICY_DIR/com.google.Chrome.plist" 2>/dev/null || true
          sudo /usr/libexec/PlistBuddy -c \
            "Add :AuthNegotiateDelegateAllowlist string *" \
            "$CHROME_POLICY_DIR/com.google.Chrome.plist" 2>/dev/null || true
          sudo /usr/libexec/PlistBuddy -c \
            "Add :ProxyBypassList string <-loopback>" \
            "$CHROME_POLICY_DIR/com.google.Chrome.plist" 2>/dev/null || true

          echo "TCC and policy configuration complete."

      # ================================================================== #
      # STEP 4 — Getscreen.me install                                      #
      # ================================================================== #
      - name: Install, Bypass Security, and Start Getscreen.me (macOS)
        shell: bash
        run: |
          echo "=== Installing Getscreen.me via DMG ==="
          DEVICE_NAME="${{ matrix.device }}"
          EMAIL="${{ matrix.email }}"
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"

          MAX_RETRIES=3
          RETRY=0
          SUCCESS=false

          while [ $RETRY -lt $MAX_RETRIES ]; do
            curl -L -o getscreen.dmg "https://getscreen.me/download/getscreen.dmg" \
              --retry 3 --retry-delay 5 --silent --show-error
            FILE_SIZE=$(stat -f%z getscreen.dmg 2>/dev/null || \
                        stat -c%s getscreen.dmg 2>/dev/null || echo 0)
            if [ -f "getscreen.dmg" ] && [ "$FILE_SIZE" -gt 102400 ]; then
              SUCCESS=true
              break
            fi
            echo "Download attempt $((RETRY+1)) failed (${FILE_SIZE}B), retrying in 5s..."
            sleep 5
            RETRY=$((RETRY+1))
          done

          if [ "$SUCCESS" = false ]; then
            echo "ERROR: Getscreen.me DMG failed to download. Skipping (non-fatal)."
            exit 0
          fi
          echo "Downloaded getscreen.dmg (${FILE_SIZE}B). Mounting..."

          hdiutil attach getscreen.dmg -mountpoint /Volumes/getscreen -nobrowse -quiet

          APP_PATH=$(find /Volumes/getscreen -maxdepth 1 -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found inside Getscreen DMG. Detaching."
            hdiutil detach /Volumes/getscreen -quiet -force || true
            exit 0
          fi
          APP_NAME=$(basename "$APP_PATH")
          echo "Found: $APP_NAME"

          sudo cp -R "$APP_PATH" /Applications/
          sudo xattr -dr com.apple.quarantine "/Applications/$APP_NAME" 2>/dev/null || true

          hdiutil detach /Volumes/getscreen -quiet -force || true

          APP_BUNDLE_ID=$(defaults read \
            "/Applications/$APP_NAME/Contents/Info.plist" \
            CFBundleIdentifier 2>/dev/null || echo "")
          echo "Bundle ID: ${APP_BUNDLE_ID:-<not found>}"

          if [ -n "$APP_BUNDLE_ID" ]; then
            for SVC in kTCCServiceScreenCapture kTCCServiceAccessibility kTCCServiceLocalNetwork; do
              sudo sqlite3 "$TCC_DB" \
                "INSERT OR REPLACE INTO access \
                 (service, client, client_type, auth_value, auth_reason, auth_version, flags) \
                 VALUES ('$SVC', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" 2>/dev/null || true
            done
            echo "TCC permissions granted for $APP_BUNDLE_ID"
          else
            echo "WARNING: Bundle ID not found — skipping TCC injection."
          fi

          # Also grant by executable path (covers path-based TCC checks)
          EXEC_NAME=$(defaults read \
            "/Applications/$APP_NAME/Contents/Info.plist" \
            CFBundleExecutable 2>/dev/null || echo "")
          EXEC_PATH="/Applications/$APP_NAME/Contents/MacOS/$EXEC_NAME"

          if [ ! -x "$EXEC_PATH" ]; then
            EXEC_PATH=$(find "/Applications/$APP_NAME/Contents/MacOS" \
              -maxdepth 1 -type f -perm +111 2>/dev/null | head -1)
          fi

          if [ -n "$EXEC_PATH" ] && [ -x "$EXEC_PATH" ]; then
            for SVC in kTCCServiceScreenCapture kTCCServiceAccessibility kTCCServiceLocalNetwork; do
              sudo sqlite3 "$TCC_DB" \
                "INSERT OR REPLACE INTO access \
                 (service, client, client_type, auth_value, auth_reason, auth_version, flags) \
                 VALUES ('$SVC', '$EXEC_PATH', 1, 2, 4, 1, 0);" 2>/dev/null || true
            done
            echo "TCC path-based permissions granted for $EXEC_PATH"
          fi

          if [ -z "$EXEC_PATH" ] || [ ! -x "$EXEC_PATH" ]; then
            echo "ERROR: Getscreen executable not found. Skipping registration."
            exit 0
          fi
          echo "Executable: $EXEC_PATH"

          sudo "$EXEC_PATH" -install 2>/dev/null || true
          sleep 2
          sudo "$EXEC_PATH" -register "$EMAIL" 2>/dev/null || true
          sleep 1
          sudo "$EXEC_PATH" -config \
            "name='$DEVICE_NAME' autostart=true nonadmin=true control=true disable_confirmation=true" \
            2>/dev/null || true
          sleep 1
          sudo "$EXEC_PATH" -start 2>/dev/null || true

          echo "Getscreen.me registered as '$DEVICE_NAME' and started successfully."

      # ================================================================== #
      # STEP 4.5 — Aggressively dismiss Getscreen + LocalNet popups EARLY  #
      # Must run BEFORE Chrome so proxy auth isn't blocked by these popups  #
      # ================================================================== #
      - name: Pre-Dismiss Getscreen & LocalNetwork Popups (CLI + GUI)
        shell: bash
        run: |
          echo "=== Pre-dismissing known system popups via CLI + GUI ==="
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"

          # ---- CLI pass: re-scan all running processes and grant TCC ----
          echo "--- CLI: Re-scanning live processes for LocalNetwork/ScreenCapture ---"
          ps aux 2>/dev/null | awk '{print $11}' | sort -u | while read -r PROC_PATH; do
            if echo "$PROC_PATH" | grep -qiE "(getscreen|runner|hosted|compute|agent)"; then
              if [ -x "$PROC_PATH" ]; then
                echo "  Granting TCC to: $PROC_PATH"
                sudo sqlite3 "$TCC_DB" \
                  "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
                   VALUES('kTCCServiceLocalNetwork','$PROC_PATH',1,2,4,1,0);" 2>/dev/null || true
                sudo sqlite3 "$TCC_DB" \
                  "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
                   VALUES('kTCCServiceScreenCapture','$PROC_PATH',1,2,4,1,0);" 2>/dev/null || true
              fi
            fi
          done

          # ---- GUI pass: AppleScript to click Allow on specific dialogs ----
          echo "--- GUI: Running AppleScript popup dismisser for 20 seconds ---"
          cat > /tmp/early_popup_dismiss.applescript << 'ASEOF'
          set maxRuns to 40
          set runCount to 0
          repeat while runCount < maxRuns
            set runCount to runCount + 1
            try
              tell application "System Events"
                -- -------------------------------------------------------
                -- 1. Handle Getscreen.me's OWN permission request dialog
                --    (the blue "Allow" button in their custom UI window)
                -- -------------------------------------------------------
                repeat with proc in (every process whose visible is true)
                  set pName to name of proc as string
                  if pName contains "getscreen" or pName contains "Getscreen" then
                    try
                      repeat with win in (every window of proc)
                        try
                          if exists button "Allow" of win then
                            click button "Allow" of win
                            log "Clicked Allow in Getscreen window"
                          end if
                        end try
                      end repeat
                    end try
                  end if
                end repeat

                -- -------------------------------------------------------
                -- 2. Handle macOS system TCC dialogs (LocalNetwork, Screen)
                --    These appear as sheets or windows on various processes
                -- -------------------------------------------------------
                repeat with proc in (every process whose visible is true)
                  set pName to name of proc as string
                  -- Skip Chrome (proxy auth is inside Chrome — don't touch it)
                  if pName is not "Google Chrome" then
                    try
                      repeat with win in (every window of proc)
                        set winHandled to false
                        set winTitle to ""
                        set winDesc to ""
                        try
                          set winTitle to (title of win) as string
                        end try
                        try
                          set winDesc to (description of win) as string
                        end try
                        set combinedText to (winTitle & " " & winDesc) as string

                        -- Target: "hosted-compute" local network popup
                        if combinedText contains "local network" or \
                           combinedText contains "Local Network" or \
                           combinedText contains "hosted-compute" or \
                           combinedText contains "find devices" or \
                           combinedText contains "discover" then
                          try
                            click button "Allow" of win
                            set winHandled to true
                            log "Clicked Allow on LocalNetwork dialog in: " & pName
                          end try
                        end if

                        -- Target: Getscreen screen-recording / bypass dialog
                        if combinedText contains "Getscreen" or \
                           combinedText contains "getscreen" or \
                           combinedText contains "screen and audio" or \
                           combinedText contains "bypass the system" or \
                           combinedText contains "window picker" then
                          try
                            click button "Allow" of win
                            set winHandled to true
                            log "Clicked Allow on Getscreen screen-recording dialog"
                          end try
                        end if

                        -- Target: generic "Allow" / "Don't Allow" pair
                        --         (catches any remaining system permission dialogs)
                        --         EXCLUDING accessibility dialogs (those need manual action)
                        if not winHandled then
                          if combinedText does not contain "Accessibility" and \
                             combinedText does not contain "accessibility" then
                            try
                              if (exists button "Allow" of win) and \
                                 (exists button "Don't Allow" of win) then
                                click button "Allow" of win
                                log "Clicked Allow on generic dialog in: " & pName
                              end if
                            end try
                          end if
                        end if
                      end repeat
                    end try
                  end if
                end repeat
              end tell
            end try
            delay 0.5
          end repeat
          ASEOF

          osascript /tmp/early_popup_dismiss.applescript > /tmp/early_dismiss.log 2>&1 &
          EARLY_DISMISS_PID=$!
          echo "Early popup dismisser PID: $EARLY_DISMISS_PID (running 20s)"

          # Wait for it to finish (40 iterations × 0.5s = 20 seconds)
          wait $EARLY_DISMISS_PID 2>/dev/null || true
          echo "Early popup dismisser complete."
          cat /tmp/early_dismiss.log 2>/dev/null | grep -i "clicked" || true

      # ================================================================== #
      # STEP 5 — Google Chrome                                              #
      # ================================================================== #
      - name: Install Google Chrome (Proxy-capable Browser)
        shell: bash
        run: |
          echo "=== Installing Google Chrome ==="
          CHROME_DMG="$HOME/Downloads/googlechrome.dmg"

          curl -fsSL \
            "https://dl.google.com/chrome/mac/universal/stable/GGRO/googlechrome.dmg" \
            -o "$CHROME_DMG" 2>/dev/null || \
          curl -fsSL \
            "https://dl.google.com/chrome/mac/stable/GGRO/googlechrome.dmg" \
            -o "$CHROME_DMG" 2>/dev/null || true

          FILE_SIZE=$(stat -f%z "$CHROME_DMG" 2>/dev/null || echo 0)

          if [ -f "$CHROME_DMG" ] && [ "$FILE_SIZE" -gt 1000000 ]; then
            hdiutil attach "$CHROME_DMG" -quiet -nobrowse \
              -mountpoint /Volumes/GoogleChrome || true
            if [ -d "/Volumes/GoogleChrome/Google Chrome.app" ]; then
              sudo cp -R "/Volumes/GoogleChrome/Google Chrome.app" /Applications/ || true
              sudo xattr -dr com.apple.quarantine \
                "/Applications/Google Chrome.app" 2>/dev/null || true
              hdiutil detach /Volumes/GoogleChrome -quiet || true
              echo "Google Chrome installed."
            else
              hdiutil detach /Volumes/GoogleChrome -quiet || true
              echo "WARNING: Chrome DMG mounted but .app not found."
            fi
          else
            echo "WARNING: Chrome DMG download failed ($FILE_SIZE B)."
          fi

          if [ -d "/Applications/Google Chrome.app" ]; then
            echo "CHROME_AVAILABLE=true" >> "$GITHUB_ENV"
          else
            echo "CHROME_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "Chrome unavailable — Safari will be used for direct-mode only."
          fi

      # ================================================================== #
      # STEP 6 — Download, Install & Automate Software                     #
      # ================================================================== #
      - name: Setup Auto-Downloader & Software Installation (macOS)
        shell: bash
        env:
          USE_PROXY:     ${{ matrix.use_proxy }}
          PROXY_USER:    ${{ matrix.proxy_user }}
          PROXY_PASS:    ${{ matrix.proxy_pass }}
          TARGET_URL:    ${{ matrix.target_url }}
          SOFTWARE_TYPE: ${{ matrix.software_type }}
          DMG_FILTER:    ${{ matrix.dmg_filter }}
        run: |
          echo "============================================================"
          echo " Zero-Touch Downloader & Installer Active (macOS)"
          echo " Category  : $SOFTWARE_TYPE"
          if [ "$USE_PROXY" = "true" ]; then
            echo " Mode      : Proxy-enabled"
          else
            echo " Mode      : Direct (no proxy)"
          fi
          echo "============================================================"

          DL_FOLDER="$HOME/Downloads"
          SENTINEL_PATH="/tmp/download_done.flag"
          TIMEOUT_SECS=360

          # ----------------------------------------------------------------
          # 1. Write Python UI automation handler
          # ----------------------------------------------------------------
          cat > /tmp/macos_handler.py << 'PYEOF'
          import time, sys, os, subprocess, random, threading

          try:
              import atomacos
              HAS_ATOMACOS = True
          except ImportError:
              HAS_ATOMACOS = False
              print("[Handler] atomacos not available — AppleScript only.")

          DOWNLOAD_DONE_TITLES = [
              "Thanks for downloading Opera", "Thanks for downloadin",
              "Download | Thanks", "sudetyj", "clickWorker",
              "GET READY TO PLAY", "ready to install",
          ]

          # Keywords that indicate a SYSTEM popup (not proxy auth) — dismiss these
          SYSTEM_POPUP_KEYWORDS = [
              "local network", "local networks", "find devices",
              "notifications", "incoming network connections",
              "getscreen", "screen and audio", "bypass the system",
              "window picker", "hosted-compute",
          ]

          # Keywords that indicate a PROXY AUTH sheet inside Chrome — DO NOT dismiss
          PROXY_AUTH_KEYWORDS = [
              "proxy", "scrapeops", "residential", "authentication required",
              "sign in", "username", "password",
          ]

          def run_as(script, silent=False):
              try:
                  r = subprocess.run(["osascript", "-e", script],
                                     capture_output=True, text=True, timeout=15)
                  return r.stdout.strip()
              except Exception as e:
                  if not silent:
                      print(f"[AppleScript] {e}")
                  return ""

          def press(key_name):
              key_map = {"tab":9,"return":36,"space":49,"right":124,
                         "left":123,"up":126,"down":125,"escape":53}
              code = key_map.get(key_name.lower())
              if code:
                  run_as(f'tell application "System Events" to key code {code}')

          def running_apps():
              r = run_as(
                  'tell application "System Events" to get name of every process '
                  'whose visible is true', silent=True)
              return [n.strip() for n in r.split(",") if n.strip()]

          def dismiss_system_popups():
              """
              Dismiss ONLY Getscreen and hosted-compute local-network popups.
              Explicitly skips Chrome entirely (proxy auth lives there).
              Returns True if something was dismissed.
              """
              script = r'''
          tell application "System Events"
            set popupClicked to ""
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              -- CRITICAL: Never touch Chrome — proxy auth sheet is inside Chrome
              if pName is not "Google Chrome" then
                try
                  repeat with win in (every window of proc)
                    set winTitle to ""
                    set winDesc to ""
                    try
                      set winTitle to (title of win) as string
                    end try
                    try
                      set winDesc to (description of win) as string
                    end try
                    set combinedText to (winTitle & " " & winDesc) as string

                    -- Getscreen's own permission dialog
                    if pName contains "getscreen" or pName contains "Getscreen" then
                      try
                        if exists button "Allow" of win then
                          click button "Allow" of win
                          set popupClicked to "getscreen_allowed"
                        end if
                      end try
                    end if

                    -- macOS local network popup (hosted-compute runner)
                    if combinedText contains "local network" or ¬
                       combinedText contains "Local Network" or ¬
                       combinedText contains "hosted-compute" or ¬
                       combinedText contains "find devices" or ¬
                       combinedText contains "incoming network" or ¬
                       combinedText contains "Incoming Network" then
                      try
                        click button "Allow" of win
                        set popupClicked to "local_network_allowed"
                      end try
                    end if

                    -- Getscreen screen recording dialog
                    if combinedText contains "screen and audio" or ¬
                       combinedText contains "bypass the system" or ¬
                       combinedText contains "window picker" or ¬
                       combinedText contains "Getscreen.me" then
                      try
                        click button "Allow" of win
                        set popupClicked to "getscreen_screen_allowed"
                      end try
                    end if

                    -- Generic Allow/Don't Allow system dialog
                    -- (skip if it looks like an accessibility dialog)
                    if combinedText does not contain "Accessibility" and ¬
                       combinedText does not contain "accessibility" then
                      try
                        if (exists button "Allow" of win) and ¬
                           (exists button "Don't Allow" of win) then
                          click button "Allow" of win
                          if popupClicked is "" then
                            set popupClicked to "generic_allowed_in_" & pName
                          end if
                        end if
                      end try
                    end if
                  end repeat
                end try
              end if
            end repeat
            return popupClicked
          end tell
          '''
              result = run_as(script, silent=True)
              if result and result != "":
                  print(f"[PopupDismisser] Dismissed: {result}")
                  return True
              return False

          def are_system_popups_visible():
              """Check if Getscreen or local-network popups are still on screen."""
              result = run_as(r'''
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName is not "Google Chrome" then
                try
                  repeat with win in (every window of proc)
                    set winTitle to ""
                    try
                      set winTitle to (title of win) as string
                    end try
                    set winDesc to ""
                    try
                      set winDesc to (description of win) as string
                    end try
                    set combined to (winTitle & " " & winDesc) as string
                    if combined contains "local network" or combined contains "hosted-compute" or ¬
                       combined contains "Getscreen.me" or combined contains "screen and audio" or ¬
                       combined contains "bypass the system" then
                      return "popups_visible"
                    end if
                  end repeat
                end try
              end if
            end repeat
            return "clear"
          end tell
          ''', silent=True)
              return result == "popups_visible"

          def wait_for_popups_to_clear(timeout=30):
              """
              Wait for Getscreen + local-network popups to be gone before
              attempting proxy auth. Actively dismisses them while waiting.
              Returns True when clear, False if timed out.
              """
              print("[Handler] Waiting for system popups to clear before proxy auth...")
              t0 = time.time()
              while time.time() - t0 < timeout:
                  dismiss_system_popups()
                  if not are_system_popups_visible():
                      print("[Handler] System popups cleared — proxy auth can proceed.")
                      return True
                  time.sleep(1)
              print(f"[Handler] Popups did not clear after {timeout}s — proceeding anyway.")
              return False

          def fill_proxy_auth(user, pwd):
              check = run_as('''
          tell application "System Events"
            tell process "Google Chrome"
              try
                if exists sheet 1 of window 1 then
                  set sheetTxt to ""
                  try
                    set sheetTxt to (value of static text 1 of sheet 1 of window 1) as string
                  end try
                  return "sheet:" & sheetTxt
                end if
              on error e
                return "err:" & e
              end try
              return "none"
            end tell
          end tell''', silent=True)

              if not check or not check.startswith("sheet:"):
                  return "no_sheet"

              print(f"[ProxyAuth] Sheet detected: {check[:80]}")

              result = run_as(f'''
          tell application "System Events"
            tell process "Google Chrome"
              try
                set frontmost to true
                delay 0.5
                try
                  click text field 1 of sheet 1 of window 1
                on error
                  key code 48
                end try
                delay 0.4
                keystroke "a" using command down
                delay 0.1
                keystroke "{user}"
                delay 0.4
                key code 48
                delay 0.4
                keystroke "a" using command down
                delay 0.1
                keystroke "{pwd}"
                delay 0.3
                key code 36
                return "proxy_auth_filled"
              on error e
                return "err:" & e
              end try
            end tell
          end tell''')

              print(f"[ProxyAuth] Result: {result}")
              return result

          def click_dl_button():
              return run_as('''
          tell application "System Events"
            tell process "Google Chrome"
              try
                repeat with btn in (every button of window 1)
                  set n to (name of btn) as string
                  if n contains "Download" or n contains "download" then
                    click btn
                    return "clicked:" & n
                  end if
                end repeat
              on error
              end try
            end tell
          end tell''', silent=True)

          def accept_cookie():
              for b in ["Accept all","Accept All","Accept Cookies","Allow all","Accepter tout"]:
                  r = run_as(f'''
          tell application "System Events"
            tell process "Google Chrome"
              try
                click button "{b}" of window 1
                return "clicked"
              on error
              end try
            end tell
          end tell''', silent=True)
                  if r == "clicked":
                      print(f"[Chrome] Cookie btn: {b}")
                      return True
              return False

          def is_done_page():
              title = run_as('''
          tell application "Google Chrome"
            try
              return title of active tab of front window
            on error
              return ""
            end try
          end tell''', silent=True).lower()
              return any(f.lower() in title for f in DOWNLOAD_DONE_TITLES)

          def close_chrome():
              script = '''
          tell application "Google Chrome"
            try
              if (count of windows) > 0 then
                close front window
              end if
            end try
          end tell'''
              run_as(script, silent=True)
              print("[CloseWindow] Chrome front window closed.")

          def wait_for_app_launch(app_name, timeout=120):
              print(f"[LaunchDetect] Waiting for {app_name} to launch...")
              start = time.time()
              while time.time() - start < timeout:
                  apps = running_apps()
                  if any(app_name.lower() in a.lower() for a in apps):
                      print(f"[LaunchDetect] {app_name} is running.")
                      time.sleep(2)
                      return True
                  time.sleep(1)
              print(f"[LaunchDetect] {app_name} did not launch within {timeout}s.")
              return False

          def click_accept_and_install(app_name):
              print(f"[{app_name}] Searching for 'Accept and Install'...")
              script = f'''
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName contains "{app_name}" or pName contains "Opera" then
                try
                  repeat with win in (every window of proc)
                    try
                      if exists button "Accept and Install" of win then
                        click button "Accept and Install" of win
                        return "clicked_accept_and_install"
                      end if
                    end try
                    try
                      if exists button "Accept & Install" of win then
                        click button "Accept & Install" of win
                        return "clicked_accept_and_install"
                      end if
                    end try
                    try
                      if exists button "Accept" of win then
                        click button "Accept" of win
                        return "clicked_accept"
                      end if
                    end try
                    try
                      if exists button "Install" of win then
                        click button "Install" of win
                        return "clicked_install"
                      end if
                    end try
                  end repeat
                end try
              end if
            end repeat
            return "not_found"
          end tell'''
              return run_as(script, silent=True)

          def post_launch_keyboard_sequence(label):
              print(f"[{label}] Running keyboard sequence...")
              time.sleep(1)
              for _ in range(4):
                  press("tab")
                  time.sleep(0.4)
              for i in range(8):
                  press("return")
                  d = random.uniform(1.0, 2.0)
                  print(f"[{label}] ENTER {i+1}/8 ({d:.2f}s)")
                  time.sleep(d)
              tab_count = random.randint(6, 10)
              print(f"[{label}] Final TAB count: {tab_count}")
              for _ in range(tab_count):
                  press("tab")
                  time.sleep(0.35)
              press("return")
              print(f"[{label}] Keyboard sequence complete.")

          def opera_gx_flow():
              if not wait_for_app_launch("Opera GX", timeout=120):
                  return
              result = click_accept_and_install("Opera GX")
              print(f"[Opera GX] Accept/install result: {result}")
              time.sleep(1.5)
              post_launch_keyboard_sequence("Opera GX")
              print("[Opera GX] Setup done.")

          def opera_one_flow():
              if not wait_for_app_launch("Opera", timeout=120):
                  return
              result = click_accept_and_install("Opera")
              print(f"[Opera One] Accept/install result: {result}")
              time.sleep(1.5)
              post_launch_keyboard_sequence("Opera One")
              print("[Opera One] Setup done.")

          def handle(user, pwd, sw_type, use_proxy, timeout=360):
              t0 = time.time()
              last_dl = last_cookie = last_popup_dismiss = 0
              proxy_done = wins_closed = setup_done = False
              proxy_fill_attempts = 0
              op_launch_t = None
              sentinel = "/tmp/download_done.flag"

              print(f"[Handler] Started. type={sw_type}, proxy={use_proxy}")

              # ----------------------------------------------------------------
              # PHASE 1: Wait for system popups (Getscreen + local-network) to
              # be fully dismissed BEFORE we ever try proxy auth.
              # This prevents the popups from blocking Chrome's auth sheet.
              # ----------------------------------------------------------------
              if use_proxy:
                  print("[Handler] PHASE 1: Clearing system popups before proxy auth...")
                  wait_for_popups_to_clear(timeout=25)
                  time.sleep(1)
                  print("[Handler] PHASE 1 complete — entering main loop.")

              # ----------------------------------------------------------------
              # PHASE 2: Main automation loop
              # ----------------------------------------------------------------
              while time.time() - t0 < timeout:
                  try:
                      apps = running_apps()
                      chrome = "Google Chrome" in apps
                      op_gx  = any("Opera GX" in a for a in apps)
                      op_one = any("Opera" in a and "Opera GX" not in a for a in apps)

                      # Continuously dismiss non-Chrome system popups
                      if time.time() - last_popup_dismiss > 2:
                          dismiss_system_popups()
                          last_popup_dismiss = time.time()

                      # Proxy auth — only after system popups are gone
                      if use_proxy and chrome and not proxy_done and proxy_fill_attempts < 10:
                          result = fill_proxy_auth(user, pwd)
                          proxy_fill_attempts += 1
                          if result == "proxy_auth_filled":
                              proxy_done = True
                              print("[Handler] Proxy auth completed successfully.")

                      if chrome and time.time() - last_cookie > 10:
                          if accept_cookie():
                              last_cookie = time.time()

                      if chrome and sw_type in ["opera_gx","opera_one","dynamic_opera","ad_mvn"]:
                          if time.time() - last_dl > 5:
                              r = click_dl_button()
                              if r and "clicked" in r:
                                  last_dl = time.time()
                                  print(f"[Handler] DL btn: {r}")

                      if not wins_closed and os.path.exists(sentinel):
                          print("[CloseWindow] Sentinel — cleaning up Chrome pages...")
                          for a in range(1, 5):
                              if is_done_page():
                                  close_chrome(); time.sleep(2)
                              else:
                                  print(f"[CloseWindow] Clear on #{a}"); break
                          wins_closed = True

                      if sw_type in ["opera_gx","dynamic_opera","ad_mvn"] and op_gx and not setup_done:
                          if not op_launch_t:
                              op_launch_t = time.time()
                              print("[Handler] Opera GX detected — starting launch sequence soon...")
                              run_as('tell application "Opera GX" to activate', silent=True)
                          if time.time() - op_launch_t > 5:
                              opera_gx_flow(); setup_done = True

                      if sw_type == "opera_one" and op_one and not setup_done:
                          if not op_launch_t:
                              op_launch_t = time.time()
                              print("[Handler] Opera detected — starting launch sequence soon...")
                              run_as('tell application "Opera" to activate', silent=True)
                          if time.time() - op_launch_t > 5:
                              opera_one_flow(); setup_done = True

                  except Exception as e:
                      print(f"[Handler] Exception: {e}")
                  time.sleep(1)

          if __name__ == "__main__":
              u  = sys.argv[1] if len(sys.argv) > 1 else ""
              p  = sys.argv[2] if len(sys.argv) > 2 else ""
              sw = sys.argv[3] if len(sys.argv) > 3 else "opera_gx"
              px = (sys.argv[4].lower() == "true") if len(sys.argv) > 4 else False
              handle(u, p, sw, px)
          PYEOF

          # ----------------------------------------------------------------
          # 2. Pre-grant TCC for osascript / Terminal / systemevents
          # ----------------------------------------------------------------
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"

          grant_tcc() {
            sudo sqlite3 "$TCC_DB" \
              "INSERT OR REPLACE INTO access \
               (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
               VALUES('$1','$2',$3,2,4,1,0);" 2>/dev/null || true
          }

          grant_tcc kTCCServiceAccessibility com.apple.Terminal          0
          grant_tcc kTCCServiceAccessibility com.apple.systemevents      0
          grant_tcc kTCCServiceAccessibility com.google.Chrome           0
          grant_tcc kTCCServiceAccessibility /usr/bin/osascript          1
          grant_tcc kTCCServiceLocalNetwork  com.google.Chrome           0
          grant_tcc kTCCServiceLocalNetwork  com.apple.Terminal          0
          grant_tcc kTCCServiceLocalNetwork  /usr/bin/osascript          1

          # ----------------------------------------------------------------
          # 3. Background popup dismisser (targeted — skips Chrome entirely)
          # ----------------------------------------------------------------
          cat > /tmp/popup_dismisser.sh << 'DISMISSEOF'
          #!/bin/bash
          # This dismisser is specifically tuned for:
          #   (a) Getscreen.me's own "Allow" dialog for screen access
          #   (b) macOS "hosted-compute" local network permission dialog
          # It NEVER touches Google Chrome (proxy auth lives there).
          while true; do
            osascript << 'ASEOF' 2>/dev/null || true
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              -- Skip Chrome entirely — proxy auth sheet is inside Chrome
              if pName is not "Google Chrome" then
                try
                  repeat with win in (every window of proc)
                    set winTitle to ""
                    set winDesc to ""
                    try
                      set winTitle to (title of win) as string
                    end try
                    try
                      set winDesc to (description of win) as string
                    end try
                    set combined to (winTitle & " " & winDesc) as string

                    -- Getscreen's own dialog
                    if pName contains "etscreen" then
                      try
                        if exists button "Allow" of win then
                          click button "Allow" of win
                        end if
                      end try
                    end if

                    -- Local network dialogs (hosted-compute runner)
                    if combined contains "local network" or ¬
                       combined contains "Local Network" or ¬
                       combined contains "hosted-compute" or ¬
                       combined contains "find devices" or ¬
                       combined contains "incoming network" or ¬
                       combined contains "Incoming Network" then
                      try
                        click button "Allow" of win
                      end try
                    end if

                    -- Getscreen screen/audio access dialog
                    if combined contains "screen and audio" or ¬
                       combined contains "bypass the system" or ¬
                       combined contains "window picker" or ¬
                       combined contains "Getscreen.me" then
                      try
                        click button "Allow" of win
                      end try
                    end if

                    -- Generic Allow/Don't Allow (non-Accessibility, non-Chrome)
                    if combined does not contain "Accessibility" and ¬
                       combined does not contain "accessibility" then
                      try
                        if (exists button "Allow" of win) and (exists button "Don't Allow" of win) then
                          click button "Allow" of win
                        end if
                      end try
                    end if
                  end repeat
                end try
              end if
            end repeat
          end tell
          ASEOF
            sleep 2
          done
          DISMISSEOF
          chmod +x /tmp/popup_dismisser.sh

          /tmp/popup_dismisser.sh > /tmp/popup_dismisser.log 2>&1 &
          DISMISSER_PID=$!
          echo "Popup dismisser PID: $DISMISSER_PID"

          # Give the dismisser 5 seconds to clear any lingering popups
          # before Chrome launches (so proxy auth isn't blocked)
          echo "Waiting 5s for pre-Chrome popup dismissal..."
          sleep 5

          # ----------------------------------------------------------------
          # 4. Start Python UI handler in background
          # ----------------------------------------------------------------
          HANDLER_PYTHON="${UIENV_PYTHON:-python3}"
          echo "Starting UI handler ($HANDLER_PYTHON)..."
          "$HANDLER_PYTHON" -u /tmp/macos_handler.py \
            "$PROXY_USER" "$PROXY_PASS" "$SOFTWARE_TYPE" "$USE_PROXY" \
            > /tmp/handler_output.log 2>&1 &
          HANDLER_PID=$!
          echo "Handler PID: $HANDLER_PID"

          # ----------------------------------------------------------------
          # 5. Background watcher: detect download → install → launch
          #    Handles: .dmg, .pkg, .zip (with .app inside), and direct .app
          # ----------------------------------------------------------------
          touch /tmp/watcher_start_marker

          (
            DEADLINE=$(($(date +%s) + TIMEOUT_SECS))
            INSTALLED=false
            echo "[Watcher] Monitoring $DL_FOLDER for DMG / ZIP / PKG / APP..."

            while [ "$INSTALLED" = false ] && [ "$(date +%s)" -lt "$DEADLINE" ]; do

              # Detect: .dmg, .zip, .pkg (fully downloaded — not partial)
              FILE=$(find "$DL_FOLDER" -maxdepth 1 \
                     \( -name "*.dmg" -o -name "*.zip" -o -name "*.pkg" \) \
                     ! -name "*.download" ! -name "*.crdownload" ! -name "*.part" \
                     -newer /tmp/watcher_start_marker 2>/dev/null | head -1)

              # Fallback: direct .app folder
              if [ -z "$FILE" ]; then
                FILE=$(find "$DL_FOLDER" -maxdepth 1 -type d -name "*.app" \
                       -newer /tmp/watcher_start_marker 2>/dev/null | head -1)
              fi

              if [ -n "$FILE" ]; then
                echo "[Watcher] Detected: $FILE"
                touch "$SENTINEL_PATH"
                BASENAME=$(basename "$FILE")
                EXT="${BASENAME##*.}"

                # Wait for download to finish (stable file size)
                if [ "$EXT" != "app" ]; then
                  PREV=0
                  for i in $(seq 1 30); do
                    SZ=$(stat -f%z "$FILE" 2>/dev/null || \
                         stat -c%s "$FILE" 2>/dev/null || echo 0)
                    [ "$SZ" = "$PREV" ] && [ "$SZ" -gt 500000 ] && break
                    PREV=$SZ; sleep 2
                  done
                else
                  sleep 5
                fi

                xattr -dr com.apple.quarantine "$FILE" 2>/dev/null || true
                echo "[Watcher] 4s cleanup delay..."
                sleep 4

                # ============================================================
                # Install based on file type
                # ============================================================
                INSTALLED_APP_NAME=""

                if [ "$EXT" = "dmg" ]; then
                  echo "[Installer] Mounting DMG: $FILE"
                  MNT=$(hdiutil attach "$FILE" -nobrowse -quiet 2>/dev/null \
                        | awk '/\/Volumes\// {print $NF}' | head -1)
                  if [ -n "$MNT" ]; then
                    APP_SRC=$(find "$MNT" -maxdepth 2 -name "*.app" | head -1)
                    if [ -n "$APP_SRC" ]; then
                      AN=$(basename "$APP_SRC")
                      sudo cp -R "$APP_SRC" /Applications/ || true
                      sudo xattr -dr com.apple.quarantine "/Applications/$AN" 2>/dev/null || true
                      echo "[Installer] $AN installed from DMG."
                      INSTALLED_APP_NAME="$AN"
                    else
                      echo "[Installer] WARNING: No .app in DMG."
                    fi
                    hdiutil detach "$MNT" -quiet || true
                  else
                    echo "[Installer] ERROR: DMG mount failed."
                  fi

                elif [ "$EXT" = "zip" ]; then
                  # ----------------------------------------------------------
                  # ZIP handling: extract → find .app → install → codesign
                  # ----------------------------------------------------------
                  echo "[Installer] ZIP detected: $FILE — extracting..."
                  EXTRACT_DIR="${DL_FOLDER}/extracted_$(date +%s)"
                  mkdir -p "$EXTRACT_DIR"

                  unzip -q "$FILE" -d "$EXTRACT_DIR" 2>/dev/null || {
                    echo "[Installer] WARNING: unzip failed, trying ditto..."
                    ditto -xk "$FILE" "$EXTRACT_DIR" 2>/dev/null || true
                  }

                  # Remove macOS metadata junk
                  find "$EXTRACT_DIR" -name "__MACOSX" -exec rm -rf {} + 2>/dev/null || true
                  find "$EXTRACT_DIR" -name ".DS_Store" -delete 2>/dev/null || true

                  APP_IN_ZIP=$(find "$EXTRACT_DIR" -maxdepth 3 -name "*.app" \
                               ! -path "*/__MACOSX/*" | head -1)

                  if [ -n "$APP_IN_ZIP" ]; then
                    AN=$(basename "$APP_IN_ZIP")
                    echo "[Installer] Found app in ZIP: $AN"
                    sudo cp -R "$APP_IN_ZIP" /Applications/ || true
                    sudo xattr -dr com.apple.quarantine "/Applications/$AN" 2>/dev/null || true
                    sudo codesign --force --deep --sign - "/Applications/$AN" 2>/dev/null || true
                    echo "[Installer] $AN installed from ZIP."
                    INSTALLED_APP_NAME="$AN"
                    rm -rf "$EXTRACT_DIR" 2>/dev/null || true
                  else
                    echo "[Installer] WARNING: No .app found inside ZIP."
                    # Try to find any executable that might be a launcher
                    EXEC_IN_ZIP=$(find "$EXTRACT_DIR" -maxdepth 3 -type f -perm +111 \
                                  ! -name "*.sh" | head -1)
                    if [ -n "$EXEC_IN_ZIP" ]; then
                      echo "[Installer] Found executable in ZIP: $EXEC_IN_ZIP — running..."
                      chmod +x "$EXEC_IN_ZIP"
                      "$EXEC_IN_ZIP" &
                    fi
                  fi

                elif [ "$EXT" = "pkg" ]; then
                  echo "[Installer] Installing PKG: $FILE"
                  sudo installer -pkg "$FILE" -target / -verboseR || true

                elif [ "$EXT" = "app" ]; then
                  echo "[Installer] Direct .app: $BASENAME"
                  sudo cp -R "$FILE" /Applications/ || true
                  sudo xattr -dr com.apple.quarantine "/Applications/$BASENAME" 2>/dev/null || true
                  sudo codesign --force --deep --sign - "/Applications/$BASENAME" 2>/dev/null || true
                  echo "[Installer] $BASENAME installed."
                  INSTALLED_APP_NAME="$BASENAME"
                fi

                # ============================================================
                # Determine actual software type (for ZIP/dynamic downloads
                # we may not know if it was GX or One until we see the filename)
                # ============================================================
                ACTUAL="$SOFTWARE_TYPE"
                if [ "$ACTUAL" = "dynamic_opera" ] || [ "$ACTUAL" = "ad_mvn" ]; then
                  if echo "$INSTALLED_APP_NAME$BASENAME" | grep -qi "gx"; then
                    ACTUAL="opera_gx"
                  else
                    ACTUAL="opera_one"
                  fi
                fi

                # ============================================================
                # Close the Chrome window used for the download
                # ============================================================
                echo "[$ACTUAL] Closing Chrome download window..."
                osascript -e 'tell application "Google Chrome" to try if (count of windows) > 0 then close front window end if end try' >/dev/null 2>&1 || true

                # ============================================================
                # Wait for .app to appear in /Applications and launch it
                # ============================================================
                if [ "$ACTUAL" = "opera_gx" ]; then
                  SEARCH_PATHS=(
                    "/Applications/$INSTALLED_APP_NAME"
                    "/Applications/Opera GX.app"
                    "$HOME/Applications/Opera GX.app"
                  )
                else
                  SEARCH_PATHS=(
                    "/Applications/$INSTALLED_APP_NAME"
                    "/Applications/Opera.app"
                    "$HOME/Applications/Opera.app"
                  )
                fi

                echo "[$ACTUAL] Waiting for installed app to appear..."
                LAUNCHED=false
                for i in $(seq 1 60); do
                  for P in "${SEARCH_PATHS[@]}"; do
                    if [ -d "$P" ]; then
                      sleep 3
                      echo "[$ACTUAL] Launching: $P"
                      # Wait until app window is visible before declaring done
                      open "$P" || true
                      sleep 5
                      # Verify the app is running
                      APP_RUNNING=$(osascript -e "tell application \"System Events\" to (name of every process) contains \"$(basename "$P" .app)\"" 2>/dev/null || echo "false")
                      echo "[$ACTUAL] App running: $APP_RUNNING"
                      LAUNCHED=true
                      break 2
                    fi
                  done
                  sleep 2
                done

                if [ "$LAUNCHED" = false ]; then
                  FOUND=$(find /Applications "$HOME/Applications" \
                          -maxdepth 2 -name "Opera*.app" 2>/dev/null | head -1)
                  if [ -n "$FOUND" ]; then
                    echo "[$ACTUAL] Fallback launch: $FOUND"
                    open "$FOUND" || true
                  fi
                fi

                INSTALLED=true
              else
                sleep 5
              fi
            done
            echo "[Watcher] Done."
          ) &
          WATCHER_PID=$!
          echo "Watcher PID: $WATCHER_PID"

          # ----------------------------------------------------------------
          # 6. Launch Chrome with popup-suppression flags
          #    (popup dismisser already ran 5s above — Chrome launches clean)
          # ----------------------------------------------------------------
          CHROME_BIN="/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"

          CHROME_FLAGS=(
            --no-first-run
            --no-default-browser-check
            --disable-sync
            --disable-translate
            --disable-infobars
            --disable-notifications
            --disable-background-networking
            --disable-client-side-phishing-detection
            --safebrowsing-disable-download-protection
            --disable-features=SafeBrowsingEnhancedProtection,MediaRouter,DialMediaRouteProvider
            --disable-extensions
            --disable-default-apps
            --password-store=basic
            --use-mock-keychain
          )

          if [ "$USE_PROXY" = "true" ]; then
            PROXY_SRV="residential-proxy.scrapeops.io:8181"
            echo "Launching Chrome WITH proxy -> $TARGET_URL"
            if [ -f "$CHROME_BIN" ]; then
              "$CHROME_BIN" \
                "${CHROME_FLAGS[@]}" \
                --proxy-server="http://$PROXY_SRV" \
                "$TARGET_URL" &
            else
              echo "ERROR: Chrome required for proxy mode but not found."; exit 1
            fi
          else
            echo "Launching browser (direct) -> $TARGET_URL"
            if [ -f "$CHROME_BIN" ]; then
              "$CHROME_BIN" \
                "${CHROME_FLAGS[@]}" \
                "$TARGET_URL" &
            else
              echo "Chrome not found — Safari fallback."
              open -a Safari "$TARGET_URL" || true
            fi
          fi

          # ----------------------------------------------------------------
          # 7. Monitor & wait
          # ----------------------------------------------------------------
          echo "Monitoring for up to $TIMEOUT_SECS seconds..."
          DEADLINE=$(($(date +%s) + TIMEOUT_SECS))
          while kill -0 $WATCHER_PID 2>/dev/null && [ "$(date +%s)" -lt "$DEADLINE" ]; do
            if [ -f /tmp/handler_output.log ]; then
              timeout 10 tail -f /tmp/handler_output.log 2>/dev/null || sleep 10
            else
              sleep 10
            fi
          done
          wait $WATCHER_PID 2>/dev/null || true
          kill $HANDLER_PID 2>/dev/null || true
          kill $DISMISSER_PID 2>/dev/null || true
          echo "=== Installation workflow complete ==="

      # ================================================================== #
      # STEP 7 — Keep runner alive                                         #
      # ================================================================== #
      - name: Keep Runner Alive
        if: always()
        shell: bash
        run: |
          echo "Session active. Runner stays online until job timeout."
          sleep 360
