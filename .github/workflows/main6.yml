          # ============================================================
          def opera_one_flow():
              log("[Opera One] ===== POST-INSTALL SEQUENCE STARTING =====")
              if not wait_for_app_launch("Opera Installer", timeout=120):
                  log("[Opera One] Installer not seen. Attempting manual launch...")
                  if os.path.exists("/Applications/Opera Installer.app"):
                      subprocess.run(["open", "/Applications/Opera Installer.app"])
                      time.sleep(5)
                      if not wait_for_app_launch("Opera Installer", timeout=60):
                          log("[Opera One] Still not found. Aborting post-install.")
                          return
                  else:
                      found = subprocess.run(
                          "find /Applications -maxdepth 2 -name 'Opera*.app' 2>/dev/null | head -1",
                          shell=True, capture_output=True, text=True).stdout.strip()
                      if found:
                          log(f"[Opera One] Opening fallback: {found}")
                          subprocess.run(["open", found])
                          time.sleep(5)
                      if not wait_for_app_launch("Opera", timeout=60):
                          log("[Opera One] Opera window not found. Aborting.")
                          return

              log("[Opera One] STEP 1: Opera Installer detected. Activating...")
