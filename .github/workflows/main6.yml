          def wait_for_app_launch(app_name, timeout=120):
              log(f"[LaunchDetect] Waiting for '{app_name}' to launch (up to {timeout}s)...")
              start = time.time()
              while time.time() - start < timeout:
                  apps = running_apps()
                  if any(app_name.lower() in a.lower() for a in apps):
                      log(f"[LaunchDetect] ✓ '{app_name}' is running!")
                      time.sleep(2)
                      return True
                  elapsed = int(time.time() - start)
                  if elapsed % 15 == 0 and elapsed > 0:
                      log(f"[LaunchDetect] Still waiting for '{app_name}'... ({elapsed}s elapsed)")
                  time.sleep(1)
              log(f"[LaunchDetect] '{app_name}' did not launch within {timeout}s.")
              return False

          def click_accept_and_install(app_name):
              log(f"[{app_name}] Searching for Accept/Install button...")
              script = f'''
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName contains "{app_name}" or pName contains "Opera" then
                try
                  repeat with win in (every window of proc)
                    try
                      if exists button "Accept and Install" of win then
                        click button "Accept and Install" of win
                        return "clicked_accept_and_install"
                      end if
                    end try
                    try
                      if exists button "Accept & Install" of win then
                        click button "Accept & Install" of win
                        return "clicked_accept_and_install"
                      end if
                    end try
                    try
                      if exists button "Accept" of win then
                        click button "Accept" of win
                        return "clicked_accept"
                      end if
                    end try
                    try
                      if exists button "Install" of win then
                        click button "Install" of win
                        return "clicked_install"
                      end if
                    end try
                  end repeat
                end try
              end if
            end repeat
            return "not_found"
          end tell'''
              result = run_as(script, silent=True)
              log(f"[{app_name}] Button click result: {result}")
              return result

