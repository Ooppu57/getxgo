name: Parallel macOS Auto-Installer

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Select macOS Runner Version'
        required: true
        type: choice
        options:
          - 'macos-13'
          - 'macos-14'
          - 'macos-15'
          - 'macos-26'
          - 'macos-26-intel'
        default: 'macos-14'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'techx@highmail.site'
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '5'
      num_clicks:
        description: 'Number of Click-Only Devices (rest will Install)'
        required: true
        type: choice
        options:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '3'
      software_choice:
        description: 'Select Software & Link'
        required: true
        type: choice
        options:
          - 'Opera - B4Books'
          - 'Opera - Techx'
          - 'Opera - Fatradez'
          - 'Opera - James'
          - 'Opera - Oliver'
          - 'Opera - Mahal'
          - 'Opera-One - Esmeel'
          - 'Opera-One - Harrari'
          - 'Opera-One - Chloe'
          - 'Opera-One - Daisy'
          - 'Opera-One - Jimmy'
          - 'Ad-MVN - Techx'
          - 'Ad-MVN - B4Books'
          - 'Ad-MVN - Orderflowz'
          - 'Ad-MVN - A2Z'
        default: 'Ad-MVN - Techx'
      run_manual_url:
        description: 'Run Manual URL (Bypass software choice)'
        required: true
        type: boolean
        default: false
      manual_url:
        description: 'Manual Software URL'
        required: false
        type: string
        default: ''
      scrapeops_api_key:
        description: 'ScrapeOps API Key / FloppyData API Key / Manual Proxies'
        required: false
        type: string
        default: '1IFG1IFjMPZi4DcrQ16KF2ku_fbxeCXI'
      run_without_proxy:
        description: 'Run without proxy (Bypass all proxies)'
        required: true
        type: boolean
        default: false
      proxy_country:
        description: 'Proxy Country Geotargeting'
        required: true
        type: choice
        options:
          - 'USA'
          - 'UK'
          - 'Canada'
          - 'Australia'
          - 'Germany'
          - 'France'
          - 'Brazil'
          - 'Mexico'
          - 'Spain'
          - 'Vietnam'
          - 'Switzerland'
          - 'Indonesia'
          - 'Italy'
          - 'Netherlands'
          - 'Poland'
        default: 'USA'
      mobile_proxies:
        description: 'Use Mobile Proxies'
        required: true
        type: boolean
        default: false
      sticky_sessions:
        description: 'Enable Unique Sticky Sessions'
        required: true
        type: boolean
        default: true

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Generate Dynamic Matrix & Proxy Config
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          NUM_CLICKS: ${{ inputs.num_clicks }}
          OS_VERSION: ${{ inputs.os_version }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          RUN_MANUAL: ${{ inputs.run_manual_url }}
          MANUAL_URL: ${{ inputs.manual_url }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          RUN_WITHOUT_PROXY: ${{ inputs.run_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import os, json, uuid, re, sys, subprocess, time, random

          print("========== INITIALIZING MATRIX GENERATION ==========")

          try:
              import requests
          except ImportError:
              subprocess.check_call([sys.executable, "-m", "pip", "install", "requests", "--quiet"])
              import requests

          email          = os.environ.get("EMAIL", "").strip()
          num_devices    = int(os.environ.get("NUM_DEVICES", "1"))
          num_clicks_raw = int(os.environ.get("NUM_CLICKS", "0"))
          num_clicks     = min(num_clicks_raw, num_devices)
          num_installs   = num_devices - num_clicks
          os_version     = os.environ.get("OS_VERSION", "macos-14")

          proxy_input      = os.environ.get("API_KEY", "").strip()
          run_without_proxy = os.environ.get("RUN_WITHOUT_PROXY", "false").lower() == "true"

          is_manual_proxy      = False
          manual_proxy_strings = []
          scrapeops_key        = ""
          floppy_key           = ""

          SCRAPEOPS_KEY_RE = re.compile(
              r'^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$', re.IGNORECASE)
          FLOPPY_KEY_RE = re.compile(r'^[A-Za-z0-9_]{30,80}$')

          if run_without_proxy:
              print("[Proxy] 'Run without proxy' checked. Disabling proxy.")
              proxy_input = ""
          elif not proxy_input or proxy_input.lower() in ["none", "null", "false", "blank", "empty", "''", '""']:
              print("[Proxy] Proxy input empty or invalid. Disabling proxy.")
              proxy_input = ""
          else:
              raw_items = re.split(r'[\s,;]+', proxy_input)
              proxy_candidates = []
              for item in raw_items:
                  item = item.strip()
                  if not item:
                      continue
                  if ('://' in item) or ('@' in item) or (item.count(':') >= 2 and len(item) > 10):
                      proxy_candidates.append(item)
              if len(proxy_candidates) >= 1:
                  is_manual_proxy      = True
                  manual_proxy_strings = proxy_candidates
                  print(f"[Proxy] Detected MANUAL PROXY mode with {len(manual_proxy_strings)} entries.")
              elif SCRAPEOPS_KEY_RE.match(proxy_input):
                  scrapeops_key = proxy_input
                  print("[Proxy] Detected SCRAPEOPS API KEY mode.")
              elif FLOPPY_KEY_RE.match(proxy_input):
                  floppy_key = proxy_input
                  print("[Proxy] Detected FLOPPYDATA API KEY mode.")
              else:
                  scrapeops_key = proxy_input
                  print("[Proxy] Could not determine key type — treating as ScrapeOps.")

          country_map = {
              "USA": "us", "UK": "uk", "Canada": "ca",
              "Australia": "au", "Germany": "de", "France": "fr",
              "Brazil": "br", "Mexico": "mx", "Spain": "es",
              "Vietnam": "vn", "Switzerland": "ch", "Indonesia": "id",
              "Italy": "it", "Netherlands": "nl", "Poland": "pl"
          }
          country_name_to_code = {
              'united states': 'us', 'united kingdom': 'uk', 'canada': 'ca',
              'australia': 'au', 'germany': 'de', 'france': 'fr',
              'brazil': 'br', 'mexico': 'mx', 'spain': 'es',
              'vietnam': 'vn', 'switzerland': 'ch', 'indonesia': 'id',
              'italy': 'it', 'netherlands': 'nl', 'poland': 'pl',
              'usa': 'us', 'uk': 'uk',
          }

          def parse_proxy(proxy_str):
              original = proxy_str.strip()
              if not original:
                  return None
              protocol = 'http'
              rest = original
              if '://' in rest:
                  protocol, rest = rest.split('://', 1)
                  if protocol.lower() == 'geolocation':
                      protocol = 'http'
              floppy_match = re.match(r'^([^:]+):([^@]+)@([^:]+):(\d+):(.+)$', rest)
              if floppy_match:
                  user, pwd, host, port, country_extra = floppy_match.groups()
                  country = country_extra.split(' - ')[0].strip()
                  return {'original': original, 'protocol': protocol,
                          'username': user, 'password': pwd,
                          'host': host, 'port': int(port),
                          'server': f"{host}:{port}", 'country_name': country,
                          'country_code': None,
                          'url': f"http://{user}:{pwd}@{host}:{port}"}
              std_match = re.match(r'^([^:]+):([^@]+)@([^:]+):(\d+)$', rest)
              if std_match:
                  user, pwd, host, port = std_match.groups()
                  return {'original': original, 'protocol': protocol,
                          'username': user, 'password': pwd,
                          'host': host, 'port': int(port),
                          'server': f"{host}:{port}", 'country_name': None,
                          'country_code': None,
                          'url': f"{protocol}://{user}:{pwd}@{host}:{port}"}
              alt_match = re.match(r'^([^:]+):(\d+):([^:]+):(.+)$', rest)
              if alt_match:
                  host, port, user, pwd = alt_match.groups()
                  return {'original': original, 'protocol': protocol,
                          'username': user, 'password': pwd,
                          'host': host, 'port': int(port),
                          'server': f"{host}:{port}", 'country_name': None,
                          'country_code': None,
                          'url': f"{protocol}://{user}:{pwd}@{host}:{port}"}
              simple_match = re.match(r'^([^:]+):(\d+)$', rest)
              if simple_match:
                  host, port = simple_match.groups()
                  return {'original': original, 'protocol': protocol,
                          'username': '', 'password': '',
                          'host': host, 'port': int(port),
                          'server': f"{host}:{port}", 'country_name': None,
                          'country_code': None,
                          'url': f"{protocol}://{host}:{port}"}
              return None

          def validate_proxy(pinfo):
              try:
                  proxies = {'http': pinfo['url'], 'https': pinfo['url']}
                  resp = requests.get('http://ip-api.com/json/', proxies=proxies, timeout=15)
                  data = resp.json()
                  if data.get('status') == 'success':
                      cc = data.get('countryCode', 'US').lower()
                      country = pinfo.get('country_name') or data.get('country', 'Unknown')
                      return {'working': True, 'country_name': country, 'country_code': cc,
                              'ip': data.get('query', ''),
                              **{k: v for k, v in pinfo.items() if k not in ['working','country_name','country_code','ip']}}
              except Exception as e:
                  print(f"[ProxyCheck] FAILED {pinfo.get('server','?')}: {e}")
              return {'working': False, **pinfo}

          active_proxies = []
          use_proxy      = False

          if is_manual_proxy and not run_without_proxy:
              parsed = []
              for ps in manual_proxy_strings:
                  p = parse_proxy(ps)
                  if p:
                      parsed.append(p)
                  else:
                      print(f"[ProxyParse] Could not parse: {ps[:60]}...")
              print(f"[Proxy] Validating {len(parsed)} parsed proxies...")
              for idx, p in enumerate(parsed):
                  result = validate_proxy(p)
                  if result['working']:
                      if result.get('country_name'):
                          cname = result['country_name'].lower()
                          result['country_code'] = country_name_to_code.get(cname, result.get('country_code','us'))
                      active_proxies.append(result)
                      print(f"[Proxy] ACTIVE  -> {result['server']} | {result.get('country_name','?')} ({result.get('country_code','?')}) | IP: {result.get('ip','?')}")
                  else:
                      print(f"[Proxy] DEAD    -> {result.get('server','?')}")
                  if idx < len(parsed) - 1:
                      time.sleep(1)
              if len(active_proxies) < num_devices:
                  print(f"[Proxy] ERROR: Only {len(active_proxies)} active proxies for {num_devices} devices.")
                  exit(1)
              use_proxy = True
              print(f"[Proxy] Manual proxy pool ready: {len(active_proxies)} active for {num_devices} devices.")

          elif floppy_key and not run_without_proxy:
              use_proxy = True
              country_input = os.environ.get("COUNTRY", "USA")
              mobile        = os.environ.get("MOBILE", "false").lower() == "true"
              sticky        = os.environ.get("STICKY", "false").lower() == "true"
              cc            = country_map.get(country_input, "us").upper()
              proxy_type    = "mobile" if mobile else "residential"
              FLOPPY_BASE   = "https://client-api.floppy.host"
              headers       = {"X-Api-Key": floppy_key}
              print(f"[FloppyData] Fetching base credentials...")
              try:
                  creds_resp = requests.get(f"{FLOPPY_BASE}/v1/rotating/smartParamsCredentials",
                                            headers=headers, timeout=15)
                  creds_data = creds_resp.json()
                  floppy_base_user = creds_data.get("username", "")
                  floppy_base_pass = creds_data.get("password", "")
                  print(f"[FloppyData] Base credentials fetched. User prefix: {floppy_base_user[:8]}***")
              except Exception as e:
                  print(f"[FloppyData] ERROR fetching credentials: {e}")
                  exit(1)
              print(f"[FloppyData] Building {num_devices} device proxy configs (type={proxy_type}, country={cc})...")
              for i in range(1, num_devices + 1):
                  session_id = str(uuid.uuid4())[:8] if sticky else ""
                  params = {"type": proxy_type, "country": cc, "protocol": "http",
                            "rotation": "0" if sticky else "-1"}
                  if sticky and session_id:
                      params["session"] = f"dev{i}_{session_id}"
                  try:
                      builder_resp = requests.get(f"{FLOPPY_BASE}/v1/rotating/smartParamsBuilder",
                                                  headers=headers, params=params, timeout=15)
                      builder_data = builder_resp.json()
                      floppy_user  = builder_data.get("username", floppy_base_user)
                      floppy_pass  = builder_data.get("password", floppy_base_pass)
                      floppy_host  = builder_data.get("host", "geo.g-w.info")
                      floppy_port  = str(builder_data.get("port", 10080))
                      print(f"[FloppyData] Device {i}: {floppy_host}:{floppy_port} | user={floppy_user[:16]}... | session={'YES' if sticky else 'NO'}")
                  except Exception as e:
                      print(f"[FloppyData] ERROR building params for device {i}: {e}")
                      exit(1)
                  active_proxies.append({
                      'username': floppy_user, 'password': floppy_pass,
                      'host': floppy_host, 'port': int(floppy_port),
                      'server': f"{floppy_host}:{floppy_port}",
                      'country_code': cc.lower(), 'country_name': country_input,
                      'proxy_type_label': "floppydata",
                      'url': f"http://{floppy_user}:{floppy_pass}@{floppy_host}:{floppy_port}"
                  })
                  time.sleep(0.3)
              print(f"[FloppyData] Proxy pool ready: {len(active_proxies)} entries.")

          elif scrapeops_key and not run_without_proxy:
              use_proxy = True
              print("[Proxy] ScrapeOps proxy pool ready.")

          # Build action list: install x num_installs, click x num_clicks, shuffled
          action_list = ["install"] * num_installs + ["click"] * num_clicks
          random.shuffle(action_list)
          print(f"[Action Matrix] Total Devices : {num_devices}")
          print(f"[Action Matrix] Install Paths : {num_installs}")
          print(f"[Action Matrix] Click Paths   : {num_clicks}")
          print(f"[Action Matrix] Randomized Queue: {action_list}")

          run_manual   = os.environ.get("RUN_MANUAL", "false").lower() == "true"
          manual_url   = os.environ.get("MANUAL_URL", "").strip()
          software_choice = os.environ.get("SOFTWARE_CHOICE", "Opera - B4Books")

          opera_urls = {
              "Opera - B4Books":  "https://u.to/opx-b4b/2nh4Ig",
              "Opera - Techx":    "https://u.to/techxsm/xVyFIg",
              "Opera - Fatradez": "https://u.to/fatradezsm/cF2FIg",
              "Opera - James":    "https://u.to/jamesxsm/eV2FIg",
              "Opera - Oliver":   "https://u.to/oliverxsm/f12FIg",
              "Opera - Mahal":    "https://u.to/mahalxsm/iF2FIg",
          }
          opera_one_urls = {
              "Opera-One - Esmeel":  "https://u.to/esmlxopo/cTOGIg",
              "Opera-One - Harrari": "https://u.to/hararixopo/zTOGIg",
              "Opera-One - Chloe":   "https://u.to/chloexopo/_DOGIg",
              "Opera-One - Daisy":   "https://u.to/daisyxopo/LjSGIg",
              "Opera-One - Jimmy":   "https://u.to/jmy/mUZ4Ig",
          }
          ad_mvn_urls = {
              "Ad-MVN - Techx":      "https://u.to/techxadmvnxsmrt/gvd7Ig",
              "Ad-MVN - B4Books":    "https://u.to/b4bxadmvnxsmrt/5-h7Ig",
              "Ad-MVN - Orderflowz": "https://u.to/ordrflzadmvnxsmrt/-fZ7Ig",
              "Ad-MVN - A2Z":        "https://u.to/a2zadmvnxsmrt/Y-t7Ig",
          }
          all_urls = {**opera_urls, **opera_one_urls, **ad_mvn_urls}

          # Dynamic/smart link software types (Tab+Enter interstitial approach)
          dynamic_links = list(opera_urls.keys())  # All "Opera - *" are dynamic smart links

          if run_manual and manual_url:
              target_url    = manual_url
              software_type = "dynamic_opera"
              dmg_filter    = "*Opera*"
          else:
              target_url = all_urls.get(software_choice, opera_urls["Opera - B4Books"])
              if software_choice in dynamic_links or software_choice.startswith("Ad-MVN"):
                  software_type = "opera_smart_link"
                  dmg_filter    = "*Opera*"
              elif software_choice.startswith("Opera-One"):
                  software_type = "opera_one"
                  dmg_filter    = "*Opera*"
              else:
                  software_type = "dynamic_opera"
                  dmg_filter    = "*Opera*"

          def short_os(os_ver):
              mapping = {
                  "macos-15": "M15", "macos-14": "M14", "macos-13": "M13",
                  "macos-26": "M26", "macos-26-intel": "M26I",
              }
              return mapping.get(os_ver, "MAC")

          def short_software(choice):
              if run_manual:
                  return "MANUAL"
              prefix_map = {
                  "Opera-One": "OPO",
                  "Ad-MVN":    "MVN",
                  "Opera":     "OP",
              }
              for key, prefix in prefix_map.items():
                  if choice.startswith(key):
                      parts = choice.split(" - ", 1)
                      list_name = parts[1].replace(" ", "") if len(parts) > 1 else ""
                      return f"{prefix}-{list_name}"
              return choice.replace(" ", "").replace("-", "")

          short_os_tag = short_os(os_version)
          short_sw_tag = "MANUAL" if (run_manual and manual_url) else short_software(software_choice)

          includes = []
          if email:
              for i in range(1, num_devices + 1):
                  action_mode = action_list[i - 1]
                  action_cap  = action_mode.capitalize()

                  if is_manual_proxy and active_proxies:
                      proxy      = active_proxies[i - 1]
                      cc_upper   = (proxy.get('country_code') or 'XX').upper()
                      device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_cap}-{cc_upper}"
                      includes.append({
                          "device": device_name, "email": email, "os": os_version,
                          "use_proxy": "true",
                          "proxy_server": proxy['server'],
                          "proxy_user":   proxy.get('username', ''),
                          "proxy_pass":   proxy.get('password', ''),
                          "proxy_type":   "manual",
                          "target_url":   target_url, "software_type": software_type,
                          "dmg_filter":   dmg_filter, "action_mode":   action_mode,
                      })
                      print(f"[Device Added] {device_name} | Proxy: {proxy['server']} ({cc_upper}) | Auth: {'YES' if proxy.get('username') else 'NO'}")

                  elif floppy_key and active_proxies:
                      proxy      = active_proxies[i - 1]
                      cc_upper   = (proxy.get('country_code') or 'XX').upper()
                      device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_cap}-{cc_upper}"
                      includes.append({
                          "device": device_name, "email": email, "os": os_version,
                          "use_proxy": "true",
                          "proxy_server": proxy['server'],
                          "proxy_user":   proxy['username'],
                          "proxy_pass":   proxy['password'],
                          "proxy_type":   "floppydata",
                          "target_url":   target_url, "software_type": software_type,
                          "dmg_filter":   dmg_filter, "action_mode":   action_mode,
                      })
                      print(f"[Device Added] {device_name} | Proxy: FloppyData ({proxy['server']}) ({cc_upper})")

                  elif use_proxy and scrapeops_key:
                      country_input = os.environ.get("COUNTRY", "USA")
                      mobile        = os.environ.get("MOBILE", "false").lower() == "true"
                      sticky        = os.environ.get("STICKY", "false").lower() == "true"
                      cc            = country_map.get(country_input, "us")
                      country_cap   = cc.upper()
                      device_name   = f"{i}-{short_os_tag}-{short_sw_tag}-{action_cap}-{country_cap}"
                      proxy_user    = f"scrapeops.country={cc}"
                      if mobile:
                          proxy_user += ".mobile=true"
                      if sticky:
                          session_id  = str(uuid.uuid4())[:8]
                          proxy_user += f".sticky_session={session_id}"
                      includes.append({
                          "device": device_name, "email": email, "os": os_version,
                          "use_proxy": "true",
                          "proxy_server": "residential-proxy.scrapeops.io:8181",
                          "proxy_user":   proxy_user,
                          "proxy_pass":   scrapeops_key,
                          "proxy_type":   "scrapeops",
                          "target_url":   target_url, "software_type": software_type,
                          "dmg_filter":   dmg_filter, "action_mode":   action_mode,
                      })
                      print(f"[Device Added] {device_name} | Proxy: ScrapeOps ({cc})")

                  else:
                      device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_cap}-DIRECT"
                      includes.append({
                          "device": device_name, "email": email, "os": os_version,
                          "use_proxy": "false",
                          "proxy_server": "", "proxy_user": "", "proxy_pass": "",
                          "proxy_type":   "none",
                          "target_url":   target_url, "software_type": software_type,
                          "dmg_filter":   dmg_filter, "action_mode":   action_mode,
                      })
                      print(f"[Device Added] {device_name} | Proxy: NONE")

          if not includes:
              print("Error: Valid configuration could not be generated.")
              exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")
          print("========== MATRIX GENERATION COMPLETE ==========")

      - name: Update Workflow Defaults (Remember Inputs)
        shell: python
        env:
          OS_VERSION: ${{ inputs.os_version }}
          GETSCREEN_EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          NUM_CLICKS: ${{ inputs.num_clicks }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          RUN_MANUAL: ${{ inputs.run_manual_url }}
          MANUAL_URL: ${{ inputs.manual_url }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          RUN_WITHOUT_PROXY: ${{ inputs.run_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import re, os

          SCRAPEOPS_KEY_RE = re.compile(
              r'^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$', re.IGNORECASE)
          FLOPPY_KEY_RE = re.compile(r'^[A-Za-z0-9_]{30,80}$')

          file_path = ".github/workflows/main6.yml"
          if os.path.exists(file_path):
              with open(file_path, "r") as f:
                  content = f.read()

              def update_default_str(input_name, new_val):
                  global content
                  pattern = r"(" + input_name + r":[\s\S]*?default:\s*')[^']*(')"
                  content = re.sub(pattern, rf"\g<1>{new_val}\g<2>", content, count=1)

              def update_default_bool(input_name, new_val):
                  global content
                  pattern = r"(" + input_name + r":[\s\S]*?default:\s*)(true|false)"
                  content = re.sub(pattern, rf"\g<1>{new_val.lower()}", content, count=1)

              api_key_input = os.environ.get("API_KEY", "").strip()
              is_manual_proxy = False
              if api_key_input:
                  raw_items = re.split(r'[\s,;]+', api_key_input)
                  proxy_candidates = [item for item in raw_items
                                      if ('://' in item) or ('@' in item) or (item.count(':') >= 2 and len(item) > 10)]
                  if len(proxy_candidates) >= 1:
                      is_manual_proxy = True

              update_default_str("os_version",        os.environ.get("OS_VERSION"))
              update_default_str("getscreen_email",   os.environ.get("GETSCREEN_EMAIL"))
              update_default_str("num_devices",       os.environ.get("NUM_DEVICES"))
              update_default_str("num_clicks",        os.environ.get("NUM_CLICKS"))
              update_default_str("software_choice",   os.environ.get("SOFTWARE_CHOICE"))
              update_default_bool("run_manual_url",   os.environ.get("RUN_MANUAL"))
              if os.environ.get("RUN_MANUAL", "false").lower() == "true":
                  update_default_str("manual_url",    os.environ.get("MANUAL_URL"))
              else:
                  update_default_str("manual_url",    "")
              if not is_manual_proxy and api_key_input:
                  update_default_str("scrapeops_api_key", api_key_input)
              update_default_bool("run_without_proxy", os.environ.get("RUN_WITHOUT_PROXY"))
              update_default_str("proxy_country",     os.environ.get("COUNTRY"))
              update_default_bool("mobile_proxies",   os.environ.get("MOBILE"))
              update_default_bool("sticky_sessions",  os.environ.get("STICKY"))

              with open(file_path, "w") as f:
                  f.write(content)
          else:
              print(f"File {file_path} not found. Skipping auto-save.")

      - name: Commit and Push New Defaults
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/main6.yml
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Update last used inputs[skip ci]" && git push)

  remote_session:
    name: Remote Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 9

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      # ================================================================== #
      # STEP 1 — Disable Gatekeeper & macOS security                       #
      # ================================================================== #
      - name: Disable Gatekeeper & Configure macOS Security
        shell: bash
        run: |
          echo "===[$(date '+%H:%M:%S')] Configuring macOS Security Settings ==="
          sudo spctl --master-disable || true
          sudo defaults write /Library/Preferences/com.apple.security GKAutoRearm -bool false || true
          sudo defaults write /Library/Preferences/com.apple.security AssessmentEnable -bool false || true
          defaults write com.apple.LaunchServices LSQuarantine -bool false || true
          defaults write com.apple.Safari AutoOpenSafeDownloads -bool true || true
          defaults write com.apple.Safari DownloadValidation -bool false || true
          sudo spctl --global-disable || true
          echo "[$(date '+%H:%M:%S')] macOS security configuration complete."

      # ================================================================== #
      # STEP 2 — Python venv + Homebrew + cliclick                         #
      # ================================================================== #
      - name: Install Dependencies (Python + Browser Tools)
        shell: bash
        run: |
          echo "===[$(date '+%H:%M:%S')] Installing Python UI Automation Dependencies ==="
          VENV_DIR="/tmp/uienv"
          PYTHON_BIN=""
          for candidate in python3.12 python3.11 python3.10 python3; do
            if command -v "$candidate" &>/dev/null; then
              PYTHON_BIN="$candidate"
              break
            fi
          done
          if [ -z "$PYTHON_BIN" ]; then
            echo "ERROR: No Python3 found on runner."
            exit 1
          fi
          echo "[$(date '+%H:%M:%S')] Using Python: $PYTHON_BIN ($($PYTHON_BIN --version 2>&1))"
          rm -rf "$VENV_DIR"
          "$PYTHON_BIN" -m venv "$VENV_DIR"
          source "$VENV_DIR/bin/activate"
          pip install --upgrade pip --quiet
          pip install pyobjc-core pyobjc-framework-Cocoa \
                      pyobjc-framework-ApplicationServices --quiet || true
          pip install atomacos --quiet || true
          pip install Pillow requests --quiet || true
          deactivate
          echo "UIENV_PYTHON=$VENV_DIR/bin/python3" >> "$GITHUB_ENV"
          echo "[$(date '+%H:%M:%S')] Python venv ready at $VENV_DIR"
          if ! command -v brew &>/dev/null; then
            echo "[$(date '+%H:%M:%S')] Installing Homebrew..."
            NONINTERACTIVE=1 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || true
            for bp in /opt/homebrew/bin /usr/local/bin; do
              if [ -x "$bp/brew" ]; then
                export PATH="$bp:$PATH"
                echo "PATH=$bp:$PATH" >> "$GITHUB_ENV"
                break
              fi
            done
          fi
          brew install cliclick --quiet || true
          CLICLICK_PATH=$(command -v cliclick || echo "not_found")
          echo "[$(date '+%H:%M:%S')] cliclick path: $CLICLICK_PATH"
          echo "CLICLICK_BIN=$CLICLICK_PATH" >> "$GITHUB_ENV"
          echo "[$(date '+%H:%M:%S')] All dependencies installed."

      # ================================================================== #
      # STEP 3 — Pre-Grant ALL TCC permissions upfront                      #
      # ================================================================== #
      - name: Pre-Grant TCC Permissions (CLI-first, comprehensive)
        shell: bash
        run: |
          echo "=== [$(date '+%H:%M:%S')] Pre-Granting TCC Permissions via SQLite ==="
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          grant_tcc() {
            local SERVICE="$1"
            local CLIENT="$2"
            local CLIENT_TYPE="$3"
            sudo sqlite3 "$TCC_DB" \
              "INSERT OR REPLACE INTO access \
               (service, client, client_type, auth_value, auth_reason, auth_version, flags) \
               VALUES ('$SERVICE', '$CLIENT', $CLIENT_TYPE, 2, 4, 1, 0);" 2>/dev/null || true
          }
          grant_tcc kTCCServiceAccessibility com.apple.Terminal          0
          grant_tcc kTCCServiceAccessibility com.apple.systemevents      0
          grant_tcc kTCCServiceAccessibility com.google.Chrome           0
          grant_tcc kTCCServiceAccessibility /usr/bin/osascript          1
          grant_tcc kTCCServiceAccessibility /bin/bash                   1
          grant_tcc kTCCServiceAccessibility /usr/bin/python3            1
          grant_tcc kTCCServiceScreenCapture com.google.Chrome           0
          grant_tcc kTCCServiceScreenCapture com.apple.Terminal          0
          grant_tcc kTCCServiceScreenCapture me.getscreen.agent          0
          grant_tcc kTCCServiceScreenCapture com.getscreen.agent         0
          grant_tcc kTCCServiceScreenCapture com.getscreen.mac           0
          grant_tcc kTCCServiceScreenCapture me.getscreen.mac            0
          grant_tcc kTCCServiceScreenCapture me.getscreen.desktop        0
          grant_tcc kTCCServiceScreenCapture com.getscreen.desktop       0
          grant_tcc kTCCServiceLocalNetwork  com.google.Chrome           0
          grant_tcc kTCCServiceLocalNetwork  com.apple.Terminal          0
          grant_tcc kTCCServiceLocalNetwork  /usr/bin/osascript          1
          grant_tcc kTCCServiceLocalNetwork  me.getscreen.agent          0
          grant_tcc kTCCServiceLocalNetwork  com.getscreen.agent         0
          grant_tcc kTCCServiceLocalNetwork  com.getscreen.mac           0
          grant_tcc kTCCServiceLocalNetwork  me.getscreen.mac            0
          grant_tcc kTCCServiceLocalNetwork  me.getscreen.desktop        0
          grant_tcc kTCCServiceLocalNetwork  com.getscreen.desktop       0
          grant_tcc kTCCServiceCamera        com.google.Chrome           0
          grant_tcc kTCCServiceMicrophone    com.google.Chrome           0
          echo "[$(date '+%H:%M:%S')] --- Scanning for GitHub runner process paths ---"
          for RUNNER_DIR in /Users/runner /home/runner /opt/hostedtoolcache /private/var/folders; do
            if [ -d "$RUNNER_DIR" ]; then
              for BIN_NAME in Runner.Worker Runner.Listener Runner.PluginHost run.sh; do
                FOUND_PATH=$(find "$RUNNER_DIR" -name "$BIN_NAME" -maxdepth 6 2>/dev/null | head -n 1 || true)
                if [ -n "$FOUND_PATH" ]; then
                  echo "[$(date '+%H:%M:%S')] Granting TCC to runner binary: $FOUND_PATH"
                  grant_tcc kTCCServiceLocalNetwork  "$FOUND_PATH" 1
                  grant_tcc kTCCServiceScreenCapture "$FOUND_PATH" 1
                  grant_tcc kTCCServiceAccessibility "$FOUND_PATH" 1
                fi
              done
            fi
          done
          ps aux 2>/dev/null | awk '{print $11}' | grep -iE "(runner|hosted|compute|agent)" | sort -u | while read -r PROC_PATH; do
            if [ -x "$PROC_PATH" ]; then
              echo "[$(date '+%H:%M:%S')] Granting TCC to live process: $PROC_PATH"
              grant_tcc kTCCServiceLocalNetwork  "$PROC_PATH" 1
              grant_tcc kTCCServiceScreenCapture "$PROC_PATH" 1
              grant_tcc kTCCServiceAccessibility "$PROC_PATH" 1
            fi
          done || true
          sudo defaults write /Library/Preferences/com.apple.security \
            "SecAssessmentDisableUserApproval" -bool true 2>/dev/null || true
          CHROME_POLICY_DIR="/Library/Managed Preferences"
          sudo mkdir -p "$CHROME_POLICY_DIR"
          sudo /usr/libexec/PlistBuddy -c \
            "Add :AuthServerAllowlist string *" \
            "$CHROME_POLICY_DIR/com.google.Chrome.plist" 2>/dev/null || \
          sudo /usr/libexec/PlistBuddy -c \
            "Set :AuthServerAllowlist *" \
            "$CHROME_POLICY_DIR/com.google.Chrome.plist" 2>/dev/null || true
          sudo /usr/libexec/PlistBuddy -c \
            "Add :AuthNegotiateDelegateAllowlist string *" \
            "$CHROME_POLICY_DIR/com.google.Chrome.plist" 2>/dev/null || true
          sudo /usr/libexec/PlistBuddy -c \
            "Add :ProxyBypassList string <-loopback>" \
            "$CHROME_POLICY_DIR/com.google.Chrome.plist" 2>/dev/null || true
          echo "[$(date '+%H:%M:%S')] TCC and policy configuration complete."

      # ================================================================== #
      # STEP 4 — Getscreen.me install                                      #
      # ================================================================== #
      - name: Install, Bypass Security, and Start Getscreen.me (macOS)
        shell: bash
        run: |
          echo "===[$(date '+%H:%M:%S')] Installing Getscreen.me via DMG ==="
          DEVICE_NAME="${{ matrix.device }}"
          EMAIL="${{ matrix.email }}"
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          MAX_RETRIES=3
          RETRY=0
          SUCCESS=false
          while [ $RETRY -lt $MAX_RETRIES ]; do
            curl -L -o getscreen.dmg "https://getscreen.me/download/getscreen.dmg" \
              --retry 3 --retry-delay 5 --silent --show-error || true
            FILE_SIZE=$(stat -f%z getscreen.dmg 2>/dev/null || stat -c%s getscreen.dmg 2>/dev/null || echo 0)
            if [ -f "getscreen.dmg" ] && [ "$FILE_SIZE" -gt 102400 ]; then
              SUCCESS=true
              break
            fi
            echo "[$(date '+%H:%M:%S')] Download attempt $((RETRY+1)) failed (${FILE_SIZE}B), retrying..."
            sleep 5
            RETRY=$((RETRY+1))
          done
          if [ "$SUCCESS" = false ]; then
            echo "[$(date '+%H:%M:%S')] ERROR: Getscreen.me DMG failed to download. Skipping."
            exit 0
          fi
          echo "[$(date '+%H:%M:%S')] Downloaded getscreen.dmg (${FILE_SIZE}B). Mounting..."
          hdiutil attach getscreen.dmg -mountpoint /Volumes/getscreen -nobrowse -quiet || true
          APP_PATH=$(find /Volumes/getscreen -maxdepth 1 -name "*.app" | head -n 1 || true)
          if [ -z "$APP_PATH" ]; then
            echo "[$(date '+%H:%M:%S')] ERROR: No .app found inside Getscreen DMG."
            hdiutil detach /Volumes/getscreen -quiet -force || true
            exit 0
          fi
          APP_NAME=$(basename "$APP_PATH")
          echo "[$(date '+%H:%M:%S')] Found: $APP_NAME"
          sudo cp -R "$APP_PATH" /Applications/
          sudo xattr -dr com.apple.quarantine "/Applications/$APP_NAME" 2>/dev/null || true
          hdiutil detach /Volumes/getscreen -quiet -force || true
          APP_BUNDLE_ID=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleIdentifier 2>/dev/null || echo "")
          echo "[$(date '+%H:%M:%S')] Bundle ID: ${APP_BUNDLE_ID:-<not found>}"
          if [ -n "$APP_BUNDLE_ID" ]; then
            for SVC in kTCCServiceScreenCapture kTCCServiceAccessibility kTCCServiceLocalNetwork; do
              sudo sqlite3 "$TCC_DB" \
                "INSERT OR REPLACE INTO access \
                 (service, client, client_type, auth_value, auth_reason, auth_version, flags) \
                 VALUES ('$SVC', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" 2>/dev/null || true
            done
            echo "[$(date '+%H:%M:%S')] TCC permissions granted for $APP_BUNDLE_ID"
          fi
          EXEC_NAME=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleExecutable 2>/dev/null || echo "")
          EXEC_PATH="/Applications/$APP_NAME/Contents/MacOS/$EXEC_NAME"
          if [ ! -x "$EXEC_PATH" ]; then
            EXEC_PATH=$(find "/Applications/$APP_NAME/Contents/MacOS" \
              -maxdepth 1 -type f -perm +111 2>/dev/null | head -n 1 || true)
          fi
          if [ -n "$EXEC_PATH" ] && [ -x "$EXEC_PATH" ]; then
            for SVC in kTCCServiceScreenCapture kTCCServiceAccessibility kTCCServiceLocalNetwork; do
              sudo sqlite3 "$TCC_DB" \
                "INSERT OR REPLACE INTO access \
                 (service, client, client_type, auth_value, auth_reason, auth_version, flags) \
                 VALUES ('$SVC', '$EXEC_PATH', 1, 2, 4, 1, 0);" 2>/dev/null || true
            done
            echo "[$(date '+%H:%M:%S')] TCC path-based permissions granted for $EXEC_PATH"
          fi
          if [ -z "$EXEC_PATH" ] || [ ! -x "$EXEC_PATH" ]; then
            echo "[$(date '+%H:%M:%S')] ERROR: Getscreen executable not found."
            exit 0
          fi
          echo "[$(date '+%H:%M:%S')] Executable: $EXEC_PATH"
          sudo "$EXEC_PATH" -install 2>/dev/null || true
          sleep 2
          sudo "$EXEC_PATH" -register "$EMAIL" 2>/dev/null || true
          sleep 1
          sudo "$EXEC_PATH" -config \
            "name='$DEVICE_NAME' autostart=true nonadmin=true control=true disable_confirmation=true" \
            2>/dev/null || true
          sleep 1
          sudo "$EXEC_PATH" -start 2>/dev/null || true
          echo "[$(date '+%H:%M:%S')] Getscreen.me registered as '$DEVICE_NAME' and started."

      # ================================================================== #
      # STEP 4.5 — Quick popup dismissal                                   #
      # ================================================================== #
      - name: Pre-Dismiss System Popups (Fast)
        shell: bash
        run: |
          echo "===[$(date '+%H:%M:%S')] Pre-dismissing system popups (fast) ==="
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          echo "[$(date '+%H:%M:%S')] Restarting TCC daemon to flush cache..."
          sudo launchctl kickstart -k system/com.apple.tccd 2>/dev/null || true
          sudo launchctl kickstart -k user/$(id -u)/com.apple.tccd 2>/dev/null || true
          sleep 2
          echo "[$(date '+%H:%M:%S')] Granting TCC to running processes..."
          ps aux 2>/dev/null | awk '{print $11}' | sort -u | while read -r PROC_PATH; do
            if [ -x "$PROC_PATH" ] 2>/dev/null; then
              PROC_LOWER=$(echo "$PROC_PATH" | tr '[:upper:]' '[:lower:]')
              if echo "$PROC_LOWER" | grep -qE "(compute|hosted|runner|agent|github|actions)"; then
                echo "[$(date '+%H:%M:%S')]   Granting TCC to: $PROC_PATH"
                sudo sqlite3 "$TCC_DB" \
                  "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
                   VALUES('kTCCServiceLocalNetwork','$PROC_PATH',1,2,4,1,0);" 2>/dev/null || true
                sudo sqlite3 "$TCC_DB" \
                  "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
                   VALUES('kTCCServiceScreenCapture','$PROC_PATH',1,2,4,1,0);" 2>/dev/null || true
                sudo sqlite3 "$TCC_DB" \
                  "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
                   VALUES('kTCCServiceAccessibility','$PROC_PATH',1,2,4,1,0);" 2>/dev/null || true
              fi
            fi
          done || true
          sudo killall -HUP cfprefsd 2>/dev/null || true
          sudo killall UserNotificationCenter 2>/dev/null || true
          sudo killall NotificationCenter 2>/dev/null || true
          sleep 1
          echo "[$(date '+%H:%M:%S')] Starting 15-second GUI popup dismisser..."
          cat > /tmp/early_popup_dismiss.applescript << 'ASEOF'
          set maxRuns to 30
          set runCount to 0
          repeat while runCount < maxRuns
            set runCount to runCount + 1
            try
              tell application "System Events"
                try
                  tell process "CoreServicesUIAgent"
                    repeat with win in (every window)
                      try
                        if exists button "Allow" of win then
                          click button "Allow" of win
                        end if
                      end try
                    end repeat
                  end tell
                end try
                repeat with proc in (every process whose visible is true)
                  set pName to name of proc as string
                  if pName is not "Google Chrome" then
                    try
                      repeat with win in (every window of proc)
                        set winTitle to ""
                        try
                          set winTitle to (title of win) as string
                        end try
                        if winTitle contains "Allow" then
                          try
                            click button "Allow" of win
                          end try
                        end if
                      end repeat
                    end try
                  end if
                end repeat
              end tell
            end try
            delay 0.5
          end repeat
          ASEOF
          osascript /tmp/early_popup_dismiss.applescript > /tmp/early_dismiss.log 2>&1 &
          EARLY_DISMISS_PID=$!
          echo "[$(date '+%H:%M:%S')] GUI dismisser PID: $EARLY_DISMISS_PID"
          wait $EARLY_DISMISS_PID 2>/dev/null || true
          echo "[$(date '+%H:%M:%S')] Step 4.5 complete — system ready for Chrome launch."

      # ================================================================== #
      # STEP 5 — Google Chrome                                             #
      # ================================================================== #
      - name: Install Google Chrome (Proxy-capable Browser)
        shell: bash
        run: |
          echo "=== [$(date '+%H:%M:%S')] Installing Google Chrome ==="
          CHROME_DMG="$HOME/Downloads/googlechrome.dmg"
          curl -fsSL \
            "https://dl.google.com/chrome/mac/universal/stable/GGRO/googlechrome.dmg" \
            -o "$CHROME_DMG" 2>/dev/null || \
          curl -fsSL \
            "https://dl.google.com/chrome/mac/stable/GGRO/googlechrome.dmg" \
            -o "$CHROME_DMG" 2>/dev/null || true
          FILE_SIZE=$(stat -f%z "$CHROME_DMG" 2>/dev/null || echo 0)
          if [ -f "$CHROME_DMG" ] && [ "$FILE_SIZE" -gt 1000000 ]; then
            hdiutil attach "$CHROME_DMG" -quiet -nobrowse \
              -mountpoint /Volumes/GoogleChrome || true
            if [ -d "/Volumes/GoogleChrome/Google Chrome.app" ]; then
              sudo cp -R "/Volumes/GoogleChrome/Google Chrome.app" /Applications/ || true
              sudo xattr -dr com.apple.quarantine \
                "/Applications/Google Chrome.app" 2>/dev/null || true
              hdiutil detach /Volumes/GoogleChrome -quiet || true
              echo "[$(date '+%H:%M:%S')] Google Chrome installed."
            else
              hdiutil detach /Volumes/GoogleChrome -quiet || true
              echo "[$(date '+%H:%M:%S')] WARNING: Chrome DMG mounted but .app not found."
            fi
          else
            echo "[$(date '+%H:%M:%S')] WARNING: Chrome DMG download failed ($FILE_SIZE B)."
          fi
          if [ -d "/Applications/Google Chrome.app" ]; then
            echo "CHROME_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "[$(date '+%H:%M:%S')] Chrome confirmed available."
          else
            echo "CHROME_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "[$(date '+%H:%M:%S')] Chrome unavailable."
          fi

      # ================================================================== #
      # STEP 6 — Download, Install & Automate Software (ROBUST)            #
      # ================================================================== #
      - name: Setup Auto-Downloader & Software Installation (macOS)
        shell: bash
        env:
          USE_PROXY:     ${{ matrix.use_proxy }}
          PROXY_SERVER:  ${{ matrix.proxy_server }}
          PROXY_USER:    ${{ matrix.proxy_user }}
          PROXY_PASS:    ${{ matrix.proxy_pass }}
          PROXY_TYPE:    ${{ matrix.proxy_type }}
          TARGET_URL:    ${{ matrix.target_url }}
          SOFTWARE_TYPE: ${{ matrix.software_type }}
          DMG_FILTER:    ${{ matrix.dmg_filter }}
          ACTION_MODE:   ${{ matrix.action_mode }}
        run: |
          echo "============================================================"
          echo " [$(date '+%H:%M:%S')] Zero-Touch Downloader & Installer (macOS)"
          echo " Category  : $SOFTWARE_TYPE"
          echo " Target URL: $TARGET_URL"
          echo " Action    : $(echo $ACTION_MODE | tr '[:lower:]' '[:upper:]') PATHWAY ASSIGNED"
          if [ "$USE_PROXY" = "true" ]; then
            echo " Mode      : Proxy-enabled ($PROXY_TYPE)"
            echo " Proxy Srv : $PROXY_SERVER"
            echo " Proxy User: $PROXY_USER"
          else
            echo " Mode      : Direct (no proxy)"
          fi
          echo "============================================================"

          DL_FOLDER="$HOME/Downloads"
          SENTINEL_PATH="/tmp/download_done.flag"
          INSTALLER_SENTINEL="/tmp/installer_executed.flag"
          TIMEOUT_SECS=420

          # ================================================================
          # Write the Python macOS handler
          # ================================================================
          cat > /tmp/macos_handler.py << 'PYEOF'
          import time, sys, os, subprocess, random

          def log(msg):
              ts = time.strftime("%H:%M:%S")
              print(f"[{ts}] {msg}", flush=True)

          CHROME_WARMUP_SECS   = 20
          DL_WAIT_AFTER_PROXY  = 30
          PROXY_RETRY_INTERVAL = 2
          PROXY_MAX_ATTEMPTS   = 40

          # ------------------------------------------------------------
          # Clipboard helpers
          # ------------------------------------------------------------
          def clipboard_set(text):
              try:
                  proc = subprocess.Popen(['pbcopy'], stdin=subprocess.PIPE,
                      stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                  proc.communicate(input=text.encode('utf-8'), timeout=5)
                  time.sleep(0.15)
                  return proc.returncode == 0
              except Exception as e:
                  log(f"[Clipboard] pbcopy error: {e}")
                  return False

          def clipboard_get():
              try:
                  result = subprocess.run(['pbpaste'], capture_output=True, text=True, timeout=5)
                  return result.stdout
              except Exception:
                  return ""

          def clipboard_verify(expected, label="value"):
              actual = clipboard_get()
              if actual != expected:
                  log(f"[Clipboard] MISMATCH for {label}: got {actual[:30]!r}, retrying...")
                  clipboard_set(expected)
                  time.sleep(0.2)
                  return clipboard_get() == expected
              return True

          def run_as(script, silent=False, timeout=20):
              try:
                  r = subprocess.run(["osascript", "-e", script],
                      capture_output=True, text=True, timeout=timeout)
                  if r.returncode != 0 and not silent:
                      log(f"[AppleScript] stderr: {r.stderr.strip()[:120]}")
                  return r.stdout.strip()
              except subprocess.TimeoutExpired:
                  if not silent:
                      log("[AppleScript] Timed out")
                  return ""
              except Exception as e:
                  if not silent:
                      log(f"[AppleScript] Exception: {e}")
                  return ""

          def cliclick(cmd):
              try:
                  result = subprocess.run(['cliclick', cmd],
                      capture_output=True, text=True, timeout=5)
                  return result.returncode == 0
              except Exception as e:
                  log(f"[cliclick] Error running '{cmd}': {e}")
                  return False

          def press(key_name):
              key_map = {
                  "tab": 48, "return": 36, "space": 49,
                  "right": 124, "left": 123, "up": 126, "down": 125, "escape": 53
              }
              code = key_map.get(key_name.lower())
              if code:
                  run_as(f'tell application "System Events" to key code {code}', silent=True)

          def running_apps():
              r = run_as(
                  'tell application "System Events" to get name of every process '
                  'whose visible is true', silent=True)
              return [n.strip() for n in r.split(",") if n.strip()]

          # ------------------------------------------------------------
          # Click a named button in any Opera-related process
          # ------------------------------------------------------------
          def click_button_exact(label, timeout=5):
              result = run_as(fr'''
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName contains "Opera" then
                try
                  repeat with win in (every window of proc)
                    try
                      if exists button "{label}" of win then
                        click button "{label}" of win
                        return "clicked"
                      end if
                    end try
                  end repeat
                end try
              end if
            end repeat
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName contains "Opera" then
                try
                  repeat with win in (every window of proc)
                    repeat with b in (every button of win)
                      set bname to ""
                      try
                        set bname to name of b as string
                      end try
                      ignoring case
                        if bname contains "{label}" then
                          click b
                          return "clicked_partial"
                        end if
                      end ignoring
                    end repeat
                  end repeat
                end try
              end if
            end repeat
            return "not_found"
          end tell
          ''', silent=True, timeout=timeout)
              if result and ("clicked" in result):
                  log(f"[ButtonClick] Clicked button '{label}' -> {result}")
                  return True
              return False

