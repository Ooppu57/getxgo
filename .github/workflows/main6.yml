name: Parallel macOS Auto-Installer

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Select macOS Runner Version'
        required: true
        type: choice
        options:
          - 'macos-15'
          - 'macos-14'
          - 'macos-13'
          - 'macos-15-xlarge'
          - 'macos-26'
          - 'macos-26-intel'
        default: 'macos-14'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'techx@justzeus.com'
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '1'
      software_choice:
        description: 'Select Software & Link'
        required: true
        type: choice
        options:
          - 'OperaGX - B4Books'
          - 'OperaGX - Techx'
          - 'OperaGX - Fatradez'
          - 'OperaGX - James'
          - 'OperaGX - Oliver'
          - 'OperaGX - Mahal'
          - 'Opera-One - Esmeel'
          - 'Opera-One - Harrari'
          - 'Opera-One - Chloe'
          - 'Opera-One - Daisy'
          - 'Opera-One - Jimmy'
          - 'Ad-MVN - Techx'
          - 'Ad-MVN - B4Books'
          - 'Ad-MVN - Orderflowz'
          - 'Ad-MVN - A2Z'
        default: 'OperaGX - B4Books'
      scrapeops_api_key:
        description: 'ScrapeOps API Key'
        required: false
        type: string
        default: '5a76d13d-2645-479e-a462-90be4ab99e12'
      run_without_proxy:
        description: 'Run without proxy (Bypass all proxies)'
        required: true
        type: boolean
        default: false
      proxy_country:
        description: 'Proxy Country Geotargeting'
        required: true
        type: choice
        options:
          - 'USA'
          - 'UK'
          - 'Canada'
          - 'Australia'
          - 'Germany'
          - 'France'
          - 'Brazil'
        default: 'USA'
      mobile_proxies:
        description: 'Use Mobile Proxies'
        required: true
        type: boolean
        default: false
      sticky_sessions:
        description: 'Enable Unique Sticky Sessions'
        required: true
        type: boolean
        default: true

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Generate Dynamic Matrix & Proxy Config
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          OS_VERSION: ${{ inputs.os_version }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          RUN_WITHOUT_PROXY: ${{ inputs.run_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import os, json, uuid
          email = os.environ.get("EMAIL", "").strip()
          num_devices = int(os.environ.get("NUM_DEVICES", "1"))
          os_version = os.environ.get("OS_VERSION", "macos-15")
          api_key = os.environ.get("API_KEY", "").strip()
          run_without_proxy = os.environ.get("RUN_WITHOUT_PROXY", "false").lower() == "true"
          country_input = os.environ.get("COUNTRY", "USA")
          mobile = os.environ.get("MOBILE", "false").lower() == "true"
          sticky = os.environ.get("STICKY", "false").lower() == "true"
          software_choice = os.environ.get("SOFTWARE_CHOICE", "OperaGX - James")
          use_proxy = bool(api_key) and not run_without_proxy
          country_map = {
              "USA": "us", "UK": "uk", "Canada": "ca",
              "Australia": "au", "Germany": "de", "France": "fr",
              "Brazil": "br"
          }
          cc = country_map.get(country_input, "us")
          opera_urls = {
              "OperaGX - B4Books":  "https://u.to/opx-b4b/2nh4Ig",
              "OperaGX - Techx":    "https://u.to/techxsm/xVyFIg",
              "OperaGX - Fatradez": "https://u.to/fatradezsm/cF2FIg",
              "OperaGX - James":    "https://u.to/jamesxsm/eV2FIg",
              "OperaGX - Oliver":   "https://u.to/oliverxsm/f12FIg",
              "OperaGX - Mahal":    "https://u.to/mahalxsm/iF2FIg",
          }
          opera_one_urls = {
              "Opera-One - Esmeel":  "https://u.to/esmlxopo/cTOGIg",
              "Opera-One - Harrari": "https://u.to/hararixopo/zTOGIg",
              "Opera-One - Chloe":   "https://u.to/chloexopo/_DOGIg",
              "Opera-One - Daisy":   "https://u.to/daisyxopo/LjSGIg",
              "Opera-One - Jimmy":   "https://u.to/jmy/mUZ4Ig",
          }
          ad_mvn_urls = {
              "Ad-MVN - Techx":      "https://u.to/techxadmvnxsmrt/gvd7Ig",
              "Ad-MVN - B4Books":    "https://u.to/b4bxadmvnxsmrt/5-h7Ig",
              "Ad-MVN - Orderflowz": "https://u.to/ordrflzadmvnxsmrt/-fZ7Ig",
              "Ad-MVN - A2Z":        "https://u.to/a2zadmvnxsmrt/Y-t7Ig",
          }
          all_urls = {**opera_urls, **opera_one_urls, **ad_mvn_urls}
          target_url = all_urls.get(software_choice, opera_urls["OperaGX - James"])
          dynamic_links =[
              "OperaGX - Techx", "OperaGX - Fatradez", "OperaGX - James",
              "OperaGX - Oliver", "OperaGX - Mahal"
          ]
          if software_choice in dynamic_links or software_choice.startswith("Ad-MVN"):
              software_type = "dynamic_opera"
              dmg_filter = "*Opera*"
          elif software_choice.startswith("OperaGX"):
              software_type = "opera_gx"
              dmg_filter = "*OperaGX*"
          elif software_choice.startswith("Opera-One"):
              software_type = "opera_one"
              dmg_filter = "*Opera*"
          else:
              software_type = "opera_gx"
              dmg_filter = "*Opera*"
          def short_os(os_ver):
              mapping = {
                  "macos-15":        "M15",
                  "macos-14":        "M14",
                  "macos-13":        "M13",
                  "macos-15-xlarge": "M15X",
                  "macos-26":        "M26",
                  "macos-26-intel":  "M26I",
              }
              return mapping.get(os_ver, "MAC")
          def short_software(choice):
              prefix_map = {
                  "OperaGX":   "OPX",
                  "Opera-One": "OPO",
                  "Ad-MVN":    "MVN",
              }
              for key, prefix in prefix_map.items():
                  if choice.startswith(key):
                      parts = choice.split(" - ", 1)
                      list_name = parts[1].replace(" ", "") if len(parts) > 1 else ""
                      return f"{prefix}-{list_name}"
              return choice.replace(" ", "").replace("-", "")
          short_os_tag = short_os(os_version)
          short_sw_tag = short_software(software_choice)
          includes =[]
          if email:
              for i in range(1, num_devices + 1):
                  device_name = f"{i}-{short_os_tag}-{short_sw_tag}"
                  if use_proxy:
                      proxy_user = f"scrapeops.country={cc}"
                      if mobile:
                          proxy_user += ".mobile=true"
                      if sticky:
                          session_id = str(uuid.uuid4())[:8]
                          proxy_user += f".sticky_session={session_id}"
                      proxy_pass = api_key
                  else:
                      proxy_user = ""
                      proxy_pass = ""
                  includes.append({
                      "device":        device_name,
                      "email":         email,
                      "os":            os_version,
                      "use_proxy":     str(use_proxy).lower(),
                      "proxy_user":    proxy_user,
                      "proxy_pass":    proxy_pass,
                      "target_url":    target_url,
                      "software_type": software_type,
                      "dmg_filter":    dmg_filter,
                  })
          if not includes:
              print("Error: Valid configuration could not be generated.")
              exit(1)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")
      - name: Update Workflow Defaults (Remember Inputs)
        shell: python
        env:
          OS_VERSION: ${{ inputs.os_version }}
          GETSCREEN_EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          RUN_WITHOUT_PROXY: ${{ inputs.run_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import re, os
          file_path = ".github/workflows/main6.yml"
          if os.path.exists(file_path):
              with open(file_path, "r") as f:
                  content = f.read()
              def update_default_str(input_name, new_val):
                  global content
                  pattern = r"(" + input_name + r":[\s\S]*?default:\s*')[^']*(')"
                  content = re.sub(pattern, rf"\g<1>{new_val}\g<2>", content, count=1)
              def update_default_bool(input_name, new_val):
                  global content
                  pattern = r"(" + input_name + r":[\s\S]*?default:\s*)(true|false)"
                  content = re.sub(pattern, rf"\g<1>{new_val.lower()}", content, count=1)
              update_default_str("os_version",        os.environ.get("OS_VERSION"))
              update_default_str("getscreen_email",   os.environ.get("GETSCREEN_EMAIL"))
              update_default_str("num_devices",       os.environ.get("NUM_DEVICES"))
              update_default_str("software_choice",   os.environ.get("SOFTWARE_CHOICE"))
              update_default_str("scrapeops_api_key", os.environ.get("API_KEY"))
              update_default_bool("run_without_proxy",os.environ.get("RUN_WITHOUT_PROXY"))
              update_default_str("proxy_country",     os.environ.get("COUNTRY"))
              update_default_bool("mobile_proxies",   os.environ.get("MOBILE"))
              update_default_bool("sticky_sessions",  os.environ.get("STICKY"))
              with open(file_path, "w") as f:
                  f.write(content)
          else:
              print(f"File {file_path} not found. Skipping auto-save.")
      - name: Commit and Push New Defaults
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/main6.yml
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Update last used inputs[skip ci]" && git push)
  remote_session:
    name: Remote Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 8

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      # ================================================================== #
      # STEP 1 — Disable Gatekeeper & macOS security                       #
      # ================================================================== #
      - name: Disable Gatekeeper & Configure macOS Security
        shell: bash
        run: |
          echo "===[$(date '+%H:%M:%S')] Configuring macOS Security Settings ==="
          sudo spctl --master-disable || true
          sudo defaults write /Library/Preferences/com.apple.security GKAutoRearm -bool false || true
          sudo defaults write /Library/Preferences/com.apple.security AssessmentEnable -bool false || true
          defaults write com.apple.LaunchServices LSQuarantine -bool false || true
          defaults write com.apple.Safari AutoOpenSafeDownloads -bool true || true
          defaults write com.apple.Safari DownloadValidation -bool false || true
          sudo spctl --global-disable || true
          echo "[$(date '+%H:%M:%S')] macOS security configuration complete."

      # ================================================================== #
      # STEP 2 — Python venv + Homebrew + cliclick                         #
      # ================================================================== #
      - name: Install Dependencies (Python + Browser Tools)
        shell: bash
        run: |
          echo "===[$(date '+%H:%M:%S')] Installing Python UI Automation Dependencies ==="
          VENV_DIR="/tmp/uienv"
          PYTHON_BIN=""
          for candidate in python3.12 python3.11 python3.10 python3; do
            if command -v "$candidate" &>/dev/null; then
              PYTHON_BIN="$candidate"
              break
            fi
          done
          if [ -z "$PYTHON_BIN" ]; then
            echo "ERROR: No Python3 found on runner."
            exit 1
          fi
          echo "[$(date '+%H:%M:%S')] Using Python: $PYTHON_BIN ($($PYTHON_BIN --version 2>&1))"
          rm -rf "$VENV_DIR"
          "$PYTHON_BIN" -m venv "$VENV_DIR"
          source "$VENV_DIR/bin/activate"
          pip install --upgrade pip --quiet
          pip install pyobjc-core pyobjc-framework-Cocoa \
                      pyobjc-framework-ApplicationServices --quiet || true
          pip install atomacos --quiet || true
          pip install Pillow requests --quiet || true
          deactivate
          echo "UIENV_PYTHON=$VENV_DIR/bin/python3" >> "$GITHUB_ENV"
          echo "[$(date '+%H:%M:%S')] Python venv ready at $VENV_DIR"
          if ! command -v brew &>/dev/null; then
            echo "[$(date '+%H:%M:%S')] Installing Homebrew..."
            NONINTERACTIVE=1 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || true
            for bp in /opt/homebrew/bin /usr/local/bin; do
              if [ -x "$bp/brew" ]; then
                export PATH="$bp:$PATH"
                echo "PATH=$bp:$PATH" >> "$GITHUB_ENV"
                break
              fi
            done
          fi
          brew install cliclick --quiet || true
          CLICLICK_PATH=$(command -v cliclick || echo "not_found")
          echo "[$(date '+%H:%M:%S')] cliclick path: $CLICLICK_PATH"
          echo "CLICLICK_BIN=$CLICLICK_PATH" >> "$GITHUB_ENV"
          echo "[$(date '+%H:%M:%S')] All dependencies installed."

      # ================================================================== #
      # STEP 3 — Pre-Grant ALL TCC permissions upfront (CLI-first)         #
      # ================================================================== #
      - name: Pre-Grant TCC Permissions (CLI-first, comprehensive)
        shell: bash
        run: |
          echo "=== [$(date '+%H:%M:%S')] Pre-Granting TCC Permissions via SQLite (CLI) ==="
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          grant_tcc() {
            local SERVICE="$1"
            local CLIENT="$2"
            local CLIENT_TYPE="$3"
            sudo sqlite3 "$TCC_DB" \
              "INSERT OR REPLACE INTO access \
               (service, client, client_type, auth_value, auth_reason, auth_version, flags) \
               VALUES ('$SERVICE', '$CLIENT', $CLIENT_TYPE, 2, 4, 1, 0);" 2>/dev/null || true
          }
          grant_tcc kTCCServiceAccessibility com.apple.Terminal          0
          grant_tcc kTCCServiceAccessibility com.apple.systemevents      0
          grant_tcc kTCCServiceAccessibility com.google.Chrome           0
          grant_tcc kTCCServiceAccessibility /usr/bin/osascript          1
          grant_tcc kTCCServiceAccessibility /bin/bash                   1
          grant_tcc kTCCServiceAccessibility /usr/bin/python3            1
          grant_tcc kTCCServiceScreenCapture com.google.Chrome           0
          grant_tcc kTCCServiceScreenCapture com.apple.Terminal          0
          grant_tcc kTCCServiceScreenCapture me.getscreen.agent          0
          grant_tcc kTCCServiceScreenCapture com.getscreen.agent         0
          grant_tcc kTCCServiceScreenCapture com.getscreen.mac           0
          grant_tcc kTCCServiceScreenCapture me.getscreen.mac            0
          grant_tcc kTCCServiceScreenCapture me.getscreen.desktop        0
          grant_tcc kTCCServiceScreenCapture com.getscreen.desktop       0
          grant_tcc kTCCServiceLocalNetwork  com.google.Chrome           0
          grant_tcc kTCCServiceLocalNetwork  com.apple.Terminal          0
          grant_tcc kTCCServiceLocalNetwork  /usr/bin/osascript          1
          grant_tcc kTCCServiceLocalNetwork  me.getscreen.agent          0
          grant_tcc kTCCServiceLocalNetwork  com.getscreen.agent         0
          grant_tcc kTCCServiceLocalNetwork  com.getscreen.mac           0
          grant_tcc kTCCServiceLocalNetwork  me.getscreen.mac            0
          grant_tcc kTCCServiceLocalNetwork  me.getscreen.desktop        0
          grant_tcc kTCCServiceLocalNetwork  com.getscreen.desktop       0
          echo "[$(date '+%H:%M:%S')] --- Scanning for GitHub runner + compute-host process paths ---"
          for RUNNER_DIR in /Users/runner /home/runner /opt/hostedtoolcache /private/var/folders; do
            if [ -d "$RUNNER_DIR" ]; then
              for BIN_NAME in Runner.Worker Runner.Listener Runner.PluginHost run.sh; do
                FOUND_PATH=$(find "$RUNNER_DIR" -name "$BIN_NAME" -maxdepth 6 2>/dev/null | head -n 1 || true)
                if [ -n "$FOUND_PATH" ]; then
                  echo "[$(date '+%H:%M:%S')] Granting TCC to runner binary: $FOUND_PATH"
                  grant_tcc kTCCServiceLocalNetwork  "$FOUND_PATH" 1
                  grant_tcc kTCCServiceScreenCapture "$FOUND_PATH" 1
                  grant_tcc kTCCServiceAccessibility "$FOUND_PATH" 1
                fi
              done
            fi
          done
          ps aux 2>/dev/null | awk '{print $11}' | grep -iE "(runner|hosted|compute|agent)" | sort -u | while read -r PROC_PATH; do
            if [ -x "$PROC_PATH" ]; then
              echo "[$(date '+%H:%M:%S')] Granting TCC to live process: $PROC_PATH"
              grant_tcc kTCCServiceLocalNetwork  "$PROC_PATH" 1
              grant_tcc kTCCServiceScreenCapture "$PROC_PATH" 1
              grant_tcc kTCCServiceAccessibility "$PROC_PATH" 1
            fi
          done || true
          grant_tcc kTCCServiceCamera     com.google.Chrome 0
          grant_tcc kTCCServiceMicrophone com.google.Chrome 0
          echo "[$(date '+%H:%M:%S')] All TCC permissions pre-granted via CLI."
          sudo defaults write /Library/Preferences/com.apple.security \
            "SecAssessmentDisableUserApproval" -bool true 2>/dev/null || true
          CHROME_POLICY_DIR="/Library/Managed Preferences"
          sudo mkdir -p "$CHROME_POLICY_DIR"
          sudo /usr/libexec/PlistBuddy -c \
            "Add :AuthServerAllowlist string *" \
            "$CHROME_POLICY_DIR/com.google.Chrome.plist" 2>/dev/null || \
          sudo /usr/libexec/PlistBuddy -c \
            "Set :AuthServerAllowlist *" \
            "$CHROME_POLICY_DIR/com.google.Chrome.plist" 2>/dev/null || true
          sudo /usr/libexec/PlistBuddy -c \
            "Add :AuthNegotiateDelegateAllowlist string *" \
            "$CHROME_POLICY_DIR/com.google.Chrome.plist" 2>/dev/null || true
          sudo /usr/libexec/PlistBuddy -c \
            "Add :ProxyBypassList string <-loopback>" \
            "$CHROME_POLICY_DIR/com.google.Chrome.plist" 2>/dev/null || true
          echo "[$(date '+%H:%M:%S')] TCC and policy configuration complete."

      # ================================================================== #
      # STEP 4 — Getscreen.me install                                      #
      # ================================================================== #
      - name: Install, Bypass Security, and Start Getscreen.me (macOS)
        shell: bash
        run: |
          echo "===[$(date '+%H:%M:%S')] Installing Getscreen.me via DMG ==="
          DEVICE_NAME="${{ matrix.device }}"
          EMAIL="${{ matrix.email }}"
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          MAX_RETRIES=3
          RETRY=0
          SUCCESS=false
          while [ $RETRY -lt $MAX_RETRIES ]; do
            curl -L -o getscreen.dmg "https://getscreen.me/download/getscreen.dmg" \
              --retry 3 --retry-delay 5 --silent --show-error || true
            FILE_SIZE=$(stat -f%z getscreen.dmg 2>/dev/null || \
                        stat -c%s getscreen.dmg 2>/dev/null || echo 0)
            if [ -f "getscreen.dmg" ] && [ "$FILE_SIZE" -gt 102400 ]; then
              SUCCESS=true
              break
            fi
            echo "[$(date '+%H:%M:%S')] Download attempt $((RETRY+1)) failed (${FILE_SIZE}B), retrying..."
            sleep 5
            RETRY=$((RETRY+1))
          done
          if [ "$SUCCESS" = false ]; then
            echo "[$(date '+%H:%M:%S')] ERROR: Getscreen.me DMG failed to download. Skipping."
            exit 0
          fi
          echo "[$(date '+%H:%M:%S')] Downloaded getscreen.dmg (${FILE_SIZE}B). Mounting..."
          hdiutil attach getscreen.dmg -mountpoint /Volumes/getscreen -nobrowse -quiet || true
          APP_PATH=$(find /Volumes/getscreen -maxdepth 1 -name "*.app" | head -n 1 || true)
          if [ -z "$APP_PATH" ]; then
            echo "[$(date '+%H:%M:%S')] ERROR: No .app found inside Getscreen DMG."
            hdiutil detach /Volumes/getscreen -quiet -force || true
            exit 0
          fi
          APP_NAME=$(basename "$APP_PATH")
          echo "[$(date '+%H:%M:%S')] Found: $APP_NAME"
          sudo cp -R "$APP_PATH" /Applications/
          sudo xattr -dr com.apple.quarantine "/Applications/$APP_NAME" 2>/dev/null || true
          hdiutil detach /Volumes/getscreen -quiet -force || true
          APP_BUNDLE_ID=$(defaults read \
            "/Applications/$APP_NAME/Contents/Info.plist" \
            CFBundleIdentifier 2>/dev/null || echo "")
          echo "[$(date '+%H:%M:%S')] Bundle ID: ${APP_BUNDLE_ID:-<not found>}"
          if [ -n "$APP_BUNDLE_ID" ]; then
            for SVC in kTCCServiceScreenCapture kTCCServiceAccessibility kTCCServiceLocalNetwork; do
              sudo sqlite3 "$TCC_DB" \
                "INSERT OR REPLACE INTO access \
                 (service, client, client_type, auth_value, auth_reason, auth_version, flags) \
                 VALUES ('$SVC', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" 2>/dev/null || true
            done
            echo "[$(date '+%H:%M:%S')] TCC permissions granted for $APP_BUNDLE_ID"
          fi
          EXEC_NAME=$(defaults read \
            "/Applications/$APP_NAME/Contents/Info.plist" \
            CFBundleExecutable 2>/dev/null || echo "")
          EXEC_PATH="/Applications/$APP_NAME/Contents/MacOS/$EXEC_NAME"
          if [ ! -x "$EXEC_PATH" ]; then
            EXEC_PATH=$(find "/Applications/$APP_NAME/Contents/MacOS" \
              -maxdepth 1 -type f -perm +111 2>/dev/null | head -n 1 || true)
          fi
          if [ -n "$EXEC_PATH" ] && [ -x "$EXEC_PATH" ]; then
            for SVC in kTCCServiceScreenCapture kTCCServiceAccessibility kTCCServiceLocalNetwork; do
              sudo sqlite3 "$TCC_DB" \
                "INSERT OR REPLACE INTO access \
                 (service, client, client_type, auth_value, auth_reason, auth_version, flags) \
                 VALUES ('$SVC', '$EXEC_PATH', 1, 2, 4, 1, 0);" 2>/dev/null || true
            done
            echo "[$(date '+%H:%M:%S')] TCC path-based permissions granted for $EXEC_PATH"
          fi
          if [ -z "$EXEC_PATH" ] || [ ! -x "$EXEC_PATH" ]; then
            echo "[$(date '+%H:%M:%S')] ERROR: Getscreen executable not found."
            exit 0
          fi
          echo "[$(date '+%H:%M:%S')] Executable: $EXEC_PATH"
          sudo "$EXEC_PATH" -install 2>/dev/null || true
          sleep 2
          sudo "$EXEC_PATH" -register "$EMAIL" 2>/dev/null || true
          sleep 1
          sudo "$EXEC_PATH" -config \
            "name='$DEVICE_NAME' autostart=true nonadmin=true control=true disable_confirmation=true" \
            2>/dev/null || true
          sleep 1
          sudo "$EXEC_PATH" -start 2>/dev/null || true
          echo "[$(date '+%H:%M:%S')] Getscreen.me registered as '$DEVICE_NAME' and started."

      # ================================================================== #
      # STEP 4.5 — Quick popup dismissal (no heavy filesystem scan)        #
      # ================================================================== #
      - name: Pre-Dismiss System Popups (Fast)
        shell: bash
        run: |
          echo "=== [$(date '+%H:%M:%S')] Pre-dismissing system popups (fast) ==="
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          echo "[$(date '+%H:%M:%S')] Restarting TCC daemon to flush cache..."
          sudo launchctl kickstart -k system/com.apple.tccd 2>/dev/null || true
          sudo launchctl kickstart -k user/$(id -u)/com.apple.tccd 2>/dev/null || true
          sleep 2
          echo "[$(date '+%H:%M:%S')] Granting TCC to running processes only..."
          ps aux 2>/dev/null | awk '{print $11}' | sort -u | while read -r PROC_PATH; do
            if [ -x "$PROC_PATH" ] 2>/dev/null; then
              PROC_LOWER=$(echo "$PROC_PATH" | tr '[:upper:]' '[:lower:]')
              if echo "$PROC_LOWER" | grep -qE "(compute|hosted|runner|agent|github|actions)"; then
                echo "[$(date '+%H:%M:%S')]   Granting TCC to: $PROC_PATH"
                sudo sqlite3 "$TCC_DB" \
                  "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
                   VALUES('kTCCServiceLocalNetwork','$PROC_PATH',1,2,4,1,0);" 2>/dev/null || true
                sudo sqlite3 "$TCC_DB" \
                  "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
                   VALUES('kTCCServiceScreenCapture','$PROC_PATH',1,2,4,1,0);" 2>/dev/null || true
                sudo sqlite3 "$TCC_DB" \
                  "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
                   VALUES('kTCCServiceAccessibility','$PROC_PATH',1,2,4,1,0);" 2>/dev/null || true
              fi
            fi
          done || true
          echo "[$(date '+%H:%M:%S')] Resetting notification/preference daemons..."
          sudo killall -HUP cfprefsd 2>/dev/null || true
          sudo killall UserNotificationCenter 2>/dev/null || true
          sudo killall NotificationCenter 2>/dev/null || true
          sleep 1
          echo "[$(date '+%H:%M:%S')] Starting 15-second GUI popup dismisser..."
          cat > /tmp/early_popup_dismiss.applescript << 'ASEOF'
          set maxRuns to 30
          set runCount to 0
          repeat while runCount < maxRuns
            set runCount to runCount + 1
            try
              tell application "System Events"
                repeat with proc in (every process whose visible is true)
                  set pName to name of proc as string
                  if pName is not "Google Chrome" then
                    try
                      repeat with win in (every window of proc)
                        set winTitle to ""
                        set winDesc to ""
                        try
                          set winTitle to (title of win) as string
                        end try
                        try
                          set winDesc to (description of win) as string
                        end try
                        if winTitle & " " & winDesc contains "Allow" then
                          try
                            click button "Allow" of win
                          end try
                        end if
                      end repeat
                    end try
                  end if
                end repeat
              end tell
            end try
            delay 0.5
          end repeat
          ASEOF
          osascript /tmp/early_popup_dismiss.applescript > /tmp/early_dismiss.log 2>&1 &
          EARLY_DISMISS_PID=$!
          echo "[$(date '+%H:%M:%S')] GUI dismisser PID: $EARLY_DISMISS_PID (15s timeout)"
          wait $EARLY_DISMISS_PID 2>/dev/null || true
          echo "[$(date '+%H:%M:%S')] Step 4.5 complete — system ready for Chrome launch."

      # ================================================================== #
      # STEP 5 — Google Chrome                                             #
      # ================================================================== #
      - name: Install Google Chrome (Proxy-capable Browser)
        shell: bash
        run: |
          echo "=== [$(date '+%H:%M:%S')] Installing Google Chrome ==="
          CHROME_DMG="$HOME/Downloads/googlechrome.dmg"
          curl -fsSL \
            "https://dl.google.com/chrome/mac/universal/stable/GGRO/googlechrome.dmg" \
            -o "$CHROME_DMG" 2>/dev/null || \
          curl -fsSL \
            "https://dl.google.com/chrome/mac/stable/GGRO/googlechrome.dmg" \
            -o "$CHROME_DMG" 2>/dev/null || true
          FILE_SIZE=$(stat -f%z "$CHROME_DMG" 2>/dev/null || echo 0)
          if [ -f "$CHROME_DMG" ] && [ "$FILE_SIZE" -gt 1000000 ]; then
            hdiutil attach "$CHROME_DMG" -quiet -nobrowse \
              -mountpoint /Volumes/GoogleChrome || true
            if [ -d "/Volumes/GoogleChrome/Google Chrome.app" ]; then
              sudo cp -R "/Volumes/GoogleChrome/Google Chrome.app" /Applications/ || true
              sudo xattr -dr com.apple.quarantine \
                "/Applications/Google Chrome.app" 2>/dev/null || true
              hdiutil detach /Volumes/GoogleChrome -quiet || true
              echo "[$(date '+%H:%M:%S')] Google Chrome installed."
            else
              hdiutil detach /Volumes/GoogleChrome -quiet || true
              echo "[$(date '+%H:%M:%S')] WARNING: Chrome DMG mounted but .app not found."
            fi
          else
            echo "[$(date '+%H:%M:%S')] WARNING: Chrome DMG download failed ($FILE_SIZE B)."
          fi
          if [ -d "/Applications/Google Chrome.app" ]; then
            echo "CHROME_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "[$(date '+%H:%M:%S')] Chrome confirmed available."
          else
            echo "CHROME_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "[$(date '+%H:%M:%S')] Chrome unavailable — Safari will be used for direct-mode only."
          fi

      # ================================================================== #
      # STEP 6 — Download, Install & Automate Software (ROBUST)            #
      # ================================================================== #
      - name: Setup Auto-Downloader & Software Installation (macOS)
        shell: bash
        env:
          USE_PROXY:     ${{ matrix.use_proxy }}
          PROXY_USER:    ${{ matrix.proxy_user }}
          PROXY_PASS:    ${{ matrix.proxy_pass }}
          TARGET_URL:    ${{ matrix.target_url }}
          SOFTWARE_TYPE: ${{ matrix.software_type }}
          DMG_FILTER:    ${{ matrix.dmg_filter }}
        run: |
          echo "============================================================"
          echo " [$(date '+%H:%M:%S')] Zero-Touch Downloader & Installer (macOS)"
          echo " Category  : $SOFTWARE_TYPE"
          echo " Target URL: $TARGET_URL"
          if [ "$USE_PROXY" = "true" ]; then
            echo " Mode      : Proxy-enabled (ScrapeOps)"
            echo " Proxy User: $PROXY_USER"
          else
            echo " Mode      : Direct (no proxy)"
          fi
          echo "============================================================"

          DL_FOLDER="$HOME/Downloads"
          SENTINEL_PATH="/tmp/download_done.flag"
          TIMEOUT_SECS=360

          cat > /tmp/macos_handler.py << 'PYEOF'
          import time, sys, os, subprocess, random

          def log(msg):
              ts = time.strftime("%H:%M:%S")
              print(f"[{ts}] {msg}", flush=True)

          CHROME_WARMUP_SECS      = 20
          DL_WAIT_AFTER_PROXY     = 30   # increased to 30 seconds
          PROXY_RETRY_INTERVAL    = 2
          PROXY_MAX_ATTEMPTS      = 40

          def clipboard_set(text):
              try:
                  proc = subprocess.Popen(
                      ['pbcopy'], stdin=subprocess.PIPE,
                      stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL
                  )
                  proc.communicate(input=text.encode('utf-8'), timeout=5)
                  time.sleep(0.15)
                  return proc.returncode == 0
              except Exception as e:
                  log(f"[Clipboard] pbcopy error: {e}")
                  return False

          def clipboard_get():
              try:
                  result = subprocess.run(
                      ['pbpaste'], capture_output=True, text=True, timeout=5
                  )
                  return result.stdout
              except Exception:
                  return ""

          def clipboard_verify(expected, label="value"):
              actual = clipboard_get()
              if actual != expected:
                  log(f"[Clipboard] MISMATCH for {label}: got {actual[:30]!r}, retrying...")
                  clipboard_set(expected)
                  time.sleep(0.2)
                  return clipboard_get() == expected
              return True

          def run_as(script, silent=False, timeout=20):
              try:
                  r = subprocess.run(["osascript", "-e", script],
                      capture_output=True, text=True, timeout=timeout
                  )
                  if r.returncode != 0 and not silent:
                      log(f"[AppleScript] stderr: {r.stderr.strip()[:120]}")
                  return r.stdout.strip()
              except subprocess.TimeoutExpired:
                  if not silent:
                      log("[AppleScript] Timed out")
                  return ""
              except Exception as e:
                  if not silent:
                      log(f"[AppleScript] Exception: {e}")
                  return ""

          def cliclick(cmd):
              try:
                  result = subprocess.run(
                      ['cliclick', cmd],
                      capture_output=True, text=True, timeout=5
                  )
                  return result.returncode == 0
              except Exception as e:
                  log(f"[cliclick] Error running '{cmd}': {e}")
                  return False

          def press(key_name):
              key_map = {
                  "tab": 48, "return": 36, "space": 49,
                  "right": 124, "left": 123, "up": 126, "down": 125, "escape": 53
              }
              code = key_map.get(key_name.lower())
              if code:
                  run_as(f'tell application "System Events" to key code {code}', silent=True)

          def running_apps():
              r = run_as(
                  'tell application "System Events" to get name of every process '
                  'whose visible is true', silent=True)
              return[n.strip() for n in r.split(",") if n.strip()]

          def dismiss_compute_host_popup():
              TCC_DB = "/Library/Application Support/com.apple.TCC/TCC.db"
              try:
                  subprocess.run([
                      'sudo', 'sqlite3', TCC_DB,
                      "INSERT OR REPLACE INTO access "
                      "(service,client,client_type,auth_value,auth_reason,auth_version,flags) "
                      "VALUES('kTCCServiceLocalNetwork','com.google.Chrome',0,2,4,1,0);"
                  ], timeout=5, capture_output=True)
              except Exception:
                  pass

              result = run_as(r'''
          tell application "System Events"
            set dismissed to ""
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName is not "Google Chrome" then
                try
                  repeat with win in (every window of proc)
                    set wTitle to ""
                    set wDesc to ""
                    try
                      set wTitle to (title of win) as string
                    end try
                    try
                      set wDesc to (description of win) as string
                    end try
                    set combined to (wTitle & " " & wDesc) as string
                    if combined contains "local network" or ¬
                       combined contains "Local Network" or ¬
                       combined contains "hosted-compute" or ¬
                       combined contains "find devices" or ¬
                       combined contains "incoming network" or ¬
                       combined contains "would like to find" then
                      try
                        click button "Allow" of win
                        set dismissed to "allowed_in_" & pName
                      end try
                    end if
                  end repeat
                end try
              end if
            end repeat
            return dismissed
          end tell
          ''', silent=True)
              if result and result.strip():
                  log(f"[ComputeHostDismiss] GUI dismissed: {result.strip()}")
                  return True
              return False

          def dismiss_system_popups():
              result = run_as(r'''
          tell application "System Events"
            set popupClicked to ""
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName is not "Google Chrome" then
                try
                  repeat with win in (every window of proc)
                    set winTitle to ""
                    set winDesc to ""
                    try
                      set winTitle to (title of win) as string
                    end try
                    try
                      set winDesc to (description of win) as string
                    end try
                    set combinedText to (winTitle & " " & winDesc) as string
                    if pName contains "getscreen" or pName contains "Getscreen" then
                      try
                        if exists button "Allow" of win then
                          click button "Allow" of win
                          set popupClicked to "getscreen_allowed"
                        end if
                      end try
                    end if
                    if combinedText contains "local network" or ¬
                       combinedText contains "Local Network" or ¬
                       combinedText contains "hosted-compute" or ¬
                       combinedText contains "find devices" or ¬
                       combinedText contains "incoming network" or ¬
                       combinedText contains "Incoming Network" then
                      try
                        click button "Allow" of win
                        set popupClicked to "local_network_allowed_in_" & pName
                      end try
                    end if
                    if combinedText contains "screen and audio" or ¬
                       combinedText contains "bypass the system" or ¬
                       combinedText contains "window picker" or ¬
                       combinedText contains "Getscreen.me" then
                      try
                        click button "Allow" of win
                        set popupClicked to "getscreen_screen_allowed"
                      end try
                    end if
                    if combinedText does not contain "Accessibility" and ¬
                       combinedText does not contain "accessibility" then
                      try
                        if (exists button "Allow" of win) and ¬
                           (exists button "Don't Allow" of win) then
                          click button "Allow" of win
                          if popupClicked is "" then
                            set popupClicked to "generic_allowed_in_" & pName
                          end if
                        end if
                      end try
                    end if
                  end repeat
                end try
              end if
            end repeat
            return popupClicked
          end tell
          ''', silent=True)
              if result and result.strip():
                  log(f"[SystemPopup] Dismissed: {result.strip()}")
                  return True
              return False

          # ------------------------------------------------------------
          #  Scans ALL processes for the proxy auth dialog
          # ------------------------------------------------------------
          def get_proxy_dialog_info():
              result = run_as(r'''
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              try
                repeat with w in (every window of proc)
                  set fieldCount to (count of text field of w)
                  if fieldCount >= 2 then
                    set wTitle to ""
                    try
                      set wTitle to (title of w) as string
                    end try
                    if wTitle contains "Sign" or wTitle contains "proxy" or wTitle contains "Proxy" then
                      set f1pos to position of text field 1 of w
                      set f1sz  to size of text field 1 of w
                      set f1x to ((item 1 of f1pos) + (item 1 of f1sz) / 2) as integer
                      set f1y to ((item 2 of f1pos) + (item 2 of f1sz) / 2) as integer
                      set f2pos to position of text field 2 of w
                      set f2sz  to size of text field 2 of w
                      set f2x to ((item 1 of f2pos) + (item 1 of f2sz) / 2) as integer
                      set f2y to ((item 2 of f2pos) + (item 2 of f2sz) / 2) as integer
                      set btnx to f2x
                      set btny to f2y + 50
                      try
                        repeat with b in (every button of w)
                          set bname to ""
                          try
                            set bname to (name of b) as string
                          end try
                          if bname contains "Sign" or bname contains "OK" then
                            set bpos to position of b
                            set bsz  to size of b
                            set btnx to ((item 1 of bpos) + (item 1 of bsz) / 2) as integer
                            set btny to ((item 2 of bpos) + (item 2 of bsz) / 2) as integer
                          end if
                        end repeat
                      end try
                      return "found|" & f1x & "," & f1y & "|" & f2x & "," & f2y & "|" & btnx & "," & btny & "|" & pName
                    end if
                  end if
                end repeat
              end try
            end repeat
            return "none"
          end tell
          ''', silent=True)

              if not result or result == "none":
                  return None
              try:
                  parts = result.split("|")
                  dialog_type = parts[0]
                  f1x, f1y = map(int, parts[1].split(","))
                  f2x, f2y = map(int, parts[2].split(","))
                  btnx, btny = map(int, parts[3].split(","))
                  proc_name = parts[4] if len(parts) > 4 else "unknown"
                  return {
                      "type": dialog_type,
                      "f1": (f1x, f1y),
                      "f2": (f2x, f2y),
                      "btn": (btnx, btny),
                      "process": proc_name
                  }
              except Exception as e:
                  log(f"[DialogInfo] Parse error: {e}, raw={result[:120]}")
                  return None

          # ------------------------------------------------------------
          #  fill_proxy_auth with keyboard fallback
          # ------------------------------------------------------------
          def fill_proxy_auth(user, pwd):
              global PROXY_RETRY_INTERVAL
              info = get_proxy_dialog_info()

              if info is None:
                  log("[ProxyAuth] No dialog detected, attempting keyboard-only fallback")
                  run_as('tell application "Google Chrome" to activate', silent=True)
                  time.sleep(1)
                  clipboard_set(user)
                  clipboard_verify(user, "username")
                  run_as('tell application "System Events" to keystroke "a" using command down', silent=True)
                  time.sleep(0.15)
                  run_as('tell application "System Events" to keystroke "v" using command down', silent=True)
                  time.sleep(0.3)
                  press("tab"); time.sleep(0.2)
                  clipboard_set(pwd)
                  clipboard_verify(pwd, "password")
                  run_as('tell application "System Events" to keystroke "a" using command down', silent=True)
                  time.sleep(0.15)
                  run_as('tell application "System Events" to keystroke "v" using command down', silent=True)
                  time.sleep(0.3)
                  press("return"); time.sleep(0.3)
                  press("return")
                  log("[ProxyAuth] Keyboard fallback executed")
                  return "keyboard_fallback"

              log(f"[ProxyAuth] Dialog found in process={info['process']}")

              def _click_sign_in():
                  r = run_as(r'''
          tell application "System Events"
            tell process "''' + info['process'] + '''"
              set frontmost to true
              try
                click button "Sign In" of window 1
                return "clicked_sign_in"
              end try
              try
                click button "Sign in" of window 1
                return "clicked_sign_in_lc"
              end try
              try
                click button "OK" of window 1
                return "clicked_ok"
              end try
              return "no_button"
            end tell
          end tell
          ''', silent=False)
                  if "no_button" not in (r or ""):
                      return r
                  btnx, btny = info["btn"]
                  cliclick(f'c:{btnx},{btny}')
                  time.sleep(0.3)
                  if not get_proxy_dialog_info():
                      return "cliclick_sign_in"
                  for _ in range(2):
                      press("tab"); time.sleep(0.15)
                  press("space"); time.sleep(0.2)
                  press("return"); time.sleep(0.2)
                  run_as('tell application "System Events" to key code 36', silent=True)
                  return "keyboard_sign_in"

              run_as(f'tell application "System Events" to tell process "{info["process"]}" to set frontmost to true', silent=True)
              time.sleep(0.4)

              f1x, f1y = info["f1"]
              if not cliclick(f'c:{f1x},{f1y}'):
                  run_as(f'tell application "System Events" to click text field 1 of window 1 of process "{info["process"]}"', silent=True)
              time.sleep(0.3)
              clipboard_set(user)
              clipboard_verify(user, "username")
              run_as('tell application "System Events" to keystroke "a" using command down', silent=True)
              time.sleep(0.15)
              run_as('tell application "System Events" to keystroke "v" using command down', silent=True)
              time.sleep(0.3)

              f2x, f2y = info["f2"]
              press("tab"); time.sleep(0.2)
              if not cliclick(f'c:{f2x},{f2y}'):
                  run_as(f'tell application "System Events" to click text field 2 of window 1 of process "{info["process"]}"', silent=True)
              time.sleep(0.3)
              clipboard_set(pwd)
              clipboard_verify(pwd, "password")
              run_as('tell application "System Events" to keystroke "a" using command down', silent=True)
              time.sleep(0.15)
              run_as('tell application "System Events" to keystroke "v" using command down', silent=True)
              time.sleep(0.3)

              result = _click_sign_in()
              log(f"[ProxyAuth] Sign In result: {result}")
              time.sleep(0.5)
              return result if result else "submitted"

          # ------------------------------------------------------------
          #  DOWNLOAD BUTTON CLICK – 3 Tab + Enter
          # ------------------------------------------------------------
          def click_dl_button(sw_type):
              log("[DLButton] Activating Chrome and giving page time to settle...")
              run_as('tell application "Google Chrome" to activate', silent=True)
              time.sleep(5)
              for i in range(3):
                  press("tab")
                  log(f"[DLButton] Tab {i+1}/3 - waiting 5s...")
                  time.sleep(5)
              press("return")
              log("[DLButton] Pressed Enter after 3 Tabs")
              time.sleep(1)
              run_as('tell application "Google Chrome" to execute active tab of front window javascript "if(document.activeElement) document.activeElement.click()"', silent=True)
              return "tab3_enter"

          def accept_cookie():
              for b in["Accept all", "Accept All", "Accept Cookies",
                        "Allow all", "Accepter tout", "I agree", "Got it"]:
                  r = run_as(f'''
          tell application "System Events"
            tell process "Google Chrome"
              try
                click button "{b}" of window 1
                return "clicked"
              on error
              end try
            end tell
          end tell''', silent=True)
                  if r == "clicked":
                      log(f"[Cookie] Accepted with: '{b}'")
                      return True
              return False

          def wait_for_app_launch(app_name, timeout=120):
              log(f"[LaunchDetect] Waiting for '{app_name}' to launch (up to {timeout}s)...")
              start = time.time()
              while time.time() - start < timeout:
                  apps = running_apps()
                  if any(app_name.lower() in a.lower() for a in apps):
                      log(f"[LaunchDetect] ✓ '{app_name}' is running!")
                      time.sleep(2)
                      return True
                  elapsed = int(time.time() - start)
                  if elapsed % 15 == 0:
                      log(f"[LaunchDetect] Still waiting for '{app_name}'... ({elapsed}s elapsed)")
                  time.sleep(1)
              log(f"[LaunchDetect] '{app_name}' did not launch within {timeout}s.")
              return False

          def click_accept_and_install(app_name):
              log(f"[{app_name}] Searching for Accept/Install button...")
              script = f'''
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName contains "{app_name}" or pName contains "Opera" then
                try
                  repeat with win in (every window of proc)
                    try
                      if exists button "Accept and Install" of win then
                        click button "Accept and Install" of win
                        return "clicked_accept_and_install"
                      end if
                    end try
                    try
                      if exists button "Accept & Install" of win then
                        click button "Accept & Install" of win
                        return "clicked_accept_and_install"
                      end if
                    end try
                    try
                      if exists button "Accept" of win then
                        click button "Accept" of win
                        return "clicked_accept"
                      end if
                    end try
                    try
                      if exists button "Install" of win then
                        click button "Install" of win
                        return "clicked_install"
                      end if
                    end try
                  end repeat
                end try
              end if
            end repeat
            return "not_found"
          end tell'''
              result = run_as(script, silent=True)
              log(f"[{app_name}] Button click result: {result}")
              return result

          def opera_gx_flow():
              if not wait_for_app_launch("Opera GX", timeout=120):
                  return
              log("[Opera GX] App launched. Dismissing popups for 10s...")
              t0 = time.time()
              while time.time() - t0 < 10:
                  dismiss_system_popups()
                  time.sleep(0.5)
              log("[Opera GX] Attempting 'Accept and Install' button click...")
              result = click_accept_and_install("Opera GX")
              if result == "not_found":
                  log("[Opera GX] Button not found via UI — Tab+Enter fallback...")
                  for _ in range(3):
                      press("tab"); time.sleep(0.5)
                  press("return")
              log("[Opera GX] Waiting 30s for next screen...")
              time.sleep(30)
              log("[Opera GX] Pressing Tab x4 then Enter x8...")
              for _ in range(4):
                  press("tab"); time.sleep(0.5)
              for i in range(8):
                  press("return")
                  d = random.uniform(1.0, 2.0)
                  log(f"[Opera GX] ENTER {i+1}/8 ({d:.2f}s delay)")
                  time.sleep(d)
              time.sleep(5)
              tab_count = random.randint(6, 14)
              log(f"[Opera GX] Tab x{tab_count} then final Enter...")
              for _ in range(tab_count):
                  press("tab"); time.sleep(0.5)
              press("return")
              log("[Opera GX] Setup complete.")

          def opera_one_flow():
              # Wait specifically for the Opera installer process
              if not wait_for_app_launch("Opera Installer", timeout=120):
                  if not wait_for_app_launch("Opera", timeout=120):
                      return
              log("[Opera One] App launched. Dismissing popups for 10s (aggressive)...")
              t0 = time.time()
              while time.time() - t0 < 10:
                  dismiss_system_popups()
                  dismiss_compute_host_popup()
                  time.sleep(0.5)
              log("[Opera One] Attempting 'Accept and Install' button click...")
              result = click_accept_and_install("Opera")
              if result == "not_found":
                  log("[Opera One] Button not found via UI — Tab+Enter fallback...")
                  for _ in range(3):
                      press("tab"); time.sleep(0.5)
                  press("return")
              log("[Opera One] Waiting 30s for next screen...")
              time.sleep(30)

              # Opera One specific post-install sequence
              log("[Opera One] Pressing Enter...")
              press("return")
              time.sleep(random.uniform(1, 2))
              log("[Opera One] Pressing Left Arrow 10 times with 1-2s delays")
              for i in range(10):
                  press("left")
                  d = random.uniform(1, 2)
                  log(f"[Opera One] Left Arrow {i+1}/10 ({d:.2f}s delay)")
                  time.sleep(d)
              log("[Opera One] Pressing Enter...")
              press("return")
              time.sleep(random.uniform(1, 2))
              log("[Opera One] Waiting 5s...")
              time.sleep(5)
              log("[Opera One] Pressing Tab then Enter...")
              press("tab")
              time.sleep(random.uniform(0.5, 1))
              press("return")
              time.sleep(random.uniform(1, 2))
              tab_count = random.randint(4, 10)
              log(f"[Opera One] Pressing Tab {tab_count} times randomly then Enter...")
              for _ in range(tab_count):
                  press("tab")
                  d = random.uniform(1, 2)
                  time.sleep(d)
              press("return")
              log("[Opera One] Setup complete.")

          def close_chrome():
              run_as('tell application "Google Chrome" to quit', silent=True)
              log("[Chrome] Quit signal sent.")

          def handle(user, pwd, sw_type, use_proxy, timeout=420):
              global PROXY_RETRY_INTERVAL
              t0 = time.time()
              sentinel = "/tmp/download_done.flag"

              chrome_first_seen  = None
              proxy_done         = False
              proxy_done_time    = None
              dl_clicked         = False
              chrome_closed      = False
              setup_done         = False
              op_launch_t        = None

              proxy_fill_attempts = 0
              proxy_last_try      = 0

              last_popup_dismiss  = 0
              last_cookie_try     = 0
              last_dl_try         = 0

              log(f"[Handler] ===== HANDLER STARTED =====")
              log(f"[Handler] type={sw_type} | proxy={use_proxy}")
              if use_proxy:
                  log(f"[Handler] Proxy user : {user}")
                  log(f"[Handler] Proxy pass : {pwd[:4]}...{pwd[-4:] if len(pwd)>8 else '****'}")
                  clipboard_set(user)
                  log("[Handler] Username pre-loaded to clipboard.")

              while time.time() - t0 < timeout:
                  try:
                      elapsed = int(time.time() - t0)
                      apps    = running_apps()
                      chrome  = "Google Chrome" in apps
                      op_gx   = any("Opera GX" in a for a in apps)
                      op_one  = any(
                          ("Opera" in a and "Opera GX" not in a) or
                          "Opera Installer" in a or "Opera Setup" in a
                          for a in apps
                      )

                      if chrome and chrome_first_seen is None:
                          chrome_first_seen = time.time()
                          log(f"[Handler] *** Chrome detected at t={elapsed}s ***")

                      warmup_done = (
                          chrome_first_seen is not None and
                          (time.time() - chrome_first_seen) >= CHROME_WARMUP_SECS
                      )

                      if chrome_first_seen and not warmup_done:
                          dismiss_compute_host_popup()
                          dismiss_system_popups()
                          last_popup_dismiss = time.time()
                          time.sleep(0.5)
                          continue

                      if time.time() - last_popup_dismiss > 3:
                          dismiss_system_popups()
                          last_popup_dismiss = time.time()

                      if chrome and time.time() - last_cookie_try > 12:
                          accept_cookie()
                          last_cookie_try = time.time()

                      if (use_proxy and warmup_done and chrome
                              and not proxy_done
                              and proxy_fill_attempts < PROXY_MAX_ATTEMPTS
                              and time.time() - proxy_last_try > PROXY_RETRY_INTERVAL):

                          proxy_last_try = time.time()
                          proxy_fill_attempts += 1
                          log(f"[ProxyAuth] === Attempt #{proxy_fill_attempts}/{PROXY_MAX_ATTEMPTS} (t={elapsed}s) ===")

                          result = fill_proxy_auth(user, pwd)
                          log(f"[ProxyAuth] Result: {result}")

                          if result in ("no_dialog", "sheet_loading"):
                              log(f"[ProxyAuth] Dialog not ready yet ({result}) — will retry in {PROXY_RETRY_INTERVAL}s")
                              PROXY_RETRY_INTERVAL = 2
                          elif "sign" in result.lower() or "ok" in result.lower() or "return" in result.lower() or "submitted" in result.lower() or "keyboard" in result.lower() or "cliclick" in result.lower():
                              log("[ProxyAuth] ✓ Proxy auth appears complete!")
                              proxy_done      = True
                              proxy_done_time = time.time()
                              log(f"[ProxyAuth] Will wait {DL_WAIT_AFTER_PROXY}s before clicking download button...")
                              PROXY_RETRY_INTERVAL = 999
                          else:
                              log(f"[ProxyAuth] Uncertain result — retrying in 2s")
                              PROXY_RETRY_INTERVAL = 2

                      if chrome and not dl_clicked:
                          if use_proxy:
                              if not proxy_done:
                                  pass
                              elif (time.time() - proxy_done_time) < DL_WAIT_AFTER_PROXY:
                                  wait_left = int(DL_WAIT_AFTER_PROXY - (time.time() - proxy_done_time))
                                  if wait_left % 5 == 0:
                                      log(f"[Handler] Waiting {wait_left}s more before download button click...")
                              else:
                                  if time.time() - last_dl_try > 10:
                                      last_dl_try = time.time()
                                      log(f"[DLButton] === Attempting download button click (t={elapsed}s) ===")
                                      result = click_dl_button(sw_type)
                                      if result != "not_found":
                                          dl_clicked = True
                                          log(f"[DLButton] ✓ Download triggered! ({result})")
                                      else:
                                          log(f"[DLButton] Not found yet — retrying in 10s")
                          else:
                              if chrome_first_seen and (time.time() - chrome_first_seen) > 5:
                                  if time.time() - last_dl_try > 10:
                                      last_dl_try = time.time()
                                      log(f"[DLButton] === Attempting download button click (t={elapsed}s, no-proxy mode) ===")
                                      result = click_dl_button(sw_type)
                                      if result != "not_found":
                                          dl_clicked = True
                                          log(f"[DLButton] ✓ Download triggered! ({result})")

                      if not chrome_closed and os.path.exists(sentinel):
                          log("[Handler] ✓ Download sentinel detected — closing Chrome...")
                          close_chrome()
                          time.sleep(2)
                          chrome_closed = True

                      if sw_type in ["opera_gx", "dynamic_opera", "ad_mvn"] and op_gx and not setup_done:
                          if not op_launch_t:
                              op_launch_t = time.time()
                              log("[Handler] *** Opera GX detected — starting installer sequence in 5s ***")
                              run_as('tell application "Opera GX" to activate', silent=True)
                          if time.time() - op_launch_t > 5:
                              opera_gx_flow()
                              setup_done = True
                              break

                      if sw_type == "opera_one" and op_one and not setup_done:
                          if not op_launch_t:
                              op_launch_t = time.time()
                              log("[Handler] *** Opera detected — starting installer sequence in 5s ***")
                              # Activate the installer if not frontmost
                              run_as('tell application "Opera Installer" to activate', silent=True)
                              time.sleep(1)
                          if time.time() - op_launch_t > 5:
                              opera_one_flow()
                              setup_done = True
                              break

                      if elapsed % 30 == 0 and elapsed > 0:
                          log(f"[Handler] --- Status t={elapsed}s | chrome={chrome} | warmup={warmup_done} | proxy_done={proxy_done} | dl_clicked={dl_clicked} | sentinel={os.path.exists(sentinel)} ---")

                  except Exception as e:
                      log(f"[Handler] Exception in main loop: {e}")

                  time.sleep(1)

              if setup_done:
                  log("[Handler] ===== HANDLER FINISHED SUCCESSFULLY =====")
              else:
                  log(f"[Handler] ===== HANDLER TIMEOUT after {int(time.time()-t0)}s =====")
                  log(f"[Handler] Final state: proxy_done={proxy_done}, dl_clicked={dl_clicked}, sentinel={os.path.exists('/tmp/download_done.flag')}")

          if __name__ == "__main__":
              u  = sys.argv[1] if len(sys.argv) > 1 else ""
              p  = sys.argv[2] if len(sys.argv) > 2 else ""
              sw = sys.argv[3] if len(sys.argv) > 3 else "opera_gx"
              px = (sys.argv[4].lower() == "true") if len(sys.argv) > 4 else False
              handle(u, p, sw, px)
          PYEOF

          # ------------------------------------------------------------
          #  Shell helper functions & watcher (unchanged)
          # ------------------------------------------------------------
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          grant_tcc() {
            sudo sqlite3 "$TCC_DB" \
              "INSERT OR REPLACE INTO access \
               (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
               VALUES('$1','$2',$3,2,4,1,0);" 2>/dev/null || true
          }
          grant_tcc kTCCServiceAccessibility com.apple.Terminal          0
          grant_tcc kTCCServiceAccessibility com.apple.systemevents      0
          grant_tcc kTCCServiceAccessibility com.google.Chrome           0
          grant_tcc kTCCServiceAccessibility /usr/bin/osascript          1
          grant_tcc kTCCServiceLocalNetwork  com.google.Chrome           0
          grant_tcc kTCCServiceLocalNetwork  com.apple.Terminal          0
          grant_tcc kTCCServiceLocalNetwork  /usr/bin/osascript          1
          echo "[$(date '+%H:%M:%S')] TCC grants refreshed for automation tools."

          cat > /tmp/popup_dismisser.sh << 'DISMISSEOF'
          #!/bin/bash
          COUNT=0
          while true; do
            COUNT=$((COUNT+1))
            osascript << 'ASEOF' 2>/dev/null || true
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName is not "Google Chrome" then
                try
                  repeat with win in (every window of proc)
                    set wT to ""
                    set wD to ""
                    try
                      set wT to (title of win) as string
                    end try
                    try
                      set wD to (description of win) as string
                    end try
                    set combined to (wT & " " & wD) as string
                    if pName contains "etscreen" then
                      try
                        if exists button "Allow" of win then
                          click button "Allow" of win
                        end if
                      end try
                    end if
                    if combined contains "local network" or ¬
                       combined contains "Local Network" or ¬
                       combined contains "hosted-compute" or ¬
                       combined contains "find devices" or ¬
                       combined contains "incoming network" or ¬
                       combined contains "would like to find" then
                      try
                        click button "Allow" of win
                      end try
                    end if
                    if combined contains "screen and audio" or ¬
                       combined contains "bypass the system" or ¬
                       combined contains "window picker" then
                      try
                        click button "Allow" of win
                      end try
                    end if
                    if combined does not contain "Accessibility" and ¬
                       combined does not contain "accessibility" then
                      try
                        if (exists button "Allow" of win) and (exists button "Don't Allow" of win) then
                          click button "Allow" of win
                        end if
                      end try
                    end if
                  end repeat
                end try
              end if
            end repeat
          end tell
          ASEOF
            sleep 2
          done
          DISMISSEOF
          chmod +x /tmp/popup_dismisser.sh
          /tmp/popup_dismisser.sh > /tmp/popup_dismisser.log 2>&1 &
          DISMISSER_PID=$!
          echo "[$(date '+%H:%M:%S')] Background popup dismisser started (PID $DISMISSER_PID)"
          echo "Waiting 5s before Chrome launch..."
          sleep 5

          HANDLER_PYTHON="${UIENV_PYTHON:-python3}"
          echo "[$(date '+%H:%M:%S')] Starting UI automation handler (PID TBD)..."
          echo "[$(date '+%H:%M:%S')] Handler: proxy=$USE_PROXY | sw_type=$SOFTWARE_TYPE"
          "$HANDLER_PYTHON" -u /tmp/macos_handler.py \
            "$PROXY_USER" "$PROXY_PASS" "$SOFTWARE_TYPE" "$USE_PROXY" \
            2>&1 | tee /tmp/handler_output.log &
          HANDLER_PID=$!
          echo "[$(date '+%H:%M:%S')] Handler started (PID $HANDLER_PID)"

          touch /tmp/watcher_start_marker
          (
            DEADLINE=$(($(date +%s) + TIMEOUT_SECS))
            INSTALLED=false
            echo "[$(date '+%H:%M:%S')] [Watcher] Started. Monitoring $DL_FOLDER for downloads..."
            LAST_STATUS=$(($(date +%s)))
            while [ "$INSTALLED" = false ] && [ "$(date +%s)" -lt "$DEADLINE" ]; do
              NOW=$(date +%s)
              if [ $((NOW - LAST_STATUS)) -ge 20 ]; then
                echo "[$(date '+%H:%M:%S')] [Watcher] Still monitoring... ($(( DEADLINE - NOW ))s remaining)"
                LAST_STATUS=$NOW
              fi
              FILE=$(find "$DL_FOLDER" -maxdepth 1 \
                     \( -name "*.dmg" -o -name "*.zip" -o -name "*.pkg" \) \
                     ! -name "*.download" ! -name "*.crdownload" ! -name "*.part" \
                     -newer /tmp/watcher_start_marker 2>/dev/null | head -n 1 || true)
              if [ -z "$FILE" ]; then
                FILE=$(find "$DL_FOLDER" -maxdepth 1 -type d -name "*.app" \
                       -newer /tmp/watcher_start_marker 2>/dev/null | head -n 1 || true)
              fi
              if [ -n "$FILE" ]; then
                echo "[$(date '+%H:%M:%S')] [Watcher] ✓ Download detected: $FILE"
                touch "$SENTINEL_PATH"
                BASENAME=$(basename "$FILE")
                EXT="${BASENAME##*.}"
                if [ "$EXT" != "app" ]; then
                  echo "[$(date '+%H:%M:%S')] [Watcher] Waiting for download to complete..."
                  PREV=0
                  for i in $(seq 1 30); do
                    SZ=$(stat -f%z "$FILE" 2>/dev/null || \
                         stat -c%s "$FILE" 2>/dev/null || echo 0)
                    if [ "$SZ" = "$PREV" ] && [ "$SZ" -gt 500000 ]; then
                      echo "[$(date '+%H:%M:%S')] [Watcher] File stable at ${SZ}B"
                      break
                    fi
                    echo "[$(date '+%H:%M:%S')] [Watcher] Size=${SZ}B (try $i/30)..."
                    PREV=$SZ; sleep 2
                  done
                else
                  sleep 5
                fi
                xattr -dr com.apple.quarantine "$FILE" 2>/dev/null || true
                echo "[$(date '+%H:%M:%S')][Watcher] 4s cleanup delay..."
                sleep 4
                INSTALLED_APP_NAME=""
                if [ "$EXT" = "dmg" ]; then
                  echo "[$(date '+%H:%M:%S')] [Installer] Mounting DMG: $FILE"
                  MNT=$(hdiutil attach "$FILE" -nobrowse -quiet 2>/dev/null \
                        | awk '/\/Volumes\// {print $NF}' | head -n 1 || true)
                  if [ -n "$MNT" ]; then
                    APP_SRC=$(find "$MNT" -maxdepth 2 -name "*.app" | head -n 1 || true)
                    if [ -n "$APP_SRC" ]; then
                      AN=$(basename "$APP_SRC")
                      sudo cp -R "$APP_SRC" /Applications/ || true
                      sudo xattr -dr com.apple.quarantine "/Applications/$AN" 2>/dev/null || true
                      echo "[$(date '+%H:%M:%S')] [Installer] ✓ $AN installed from DMG."
                      INSTALLED_APP_NAME="$AN"
                    else
                      echo "[$(date '+%H:%M:%S')] [Installer] WARNING: No .app in DMG."
                    fi
                    hdiutil detach "$MNT" -quiet || true
                  else
                    echo "[$(date '+%H:%M:%S')] [Installer] ERROR: DMG mount failed."
                  fi
                elif [ "$EXT" = "zip" ]; then
                  echo "[$(date '+%H:%M:%S')] [Installer] Extracting ZIP: $FILE"
                  EXTRACT_DIR="${DL_FOLDER}/extracted_$(date +%s)"
                  mkdir -p "$EXTRACT_DIR"
                  unzip -q "$FILE" -d "$EXTRACT_DIR" 2>/dev/null || \
                    ditto -xk "$FILE" "$EXTRACT_DIR" 2>/dev/null || true
                  find "$EXTRACT_DIR" -name "__MACOSX" -exec rm -rf {} + 2>/dev/null || true
                  APP_IN_ZIP=$(find "$EXTRACT_DIR" -maxdepth 3 -name "*.app" ! -path "*/__MACOSX/*" | head -n 1 || true)
                  if [ -n "$APP_IN_ZIP" ]; then
                    AN=$(basename "$APP_IN_ZIP")
                    sudo cp -R "$APP_IN_ZIP" /Applications/ || true
                    sudo xattr -dr com.apple.quarantine "/Applications/$AN" 2>/dev/null || true
                    sudo codesign --force --deep --sign - "/Applications/$AN" 2>/dev/null || true
                    echo "[$(date '+%H:%M:%S')] [Installer] ✓ $AN installed from ZIP."
                    INSTALLED_APP_NAME="$AN"
                    rm -rf "$EXTRACT_DIR" 2>/dev/null || true
                  else
                    echo "[$(date '+%H:%M:%S')] [Installer] WARNING: No .app in ZIP."
                  fi
                elif [ "$EXT" = "pkg" ]; then
                  echo "[$(date '+%H:%M:%S')][Installer] Installing PKG: $FILE"
                  sudo installer -pkg "$FILE" -target / -verboseR || true
                elif [ "$EXT" = "app" ]; then
                  echo "[$(date '+%H:%M:%S')] [Installer] Direct .app: $BASENAME"
                  sudo cp -R "$FILE" /Applications/ || true
                  sudo xattr -dr com.apple.quarantine "/Applications/$BASENAME" 2>/dev/null || true
                  sudo codesign --force --deep --sign - "/Applications/$BASENAME" 2>/dev/null || true
                  INSTALLED_APP_NAME="$BASENAME"
                fi
                ACTUAL="$SOFTWARE_TYPE"
                if [ "$ACTUAL" = "dynamic_opera" ] || [ "$ACTUAL" = "ad_mvn" ]; then
                  if echo "$INSTALLED_APP_NAME$BASENAME" | grep -qi "gx"; then
                    ACTUAL="opera_gx"
                  else
                    ACTUAL="opera_one"
                  fi
                fi
                echo "[$(date '+%H:%M:%S')] [Watcher] Determined app type: $ACTUAL"
                echo "[$(date '+%H:%M:%S')] [Watcher] Quitting Chrome..."
                osascript -e 'tell application "Google Chrome" to quit' >/dev/null 2>&1 || true
                sleep 2
                if [ "$ACTUAL" = "opera_gx" ]; then
                  SEARCH_PATHS=(
                    "/Applications/$INSTALLED_APP_NAME"
                    "/Applications/Opera GX.app"
                    "$HOME/Applications/Opera GX.app"
                  )
                else
                  SEARCH_PATHS=(
                    "/Applications/$INSTALLED_APP_NAME"
                    "/Applications/Opera.app"
                    "$HOME/Applications/Opera.app"
                  )
                fi
                echo "[$(date '+%H:%M:%S')] [Watcher] Waiting for app to appear on disk..."
                LAUNCHED=false
                for i in $(seq 1 60); do
                  for P in "${SEARCH_PATHS[@]}"; do
                    if [ -d "$P" ]; then
                      sleep 3
                      echo "[$(date '+%H:%M:%S')] [Watcher] Launching: $P"
                      open "$P" || true
                      sleep 5
                      LAUNCHED=true
                      break 2
                    fi
                  done
                  sleep 2
                done
                if [ "$LAUNCHED" = false ]; then
                  FOUND=$(find /Applications "$HOME/Applications" -maxdepth 2 -name "Opera*.app" 2>/dev/null | head -n 1 || true)
                  if [ -n "$FOUND" ]; then
                    echo "[$(date '+%H:%M:%S')] [Watcher] Fallback launch: $FOUND"
                    open "$FOUND" || true
                  fi
                fi
                INSTALLED=true
                echo "[$(date '+%H:%M:%S')] [Watcher] ✓ Install + launch sequence complete."
              else
                sleep 5
              fi
            done
            echo "[$(date '+%H:%M:%S')] [Watcher] Exiting."
          ) &
          WATCHER_PID=$!
          echo "[$(date '+%H:%M:%S')] Watcher started (PID $WATCHER_PID)"

          CHROME_BIN="/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
          CHROME_FLAGS=(
            --no-first-run
            --no-default-browser-check
            --disable-sync
            --disable-translate
            --disable-infobars
            --disable-notifications
            --disable-background-networking
            --disable-client-side-phishing-detection
            --safebrowsing-disable-download-protection
            --disable-features=SafeBrowsingEnhancedProtection,MediaRouter,DialMediaRouteProvider
            --disable-extensions
            --disable-default-apps
            --password-store=basic
            --use-mock-keychain
          )

          if [ "$USE_PROXY" = "true" ]; then
            PROXY_SRV="residential-proxy.scrapeops.io:8181"
            echo "[$(date '+%H:%M:%S')] Launching Chrome WITH proxy → $TARGET_URL"
            echo "[$(date '+%H:%M:%S')] Proxy server: $PROXY_SRV"
            if [ -f "$CHROME_BIN" ]; then
              "$CHROME_BIN" \
                "${CHROME_FLAGS[@]}" \
                --proxy-server="http://$PROXY_SRV" \
                "$TARGET_URL" &
              CHROME_PID=$!
              echo "[$(date '+%H:%M:%S')] Chrome launched (PID $CHROME_PID)"
            else
              echo "[$(date '+%H:%M:%S')] ERROR: Chrome binary not found at $CHROME_BIN"
              exit 1
            fi
          else
            echo "[$(date '+%H:%M:%S')] Launching Chrome DIRECT (no proxy) → $TARGET_URL"
            if [ -f "$CHROME_BIN" ]; then
              "$CHROME_BIN" \
                "${CHROME_FLAGS[@]}" \
                "$TARGET_URL" &
              CHROME_PID=$!
              echo "[$(date '+%H:%M:%S')] Chrome launched (PID $CHROME_PID)"
            else
              echo "[$(date '+%H:%M:%S')] Chrome not found — Safari fallback."
              open -a Safari "$TARGET_URL" || true
            fi
          fi

          echo "[$(date '+%H:%M:%S')] Chrome launch complete. Handler automation is running."
          echo "[$(date '+%H:%M:%S')] Monitoring handler output in real time below:"
          echo "------------------------------------------------------------"

          HANDLER_TIMEOUT=600
          POLL_START=$(date +%s)
          while kill -0 $HANDLER_PID 2>/dev/null; do
            ELAPSED=$(($(date +%s) - POLL_START))
            if [ $ELAPSED -gt $HANDLER_TIMEOUT ]; then
              echo "[$(date '+%H:%M:%S')] Handler timeout (${ELAPSED}s) — killing."
              kill $HANDLER_PID 2>/dev/null || true
              break
            fi
            sleep 5
          done

          echo "------------------------------------------------------------"
          echo "[$(date '+%H:%M:%S')] Handler process finished."
          kill $WATCHER_PID   2>/dev/null || true
          kill $DISMISSER_PID 2>/dev/null || true
          echo "[$(date '+%H:%M:%S')] === Installation workflow complete ==="

      # ================================================================== #
      # STEP 7 — Keep runner alive                                         #
      # ================================================================== #
      - name: Keep Runner Alive
        if: always()
        shell: bash
        run: |
          echo "[$(date '+%H:%M:%S')] Session active. Runner stays online until job timeout."
          sleep 360
