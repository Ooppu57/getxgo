              log("[Opera One] STEP 4: Waiting 30 seconds for Opera One to install (dismissing popups)...")
              for s in range(30):
                  dismiss_compute_host_popup()
                  dismiss_system_popups()
                  if s % 10 == 0 and s > 0:
                      log(f"[Opera One] STEP 4: {s}/30 seconds elapsed...")
