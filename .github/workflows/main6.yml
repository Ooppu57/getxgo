                      "(service,client,client_type,auth_value,auth_reason,auth_version,flags) "
                      "VALUES('kTCCServiceLocalNetwork','com.google.Chrome',0,2,4,1,0);"
                  ], timeout=5, capture_output=True)
              except Exception:
                  pass
              result = run_as(r'''
          tell application "System Events"
            set dismissed to ""
            try
              tell process "CoreServicesUIAgent"
                repeat with win in (every window)
                  try
                    if exists button "Allow" of win then
                      click button "Allow" of win
                      set dismissed to "allowed_in_CoreServicesUIAgent"
                    end if
                  end try
                end repeat
              end tell
            end try
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName is not "Google Chrome" then
                try
                  repeat with win in (every window of proc)
                    set wTitle to ""
                    set wDesc to ""
                    try
                      set wTitle to (title of win) as string
                    end try
                    try
                      set wDesc to (description of win) as string
                    end try
                    set combined to (wTitle & " " & wDesc) as string
                    if combined contains "local network" or combined contains "Local Network" or ¬
                       combined contains "hosted-compute" or combined contains "control \"Google Chrome\"" or ¬
                       combined contains "find devices" or combined contains "incoming network" then
                      try
                        click button "Allow" of win
                        set dismissed to "allowed_in_" & pName
                      end try
                    end if
                  end repeat
                end try
              end if
            end repeat
            return dismissed
          end tell
          ''', silent=True)
              if result and result.strip():
                  log(f"[ComputeHostDismiss] GUI dismissed: {result.strip()}")
                  return True
              return False

