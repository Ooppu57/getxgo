              while time.time() - t0 < 10:
                  if dismiss_system_popups():
                      popup_count += 1
                  if dismiss_compute_host_popup():
                      popup_count += 1
                  time.sleep(0.5)
              log(f"[Opera GX] STEP 2 COMPLETE: Dismissed {popup_count} popup events.")

              log("[Opera GX] STEP 3: Attempting 'Accept and Install' button click...")
              result = click_accept_and_install("Opera GX")
