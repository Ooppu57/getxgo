                  for i in range(3):
                      log(f"[Opera GX] STEP 3: Tab press {i+1}/3")
                      press("tab"); time.sleep(0.5)
                  press("return")
                  log("[Opera GX] STEP 3: Fallback Tab+Enter executed.")
              else:
                  log(f"[Opera GX] STEP 3 COMPLETE: Button clicked ({result}).")

              log("[Opera GX] STEP 4: Waiting 30 seconds for next screen (dismissing popups)...")
              for s in range(30):
                  dismiss_compute_host_popup()
                  dismiss_system_popups()
                  if s % 10 == 0 and s > 0:
                      log(f"[Opera GX] STEP 4: {s}/30 seconds elapsed...")
                  time.sleep(1)
              log("[Opera GX] STEP 4 COMPLETE: 30s wait done.")

              log("[Opera GX] STEP 5: Pressing Tab x4 then Enter x8 (setup wizard navigation)...")
              for i in range(4):
                  log(f"[Opera GX] STEP 5: Tab press {i+1}/4")
                  press("tab"); time.sleep(0.5)
              for i in range(8):
                  d = random.uniform(1.0, 2.0)
