name: Unified GoLogin Remote Automation

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Select OS Runner Version'
        required: true
        type: choice
        options:
          - 'windows-2025'
          - 'windows-2022'
          - 'windows-11-arm'
          - 'macos-14'
          - 'macos-15'
          - 'macos-26'
          - 'macos-26-intel'
        default: 'windows-2025'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'techx@justzeus.com'
      gologin_email:
        description: 'GoLogin Account Email'
        required: true
        type: string
        default: 'om2@mnb.net'
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '5'
      num_clicks:
        description: 'Number of Click-Only Devices (rest will Install)'
        required: true
        type: choice
        options:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '3'
      software_choice:
        description: 'Select Software & Link'
        required: true
        type: choice
        options:
          - 'AVG - TechxTrader'
          - 'AVG - B4Books'
          - 'AVG - F.Ahmad'
          - 'OperaGX - B4Books'
          - 'Opera - Techx'
          - 'Opera - Fatradez'
          - 'Opera - James'
          - 'Opera - Oliver'
          - 'Opera - Mahal'
          - 'Opera - Polar'
          - 'Opera - B4Books'
          - 'Opera-One - Esmeel'
          - 'Opera-One - Harrari'
          - 'Opera-One - Chloe'
          - 'Opera-One - Daisy'
          - 'Opera-One - Jimmy'
          - 'Ad-MVN - Techx'
          - 'Ad-MVN - B4Books'
          - 'Ad-MVN - Orderflowz'
          - 'Ad-MVN - A2Z'
        default: 'Ad-MVN - Techx'
      manual_software_url:
        description: 'Manual Software URL'
        required: false
        type: string
        default: 'https://checkmyapp.space/sl/v1nrr'
      run_manual_link:
        description: 'Run manual link (bypass software choice)'
        required: true
        type: boolean
        default: true
      scrapeops_api_key:
        description: 'ScrapeOps / FloppyData / Manual Proxies'
        required: false
        type: string
        default: '1IFG1IFjMPZi4DcrQ16KF2ku_fbxeCXI'
      use_without_proxy:
        description: 'Run without proxy'
        required: true
        type: boolean
        default: false
      proxy_country:
        description: 'Proxy Country Geotargeting'
        required: true
        type: choice
        options:
          - 'USA'
          - 'UK'
          - 'Canada'
          - 'Australia'
          - 'Germany'
          - 'France'
          - 'Brazil'
          - 'Mexico'
          - 'Spain'
          - 'Vietnam'
          - 'Switzerland'
          - 'Indonesia'
          - 'Italy'
          - 'Netherlands'
          - 'Poland'
        default: 'Spain'
      mobile_proxies:
        description: 'Use Mobile Proxies'
        required: true
        type: boolean
        default: false
      sticky_sessions:
        description: 'Enable Unique Sticky Sessions'
        required: true
        type: boolean
        default: true

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Generate Dynamic Matrix & Proxy Config
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          NUM_CLICKS: ${{ inputs.num_clicks }}
          OS_VERSION: ${{ inputs.os_version }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          MANUAL_URL: ${{ inputs.manual_software_url }}
          RUN_MANUAL: ${{ inputs.run_manual_link }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          WITHOUT_PROXY: ${{ inputs.use_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import os, json, uuid, random, re, sys, subprocess, time

          print("========== INITIALIZING UNIFIED MATRIX ==========")

          try:
              import requests
          except ImportError:
              subprocess.check_call([sys.executable, "-m", "pip", "install", "requests", "--quiet"])
              import requests

          email          = os.environ.get("EMAIL", "").strip()
          gologin_email  = os.environ.get("GOLOGIN_EMAIL", "").strip()
          num_devices    = int(os.environ.get("NUM_DEVICES", "1"))
          num_clicks_raw = int(os.environ.get("NUM_CLICKS", "0"))
          num_clicks     = min(num_clicks_raw, num_devices)
          num_installs   = num_devices - num_clicks
          os_version     = os.environ.get("OS_VERSION", "windows-2025")

          proxy_input      = os.environ.get("API_KEY", "").strip()
          without_proxy    = os.environ.get("WITHOUT_PROXY", "false").lower() == "true"

          is_manual_proxy      = False
          manual_proxy_strings = []
          scrapeops_key        = ""
          floppy_key           = ""

          SCRAPEOPS_KEY_RE = re.compile(
              r'^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$', re.IGNORECASE)
          FLOPPY_KEY_RE = re.compile(r'^[A-Za-z0-9_]{30,80}$')

          if without_proxy:
              print("[Proxy] 'Run without proxy' checked. Disabling proxy.")
              proxy_input = ""
          elif not proxy_input or proxy_input.lower() in ["none", "null", "false", "blank", "empty", "''", '""']:
              print("[Proxy] Proxy input empty or invalid. Disabling proxy.")
              proxy_input = ""
          else:
              raw_items = re.split(r'[\s,;]+', proxy_input)
              proxy_candidates = []
              for item in raw_items:
                  item = item.strip()
                  if not item:
                      continue
                  if ('://' in item) or ('@' in item) or (item.count(':') >= 2 and len(item) > 10):
                      proxy_candidates.append(item)
              if len(proxy_candidates) >= 1:
                  is_manual_proxy      = True
                  manual_proxy_strings = proxy_candidates
                  print(f"[Proxy] Detected MANUAL PROXY mode with {len(manual_proxy_strings)} entries.")
              elif SCRAPEOPS_KEY_RE.match(proxy_input):
                  scrapeops_key = proxy_input
                  print("[Proxy] Detected SCRAPEOPS API KEY mode.")
              elif FLOPPY_KEY_RE.match(proxy_input):
                  floppy_key = proxy_input
                  print("[Proxy] Detected FLOPPYDATA API KEY mode.")
              else:
                  scrapeops_key = proxy_input
                  print("[Proxy] Could not determine key type — treating as ScrapeOps.")

          country_map = {
              "USA": "us", "UK": "uk", "Canada": "ca",
              "Australia": "au", "Germany": "de", "France": "fr",
              "Brazil": "br", "Mexico": "mx", "Spain": "es",
              "Vietnam": "vn", "Switzerland": "ch", "Indonesia": "id",
              "Italy": "it", "Netherlands": "nl", "Poland": "pl"
          }
          country_name_to_code = {
              'united states': 'us', 'united kingdom': 'uk', 'canada': 'ca',
              'australia': 'au', 'germany': 'de', 'france': 'fr',
              'brazil': 'br', 'mexico': 'mx', 'spain': 'es',
              'vietnam': 'vn', 'switzerland': 'ch', 'indonesia': 'id',
              'italy': 'it', 'netherlands': 'nl', 'poland': 'pl',
              'usa': 'us', 'uk': 'uk',
          }

          def parse_proxy(proxy_str):
              original = proxy_str.strip()
              if not original:
                  return None
              protocol = 'http'
              rest = original
              if '://' in rest:
                  protocol, rest = rest.split('://', 1)
                  if protocol.lower() == 'geolocation':
                      protocol = 'http'
              floppy_match = re.match(r'^([^:]+):([^@]+)@([^:]+):(\d+):(.+)$', rest)
              if floppy_match:
                  user, pwd, host, port, country_extra = floppy_match.groups()
                  country = country_extra.split(' - ')[0].strip()
                  return {'original': original, 'protocol': protocol,
                          'username': user, 'password': pwd,
                          'host': host, 'port': int(port),
                          'server': f"{host}:{port}", 'country_name': country,
                          'country_code': None,
                          'url': f"http://{user}:{pwd}@{host}:{port}"}
              std_match = re.match(r'^([^:]+):([^@]+)@([^:]+):(\d+)$', rest)
              if std_match:
                  user, pwd, host, port = std_match.groups()
                  return {'original': original, 'protocol': protocol,
                          'username': user, 'password': pwd,
                          'host': host, 'port': int(port),
                          'server': f"{host}:{port}", 'country_name': None,
                          'country_code': None,
                          'url': f"{protocol}://{user}:{pwd}@{host}:{port}"}
              alt_match = re.match(r'^([^:]+):(\d+):([^:]+):(.+)$', rest)
              if alt_match:
                  host, port, user, pwd = alt_match.groups()
                  return {'original': original, 'protocol': protocol,
                          'username': user, 'password': pwd,
                          'host': host, 'port': int(port),
                          'server': f"{host}:{port}", 'country_name': None,
                          'country_code': None,
                          'url': f"{protocol}://{user}:{pwd}@{host}:{port}"}
              simple_match = re.match(r'^([^:]+):(\d+)$', rest)
              if simple_match:
                  host, port = simple_match.groups()
                  return {'original': original, 'protocol': protocol,
                          'username': '', 'password': '',
                          'host': host, 'port': int(port),
                          'server': f"{host}:{port}", 'country_name': None,
                          'country_code': None,
                          'url': f"{protocol}://{host}:{port}"}
              return None

          def validate_proxy(pinfo):
              try:
                  proxies = {'http': pinfo['url'], 'https': pinfo['url']}
                  resp = requests.get('http://ip-api.com/json/', proxies=proxies, timeout=15)
                  data = resp.json()
                  if data.get('status') == 'success':
                      cc = data.get('countryCode', 'US').lower()
                      country = pinfo.get('country_name') or data.get('country', 'Unknown')
                      return {'working': True, 'country_name': country, 'country_code': cc,
                              'ip': data.get('query', ''),
                              **{k: v for k, v in pinfo.items() if k not in ['working','country_name','country_code','ip']}}
              except Exception as e:
                  print(f"[ProxyCheck] FAILED {pinfo.get('server','?')}: {e}")
              return {'working': False, **pinfo}

          active_proxies = []
          use_proxy      = False

          if is_manual_proxy and not without_proxy:
              parsed = []
              for ps in manual_proxy_strings:
                  p = parse_proxy(ps)
                  if p:
                      parsed.append(p)
                  else:
                      print(f"[ProxyParse] Could not parse: {ps[:60]}...")
              print(f"[Proxy] Validating {len(parsed)} parsed proxies...")
              for idx, p in enumerate(parsed):
                  result = validate_proxy(p)
                  if result['working']:
                      if result.get('country_name'):
                          cname = result['country_name'].lower()
                          result['country_code'] = country_name_to_code.get(cname, result.get('country_code','us'))
                      active_proxies.append(result)
                      print(f"[Proxy] ACTIVE  -> {result['server']} | {result.get('country_name','?')} ({result.get('country_code','?')}) | IP: {result.get('ip','?')}")
                  else:
                      print(f"[Proxy] DEAD    -> {result.get('server','?')}")
                  if idx < len(parsed) - 1:
                      time.sleep(1)
              if len(active_proxies) < num_devices:
                  print(f"[Proxy] ERROR: Only {len(active_proxies)} active proxies for {num_devices} devices.")
                  exit(1)
              use_proxy = True
              print(f"[Proxy] Manual proxy pool ready: {len(active_proxies)} active for {num_devices} devices.")

          elif floppy_key and not without_proxy:
              use_proxy = True
              country_input = os.environ.get("COUNTRY", "USA")
              mobile        = os.environ.get("MOBILE", "false").lower() == "true"
              sticky        = os.environ.get("STICKY", "false").lower() == "true"
              cc            = country_map.get(country_input, "us").upper()
              proxy_type    = "mobile" if mobile else "residential"
              FLOPPY_BASE   = "https://client-api.floppy.host"
              headers       = {"X-Api-Key": floppy_key}
              print(f"[FloppyData] Fetching base credentials...")
              try:
                  creds_resp = requests.get(f"{FLOPPY_BASE}/v1/rotating/smartParamsCredentials",
                                            headers=headers, timeout=15)
                  creds_data = creds_resp.json()
                  floppy_base_user = creds_data.get("username", "")
                  floppy_base_pass = creds_data.get("password", "")
                  print(f"[FloppyData] Base credentials fetched. User prefix: {floppy_base_user[:8]}***")
              except Exception as e:
                  print(f"[FloppyData] ERROR fetching credentials: {e}")
                  exit(1)
              print(f"[FloppyData] Building {num_devices} device proxy configs (type={proxy_type}, country={cc})...")
              for i in range(1, num_devices + 1):
                  session_id = str(uuid.uuid4())[:8] if sticky else ""
                  params = {"type": proxy_type, "country": cc, "protocol": "http",
                            "rotation": "0" if sticky else "-1"}
                  if sticky and session_id:
                      params["session"] = f"dev{i}_{session_id}"
                  try:
                      builder_resp = requests.get(f"{FLOPPY_BASE}/v1/rotating/smartParamsBuilder",
                                                  headers=headers, params=params, timeout=15)
                      builder_data = builder_resp.json()
                      floppy_user  = builder_data.get("username", floppy_base_user)
                      floppy_pass  = builder_data.get("password", floppy_base_pass)
                      floppy_host  = builder_data.get("host", "geo.g-w.info")
                      floppy_port  = str(builder_data.get("port", 10080))
                      print(f"[FloppyData] Device {i}: {floppy_host}:{floppy_port} | user={floppy_user[:16]}... | session={'YES' if sticky else 'NO'}")
                  except Exception as e:
                      print(f"[FloppyData] ERROR building params for device {i}: {e}")
                      exit(1)
                  active_proxies.append({
                      'username': floppy_user, 'password': floppy_pass,
                      'host': floppy_host, 'port': int(floppy_port),
                      'server': f"{floppy_host}:{floppy_port}",
                      'country_code': cc.lower(), 'country_name': country_input,
                      'proxy_type_label': "floppydata",
                      'url': f"http://{floppy_user}:{floppy_pass}@{floppy_host}:{floppy_port}"
                  })
                  time.sleep(0.3)
              print(f"[FloppyData] Proxy pool ready: {len(active_proxies)} entries.")

          elif scrapeops_key and not without_proxy:
              use_proxy = True
              print("[Proxy] ScrapeOps proxy pool ready.")

          action_list = ["install"] * num_installs + ["click"] * num_clicks
          random.shuffle(action_list)
          print(f"[Action Matrix] Total Devices : {num_devices}")
          print(f"[Action Matrix] Install Paths : {num_installs}")
          print(f"[Action Matrix] Click Paths   : {num_clicks}")
          print(f"[Action Matrix] Randomized Queue: {action_list}")

          run_manual   = os.environ.get("RUN_MANUAL", "false").lower() == "true"
          manual_url   = os.environ.get("MANUAL_URL", "").strip()
          software_choice = os.environ.get("SOFTWARE_CHOICE", "Ad-MVN - Techx")

          avg_urls = {
              "AVG - TechxTrader": "https://u.to/a-trdr/GoeNIg",
              "AVG - B4Books":     "https://u.to/a-b4b/O4eNIg",
              "AVG - F.Ahmad":     "https://u.to/a-fahmad/ooeNIg",
          }
          opera_urls = {
              "OperaGX - B4Books":  "https://u.to/opx-b4b/2nh4Ig",
              "Opera - Techx":      "https://u.to/techxsm/xVyFIg",
              "Opera - Fatradez":   "https://u.to/fatradezsm/cF2FIg",
              "Opera - James":      "https://u.to/jamesxsm/eV2FIg",
              "Opera - Oliver":     "https://u.to/oliverxsm/f12FIg",
              "Opera - Mahal":      "https://u.to/mahalxsm/iF2FIg",
              "Opera - Polar":      "https://u.to/opxplr/wzh4Ig",
              "Opera - B4Books":    "https://u.to/opx-b4b/2nh4Ig",
          }
          opera_one_urls = {
              "Opera-One - Esmeel":  "https://u.to/esmlxopo/cTOGIg",
              "Opera-One - Harrari": "https://u.to/hararixopo/zTOGIg",
              "Opera-One - Chloe":   "https://u.to/chloexopo/_DOGIg",
              "Opera-One - Daisy":   "https://u.to/daisyxopo/LjSGIg",
              "Opera-One - Jimmy":   "https://u.to/jmy/mUZ4Ig",
          }
          ad_mvn_urls = {
              "Ad-MVN - Techx":      "https://u.to/techxadmvnxsmrt/gvd7Ig",
              "Ad-MVN - B4Books":    "https://u.to/b4bxadmvnxsmrt/5-h7Ig",
              "Ad-MVN - Orderflowz": "https://u.to/ordrflzadmvnxsmrt/-fZ7Ig",
              "Ad-MVN - A2Z":        "https://u.to/a2zadmvnxsmrt/Y-t7Ig",
          }
          all_urls = {**avg_urls, **opera_urls, **opera_one_urls, **ad_mvn_urls}

          dynamic_links = list(opera_urls.keys()) + list(ad_mvn_urls.keys())
          opera_one_links = list(opera_one_urls.keys())

          if run_manual and manual_url:
              target_url    = manual_url
              software_type = "dynamic_opera"
              exe_filter    = "*Opera*Setup*.exe"
              dmg_filter    = "*Opera*"
          else:
              target_url = all_urls.get(software_choice, ad_mvn_urls["Ad-MVN - Techx"])
              if software_choice in avg_urls:
                  software_type = "avg"
                  exe_filter    = "*avg*.exe"
                  dmg_filter    = "*AVG*"
              elif software_choice.startswith("OperaGX"):
                  software_type = "opera_gx"
                  exe_filter    = "OperaGXSetup*.exe"
                  dmg_filter    = "*Opera*GX*"
              elif software_choice in opera_one_links:
                  software_type = "opera_one"
                  exe_filter    = "OperaSetup*.exe"
                  dmg_filter    = "*Opera*"
              else:
                  software_type = "dynamic_opera"
                  exe_filter    = "*Opera*Setup*.exe"
                  dmg_filter    = "*Opera*"

          def short_os(os_ver):
              if os_ver.startswith("windows-"):
                  return os_ver.replace("windows-", "W").replace("-", "")
              elif os_ver.startswith("macos-"):
                  mapping = {"macos-15": "M15", "macos-14": "M14", "macos-13": "M13",
                             "macos-26": "M26", "macos-26-intel": "M26I"}
                  return mapping.get(os_ver, "MAC")
              return os_ver

          def short_software(choice):
              if run_manual:
                  return "MANUAL"
              prefix_map = {
                  "OperaGX": "OPX", "Opera-One": "OPO", "Ad-MVN": "MVN",
                  "AVG": "AVG", "Opera": "OP",
              }
              for key, prefix in prefix_map.items():
                  if choice.startswith(key):
                      parts = choice.split(" - ", 1)
                      list_name = parts[1].replace(" ", "") if len(parts) > 1 else ""
                      return f"{prefix}-{list_name}"
              return choice.replace(" ", "").replace("-", "")

          short_os_tag = short_os(os_version)
          short_sw_tag = short_software(software_choice)

          includes = []
          if email:
              for i in range(1, num_devices + 1):
                  action_mode = action_list[i - 1]
                  action_cap  = action_mode.capitalize()

                  if is_manual_proxy and active_proxies:
                      proxy      = active_proxies[i - 1]
                      cc_upper   = (proxy.get('country_code') or 'XX').upper()
                      device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_cap}-{cc_upper}"
                      includes.append({
                          "device": device_name, "email": email, "gologin_email": gologin_email,
                          "os": os_version,
                          "use_proxy": "true",
                          "proxy_server": proxy['server'],
                          "proxy_user":   proxy.get('username', ''),
                          "proxy_pass":   proxy.get('password', ''),
                          "proxy_type":   "manual",
                          "target_url":   target_url, "software_type": software_type,
                          "exe_filter":   exe_filter, "dmg_filter": dmg_filter,
                          "action_mode":  action_mode,
                      })
                      print(f"[Device Added] {device_name} | Proxy: {proxy['server']} ({cc_upper})")

                  elif floppy_key and active_proxies:
                      proxy      = active_proxies[i - 1]
                      cc_upper   = (proxy.get('country_code') or 'XX').upper()
                      device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_cap}-{cc_upper}"
                      includes.append({
                          "device": device_name, "email": email, "gologin_email": gologin_email,
                          "os": os_version,
                          "use_proxy": "true",
                          "proxy_server": proxy['server'],
                          "proxy_user":   proxy['username'],
                          "proxy_pass":   proxy['password'],
                          "proxy_type":   "floppydata",
                          "target_url":   target_url, "software_type": software_type,
                          "exe_filter":   exe_filter, "dmg_filter": dmg_filter,
                          "action_mode":  action_mode,
                      })
                      print(f"[Device Added] {device_name} | Proxy: FloppyData ({proxy['server']}) ({cc_upper})")

                  elif use_proxy and scrapeops_key:
                      country_input = os.environ.get("COUNTRY", "USA")
                      mobile        = os.environ.get("MOBILE", "false").lower() == "true"
                      sticky        = os.environ.get("STICKY", "false").lower() == "true"
                      cc            = country_map.get(country_input, "us")
                      country_cap   = cc.upper()
                      device_name   = f"{i}-{short_os_tag}-{short_sw_tag}-{action_cap}-{country_cap}"
                      proxy_user    = f"scrapeops.country={cc}"
                      if mobile:
                          proxy_user += ".mobile=true"
                      if sticky:
                          session_id  = str(uuid.uuid4())[:8]
                          proxy_user += f".sticky_session={session_id}"
                      includes.append({
                          "device": device_name, "email": email, "gologin_email": gologin_email,
                          "os": os_version,
                          "use_proxy": "true",
                          "proxy_server": "residential-proxy.scrapeops.io:8181",
                          "proxy_user":   proxy_user,
                          "proxy_pass":   scrapeops_key,
                          "proxy_type":   "scrapeops",
                          "target_url":   target_url, "software_type": software_type,
                          "exe_filter":   exe_filter, "dmg_filter": dmg_filter,
                          "action_mode":  action_mode,
                      })
                      print(f"[Device Added] {device_name} | Proxy: ScrapeOps ({cc})")

                  else:
                      device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_cap}-DIRECT"
                      includes.append({
                          "device": device_name, "email": email, "gologin_email": gologin_email,
                          "os": os_version,
                          "use_proxy": "false",
                          "proxy_server": "", "proxy_user": "", "proxy_pass": "",
                          "proxy_type":   "none",
                          "target_url":   target_url, "software_type": software_type,
                          "exe_filter":   exe_filter, "dmg_filter": dmg_filter,
                          "action_mode":  action_mode,
                      })
                      print(f"[Device Added] {device_name} | Proxy: NONE")

          if not includes:
              print("Error: Valid configuration could not be generated.")
              exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")
          print("========== MATRIX GENERATION COMPLETE ==========")

      - name: Update Workflow Defaults (Remember Inputs)
        shell: python
        env:
          OS_VERSION: ${{ inputs.os_version }}
          GETSCREEN_EMAIL: ${{ inputs.getscreen_email }}
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          NUM_CLICKS: ${{ inputs.num_clicks }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          RUN_MANUAL: ${{ inputs.run_manual_link }}
          MANUAL_URL: ${{ inputs.manual_software_url }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          WITHOUT_PROXY: ${{ inputs.use_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import re, os

          SCRAPEOPS_KEY_RE = re.compile(
              r'^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$', re.IGNORECASE)
          FLOPPY_KEY_RE = re.compile(r'^[A-Za-z0-9_]{30,80}$')

          file_path = ".github/workflows/unified.yml"
          if os.path.exists(file_path):
              with open(file_path, "r") as f:
                  content = f.read()

              def update_default_str(input_name, new_val):
                  global content
                  pattern = r"(" + input_name + r":[\s\S]*?default:\s*')[^']*(')"
                  content = re.sub(pattern, rf"\g<1>{new_val}\g<2>", content, count=1)

              def update_default_bool(input_name, new_val):
                  global content
                  pattern = r"(" + input_name + r":[\s\S]*?default:\s*)(true|false)"
                  content = re.sub(pattern, rf"\g<1>{new_val.lower()}", content, count=1)

              api_key_input = os.environ.get("API_KEY", "").strip()
              is_manual_proxy = False
              if api_key_input:
                  raw_items = re.split(r'[\s,;]+', api_key_input)
                  proxy_candidates = [item for item in raw_items
                                      if ('://' in item) or ('@' in item) or (item.count(':') >= 2 and len(item) > 10)]
                  if len(proxy_candidates) >= 1:
                      is_manual_proxy = True

              update_default_str("os_version",        os.environ.get("OS_VERSION"))
              update_default_str("getscreen_email",   os.environ.get("GETSCREEN_EMAIL"))
              update_default_str("gologin_email",     os.environ.get("GOLOGIN_EMAIL"))
              update_default_str("num_devices",       os.environ.get("NUM_DEVICES"))
              update_default_str("num_clicks",        os.environ.get("NUM_CLICKS"))
              update_default_str("software_choice",   os.environ.get("SOFTWARE_CHOICE"))
              update_default_bool("run_manual_link",  os.environ.get("RUN_MANUAL"))
              if os.environ.get("RUN_MANUAL", "false").lower() == "true":
                  update_default_str("manual_software_url", os.environ.get("MANUAL_URL"))
              else:
                  update_default_str("manual_software_url", "")
              if not is_manual_proxy and api_key_input:
                  update_default_str("scrapeops_api_key", api_key_input)
              update_default_bool("use_without_proxy", os.environ.get("WITHOUT_PROXY"))
              update_default_str("proxy_country",     os.environ.get("COUNTRY"))
              update_default_bool("mobile_proxies",   os.environ.get("MOBILE"))
              update_default_bool("sticky_sessions",  os.environ.get("STICKY"))

              with open(file_path, "w") as f:
                  f.write(content)
              print("[Workflow State] Defaults updated.")
          else:
              print(f"File {file_path} not found. Skipping auto-save.")

      - name: Commit and Push New Defaults
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/unified.yml
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Update last used inputs [skip ci]" && git push)

  remote_session:
    name: Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      # ======================================================================
      # WINDOWS — SYSTEM PREP
      # ======================================================================
      - name: System Preparation (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "========== SYSTEM PREPARATION ==========" -ForegroundColor Cyan
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          Set-MpPreference -PUAProtection 0 -ErrorAction SilentlyContinue
          Set-MpPreference -DisableBlockAtFirstSeen $true -ErrorAction SilentlyContinue
          Set-MpPreference -DisableIOAVProtection $true -ErrorAction SilentlyContinue
          $edgePolicy = "HKLM:\SOFTWARE\Policies\Microsoft\Edge"
          if (-not (Test-Path $edgePolicy)) { New-Item -Path $edgePolicy -Force | Out-Null }
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenEnabled" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenPuaEnabled" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "DownloadRestrictions" -Value 0
          $exemptPath = "$edgePolicy\ExemptDomainFileTypePairsFromFileTypeDownloadWarnings"
          if (-not (Test-Path $exemptPath)) { New-Item -Path $exemptPath -Force | Out-Null }
          Set-ItemProperty -Path $exemptPath -Name "1" -Value '{"domains":["*"],"file_extension":"exe"}'

      # ======================================================================
      # WINDOWS — GETSCREEN + GOLOGIN SETUP
      # ======================================================================
      - name: Install Getscreen.me & GoLogin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOLOGIN_EMAIL: ${{ matrix.gologin_email }}
        run: |
          Write-Host "========== INSTALLING GETSCREEN.ME ==========" -ForegroundColor Cyan
          $MaxRetries = 3; $RetryCount = 0; $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://getscreen.me/download/getscreen.msi" -OutFile "getscreen.msi" -ErrorAction Stop
                  if ((Get-Item "getscreen.msi").length -gt 1MB) { $Success = $true }
                  else { $RetryCount++; Start-Sleep -Seconds 5 }
              } catch { $RetryCount++; Start-Sleep -Seconds 5 }
          }
          if (-not $Success) { Write-Error "Getscreen download failed"; exit 1 }
          $InstallArgs = "/i getscreen.msi /qn REGISTER=`"${{ matrix.email }}`" CONFIG=`"name='${{ matrix.device }}' autostart=true nonadmin=true control=true disable_confirmation=true`""
          Start-Process msiexec.exe -Wait -ArgumentList $InstallArgs
          Write-Host "Getscreen.me installed." -ForegroundColor Green

          Write-Host "========== INSTALLING GOLOGIN ==========" -ForegroundColor Cyan
          $Success = $false; $RetryCount = 0
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://dl.gologin.com/gologin.exe" -OutFile "gologin_installer.exe" -ErrorAction Stop
                  if ((Get-Item "gologin_installer.exe").length -gt 10MB) { $Success = $true }
                  else { $RetryCount++; Start-Sleep -Seconds 5 }
              } catch { $RetryCount++; Start-Sleep -Seconds 5 }
          }
          if (-not $Success) { Write-Error "GoLogin download failed"; exit 1 }
          Start-Process -FilePath ".\gologin_installer.exe" -ArgumentList "/S" -Wait
          $GoLoginPath = "$env:USERPROFILE\AppData\Local\Programs\GoLogin\GoLogin.exe"
          $WaitAttempts = 0
          while (-Not (Test-Path $GoLoginPath) -and $WaitAttempts -lt 30) {
              Start-Sleep -Seconds 2; $WaitAttempts++
          }
          if (-Not (Test-Path $GoLoginPath)) {
              $Found = Get-ChildItem -Path "$env:USERPROFILE\AppData" -Filter "GoLogin.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($Found) { $GoLoginPath = $Found.FullName }
              else { Write-Error "GoLogin.exe not found"; exit 1 }
          }
          Start-Process $GoLoginPath
          Write-Host "GoLogin launched." -ForegroundColor Green

          Write-Host "========== GOLOGIN LOGIN AUTOMATION ==========" -ForegroundColor Cyan
          pip install pyautogui pygetwindow --quiet
          python -c "
          import pyautogui, pygetwindow as gw, time, os, sys
          print('Polling for GoLogin window...')
          max_wait = 60; wait_time = 0; win = None
          while wait_time < max_wait:
              for title in ['Gologin','GoLogin','gologin']:
                  windows = gw.getWindowsWithTitle(title)
                  if windows: win = windows[0]; break
              if win: break
              time.sleep(2); wait_time += 2
          if win:
              try: win.activate(); win.maximize()
              except: pass
              time.sleep(5)
              pyautogui.press('tab', presses=8, interval=0.5)
              pyautogui.press('enter')
              time.sleep(4)
              pyautogui.write(os.environ.get('GOLOGIN_EMAIL',''))
              pyautogui.press('tab')
              pyautogui.write('11223344')
              pyautogui.press('enter')
              print('GoLogin login automated.')
          else:
              print('GoLogin window not found.')
          "

      # ======================================================================
      # WINDOWS — WAIT FOR PROFILE & EXECUTE AUTOMATION
      # ======================================================================
      - name: GoLogin Profile Detection & Automation (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET_URL: ${{ matrix.target_url }}
          SOFTWARE_TYPE: ${{ matrix.software_type }}
          EXE_FILTER: ${{ matrix.exe_filter }}
          ACTION_MODE: ${{ matrix.action_mode }}
        run: |
          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host " GoLogin is ready. Please open a profile via Getscreen.me " -ForegroundColor Yellow
          Write-Host " remote access. The runner will auto-detect the browser.   " -ForegroundColor Yellow
          Write-Host "============================================================" -ForegroundColor Cyan

          $readyFile = "$env:TEMP\gologin_browser_ready.flag"
          $pollMins = 25
          Write-Host "Waiting up to $pollMins minutes for you to open a GoLogin profile..."
          Write-Host "TIP: Open your profile, then the script will detect it automatically."
          $start = Get-Date
          $detected = $false
          while (((Get-Date) - $start).TotalMinutes -lt $pollMins) {
              # Detection: look for a visible window that is likely the browser
              Add-Type @"
using System; using System.Runtime.InteropServices; using System.Text;
public class WinFinder {
  [DllImport("user32.dll")] public static extern bool EnumWindows(EnumWindowsProc lpEnumFunc);
  [DllImport("user32.dll")] public static extern int GetWindowText(IntPtr hWnd, StringBuilder lpString, int nMaxCount);
  [DllImport("user32.dll")] public static extern bool IsWindowVisible(IntPtr hWnd);
  [DllImport("user32.dll")] public static extern bool SetForegroundWindow(IntPtr hWnd);
  public delegate bool EnumWindowsProc(IntPtr hWnd, IntPtr lParam);
}
"@
              $candidates = @()
              $cb = [WinFinder+EnumWindowsProc]{
                  param($hWnd, $lParam)
                  if ([WinFinder]::IsWindowVisible($hWnd)) {
                      $sb = New-Object System.Text.StringBuilder 256
                      [WinFinder]::GetWindowText($hWnd, $sb, 256) | Out-Null
                      $t = $sb.ToString()
                      if ($t -and $t -notmatch "GoLogin" -and $t -notmatch "Program Manager" -and $t -notmatch "Settings" -and $t.Length -gt 5) {
                          $script:candidates += [PSCustomObject]@{ Handle = $hWnd; Title = $t }
                      }
                  }
                  return $true
              }
              [WinFinder]::EnumWindows($cb, [IntPtr]::Zero) | Out-Null
              # Prefer window with URL-like or browser-like title
              $browser = $candidates | Where-Object { $_.Title -match "http|\.com|New Tab|Chromium|Chrome|Opera|AVG" } | Select-Object -First 1
              if (-not $browser) {
                  $browser = $candidates | Sort-Object { $_.Title.Length } -Descending | Select-Object -First 1
              }
              if ($browser) {
                  Write-Host "Detected browser window: $($browser.Title)" -ForegroundColor Green
                  [WinFinder]::SetForegroundWindow($browser.Handle) | Out-Null
                  Start-Sleep -Seconds 2
                  # Navigate to target URL
                  Add-Type -AssemblyName System.Windows.Forms
                  [System.Windows.Forms.SendKeys]::SendWait("^l")
                  Start-Sleep -Milliseconds 500
                  [System.Windows.Forms.SendKeys]::SendWait("$env:TARGET_URL")
                  Start-Sleep -Milliseconds 500
                  [System.Windows.Forms.SendKeys]::SendWait("{ENTER}")
                  Start-Sleep -Seconds 5
                  $browser.Handle | Out-File -FilePath $readyFile -Encoding utf8
                  $detected = $true
                  break
              }
              Start-Sleep -Seconds 5
          }
          if (-not $detected) {
              Write-Host "Profile detection timeout. Proceeding with fallback (URL may need manual entry)." -ForegroundColor Red
          }

          Write-Host "========== AUTOMATION ENGINE STARTING ==========" -ForegroundColor Cyan
          Write-Host "Action Mode: $($env:ACTION_MODE.ToUpper()) | Software: $($env:SOFTWARE_TYPE)"

          python -m pip install pywinauto pyautogui pygetwindow keyboard --quiet

          $handlerPy = @'
          import time, sys, os, subprocess, random, tempfile
          from pywinauto import Desktop
          import pyautogui
          from pywinauto.keyboard import send_keys

          def log(tag, msg):
              print(f"[{time.strftime('%H:%M:%S')}][{tag}] {msg}", flush=True)

          def find_browser_window(desktop):
              for w in desktop.windows(visible_only=True):
                  try:
                      t = w.window_text()
                      if t and len(t) > 3 and "GoLogin" not in t and "Program Manager" not in t and "Settings" not in t:
                          return w
                  except: pass
              return None

          def click_download_button(desktop):
              try:
                  for w in desktop.windows(visible_only=True):
                      t = w.window_text()
                      if not t: continue
                      for btn in w.descendants(control_type="Button"):
                          bt = btn.window_text()
                          if bt and any(k in bt.lower() for k in ["download","accept and install","accept & install","download now","télécharger","descargar"]):
                              try: btn.click_input(); log("DL", f"Clicked '{bt}'"); return True
                              except: pass
              except Exception as e: log("DL", f"Error: {e}")
              return False

          def dismiss_interference(desktop):
              for w in desktop.windows(visible_only=True):
                  try:
                      t = w.window_text()
                      if t and any(x in t.lower() for x in ["settings","default apps","choose an app","open with","user account control"]):
                          try: w.close()
                          except: pass
                  except: pass

          def handle_automation(software_type, action_mode, timeout=360):
              desktop = Desktop(backend="uia")
              start = time.time()
              last_click = 0
              while time.time() - start < timeout:
                  dismiss_interference(desktop)
                  if action_mode == "click":
                      if time.time() - start > 75:
                          log("Click", "Click-only path complete.")
                          return
                      time.sleep(1)
                      continue
                  # install path
                  if time.time() - last_click > 8:
                      if click_download_button(desktop):
                          last_click = time.time()
                  time.sleep(1)

          if __name__ == "__main__":
              handle_automation(sys.argv[1], sys.argv[2])
          '@
          $handlerPy | Out-File -FilePath "$env:TEMP\auto_handler.py" -Encoding utf8

          if ($env:ACTION_MODE -eq "install") {
              $dlFolder = "$env:USERPROFILE\Downloads"
              $sentinel = "$env:TEMP\download_done.flag"
              $installerSentinel = "$env:TEMP\installer_executed.flag"
              $timeoutSecs = 330

              Start-Process -FilePath "python" -ArgumentList "-u `"$env:TEMP\auto_handler.py`" `"$env:SOFTWARE_TYPE`" `"$env:ACTION_MODE`"" -WindowStyle Hidden

              $installJob = Start-Job -ScriptBlock {
                  param($dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinel, $installerSentinel)
                  $deadline = (Get-Date).AddSeconds($timeoutSecs); $installed = $false
                  while (-not $installed -and (Get-Date) -lt $deadline) {
                      $candidates = Get-ChildItem -Path $dlFolder -Filter $exeFilter -ErrorAction SilentlyContinue |
                          Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } |
                          Sort-Object LastWriteTime -Descending
                      if ($candidates.Count -gt 0) {
                          $file = $candidates[0]
                          Set-Content -Path $sentinel -Value "done" -ErrorAction SilentlyContinue
                          # Close browser download tabs/windows aggressively
                          Get-Process | Where-Object { $_.ProcessName -match "chrome|chromium|opera|edge" } | Stop-Process -Force -ErrorAction SilentlyContinue
                          Start-Sleep -Seconds 3
                          Set-Content -Path $installerSentinel -Value "done" -ErrorAction SilentlyContinue
                          Start-Process -FilePath $file.FullName -ArgumentList "/silent" -Wait
                          # Post-install launch
                          $paths = @()
                          if ($softwareType -eq "opera_gx") {
                              $paths = @("$env:LOCALAPPDATA\Programs\Opera GX\launcher.exe","C:\Program Files\Opera GX\launcher.exe")
                          } elseif ($softwareType -eq "opera_one" -or $softwareType -eq "dynamic_opera") {
                              $paths = @("$env:LOCALAPPDATA\Programs\Opera\launcher.exe","C:\Program Files\Opera\launcher.exe")
                          } else {
                              $paths = @("C:\Program Files\AVG\Browser\Application\AVGBrowser.exe","C:\Program Files (x86)\AVG\Browser\Application\AVGBrowser.exe")
                          }
                          for ($i=0; $i -lt 120; $i++) {
                              $launched = $false
                              foreach ($p in $paths) { if (Test-Path $p) { Start-Process $p; $launched = $true; break } }
                              if ($launched) { break }
                              Start-Sleep -Seconds 2
                          }
                          $installed = $true
                      } else { Start-Sleep -Seconds 5 }
                  }
              } -ArgumentList $dlFolder, $timeoutSecs, $env:SOFTWARE_TYPE, $env:EXE_FILTER, $sentinel, $installerSentinel

              $deadline = (Get-Date).AddSeconds($timeoutSecs)
              while ($true) {
                  $output = Receive-Job -Job $installJob -ErrorAction SilentlyContinue
                  if ($output) { foreach ($line in $output) { Write-Host $line } }
                  if ($installJob.State -eq 'Completed' -or $installJob.State -eq 'Failed' -or (Get-Date) -gt $deadline) { break }
                  Start-Sleep -Seconds 5
              }
              Write-Host "[Runtime] Install pathway complete." -ForegroundColor Green
          } else {
              Write-Host "[Runtime] CLICK-ONLY pathway. Running handler for 75s..." -ForegroundColor Magenta
              Start-Process -FilePath "python" -ArgumentList "-u `"$env:TEMP\auto_handler.py`" `"$env:SOFTWARE_TYPE`" `"$env:ACTION_MODE`"" -Wait
              Write-Host "[Runtime] Click pathway exiting cleanly." -ForegroundColor Magenta
          }

      # ======================================================================
      # macOS — SYSTEM PREP
      # ======================================================================
      - name: System Preparation (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "===[$(date '+%H:%M:%S')] Configuring macOS Security ==="
          sudo spctl --master-disable || true
          sudo defaults write /Library/Preferences/com.apple.security GKAutoRearm -bool false || true
          defaults write com.apple.LaunchServices LSQuarantine -bool false || true
          sudo spctl --global-disable || true

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VENV_DIR="/tmp/uienv"
          PYTHON_BIN=""
          for c in python3.12 python3.11 python3.10 python3; do
            if command -v "$c" &>/dev/null; then PYTHON_BIN="$c"; break; fi
          done
          [ -z "$PYTHON_BIN" ] && { echo "No Python3 found"; exit 1; }
          rm -rf "$VENV_DIR"
          "$PYTHON_BIN" -m venv "$VENV_DIR"
          source "$VENV_DIR/bin/activate"
          pip install --upgrade pip --quiet
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-ApplicationServices --quiet || true
          pip install atomacos Pillow requests --quiet || true
          deactivate
          echo "UIENV_PYTHON=$VENV_DIR/bin/python3" >> "$GITHUB_ENV"
          if ! command -v brew &>/dev/null; then
            NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || true
            for bp in /opt/homebrew/bin /usr/local/bin; do
              if [ -x "$bp/brew" ]; then export PATH="$bp:$PATH"; echo "PATH=$bp:$PATH" >> "$GITHUB_ENV"; break; fi
            done
          fi
          brew install cliclick --quiet || true
          echo "CLICLICK_BIN=$(command -v cliclick || echo not_found)" >> "$GITHUB_ENV"

      - name: Pre-Grant TCC Permissions (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          grant() {
            sudo sqlite3 "$TCC_DB" "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) VALUES('$1','$2',$3,2,4,1,0);" 2>/dev/null || true
          }
          grant kTCCServiceAccessibility com.apple.Terminal 0
          grant kTCCServiceAccessibility com.apple.systemevents 0
          grant kTCCServiceAccessibility com.google.Chrome 0
          grant kTCCServiceAccessibility /usr/bin/osascript 1
          grant kTCCServiceScreenCapture com.google.Chrome 0
          grant kTCCServiceScreenCapture com.apple.Terminal 0
          grant kTCCServiceLocalNetwork com.google.Chrome 0

      # ======================================================================
      # macOS — GETSCREEN + GOLOGIN SETUP
      # ======================================================================
      - name: Install Getscreen.me & GoLogin (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          GOLOGIN_EMAIL: ${{ matrix.gologin_email }}
        run: |
          echo "===[$(date '+%H:%M:%S')] Installing Getscreen.me ==="
          DEVICE_NAME="${{ matrix.device }}"
          EMAIL="${{ matrix.email }}"
          curl -L -o getscreen.dmg "https://getscreen.me/download/getscreen.dmg" --retry 3 --retry-delay 5 --silent --show-error || true
          FILE_SIZE=$(stat -f%z getscreen.dmg 2>/dev/null || stat -c%s getscreen.dmg 2>/dev/null || echo 0)
          if [ -f "getscreen.dmg" ] && [ "$FILE_SIZE" -gt 102400 ]; then
            hdiutil attach getscreen.dmg -mountpoint /Volumes/getscreen -nobrowse -quiet || true
            APP_PATH=$(find /Volumes/getscreen -maxdepth 1 -name "*.app" | head -n 1 || true)
            if [ -n "$APP_PATH" ]; then
              APP_NAME=$(basename "$APP_PATH")
              sudo cp -R "$APP_PATH" /Applications/
              sudo xattr -dr com.apple.quarantine "/Applications/$APP_NAME" 2>/dev/null || true
              hdiutil detach /Volumes/getscreen -quiet -force || true
              BID=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleIdentifier 2>/dev/null || echo "")
              [ -n "$BID" ] && for SVC in kTCCServiceScreenCapture kTCCServiceAccessibility kTCCServiceLocalNetwork; do
                sudo sqlite3 "$TCC_DB" "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) VALUES('$SVC','$BID',0,2,4,1,0);" 2>/dev/null || true
              done
              EXEC_NAME=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleExecutable 2>/dev/null || echo "")
              EXEC_PATH="/Applications/$APP_NAME/Contents/MacOS/$EXEC_NAME"
              [ -x "$EXEC_PATH" ] && sudo "$EXEC_PATH" -install 2>/dev/null || true
              sleep 1; sudo "$EXEC_PATH" -register "$EMAIL" 2>/dev/null || true
              sleep 1; sudo "$EXEC_PATH" -config "name='$DEVICE_NAME' autostart=true nonadmin=true control=true disable_confirmation=true" 2>/dev/null || true
              sleep 1; sudo "$EXEC_PATH" -start 2>/dev/null || true
              echo "[$(date '+%H:%M:%S')] Getscreen.me running."
            fi
          fi

          echo "===[$(date '+%H:%M:%S')] Installing GoLogin ==="
          OS_VERSION="${{ matrix.os }}"
          if [[ "$OS_VERSION" == "macos-13" || "$OS_VERSION" == "macos-26-intel" ]]; then
            curl -L -o gologin.dmg "https://dl.gologin.com/gologin.dmg" --retry 3 --retry-delay 5
          else
            curl -L -o gologin.dmg "https://dl.gologin.com/gologin-arm64.dmg" --retry 3 --retry-delay 5
          fi
          hdiutil attach gologin.dmg -mountpoint /Volumes/gologin -nobrowse -quiet || true
          sudo cp -R /Volumes/gologin/GoLogin.app /Applications/ || true
          hdiutil detach /Volumes/gologin -quiet -force || true
          open /Applications/GoLogin.app
          echo "[$(date '+%H:%M:%S')] GoLogin launched."

          echo "===[$(date '+%H:%M:%S')] Automating GoLogin Login ==="
          sleep 25
          osascript <<EOF
          set userEmail to "$GOLOGIN_EMAIL"
          set userPass to "11223344"
          tell application "System Events"
              tell application "GoLogin" to activate
              delay 3
              repeat 8 times
                  key code 48
                  delay 0.5
              end repeat
              key code 36
              delay 4
              set the clipboard to userEmail
              delay 0.5
              keystroke "v" using command down
              delay 1
              key code 48
              delay 1
              set the clipboard to userPass
              delay 0.5
              keystroke "v" using command down
              delay 1
              key code 36
              delay 5
          end tell
EOF
          echo "[$(date '+%H:%M:%S')] GoLogin login complete."

      # ======================================================================
      # macOS — WAIT FOR PROFILE & EXECUTE AUTOMATION
      # ======================================================================
      - name: GoLogin Profile Detection & Automation (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          TARGET_URL: ${{ matrix.target_url }}
          SOFTWARE_TYPE: ${{ matrix.software_type }}
          DMG_FILTER: ${{ matrix.dmg_filter }}
          ACTION_MODE: ${{ matrix.action_mode }}
          UIENV_PYTHON: ${{ env.UIENV_PYTHON }}
          CLICLICK_BIN: ${{ env.CLICLICK_BIN }}
        run: |
          echo "============================================================"
          echo " GoLogin is ready. Please open a profile via Getscreen.me  "
          echo " remote access. The runner will auto-detect the browser.   "
          echo "============================================================"

          HANDLER_PYTHON="${UIENV_PYTHON:-python3}"
          CLICLICK="${CLICLICK_BIN:-cliclick}"

          # --- Wait for user to open profile (poll for browser process) ---
          POLL_START=$(date +%s)
          POLL_MAX=1500  # 25 minutes
          BROWSER_PROCESS=""
          echo "[$(date '+%H:%M:%S')] Polling for GoLogin profile browser window..."
          while [ "$(($(date +%s) - POLL_START))" -lt "$POLL_MAX" ]; do
            # Look for a browser-like process that is NOT the main GoLogin app
            BROWSER_PROCESS=$(osascript -e 'tell application "System Events" to get name of first process whose visible is true and name contains "Chromium"' 2>/dev/null || true)
            if [ -z "$BROWSER_PROCESS" ]; then
              BROWSER_PROCESS=$(osascript -e 'tell application "System Events" to get name of first process whose visible is true and name is not "GoLogin" and name is not "Getscreen" and background only is false' 2>/dev/null || true)
            fi
            if [ -n "$BROWSER_PROCESS" ] && [ "$BROWSER_PROCESS" != "GoLogin" ]; then
              echo "[$(date '+%H:%M:%S')] Detected browser process: $BROWSER_PROCESS"
              break
            fi
            sleep 5
          done

          if [ -n "$BROWSER_PROCESS" ] && [ "$BROWSER_PROCESS" != "GoLogin" ]; then
            echo "[$(date '+%H:%M:%S')] Navigating to target URL in $BROWSER_PROCESS ..."
            osascript <<EOF
            tell application "System Events"
                tell process "$BROWSER_PROCESS"
                    set frontmost to true
                    delay 1
                    keystroke "l" using command down
                    delay 0.5
                    keystroke "$TARGET_URL"
                    delay 0.5
                    key code 36
                end tell
            end tell
EOF
            sleep 5
          else
            echo "[$(date '+%H:%M:%S')] WARNING: Could not detect browser process. You may need to navigate manually."
          fi

          echo "========== AUTOMATION ENGINE STARTING =========="
          echo "Action Mode: $(echo $ACTION_MODE | tr '[:lower:]' '[:upper:]') | Software: $SOFTWARE_TYPE"

          # --- Write macOS handler (adapted from Script 3) ---
          cat > /tmp/macos_handler.py << 'PYEOF'
          import time, sys, os, subprocess, random

          def log(msg):
              print(f"[{time.strftime('%H:%M:%S')}] {msg}", flush=True)

          def run_as(script, silent=False, timeout=20):
              try:
                  r = subprocess.run(["osascript", "-e", script], capture_output=True, text=True, timeout=timeout)
                  return r.stdout.strip()
              except: return ""

          def press(key_name):
              key_map = {"tab": 48, "return": 36, "space": 49, "escape": 53}
              code = key_map.get(key_name.lower())
              if code:
                  run_as(f'tell application "System Events" to key code {code}', silent=True)

          def click_button_exact(label, timeout=5):
              result = run_as(f'''
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName contains "Opera" or pName contains "Chromium" or pName contains "Chrome" then
                try
                  repeat with win in (every window of proc)
                    try
                      if exists button "{label}" of win then click button "{label}" of win; return "clicked" end if
                    end try
                  end repeat
                end try
              end if
            end repeat
            return "not_found"
          end tell''', silent=True, timeout=timeout)
              return "clicked" in (result or "")

          def wait_for_app_launch(app_name, timeout=120):
              start = time.time()
              while time.time() - start < timeout:
                  apps = run_as('tell application "System Events" to get name of every process whose visible is true', silent=True)
                  if any(app_name.lower() in a.lower() for a in apps.split(",") if a.strip()):
                      return True
                  time.sleep(2)
              return False

          def opera_gx_flow():
              log("[Opera GX] Post-install sequence starting...")
              if not wait_for_app_launch("Opera GX", 120): return
              run_as('tell application "Opera GX" to activate', silent=True); time.sleep(2)
              for i in range(4): press("tab"); time.sleep(0.5)
              for i in range(8): press("return"); time.sleep(random.uniform(1.0,2.0))
              time.sleep(5)
              for i in range(6): press("tab"); time.sleep(random.uniform(1.0,2.0))
              press("return"); time.sleep(5)
              for tc in range(7, 17):
                  run_as('tell application "System Events" to keystroke "t" using command down', silent=True)
                  time.sleep(random.uniform(1,2))
                  for i in range(tc): press("tab"); time.sleep(random.uniform(1.0,2.0))
                  press("return"); time.sleep(5)
              log("[Opera GX] Post-install complete.")

          def opera_one_flow():
              log("[Opera One] Post-install sequence starting...")
              if not wait_for_app_launch("Opera Installer", 120):
                  if not wait_for_app_launch("Opera", 60): return
              run_as('tell application "System Events" to tell process "Opera Installer" to set frontmost to true', silent=True)
              time.sleep(2)
              for i in range(1, 8):
                  if click_button_exact("Next"): log(f"Next {i}/7 clicked")
                  else: press("tab"); press("return")
                  time.sleep(3)
              click_button_exact("Get Started"); time.sleep(2)
              click_button_exact("Submit") or press("return")
              time.sleep(2)
              run_as('tell application "System Events" to keystroke "n" using command down', silent=True)
              time.sleep(random.uniform(1,2))
              for i in range(random.randint(6,12)): press("tab"); time.sleep(random.uniform(1.0,2.0))
              press("return")
              log("[Opera One] Post-install complete.")

          def handle(sw_type, action_mode, timeout=480):
              start = time.time()
              sentinel = "/tmp/download_done.flag"
              installer_sentinel = "/tmp/installer_executed.flag"
              dl_clicked = False
              setup_done = False
              op_launch_t = None
              log(f"[Handler] Started | type={sw_type} | action={action_mode}")
              while time.time() - start < timeout:
                  try:
                      if action_mode == "click":
                          if time.time() - start > 75:
                              log("[Handler] Click-only path complete.")
                              return
                          time.sleep(1); continue

                      # Install path: try to click download button periodically
                      if not dl_clicked and time.time() - start > 15:
                          log("[DL] Attempting download button click...")
                          # Tab x3 + Enter pattern for smart links
                          for i in range(3): press("tab"); time.sleep(0.5)
                          press("return"); time.sleep(1)
                          dl_clicked = True

                      # If installer sentinel exists, run post-install flows
                      if os.path.exists(installer_sentinel) and not setup_done:
                          if sw_type in ["opera_gx","dynamic_opera"]:
                              if wait_for_app_launch("Opera GX", 30):
                                  opera_gx_flow(); setup_done = True; break
                          elif sw_type in ["opera_one","dynamic_opera"]:
                              if wait_for_app_launch("Opera Installer", 30) or wait_for_app_launch("Opera", 30):
                                  opera_one_flow(); setup_done = True; break
                  except Exception as e:
                      log(f"[Handler] Exception: {e}")
                  time.sleep(1)
              log("[Handler] Finished.")

          if __name__ == "__main__":
              handle(sys.argv[1], sys.argv[2])
          PYEOF

          # --- Start background handler ---
          "$HANDLER_PYTHON" -u /tmp/macos_handler.py "$SOFTWARE_TYPE" "$ACTION_MODE" 2>&1 | tee /tmp/handler_output.log &
          HANDLER_PID=$!
          echo "[$(date '+%H:%M:%S')] Handler started (PID $HANDLER_PID)"

          # --- File watcher for INSTALL path ---
          if [ "$ACTION_MODE" = "install" ]; then
            DL_FOLDER="$HOME/Downloads"
            SENTINEL_PATH="/tmp/download_done.flag"
            INSTALLER_SENTINEL="/tmp/installer_executed.flag"
            TIMEOUT_SECS=420
            touch /tmp/watcher_start_marker
            (
              DEADLINE=$(($(date +%s) + TIMEOUT_SECS))
              INSTALLED=false
              while [ "$INSTALLED" = false ] && [ "$(date +%s)" -lt "$DEADLINE" ]; do
                FILE=$(find "$DL_FOLDER" -maxdepth 1 \( -name "*.dmg" -o -name "*.zip" -o -name "*.pkg" \) ! -name "*.download" ! -name "*.crdownload" -newer /tmp/watcher_start_marker 2>/dev/null | head -n 1 || true)
                if [ -n "$FILE" ]; then
                  echo "[$(date '+%H:%M:%S')] [Watcher] Download detected: $FILE"
                  touch "$SENTINEL_PATH"
                  BASENAME=$(basename "$FILE")
                  EXT="${BASENAME##*.}"
                  if [ "$EXT" != "app" ]; then
                    PREV=0
                    for i in $(seq 1 30); do
                      SZ=$(stat -f%z "$FILE" 2>/dev/null || stat -c%s "$FILE" 2>/dev/null || echo 0)
                      [ "$SZ" = "$PREV" ] && [ "$SZ" -gt 500000 ] && break
                      PREV=$SZ; sleep 2
                    done
                  fi
                  xattr -dr com.apple.quarantine "$FILE" 2>/dev/null || true
                  sleep 4
                  INSTALLED_APP_NAME=""
                  if [ "$EXT" = "dmg" ]; then
                    MNT=$(hdiutil attach "$FILE" -nobrowse -quiet 2>/dev/null | awk '/\/Volumes\// {print $NF}' | head -n 1 || true)
                    if [ -n "$MNT" ]; then
                      APP_SRC=$(find "$MNT" -maxdepth 2 -name "*.app" | head -n 1 || true)
                      if [ -n "$APP_SRC" ]; then
                        AN=$(basename "$APP_SRC")
                        sudo cp -R "$APP_SRC" /Applications/ || true
                        sudo xattr -dr com.apple.quarantine "/Applications/$AN" 2>/dev/null || true
                        INSTALLED_APP_NAME="$AN"
                      fi
                      hdiutil detach "$MNT" -quiet || true
                    fi
                  elif [ "$EXT" = "zip" ]; then
                    EXTRACT_DIR="${DL_FOLDER}/extracted_$(date +%s)"
                    mkdir -p "$EXTRACT_DIR"
                    ditto -xk "$FILE" "$EXTRACT_DIR" 2>/dev/null || unzip -q -o "$FILE" -d "$EXTRACT_DIR" 2>/dev/null || true
                    find "$EXTRACT_DIR" -name "__MACOSX" -exec rm -rf {} + 2>/dev/null || true
                    APP_IN_ZIP=$(find "$EXTRACT_DIR" -maxdepth 4 -name "*.app" ! -path "*/__MACOSX/*" | head -n 1 || true)
                    if [ -n "$APP_IN_ZIP" ]; then
                      AN=$(basename "$APP_IN_ZIP")
                      sudo cp -R "$APP_IN_ZIP" /Applications/ || true
                      sudo xattr -dr com.apple.quarantine "/Applications/$AN" 2>/dev/null || true
                      sudo codesign --force --deep --sign - "/Applications/$AN" 2>/dev/null || true
                      INSTALLED_APP_NAME="$AN"
                      rm -rf "$EXTRACT_DIR" 2>/dev/null || true
                    fi
                  elif [ "$EXT" = "pkg" ]; then
                    sudo installer -pkg "$FILE" -target / -verboseR || true
                  fi
                  touch "$INSTALLER_SENTINEL"
                  # Launch installed app
                  if [ -n "$INSTALLED_APP_NAME" ]; then
                    sleep 3
                    open "/Applications/$INSTALLED_APP_NAME" || true
                  else
                    FOUND=$(find /Applications "$HOME/Applications" -maxdepth 2 -name "Opera*.app" 2>/dev/null | head -n 1 || true)
                    [ -n "$FOUND" ] && open "$FOUND" || true
                  fi
                  INSTALLED=true
                  echo "[$(date '+%H:%M:%S')] [Watcher] Install complete."
                else
                  sleep 5
                fi
              done
            ) &
            WATCHER_PID=$!
            echo "[$(date '+%H:%M:%S')] Watcher started (PID $WATCHER_PID)"
          fi

          # --- Poll handler until done ---
          HANDLER_TIMEOUT=500
          POLL_START=$(date +%s)
          while kill -0 $HANDLER_PID 2>/dev/null; do
            ELAPSED=$(($(date +%s) - POLL_START))
            [ $ELAPSED -gt $HANDLER_TIMEOUT ] && { kill $HANDLER_PID 2>/dev/null || true; break; }
            sleep 5
          done
          echo "[$(date '+%H:%M:%S')] Handler finished."
          [ -n "$WATCHER_PID" ] && kill $WATCHER_PID 2>/dev/null || true
          echo "[$(date '+%H:%M:%S')] === macOS workflow complete ==="

      # ======================================================================
      # KEEP ALIVE (both OS)
      # ======================================================================
      - name: Keep Runner Alive
        if: always()
        shell: bash
        run: |
          echo "[$(date '+%H:%M:%S')] Session active. Runner stays online until timeout."
          sleep 3600
