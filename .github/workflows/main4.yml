      - name: Wait for GoLogin Orbita Profile & Run Software (macOS)
        if: runner.os == 'macOS'
        env:
          TARGET_URL:    ${{ matrix.target_url }}
          SOFTWARE_TYPE: ${{ matrix.software_type }}
          DMG_FILTER:    ${{ matrix.dmg_filter }}
          ACTION_MODE:   ${{ matrix.action_mode }}
        run: |
          echo "=== [$(date '+%H:%M:%S')] GoLogin Orbita Detection & Software Runner (macOS) ==="
          echo "Target URL  : $TARGET_URL"
          echo "Action Mode : $(echo $ACTION_MODE | tr '[:lower:]' '[:upper:]')"
          echo "Software    : $SOFTWARE_TYPE"

          DL_FOLDER="$HOME/Downloads"
          SENTINEL_PATH="/tmp/download_done.flag"
          INSTALLER_SENTINEL="/tmp/installer_executed.flag"
          TIMEOUT_SECS=3300

          # Write the complete macOS Python handler
          cat > /tmp/macos_handler.py << 'PYEOF'
          import time, sys, os, subprocess, random

          TARGET_URL    = os.environ.get("TARGET_URL", "")
          SOFTWARE_TYPE = os.environ.get("SOFTWARE_TYPE", "dynamic_opera")
          DMG_FILTER    = os.environ.get("DMG_FILTER", "*Opera*")
          ACTION_MODE   = os.environ.get("ACTION_MODE", "install")

          def log(msg):
              print(f"[{time.strftime('%H:%M:%S')}] {msg}", flush=True)

          CHROME_WARMUP_SECS = 20
          DL_WAIT_POST_NAV   = 30

          def run_as(script, silent=False, timeout=20):
              try:
                  r = subprocess.run(["osascript", "-e", script],
                      capture_output=True, text=True, timeout=timeout)
                  if r.returncode != 0 and not silent:
                      log(f"[AppleScript] stderr: {r.stderr.strip()[:120]}")
                  return r.stdout.strip()
              except subprocess.TimeoutExpired:
                  if not silent: log("[AppleScript] Timed out")
                  return ""
              except Exception as e:
                  if not silent: log(f"[AppleScript] Exception: {e}")
                  return ""

          def clipboard_set(text):
              try:
                  p = subprocess.Popen(["pbcopy"], stdin=subprocess.PIPE,
                      stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                  p.communicate(input=text.encode("utf-8"), timeout=5)
                  time.sleep(0.15)
              except Exception as e:
                  log(f"[Clipboard] pbcopy error: {e}")

          def press(key_name):
              key_map = {"tab":48,"return":36,"space":49,"right":124,"left":123,
                         "up":126,"down":125,"escape":53,"f5":96}
              code = key_map.get(key_name.lower())
              if code:
                  run_as(f'tell application "System Events" to key code {code}', silent=True)

          def running_apps():
              r = run_as('tell application "System Events" to get name of every process whose visible is true',
                         silent=True)
              return [n.strip() for n in r.split(",") if n.strip()]

          # ── Orbita detection ──────────────────────────────────────────────
          ORBITA_FRAGMENTS = ["orbita", "gologin browser", "gl browser", "gl-browser"]

          def find_orbita_app():
              apps = running_apps()
              for a in apps:
                  if any(f in a.lower() for f in ORBITA_FRAGMENTS):
                      return a
              try:
                  r = subprocess.run(["ps", "aux"], capture_output=True, text=True, timeout=5)
                  for line in r.stdout.splitlines():
                      ll = line.lower()
                      if any(f in ll for f in ORBITA_FRAGMENTS):
                          parts = line.split()
                          if len(parts) > 10:
                              return os.path.basename(parts[10])
              except Exception: pass
              return None

          def wait_for_orbita(max_wait=300):
              log(f"[OrbitaWait] Waiting up to {max_wait}s for Orbita profile...")
              deadline = time.time() + max_wait
              while time.time() < deadline:
                  orbita = find_orbita_app()
                  if orbita:
                      log(f"[OrbitaWait] Orbita detected: '{orbita}'")
                      return orbita
                  time.sleep(2)
              log("[OrbitaWait] Orbita did not appear within timeout.")
              return None

          def navigate_orbita_to_url(orbita_app_name, url):
              log(f"[OrbitaNav] Navigating '{orbita_app_name}' to: {url}")
              run_as(f'tell application "{orbita_app_name}" to activate', silent=True)
              time.sleep(1.5)
              run_as(f'tell application "System Events" to tell process "{orbita_app_name}" to keystroke "l" using command down',
                     silent=True)
              time.sleep(0.8)
              run_as('tell application "System Events" to keystroke "a" using command down', silent=True)
              time.sleep(0.2)
              clipboard_set(url)
              time.sleep(0.2)
              run_as('tell application "System Events" to keystroke "v" using command down', silent=True)
              time.sleep(0.5)
              press("return")
              log("[OrbitaNav] URL entered via Cmd+L + paste.")
              time.sleep(2)

          def close_orbita_tab(orbita_app):
              run_as(f'tell application "{orbita_app}" to activate', silent=True)
              time.sleep(0.5)
              run_as(f'tell application "System Events" to tell process "{orbita_app}" to keystroke "w" using command down',
                     silent=True)
              log("[CloseTab] Sent Cmd+W to close GoLogin profile tab.")

          def dismiss_popups():
              run_as(r'''
          tell application "System Events"
            try
              tell process "CoreServicesUIAgent"
                repeat with win in (every window)
                  try
                    if exists button "Allow" of win then click button "Allow" of win
                  end try
                end repeat
              end tell
            end try
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName is not in {"Google Chrome", "Orbita", "GoLogin"} then
                try
                  repeat with win in (every window of proc)
                    try
                      if (exists button "Allow" of win) and (exists button "Don't Allow" of win) then
                        click button "Allow" of win
                      end if
                    end try
                  end repeat
                end try
              end if
            end repeat
          end tell
          ''', silent=True)

          def smart_link_bypass(orbita_app):
              log("[SmartLink] Executing Tab+Enter interstitial bypass...")
              run_as(f'tell application "{orbita_app}" to activate', silent=True)
              time.sleep(1)
              press("tab"); time.sleep(0.5)
              press("return")

          def click_dl_button(orbita_app):
              log("[DLButton] Activating browser and pressing 3 Tabs then Enter...")
              run_as(f'tell application "{orbita_app}" to activate', silent=True)
              time.sleep(5)
              for i in range(3):
                  press("tab"); time.sleep(5)
              press("return")

          # ── Post‑install flows (macOS) ─────────────────────────────────────
          def opera_gx_flow_mac(orbita_app):
              log("[PostInstall-GX] === Opera GX Post-Install (macOS) STARTING ===")
              if not wait_for_app_launch("Opera GX", timeout=120):
                  log("[PostInstall-GX] Opera GX not found. Aborting."); return
              run_as('tell application "Opera GX" to activate', silent=True)
              time.sleep(2)
              t0 = time.time(); popup_count = 0
              while time.time() - t0 < 10:
                  dismiss_popups(); popup_count += 1; time.sleep(0.5)
              log(f"[PostInstall-GX] Dismissed popups ({popup_count} sweeps).")
              r = run_as(r'''
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName contains "Opera GX" then
                try
                  repeat with win in (every window of proc)
                    try
                      if exists button "Accept and Install" of win then
                        click button "Accept and Install" of win
                        return "clicked"
                      end if
                    end try
                  end repeat
                end try
              end if
            end repeat
            return "not_found"
          end tell''', silent=True)
              if r == "not_found":
                  log("[PostInstall-GX] Button not found — Tab x3 + Enter fallback...")
                  for _ in range(3): press("tab"); time.sleep(0.5)
                  press("return")
              else:
                  log(f"[PostInstall-GX] Button result: {r}")
              log("[PostInstall-GX] Waiting 30s for install...")
              for s in range(30):
                  dismiss_popups()
                  if s % 10 == 0 and s > 0: log(f"[PostInstall-GX]   {s}/30s elapsed")
                  time.sleep(1)
              log("[PostInstall-GX] Tab x4 → Enter x8...")
              for _ in range(4): press("tab"); time.sleep(0.5)
              for i in range(8):
                  d = random.uniform(1.0, 2.0)
                  press("return"); time.sleep(d); dismiss_popups()
              time.sleep(5)
              tab_count = random.randint(6, 14)
              log(f"[PostInstall-GX] Cmd+N then Tab x{tab_count}...")
              run_as('tell application "System Events" to keystroke "n" using command down', silent=True)
              time.sleep(random.uniform(1, 2))
              for i in range(tab_count):
                  press("tab"); time.sleep(random.uniform(1.0, 2.0)); dismiss_popups()
              press("return")
              log("[PostInstall-GX] === Opera GX Post-Install COMPLETE ===")

          def opera_one_flow_mac(orbita_app):
              log("[PostInstall-OP1] === Opera One Post-Install (macOS) STARTING ===")
              if not wait_for_app_launch("Opera Installer", timeout=120):
                  if not wait_for_app_launch("Opera", timeout=60):
                      log("[PostInstall-OP1] Opera not found. Aborting."); return
              run_as('tell application "System Events" to tell process "Opera Installer" to set frontmost to true',
                     silent=True)
              time.sleep(2)
              t0 = time.time()
              while time.time() - t0 < 10:
                  dismiss_popups(); time.sleep(0.5)
              r = run_as(r'''
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName contains "Opera" then
                try
                  repeat with win in (every window of proc)
                    try
                      if exists button "Accept and Install" of win then
                        click button "Accept and Install" of win
                        return "clicked"
                      end if
                    end try
                  end repeat
                end try
              end if
            end repeat
            return "not_found"
          end tell''', silent=True)
              if r == "not_found":
                  for _ in range(3): press("tab"); time.sleep(0.5)
                  press("return")
              log("[PostInstall-OP1] Waiting 30s for Opera install...")
              for s in range(30):
                  dismiss_popups()
                  if s % 10 == 0 and s > 0: log(f"[PostInstall-OP1]   {s}/30s elapsed")
                  time.sleep(1)
              log("[PostInstall-OP1] Clicking Next x7 (3s each)...")
              for i in range(1, 8):
                  # click_button_orbita defined inline for simplicity:
                  clicked = False
                  for name in ["Next"]:
                      res = run_as(f'''
          tell application "System Events"
            tell process "Opera Installer"
              repeat with win in (every window)
                try
                  if exists button "{name}" of win then
                    click button "{name}" of win
                    return "clicked"
                  end if
                end try
              end repeat
            end tell
            return "not_found"
          end tell''', silent=True, timeout=5)
                      if res == "clicked":
                          clicked = True; break
                  if not clicked:
                      press("tab"); time.sleep(0.3)
                      press("return")
                  dismiss_popups(); time.sleep(3)
              # Get Started
              run_as(f'''
          tell application "System Events"
            tell process "Opera Installer"
              try
                if exists button "Get Started" of window 1 then
                  click button "Get Started" of window 1
                end if
              end try
            end tell
          end tell''', silent=True)
              time.sleep(2)
              if not run_as(f'''
          tell application "System Events"
            tell process "Opera Installer"
              try
                if exists button "Submit" of window 1 then
                  click button "Submit" of window 1
                  return "clicked"
                end if
              end try
            end tell
            return "not_found"
          end tell''', silent=True) == "clicked":
                  press("return")
              time.sleep(2)
              run_as('tell application "System Events" to keystroke "n" using command down', silent=True)
              time.sleep(random.uniform(1, 2))
              tab_count = random.randint(6, 12)
              log(f"[PostInstall-OP1] Tab x{tab_count}...")
              for _ in range(tab_count):
                  press("tab"); time.sleep(random.uniform(1, 2)); dismiss_popups()
              press("return")
              log("[PostInstall-OP1] === Opera One Post-Install COMPLETE ===")

          def wait_for_app_launch(app_name, timeout=120):
              start = time.time()
              while time.time() - start < timeout:
                  apps = running_apps()
                  if any(app_name.lower() in a.lower() for a in apps):
                      log(f"[LaunchDetect] '{app_name}' is running!")
                      time.sleep(2); return True
                  time.sleep(1)
              log(f"[LaunchDetect] '{app_name}' did not launch.")
              return False

          # ══════════════════════════════════════════════════════════════════
          # MAIN HANDLER (macOS)
          # ══════════════════════════════════════════════════════════════════
          def handle(sw_type, action_mode, timeout=3300):
              t0                  = time.time()
              sentinel            = "/tmp/download_done.flag"
              installer_sentinel  = "/tmp/installer_executed.flag"

              orbita_app_first_seen = None
              nav_done              = False
              dl_clicked            = False
              browser_closed        = False
              setup_done            = False
              op_launch_t           = None
              smart_link_done       = False
              smart_link_t          = 0
              nav_done_t            = None
              last_popup_t          = 0
              last_dl_t             = 0

              log(f"[Handler] Started | type={sw_type} | action={action_mode}")

              orbita_app = wait_for_orbita(max_wait=300)
              if not orbita_app:
                  log("[Handler] Orbita never opened. Exiting."); return

              orbita_app_first_seen = time.time()
              log(f"[Handler] Orbita app: '{orbita_app}' | warming up 20s before navigation...")
              time.sleep(20)

              navigate_orbita_to_url(orbita_app, TARGET_URL)
              nav_done   = True
              nav_done_t = time.time()
              log(f"[Handler] Navigation complete. Will monitor for {timeout}s total.")

              while time.time() - t0 < timeout:
                  try:
                      elapsed = int(time.time() - t0)
                      apps    = running_apps()
                      has_orbita = any(any(f in a.lower() for f in ORBITA_FRAGMENTS) for a in apps)
                      op_gx  = any("Opera GX" in a for a in apps)
                      op_one = any(("Opera" in a and "Opera GX" not in a) or "Opera Installer" in a for a in apps)

                      now = time.time()
                      if now - last_popup_t > 3:
                          dismiss_popups(); last_popup_t = now

                      if sw_type in ["opera_smart_link","dynamic_opera","ad_mvn"]:
                          if not smart_link_done and nav_done and nav_done_t and (now - nav_done_t >= 20):
                              smart_link_bypass(orbita_app)
                              smart_link_done = True; smart_link_t = now

                      if action_mode == "click":
                          if sw_type in ["opera_smart_link","dynamic_opera","ad_mvn"]:
                              if not smart_link_done: time.sleep(1); continue
                              if now - smart_link_t < 15: time.sleep(1); continue
                              log("[Handler] CLICK-ONLY: interstitial done. Closing tab.")
                              close_orbita_tab(orbita_app)
                              log("[Handler] CLICK-ONLY pathway complete."); return
                          else:
                              if nav_done and elapsed > (20 + 30):
                                  log("[Handler] CLICK-ONLY: page loaded. Closing tab.")
                                  close_orbita_tab(orbita_app)
                                  log("[Handler] CLICK-ONLY pathway complete."); return
                          time.sleep(1); continue

                      if has_orbita and not dl_clicked:
                          ready = True
                          if sw_type in ["opera_smart_link","dynamic_opera","ad_mvn"]:
                              ready = smart_link_done and (now - smart_link_t >= 10)
                          if ready and nav_done_t and (now - nav_done_t) > DL_WAIT_POST_NAV:
                              if now - last_dl_t > 10:
                                  last_dl_t = now
                                  click_dl_button(orbita_app)
                                  dl_clicked = True

                      if not browser_closed and os.path.exists(sentinel):
                          log("[Handler] Download sentinel found — closing profile tab...")
                          close_orbita_tab(orbita_app)
                          time.sleep(2)
                          browser_closed = True

                      # Post‑install triggers
                      if sw_type in ["opera_gx","dynamic_opera","opera_smart_link","ad_mvn"]:
                          if op_gx and not setup_done:
                              if not op_launch_t:
                                  op_launch_t = now
                                  run_as('tell application "Opera GX" to activate', silent=True)
                              if now - op_launch_t > 5:
                                  opera_gx_flow_mac(orbita_app); setup_done = True; break

                      if sw_type in ["opera_one","dynamic_opera","opera_smart_link","ad_mvn"]:
                          if op_one and not op_gx and not setup_done:
                              if not op_launch_t:
                                  op_launch_t = now
                              if now - op_launch_t > 5:
                                  opera_one_flow_mac(orbita_app); setup_done = True; break

                      if elapsed % 30 == 0 and elapsed > 0:
                          log(f"[Handler] Status t={elapsed}s | nav={nav_done} | sl={smart_link_done} | dl={dl_clicked}")

                  except Exception as e:
                      log(f"[Handler] Loop exception: {e}")
                  time.sleep(1)

              if setup_done:
                  log("[Handler] === HANDLER FINISHED SUCCESSFULLY ===")
              else:
                  log(f"[Handler] === TIMEOUT after {int(time.time()-t0)}s ===")

          if __name__ == "__main__":
              handle(SOFTWARE_TYPE, ACTION_MODE)
          PYEOF

          # Background popup dismisser
          cat > /tmp/popup_dismisser.sh << 'DISMISSEOF'
          #!/bin/bash
          while true; do
            osascript << 'ASEOF' 2>/dev/null || true
          tell application "System Events"
            try
              tell process "CoreServicesUIAgent"
                repeat with win in (every window)
                  try
                    if exists button "Allow" of win then click button "Allow" of win
                  end try
                end repeat
              end tell
            end try
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName is not in {"GoLogin", "Orbita"} then
                try
                  repeat with win in (every window of proc)
                    set wT to ""
                    try; set wT to (title of win) as string; end try
                    if wT contains "local network" or wT contains "hosted-compute" or wT contains "Allow" then
                      try
                        if (exists button "Allow" of win) then click button "Allow" of win
                      end try
                    end if
                  end repeat
                end try
              end if
            end repeat
          end tell
          ASEOF
            sleep 2
          done
          DISMISSEOF
          chmod +x /tmp/popup_dismisser.sh
          /tmp/popup_dismisser.sh > /tmp/popup_dismisser.log 2>&1 &
          DISMISSER_PID=$!
          echo "[*] Background popup dismisser PID: $DISMISSER_PID"

          # macOS install watcher
          if [ "$ACTION_MODE" = "install" ]; then
            echo "[Watcher] INSTALL path: Monitoring $DL_FOLDER..."
            touch /tmp/watcher_start_marker
            (
              DEADLINE=$(($(date +%s) + TIMEOUT_SECS))
              INSTALLED=false
              while [ "$INSTALLED" = false ] && [ "$(date +%s)" -lt "$DEADLINE" ]; do
                FILE=$(find "$DL_FOLDER" -maxdepth 1 \
                  \( -name "*.dmg" -o -name "*.zip" -o -name "*.pkg" \) \
                  ! -name "*.download" ! -name "*.crdownload" ! -name "*.part" \
                  -newer /tmp/watcher_start_marker 2>/dev/null | head -n 1 || true)
                if [ -n "$FILE" ]; then
                  echo "[Watcher] Download found: $FILE"
                  touch "$SENTINEL_PATH"
                  BASENAME=$(basename "$FILE"); EXT="${BASENAME##*.}"
                  xattr -dr com.apple.quarantine "$FILE" 2>/dev/null || true
                  sleep 4
                  INSTALLED_APP=""
                  if [ "$EXT" = "dmg" ]; then
                    MNT=$(hdiutil attach "$FILE" -nobrowse -quiet 2>/dev/null | awk '/\/Volumes\//{print $NF}' | head -n 1)
                    if [ -n "$MNT" ]; then
                      APP_SRC=$(find "$MNT" -maxdepth 2 -name "*.app" | head -n 1)
                      if [ -n "$APP_SRC" ]; then
                        AN=$(basename "$APP_SRC")
                        sudo cp -R "$APP_SRC" /Applications/ || true
                        sudo xattr -dr com.apple.quarantine "/Applications/$AN" 2>/dev/null || true
                        INSTALLED_APP="$AN"
                        echo "[Installer] Installed: $AN"
                      fi
                      hdiutil detach "$MNT" -quiet || true
                    fi
                  elif [ "$EXT" = "zip" ]; then
                    EXTRACT_DIR="${DL_FOLDER}/extracted_$(date +%s)"
                    mkdir -p "$EXTRACT_DIR"
                    ditto -xk "$FILE" "$EXTRACT_DIR" 2>/dev/null || unzip -q -o "$FILE" -d "$EXTRACT_DIR" 2>/dev/null || true
                    APP_IN_ZIP=$(find "$EXTRACT_DIR" -maxdepth 4 -name "*.app" ! -path "*/__MACOSX/*" | head -n 1)
                    if [ -n "$APP_IN_ZIP" ]; then
                      AN=$(basename "$APP_IN_ZIP")
                      sudo cp -R "$APP_IN_ZIP" /Applications/ || true
                      sudo xattr -dr com.apple.quarantine "/Applications/$AN" 2>/dev/null || true
                      INSTALLED_APP="$AN"
                      echo "[Installer] Installed from ZIP: $AN"
                    fi
                    rm -rf "$EXTRACT_DIR" 2>/dev/null || true
                  elif [ "$EXT" = "pkg" ]; then
                    sudo installer -pkg "$FILE" -target / -verboseR || true
                  fi
                  touch "$INSTALLER_SENTINEL"
                  echo "[Watcher] Installer sentinel written."
                  ACTUAL="$SOFTWARE_TYPE"
                  if [ "$ACTUAL" = "dynamic_opera" ] || [ "$ACTUAL" = "opera_smart_link" ] || [ "$ACTUAL" = "ad_mvn" ]; then
                    echo "$INSTALLED_APP$BASENAME" | grep -qi "gx" && ACTUAL="opera_gx" || ACTUAL="opera_one"
                  fi
                  if [ "$ACTUAL" = "opera_gx" ]; then
                    SEARCH_PATHS=("/Applications/$INSTALLED_APP" "/Applications/Opera GX.app" "$HOME/Applications/Opera GX.app")
                  else
                    SEARCH_PATHS=("/Applications/$INSTALLED_APP" "/Applications/Opera.app" "/Applications/Opera Installer.app" "$HOME/Applications/Opera Installer.app")
                  fi
                  echo "[Watcher] Looking for app to launch..."
                  LAUNCHED=false
                  for i in $(seq 1 60); do
                    for P in "${SEARCH_PATHS[@]}"; do
                      if [ -d "$P" ]; then
                        sleep 3; echo "[Watcher] Launching: $P"
                        open "$P" || true; sleep 5; LAUNCHED=true; break 2
                      fi
                    done
                    sleep 2
                  done
                  if [ "$LAUNCHED" = false ]; then
                    FOUND=$(find /Applications "$HOME/Applications" -maxdepth 2 -name "Opera*.app" 2>/dev/null | head -n 1 || true)
                    [ -n "$FOUND" ] && open "$FOUND" || true
                  fi
                  INSTALLED=true
                  echo "[Watcher] Install + launch complete."
                else
                  sleep 5
                fi
              done
              echo "[Watcher] Exiting."
            ) &
            WATCHER_PID=$!
            echo "[*] Watcher PID: $WATCHER_PID"
          else
            echo "[*] CLICK-ONLY: Watcher not started."
            WATCHER_PID=""
          fi

          # Start Python handler
          HANDLER_PYTHON="${UIENV_PYTHON:-python3}"
          echo "[*] Starting macOS automation handler..."
          "$HANDLER_PYTHON" -u /tmp/macos_handler.py 2>&1 | tee /tmp/handler_output.log &
          HANDLER_PID=$!
          echo "[*] Handler PID: $HANDLER_PID"

          POLL_START=$(date +%s)
          while kill -0 $HANDLER_PID 2>/dev/null; do
            if [ $(($(date +%s) - POLL_START)) -gt $TIMEOUT_SECS ]; then
              echo "[*] Handler timeout — killing."
              kill $HANDLER_PID 2>/dev/null || true; break
            fi
            sleep 5
          done
          echo "[*] Handler finished."
          [ -n "$WATCHER_PID" ] && kill $WATCHER_PID 2>/dev/null || true
          kill $DISMISSER_PID 2>/dev/null || true
          echo "=== macOS automation workflow complete ==="

      - name: Keep Runner Alive (macOS)
        if: always() && runner.os == 'macOS'
        run: |
          echo "Session complete. Runner stays online to exhaust timeout."
          sleep 3600
