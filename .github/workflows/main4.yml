name: Parrallel Win/Mac

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Select OS Runner Version'
        required: true
        type: choice
        options:
          - 'windows-2025'
          - 'windows-2022'
          - 'windows-11-arm'
          - 'macos-14'
          - 'macos-15'
          - 'macos-26'
          - 'macos-26-intel'
        default: 'windows-2025'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'techx@justzeus.com' # Do not remove the single quotes
      gologin_email:
        description: 'GoLogin Account Email'
        required: true
        type: string
        default: 'ok6@mnb.net' # Do not remove the single quotes
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '1'

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Generate Dynamic Matrix
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          OS_VERSION: ${{ inputs.os_version }}
        run: |
          import os, json
          email = os.environ.get("EMAIL", "").strip()
          num_devices = int(os.environ.get("NUM_DEVICES", "1"))
          os_version = os.environ.get("OS_VERSION", "windows-2025")

          includes = []
          if email:
              for i in range(1, num_devices + 1):
                  if "windows" in os_version.lower():
                      short_os = os_version.replace("windows-", "")
                      device_name = f"{i}-Win-{short_os}"
                  else:
                      short_os = os_version.replace("macos-", "")
                      device_name = f"{i}-mac-{short_os}"

                  includes.append({
                      "device": device_name,
                      "email": email,
                      "os": os_version
                  })

          if not includes:
              print("Error: Valid configuration could not be generated. Exiting.")
              exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")

      - name: Update Workflow Defaults (Remember Inputs)
        shell: python
        env:
          OS_VERSION: ${{ inputs.os_version }}
          GETSCREEN_EMAIL: ${{ inputs.getscreen_email }}
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
        run: |
          import re
          import os
          file_path = ".github/workflows/main4.yml"

          with open(file_path, "r") as f:
              content = f.read()

          def update_default(input_name, new_val):
              global content
              pattern = r"(" + input_name + r":[\s\S]*?default:\s*')[^']*(')"
              content = re.sub(pattern, rf"\g<1>{new_val}\g<2>", content, count=1)

          update_default("os_version", os.environ.get("OS_VERSION"))
          update_default("getscreen_email", os.environ.get("GETSCREEN_EMAIL"))
          update_default("gologin_email", os.environ.get("GOLOGIN_EMAIL"))
          update_default("num_devices", os.environ.get("NUM_DEVICES"))

          with open(file_path, "w") as f:
              f.write(content)

      - name: Commit and Push New Defaults
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/main4.yml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update last used inputs [skip ci]" && git push)

  remote_session:
    name: Remote Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      # ==========================================
      # WINDOWS SPECIFIC STEPS
      # ==========================================
      - name: Install and Start Getscreen.me (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Downloading Getscreen.me Agent..."
          $MaxRetries = 3
          $RetryCount = 0
          $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://getscreen.me/download/getscreen.msi" -OutFile "getscreen.msi" -ErrorAction Stop
                  if ((Get-Item "getscreen.msi").length -gt 1MB) {
                      $Success = $true
                  } else {
                      Write-Host "File too small, possibly corrupted. Retrying..."
                      $RetryCount++
                      Start-Sleep -Seconds 5
                  }
              } catch {
                  $RetryCount++
                  Write-Host "Download failed. Retrying ($RetryCount/$MaxRetries)..."
                  Start-Sleep -Seconds 5
              }
          }
          if (-not $Success) { Write-Error "Failed to download Getscreen.me after $MaxRetries attempts"; exit 1 }

          $DeviceName = "${{ matrix.device }}"
          Write-Host "Installing and linking Getscreen.me for Device $DeviceName..."

          $InstallArgs = "/i getscreen.msi /qn REGISTER=`"${{ matrix.email }}`" CONFIG=`"name='$DeviceName' autostart=true nonadmin=true control=true disable_confirmation=true`""
          Start-Process msiexec.exe -Wait -ArgumentList $InstallArgs

          Write-Host "Getscreen.me is configured and running."

      - name: Download, Install, and Open GoLogin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Downloading GoLogin for Windows..."
          $MaxRetries = 3
          $RetryCount = 0
          $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://dl.gologin.com/gologin.exe" -OutFile "gologin_installer.exe" -ErrorAction Stop
                  if ((Get-Item "gologin_installer.exe").length -gt 10MB) {
                      $Success = $true
                  } else {
                      Write-Host "Downloaded file is too small, possibly corrupted. Retrying..."
                      $RetryCount++
                      Start-Sleep -Seconds 5
                  }
              } catch {
                  $RetryCount++
                  Write-Host "Download failed. Retrying ($RetryCount/$MaxRetries)..."
                  Start-Sleep -Seconds 5
              }
          }
          if (-not $Success) { Write-Error "Failed to download GoLogin after $MaxRetries attempts"; exit 1 }

          Write-Host "Installing GoLogin..."
          Start-Process -FilePath ".\gologin_installer.exe" -ArgumentList "/S" -Wait

          $GoLoginPath = "$env:USERPROFILE\AppData\Local\Programs\GoLogin\GoLogin.exe"

          Write-Host "Waiting up to 60 seconds for GoLogin.exe to appear on disk..."
          $WaitAttempts = 0
          while (-Not (Test-Path $GoLoginPath) -and $WaitAttempts -lt 30) {
              Start-Sleep -Seconds 2
              $WaitAttempts++
          }

          if (-Not (Test-Path $GoLoginPath)) {
              Write-Host "Searching for GoLogin.exe in alternative AppData paths..."
              $Found = Get-ChildItem -Path "$env:USERPROFILE\AppData" -Filter "GoLogin.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($Found) {
                  $GoLoginPath = $Found.FullName
                  Write-Host "Found at $GoLoginPath"
              } else {
                  Write-Error "GoLogin.exe could not be found after installation."
                  exit 1
              }
          }

          Write-Host "Launching GoLogin..."
          Start-Process $GoLoginPath
          Write-Host "GoLogin installed and opened!"

      - name: Automate GoLogin Login (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          GOLOGIN_PASSWORD: "11223344"
        run: |
          Write-Host "Installing Python UI Automation tools..."
          pip install pyautogui pygetwindow

          Write-Host "Running Automation Script..."
          python -c "
          import pyautogui
          import pygetwindow as gw
          import time
          import os
          import sys

          print('Polling up to 60 seconds for GoLogin window to appear...')
          max_wait = 60
          wait_time = 0
          win = None

          while wait_time < max_wait:
              for title in ['Gologin', 'GoLogin', 'gologin']:
                  windows = gw.getWindowsWithTitle(title)
                  if windows:
                      win = windows[0]
                      break
              if win:
                  break
              time.sleep(2)
              wait_time += 2
              print(f'Waited {wait_time} seconds...')

          if win:
              try:
                  win.activate()
                  win.maximize()
              except Exception as e:
                  print('Could not maximize:', e)
              time.sleep(5)

              print('Navigating to Login page...')
              pyautogui.press('tab', presses=8, interval=0.5)
              pyautogui.press('enter')

              time.sleep(4)

              print('Entering credentials...')
              pyautogui.write(os.environ.get('GOLOGIN_EMAIL', ''))
              pyautogui.press('tab')

              pyautogui.write(os.environ.get('GOLOGIN_PASSWORD', ''))
              pyautogui.press('enter')

              print('Login automated successfully.')
          else:
              print('Could not find GoLogin window within time limit.')
              sys.exit(1)
          "

      # ------------------------------------------------------------------
      # WINDOWS: Parallel Background Auto-Installer
      #
      # Spawns ONE independent PowerShell background job per software item.
      # Each job watches the Downloads folder for its own file pattern and
      # installs immediately when found — completely independent of the others.
      # All three run simultaneously, so downloading two or three files at the
      # same time works perfectly: each watcher installs as soon as its own
      # file lands, without waiting for any other software to finish.
      # ------------------------------------------------------------------
      - name: Auto-Detect and Install Software in Background (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host " Parallel Background Auto-Installer is now ACTIVE" -ForegroundColor Cyan
          Write-Host " Three independent watchers started for:" -ForegroundColor Cyan
          Write-Host "   - AVG Antivirus  (*avg*.exe)" -ForegroundColor Yellow
          Write-Host "   - Opera GX       (OperaGXSetup.exe)" -ForegroundColor Yellow
          Write-Host "   - Opera One      (OperaSetup.exe)" -ForegroundColor Yellow
          Write-Host " Each installs silently the moment its download completes." -ForegroundColor Cyan
          Write-Host " All three run in parallel - no waiting on each other." -ForegroundColor Cyan
          Write-Host "============================================================" -ForegroundColor Cyan

          $dlFolder = "$env:USERPROFILE\Downloads"
          $timeoutMinutes = 55
          $timeoutSecs = $timeoutMinutes * 60

          # ---------------------------------------------------------------
          # Helper: returns $true if a file is fully written (not locked)
          # ---------------------------------------------------------------
          $waitUnlockedBlock = {
              param([string]$FilePath)
              while ($true) {
                  Start-Sleep -Seconds 2
                  try {
                      $stream = [System.IO.File]::Open($FilePath, 'Open', 'Read', 'None')
                      $stream.Close()
                      return  # File is readable / not locked
                  } catch {
                      # Still being written by browser, keep waiting
                  }
              }
          }

          # ---------------------------------------------------------------
          # Define the three watchers as script blocks.
          # Each block is self-contained and loops until it installs its
          # target OR the timeout is reached.
          # ---------------------------------------------------------------

          # --- AVG watcher ---
          $avgJob = Start-Job -ScriptBlock {
              param($dlFolder, $timeoutSecs)
              $deadline = (Get-Date).AddSeconds($timeoutSecs)
              $installed = $false

              while (-not $installed -and (Get-Date) -lt $deadline) {
                  $candidates = Get-ChildItem -Path $dlFolder -Filter "*avg*.exe" -ErrorAction SilentlyContinue |
                                Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } |
                                Sort-Object LastWriteTime -Descending

                  if ($candidates.Count -gt 0) {
                      $file = $candidates[0]
                      Write-Output "[AVG] Detected: $($file.Name)"
                      Write-Output "[AVG] Waiting for download to finish..."

                      # Wait until not locked
                      $locked = $true
                      while ($locked) {
                          Start-Sleep -Seconds 2
                          try {
                              $s = [System.IO.File]::Open($file.FullName, 'Open', 'Read', 'None')
                              $s.Close()
                              $locked = $false
                          } catch { }
                      }

                      Write-Output "[AVG] Download complete! Installing silently..."
                      Start-Process -FilePath $file.FullName -ArgumentList "/silent" -Wait
                      Write-Output "[AVG] Installation finished successfully!"
                      $installed = $true
                  } else {
                      Write-Output "[AVG] Still waiting for AVG download..."
                      Start-Sleep -Seconds 10
                  }
              }

              if (-not $installed) {
                  Write-Output "[AVG] TIMEOUT: AVG was not downloaded within the time limit."
              }
          } -ArgumentList $dlFolder, $timeoutSecs

          # --- Opera GX watcher ---
          $operaGXJob = Start-Job -ScriptBlock {
              param($dlFolder, $timeoutSecs)
              $deadline = (Get-Date).AddSeconds($timeoutSecs)
              $installed = $false

              while (-not $installed -and (Get-Date) -lt $deadline) {
                  $candidates = Get-ChildItem -Path $dlFolder -Filter "OperaGXSetup.exe" -ErrorAction SilentlyContinue |
                                Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } |
                                Sort-Object LastWriteTime -Descending

                  if ($candidates.Count -gt 0) {
                      $file = $candidates[0]
                      Write-Output "[OperaGX] Detected: $($file.Name)"
                      Write-Output "[OperaGX] Waiting for download to finish..."

                      $locked = $true
                      while ($locked) {
                          Start-Sleep -Seconds 2
                          try {
                              $s = [System.IO.File]::Open($file.FullName, 'Open', 'Read', 'None')
                              $s.Close()
                              $locked = $false
                          } catch { }
                      }

                      Write-Output "[OperaGX] Download complete! Installing silently..."
                      Start-Process -FilePath $file.FullName -ArgumentList "/silent /launchopera 0 /setdefaultbrowser 0" -Wait
                      Write-Output "[OperaGX] Installation finished successfully!"
                      $installed = $true
                  } else {
                      Write-Output "[OperaGX] Still waiting for Opera GX download..."
                      Start-Sleep -Seconds 10
                  }
              }

              if (-not $installed) {
                  Write-Output "[OperaGX] TIMEOUT: Opera GX was not downloaded within the time limit."
              }
          } -ArgumentList $dlFolder, $timeoutSecs

          # --- Opera One watcher ---
          $operaOneJob = Start-Job -ScriptBlock {
              param($dlFolder, $timeoutSecs)
              $deadline = (Get-Date).AddSeconds($timeoutSecs)
              $installed = $false

              while (-not $installed -and (Get-Date) -lt $deadline) {
                  # OperaSetup.exe but NOT OperaGXSetup.exe
                  $candidates = Get-ChildItem -Path $dlFolder -Filter "OperaSetup.exe" -ErrorAction SilentlyContinue |
                                Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } |
                                Sort-Object LastWriteTime -Descending

                  if ($candidates.Count -gt 0) {
                      $file = $candidates[0]
                      Write-Output "[OperaOne] Detected: $($file.Name)"
                      Write-Output "[OperaOne] Waiting for download to finish..."

                      $locked = $true
                      while ($locked) {
                          Start-Sleep -Seconds 2
                          try {
                              $s = [System.IO.File]::Open($file.FullName, 'Open', 'Read', 'None')
                              $s.Close()
                              $locked = $false
                          } catch { }
                      }

                      Write-Output "[OperaOne] Download complete! Installing silently..."
                      Start-Process -FilePath $file.FullName -ArgumentList "/silent /launchopera 0 /setdefaultbrowser 0" -Wait
                      Write-Output "[OperaOne] Installation finished successfully!"
                      $installed = $true
                  } else {
                      Write-Output "[OperaOne] Still waiting for Opera One download..."
                      Start-Sleep -Seconds 10
                  }
              }

              if (-not $installed) {
                  Write-Output "[OperaOne] TIMEOUT: Opera One was not downloaded within the time limit."
              }
          } -ArgumentList $dlFolder, $timeoutSecs

          # ---------------------------------------------------------------
          # Stream output from all three jobs in real time while they run.
          # We poll every 5 seconds and print any new output from each job.
          # Loop until all three jobs complete (State != Running).
          # ---------------------------------------------------------------
          Write-Host ""
          Write-Host "All three watchers are running in parallel. Streaming live output..." -ForegroundColor Cyan
          Write-Host ""

          $allJobs = @($avgJob, $operaGXJob, $operaOneJob)
          $deadline = (Get-Date).AddSeconds($timeoutSecs)

          while ($true) {
              # Print any buffered output from each job
              foreach ($job in $allJobs) {
                  $output = Receive-Job -Job $job -ErrorAction SilentlyContinue
                  if ($output) {
                      foreach ($line in $output) {
                          Write-Host $line
                      }
                  }
              }

              # Check if all jobs are done
              $runningCount = ($allJobs | Where-Object { $_.State -eq 'Running' }).Count
              if ($runningCount -eq 0) {
                  Write-Host ""
                  Write-Host "All watcher jobs have completed." -ForegroundColor Green
                  break
              }

              # Safety: stop polling if we've exceeded the deadline
              if ((Get-Date) -gt $deadline) {
                  Write-Host "Main polling loop reached timeout. Stopping jobs..." -ForegroundColor Yellow
                  $allJobs | Stop-Job -ErrorAction SilentlyContinue
                  break
              }

              Start-Sleep -Seconds 5
          }

          # Flush any remaining output after jobs finish
          foreach ($job in $allJobs) {
              $output = Receive-Job -Job $job -ErrorAction SilentlyContinue
              if ($output) {
                  foreach ($line in $output) { Write-Host $line }
              }
          }

          # Clean up job objects
          $allJobs | Remove-Job -Force -ErrorAction SilentlyContinue

          # ---------------------------------------------------------------
          # Final summary
          # ---------------------------------------------------------------
          Write-Host ""
          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host " Parallel Auto-Installer — Final Summary" -ForegroundColor Cyan
          Write-Host "============================================================" -ForegroundColor Cyan

          # Re-check what actually landed in Downloads as a confirmation
          $avgFound      = (Get-ChildItem -Path $dlFolder -Filter "*avg*.exe"       -ErrorAction SilentlyContinue | Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' }).Count -gt 0
          $operaGXFound  = (Get-ChildItem -Path $dlFolder -Filter "OperaGXSetup.exe" -ErrorAction SilentlyContinue | Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' }).Count -gt 0
          $operaOneFound = (Get-ChildItem -Path $dlFolder -Filter "OperaSetup.exe"   -ErrorAction SilentlyContinue | Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' }).Count -gt 0

          $avgStatus      = if ($avgFound)      { "Downloaded & Installed" } else { "Not downloaded" }
          $operaGXStatus  = if ($operaGXFound)  { "Downloaded & Installed" } else { "Not downloaded" }
          $operaOneStatus = if ($operaOneFound) { "Downloaded & Installed" } else { "Not downloaded" }

          Write-Host "  AVG Antivirus : $avgStatus"      -ForegroundColor $(if ($avgFound)      { "Green" } else { "Red" })
          Write-Host "  Opera GX      : $operaGXStatus"  -ForegroundColor $(if ($operaGXFound)  { "Green" } else { "Red" })
          Write-Host "  Opera One     : $operaOneStatus" -ForegroundColor $(if ($operaOneFound) { "Green" } else { "Red" })
          Write-Host "============================================================" -ForegroundColor Cyan

      - name: Keep Runner Alive (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Session is active. This runner will remain online until the job timeout is reached."
          Start-Sleep -Seconds 3600

      # ==========================================
      # macOS SPECIFIC STEPS
      # ==========================================
      - name: Setup GUI Authorization Credentials (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Creating 'admin' user with password 'admin'..."
          sudo sysadminctl -addUser admin -password admin -admin || true

          echo "Setting default runner password to 'admin' as well..."
          sudo sysadminctl -adminUser "$USER" -password admin || true

          echo "Credentials configured. You can now authorize macOS GUI prompts with Username: admin / Password: admin"

      - name: Install, Bypass Security, and Start Getscreen.me (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Downloading Getscreen.me Agent for macOS..."
          curl -L -o getscreen.dmg "https://getscreen.me/download/getscreen.dmg" --retry 3 --retry-delay 5

          DeviceName="${{ matrix.device }}"

          echo "Mounting DMG..."
          hdiutil attach getscreen.dmg -mountpoint /Volumes/getscreen -nobrowse -quiet

          APP_PATH=$(find /Volumes/getscreen -maxdepth 1 -name "*.app" | head -n 1)
          APP_NAME=$(basename "$APP_PATH")

          echo "Copying $APP_NAME to /Applications..."
          sudo cp -R "$APP_PATH" /Applications/
          hdiutil detach /Volumes/getscreen -quiet -force

          echo "Bypassing macOS Screen Recording & Accessibility Prompts..."
          APP_BUNDLE_ID=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleIdentifier)

          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" || true
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" || true

          EXEC_NAME=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleExecutable)
          EXEC_PATH="/Applications/$APP_NAME/Contents/MacOS/$EXEC_NAME"

          echo "Registering and Starting Getscreen.me..."
          sudo "$EXEC_PATH" -install || true
          sudo "$EXEC_PATH" -register "${{ matrix.email }}"
          sudo "$EXEC_PATH" -config "name='$DeviceName' autostart=true nonadmin=true control=true disable_confirmation=true"
          sudo "$EXEC_PATH" -start || true
          echo "Getscreen.me is running! Device Name set to: $DeviceName"

      - name: Download, Install, and Open GoLogin (macOS)
        if: runner.os == 'macOS'
        run: |
          OS_VERSION="${{ matrix.os }}"

          if [[ "$OS_VERSION" == "macos-13" || "$OS_VERSION" == "macos-26-intel" ]]; then
              echo "Downloading GoLogin Intel (x64) for $OS_VERSION..."
              curl -L -o gologin.dmg "https://dl.gologin.com/gologin.dmg" --retry 3 --retry-delay 5
          else
              echo "Downloading GoLogin ARM64 for Apple Silicon ($OS_VERSION)..."
              curl -L -o gologin.dmg "https://dl.gologin.com/gologin-arm64.dmg" --retry 3 --retry-delay 5
          fi

          echo "Mounting GoLogin DMG..."
          hdiutil attach gologin.dmg -mountpoint /Volumes/gologin -nobrowse -quiet

          echo "Installing GoLogin to Applications..."
          sudo cp -R /Volumes/gologin/GoLogin.app /Applications/
          hdiutil detach /Volumes/gologin -quiet -force

          echo "Launching GoLogin..."
          open /Applications/GoLogin.app

          echo "GoLogin installed and opened!"

      - name: Automate GoLogin Login (macOS Native)
        if: runner.os == 'macOS'
        env:
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          GOLOGIN_PASSWORD: "11223344"
        run: |
          echo "Injecting Accessibility permissions for osascript and System Events..."
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '/usr/bin/osascript', 1, 2, 4, 1, 0);" || true
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', 'com.apple.systemevents', 0, 2, 4, 1, 0);" || true

          echo "Waiting 30 seconds for GoLogin to completely render..."
          sleep 30

          echo "Automating keystrokes using AppleScript (Clipboard Method)..."
          osascript <<'EOF'
          set userEmail to system attribute "GOLOGIN_EMAIL"
          set userPass to system attribute "GOLOGIN_PASSWORD"

          tell application "System Events"
              tell application "GoLogin" to activate
              delay 3

              repeat 8 times
                  key code 48 -- Tab key
                  delay 0.5
              end repeat

              key code 36
              delay 4

              set the clipboard to userEmail
              delay 0.5
              keystroke "v" using command down
              delay 1

              key code 48
              delay 1

              set the clipboard to userPass
              delay 0.5
              keystroke "v" using command down
              delay 1

              key code 36
              delay 5
          end tell
          EOF

          echo "Login automation completed."

      # ------------------------------------------------------------------
      # macOS: Parallel Background Auto-Installer
      #
      # Spawns ONE independent background subshell per software item using
      # bash process substitution. Each watcher is fully independent:
      # detecting and installing its own file without blocking the others.
      # All three run simultaneously. A shared status file tracks which
      # items have been installed so the main loop can report correctly.
      # ------------------------------------------------------------------
      - name: Auto-Detect and Install Software in Background (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "============================================================"
          echo " Parallel Background Auto-Installer is now ACTIVE"
          echo " Three independent watchers started for:"
          echo "   - Opera GX   (Opera GX Installer.app or OperaGX*.dmg)"
          echo "   - Opera One  (Opera Installer.app or Opera*.dmg)"
          echo " Each installs automatically the moment its download finishes."
          echo " Both run in parallel - no waiting on each other."
          echo "============================================================"

          DL_FOLDER="$HOME/Downloads"
          TIMEOUT_SECS=$((55 * 60))
          STATUS_DIR="/tmp/installer_status_$$"
          mkdir -p "$STATUS_DIR"

          # Snapshot existing Opera files so we only act on NEW downloads
          SNAPSHOT_FILE="$STATUS_DIR/snapshot"
          find "$DL_FOLDER" -maxdepth 1 \( \
              -iname "*OperaGX*"        \
              -o -iname "*Opera GX*"    \
              -o -iname "*OperaSetup*"  \
              -o -iname "*Opera Installer*" \
              -o -iname "*Opera One*"   \
          \) -print 2>/dev/null > "$SNAPSHOT_FILE"

          # ---------------------------------------------------------------
          # Helper: true if path was NOT in the pre-run snapshot
          # ---------------------------------------------------------------
          is_new() {
              local item="$1"
              grep -qxF "$item" "$SNAPSHOT_FILE" 2>/dev/null && return 1
              return 0
          }

          # ---------------------------------------------------------------
          # Helper: wait until a .app bundle or file is stable/fully written
          # ---------------------------------------------------------------
          wait_until_stable() {
              local target="$1"
              if [[ -d "$target" ]]; then
                  local prev_size="-1"
                  local stable_count=0
                  while [ "$stable_count" -lt 3 ]; do
                      sleep 2
                      local curr_size
                      curr_size=$(du -sk "$target" 2>/dev/null | awk '{print $1}')
                      if [ "$curr_size" = "$prev_size" ]; then
                          stable_count=$((stable_count + 1))
                      else
                          stable_count=0
                      fi
                      prev_size="$curr_size"
                  done
              else
                  while lsof "$target" >/dev/null 2>&1; do
                      sleep 2
                  done
              fi
          }

          # ---------------------------------------------------------------
          # Helper: install a .app or .dmg
          # ---------------------------------------------------------------
          install_opera() {
              local target="$1"
              local label="$2"

              if [[ "$target" == *.app ]]; then
                  sudo cp -R "$target" /Applications/
                  echo "[$label] Copied $(basename "$target") to /Applications."
              elif [[ "$target" == *.dmg ]]; then
                  local mount_point="/Volumes/opera_install_$$_${label}"
                  hdiutil attach "$target" -mountpoint "$mount_point" -nobrowse -quiet
                  local app_inside
                  app_inside=$(find "$mount_point" -maxdepth 1 -name "*.app" | head -n 1)
                  if [ -n "$app_inside" ]; then
                      sudo cp -R "$app_inside" /Applications/
                      echo "[$label] Installed $(basename "$app_inside") to /Applications."
                  else
                      echo "[$label] Warning: No .app found inside DMG."
                  fi
                  hdiutil detach "$mount_point" -quiet -force 2>/dev/null || true
              fi
          }

          # ---------------------------------------------------------------
          # Opera GX watcher — runs in its own background subshell
          # ---------------------------------------------------------------
          (
              DEADLINE=$(($(date +%s) + TIMEOUT_SECS))
              INSTALLED=false

              while ! $INSTALLED && [ "$(date +%s)" -lt "$DEADLINE" ]; do
                  while IFS= read -r -d '' candidate; do
                      if is_new "$candidate" && [[ ! "$candidate" =~ \.(crdownload|download|part)$ ]]; then
                          echo "[OperaGX] Detected: $(basename "$candidate")"
                          echo "[OperaGX] Waiting for download to complete..."
                          wait_until_stable "$candidate"
                          echo "[OperaGX] Download finished! Installing..."
                          install_opera "$candidate" "OperaGX"
                          echo "[OperaGX] Installation complete!"
                          touch "$STATUS_DIR/opera_gx_done"
                          INSTALLED=true
                          break
                      fi
                  done < <(find "$DL_FOLDER" -maxdepth 1 \( \
                      -iname "*OperaGX*" -o -iname "*Opera GX*" \
                  \) -print0 2>/dev/null)

                  if ! $INSTALLED; then
                      echo "[OperaGX] Still waiting for Opera GX download..."
                      sleep 10
                  fi
              done

              if ! $INSTALLED; then
                  echo "[OperaGX] TIMEOUT: Opera GX was not downloaded in time."
                  touch "$STATUS_DIR/opera_gx_timeout"
              fi
          ) &
          GX_PID=$!

          # ---------------------------------------------------------------
          # Opera One watcher — runs in its own background subshell
          # ---------------------------------------------------------------
          (
              DEADLINE=$(($(date +%s) + TIMEOUT_SECS))
              INSTALLED=false

              while ! $INSTALLED && [ "$(date +%s)" -lt "$DEADLINE" ]; do
                  while IFS= read -r -d '' candidate; do
                      if is_new "$candidate" && [[ ! "$candidate" =~ \.(crdownload|download|part)$ ]]; then
                          echo "[OperaOne] Detected: $(basename "$candidate")"
                          echo "[OperaOne] Waiting for download to complete..."
                          wait_until_stable "$candidate"
                          echo "[OperaOne] Download finished! Installing..."
                          install_opera "$candidate" "OperaOne"
                          echo "[OperaOne] Installation complete!"
                          touch "$STATUS_DIR/opera_one_done"
                          INSTALLED=true
                          break
                      fi
                  done < <(find "$DL_FOLDER" -maxdepth 1 \( \
                      -iname "*OperaSetup*"         \
                      -o -iname "*Opera Installer*" \
                      -o -iname "*Opera One*"       \
                  \) ! -iname "*OperaGX*" ! -iname "*Opera GX*" -print0 2>/dev/null)

                  if ! $INSTALLED; then
                      echo "[OperaOne] Still waiting for Opera One download..."
                      sleep 10
                  fi
              done

              if ! $INSTALLED; then
                  echo "[OperaOne] TIMEOUT: Opera One was not downloaded in time."
                  touch "$STATUS_DIR/opera_one_timeout"
              fi
          ) &
          ONE_PID=$!

          echo "Watchers running in background (PIDs: GX=$GX_PID, One=$ONE_PID)"
          echo "Waiting for both to finish (or timeout)..."

          # Wait for both background jobs to finish
          wait $GX_PID
          wait $ONE_PID

          # ---------------------------------------------------------------
          # Final summary
          # ---------------------------------------------------------------
          echo ""
          echo "============================================================"
          echo " Parallel Auto-Installer — Final Summary"
          echo "============================================================"

          if [ -f "$STATUS_DIR/opera_gx_done" ]; then
              echo "  Opera GX  : Downloaded & Installed ✓"
          else
              echo "  Opera GX  : NOT installed (not downloaded in time) ✗"
          fi

          if [ -f "$STATUS_DIR/opera_one_done" ]; then
              echo "  Opera One : Downloaded & Installed ✓"
          else
              echo "  Opera One : NOT installed (not downloaded in time) ✗"
          fi

          echo "============================================================"

          # Cleanup
          rm -rf "$STATUS_DIR"

      - name: Keep Runner Alive (macOS)
        if: always() && runner.os == 'macOS'
        run: |
          echo "Session is active. This runner will remain online until the job timeout is reached."
          sleep 3600
