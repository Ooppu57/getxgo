      - name: Setup Auto-Downloader & Software Installation (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          SOFTWARE_TYPE: ${{ matrix.software_type }}
          TARGET_URL:    ${{ matrix.target_url }}
        run: |
          echo "============================================================"
          echo " [$(date '+%H:%M:%S')] Zero-Touch Downloader & Installer (macOS)"
          echo " Category  : $SOFTWARE_TYPE"
          echo " Target URL: $TARGET_URL"
          echo "============================================================"

          # Skip if no software to install
          if [ "$SOFTWARE_TYPE" = "none" ] || [ -z "$TARGET_URL" ]; then
            echo "[$(date '+%H:%M:%S')] SOFTWARE_TYPE=none or no URL — skipping software installation."
            exit 0
          fi

          DL_FOLDER="$HOME/Downloads"
          SENTINEL_PATH="/tmp/download_done.flag"
          INSTALLER_SENTINEL="/tmp/installer_executed.flag"
          TIMEOUT_SECS=420

          # ── Write the Python macOS handler ──────────────────────────────
          cat > /tmp/macos_handler.py << 'PYEOF'
          import time, sys, os, subprocess, random

          def log(msg):
              ts = time.strftime("%H:%M:%S")
              print(f"[{ts}] {msg}", flush=True)

          CHROME_WARMUP_SECS = 20

          def clipboard_set(text):
              try:
                  proc = subprocess.Popen(['pbcopy'], stdin=subprocess.PIPE,
                      stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                  proc.communicate(input=text.encode('utf-8'), timeout=5)
                  time.sleep(0.15)
                  return proc.returncode == 0
              except Exception as e:
                  log(f"[Clipboard] pbcopy error: {e}")
                  return False

          def run_as(script, silent=False, timeout=20):
              try:
                  r = subprocess.run(["osascript", "-e", script],
                      capture_output=True, text=True, timeout=timeout)
                  if r.returncode != 0 and not silent:
                      log(f"[AppleScript] stderr: {r.stderr.strip()[:120]}")
                  return r.stdout.strip()
              except subprocess.TimeoutExpired:
                  if not silent: log("[AppleScript] Timed out")
                  return ""
              except Exception as e:
                  if not silent: log(f"[AppleScript] Exception: {e}")
                  return ""

          def cliclick(cmd):
              try:
                  result = subprocess.run(['cliclick', cmd], capture_output=True, text=True, timeout=5)
                  return result.returncode == 0
              except Exception as e:
                  log(f"[cliclick] Error: {e}"); return False

          def press(key_name):
              key_map = {"tab": 48, "return": 36, "space": 49, "escape": 53,
                         "right": 124, "left": 123, "up": 126, "down": 125}
              code = key_map.get(key_name.lower())
              if code:
                  run_as(f'tell application "System Events" to key code {code}', silent=True)

          def running_apps():
              r = run_as('tell application "System Events" to get name of every process '
                         'whose visible is true', silent=True)
              return [n.strip() for n in r.split(",") if n.strip()]

          def click_button_in_opera(label, timeout=5):
              result = run_as(fr'''
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName contains "Opera" then
                try
                  repeat with win in (every window of proc)
                    try
                      if exists button "{label}" of win then
                        click button "{label}" of win
                        return "clicked"
                      end if
                    end try
                  end repeat
                end try
              end if
            end repeat
            return "not_found"
          end tell
          ''', silent=True, timeout=timeout)
              if result and "clicked" in result:
                  log(f"[ButtonClick] Clicked '{label}'")
                  return True
              return False

          def dismiss_system_popups():
              result = run_as(r'''
          tell application "System Events"
            set clicked to ""
            try
              tell process "CoreServicesUIAgent"
                repeat with win in (every window)
                  try
                    if exists button "Allow" of win then
                      click button "Allow" of win
                      set clicked to "CoreServicesUIAgent"
                    end if
                  end try
                end repeat
              end tell
            end try
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName is not "Google Chrome" then
                try
                  repeat with win in (every window of proc)
                    set wT to ""
                    try
                      set wT to (title of win) as string
                    end try
                    if wT contains "local network" or wT contains "Local Network" or ¬
                       wT contains "hosted-compute" or wT contains "incoming network" then
                      try
                        click button "Allow" of win
                        set clicked to "system_popup"
                      end try
                    end if
                    if pName contains "etscreen" then
                      try
                        if exists button "Allow" of win then
                          click button "Allow" of win
                          set clicked to "getscreen"
                        end if
                      end try
                    end if
                  end repeat
                end try
              end if
            end repeat
            return clicked
          end tell
          ''', silent=True)
              if result and result.strip():
                  log(f"[SystemPopup] Dismissed: {result.strip()}")
                  return True
              return False

          def wait_for_app_launch(app_name, timeout=120):
              log(f"[LaunchDetect] Waiting for '{app_name}' (up to {timeout}s)...")
              start = time.time()
              while time.time() - start < timeout:
                  apps = running_apps()
                  if any(app_name.lower() in a.lower() for a in apps):
                      log(f"[LaunchDetect] ✓ '{app_name}' is running!")
                      time.sleep(2)
                      return True
                  elapsed = int(time.time() - start)
                  if elapsed % 15 == 0 and elapsed > 0:
                      log(f"[LaunchDetect] Still waiting for '{app_name}'... ({elapsed}s)")
                  time.sleep(1)
              log(f"[LaunchDetect] '{app_name}' did not launch within {timeout}s.")
              return False

          def click_accept_and_install(app_name):
              log(f"[{app_name}] Looking for Accept/Install button...")
              script = f'''
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName contains "{app_name}" or pName contains "Opera" then
                try
                  repeat with win in (every window of proc)
                    try
                      if exists button "Accept and Install" of win then
                        click button "Accept and Install" of win
                        return "clicked_accept_and_install"
                      end if
                    end try
                    try
                      if exists button "Accept" of win then
                        click button "Accept" of win
                        return "clicked_accept"
                      end if
                    end try
                    try
                      if exists button "Install" of win then
                        click button "Install" of win
                        return "clicked_install"
                      end if
                    end try
                  end repeat
                end try
              end if
            end repeat
            return "not_found"
          end tell'''
              result = run_as(script, silent=True)
              log(f"[{app_name}] Button result: {result}")
              return result

          def close_chrome():
              run_as('tell application "Google Chrome" to quit', silent=True)
              log("[Chrome] Quit signal sent.")

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # OPERA GX POST-INSTALL (macOS) — Robust, Detailed Logging
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          def opera_gx_flow():
              log("[Opera GX macOS] ===== POST-INSTALL SEQUENCE STARTING =====")
              if not wait_for_app_launch("Opera GX", timeout=120):
                  log("[Opera GX macOS] Opera GX did not launch within 120s. Aborting.")
                  return
              log("[Opera GX macOS] STEP 1: Activating Opera GX window...")
              run_as('tell application "Opera GX" to activate', silent=True)
              time.sleep(2)

              log("[Opera GX macOS] STEP 2: Dismissing popups for 10 seconds...")
              t0 = time.time()
              while time.time() - t0 < 10:
                  dismiss_system_popups()
                  time.sleep(0.5)

              log("[Opera GX macOS] STEP 3: Clicking 'Accept and Install' button...")
              result = click_accept_and_install("Opera GX")
              if result == "not_found":
                  log("[Opera GX macOS] STEP 3: Not found — Tab x3 + Enter fallback...")
                  for i in range(3):
                      press("tab"); time.sleep(0.5)
                  press("return")
              else:
                  log(f"[Opera GX macOS] STEP 3 COMPLETE: {result}")

              log("[Opera GX macOS] STEP 4: Waiting 30 seconds (dismissing popups)...")
              for s in range(30):
                  dismiss_system_popups()
                  if s % 10 == 0 and s > 0:
                      log(f"[Opera GX macOS] STEP 4: {s}/30s elapsed...")
                  time.sleep(1)

              log("[Opera GX macOS] STEP 5: Tab x4 then Enter x8 (setup wizard)...")
              for i in range(4):
                  log(f"[Opera GX macOS] STEP 5: Tab {i+1}/4")
                  press("tab"); time.sleep(0.5)
              for i in range(8):
                  d = random.uniform(1.0, 2.0)
                  log(f"[Opera GX macOS] STEP 5: ENTER {i+1}/8 (delay {d:.2f}s)")
                  press("return"); time.sleep(d)
                  dismiss_system_popups()

              time.sleep(5)

              tab_count = random.randint(6, 14)
              log(f"[Opera GX macOS] STEP 6: Tab x{tab_count} then final Enter (cycle)...")
              run_as('tell application "System Events" to keystroke "n" using command down', silent=True)
              time.sleep(random.uniform(1, 2))
              for i in range(tab_count):
                  log(f"[Opera GX macOS] STEP 6: Tab {i+1}/{tab_count}")
                  press("tab"); time.sleep(random.uniform(1.0, 2.0))
                  dismiss_system_popups()
              press("return")
              log("[Opera GX macOS] ===== POST-INSTALL SEQUENCE COMPLETE =====")

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # OPERA ONE POST-INSTALL (macOS) — Robust, Detailed Logging
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          def opera_one_flow():
              log("[Opera One macOS] ===== POST-INSTALL SEQUENCE STARTING =====")
              if not wait_for_app_launch("Opera Installer", timeout=120):
                  log("[Opera One macOS] Installer not seen — attempting manual launch...")
                  if os.path.exists("/Applications/Opera Installer.app"):
                      subprocess.run(["open", "/Applications/Opera Installer.app"])
                      time.sleep(5)
                  else:
                      found = subprocess.run(
                          "find /Applications -maxdepth 2 -name 'Opera*.app' 2>/dev/null | head -1",
                          shell=True, capture_output=True, text=True).stdout.strip()
                      if found:
                          subprocess.run(["open", found]); time.sleep(5)
                  if not wait_for_app_launch("Opera", timeout=60):
                      log("[Opera One macOS] Opera window not found. Aborting.")
                      return

              log("[Opera One macOS] STEP 1: Activating Opera Installer...")
              run_as('tell application "System Events" to tell process "Opera Installer" to set frontmost to true', silent=True)
              time.sleep(2)

              log("[Opera One macOS] STEP 2: Dismissing popups for 10 seconds...")
              t0 = time.time()
              while time.time() - t0 < 10:
                  dismiss_system_popups()
                  time.sleep(0.5)

              log("[Opera One macOS] STEP 3: Clicking 'Accept and Install' button...")
              result = click_accept_and_install("Opera")
              if result == "not_found":
                  log("[Opera One macOS] STEP 3: Not found — Tab x3 + Enter fallback...")
                  for i in range(3):
                      press("tab"); time.sleep(0.5)
                  press("return")
              else:
                  log(f"[Opera One macOS] STEP 3 COMPLETE: {result}")

              log("[Opera One macOS] STEP 4: Waiting 30 seconds for installation (dismissing popups)...")
              for s in range(30):
                  dismiss_system_popups()
                  if s % 10 == 0 and s > 0:
                      log(f"[Opera One macOS] STEP 4: {s}/30s elapsed...")
                  time.sleep(1)

              log("[Opera One macOS] STEP 5: Clicking 'Next' button 7 times (3s delay each)...")
              for i in range(1, 8):
                  log(f"[Opera One macOS] STEP 5: Next click {i}/7...")
                  clicked = click_button_in_opera("Next")
                  if not clicked:
                      log(f"[Opera One macOS] STEP 5: 'Next' not found on attempt {i} — Tab+Enter fallback...")
                      press("tab"); time.sleep(0.3); press("return")
                  dismiss_system_popups()
                  log(f"[Opera One macOS] STEP 5: Waiting 3s after Next {i}/7...")
                  time.sleep(3)

              log("[Opera One macOS] STEP 6: Looking for 'Get Started' button...")
              if click_button_in_opera("Get Started"):
                  log("[Opera One macOS] STEP 6: 'Get Started' clicked.")
                  time.sleep(2)
              else:
                  log("[Opera One macOS] STEP 6: 'Get Started' not found — skipping.")

              log("[Opera One macOS] STEP 7: Looking for 'Submit' button...")
              if click_button_in_opera("Submit"):
                  log("[Opera One macOS] STEP 7: 'Submit' clicked.")
              else:
                  log("[Opera One macOS] STEP 7: 'Submit' not found — pressing ENTER fallback.")
                  press("return")
              time.sleep(2)

              log("[Opera One macOS] STEP 8: Opening new tab (Cmd+N)...")
              run_as('tell application "System Events" to keystroke "n" using command down', silent=True)
              time.sleep(random.uniform(1, 2))

              tab_count = random.randint(6, 12)
              log(f"[Opera One macOS] STEP 9: Tab x{tab_count} (cycle navigation)...")
              for i in range(tab_count):
                  log(f"[Opera One macOS] STEP 9: Tab {i+1}/{tab_count}")
                  press("tab"); time.sleep(random.uniform(1, 2))
                  dismiss_system_popups()

              log("[Opera One macOS] STEP 10: Pressing final ENTER...")
              press("return")
              log("[Opera One macOS] ===== POST-INSTALL SEQUENCE COMPLETE =====")

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # MAIN HANDLER (macOS)
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          def handle(sw_type, timeout=480):
              t0 = time.time()
              sentinel           = "/tmp/download_done.flag"
              installer_sentinel = "/tmp/installer_executed.flag"

              chrome_first_seen  = None
              dl_clicked         = False
              chrome_closed      = False
              setup_done         = False
              op_launch_t        = None
              last_popup_dismiss = 0
              last_dl_try        = 0

              log(f"[Handler macOS] ===== HANDLER STARTED (type={sw_type}) =====")

