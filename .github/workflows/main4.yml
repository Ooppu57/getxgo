name: Parallel Win/Mac Unified

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Select OS Runner Version'
        required: true
        type: choice
        options:
          - 'windows-2025'
          - 'windows-2022'
          - 'windows-11-arm'
          - 'macos-14'
          - 'macos-15'
          - 'macos-26'
          - 'macos-26-intel'
        default: 'windows-2025'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'techx@justzeus.com'
      gologin_email:
        description: 'GoLogin Account Email'
        required: true
        type: string
        default: 'om2@mnb.net'
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '5'
      num_clicks:
        description: 'Number of Click-Only Devices (rest will Install)'
        required: true
        type: choice
        options:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '3'
      software_choice:
        description: 'Select Software & Affiliate Link'
        required: true
        type: choice
        options:
          - 'AVG - TechxTrader'
          - 'AVG - B4Books'
          - 'AVG - F.Ahmad'
          - 'OperaGX - B4Books'
          - 'Opera - Techx'
          - 'Opera - Fatradez'
          - 'Opera - James'
          - 'Opera - Oliver'
          - 'Opera - Mahal'
          - 'Opera - Polar'
          - 'Opera - B4Books'
          - 'Opera-One - Esmeel'
          - 'Opera-One - Harrari'
          - 'Opera-One - Chloe'
          - 'Opera-One - Daisy'
          - 'Opera-One - Jimmy'
          - 'Ad-MVN - Techx'
          - 'Ad-MVN - B4Books'
          - 'Ad-MVN - Orderflowz'
          - 'Ad-MVN - A2Z'
        default: 'Ad-MVN - Techx'
      run_manual_url:
        description: 'Use Manual URL (overrides software choice if checked)'
        required: true
        type: boolean
        default: false
      manual_url:
        description: 'Manual Software URL (only used if Use Manual URL is checked)'
        required: false
        type: string
        default: 'https://checkmyapp.space/sl/v1nrr'

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Generate Dynamic Matrix
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          NUM_CLICKS: ${{ inputs.num_clicks }}
          OS_VERSION: ${{ inputs.os_version }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          RUN_MANUAL: ${{ inputs.run_manual_url }}
          MANUAL_URL: ${{ inputs.manual_url }}
        run: |
          import os, json, random

          email          = os.environ.get("EMAIL", "").strip()
          num_devices    = int(os.environ.get("NUM_DEVICES", "1"))
          num_clicks_raw = int(os.environ.get("NUM_CLICKS", "0"))
          num_clicks     = min(num_clicks_raw, num_devices)
          num_installs   = num_devices - num_clicks
          os_version     = os.environ.get("OS_VERSION", "windows-2025")
          software_choice = os.environ.get("SOFTWARE_CHOICE", "Ad-MVN - Techx")
          run_manual     = os.environ.get("RUN_MANUAL", "false").lower() == "true"
          manual_url_in  = os.environ.get("MANUAL_URL", "").strip()

          # ── All affiliate URL maps ──────────────────────────────────────────
          avg_urls = {
              "AVG - TechxTrader": "https://u.to/a-trdr/GoeNIg",
              "AVG - B4Books":     "https://u.to/a-b4b/O4eNIg",
              "AVG - F.Ahmad":     "https://u.to/a-fahmad/ooeNIg",
          }
          opera_urls = {
              "OperaGX - B4Books":  "https://u.to/opx-b4b/2nh4Ig",
              "Opera - Techx":      "https://u.to/techxsm/xVyFIg",
              "Opera - Fatradez":   "https://u.to/fatradezsm/cF2FIg",
              "Opera - James":      "https://u.to/jamesxsm/eV2FIg",
              "Opera - Oliver":     "https://u.to/oliverxsm/f12FIg",
              "Opera - Mahal":      "https://u.to/mahalxsm/iF2FIg",
              "Opera - Polar":      "https://u.to/opxplr/wzh4Ig",
              "Opera - B4Books":    "https://u.to/opx-b4b/2nh4Ig",
          }
          opera_one_urls = {
              "Opera-One - Esmeel":  "https://u.to/esmlxopo/cTOGIg",
              "Opera-One - Harrari": "https://u.to/hararixopo/zTOGIg",
              "Opera-One - Chloe":   "https://u.to/chloexopo/_DOGIg",
              "Opera-One - Daisy":   "https://u.to/daisyxopo/LjSGIg",
              "Opera-One - Jimmy":   "https://u.to/jmy/mUZ4Ig",
          }
          ad_mvn_urls = {
              "Ad-MVN - Techx":      "https://u.to/techxadmvnxsmrt/gvd7Ig",
              "Ad-MVN - B4Books":    "https://u.to/b4bxadmvnxsmrt/5-h7Ig",
              "Ad-MVN - Orderflowz": "https://u.to/ordrflzadmvnxsmrt/-fZ7Ig",
              "Ad-MVN - A2Z":        "https://u.to/a2zadmvnxsmrt/Y-t7Ig",
          }
          all_urls = {**avg_urls, **opera_urls, **opera_one_urls, **ad_mvn_urls}

          # ── Determine target URL and software type ─────────────────────────
          if run_manual and manual_url_in:
              target_url    = manual_url_in
              software_type = "dynamic_opera"
              exe_filter    = "*.exe"
              dmg_filter    = "*Opera*"
              print(f"[Target] Manual URL override active: {target_url}")
          else:
              target_url = all_urls.get(software_choice, "https://u.to/techxadmvnxsmrt/gvd7Ig")
              if software_choice.startswith("AVG"):
                  software_type = "avg"
                  exe_filter    = "*avg*.exe"
                  dmg_filter    = "*AVG*"
              elif software_choice == "OperaGX - B4Books":
                  software_type = "opera_gx"
                  exe_filter    = "OperaGXSetup*.exe"
                  dmg_filter    = "*Opera*GX*"
              elif software_choice.startswith("Opera-One"):
                  software_type = "opera_one"
                  exe_filter    = "OperaSetup*.exe"
                  dmg_filter    = "*Opera*"
              elif software_choice.startswith("Ad-MVN"):
                  software_type = "dynamic_opera"
                  exe_filter    = "*Opera*Setup*.exe"
                  dmg_filter    = "*Opera*"
              else:
                  # Opera - * (smart links)
                  software_type = "opera_smart_link"
                  exe_filter    = "*Opera*Setup*.exe"
                  dmg_filter    = "*Opera*"
              print(f"[Target] Software: {software_choice} | Type: {software_type} | URL: {target_url}")

          # ── Build action list: install then click, shuffled ────────────────
          action_list = ["install"] * num_installs + ["click"] * num_clicks
          random.shuffle(action_list)
          print(f"[Actions] install={num_installs} click={num_clicks} order={action_list}")

          # ── Short name helpers ─────────────────────────────────────────────
          def short_os(v):
              m = {"windows-2025":"W25","windows-2022":"W22","windows-11-arm":"W11A",
                   "macos-14":"M14","macos-15":"M15","macos-26":"M26","macos-26-intel":"M26I"}
              return m.get(v, "OS")

          def short_sw(choice):
              if run_manual and manual_url_in:
                  return "MANUAL"
              pm = {"AVG":"AVG","OperaGX":"OPX","Opera-One":"OPO","Ad-MVN":"MVN","Opera":"OP"}
              for k, p in pm.items():
                  if choice.startswith(k):
                      parts = choice.split(" - ", 1)
                      return f"{p}-{parts[1].replace(' ','')}" if len(parts) > 1 else p
              return choice.replace(" ","")[:8]

          short_os_tag = short_os(os_version)
          short_sw_tag = short_sw(software_choice)

          includes = []
          if email:
              for i in range(1, num_devices + 1):
                  action_mode = action_list[i - 1]
                  action_cap  = action_mode.capitalize()
                  device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_cap}"
                  includes.append({
                      "device":        device_name,
                      "email":         email,
                      "os":            os_version,
                      "target_url":    target_url,
                      "software_type": software_type,
                      "exe_filter":    exe_filter,
                      "dmg_filter":    dmg_filter,
                      "action_mode":   action_mode,
                  })
                  print(f"[Device] {device_name} | {action_mode} | {software_type}")

          if not includes:
              print("ERROR: No valid configuration generated.")
              exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")
          print("========== MATRIX GENERATION COMPLETE ==========")

      - name: Update Workflow Defaults (Remember Inputs)
        shell: python
        env:
          OS_VERSION:       ${{ inputs.os_version }}
          GETSCREEN_EMAIL:  ${{ inputs.getscreen_email }}
          GOLOGIN_EMAIL:    ${{ inputs.gologin_email }}
          NUM_DEVICES:      ${{ inputs.num_devices }}
          NUM_CLICKS:       ${{ inputs.num_clicks }}
          SOFTWARE_CHOICE:  ${{ inputs.software_choice }}
          RUN_MANUAL:       ${{ inputs.run_manual_url }}
          MANUAL_URL:       ${{ inputs.manual_url }}
        run: |
          import re, os

          file_path = ".github/workflows/main4.yml"
          if not os.path.exists(file_path):
              print(f"File {file_path} not found. Skipping auto-save.")
              exit(0)

          with open(file_path, "r", encoding="utf-8") as f:
              content = f.read()

          def update_str_default(input_name, new_val):
              global content
              pattern = r"(" + re.escape(input_name) + r":[\s\S]*?default:\s*')[^']*(')"
              content = re.sub(pattern, rf"\g<1>{new_val}\g<2>", content, count=1)

          def update_bool_default(input_name, new_val):
              global content
              val_str = "true" if str(new_val).lower() == "true" else "false"
              pattern = r"(" + re.escape(input_name) + r":[\s\S]*?default:\s*)(true|false)"
              content = re.sub(pattern, rf"\g<1>{val_str}", content, count=1)

          update_str_default("os_version",       os.environ.get("OS_VERSION", ""))
          update_str_default("getscreen_email",   os.environ.get("GETSCREEN_EMAIL", ""))
          update_str_default("gologin_email",     os.environ.get("GOLOGIN_EMAIL", ""))
          update_str_default("num_devices",       os.environ.get("NUM_DEVICES", ""))
          update_str_default("num_clicks",        os.environ.get("NUM_CLICKS", ""))
          update_str_default("software_choice",   os.environ.get("SOFTWARE_CHOICE", ""))
          update_bool_default("run_manual_url",   os.environ.get("RUN_MANUAL", "false"))
          run_manual = os.environ.get("RUN_MANUAL", "false").lower() == "true"
          if run_manual:
              update_str_default("manual_url",    os.environ.get("MANUAL_URL", ""))
          else:
              update_str_default("manual_url",    "")

          with open(file_path, "w", encoding="utf-8") as f:
              f.write(content)
          print("[Workflow State] Defaults updated successfully.")

      - name: Commit and Push New Defaults
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/main4.yml
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Update last used inputs [skip ci]" && git push)

  # ═══════════════════════════════════════════════════════════════════════════
  # REMOTE SESSION JOB — runs in parallel on each matrix device
  # ═══════════════════════════════════════════════════════════════════════════
  remote_session:
    name: Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:

      # ════════════════════════════════════════════════════════════════════
      # ── WINDOWS STEPS ──────────────────────────────────────────────────
      # ════════════════════════════════════════════════════════════════════

      # ── 1-W: Disable Defender & SmartScreen ────────────────────────────
      - name: Disable Windows Defender & Edge SmartScreen (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "======= SYSTEM PREP (Windows) =======" -ForegroundColor Cyan
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          Set-MpPreference -PUAProtection 0 -ErrorAction SilentlyContinue
          Set-MpPreference -DisableBlockAtFirstSeen $true -ErrorAction SilentlyContinue
          Set-MpPreference -DisableIOAVProtection $true -ErrorAction SilentlyContinue
          $edgePolicy = "HKLM:\SOFTWARE\Policies\Microsoft\Edge"
          if (-not (Test-Path $edgePolicy)) { New-Item -Path $edgePolicy -Force | Out-Null }
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenEnabled"                           -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenPuaEnabled"                        -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "DownloadRestrictions"                         -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "PreventSmartScreenPromptOverride"             -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "PreventSmartScreenPromptOverrideForFiles"     -Value 0
          $exemptPath = "$edgePolicy\ExemptDomainFileTypePairsFromFileTypeDownloadWarnings"
          if (-not (Test-Path $exemptPath)) { New-Item -Path $exemptPath -Force | Out-Null }
          Set-ItemProperty -Path $exemptPath -Name "1" -Value '{"domains":["*"],"file_extension":"exe"}'
          Write-Host "[OK] Windows Defender and SmartScreen configured." -ForegroundColor Green

      # ── 2-W: Install & Start Getscreen.me ──────────────────────────────
      - name: Install and Start Getscreen.me (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "======= GETSCREEN.ME AGENT (Windows) =======" -ForegroundColor Cyan
          $MaxRetries = 3; $RetryCount = 0; $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://getscreen.me/download/getscreen.msi" -OutFile "getscreen.msi" -ErrorAction Stop
                  if ((Get-Item "getscreen.msi").length -gt 1MB) { $Success = $true }
                  else { Write-Host "File too small, retrying..."; $RetryCount++; Start-Sleep 5 }
              } catch { $RetryCount++; Write-Host "Download failed ($RetryCount/$MaxRetries)"; Start-Sleep 5 }
          }
          if (-not $Success) { Write-Error "Getscreen download failed after $MaxRetries attempts"; exit 1 }
          $DeviceName = "${{ matrix.device }}"
          $InstallArgs = "/i getscreen.msi /qn REGISTER=`"${{ matrix.email }}`" CONFIG=`"name='$DeviceName' autostart=true nonadmin=true control=true disable_confirmation=true`""
          Start-Process msiexec.exe -Wait -ArgumentList $InstallArgs
          Write-Host "[OK] Getscreen.me configured for device: $DeviceName" -ForegroundColor Green

      # ── 3-W: Download, Install & Open GoLogin ──────────────────────────
      - name: Download, Install, and Open GoLogin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "======= GOLOGIN SETUP (Windows) =======" -ForegroundColor Cyan
          $MaxRetries = 3; $RetryCount = 0; $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://dl.gologin.com/gologin.exe" -OutFile "gologin_installer.exe" -ErrorAction Stop
                  if ((Get-Item "gologin_installer.exe").length -gt 10MB) { $Success = $true }
                  else { Write-Host "File too small, retrying..."; $RetryCount++; Start-Sleep 5 }
              } catch { $RetryCount++; Write-Host "Download failed ($RetryCount/$MaxRetries)"; Start-Sleep 5 }
          }
          if (-not $Success) { Write-Error "GoLogin download failed"; exit 1 }
          Write-Host "[*] Installing GoLogin silently..."
          Start-Process -FilePath ".\gologin_installer.exe" -ArgumentList "/S" -Wait
          $GoLoginPath = "$env:USERPROFILE\AppData\Local\Programs\GoLogin\GoLogin.exe"
          $WaitAttempts = 0
          while (-Not (Test-Path $GoLoginPath) -and $WaitAttempts -lt 30) { Start-Sleep 2; $WaitAttempts++ }
          if (-Not (Test-Path $GoLoginPath)) {
              $Found = Get-ChildItem -Path "$env:USERPROFILE\AppData" -Filter "GoLogin.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($Found) { $GoLoginPath = $Found.FullName }
              else { Write-Error "GoLogin.exe not found after install"; exit 1 }
          }
          Write-Host "[*] Launching GoLogin from: $GoLoginPath"
          Start-Process $GoLoginPath
          Write-Host "[OK] GoLogin installed and launched." -ForegroundColor Green

      # ── 4-W: Automate GoLogin Login ────────────────────────────────────
      - name: Automate GoLogin Login (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOLOGIN_EMAIL:    ${{ inputs.gologin_email }}
          GOLOGIN_PASSWORD: "11223344"
        run: |
          Write-Host "======= GOLOGIN LOGIN AUTOMATION (Windows) =======" -ForegroundColor Cyan
          pip install pyautogui pygetwindow --quiet
          python -c "
          import pyautogui, pygetwindow as gw, time, os, sys
          max_wait = 60; wait_time = 0; win = None
          print('Polling for GoLogin window (up to 60s)...')
          while wait_time < max_wait:
              for title in ['Gologin', 'GoLogin', 'gologin']:
                  windows = gw.getWindowsWithTitle(title)
                  if windows: win = windows[0]; break
              if win: break
              time.sleep(2); wait_time += 2
              print(f'  Waited {wait_time}s...')
          if win:
              try: win.activate(); win.maximize()
              except: pass
              time.sleep(5)
              print('Navigating to login tab (Tab x8, Enter)...')
              pyautogui.press('tab', presses=8, interval=0.5)
              pyautogui.press('enter')
              time.sleep(4)
              print('Entering credentials...')
              pyautogui.write(os.environ.get('GOLOGIN_EMAIL', ''))
              pyautogui.press('tab')
              pyautogui.write(os.environ.get('GOLOGIN_PASSWORD', ''))
              pyautogui.press('enter')
              print('[OK] Login automation complete.')
          else:
              print('[ERROR] GoLogin window not found.'); sys.exit(1)
          "

      # ── 5-W: Wait for GoLogin Profile & Run Software URL ───────────────
      - name: Wait for GoLogin Orbita Profile & Run Software (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET_URL:    ${{ matrix.target_url }}
          SOFTWARE_TYPE: ${{ matrix.software_type }}
          EXE_FILTER:    ${{ matrix.exe_filter }}
          ACTION_MODE:   ${{ matrix.action_mode }}
        run: |
          Write-Host "======= GOLOGIN ORBITA DETECTION & SOFTWARE RUNNER (Windows) =======" -ForegroundColor Cyan
          Write-Host "Target URL  : $env:TARGET_URL"
          Write-Host "Action Mode : $($env:ACTION_MODE.ToUpper())"
          Write-Host "Software    : $env:SOFTWARE_TYPE"

          pip install pywinauto pyautogui pygetwindow keyboard --quiet

          # ── Inline Python: detect Orbita window, navigate to URL, run flow ─
          $scriptB64 = "CmltcG9ydCB0aW1lLCBzeXMsIG9zLCB0ZW1wZmlsZSwgcmFuZG9tLCBzdWJwcm9jZXNzLCBjdHlwZXMK" +
          "ZnJvbSBweXdpbmF1dG8gaW1wb3J0IERlc2t0b3AKaW1wb3J0IHB5YXV0b2d1aQpmcm9tIHB5d2luYXV0" +
          "by5rZXlib2FyZCBpbXBvcnQgc2VuZF9rZXlzCgpUQVJHRVRfVVJMICAgID0gb3MuZW52aXJvbi5nZXQo" +
          "IlRBUkdFVF9VUkwiLCAiIikKU09GVFdBUkVfVFlQRSA9IG9zLmVudmlyb24uZ2V0KCJTT0ZUV0FSRV9U" +
          "WVBFIiwgImR5bmFtaWNfb3BlcmEiKQpFWEVfRklMVEVSICAgID0gb3MuZW52aXJvbi5nZXQoIkVYRV9G" +
          "SUxURVIiLCAiKi5leGUiKQpBQ1RJT05fTU9ERSAgID0gb3MuZW52aXJvbi5nZXQoIkFDVElPTl9NT0RF" +
          "IiwgImluc3RhbGwiKQoKRExfRk9MREVSICAgICAgICAgICAgICAgPSBvcy5wYXRoLmpvaW4ob3MuZW52" +
          "aXJvbi5nZXQoIlVTRVJQUk9GSUxFIiwiIiksICJEb3dubG9hZHMiKQpTRU5USU5FTF9QQVRIICAgICAg" +
          "ICAgICA9IG9zLnBhdGguam9pbih0ZW1wZmlsZS5nZXR0ZW1wZGlyKCksICJkb3dubG9hZF9kb25lLmZs" +
          "YWciKQpJTlNUQUxMRVJfRVhFQ1VURURfUEFUSCA9IG9zLnBhdGguam9pbih0ZW1wZmlsZS5nZXR0ZW1w" +
          "ZGlyKCksICJpbnN0YWxsZXJfZXhlY3V0ZWQuZmxhZyIpCgpkZWYgbG9nKHRhZywgbXNnKToKICAgIHBy" +
          "aW50KGYiW3t0aW1lLnN0cmZ0aW1lKCclSDolTTolUycpfV1be3RhZ31dIHttc2d9IiwgZmx1c2g9VHJ1" +
          "ZSkKCiMg4pSA4pSAIE9yYml0YSAvIEdvTG9naW4gYnJvd3NlciBkZXRlY3Rpb24gaGVscGVycyDilIDi" +
          "lIDilIDilIDilIDilIDilIDilIDilIDilIDilIDilIDilIDilIDilIDilIDilIDilIDilIDilIDilIDi" +
          "lIDilIDilIDilIDilIDilIDilIAKT1JCSVRBX1RJVExFX0ZSQUdNRU5UUyA9IFsKICAgICJvcmJpdGEi" +
          "LCAiZ29sb2dpbiIsICJHb0xvZ2luIEJyb3dzZXIiLCAiR0wgQnJvd3NlciIKXQpPUkJJVEFfRVhFX0ZS" +
          "QUdNRU5UUyA9IFsKICAgICJvcmJpdGEiLCAiZ29sb2dpbiIsICJnbC1icm93c2VyIiwgImdsX2Jyb3dz" +
          "ZXIiCl0KCmRlZiBpc19vcmJpdGFfd2luZG93KHd0KToKICAgIGlmIG5vdCB3dDoKICAgICAgICByZXR1" +
          "cm4gRmFsc2UKICAgIHRsID0gd3QubG93ZXIoKQogICAgIyBHb0xvZ2luIE9yYml0YSB3aW5kb3dzIG9m" +
          "dGVuIHNob3cgIi0gT3JiaXRhIiBvciBwcm9jZXNzIGlzIG9yYml0YS5leGUKICAgIGlmIGFueShmIGlu" +
          "IHRsIGZvciBmIGluIE9SQklUQV9USVRMRV9GUkFHTUVOVFMpOgogICAgICAgIHJldHVybiBUcnVlCiAg" +
          "ICByZXR1cm4gRmFsc2UKCmRlZiBpc19vcmJpdGFfcHJvY2Vzcyhwcm9jX25hbWUpOgogICAgaWYgbm90" +
          "IHByb2NfbmFtZToKICAgICAgICByZXR1cm4gRmFsc2UKICAgIHBsID0gcHJvY19uYW1lLmxvd2VyKCkK" +
