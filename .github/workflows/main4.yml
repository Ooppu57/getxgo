      - name: Install Google Chrome (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "=== [$(date '+%H:%M:%S')] Installing Google Chrome ==="
          CHROME_DMG="$HOME/Downloads/googlechrome.dmg"
          curl -fsSL "https://dl.google.com/chrome/mac/universal/stable/GGRO/googlechrome.dmg" \
            -o "$CHROME_DMG" 2>/dev/null || \
