name: Parrallel Win/Mac

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Select OS Runner Version'
        required: true
        type: choice
        options:
          - 'windows-2025'
          - 'windows-2022'
          - 'windows-11-arm'
          - 'macos-14'
          - 'macos-15'
          - 'macos-26'
          - 'macos-26-intel'
        default: 'windows-2025'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'techx@justzeus.com' # Do not remove the single quotes
      gologin_email:
        description: 'GoLogin Account Email'
        required: true
        type: string
        default: 'om2@mnb.net' # Do not remove the single quotes
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '5'
      software_choice:
        description: 'Software to install (Windows only)'
        required: true
        type: choice
        options:
          - 'Opera-One'
          - 'Opera-GX'
          - 'AVG'
          - 'None'
        default: 'None'
      target_url:
        description: 'Target download URL (Windows only, leave blank if None)'
        required: false
        type: string
        default: ''

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Generate Dynamic Matrix
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          OS_VERSION: ${{ inputs.os_version }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          TARGET_URL: ${{ inputs.target_url }}
        run: |
          import os, json
          email = os.environ.get("EMAIL", "").strip()
          num_devices = int(os.environ.get("NUM_DEVICES", "1"))
          os_version = os.environ.get("OS_VERSION", "windows-2025")
          software_choice = os.environ.get("SOFTWARE_CHOICE", "None")
          target_url = os.environ.get("TARGET_URL", "").strip()

          # Determine software_type and exe_filter from software_choice
          if software_choice == "Opera-One":
              software_type = "opera_one"
              exe_filter = "OperaSetup*.exe"
          elif software_choice == "Opera-GX":
              software_type = "opera_gx"
              exe_filter = "OperaGXSetup*.exe"
          elif software_choice == "AVG":
              software_type = "avg"
              exe_filter = "*avg*.exe"
          else:
              software_type = "none"
              exe_filter = "*.exe"

          includes = []
          if email:
              for i in range(1, num_devices + 1):
                  if "windows" in os_version.lower():
                      short_os = os_version.replace("windows-", "")
                      device_name = f"{i}-Win-{short_os}"
                  else:
                      short_os = os_version.replace("macos-", "")
                      device_name = f"{i}-mac-{short_os}"

                  includes.append({
                      "device": device_name,
                      "email": email,
                      "os": os_version,
                      "software_type": software_type,
                      "exe_filter": exe_filter,
                      "target_url": target_url,
                  })

          if not includes:
              print("Error: Valid configuration could not be generated. Exiting.")
              exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")

      - name: Update Workflow Defaults (Remember Inputs)
        shell: python
        env:
          OS_VERSION: ${{ inputs.os_version }}
          GETSCREEN_EMAIL: ${{ inputs.getscreen_email }}
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          TARGET_URL: ${{ inputs.target_url }}
        run: |
          import re
          import os

          file_path = ".github/workflows/main4.yml"

          with open(file_path, "r") as f:
              content = f.read()

          def update_default(input_name, new_val):
              global content
              pattern = r"(" + input_name + r":[\s\S]*?default:\s*')[^']*(')"
              content = re.sub(pattern, rf"\g<1>{new_val}\g<2>", content, count=1)

          update_default("os_version", os.environ.get("OS_VERSION"))
          update_default("getscreen_email", os.environ.get("GETSCREEN_EMAIL"))
          update_default("gologin_email", os.environ.get("GOLOGIN_EMAIL"))
          update_default("num_devices", os.environ.get("NUM_DEVICES"))
          update_default("software_choice", os.environ.get("SOFTWARE_CHOICE"))
          update_default("target_url", os.environ.get("TARGET_URL"))

          with open(file_path, "w") as f:
              f.write(content)

      - name: Commit and Push New Defaults
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/main4.yml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update last used inputs [skip ci]" && git push)

  remote_session:
    name: Remote Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      # ==========================================
      # WINDOWS SPECIFIC STEPS
      # ==========================================

      - name: Disable Windows Defender & Edge SmartScreen (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "========== SYSTEM PREPARATION ==========" -ForegroundColor Cyan
          Write-Host "[Defender] Disabling Windows Defender Realtime Monitoring..." -ForegroundColor Yellow
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          Set-MpPreference -PUAProtection 0 -ErrorAction SilentlyContinue
          Set-MpPreference -DisableBlockAtFirstSeen $true -ErrorAction SilentlyContinue
          Set-MpPreference -DisableIOAVProtection $true -ErrorAction SilentlyContinue

          Write-Host "[Registry] Enforcing Edge SmartScreen bypass policies..." -ForegroundColor Cyan
          $edgePolicy = "HKLM:\SOFTWARE\Policies\Microsoft\Edge"
          if (-not (Test-Path $edgePolicy)) { New-Item -Path $edgePolicy -Force | Out-Null }
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenEnabled" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenPuaEnabled" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "DownloadRestrictions" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "PreventSmartScreenPromptOverride" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "PreventSmartScreenPromptOverrideForFiles" -Value 0

          $exemptPath = "$edgePolicy\ExemptDomainFileTypePairsFromFileTypeDownloadWarnings"
          if (-not (Test-Path $exemptPath)) { New-Item -Path $exemptPath -Force | Out-Null }
          Set-ItemProperty -Path $exemptPath -Name "1" -Value '{"domains":["*"],"file_extension":"exe"}'
          Write-Host "[Registry] Edge EXEs whitelisted from all warnings." -ForegroundColor Green

      - name: Install and Start Getscreen.me (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Downloading Getscreen.me Agent..."
          $MaxRetries = 3
          $RetryCount = 0
          $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://getscreen.me/download/getscreen.msi" -OutFile "getscreen.msi" -ErrorAction Stop
                  if ((Get-Item "getscreen.msi").length -gt 1MB) {
                      $Success = $true
                  } else {
                      Write-Host "File too small, possibly corrupted. Retrying..."
                      $RetryCount++
                      Start-Sleep -Seconds 5
                  }
              } catch {
                  $RetryCount++
                  Write-Host "Download failed. Retrying ($RetryCount/$MaxRetries)..."
                  Start-Sleep -Seconds 5
              }
          }
          if (-not $Success) { Write-Error "Failed to download Getscreen.me after $MaxRetries attempts"; exit 1 }

          $DeviceName = "${{ matrix.device }}"
          Write-Host "Installing and linking Getscreen.me for Device $DeviceName..."

          $InstallArgs = "/i getscreen.msi /qn REGISTER=`"${{ matrix.email }}`" CONFIG=`"name='$DeviceName' autostart=true nonadmin=true control=true disable_confirmation=true`""
          Start-Process msiexec.exe -Wait -ArgumentList $InstallArgs

          Write-Host "✅ Getscreen.me is configured and running."

      - name: Download, Install, and Open GoLogin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Downloading GoLogin for Windows..."
          $MaxRetries = 3
          $RetryCount = 0
          $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://dl.gologin.com/gologin.exe" -OutFile "gologin_installer.exe" -ErrorAction Stop
                  if ((Get-Item "gologin_installer.exe").length -gt 10MB) {
                      $Success = $true
                  } else {
                      Write-Host "Downloaded file is too small, possibly corrupted. Retrying..."
                      $RetryCount++
                      Start-Sleep -Seconds 5
                  }
              } catch {
                  $RetryCount++
                  Write-Host "Download failed. Retrying ($RetryCount/$MaxRetries)..."
                  Start-Sleep -Seconds 5
              }
          }
          if (-not $Success) { Write-Error "Failed to download GoLogin after $MaxRetries attempts"; exit 1 }

          Write-Host "Installing GoLogin..."
          Start-Process -FilePath ".\gologin_installer.exe" -ArgumentList "/S" -Wait

          $GoLoginPath = "$env:USERPROFILE\AppData\Local\Programs\GoLogin\GoLogin.exe"

          Write-Host "Waiting up to 60 seconds for GoLogin.exe to appear on disk..."
          $WaitAttempts = 0
          while (-Not (Test-Path $GoLoginPath) -and $WaitAttempts -lt 30) {
              Start-Sleep -Seconds 2
              $WaitAttempts++
          }

          if (-Not (Test-Path $GoLoginPath)) {
              Write-Host "Searching for GoLogin.exe in alternative AppData paths..."
              $Found = Get-ChildItem -Path "$env:USERPROFILE\AppData" -Filter "GoLogin.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($Found) {
                  $GoLoginPath = $Found.FullName
                  Write-Host "Found at $GoLoginPath"
              } else {
                  Write-Error "❌ GoLogin.exe could not be found after installation."
                  exit 1
              }
          }

          Write-Host "Launching GoLogin..."
          Start-Process $GoLoginPath
          Write-Host "✅ GoLogin installed and opened!"

      - name: Automate GoLogin Login (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          GOLOGIN_PASSWORD: "11223344"
        run: |
          Write-Host "Installing Python UI Automation tools..."
          pip install pyautogui pygetwindow

          Write-Host "Running Automation Script..."
          python -c "
          import pyautogui
          import pygetwindow as gw
          import time
          import os
          import sys

          print('Polling up to 60 seconds for GoLogin window to appear...')
          max_wait = 60
          wait_time = 0
          win = None

          while wait_time < max_wait:
              for title in['Gologin', 'GoLogin', 'gologin']:
                  windows = gw.getWindowsWithTitle(title)
                  if windows:
                      win = windows[0]
                      break
              if win:
                  break
              time.sleep(2)
              wait_time += 2
              print(f'Waited {wait_time} seconds...')

          if win:
              try:
                  win.activate()
                  win.maximize()
              except Exception as e:
                  print('Could not maximize:', e)
              time.sleep(5)

              print('Navigating to Login page...')
              pyautogui.press('tab', presses=8, interval=0.5)
              pyautogui.press('enter')

              time.sleep(4)

              print('Entering credentials...')
              pyautogui.write(os.environ.get('GOLOGIN_EMAIL', ''))
              pyautogui.press('tab')

              pyautogui.write(os.environ.get('GOLOGIN_PASSWORD', ''))
              pyautogui.press('enter')

              print('✅ Login automated successfully.')
          else:
              print('❌ Could not find GoLogin window within time limit.')
              sys.exit(1)
          "

      # ─────────────────────────────────────────────────────────────
      # WINDOWS: Optional Software Install + Post-Install Automation
      # ─────────────────────────────────────────────────────────────
      - name: Setup Auto-Downloader & Software Installation (Windows)
        if: runner.os == 'Windows' && matrix.software_type != 'none' && matrix.target_url != ''
        shell: pwsh
        env:
          TARGET_URL:    ${{ matrix.target_url }}
          SOFTWARE_TYPE: ${{ matrix.software_type }}
          EXE_FILTER:    ${{ matrix.exe_filter }}
        run: |
          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host " Zero-Touch Downloader & Installer Active (Windows)" -ForegroundColor Cyan
          Write-Host " Target URL: $env:TARGET_URL" -ForegroundColor Gray
          Write-Host " Category  : $env:SOFTWARE_TYPE" -ForegroundColor Cyan
          Write-Host "============================================================" -ForegroundColor Cyan

          Write-Host "[Dependencies] Installing python UIA modules..." -ForegroundColor DarkGray
          python -m pip install pywinauto pyautogui pygetwindow keyboard --quiet

          # ── Write the full Python UI handler ─────────────────────────────
          $handlerPy = @'
          import time, sys, subprocess, random, os, tempfile, ctypes
          from pywinauto import Desktop
          import pyautogui
          from pywinauto.keyboard import send_keys

          def log_msg(tag, msg):
              t = time.strftime('%H:%M:%S')
              print(f"[{t}][{tag}] {msg}", flush=True)

          INTERFERENCE_TITLES = [
              "Settings","Windows Settings","Default apps","System Settings",
              "Choose an app","How do you want to open","Open with",
              "Windows PowerShell","Administrator: Windows PowerShell",
              "Command Prompt","Administrator: Command Prompt","cmd.exe",
              "PowerShell","Console Host","Windows Terminal","User Account Control",
          ]
          INTERFERENCE_SUBSTRINGS = [
              "default apps","choose a default","set as default","open with",
              "how do you want to open","administrator: c:\\","user account control",
          ]

          def _is_interference_window(text):
              if not text: return False
              for exact in INTERFERENCE_TITLES:
                  if text.strip().lower() == exact.strip().lower(): return True
              tl = text.lower()
              for sub in INTERFERENCE_SUBSTRINGS:
                  if sub in tl: return True
              return False

          def _is_target_software_window(text, software_type):
              if not text: return False
              tl = text.lower()
              if software_type == "avg":
                  return "avg" in tl
              elif software_type == "opera_gx":
                  return ("opera" in tl and "gx" in tl) or "opera gx" in tl
              elif software_type in ["opera_one"]:
                  return "opera" in tl and "edge" not in tl and "chrome web store" not in tl
              return False

          def dismiss_interference_windows(desktop, software_type, label=""):
              dismissed_any = False
              try:
                  all_windows = desktop.windows(visible_only=True)
              except Exception:
                  return False
              for window in all_windows:
                  try:
                      wt = window.window_text()
                      if not wt: continue
                      if "Microsoft Edge" in wt or "msedge" in wt.lower(): continue
                      if _is_target_software_window(wt, software_type): continue
                      if not _is_interference_window(wt): continue
                      log_msg("WinGuard", f"Interference window: '{wt}' [{label}]")
                      closed = False
                      try:
                          window.set_focus(); time.sleep(0.25)
                          send_keys('%{F4}'); time.sleep(0.4)
                          closed = True
                          log_msg("WinGuard", f"Closed '{wt}' via Alt+F4.")
                      except Exception as e:
                          log_msg("WinGuard", f"Alt+F4 failed for '{wt}': {e}")
                      if not closed:
                          try:
                              window.close(); time.sleep(0.3)
                              closed = True
                          except: pass
                      if not closed:
                          try:
                              window.minimize(); time.sleep(0.25)
                              closed = True
                          except: pass
                      if closed: dismissed_any = True
                  except: pass
              return dismissed_any

          def robust_maximize_opera_window(desktop, software_type, label=""):
              found_window = None
              dismiss_interference_windows(desktop, software_type, label=f"{label}-pre-dismiss")
              time.sleep(0.3)
              for attempt in range(1, 6):
                  log_msg("MaximizeOp", f"[{label}] Window search attempt {attempt}/5...")
                  try:
                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text()
                          if wt and _is_target_software_window(wt, software_type):
                              found_window = w
                              log_msg("MaximizeOp", f"[{label}] Found: '{wt}'")
                              break
                  except Exception as e:
                      log_msg("MaximizeOp", f"[{label}] Search error: {e}")
                  if found_window: break
                  log_msg("MaximizeOp", f"[{label}] Not found yet. Waiting 3s...")
                  time.sleep(3)
              if not found_window:
                  log_msg("MaximizeOp", f"[{label}] ERROR: Window not found after 5 attempts.")
                  return None
              try:
                  found_window.set_focus(); time.sleep(0.4)
                  found_window.maximize(); time.sleep(0.5)
              except: pass
              try:
                  found_window.set_focus(); time.sleep(0.3)
                  send_keys('{VK_LWIN down}{UP}{VK_LWIN up}'); time.sleep(0.4)
                  send_keys('{VK_LWIN down}{UP}{VK_LWIN up}'); time.sleep(0.4)
              except: pass
              try:
                  hwnd = found_window.handle
                  ctypes.windll.user32.ShowWindow(hwnd, 9); time.sleep(0.4)
              except: pass
              try:
                  user32 = ctypes.windll.user32
                  sw = user32.GetSystemMetrics(0)
                  sh = user32.GetSystemMetrics(1)
                  hwnd = found_window.handle
                  user32.SetWindowPos(hwnd, -1, 0, 0, sw, sh, 0x0040 | 0x0020)
                  time.sleep(0.3)
                  user32.SetWindowPos(hwnd, -2, 0, 0, sw, sh, 0x0040 | 0x0020)
                  time.sleep(0.3)
              except: pass
              try:
                  found_window.set_focus(); time.sleep(0.2)
                  found_window.maximize(); time.sleep(0.3)
                  found_window.set_focus(); time.sleep(0.2)
              except: pass
              return found_window

          def force_maximize_and_focus_target(desktop, target_window, software_type, label=""):
              dismiss_interference_windows(desktop, software_type, label=f"{label}-dismiss")
              time.sleep(0.3)
              found_window = target_window
              if found_window is None:
                  try:
                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text()
                          if wt and _is_target_software_window(wt, software_type):
                              found_window = w
                              break
                  except: pass
              if found_window is None:
                  log_msg("WinGuard", f"[{label}] No target window found to maximize/focus.")
                  return None
              try:
                  found_window.set_focus(); time.sleep(0.2)
                  found_window.maximize(); time.sleep(0.3)
                  found_window.set_focus(); time.sleep(0.2)
                  return found_window
              except Exception as e:
                  log_msg("WinGuard", f"[{label}] maximize/focus failed: {e}")
                  return found_window

          def click_opera_button(desktop, opera_window, software_type, button_names, label=""):
              try:
                  target = opera_window
                  if target is None or not target.is_visible():
                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text()
                          if wt and _is_target_software_window(wt, software_type):
                              target = w
                              break
                  if not target:
                      log_msg("ButtonClick", f"[{label}] Target window not found.")
                      return False
                  target.set_focus(); time.sleep(0.3)
                  for name in button_names:
                      btns = target.descendants(control_type="Button", title=name)
                      if btns:
                          try:
                              btns[0].click_input()
                              log_msg("ButtonClick", f"[{label}] Clicked '{name}' via exact title match.")
                              return True
                          except Exception as e:
                              log_msg("ButtonClick", f"[{label}] click_input on '{name}' failed: {e}")
                  for btn in target.descendants(control_type="Button"):
                      try:
                          txt = btn.window_text()
                          if txt:
                              for name in button_names:
                                  if name.lower() in txt.lower():
                                      btn.click_input()
                                      log_msg("ButtonClick", f"[{label}] Clicked '{txt}' via partial match.")
                                      return True
                      except: continue
                  return False
              except Exception as e:
                  log_msg("ButtonClick", f"[{label}] Exception: {e}")
                  return False

          # ══════════════════════════════════════════════════════════════════
          # OPERA ONE POST-INSTALL (Windows)
          # ══════════════════════════════════════════════════════════════════
          def opera_one_post_install_sequence(opera_window, software_type="opera_one"):
              log_msg("PostInstall-OP1", "=== Opera One Post-Install Sequence Starting (Windows) ===")
              desktop = Desktop(backend="uia")

              log_msg("PostInstall-OP1", "STEP 1: Waiting 50 seconds for Opera One to fully initialize...")
              for s in range(1, 51):
                  log_msg("PostInstall-OP1", f"  Init wait: {s}/50s...")
                  time.sleep(1)

              log_msg("PostInstall-OP1", "STEP 2: Locating and maximizing Opera One window...")
              desktop = Desktop(backend="uia")
              opera_window = robust_maximize_opera_window(desktop, software_type, label="step2-fullscreen")
              if opera_window is None:
                  log_msg("PostInstall-OP1", "STEP 2 WARNING: Could not find Opera window. Proceeding anyway...")
              else:
                  log_msg("PostInstall-OP1", f"STEP 2 COMPLETE: '{opera_window.window_text()}'")

              log_msg("PostInstall-OP1", "STEP 3: Waiting 5 seconds after maximize...")
              for s in range(1, 6):
                  log_msg("PostInstall-OP1", f"  Post-maximize wait: {s}/5s...")
                  time.sleep(1)

              log_msg("PostInstall-OP1", "STEP 4: Additional 5-second settle wait...")
              for s in range(1, 6):
                  time.sleep(1)

              sw, sh = pyautogui.size()
              cx, cy = sw // 2, sh // 2
              log_msg("PostInstall-OP1", f"STEP 5: Clicking center of screen at ({cx}, {cy})...")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label="step5-pre-click")
              try:
                  pyautogui.moveTo(cx, cy, duration=0.3); time.sleep(0.2)
                  pyautogui.click(cx, cy)
                  log_msg("PostInstall-OP1", f"STEP 5 COMPLETE: Click at ({cx}, {cy}).")
              except Exception as e:
                  log_msg("PostInstall-OP1", f"STEP 5 ERROR: {e}")

              log_msg("PostInstall-OP1", "STEP 6: Waiting 5 seconds after center click...")
              for s in range(1, 6):
                  time.sleep(1)

              log_msg("PostInstall-OP1", "STEP 7: Clicking 'Next' button 6 times (2s delay each)...")
              for i in range(1, 7):
                  desktop = Desktop(backend="uia")
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label=f"step7-NEXT-{i}")
                  log_msg("PostInstall-OP1", f"  Next click {i}/6...")
                  clicked = click_opera_button(desktop, opera_window, software_type, ["Next"], label=f"NEXT-{i}")
                  if not clicked:
                      log_msg("PostInstall-OP1", f"  Next {i}/6 not found — fallback click bottom-right...")
                      try:
                          sw, sh = pyautogui.size()
                          fx, fy = int(sw * 0.90), int(sh * 0.90)
                          pyautogui.moveTo(fx, fy, duration=0.2)
                          pyautogui.click(fx, fy)
                      except Exception as e2:
                          log_msg("PostInstall-OP1", f"  Fallback click failed: {e2}")
                  time.sleep(2)

              log_msg("PostInstall-OP1", "STEP 7b: Clicking 'Done' button...")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label="step7b-DONE")
              clicked_done = click_opera_button(desktop, opera_window, software_type, ["Done", "Finish"], label="DONE")
              if not clicked_done:
                  try:
                      sw, sh = pyautogui.size()
                      fx, fy = int(sw * 0.90), int(sh * 0.90)
                      pyautogui.moveTo(fx, fy, duration=0.2)
                      pyautogui.click(fx, fy)
                  except: pass

              log_msg("PostInstall-OP1", "STEP 8: Waiting 5 seconds after Done click...")
              for s in range(1, 6):
                  time.sleep(1)

              log_msg("PostInstall-OP1", "STEP 9: Pressing ENTER key...")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label="step9-ENTER")
              send_keys('{ENTER}')

              log_msg("PostInstall-OP1", "STEP 10: Waiting 5 seconds after ENTER...")
              for s in range(1, 6):
                  time.sleep(1)

              log_msg("PostInstall-OP1", "STEP 11: Clicking 'Submit' button...")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label="step11-SUBMIT")
              clicked_submit = click_opera_button(desktop, opera_window, software_type, ["Submit"], label="SUBMIT")
              if not clicked_submit:
                  try:
                      sw, sh = pyautogui.size()
                      fx, fy = sw // 2, int(sh * 0.85)
                      pyautogui.moveTo(fx, fy, duration=0.2)
                      pyautogui.click(fx, fy)
                  except: pass

              log_msg("PostInstall-OP1", "STEP 12: Waiting 5 seconds after Submit...")
              for s in range(1, 6):
                  time.sleep(1)

              log_msg("PostInstall-OP1", "STEP 13: TAB CYCLE — 8 TABs → 18 TABs...")
              tab_sequence = list(range(8, 19))
              for cycle_idx, tab_count in enumerate(tab_sequence):
                  log_msg("PostInstall-OP1", f"--- TAB CYCLE {cycle_idx+1}/{len(tab_sequence)}: {tab_count} TAB presses ---")
                  desktop = Desktop(backend="uia")
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label=f"cycle{cycle_idx+1}-pre-CtrlT")
                  send_keys('^t')
                  for s in range(1, 6):
                      time.sleep(1)
                  for i in range(1, tab_count + 1):
                      desktop = Desktop(backend="uia")
                      opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label=f"cycle{cycle_idx+1}-TAB{tab_count}-press{i}")
                      log_msg("PostInstall-OP1", f"    TAB {i}/{tab_count}...")
                      send_keys('{TAB}')
                      time.sleep(1)
                  desktop = Desktop(backend="uia")
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label=f"cycle{cycle_idx+1}-ENTER")
                  send_keys('{ENTER}')
                  for s in range(1, 6):
                      time.sleep(1)
                  desktop = Desktop(backend="uia")
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, software_type, label=f"cycle{cycle_idx+1}-post-CtrlT")
                  send_keys('^t')
                  for s in range(1, 6):
                      time.sleep(1)
                  log_msg("PostInstall-OP1", f"--- TAB CYCLE {cycle_idx+1}/{len(tab_sequence)} COMPLETE ---")

              log_msg("PostInstall-OP1", "=== Opera One Post-Install Sequence Completed Successfully (Windows) ===")

          # ══════════════════════════════════════════════════════════════════
          # OPERA GX POST-INSTALL (Windows)
          # ══════════════════════════════════════════════════════════════════
          def opera_gx_post_install_sequence(opera_window):
              log_msg("PostInstall-OPGX", "=== Opera GX Post-Install Sequence Starting (Windows) ===")
              desktop = Desktop(backend="uia")
              opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label="init")
              time.sleep(0.5)
              sw, sh = pyautogui.size()
              cx, cy = sw // 2, sh // 2
              log_msg("PostInstall-OPGX", f"Double-clicking center screen ({cx}, {cy})...")
              try:
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label="pre-dblclick")
                  pyautogui.click(cx, cy); time.sleep(0.15)
                  pyautogui.click(cx, cy)
              except Exception as e:
                  log_msg("PostInstall-OPGX", f"Double-click failed: {e}")
              time.sleep(random.uniform(2.0, 3.0))
              log_msg("PostInstall-OPGX", "Pressing TAB x4 (1-2s delay each)...")
              for i in range(1, 5):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"pre-TAB4-{i}")
                  send_keys('{TAB}')
                  time.sleep(random.uniform(1.0, 2.0))
              log_msg("PostInstall-OPGX", "Pressing ENTER x8 (1-2s delay each)...")
              for i in range(1, 9):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"ENTER8-{i}")
                  send_keys('{ENTER}')
                  time.sleep(random.uniform(1.0, 2.0))
              time.sleep(random.uniform(2.0, 3.0))
              log_msg("PostInstall-OPGX", "Pressing TAB x6 (1-2s delay each)...")
              for i in range(1, 7):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"TAB6-{i}")
                  send_keys('{TAB}')
                  time.sleep(random.uniform(1.0, 2.0))
              opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label="post-TAB6-ENTER")
              send_keys('{ENTER}')
              log_msg("PostInstall-OPGX", "Waiting 5 seconds...")
              for s in range(1, 6):
                  if s % 2 == 0:
                      opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"wait5-{s}")
                  time.sleep(1)
              for tab_count in range(7, 17):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"pre-CtrlT-{tab_count}")
                  send_keys('^t')
                  for i in range(1, tab_count + 1):
                      opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"TAB{tab_count}-{i}")
                      send_keys('{TAB}')
                      time.sleep(random.uniform(1.0, 2.0))
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"post-TAB{tab_count}-ENTER")
                  send_keys('{ENTER}')
                  for s in range(1, 6):
                      if s % 2 == 0:
                          opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", label=f"wait5-loop{tab_count}-{s}")
                      time.sleep(1)
              log_msg("PostInstall-OPGX", "=== Opera GX Post-Install Sequence Completed Successfully (Windows) ===")

          # ══════════════════════════════════════════════════════════════════
          # AVG POST-INSTALL (Windows)
          # ══════════════════════════════════════════════════════════════════
          def avg_post_install_sequence(avg_window):
              log_msg("PostInstall-AVG", "=== AVG Post-Install Sequence Starting (Windows) ===")
              desktop = Desktop(backend="uia")
              avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label="init")
              time.sleep(0.5)
              sw, sh = pyautogui.size()
              cx, cy = sw // 2, sh // 2
              log_msg("PostInstall-AVG", f"Double-clicking center screen ({cx}, {cy})...")
              try:
                  avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label="pre-dblclick")
                  pyautogui.click(cx, cy); time.sleep(0.15)
                  pyautogui.click(cx, cy)
              except Exception as e:
                  log_msg("PostInstall-AVG", f"Double-click failed: {e}")
              log_msg("PostInstall-AVG", "Waiting 5 seconds...")
              for s in range(1, 6):
                  if s % 2 == 0:
                      avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label=f"init-wait-{s}")
                  time.sleep(1)
              tab_count = 6
              tab_ceiling = 17
              while tab_count < tab_ceiling:
                  log_msg("PostInstall-AVG", f"--- Cycle: {tab_count} TAB presses ---")
                  avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label=f"pre-CtrlT-{tab_count}")
                  send_keys('^t')
                  for i in range(1, tab_count + 1):
                      avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label=f"TAB{tab_count}-press{i}")
                      send_keys('{TAB}')
                      time.sleep(random.uniform(1.0, 2.0))
                  avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label=f"pre-ENTER-{tab_count}")
                  send_keys('{ENTER}')
                  step = random.randint(1, 2)
                  tab_count += step
                  if tab_count < tab_ceiling:
                      for s in range(1, 6):
                          if s % 2 == 0:
                              avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", label=f"cycle-wait-{tab_count}-{s}")
                          time.sleep(1)
              log_msg("PostInstall-AVG", "=== AVG Post-Install Sequence Completed Successfully (Windows) ===")

          # ══════════════════════════════════════════════════════════════════
          # MAIN AUTOMATION HANDLER (Windows)
          # ══════════════════════════════════════════════════════════════════
          def handle_automation(software_type, timeout=360):
              desktop = Desktop(backend="uia")
              start_time = time.time()

              log_msg("UI-Engine", f"Started monitoring. Type: {software_type}")

              last_interference_sweep = 0
              INTERFERENCE_SWEEP_INTERVAL = 2

              opera_one_installer_executed_time = None
              opera_one_post_install_done = False

              opera_gx_installer_executed_time = None
              opera_gx_post_install_done = False

              avg_installer_executed_time = None
              avg_post_install_done = False

              installer_executed_sentinel = os.path.join(tempfile.gettempdir(), "installer_executed.flag")

              while time.time() - start_time < timeout:
                  try:
                      desktop = Desktop(backend="uia")
                      opera_window = None
                      avg_window = None

                      for window in desktop.windows(visible_only=True):
                          wt = window.window_text()
                          if not wt: continue
                          if "Opera" in wt and "Microsoft Edge" not in wt and "Edge" not in wt:
                              opera_window = window
                          if "AVG" in wt:
                              avg_window = window

                      now = time.time()
                      if now - last_interference_sweep >= INTERFERENCE_SWEEP_INTERVAL:
                          dismiss_interference_windows(desktop, software_type, label="continuous")
                          last_interference_sweep = now

                      # ── Opera One post-install (50s from installer sentinel) ──
                      if software_type == "opera_one" and not opera_one_post_install_done:
                          if opera_one_installer_executed_time is None and os.path.exists(installer_executed_sentinel):
                              opera_one_installer_executed_time = time.time()
                              log_msg("PostInstall-OP1", "Sentinel detected. Post-install fires in 50s.")
                          if opera_one_installer_executed_time is not None and (time.time() - opera_one_installer_executed_time) >= 50:
                              log_msg("PostInstall-OP1", "50s threshold reached. Launching Opera One post-install.")
                              opera_one_post_install_sequence(opera_window, software_type="opera_one")
                              opera_one_post_install_done = True

                      # ── Opera GX post-install (40s from installer sentinel) ──
                      if software_type == "opera_gx" and not opera_gx_post_install_done:
                          if opera_gx_installer_executed_time is None and os.path.exists(installer_executed_sentinel):
                              opera_gx_installer_executed_time = time.time()
                              log_msg("PostInstall-OPGX", "Sentinel detected. Post-install fires in 40s.")
                          if opera_gx_installer_executed_time is not None and (time.time() - opera_gx_installer_executed_time) >= 40:
                              log_msg("PostInstall-OPGX", "40s threshold reached. Launching Opera GX post-install.")
                              opera_gx_post_install_sequence(opera_window)
                              opera_gx_post_install_done = True

                      # ── AVG post-install (60s from installer sentinel) ──
                      if software_type == "avg" and not avg_post_install_done:
                          if avg_installer_executed_time is None and os.path.exists(installer_executed_sentinel):
                              avg_installer_executed_time = time.time()
                              log_msg("PostInstall-AVG", "Sentinel detected. Post-install fires in 60s.")
                          if avg_installer_executed_time is not None and (time.time() - avg_installer_executed_time) >= 60:
                              log_msg("PostInstall-AVG", "60s threshold reached. Launching AVG post-install.")
                              avg_post_install_sequence(avg_window)
                              avg_post_install_done = True

                  except Exception as e:
                      pass
                  time.sleep(1)

          if __name__ == "__main__":
              software_type = sys.argv[1] if len(sys.argv) > 1 else "none"
              handle_automation(software_type)
          '@
          $handlerPy | Out-File -FilePath "$env:TEMP\win_post_install_handler.py" -Encoding utf8

          Write-Host "[UI-Engine] Spinning up background Python handler..." -ForegroundColor DarkGray
          Start-Process -FilePath "python" `
              -ArgumentList "-u `"$env:TEMP\win_post_install_handler.py`" `"$env:SOFTWARE_TYPE`"" `
              -WindowStyle Hidden

          # ── Watcher: monitor Downloads for the installer EXE ────────────
          $dlFolder                   = "$env:USERPROFILE\Downloads"
          $timeoutSecs                = 330
          $sentinelPath               = "$env:TEMP\download_done.flag"
          $installerExecutedSentinel  = "$env:TEMP\installer_executed.flag"
          $softwareType               = $env:SOFTWARE_TYPE
          $exeFilter                  = $env:EXE_FILTER

          Write-Host "[Watcher] Monitoring $dlFolder for $exeFilter ..." -ForegroundColor Cyan

          $installJob = Start-Job -ScriptBlock {
              param($dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath, $installerExecutedSentinel)
              $deadline  = (Get-Date).AddSeconds($timeoutSecs)
              $installed = $false
              Write-Output "[$($softwareType.ToUpper())-WATCHER] Tracking: $dlFolder | Filter: $exeFilter"

              while (-not $installed -and (Get-Date) -lt $deadline) {
                  $candidates = Get-ChildItem -Path $dlFolder -Filter $exeFilter -ErrorAction SilentlyContinue |
                      Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } |
                      Sort-Object LastWriteTime -Descending

                  if ($candidates.Count -gt 0) {
                      $file = $candidates[0]
                      Write-Output "[$($softwareType.ToUpper())-WATCHER] Payload found: $($file.Name)"
                      try { Set-Content -Path $sentinelPath -Value "done" -ErrorAction SilentlyContinue } catch {}

                      # Close Edge download tabs
                      for ($ca = 1; $ca -le 4; $ca++) {
                          try {
                              $wsh = New-Object -ComObject WScript.Shell
                              $edgeProcs = Get-Process -Name "msedge" -ErrorAction SilentlyContinue |
                                  Where-Object { $_.MainWindowHandle -ne 0 } |
                                  Sort-Object StartTime -Descending
                              if ($edgeProcs) {
                                  foreach ($ep in $edgeProcs) {
                                      $wsh.AppActivate($ep.Id)
                                      Start-Sleep -Milliseconds 600
                                      $wsh.SendKeys("^w"); Start-Sleep -Milliseconds 400
                                      $wsh.SendKeys("^w"); Start-Sleep -Milliseconds 400
                                  }
                              }
                              Start-Sleep -Milliseconds 800
                              $remaining = Get-Process -Name "msedge" -ErrorAction SilentlyContinue |
                                  Where-Object { $_.MainWindowHandle -ne 0 }
                              if (-not $remaining) { break }
                          } catch { }
                          Start-Sleep -Milliseconds 500
                      }

                      # Wait for file to be fully downloaded
                      $locked = $true
                      while ($locked) {
                          Start-Sleep -Seconds 2
                          try {
                              $s = [System.IO.File]::Open($file.FullName, 'Open', 'Read', 'None')
                              $s.Close(); $locked = $false
                              Write-Output "[$($softwareType.ToUpper())-INSTALL] File ready."
                          } catch { }
                      }

                      try { Set-Content -Path $installerExecutedSentinel -Value "done" -ErrorAction SilentlyContinue } catch {}
                      Write-Output "[$($softwareType.ToUpper())-INSTALL] Running installer: $($file.FullName) /silent"
                      try {
                          Start-Process -FilePath $file.FullName -ArgumentList "/silent" -Wait
                          Write-Output "[$($softwareType.ToUpper())-INSTALL] Installer complete."
                      } catch {
                          Write-Output "[$($softwareType.ToUpper())-INSTALL] ERROR: $_"
                      }

                      # Locate and launch the installed app
                      if ($softwareType -eq "opera_gx") {
                          $appPaths = @(
                              "$env:LOCALAPPDATA\Programs\Opera GX\launcher.exe",
                              "$env:LOCALAPPDATA\Programs\Opera GX\opera.exe",
                              "C:\Program Files\Opera GX\launcher.exe",
                              "C:\Program Files\Opera GX\opera.exe"
                          )
                      } elseif ($softwareType -eq "opera_one") {
                          $appPaths = @(
                              "$env:LOCALAPPDATA\Programs\Opera\launcher.exe",
                              "$env:LOCALAPPDATA\Programs\Opera\opera.exe",
                              "C:\Program Files\Opera\launcher.exe",
                              "C:\Program Files\Opera\opera.exe"
                          )
                      } else {
                          $appPaths = @(
                              "C:\Program Files\AVG\Browser\Application\AVGBrowser.exe",
                              "C:\Program Files (x86)\AVG\Browser\Application\AVGBrowser.exe",
                              "C:\Program Files\AVG\Antivirus\AVGUI.exe",
                              "C:\Program Files (x86)\AVG\Antivirus\AVGUI.exe"
                          )
                      }

                      $launched = $false
                      for ($i = 0; $i -lt 300; $i++) {
                          foreach ($p in $appPaths) {
                              if (Test-Path $p) {
                                  Start-Sleep -Seconds 3
                                  Write-Output "[$($softwareType.ToUpper())-POST] Launching: $p"
                                  Start-Process -FilePath $p
                                  $launched = $true
                                  break
                              }
                          }
                          if ($launched) { break }
                          Start-Sleep -Seconds 2
                      }
                      if (-not $launched) {
                          Write-Output "[$($softwareType.ToUpper())-POST] FATAL: Executable not found within timeout."
                      }
                      $installed = $true
                  } else {
                      Start-Sleep -Seconds 5
                  }
              }
              if (-not $installed) {
                  Write-Output "[$($softwareType.ToUpper())-WATCHER] Timeout — no matching file downloaded."
              }
          } -ArgumentList $dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath, $installerExecutedSentinel

          # Launch Edge to begin download
          $edgeExe = "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
          if (-Not (Test-Path $edgeExe)) { $edgeExe = "C:\Program Files\Microsoft\Edge\Application\msedge.exe" }
          $edgeArgs = @(
              "--no-first-run", "--no-default-browser-check", "--disable-sync",
              "--safebrowsing-disable-download-protection",
              "--disable-features=msSmartScreenProtection,SmartScreenPuaEnabled",
              "`"$env:TARGET_URL`""
          )
          Write-Host "[System] Launching Edge → $env:TARGET_URL" -ForegroundColor Cyan
          Start-Process -FilePath $edgeExe -ArgumentList ($edgeArgs -join " ")

          # Monitor install job
          $deadline = (Get-Date).AddSeconds($timeoutSecs)
          while ($true) {
              $output = Receive-Job -Job $installJob -ErrorAction SilentlyContinue
              if ($output) { foreach ($line in $output) { Write-Host $line } }
              if ($installJob.State -eq 'Completed' -or $installJob.State -eq 'Failed' -or (Get-Date) -gt $deadline) { break }
              Start-Sleep -Seconds 5
          }
          Write-Host "[Runtime] Install job concluded." -ForegroundColor Green

      - name: Keep Runner Alive (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Session is active. This runner will remain online until the job timeout is reached."
          Start-Sleep -Seconds 3600

      # ==========================================
      # macOS SPECIFIC STEPS
      # ==========================================

      - name: Setup GUI Authorization Credentials (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Creating 'admin' user with password 'admin'..."
          sudo sysadminctl -addUser admin -password admin -admin || true
          sudo sysadminctl -adminUser "$USER" -password admin || true
          echo "✅ Credentials configured. Username: admin / Password: admin"

      - name: Disable Gatekeeper & Configure macOS Security
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "===[$(date '+%H:%M:%S')] Configuring macOS Security Settings ==="
          sudo spctl --master-disable || true
          sudo defaults write /Library/Preferences/com.apple.security GKAutoRearm -bool false || true
          sudo defaults write /Library/Preferences/com.apple.security AssessmentEnable -bool false || true
          defaults write com.apple.LaunchServices LSQuarantine -bool false || true
          defaults write com.apple.Safari AutoOpenSafeDownloads -bool true || true
          defaults write com.apple.Safari DownloadValidation -bool false || true
          sudo spctl --global-disable || true
          echo "[$(date '+%H:%M:%S')] macOS security configuration complete."

      - name: Install Dependencies — Python venv + cliclick (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "===[$(date '+%H:%M:%S')] Installing Python UI Automation Dependencies ==="
          VENV_DIR="/tmp/uienv"
          PYTHON_BIN=""
          for candidate in python3.12 python3.11 python3.10 python3; do
            if command -v "$candidate" &>/dev/null; then
              PYTHON_BIN="$candidate"; break
            fi
          done
          if [ -z "$PYTHON_BIN" ]; then echo "ERROR: No Python3 found."; exit 1; fi
          rm -rf "$VENV_DIR"
          "$PYTHON_BIN" -m venv "$VENV_DIR"
          source "$VENV_DIR/bin/activate"
          pip install --upgrade pip --quiet
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-ApplicationServices --quiet || true
          pip install atomacos Pillow requests --quiet || true
          deactivate
          echo "UIENV_PYTHON=$VENV_DIR/bin/python3" >> "$GITHUB_ENV"
          if ! command -v brew &>/dev/null; then
            NONINTERACTIVE=1 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || true
            for bp in /opt/homebrew/bin /usr/local/bin; do
              if [ -x "$bp/brew" ]; then
                export PATH="$bp:$PATH"
                echo "PATH=$bp:$PATH" >> "$GITHUB_ENV"
                break
              fi
            done
          fi
          brew install cliclick --quiet || true
          echo "CLICLICK_BIN=$(command -v cliclick || echo 'not_found')" >> "$GITHUB_ENV"
          echo "[$(date '+%H:%M:%S')] All dependencies installed."

      - name: Pre-Grant TCC Permissions (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "=== [$(date '+%H:%M:%S')] Pre-Granting TCC Permissions ==="
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          grant_tcc() {
            sudo sqlite3 "$TCC_DB" \
              "INSERT OR REPLACE INTO access \
               (service, client, client_type, auth_value, auth_reason, auth_version, flags) \
               VALUES ('$1', '$2', $3, 2, 4, 1, 0);" 2>/dev/null || true
          }
          grant_tcc kTCCServiceAccessibility com.apple.Terminal          0
          grant_tcc kTCCServiceAccessibility com.apple.systemevents      0
          grant_tcc kTCCServiceAccessibility com.google.Chrome           0
          grant_tcc kTCCServiceAccessibility /usr/bin/osascript          1
          grant_tcc kTCCServiceAccessibility /bin/bash                   1
          grant_tcc kTCCServiceAccessibility /usr/bin/python3            1
          grant_tcc kTCCServiceScreenCapture com.google.Chrome           0
          grant_tcc kTCCServiceScreenCapture com.apple.Terminal          0
          grant_tcc kTCCServiceScreenCapture me.getscreen.agent          0
          grant_tcc kTCCServiceScreenCapture com.getscreen.agent         0
          grant_tcc kTCCServiceLocalNetwork  com.google.Chrome           0
          grant_tcc kTCCServiceLocalNetwork  com.apple.Terminal          0
          grant_tcc kTCCServiceLocalNetwork  /usr/bin/osascript          1
          grant_tcc kTCCServiceLocalNetwork  me.getscreen.agent          0
          ps aux 2>/dev/null | awk '{print $11}' | grep -iE "(runner|hosted|compute|agent)" | sort -u | while read -r PROC_PATH; do
            if [ -x "$PROC_PATH" ]; then
              grant_tcc kTCCServiceLocalNetwork  "$PROC_PATH" 1
              grant_tcc kTCCServiceScreenCapture "$PROC_PATH" 1
              grant_tcc kTCCServiceAccessibility "$PROC_PATH" 1
            fi
          done || true
          echo "[$(date '+%H:%M:%S')] TCC permissions configured."

      - name: Install, Bypass Security, and Start Getscreen.me (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "===[$(date '+%H:%M:%S')] Installing Getscreen.me via DMG ==="
          DeviceName="${{ matrix.device }}"
          EMAIL="${{ matrix.email }}"
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          curl -L -o getscreen.dmg "https://getscreen.me/download/getscreen.dmg" --retry 3 --retry-delay 5 --silent --show-error || true
          FILE_SIZE=$(stat -f%z getscreen.dmg 2>/dev/null || echo 0)
          if [ ! -f "getscreen.dmg" ] || [ "$FILE_SIZE" -lt 102400 ]; then
            echo "[$(date '+%H:%M:%S')] ERROR: Getscreen.me DMG download failed. Skipping."
            exit 0
          fi
          hdiutil attach getscreen.dmg -mountpoint /Volumes/getscreen -nobrowse -quiet || true
          APP_PATH=$(find /Volumes/getscreen -maxdepth 1 -name "*.app" | head -n 1 || true)
          APP_NAME=$(basename "$APP_PATH")
          sudo cp -R "$APP_PATH" /Applications/
          sudo xattr -dr com.apple.quarantine "/Applications/$APP_NAME" 2>/dev/null || true
          hdiutil detach /Volumes/getscreen -quiet -force || true
          APP_BUNDLE_ID=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleIdentifier 2>/dev/null || echo "")
          if [ -n "$APP_BUNDLE_ID" ]; then
            for SVC in kTCCServiceScreenCapture kTCCServiceAccessibility kTCCServiceLocalNetwork; do
              sudo sqlite3 "$TCC_DB" \
                "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
                 VALUES('$SVC','$APP_BUNDLE_ID',0,2,4,1,0);" 2>/dev/null || true
            done
          fi
          EXEC_NAME=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleExecutable 2>/dev/null || echo "")
          EXEC_PATH="/Applications/$APP_NAME/Contents/MacOS/$EXEC_NAME"
          if [ ! -x "$EXEC_PATH" ]; then
            EXEC_PATH=$(find "/Applications/$APP_NAME/Contents/MacOS" -maxdepth 1 -type f -perm +111 2>/dev/null | head -n 1 || true)
          fi
          sudo "$EXEC_PATH" -install 2>/dev/null || true
          sleep 2
          sudo "$EXEC_PATH" -register "$EMAIL" 2>/dev/null || true
          sleep 1
          sudo "$EXEC_PATH" -config "name='$DeviceName' autostart=true nonadmin=true control=true disable_confirmation=true" 2>/dev/null || true
          sleep 1
          sudo "$EXEC_PATH" -start 2>/dev/null || true
          echo "✅ Getscreen.me running as '$DeviceName'."

      - name: Pre-Dismiss System Popups (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "===[$(date '+%H:%M:%S')] Pre-dismissing system popups ==="
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          sudo launchctl kickstart -k system/com.apple.tccd 2>/dev/null || true
          sudo launchctl kickstart -k user/$(id -u)/com.apple.tccd 2>/dev/null || true
          sleep 2
          sudo killall -HUP cfprefsd 2>/dev/null || true
          sudo killall UserNotificationCenter 2>/dev/null || true
          sudo killall NotificationCenter 2>/dev/null || true
          sleep 1
          cat > /tmp/early_popup_dismiss.applescript << 'ASEOF'
          set maxRuns to 30
          set runCount to 0
          repeat while runCount < maxRuns
            set runCount to runCount + 1
            try
              tell application "System Events"
                try
                  tell process "CoreServicesUIAgent"
                    repeat with win in (every window)
                      try
                        if exists button "Allow" of win then click button "Allow" of win
                      end try
                    end repeat
                  end tell
                end try
                repeat with proc in (every process whose visible is true)
                  set pName to name of proc as string
                  if pName is not "Google Chrome" then
                    try
                      repeat with win in (every window of proc)
                        set winTitle to ""
                        try
                          set winTitle to (title of win) as string
                        end try
                        if winTitle contains "Allow" then
                          try
                            click button "Allow" of win
                          end try
                        end if
                      end repeat
                    end try
                  end if
                end repeat
              end tell
            end try
            delay 0.5
          end repeat
          ASEOF
          osascript /tmp/early_popup_dismiss.applescript > /tmp/early_dismiss.log 2>&1 &
          EARLY_PID=$!
          wait $EARLY_PID 2>/dev/null || true
          echo "[$(date '+%H:%M:%S')] Popup pre-dismissal complete."

