          POPUP_B64="${POPUP_B64}ZCByZXBlYXQKICAgIGVuZCB0ZWxsCiAgZW5kIHRyeQogIHJlcGVhdCB3aXRoIHByb2MgaW4gKGV2ZXJ5"
          POPUP_B64="${POPUP_B64}IHByb2Nlc3Mgd2hvc2UgdmlzaWJsZSBpcyB0cnVlKQogICAgc2V0IHBOYW1lIHRvIG5hbWUgb2YgcHJv"
          POPUP_B64="${POPUP_B64}YyBhcyBzdHJpbmcKICAgIGlmIHBOYW1lIGlzIG5vdCBpbiB7IkdvTG9naW4iLCAiT3JiaXRhIn0gdGhl"
          POPUP_B64="${POPUP_B64}bgogICAgICB0cnkKICAgICAgICByZXBlYXQgd2l0aCB3aW4gaW4gKGV2ZXJ5IHdpbmRvdyBvZiBwcm9j"
          POPUP_B64="${POPUP_B64}KQogICAgICAgICAgc2V0IHdUIHRvICIiCiAgICAgICAgICB0cnk7IHNldCB3VCB0byAodGl0bGUgb2Yg"
          POPUP_B64="${POPUP_B64}d2luKSBhcyBzdHJpbmc7IGVuZCB0cnkKICAgICAgICAgIGlmIHdUIGNvbnRhaW5zICJsb2NhbCBuZXR3"
          POPUP_B64="${POPUP_B64}b3JrIiBvciB3VCBjb250YWlucyAiaG9zdGVkLWNvbXB1dGUiIG9yIHdUIGNvbnRhaW5zICJBbGxvdyIg"
          POPUP_B64="${POPUP_B64}dGhlbgogICAgICAgICAgICB0cnkKICAgICAgICAgICAgICBpZiAoZXhpc3RzIGJ1dHRvbiAiQWxsb3ci"
          POPUP_B64="${POPUP_B64}IG9mIHdpbikgdGhlbiBjbGljayBidXR0b24gIkFsbG93IiBvZiB3aW4KICAgICAgICAgICAgZW5kIHRy"
          POPUP_B64="${POPUP_B64}eQogICAgICAgICAgZW5kIGlmCiAgICAgICAgZW5kIHJlcGVhdAogICAgICBlbmQgdHJ5CiAgICBlbmQg"
