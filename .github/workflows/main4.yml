          $scriptPath = "$env:TEMP\win_handler.py"
          [System.IO.File]::WriteAllBytes($scriptPath, [System.Convert]::FromBase64String($scriptB64))
          Write-Host "[*] Script written to $scriptPath ($([System.IO.FileInfo]::new($scriptPath).Length) bytes)" -ForegroundColor Cyan

          # ── Start the background Python automation handler ─────────────
          Write-Host "[*] Starting Python automation handler..." -ForegroundColor Cyan
          $handlerProc = Start-Process -FilePath python `
            -ArgumentList "-u `"$scriptPath`"" `
            -PassThru -WindowStyle Hidden
          Write-Host "[*] Handler PID: $($handlerProc.Id)" -ForegroundColor Cyan

          # ── INSTALL PATH: watch Downloads for the installer EXE ────────
          if ($env:ACTION_MODE -eq "install") {
            Write-Host "[Watcher] INSTALL path active. Watching Downloads..." -ForegroundColor Cyan
            $dlFolder              = "$env:USERPROFILE\Downloads"
            $timeoutSecs           = 3300
            $softwareType          = $env:SOFTWARE_TYPE
            $exeFilter             = $env:EXE_FILTER
            $sentinelPath          = "$env:TEMP\download_done.flag"
            $installerSentinel     = "$env:TEMP\installer_executed.flag"

            $installJob = Start-Job -ScriptBlock {
              param($dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath, $installerSentinel)
              $deadline  = (Get-Date).AddSeconds($timeoutSecs)
              $installed = $false
              Write-Output "[$softwareType-WATCHER] Monitoring: $dlFolder for '$exeFilter'"
              while (-not $installed -and (Get-Date) -lt $deadline) {
                $candidates = Get-ChildItem -Path $dlFolder -Filter $exeFilter -ErrorAction SilentlyContinue |
                  Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } |
                  Sort-Object LastWriteTime -Descending
                if ($candidates.Count -gt 0) {
                  $file = $candidates[0]
                  Write-Output "[$softwareType-WATCHER] Payload found: $($file.Name)"
                  try { Set-Content -Path $sentinelPath -Value "done" -ErrorAction SilentlyContinue } catch {}

                  # Close Edge download tabs
                  $wsh = New-Object -ComObject WScript.Shell
                  for ($ca = 1; $ca -le 4; $ca++) {
                    $edgeProcs = Get-Process -Name "msedge" -ErrorAction SilentlyContinue | Where-Object { $_.MainWindowHandle -ne 0 }
                    if ($edgeProcs) {
                      foreach ($ep in $edgeProcs) {
                        $wsh.AppActivate($ep.Id); Start-Sleep -Milliseconds 500
                        $wsh.SendKeys("^w"); Start-Sleep -Milliseconds 400
                        $wsh.SendKeys("^w")
                      }
                    }
                    Start-Sleep -Milliseconds 800
                  }

                  # Fingerprint actual software type
                  $actualSw = $softwareType
                  if ($softwareType -in @("ad_mvn","dynamic_opera","opera_smart_link")) {
                    if ($file.Name -match "OperaGX") { $actualSw = "opera_gx" }
                    else { $actualSw = "opera_one" }
                  }

                  # Wait for file I/O unlock
                  $locked = $true
                  while ($locked) {
                    Start-Sleep -Seconds 2
                    try {
                      $s = [System.IO.File]::Open($file.FullName,'Open','Read','None')
                      $s.Close(); $locked = $false
                      Write-Output "[$actualSw-INSTALL] File unlocked."
                    } catch {}
                  }

                  # Write installer-executed sentinel
                  try { Set-Content -Path $installerSentinel -Value "done" } catch {}
                  Write-Output "[$actualSw-INSTALL] Installer sentinel written."

                  # Execute installer silently
                  Write-Output "[$actualSw-INSTALL] Running: $($file.FullName) /silent"
                  try { Start-Process -FilePath $file.FullName -ArgumentList "/silent" -Wait }
                  catch { Write-Output "[$actualSw-INSTALL] Installer error: $_" }

                  # Find and launch installed app
                  $appPaths = if ($actualSw -eq "opera_gx") {
                    @("$env:LOCALAPPDATA\Programs\Opera GX\launcher.exe",
                      "C:\Program Files\Opera GX\launcher.exe",
                      "C:\Program Files (x86)\Opera GX\launcher.exe")
                  } elseif ($actualSw -eq "opera_one") {
                    @("$env:LOCALAPPDATA\Programs\Opera\launcher.exe",
                      "C:\Program Files\Opera\launcher.exe",
                      "C:\Program Files (x86)\Opera\launcher.exe")
                  } else {
                    @("C:\Program Files\AVG\Browser\Application\AVGBrowser.exe",
                      "C:\Program Files (x86)\AVG\Browser\Application\AVGBrowser.exe",
                      "C:\Program Files\AVG\Antivirus\AVGUI.exe")
                  }
                  $launched = $false
                  for ($i = 0; $i -lt 150; $i++) {
                    foreach ($p in $appPaths) {
                      if (Test-Path $p) {
                        Start-Sleep -Seconds 3
                        Write-Output "[$actualSw-POST] Launching: $p"
                        Start-Process -FilePath $p; $launched = $true; break
                      }
                    }
                    if ($launched) { break }
                    Start-Sleep -Seconds 2
                  }
                  $installed = $true
                } else { Start-Sleep -Seconds 5 }
              }
              if (-not $installed) { Write-Output "[$softwareType-WATCHER] Timeout. No EXE found." }
            } -ArgumentList $dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath, $installerSentinel

            $deadline = (Get-Date).AddSeconds($timeoutSecs)
            while ($true) {
              $out = Receive-Job -Job $installJob -ErrorAction SilentlyContinue
              if ($out) { $out | ForEach-Object { Write-Host $_ } }
              if ($installJob.State -in @("Completed","Failed") -or (Get-Date) -gt $deadline) { break }
              Start-Sleep -Seconds 5
            }
            Write-Host "[Runtime] Install job concluded." -ForegroundColor Green
          } else {
            # CLICK-ONLY path
            Write-Host "[Runtime] CLICK-ONLY path. Waiting 90s for page activity..." -ForegroundColor Magenta
            Start-Sleep -Seconds 90
            Write-Host "[Runtime] Click path complete." -ForegroundColor Green
          }

          Write-Host "[*] Waiting for handler process to finish..."
          $handlerProc.WaitForExit(30000) | Out-Null

      # ── 6-W: Keep Runner Alive ──────────────────────────────────────────
      - name: Keep Runner Alive (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Session complete. Runner stays online to exhaust timeout." -ForegroundColor DarkGray
          Start-Sleep -Seconds 3600

