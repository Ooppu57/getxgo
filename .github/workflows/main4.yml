name: Parrallel Win/Mac

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Select OS Runner Version'
        required: true
        type: choice
        options:
          - 'windows-2025'
          - 'windows-2022'
          - 'windows-11-arm'
          - 'macos-14'
          - 'macos-15'
          - 'macos-26'
          - 'macos-26-intel'
        default: 'windows-2025'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'techx@justzeus.com'
      gologin_email:
        description: 'GoLogin Account Email'
        required: true
        type: string
        default: 'ok6@mnb.net'
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '1'

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Generate Dynamic Matrix
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          OS_VERSION: ${{ inputs.os_version }}
        run: |
          import os, json
          email = os.environ.get("EMAIL", "").strip()
          num_devices = int(os.environ.get("NUM_DEVICES", "1"))
          os_version = os.environ.get("OS_VERSION", "windows-2025")

          includes =[]
          if email:
              for i in range(1, num_devices + 1):
                  if "windows" in os_version.lower():
                      short_os = os_version.replace("windows-", "")
                      device_name = f"{i}-Win-{short_os}"
                  else:
                      short_os = os_version.replace("macos-", "")
                      device_name = f"{i}-mac-{short_os}"

                  includes.append({
                      "device": device_name,
                      "email": email,
                      "os": os_version
                  })

          if not includes:
              print("Error: Valid configuration could not be generated. Exiting.")
              exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")

      - name: Update Workflow Defaults (Remember Inputs)
        shell: python
        env:
          OS_VERSION: ${{ inputs.os_version }}
          GETSCREEN_EMAIL: ${{ inputs.getscreen_email }}
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
        run: |
          import re
          import os
          file_path = ".github/workflows/main4.yml"

          with open(file_path, "r") as f:
              content = f.read()

          def update_default(input_name, new_val):
              global content
              pattern = r"(" + input_name + r":[\s\S]*?default:\s*')[^']*(')"
              content = re.sub(pattern, rf"\g<1>{new_val}\g<2>", content, count=1)

          update_default("os_version", os.environ.get("OS_VERSION"))
          update_default("getscreen_email", os.environ.get("GETSCREEN_EMAIL"))
          update_default("gologin_email", os.environ.get("GOLOGIN_EMAIL"))
          update_default("num_devices", os.environ.get("NUM_DEVICES"))

          with open(file_path, "w") as f:
              f.write(content)

      - name: Commit and Push New Defaults
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/main4.yml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update last used inputs [skip ci]" && git push)

  remote_session:
    name: Remote Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      # ==========================================
      # WINDOWS SPECIFIC STEPS
      # ==========================================
      - name: Install and Start Getscreen.me (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Downloading Getscreen.me Agent..."
          $MaxRetries = 3
          $RetryCount = 0
          $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://getscreen.me/download/getscreen.msi" -OutFile "getscreen.msi" -ErrorAction Stop
                  if ((Get-Item "getscreen.msi").length -gt 1MB) { $Success = $true }
                  else { Start-Sleep -Seconds 5; $RetryCount++ }
              } catch { Start-Sleep -Seconds 5; $RetryCount++ }
          }
          if (-not $Success) { exit 1 }

          $InstallArgs = "/i getscreen.msi /qn REGISTER=`"${{ matrix.email }}`" CONFIG=`"name='${{ matrix.device }}' autostart=true nonadmin=true control=true disable_confirmation=true`""
          Start-Process msiexec.exe -Wait -ArgumentList $InstallArgs
          Write-Host "Getscreen.me is configured and running."

      - name: Download, Install, and Open GoLogin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Downloading GoLogin for Windows..."
          Invoke-WebRequest -Uri "https://dl.gologin.com/gologin.exe" -OutFile "gologin_installer.exe" -ErrorAction Stop
          Start-Process -FilePath ".\gologin_installer.exe" -ArgumentList "/S" -Wait

          $GoLoginPath = "$env:USERPROFILE\AppData\Local\Programs\GoLogin\GoLogin.exe"
          $WaitAttempts = 0
          while (-Not (Test-Path $GoLoginPath) -and $WaitAttempts -lt 30) { Start-Sleep -Seconds 2; $WaitAttempts++ }

          if (-Not (Test-Path $GoLoginPath)) {
              $Found = Get-ChildItem -Path "$env:USERPROFILE\AppData" -Filter "GoLogin.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($Found) { $GoLoginPath = $Found.FullName } else { exit 1 }
          }

          Start-Process $GoLoginPath

      - name: Automate GoLogin Login (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          GOLOGIN_PASSWORD: "11223344"
        run: |
          pip install pyautogui pygetwindow
          $pyCode = "import pyautogui, pygetwindow as gw, time, os, sys`n" +
                    "wait_time = 0`n" +
                    "win = None`n" +
                    "while wait_time < 60:`n" +
                    "    for title in['Gologin', 'GoLogin', 'gologin']:`n" +
                    "        windows = gw.getWindowsWithTitle(title)`n" +
                    "        if windows: win = windows[0]; break`n" +
                    "    if win: break`n" +
                    "    time.sleep(2); wait_time += 2`n" +
                    "if win:`n" +
                    "    try:`n" +
                    "        win.activate()`n" +
                    "        win.maximize()`n" +
                    "    except: pass`n" +
                    "    time.sleep(5)`n" +
                    "    pyautogui.press('tab', presses=8, interval=0.5)`n" +
                    "    pyautogui.press('enter')`n" +
                    "    time.sleep(4)`n" +
                    "    pyautogui.write(os.environ.get('GOLOGIN_EMAIL', ''))`n" +
                    "    pyautogui.press('tab')`n" +
                    "    pyautogui.write(os.environ.get('GOLOGIN_PASSWORD', ''))`n" +
                    "    pyautogui.press('enter')`n" +
                    "    print('Login automated successfully.')`n" +
                    "else: sys.exit(1)`n"
          
          $pyCode | Out-File -FilePath "$env:TEMP\gologin_ui.py" -Encoding utf8
          python -u "$env:TEMP\gologin_ui.py"

      - name: Auto-Detect, Foreground Install & Automate UI Clicks (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host " Parallel UI-Automated Installer is now ACTIVE" -ForegroundColor Cyan
          Write-Host " Watchers started for: AVG, Opera GX, Opera One" -ForegroundColor Cyan
          Write-Host " Installers will POP UP and the script will automatically" -ForegroundColor Cyan
          Write-Host " press Enter/Space/Tab to install and launch them." -ForegroundColor Cyan
          Write-Host "============================================================" -ForegroundColor Cyan

          $dlFolder = "$env:USERPROFILE\Downloads"
          $userProfile = $env:USERPROFILE
          $timeoutSecs = 55 * 60

          # --- AVG watcher ---
          $avgJob = Start-Job -ScriptBlock {
              param($dlFolder, $timeoutSecs)
              $deadline = (Get-Date).AddSeconds($timeoutSecs)
              $installed = $false

              while (-not $installed -and (Get-Date) -lt $deadline) {
                  $candidates = Get-ChildItem -Path $dlFolder -Filter "*avg*.exe" -ErrorAction SilentlyContinue | Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } | Sort-Object LastWriteTime -Descending

                  if ($candidates.Count -gt 0) {
                      $file = $candidates[0]
                      Write-Output "[AVG] Download complete! Opening installer GUI..."

                      $locked = $true
                      while ($locked) { Start-Sleep -Seconds 2; try { $s =[System.IO.File]::Open($file.FullName, 'Open', 'Read', 'None'); $s.Close(); $locked = $false } catch { } }

                      Start-Process -FilePath $file.FullName

                      Write-Output "[AVG] Sending automated UI keys..."
                      $pyCode = "import pyautogui, pygetwindow as gw, time`n" +
                                "for _ in range(60):`n" +
                                "    wins =[w for w in gw.getAllWindows() if 'AVG' in w.title or 'Antivirus' in w.title]`n" +
                                "    if wins:`n" +
                                "        try:`n" +
                                "            wins[0].activate()`n" +
                                "            time.sleep(5)`n" +
                                "            pyautogui.press('enter')`n" +
                                "            time.sleep(1)`n" +
                                "            pyautogui.press('space')`n" +
                                "            print('[AVG-UI] Keys sent to installer.')`n" +
                                "        except Exception as e: print(f'[AVG-UI] Err: {e}')`n" +
                                "        break`n" +
                                "    time.sleep(2)`n"
                      $pyCode | Out-File -FilePath "$env:TEMP\avg_ui.py" -Encoding utf8
                      python -u "$env:TEMP\avg_ui.py"
                      
                      Write-Output "[AVG] Waiting for final application deployment..."
                      $avgPaths = @("C:\Program Files\AVG\Antivirus\AVGUI.exe", "C:\Program Files (x86)\AVG\Antivirus\AVGUI.exe")
                      $launched = $false
                      for ($i = 0; $i -lt 300; $i++) {
                          foreach ($p in $avgPaths) {
                              if (Test-Path $p) {
                                  Start-Sleep -Seconds 3
                                  Write-Output "[AVG] Launching AVG..."
                                  Start-Process -FilePath $p
                                  $launched = $true; break
                              }
                          }
                          if ($launched) { break }
                          Start-Sleep -Seconds 2
                      }
                      $installed = $true
                  } else { Start-Sleep -Seconds 5 }
              }
          } -ArgumentList $dlFolder, $timeoutSecs

          # --- Opera GX watcher ---
          $operaGXJob = Start-Job -ScriptBlock {
              param($dlFolder, $timeoutSecs, $userProfile)
              $deadline = (Get-Date).AddSeconds($timeoutSecs)
              $installed = $false

              while (-not $installed -and (Get-Date) -lt $deadline) {
                  $candidates = Get-ChildItem -Path $dlFolder -Filter "OperaGXSetup.exe" -ErrorAction SilentlyContinue | Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } | Sort-Object LastWriteTime -Descending

                  if ($candidates.Count -gt 0) {
                      $file = $candidates[0]
                      Write-Output "[OperaGX] Download complete! Opening installer GUI..."

                      $locked = $true
                      while ($locked) { Start-Sleep -Seconds 2; try { $s = [System.IO.File]::Open($file.FullName, 'Open', 'Read', 'None'); $s.Close(); $locked = $false } catch { } }

                      Start-Process -FilePath $file.FullName

                      Write-Output "[OperaGX] Sending automated UI keys..."
                      $pyCode = "import pyautogui, pygetwindow as gw, time`n" +
                                "for _ in range(30):`n" +
                                "    wins =[w for w in gw.getAllWindows() if 'Opera' in w.title or 'Installer' in w.title]`n" +
                                "    if wins:`n" +
                                "        try:`n" +
                                "            wins[0].activate()`n" +
                                "            time.sleep(3)`n" +
                                "            pyautogui.press('enter')`n" +
                                "            print('[OperaGX-UI] Keys sent to installer.')`n" +
                                "        except: pass`n" +
                                "        break`n" +
                                "    time.sleep(2)`n"
                      $pyCode | Out-File -FilePath "$env:TEMP\gx_ui.py" -Encoding utf8
                      python -u "$env:TEMP\gx_ui.py"
                      
                      Write-Output "[OperaGX] Waiting for final application deployment..."
                      $gxPath = "$userProfile\AppData\Local\Programs\Opera GX\launcher.exe"
                      $launched = $false
                      for ($i = 0; $i -lt 300; $i++) {
                          if (Test-Path $gxPath) {
                              Start-Sleep -Seconds 3
                              Write-Output "[OperaGX] Launching Opera GX..."
                              Start-Process -FilePath $gxPath
                              $launched = $true; break
                          }
                          Start-Sleep -Seconds 2
                      }
                      $installed = $true
                  } else { Start-Sleep -Seconds 5 }
              }
          } -ArgumentList $dlFolder, $timeoutSecs, $userProfile

          # --- Opera One watcher ---
          $operaOneJob = Start-Job -ScriptBlock {
              param($dlFolder, $timeoutSecs, $userProfile)
              $deadline = (Get-Date).AddSeconds($timeoutSecs)
              $installed = $false

              while (-not $installed -and (Get-Date) -lt $deadline) {
                  $candidates = Get-ChildItem -Path $dlFolder -Filter "OperaSetup.exe" -ErrorAction SilentlyContinue | Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } | Sort-Object LastWriteTime -Descending

                  if ($candidates.Count -gt 0) {
                      $file = $candidates[0]
                      Write-Output "[OperaOne] Download complete! Opening installer GUI..."

                      $locked = $true
                      while ($locked) { Start-Sleep -Seconds 2; try { $s =[System.IO.File]::Open($file.FullName, 'Open', 'Read', 'None'); $s.Close(); $locked = $false } catch { } }

                      Start-Process -FilePath $file.FullName

                      Write-Output "[OperaOne] Sending automated UI keys..."
                      $pyCode = "import pyautogui, pygetwindow as gw, time`n" +
                                "for _ in range(30):`n" +
                                "    wins =[w for w in gw.getAllWindows() if 'Opera' in w.title or 'Installer' in w.title]`n" +
                                "    if wins:`n" +
                                "        try:`n" +
                                "            wins[0].activate()`n" +
                                "            time.sleep(3)`n" +
                                "            pyautogui.press('enter')`n" +
                                "            print('[OperaOne-UI] Keys sent to installer.')`n" +
                                "        except: pass`n" +
                                "        break`n" +
                                "    time.sleep(2)`n"
                      $pyCode | Out-File -FilePath "$env:TEMP\one_ui.py" -Encoding utf8
                      python -u "$env:TEMP\one_ui.py"
                      
                      Write-Output "[OperaOne] Waiting for final application deployment..."
                      $onePath = "$userProfile\AppData\Local\Programs\Opera\launcher.exe"
                      $launched = $false
                      for ($i = 0; $i -lt 300; $i++) {
                          if (Test-Path $onePath) {
                              Start-Sleep -Seconds 3
                              Write-Output "[OperaOne] Launching Opera One..."
                              Start-Process -FilePath $onePath
                              $launched = $true; break
                          }
                          Start-Sleep -Seconds 2
                      }
                      $installed = $true
                  } else { Start-Sleep -Seconds 5 }
              }
          } -ArgumentList $dlFolder, $timeoutSecs, $userProfile

          # Monitor jobs
          $allJobs = @($avgJob, $operaGXJob, $operaOneJob)
          $deadline = (Get-Date).AddSeconds($timeoutSecs)

          while ($true) {
              foreach ($job in $allJobs) {
                  $output = Receive-Job -Job $job -ErrorAction SilentlyContinue
                  if ($output) { foreach ($line in $output) { Write-Host $line } }
              }
              if (($allJobs | Where-Object { $_.State -eq 'Running' }).Count -eq 0 -or (Get-Date) -gt $deadline) { break }
              Start-Sleep -Seconds 5
          }

      - name: Keep Runner Alive (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Session is active. This runner will remain online until the job timeout is reached."
          Start-Sleep -Seconds 3600

      # ==========================================
      # macOS SPECIFIC STEPS
      # ==========================================
      - name: Setup GUI Authorization Credentials (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo sysadminctl -addUser admin -password admin -admin || true
          sudo sysadminctl -adminUser "$USER" -password admin || true
          echo "Credentials configured. User: admin / Pass: admin"

      - name: Install, Bypass Security, and Start Getscreen.me (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L -o getscreen.dmg "https://getscreen.me/download/getscreen.dmg" --retry 3 --retry-delay 5
          hdiutil attach getscreen.dmg -mountpoint /Volumes/getscreen -nobrowse -quiet
          APP_PATH=$(find /Volumes/getscreen -maxdepth 1 -name "*.app" | head -n 1)
          APP_NAME=$(basename "$APP_PATH")
          sudo cp -R "$APP_PATH" /Applications/
          hdiutil detach /Volumes/getscreen -quiet -force

          APP_BUNDLE_ID=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleIdentifier)
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" || true
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" || true

          EXEC_NAME=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleExecutable)
          EXEC_PATH="/Applications/$APP_NAME/Contents/MacOS/$EXEC_NAME"
          sudo "$EXEC_PATH" -install || true
          sudo "$EXEC_PATH" -register "${{ matrix.email }}"
          sudo "$EXEC_PATH" -config "name='${{ matrix.device }}' autostart=true nonadmin=true control=true disable_confirmation=true"
          sudo "$EXEC_PATH" -start || true

      - name: Download, Install, and Open GoLogin (macOS)
        if: runner.os == 'macOS'
        run: |
          if [[ "${{ matrix.os }}" == "macos-13" || "${{ matrix.os }}" == "macos-26-intel" ]]; then
              curl -L -o gologin.dmg "https://dl.gologin.com/gologin.dmg" --retry 3
          else
              curl -L -o gologin.dmg "https://dl.gologin.com/gologin-arm64.dmg" --retry 3
          fi
          hdiutil attach gologin.dmg -mountpoint /Volumes/gologin -nobrowse -quiet
          sudo cp -R /Volumes/gologin/GoLogin.app /Applications/
          hdiutil detach /Volumes/gologin -quiet -force
          open /Applications/GoLogin.app

      - name: Automate GoLogin Login (macOS Native)
        if: runner.os == 'macOS'
        env:
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          GOLOGIN_PASSWORD: "11223344"
        run: |
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '/usr/bin/osascript', 1, 2, 4, 1, 0);" || true
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', 'com.apple.systemevents', 0, 2, 4, 1, 0);" || true

          sleep 30
          osascript -e '
          set userEmail to system attribute "GOLOGIN_EMAIL"
          set userPass to system attribute "GOLOGIN_PASSWORD"
          tell application "System Events"
              tell application "GoLogin" to activate
              delay 3
              repeat 8 times
                  key code 48
                  delay 0.5
              end repeat
              key code 36
              delay 4
              set the clipboard to userEmail
              delay 0.5
              keystroke "v" using command down
              delay 1
              key code 48
              delay 1
              set the clipboard to userPass
              delay 0.5
              keystroke "v" using command down
              delay 1
              key code 36
              delay 5
          end tell
          '

      - name: Auto-Detect, Foreground Install & Automate UI Clicks (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "============================================================"
          echo " Parallel UI-Automated Installer is now ACTIVE"
          echo " Installers will POP UP and the script will automatically"
          echo " use AppleScript to press 'Return' to accept and install."
          echo "============================================================"

          DL_FOLDER="$HOME/Downloads"
          TIMEOUT_SECS=$((55 * 60))
          STATUS_DIR="/tmp/installer_status_$$"
          mkdir -p "$STATUS_DIR"

          SNAPSHOT_FILE="$STATUS_DIR/snapshot"
          find "$DL_FOLDER" -maxdepth 1 \( -iname "*OperaGX*" -o -iname "*Opera GX*" -o -iname "*OperaSetup*" -o -iname "*Opera Installer*" -o -iname "*Opera One*" \) -print 2>/dev/null > "$SNAPSHOT_FILE"

          is_new() { grep -qxF "$1" "$SNAPSHOT_FILE" 2>/dev/null && return 1; return 0; }

          wait_until_stable() {
              if [[ -d "$1" ]]; then
                  local prev_size="-1"; local stable_count=0
                  while[ "$stable_count" -lt 3 ]; do
                      sleep 2
                      local curr_size=$(du -sk "$1" 2>/dev/null | awk '{print $1}')
                      if[ "$curr_size" = "$prev_size" ]; then stable_count=$((stable_count + 1)); else stable_count=0; fi
                      prev_size="$curr_size"
                  done
              else
                  while lsof "$1" >/dev/null 2>&1; do sleep 2; done
              fi
          }

          install_automate_and_launch() {
              local target="$1"
              local label="$2"
              local expected_app=""
              
              if [ "$label" == "OperaGX" ]; then expected_app="/Applications/Opera GX.app"
              else expected_app="/Applications/Opera.app"; fi

              echo "[$label] Opening installer GUI..."
              open "$target"

              echo "[$label] Automating UI clicks via AppleScript..."
              osascript -e '
              tell application "System Events"
                  set attempts to 0
                  repeat while attempts < 30
                      if exists (process 1 where name contains "Opera" and name contains "Installer") then
                          tell (process 1 where name contains "Opera" and name contains "Installer")
                              set frontmost to true
                              delay 2
                              keystroke return
                              delay 1
                              key code 36
                              exit repeat
                          end tell
                      end if
                      delay 2
                      set attempts to attempts + 1
                  end repeat
              end tell
              '

              echo "[$label] Waiting for final application deployment..."
              local attempts=0
              while [[ ! -d "$expected_app" ]] && [[ $attempts -lt 300 ]]; do
                  sleep 2; attempts=$((attempts+1))
              done

              if [[ -d "$expected_app" ]]; then
                  sleep 3
                  echo "[$label] Launching $expected_app..."
                  open "$expected_app"
              fi
          }

          # --- Opera GX Watcher ---
          (
              DEADLINE=$(($(date +%s) + TIMEOUT_SECS))
              INSTALLED=false
              while ! $INSTALLED && [ "$(date +%s)" -lt "$DEADLINE" ]; do
                  while IFS= read -r -d '' candidate; do
                      if is_new "$candidate" && [[ ! "$candidate" =~ \.(crdownload|download|part)$ ]]; then
                          echo "[OperaGX] Detected: $(basename "$candidate")"
                          wait_until_stable "$candidate"
                          install_automate_and_launch "$candidate" "OperaGX"
                          touch "$STATUS_DIR/opera_gx_done"
                          INSTALLED=true
                          break
                      fi
                  done < <(find "$DL_FOLDER" -maxdepth 1 \( -iname "*OperaGX*" -o -iname "*Opera GX*" \) -print0 2>/dev/null)
                  if ! $INSTALLED; then sleep 5; fi
              done
          ) &
          GX_PID=$!

          # --- Opera One Watcher ---
          (
              DEADLINE=$(($(date +%s) + TIMEOUT_SECS))
              INSTALLED=false
              while ! $INSTALLED && [ "$(date +%s)" -lt "$DEADLINE" ]; do
                  while IFS= read -r -d '' candidate; do
                      if is_new "$candidate" && [[ ! "$candidate" =~ \.(crdownload|download|part)$ ]]; then
                          echo "[OperaOne] Detected: $(basename "$candidate")"
                          wait_until_stable "$candidate"
                          install_automate_and_launch "$candidate" "OperaOne"
                          touch "$STATUS_DIR/opera_one_done"
                          INSTALLED=true
                          break
                      fi
                  done < <(find "$DL_FOLDER" -maxdepth 1 \( -iname "*OperaSetup*" -o -iname "*Opera Installer*" -o -iname "*Opera One*" \) ! -iname "*OperaGX*" ! -iname "*Opera GX*" -print0 2>/dev/null)
                  if ! $INSTALLED; then sleep 5; fi
              done
          ) &
          ONE_PID=$!

          wait $GX_PID
          wait $ONE_PID
          rm -rf "$STATUS_DIR"

      - name: Keep Runner Alive (macOS)
        if: always() && runner.os == 'macOS'
        run: |
          echo "Session is active. This runner will remain online until the job timeout is reached."
          sleep 3600
