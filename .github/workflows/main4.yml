name: Parallel Win/Mac Unified

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Select OS Runner Version'
        required: true
        type: choice
        options:
          - 'windows-2025'
          - 'windows-2022'
          - 'windows-11-arm'
          - 'macos-14'
          - 'macos-15'
          - 'macos-26'
          - 'macos-26-intel'
        default: 'windows-2025'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'techx@justzeus.com'
      gologin_email:
        description: 'GoLogin Account Email'
        required: true
        type: string
        default: 'om2@mnb.net'
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '5'
      num_clicks:
        description: 'Number of Click-Only Devices (rest will Install)'
        required: true
        type: choice
        options:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '3'
      software_choice:
        description: 'Select Software & Affiliate Link'
        required: true
        type: choice
        options:
          - 'AVG - TechxTrader'
          - 'AVG - B4Books'
          - 'AVG - F.Ahmad'
          - 'OperaGX - B4Books'
          - 'Opera - Techx'
          - 'Opera - Fatradez'
          - 'Opera - James'
          - 'Opera - Oliver'
          - 'Opera - Mahal'
          - 'Opera - Polar'
          - 'Opera - B4Books'
          - 'Opera-One - Esmeel'
          - 'Opera-One - Harrari'
          - 'Opera-One - Chloe'
          - 'Opera-One - Daisy'
          - 'Opera-One - Jimmy'
          - 'Ad-MVN - Techx'
          - 'Ad-MVN - B4Books'
          - 'Ad-MVN - Orderflowz'
          - 'Ad-MVN - A2Z'
        default: 'Ad-MVN - Techx'
      run_manual_url:
        description: 'Use Manual URL (overrides software choice if checked)'
        required: true
        type: boolean
        default: false
      manual_url:
        description: 'Manual Software URL (only used if Use Manual URL is checked)'
        required: false
        type: string
        default: 'https://checkmyapp.space/sl/v1nrr'

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Generate Dynamic Matrix
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          NUM_CLICKS: ${{ inputs.num_clicks }}
          OS_VERSION: ${{ inputs.os_version }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          RUN_MANUAL: ${{ inputs.run_manual_url }}
          MANUAL_URL: ${{ inputs.manual_url }}
        run: |
          import os, json, random

          email          = os.environ.get("EMAIL", "").strip()
          num_devices    = int(os.environ.get("NUM_DEVICES", "1"))
          num_clicks_raw = int(os.environ.get("NUM_CLICKS", "0"))
          num_clicks     = min(num_clicks_raw, num_devices)
          num_installs   = num_devices - num_clicks
          os_version     = os.environ.get("OS_VERSION", "windows-2025")
          software_choice = os.environ.get("SOFTWARE_CHOICE", "Ad-MVN - Techx")
          run_manual     = os.environ.get("RUN_MANUAL", "false").lower() == "true"
          manual_url_in  = os.environ.get("MANUAL_URL", "").strip()

          avg_urls = {
              "AVG - TechxTrader": "https://u.to/a-trdr/GoeNIg",
              "AVG - B4Books":     "https://u.to/a-b4b/O4eNIg",
              "AVG - F.Ahmad":     "https://u.to/a-fahmad/ooeNIg",
          }
          opera_urls = {
              "OperaGX - B4Books":  "https://u.to/opx-b4b/2nh4Ig",
              "Opera - Techx":      "https://u.to/techxsm/xVyFIg",
              "Opera - Fatradez":   "https://u.to/fatradezsm/cF2FIg",
              "Opera - James":      "https://u.to/jamesxsm/eV2FIg",
              "Opera - Oliver":     "https://u.to/oliverxsm/f12FIg",
              "Opera - Mahal":      "https://u.to/mahalxsm/iF2FIg",
              "Opera - Polar":      "https://u.to/opxplr/wzh4Ig",
              "Opera - B4Books":    "https://u.to/opx-b4b/2nh4Ig",
          }
          opera_one_urls = {
              "Opera-One - Esmeel":  "https://u.to/esmlxopo/cTOGIg",
              "Opera-One - Harrari": "https://u.to/hararixopo/zTOGIg",
              "Opera-One - Chloe":   "https://u.to/chloexopo/_DOGIg",
              "Opera-One - Daisy":   "https://u.to/daisyxopo/LjSGIg",
              "Opera-One - Jimmy":   "https://u.to/jmy/mUZ4Ig",
          }
          ad_mvn_urls = {
              "Ad-MVN - Techx":      "https://u.to/techxadmvnxsmrt/gvd7Ig",
              "Ad-MVN - B4Books":    "https://u.to/b4bxadmvnxsmrt/5-h7Ig",
              "Ad-MVN - Orderflowz": "https://u.to/ordrflzadmvnxsmrt/-fZ7Ig",
              "Ad-MVN - A2Z":        "https://u.to/a2zadmvnxsmrt/Y-t7Ig",
          }
          all_urls = {**avg_urls, **opera_urls, **opera_one_urls, **ad_mvn_urls}

          if run_manual and manual_url_in:
              target_url    = manual_url_in
              software_type = "dynamic_opera"
              exe_filter    = "*.exe"
              dmg_filter    = "*Opera*"
              print(f"[Target] Manual URL override active: {target_url}")
          else:
              target_url = all_urls.get(software_choice, "https://u.to/techxadmvnxsmrt/gvd7Ig")
              if software_choice.startswith("AVG"):
                  software_type = "avg"
                  exe_filter    = "*avg*.exe"
                  dmg_filter    = "*AVG*"
              elif software_choice == "OperaGX - B4Books":
                  software_type = "opera_gx"
                  exe_filter    = "OperaGXSetup*.exe"
                  dmg_filter    = "*Opera*GX*"
              elif software_choice.startswith("Opera-One"):
                  software_type = "opera_one"
                  exe_filter    = "OperaSetup*.exe"
                  dmg_filter    = "*Opera*"
              elif software_choice.startswith("Ad-MVN"):
                  software_type = "dynamic_opera"
                  exe_filter    = "*Opera*Setup*.exe"
                  dmg_filter    = "*Opera*"
              else:
                  software_type = "opera_smart_link"
                  exe_filter    = "*Opera*Setup*.exe"
                  dmg_filter    = "*Opera*"
              print(f"[Target] Software: {software_choice} | Type: {software_type} | URL: {target_url}")

          action_list = ["install"] * num_installs + ["click"] * num_clicks
          random.shuffle(action_list)
          print(f"[Actions] install={num_installs} click={num_clicks} order={action_list}")

          def short_os(v):
              m = {"windows-2025":"W25","windows-2022":"W22","windows-11-arm":"W11A",
                   "macos-14":"M14","macos-15":"M15","macos-26":"M26","macos-26-intel":"M26I"}
              return m.get(v, "OS")

          def short_sw(choice):
              if run_manual and manual_url_in:
                  return "MANUAL"
              pm = {"AVG":"AVG","OperaGX":"OPX","Opera-One":"OPO","Ad-MVN":"MVN","Opera":"OP"}
              for k, p in pm.items():
                  if choice.startswith(k):
                      parts = choice.split(" - ", 1)
                      return f"{p}-{parts[1].replace(' ','')}" if len(parts) > 1 else p
              return choice.replace(" ","")[:8]

          short_os_tag = short_os(os_version)
          short_sw_tag = short_sw(software_choice)

          includes = []
          if email:
              for i in range(1, num_devices + 1):
                  action_mode = action_list[i - 1]
                  action_cap  = action_mode.capitalize()
                  device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_cap}"
                  includes.append({
                      "device":        device_name,
                      "email":         email,
                      "os":            os_version,
                      "target_url":    target_url,
                      "software_type": software_type,
                      "exe_filter":    exe_filter,
                      "dmg_filter":    dmg_filter,
                      "action_mode":   action_mode,
                  })
                  print(f"[Device] {device_name} | {action_mode} | {software_type}")

          if not includes:
              print("ERROR: No valid configuration generated.")
              exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")
          print("========== MATRIX GENERATION COMPLETE ==========")

      - name: Update Workflow Defaults (Remember Inputs)
        shell: python
        env:
          OS_VERSION:       ${{ inputs.os_version }}
          GETSCREEN_EMAIL:  ${{ inputs.getscreen_email }}
          GOLOGIN_EMAIL:    ${{ inputs.gologin_email }}
          NUM_DEVICES:      ${{ inputs.num_devices }}
          NUM_CLICKS:       ${{ inputs.num_clicks }}
          SOFTWARE_CHOICE:  ${{ inputs.software_choice }}
          RUN_MANUAL:       ${{ inputs.run_manual_url }}
          MANUAL_URL:       ${{ inputs.manual_url }}
        run: |
          import re, os

          file_path = ".github/workflows/main4.yml"
          if not os.path.exists(file_path):
              print(f"File {file_path} not found. Skipping auto-save.")
              exit(0)

          with open(file_path, "r", encoding="utf-8") as f:
              content = f.read()

          def update_str_default(input_name, new_val):
              global content
              pattern = r"(" + re.escape(input_name) + r":[\s\S]*?default:\s*')[^']*(')"
              content = re.sub(pattern, rf"\g<1>{new_val}\g<2>", content, count=1)

          def update_bool_default(input_name, new_val):
              global content
              val_str = "true" if str(new_val).lower() == "true" else "false"
              pattern = r"(" + re.escape(input_name) + r":[\s\S]*?default:\s*)(true|false)"
              content = re.sub(pattern, rf"\g<1>{val_str}", content, count=1)

          update_str_default("os_version",       os.environ.get("OS_VERSION", ""))
          update_str_default("getscreen_email",   os.environ.get("GETSCREEN_EMAIL", ""))
          update_str_default("gologin_email",     os.environ.get("GOLOGIN_EMAIL", ""))
          update_str_default("num_devices",       os.environ.get("NUM_DEVICES", ""))
          update_str_default("num_clicks",        os.environ.get("NUM_CLICKS", ""))
          update_str_default("software_choice",   os.environ.get("SOFTWARE_CHOICE", ""))
          update_bool_default("run_manual_url",   os.environ.get("RUN_MANUAL", "false"))
          run_manual = os.environ.get("RUN_MANUAL", "false").lower() == "true"
          if run_manual:
              update_str_default("manual_url",    os.environ.get("MANUAL_URL", ""))
          else:
              update_str_default("manual_url",    "")

          with open(file_path, "w", encoding="utf-8") as f:
              f.write(content)
          print("[Workflow State] Defaults updated successfully.")

      - name: Commit and Push New Defaults
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/main4.yml
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Update last used inputs [skip ci]" && git push)

  remote_session:
    name: Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      # ═════════════ WINDOWS STEPS ═══════════════════════════════════════════
      - name: Disable Windows Defender & Edge SmartScreen
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "======= SYSTEM PREP (Windows) =======" -ForegroundColor Cyan
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          Set-MpPreference -PUAProtection 0 -ErrorAction SilentlyContinue
          Set-MpPreference -DisableBlockAtFirstSeen $true -ErrorAction SilentlyContinue
          Set-MpPreference -DisableIOAVProtection $true -ErrorAction SilentlyContinue
          $edgePolicy = "HKLM:\SOFTWARE\Policies\Microsoft\Edge"
          if (-not (Test-Path $edgePolicy)) { New-Item -Path $edgePolicy -Force | Out-Null }
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenEnabled"                           -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenPuaEnabled"                        -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "DownloadRestrictions"                         -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "PreventSmartScreenPromptOverride"             -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "PreventSmartScreenPromptOverrideForFiles"     -Value 0
          $exemptPath = "$edgePolicy\ExemptDomainFileTypePairsFromFileTypeDownloadWarnings"
          if (-not (Test-Path $exemptPath)) { New-Item -Path $exemptPath -Force | Out-Null }
          Set-ItemProperty -Path $exemptPath -Name "1" -Value '{"domains":["*"],"file_extension":"exe"}'
          Write-Host "[OK] Windows Defender and SmartScreen configured." -ForegroundColor Green

      - name: Install and Start Getscreen.me (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "======= GETSCREEN.ME AGENT (Windows) =======" -ForegroundColor Cyan
          $MaxRetries = 3; $RetryCount = 0; $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://getscreen.me/download/getscreen.msi" -OutFile "getscreen.msi" -ErrorAction Stop
                  if ((Get-Item "getscreen.msi").length -gt 1MB) { $Success = $true }
                  else { Write-Host "File too small, retrying..."; $RetryCount++; Start-Sleep 5 }
              } catch { $RetryCount++; Write-Host "Download failed ($RetryCount/$MaxRetries)"; Start-Sleep 5 }
          }
          if (-not $Success) { Write-Error "Getscreen download failed after $MaxRetries attempts"; exit 1 }
          $DeviceName = "${{ matrix.device }}"
          $InstallArgs = "/i getscreen.msi /qn REGISTER=`"${{ matrix.email }}`" CONFIG=`"name='$DeviceName' autostart=true nonadmin=true control=true disable_confirmation=true`""
          Start-Process msiexec.exe -Wait -ArgumentList $InstallArgs
          Write-Host "[OK] Getscreen.me configured for device: $DeviceName" -ForegroundColor Green

      - name: Download, Install, and Open GoLogin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "======= GOLOGIN SETUP (Windows) =======" -ForegroundColor Cyan
          $MaxRetries = 3; $RetryCount = 0; $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://dl.gologin.com/gologin.exe" -OutFile "gologin_installer.exe" -ErrorAction Stop
                  if ((Get-Item "gologin_installer.exe").length -gt 10MB) { $Success = $true }
                  else { Write-Host "File too small, retrying..."; $RetryCount++; Start-Sleep 5 }
              } catch { $RetryCount++; Write-Host "Download failed ($RetryCount/$MaxRetries)"; Start-Sleep 5 }
          }
          if (-not $Success) { Write-Error "GoLogin download failed"; exit 1 }
          Write-Host "[*] Installing GoLogin silently..."
          Start-Process -FilePath ".\gologin_installer.exe" -ArgumentList "/S" -Wait
          $GoLoginPath = "$env:USERPROFILE\AppData\Local\Programs\GoLogin\GoLogin.exe"
          $WaitAttempts = 0
          while (-Not (Test-Path $GoLoginPath) -and $WaitAttempts -lt 30) { Start-Sleep 2; $WaitAttempts++ }
          if (-Not (Test-Path $GoLoginPath)) {
              $Found = Get-ChildItem -Path "$env:USERPROFILE\AppData" -Filter "GoLogin.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($Found) { $GoLoginPath = $Found.FullName }
              else { Write-Error "GoLogin.exe not found after install"; exit 1 }
          }
          Write-Host "[*] Launching GoLogin from: $GoLoginPath"
          Start-Process $GoLoginPath
          Write-Host "[OK] GoLogin installed and launched." -ForegroundColor Green

      - name: Automate GoLogin Login (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOLOGIN_EMAIL:    ${{ inputs.gologin_email }}
          GOLOGIN_PASSWORD: "11223344"
        run: |
          Write-Host "======= GOLOGIN LOGIN AUTOMATION (Windows) =======" -ForegroundColor Cyan
          pip install pyautogui pygetwindow --quiet
          python -c "
          import pyautogui, pygetwindow as gw, time, os, sys
          max_wait = 60; wait_time = 0; win = None
          print('Polling for GoLogin window (up to 60s)...')
          while wait_time < max_wait:
              for title in ['Gologin', 'GoLogin', 'gologin']:
                  windows = gw.getWindowsWithTitle(title)
                  if windows: win = windows[0]; break
              if win: break
              time.sleep(2); wait_time += 2
              print(f'  Waited {wait_time}s...')
          if win:
              try: win.activate(); win.maximize()
              except: pass
              time.sleep(5)
              print('Navigating to login tab (Tab x8, Enter)...')
              pyautogui.press('tab', presses=8, interval=0.5)
              pyautogui.press('enter')
              time.sleep(4)
              print('Entering credentials...')
              pyautogui.write(os.environ.get('GOLOGIN_EMAIL', ''))
              pyautogui.press('tab')
              pyautogui.write(os.environ.get('GOLOGIN_PASSWORD', ''))
              pyautogui.press('enter')
              print('[OK] Login automation complete.')
          else:
              print('[ERROR] GoLogin window not found.'); sys.exit(1)
          "

      - name: Wait for GoLogin Orbita Profile & Run Software (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET_URL:    ${{ matrix.target_url }}
          SOFTWARE_TYPE: ${{ matrix.software_type }}
          EXE_FILTER:    ${{ matrix.exe_filter }}
          ACTION_MODE:   ${{ matrix.action_mode }}
        run: |
          Write-Host "======= GOLOGIN ORBITA DETECTION & SOFTWARE RUNNER (Windows) =======" -ForegroundColor Cyan
          Write-Host "Target URL  : $env:TARGET_URL"
          Write-Host "Action Mode : $($env:ACTION_MODE.ToUpper())"
          Write-Host "Software    : $env:SOFTWARE_TYPE"

          pip install pywinauto pyautogui pygetwindow keyboard psutil pyperclip --quiet

          # Write the Python automation script to a temp file
          $pyScript = @'
          import time, sys, os, tempfile, random, subprocess, ctypes, psutil
          from pywinauto import Desktop, Application
          import pyautogui
          from pywinauto.keyboard import send_keys
          import pyperclip

          TARGET_URL    = os.environ.get("TARGET_URL", "")
          SOFTWARE_TYPE = os.environ.get("SOFTWARE_TYPE", "dynamic_opera")
          EXE_FILTER    = os.environ.get("EXE_FILTER", "*.exe")
          ACTION_MODE   = os.environ.get("ACTION_MODE", "install")

          DL_FOLDER               = os.path.join(os.environ.get("USERPROFILE",""), "Downloads")
          SENTINEL_PATH           = os.path.join(tempfile.gettempdir(), "download_done.flag")
          INSTALLER_EXECUTED_PATH = os.path.join(tempfile.gettempdir(), "installer_executed.flag")

          def log(tag, msg):
              print(f"[{time.strftime('%H:%M:%S')}][{tag}] {msg}", flush=True)

          # ── Orbita / GoLogin browser detection ──────────────────────────
          ORBITA_TITLE_FRAGMENTS = ["orbita", "gologin browser", "gl browser"]
          ORBITA_EXE_FRAGMENTS   = ["orbita", "gologin", "gl-browser", "gl_browser"]

          def is_orbita_window(wt, proc_name=""):
              if not wt: return False
              tl = wt.lower()
              if any(f in tl for f in ORBITA_TITLE_FRAGMENTS):
                  return True
              if proc_name and any(f in proc_name.lower() for f in ORBITA_EXE_FRAGMENTS):
                  return True
              return False

          def find_orbita_window():
              desktop = Desktop(backend="uia")
              for w in desktop.windows(visible_only=True):
                  wt = w.window_text() or ""
                  try: pn = w.process().name()
                  except: pn = ""
                  if is_orbita_window(wt, pn): return w
              for proc in psutil.process_iter(["name", "pid"]):
                  pname = (proc.info.get("name") or "").lower()
                  if any(f in pname for f in ORBITA_EXE_FRAGMENTS):
                      pid = proc.info["pid"]
                      try:
                          app = Application().connect(process=pid)
                          for win in app.windows():
                              if win.is_visible(): return win
                      except: pass
              return None

          def navigate_orbita_to_url(url, max_wait=300):
              log("OrbitaNav", f"Waiting up to {max_wait}s for Orbita window...")
              deadline = time.time() + max_wait
              orbita_win = None
              while time.time() < deadline:
                  orbita_win = find_orbita_window()
                  if orbita_win:
                      log("OrbitaNav", f"Orbita window found: '{orbita_win.window_text()}'")
                      break
                  time.sleep(2)
              if not orbita_win:
                  log("OrbitaNav", "ERROR: Orbita window never appeared."); return None

              try:
                  orbita_win.set_focus()
                  orbita_win.maximize()
                  time.sleep(1.5)
              except Exception as e:
                  log("OrbitaNav", f"Focus error: {e}")

              log("OrbitaNav", f"Navigating to: {url}")
              strategies = [("^l", "Ctrl+L"), ("{F6}", "F6")]
              for shortcut, desc in strategies:
                  try:
                      orbita_win.set_focus(); time.sleep(0.5)
                      send_keys(shortcut)
                      time.sleep(0.8)
                      send_keys("^a"); time.sleep(0.2)
                      pyperclip.copy(url)
                      time.sleep(0.2)
                      send_keys("^v")
                      time.sleep(0.5)
                      send_keys("{ENTER}")
                      log("OrbitaNav", f"URL entered via {desc}.")
                      return orbita_win
                  except Exception as e:
                      log("OrbitaNav", f"{desc} failed: {e}")
              log("OrbitaNav", "Navigation failed.")
              return orbita_win

          def close_orbita_tab(orbita_win):
              try:
                  orbita_win.set_focus()
                  time.sleep(0.5)
                  send_keys("^w")      # Ctrl+W closes the tab
                  log("CloseTab", "Sent Ctrl+W to close GoLogin profile tab.")
              except Exception as e:
                  log("CloseTab", f"Failed to close tab: {e}")

          # ── Interference / download windows helpers ──────────────────────
          DOWNLOAD_DONE_TITLES = ["Thanks for downloading","Thanks for downloadin","Download | Thanks"]
          INTERFERENCE_TITLES  = ["Settings","Windows Settings","Default apps","System Settings",
                                  "Choose an app","How do you want to open","Open with",
                                  "Windows PowerShell","Administrator: Windows PowerShell",
                                  "Command Prompt","User Account Control"]
          INTERFERENCE_SUBS    = ["default apps","choose a default","set as default","open with"]

          def _is_download_done(wt):
              return any(f.lower() in wt.lower() for f in DOWNLOAD_DONE_TITLES) if wt else False

          def _is_interference(wt):
              if not wt: return False
              for ex in INTERFERENCE_TITLES:
                  if wt.strip().lower() == ex.strip().lower(): return True
              return any(s in wt.lower() for s in INTERFERENCE_SUBS)

          def dismiss_interference(desktop):
              for w in desktop.windows(visible_only=True):
                  wt = w.window_text() or ""
                  if not _is_interference(wt): continue
                  log("WinGuard", f"Closing interference: '{wt}'")
                  try:
                      w.set_focus(); time.sleep(0.2); send_keys("%{F4}")
                  except:
                      try: w.close()
                      except: pass

          def close_download_windows(desktop):
              for w in desktop.windows(visible_only=True):
                  wt = w.window_text() or ""
                  if not _is_download_done(wt): continue
                  log("EdgeClose", f"Closing download window: '{wt}'")
                  try:
                      w.set_focus(); time.sleep(0.3); send_keys("^w")
                  except: pass

          # ── Post‑install flows (Windows) ─────────────────────────────────
          def robust_maximize(desktop, win, sw_type, label=""):
              dismiss_interference(desktop)
              if win:
                  try: win.set_focus(); time.sleep(0.2); win.maximize(); time.sleep(0.3)
                  except Exception: pass
              return win

          def click_button(desktop, win, sw_type, button_names, label=""):
              if not win: return False
              for name in button_names:
                  for btn in win.descendants(control_type="Button"):
                      try:
                          if name.lower() in btn.window_text().lower():
                              btn.click_input()
                              log("BtnClick", f"[{label}] Clicked '{btn.window_text()}'")
                              return True
                      except Exception: pass
              return False

          def opera_one_post_install_win(sw_win, sw_type):
              log("PostInstall-OP1", "=== Opera One Post-Install (Windows) STARTING ===")
              desktop = Desktop(backend="uia")
              for s in range(1, 51):
                  log("PostInstall-OP1", f"  Init wait {s}/50s"); time.sleep(1)
              try: sw_win = robust_maximize(desktop, sw_win, sw_type, "step2")
              except Exception: pass
              time.sleep(5)
              sw, sh = pyautogui.size(); cx, cy = sw // 2, sh // 2
              pyautogui.click(cx, cy); time.sleep(5)
              for i in range(1, 7):
                  desktop = Desktop(backend="uia")
                  sw_win = robust_maximize(desktop, sw_win, sw_type, f"next-{i}")
                  if not click_button(desktop, sw_win, sw_type, ["Next"], f"NEXT-{i}"):
                      pyautogui.click(int(sw * 0.90), int(sh * 0.90))
                  time.sleep(2)
              desktop = Desktop(backend="uia")
              sw_win = robust_maximize(desktop, sw_win, sw_type, "done")
              if not click_button(desktop, sw_win, sw_type, ["Done", "Finish"], "DONE"):
                  pyautogui.click(int(sw * 0.90), int(sh * 0.90))
              time.sleep(5)
              send_keys("{ENTER}"); time.sleep(5)
              desktop = Desktop(backend="uia")
              sw_win = robust_maximize(desktop, sw_win, sw_type, "submit")
              if not click_button(desktop, sw_win, sw_type, ["Submit"], "SUBMIT"):
                  pyautogui.click(sw // 2, int(sh * 0.85))
              time.sleep(5)
              for tab_count in range(8, 19):
                  send_keys("^t"); time.sleep(5)
                  for i in range(1, tab_count + 1):
                      send_keys("{TAB}"); time.sleep(1)
                  send_keys("{ENTER}"); time.sleep(5)
              log("PostInstall-OP1", "=== Opera One Post-Install COMPLETE ===")

          def opera_gx_post_install_win(sw_win, sw_type):
              log("PostInstall-OPGX", "=== Opera GX Post-Install (Windows) STARTING ===")
              desktop = Desktop(backend="uia")
              sw_win = robust_maximize(desktop, sw_win, sw_type, "init")
              time.sleep(0.5)
              sw, sh = pyautogui.size(); cx, cy = sw // 2, sh // 2
              pyautogui.click(cx, cy); time.sleep(0.15); pyautogui.click(cx, cy)
              time.sleep(random.uniform(2.0, 3.0))
              for _ in range(4): send_keys("{TAB}"); time.sleep(random.uniform(1.0, 2.0))
              for _ in range(8): send_keys("{ENTER}"); time.sleep(random.uniform(1.0, 2.0))
              time.sleep(random.uniform(2.0, 3.0))
              for _ in range(6): send_keys("{TAB}"); time.sleep(random.uniform(1.0, 2.0))
              send_keys("{ENTER}"); time.sleep(5)
              for tab_count in range(7, 17):
                  send_keys("^t")
                  for _ in range(tab_count): send_keys("{TAB}"); time.sleep(random.uniform(1.0, 2.0))
                  send_keys("{ENTER}"); time.sleep(5)
              log("PostInstall-OPGX", "=== Opera GX Post-Install COMPLETE ===")

          def avg_post_install_win(avg_win):
              log("PostInstall-AVG", "=== AVG Post-Install (Windows) STARTING ===")
              desktop = Desktop(backend="uia")
              avg_win = robust_maximize(desktop, avg_win, "avg", "init")
              time.sleep(0.5)
              sw, sh = pyautogui.size(); cx, cy = sw // 2, sh // 2
              pyautogui.click(cx, cy); time.sleep(0.15); pyautogui.click(cx, cy)
              time.sleep(5)
              tab_count = 6
              while tab_count < 17:
                  send_keys("^t")
                  for _ in range(tab_count): send_keys("{TAB}"); time.sleep(random.uniform(1.0, 2.0))
                  send_keys("{ENTER}")
                  tab_count += random.randint(1, 2)
                  if tab_count < 17: time.sleep(5)
              log("PostInstall-AVG", "=== AVG Post-Install COMPLETE ===")

          # ── Main automation loop (Windows) ────────────────────────────────
          def handle_automation_win(sw_type, action_mode, timeout=3300):
              start_t = time.time()

              orbita_win = navigate_orbita_to_url(TARGET_URL, max_wait=300)
              if not orbita_win:
                  log("Main", "No Orbita window — aborting."); return

              last_ctrl_j_t    = time.time()
              last_dl_click_t  = 0
              ctrl_j_attempts  = 0
              keep_clicked     = False
              avg_dl_clicked   = False
              smart_link_done  = False
              smart_link_t     = 0
              op1_installer_t  = None; op1_done = False
              opgx_installer_t = None; opgx_done = False
              avg_installer_t  = None; avg_done = False
              dl_windows_closed = False
              proxy_auth_t     = start_t
              last_interference = 0

              log("Main", f"Automation loop started | action={action_mode} | type={sw_type}")

              while time.time() - start_t < timeout:
                  try:
                      desktop     = Desktop(backend="uia")
                      edge_win    = None
                      orbita_win2 = None
                      op_win      = None
                      avg_app_win = None

                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text() or ""
                          wl = wt.lower()
                          if "microsoft edge" in wl: edge_win = w
                          elif is_orbita_window(wt, w.process().name() if w.process() else ""):
                              orbita_win2 = w
                          elif "opera" in wl and "edge" not in wl: op_win = w
                          elif "avg" in wl: avg_app_win = w

                      now = time.time()

                      if now - last_interference >= 2:
                          dismiss_interference(desktop); last_interference = now

                      if not dl_windows_closed and os.path.exists(SENTINEL_PATH):
                          log("Sentinel", "Download sentinel found — closing GoLogin profile tab...")
                          close_orbita_tab(orbita_win)
                          for _ in range(5):
                              close_download_windows(desktop); time.sleep(2)
                          dl_windows_closed = True

                      # Post-install triggers
                      if action_mode == "install" and not op1_done:
                          if sw_type in ["opera_one","dynamic_opera","ad_mvn","opera_smart_link"]:
                              if op1_installer_t is None and os.path.exists(INSTALLER_EXECUTED_PATH):
                                  op1_installer_t = time.time()
                              if op1_installer_t and (now - op1_installer_t) >= 50:
                                  if op_win and "GX" in (op_win.window_text() or "").upper():
                                      op1_done = True
                                  else:
                                      opera_one_post_install_win(op_win, sw_type)
                                      op1_done = True

                      if action_mode == "install" and not opgx_done:
                          if sw_type in ["opera_gx","dynamic_opera","ad_mvn","opera_smart_link"]:
                              if opgx_installer_t is None and os.path.exists(INSTALLER_EXECUTED_PATH):
                                  opgx_installer_t = time.time()
                              if opgx_installer_t and (now - opgx_installer_t) >= 40:
                                  if op_win and "GX" not in (op_win.window_text() or "").upper():
                                      opgx_done = True
                                  else:
                                      opera_gx_post_install_win(op_win, sw_type)
                                      opgx_done = True

                      if sw_type == "avg" and action_mode == "install" and not avg_done:
                          if avg_installer_t is None and os.path.exists(INSTALLER_EXECUTED_PATH):
                              avg_installer_t = time.time()
                          if avg_installer_t and (now - avg_installer_t) >= 60:
                              avg_post_install_win(avg_app_win)
                              avg_done = True

                      # Smart‑link bypass (Tab+Enter after 20s)
                      active_browser = edge_win or orbita_win2
                      if sw_type in ["opera_smart_link","dynamic_opera","ad_mvn"]:
                          if not smart_link_done and active_browser and (now - proxy_auth_t) > 20:
                              try:
                                  active_browser.set_focus(); time.sleep(0.5)
                                  send_keys("{TAB}"); time.sleep(0.5); send_keys("{ENTER}")
                                  log("SmartLink", "Tab+Enter interstitial bypass sent.")
                              except Exception as e: log("SmartLink", f"Bypass error: {e}")
                              smart_link_done = True; smart_link_t = now

                      # Click‑only mode
                      if action_mode == "click":
                          if sw_type in ["opera_smart_link","dynamic_opera","ad_mvn"]:
                              if not smart_link_done: time.sleep(1); continue
                              if now - smart_link_t < 15: time.sleep(1); continue
                          time.sleep(1); continue

                      # Edge download protection (Keep / Keep anyway)
                      if edge_win and action_mode == "install":
                          for btn_name in ["Keep", "Keep anyway"]:
                              for btn in edge_win.descendants(control_type="Button", title=btn_name):
                                  try:
                                      btn.click_input(); keep_clicked = True; time.sleep(0.5)
                                  except Exception: pass

                      # Download button clicker (Opera types)
                      can_dl = True
                      if sw_type in ["opera_smart_link","dynamic_opera","ad_mvn"]:
                          if not smart_link_done or (now - smart_link_t < 15):
                              can_dl = False
                      if edge_win and action_mode == "install" and can_dl and sw_type not in ["avg"]:
                          if now - last_dl_click_t > 5:
                              for btn in (edge_win.descendants(control_type="Button") or []):
                                  btxt = btn.window_text() or ""
                                  if any(k in btxt.lower() for k in ["download opera","download now","télécharger"]):
                                      try:
                                          edge_win.set_focus(); time.sleep(0.5)
                                          btn.click_input(); last_dl_click_t = now
                                          log("Download", f"Clicked: '{btxt}'"); break
                                      except Exception: pass

                      # AVG download trigger
                      if edge_win and sw_type == "avg" and action_mode == "install":
                          if not avg_dl_clicked and (now - proxy_auth_t) > 20:
                              try:
                                  edge_win.set_focus(); time.sleep(0.5)
                                  send_keys("{TAB}"); time.sleep(random.uniform(1, 2))
                                  send_keys("{ENTER}")
                                  log("AVG", "Download trigger sent.")
                                  for w in range(10):
                                      log("AVG", f"  Init wait {w+1}/10s"); time.sleep(1)
                              except Exception as e: log("AVG", f"Trigger error: {e}")
                              avg_dl_clicked = True

                      # Ctrl+J downloads panel
                      can_ctrlj = not (sw_type == "avg" and not avg_dl_clicked)
                      if (action_mode == "install" and not keep_clicked and edge_win
                              and can_ctrlj and (now - last_ctrl_j_t > 15) and ctrl_j_attempts < 4):
                          try:
                              edge_win.set_focus(); time.sleep(0.5)
                              send_keys("^j")
                              last_ctrl_j_t = now; ctrl_j_attempts += 1
                              log("Utility", f"Ctrl+J attempt {ctrl_j_attempts}/4")
                          except Exception: pass

                  except Exception as e:
                      log("Main", f"Loop exception: {e}")
                  time.sleep(1)

              log("Main", "Automation loop complete.")

          handle_automation_win(SOFTWARE_TYPE, ACTION_MODE)
          '@

          $pyScriptPath = "$env:TEMP\win_handler.py"
          $pyScript | Out-File -FilePath $pyScriptPath -Encoding utf8

          # Start the Python handler in background
          Write-Host "[*] Starting Python automation handler..." -ForegroundColor Cyan
          $handlerProc = Start-Process -FilePath python -ArgumentList "-u `"$pyScriptPath`"" -PassThru -WindowStyle Hidden
          Write-Host "[*] Handler PID: $($handlerProc.Id)" -ForegroundColor Cyan

          # Windows install watcher
          if ($env:ACTION_MODE -eq "install") {
            Write-Host "[Watcher] INSTALL path active. Watching Downloads..." -ForegroundColor Cyan
            $dlFolder          = "$env:USERPROFILE\Downloads"
            $timeoutSecs       = 3300
            $softwareType      = $env:SOFTWARE_TYPE
            $exeFilter         = $env:EXE_FILTER
            $sentinelPath      = "$env:TEMP\download_done.flag"
            $installerSentinel = "$env:TEMP\installer_executed.flag"

            $installJob = Start-Job -ScriptBlock {
              param($dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath, $installerSentinel)
              $deadline  = (Get-Date).AddSeconds($timeoutSecs)
              $installed = $false
              Write-Output "[$softwareType-WATCHER] Monitoring: $dlFolder for '$exeFilter'"
              while (-not $installed -and (Get-Date) -lt $deadline) {
                $candidates = Get-ChildItem -Path $dlFolder -Filter $exeFilter -ErrorAction SilentlyContinue |
                  Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } |
                  Sort-Object LastWriteTime -Descending
                if ($candidates.Count -gt 0) {
                  $file = $candidates[0]
                  Write-Output "[$softwareType-WATCHER] Payload found: $($file.Name)"
                  try { Set-Content -Path $sentinelPath -Value "done" -ErrorAction SilentlyContinue } catch {}
                  # Close Edge download tabs
                  $wsh = New-Object -ComObject WScript.Shell
                  for ($ca = 1; $ca -le 4; $ca++) {
                    $edgeProcs = Get-Process -Name "msedge" -ErrorAction SilentlyContinue | Where-Object { $_.MainWindowHandle -ne 0 }
                    if ($edgeProcs) {
                      foreach ($ep in $edgeProcs) {
                        $wsh.AppActivate($ep.Id); Start-Sleep -Milliseconds 500
                        $wsh.SendKeys("^w"); Start-Sleep -Milliseconds 400
                        $wsh.SendKeys("^w")
                      }
                    }
                    Start-Sleep -Milliseconds 800
                  }
                  $actualSw = $softwareType
                  if ($softwareType -in @("ad_mvn","dynamic_opera","opera_smart_link")) {
                    if ($file.Name -match "OperaGX") { $actualSw = "opera_gx" }
                    else { $actualSw = "opera_one" }
                  }
                  # Wait for file unlock
                  $locked = $true
                  while ($locked) {
                    Start-Sleep -Seconds 2
                    try {
                      $s = [System.IO.File]::Open($file.FullName,'Open','Read','None')
                      $s.Close(); $locked = $false
                      Write-Output "[$actualSw-INSTALL] File unlocked."
                    } catch {}
                  }
                  try { Set-Content -Path $installerSentinel -Value "done" } catch {}
                  Write-Output "[$actualSw-INSTALL] Installer sentinel written."
                  Write-Output "[$actualSw-INSTALL] Running: $($file.FullName) /silent"
                  try { Start-Process -FilePath $file.FullName -ArgumentList "/silent" -Wait }
                  catch { Write-Output "[$actualSw-INSTALL] Installer error: $_" }
                  # Launch installed app
                  $appPaths = if ($actualSw -eq "opera_gx") {
                    @("$env:LOCALAPPDATA\Programs\Opera GX\launcher.exe",
                      "C:\Program Files\Opera GX\launcher.exe",
                      "C:\Program Files (x86)\Opera GX\launcher.exe")
                  } elseif ($actualSw -eq "opera_one") {
                    @("$env:LOCALAPPDATA\Programs\Opera\launcher.exe",
                      "C:\Program Files\Opera\launcher.exe",
                      "C:\Program Files (x86)\Opera\launcher.exe")
                  } else {
                    @("C:\Program Files\AVG\Browser\Application\AVGBrowser.exe",
                      "C:\Program Files (x86)\AVG\Browser\Application\AVGBrowser.exe",
                      "C:\Program Files\AVG\Antivirus\AVGUI.exe")
                  }
                  $launched = $false
                  for ($i = 0; $i -lt 150; $i++) {
                    foreach ($p in $appPaths) {
                      if (Test-Path $p) {
                        Start-Sleep -Seconds 3
                        Write-Output "[$actualSw-POST] Launching: $p"
                        Start-Process -FilePath $p; $launched = $true; break
                      }
                    }
                    if ($launched) { break }
                    Start-Sleep -Seconds 2
                  }
                  $installed = $true
                } else { Start-Sleep -Seconds 5 }
              }
              if (-not $installed) { Write-Output "[$softwareType-WATCHER] Timeout. No EXE found." }
            } -ArgumentList $dlFolder, $timeoutSecs, $softwareType, $exeFilter, $sentinelPath, $installerSentinel

            $deadline = (Get-Date).AddSeconds($timeoutSecs)
            while ($true) {
              $out = Receive-Job -Job $installJob -ErrorAction SilentlyContinue
              if ($out) { $out | ForEach-Object { Write-Host $_ } }
              if ($installJob.State -in @("Completed","Failed") -or (Get-Date) -gt $deadline) { break }
              Start-Sleep -Seconds 5
            }
            Write-Host "[Runtime] Install job concluded." -ForegroundColor Green
          } else {
            Write-Host "[Runtime] CLICK-ONLY path. Waiting 90s for page activity..." -ForegroundColor Magenta
            Start-Sleep -Seconds 90
          }

          Write-Host "[*] Waiting for handler process to finish..."
          $handlerProc.WaitForExit(30000) | Out-Null

      - name: Keep Runner Alive (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Session complete. Runner stays online to exhaust timeout." -ForegroundColor DarkGray
          Start-Sleep -Seconds 3600

      # ═════════════ macOS STEPS ═════════════════════════════════════════════
      - name: Setup GUI Auth Credentials & Disable Gatekeeper (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== [$(date '+%H:%M:%S')] macOS Security Setup ==="
          sudo sysadminctl -addUser admin -password admin -admin || true
          sudo sysadminctl -adminUser "$USER" -password admin || true
          sudo spctl --master-disable || true
          sudo defaults write /Library/Preferences/com.apple.security GKAutoRearm -bool false || true
          sudo defaults write /Library/Preferences/com.apple.security AssessmentEnable -bool false || true
          defaults write com.apple.LaunchServices LSQuarantine -bool false || true
          defaults write com.apple.Safari AutoOpenSafeDownloads -bool true || true
          echo "[OK] macOS security configured. admin/admin credentials set."

      - name: Pre-Grant TCC Permissions (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== [$(date '+%H:%M:%S')] Pre-Granting TCC Permissions ==="
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          grant_tcc() {
            sudo sqlite3 "$TCC_DB" \
              "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
               VALUES('$1','$2',$3,2,4,1,0);" 2>/dev/null || true
          }
          grant_tcc kTCCServiceAccessibility com.apple.Terminal         0
          grant_tcc kTCCServiceAccessibility com.apple.systemevents     0
          grant_tcc kTCCServiceAccessibility com.google.Chrome          0
          grant_tcc kTCCServiceAccessibility /usr/bin/osascript         1
          grant_tcc kTCCServiceAccessibility /bin/bash                  1
          grant_tcc kTCCServiceAccessibility /usr/bin/python3           1
          grant_tcc kTCCServiceScreenCapture com.apple.Terminal         0
          grant_tcc kTCCServiceScreenCapture com.google.Chrome          0
          grant_tcc kTCCServiceScreenCapture me.getscreen.agent         0
          grant_tcc kTCCServiceScreenCapture com.getscreen.agent        0
          grant_tcc kTCCServiceLocalNetwork  com.google.Chrome          0
          grant_tcc kTCCServiceLocalNetwork  com.apple.Terminal         0
          grant_tcc kTCCServiceLocalNetwork  /usr/bin/osascript         1
          grant_tcc kTCCServiceLocalNetwork  me.getscreen.agent         0
          grant_tcc kTCCServiceLocalNetwork  com.getscreen.agent        0
          echo "[OK] TCC permissions pre-granted."

      - name: Install Python Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== [$(date '+%H:%M:%S')] Installing Python + cliclick ==="
          VENV_DIR="/tmp/uienv"
          PYTHON_BIN=""
          for c in python3.12 python3.11 python3.10 python3; do
            if command -v "$c" &>/dev/null; then PYTHON_BIN="$c"; break; fi
          done
          [ -z "$PYTHON_BIN" ] && echo "ERROR: No Python3 found" && exit 1
          rm -rf "$VENV_DIR"
          "$PYTHON_BIN" -m venv "$VENV_DIR"
          source "$VENV_DIR/bin/activate"
          pip install --upgrade pip --quiet
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-ApplicationServices --quiet || true
          pip install atomacos Pillow requests psutil pyperclip --quiet || true
          deactivate
          echo "UIENV_PYTHON=$VENV_DIR/bin/python3" >> "$GITHUB_ENV"
          if ! command -v brew &>/dev/null; then
            NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || true
            for bp in /opt/homebrew/bin /usr/local/bin; do
              [ -x "$bp/brew" ] && export PATH="$bp:$PATH" && echo "PATH=$bp:$PATH" >> "$GITHUB_ENV" && break
            done
          fi
          brew install cliclick --quiet || true
          echo "CLICLICK_BIN=$(command -v cliclick || echo not_found)" >> "$GITHUB_ENV"
          echo "[OK] Python venv and cliclick ready."

      - name: Install, Bypass Security, and Start Getscreen.me (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== [$(date '+%H:%M:%S')] Getscreen.me (macOS) ==="
          DEVICE_NAME="${{ matrix.device }}"
          EMAIL="${{ matrix.email }}"
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          curl -L -o getscreen.dmg "https://getscreen.me/download/getscreen.dmg" \
            --retry 3 --retry-delay 5 --silent --show-error || true
          FILE_SIZE=$(stat -f%z getscreen.dmg 2>/dev/null || echo 0)
          [ "$FILE_SIZE" -lt 102400 ] && echo "Getscreen DMG too small, skipping." && exit 0
          hdiutil attach getscreen.dmg -mountpoint /Volumes/getscreen -nobrowse -quiet || true
          APP_PATH=$(find /Volumes/getscreen -maxdepth 1 -name "*.app" | head -n 1 || true)
          [ -z "$APP_PATH" ] && echo "No .app in DMG, skipping." && \
            hdiutil detach /Volumes/getscreen -quiet -force 2>/dev/null && exit 0
          APP_NAME=$(basename "$APP_PATH")
          sudo cp -R "$APP_PATH" /Applications/
          sudo xattr -dr com.apple.quarantine "/Applications/$APP_NAME" 2>/dev/null || true
          hdiutil detach /Volumes/getscreen -quiet -force || true
          APP_BUNDLE_ID=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleIdentifier 2>/dev/null || echo "")
          if [ -n "$APP_BUNDLE_ID" ]; then
            for SVC in kTCCServiceScreenCapture kTCCServiceAccessibility kTCCServiceLocalNetwork; do
              sudo sqlite3 "$TCC_DB" \
                "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
                 VALUES('$SVC','$APP_BUNDLE_ID',0,2,4,1,0);" 2>/dev/null || true
            done
          fi
          EXEC_NAME=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleExecutable 2>/dev/null || echo "")
          EXEC_PATH="/Applications/$APP_NAME/Contents/MacOS/$EXEC_NAME"
          [ ! -x "$EXEC_PATH" ] && EXEC_PATH=$(find "/Applications/$APP_NAME/Contents/MacOS" \
            -maxdepth 1 -type f -perm +111 2>/dev/null | head -n 1 || true)
          [ -z "$EXEC_PATH" ] && echo "Getscreen exec not found, skipping." && exit 0
          sudo "$EXEC_PATH" -install 2>/dev/null || true; sleep 2
          sudo "$EXEC_PATH" -register "$EMAIL" 2>/dev/null || true; sleep 1
          sudo "$EXEC_PATH" -config \
            "name='$DEVICE_NAME' autostart=true nonadmin=true control=true disable_confirmation=true" \
            2>/dev/null || true; sleep 1
          sudo "$EXEC_PATH" -start 2>/dev/null || true
          echo "[OK] Getscreen.me registered as '$DEVICE_NAME' and started."

      - name: Download, Install, and Open GoLogin (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== [$(date '+%H:%M:%S')] GoLogin Setup (macOS) ==="
          OS_VERSION="${{ matrix.os }}"
          if [[ "$OS_VERSION" == "macos-13" || "$OS_VERSION" == "macos-26-intel" ]]; then
            echo "Downloading GoLogin Intel (x64)..."
            curl -L -o gologin.dmg "https://dl.gologin.com/gologin.dmg" --retry 3 --retry-delay 5
          else
            echo "Downloading GoLogin ARM64 (Apple Silicon)..."
            curl -L -o gologin.dmg "https://dl.gologin.com/gologin-arm64.dmg" --retry 3 --retry-delay 5
          fi
          hdiutil attach gologin.dmg -mountpoint /Volumes/gologin -nobrowse -quiet
          sudo cp -R /Volumes/gologin/GoLogin.app /Applications/
          sudo xattr -dr com.apple.quarantine /Applications/GoLogin.app 2>/dev/null || true
          hdiutil detach /Volumes/gologin -quiet -force
