name: Parrallel Win/Mac

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Select OS Runner Version'
        required: true
        type: choice
        options:
          - 'windows-2025'
          - 'windows-2022'
          - 'windows-11-arm'
          - 'macos-14'
          - 'macos-15'
          - 'macos-26'
          - 'macos-26-intel'
        default: 'windows-2025'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'techx@justzeus.com'
      gologin_email:
        description: 'GoLogin Account Email'
        required: true
        type: string
        default: 'ok4@mnb.net'
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '5'

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Generate Dynamic Matrix
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          OS_VERSION: ${{ inputs.os_version }}
        run: |
          import os, json
          email = os.environ.get("EMAIL", "").strip()
          num_devices = int(os.environ.get("NUM_DEVICES", "1"))
          os_version = os.environ.get("OS_VERSION", "windows-2025")
          
          includes =[]
          if email:
              for i in range(1, num_devices + 1):
                  if "windows" in os_version.lower():
                      short_os = os_version.replace("windows-", "")
                      device_name = f"{i}-Win-{short_os}"
                  else:
                      short_os = os_version.replace("macos-", "")
                      device_name = f"{i}-mac-{short_os}"
                      
                  includes.append({
                      "device": device_name, 
                      "email": email,
                      "os": os_version
                  })
                  
          if not includes:
              print("Error: Valid configuration could not be generated. Exiting.")
              exit(1)
              
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")

      - name: Update Workflow Defaults (Remember Inputs)
        shell: python
        env:
          OS_VERSION: ${{ inputs.os_version }}
          GETSCREEN_EMAIL: ${{ inputs.getscreen_email }}
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
        run: |
          import re, os

          file_path = ".github/workflows/main4.yml" 
          if os.path.exists(file_path):
              with open(file_path, "r") as f:
                  content = f.read()

              def update_default(input_name, new_val):
                  global content
                  pattern = r"(" + input_name + r":[\s\S]*?default:\s*')[^']*(')"
                  content = re.sub(pattern, rf"\g<1>{new_val}\g<2>", content, count=1)

              update_default("os_version", os.environ.get("OS_VERSION"))
              update_default("getscreen_email", os.environ.get("GETSCREEN_EMAIL"))
              update_default("gologin_email", os.environ.get("GOLOGIN_EMAIL"))
              update_default("num_devices", os.environ.get("NUM_DEVICES"))

              with open(file_path, "w") as f:
                  f.write(content)

      - name: Commit and Push New Defaults
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/main4.yml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update last used inputs [skip ci]" && git push)

  remote_session:
    name: Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      # =========================================================================================
      # WINDOWS SPECIFIC STEPS
      # =========================================================================================
      - name: Install and Start Getscreen.me (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Downloading Getscreen.me Agent..."
          $MaxRetries = 3; $RetryCount = 0; $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://getscreen.me/download/getscreen.msi" -OutFile "getscreen.msi" -ErrorAction Stop
                  if ((Get-Item "getscreen.msi").length -gt 1MB) { $Success = $true } else { $RetryCount++; Start-Sleep 5 }
              } catch { $RetryCount++; Start-Sleep 5 }
          }
          if (-not $Success) { Write-Error "Failed to download Getscreen.me"; exit 1 }
          
          $DeviceName = "${{ matrix.device }}"
          $InstallArgs = "/i getscreen.msi /qn REGISTER=`"${{ matrix.email }}`" CONFIG=`"name='$DeviceName' autostart=true nonadmin=true control=true disable_confirmation=true`""
          Start-Process msiexec.exe -Wait -ArgumentList $InstallArgs
          Write-Host "✅ Getscreen.me is configured and running."
          
      - name: Download, Install, and Open GoLogin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Downloading GoLogin for Windows..."
          $MaxRetries = 3; $RetryCount = 0; $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://dl.gologin.com/gologin.exe" -OutFile "gologin_installer.exe" -ErrorAction Stop
                  if ((Get-Item "gologin_installer.exe").length -gt 10MB) { $Success = $true } else { $RetryCount++; Start-Sleep 5 }
              } catch { $RetryCount++; Start-Sleep 5 }
          }
          if (-not $Success) { Write-Error "Failed to download GoLogin"; exit 1 }
          
          Start-Process -FilePath ".\gologin_installer.exe" -ArgumentList "/S" -Wait
          $GoLoginPath = "$env:USERPROFILE\AppData\Local\Programs\GoLogin\GoLogin.exe"
          
          $WaitAttempts = 0
          while (-Not (Test-Path $GoLoginPath) -and $WaitAttempts -lt 30) { Start-Sleep -Seconds 2; $WaitAttempts++ }
          if (-Not (Test-Path $GoLoginPath)) {
              $Found = Get-ChildItem -Path "$env:USERPROFILE\AppData" -Filter "GoLogin.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($Found) { $GoLoginPath = $Found.FullName } else { Write-Error "❌ GoLogin.exe not found."; exit 1 }
          }
          Start-Process $GoLoginPath
          Write-Host "✅ GoLogin installed and opened!"
          
      - name: Automate GoLogin Login (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          GOLOGIN_PASSWORD: "11223344"
        run: |
          python -m pip install pyautogui pygetwindow pywinauto keyboard --quiet
          python -c "
          import pyautogui, pygetwindow as gw, time, os, sys
          print('Polling for GoLogin window...')
          wait_time, win = 0, None
          while wait_time < 60:
              for title in['Gologin', 'GoLogin', 'gologin']:
                  windows = gw.getWindowsWithTitle(title)
                  if windows: win = windows[0]; break
              if win: break
              time.sleep(2); wait_time += 2
          
          if win:
              try: win.activate(); win.maximize()
              except: pass
              time.sleep(5)
              pyautogui.press('tab', presses=8, interval=0.5)
              pyautogui.press('enter')
              time.sleep(4)
              pyautogui.write(os.environ.get('GOLOGIN_EMAIL', ''))
              pyautogui.press('tab')
              pyautogui.write(os.environ.get('GOLOGIN_PASSWORD', ''))
              pyautogui.press('enter')
              print('✅ Login automated successfully.')
          else:
              print('❌ Could not find GoLogin window.')
              sys.exit(1)
          "

      - name: Continuous Watcher & Robust Post-Install Sequence (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "==============================================================="
          Write-Host " WAITING FOR MANUAL DOWNLOADS IN GOLOGIN BROWSER (WINDOWS)"
          Write-Host " Monitoring for: AVG, Opera One, Opera GX"
          Write-Host "==============================================================="

          # Full robust UI Post-Install Script from Script 2
          $pyScript = @'
          import time, sys, random, os, ctypes
          from pywinauto import Desktop
          import pyautogui
          from pywinauto.keyboard import send_keys

          def log_msg(tag, msg):
              print(f"[{time.strftime('%H:%M:%S')}][{tag}] {msg}", flush=True)

          INTERFERENCE_TITLES =["Settings", "Windows Settings", "Default apps", "System Settings", "Choose an app", "How do you want to open", "Open with"]
          INTERFERENCE_SUBSTRINGS =["default apps", "choose a default", "set as default", "open with", "how do you want to open"]

          def _is_interference_window(text):
              if not text: return False
              tl = text.lower()
              if text.strip() in INTERFERENCE_TITLES: return True
              for sub in INTERFERENCE_SUBSTRINGS:
                  if sub in tl: return True
              return False

          def _is_target_software_window(text, software_type):
              if not text: return False
              tl = text.lower()
              if software_type == "avg": return "avg" in tl
              elif software_type == "opera_gx": return ("opera" in tl and "gx" in tl) or "opera gx" in tl
              elif software_type == "opera_one": return "opera" in tl and "edge" not in tl and "chrome web store" not in tl
              return False

          def dismiss_interference_windows(desktop, software_type, label=""):
              dismissed_any = False
              try: all_windows = desktop.windows(visible_only=True)
              except Exception: return False
              for window in all_windows:
                  try:
                      wt = window.window_text()
                      if not wt or _is_target_software_window(wt, software_type): continue
                      if _is_interference_window(wt):
                          log_msg("WinGuard", f"Interference window detected: '{wt}' [{label}]")
                          try: window.set_focus(); time.sleep(0.25); send_keys('%{F4}'); dismissed_any = True
                          except: window.close(); dismissed_any = True
                  except: pass
              return dismissed_any

          def robust_maximize_opera_window(desktop, software_type, label=""):
              dismiss_interference_windows(desktop, software_type, label=f"{label}-pre-dismiss")
              found_window = None
              for attempt in range(1, 10):
                  try:
                      for w in desktop.windows(visible_only=True):
                          wt = w.window_text()
                          if wt and _is_target_software_window(wt, software_type):
                              found_window = w
                              break
                  except: pass
                  if found_window: break
                  log_msg("Maximize", f"Waiting for {software_type} window... ({attempt}/10)")
                  time.sleep(3)
              if not found_window: return None
              try: found_window.set_focus(); time.sleep(0.4); found_window.maximize(); time.sleep(0.5)
              except: pass
              try:
                  user32 = ctypes.windll.user32
                  sw, sh = user32.GetSystemMetrics(0), user32.GetSystemMetrics(1)
                  user32.SetWindowPos(found_window.handle, -1, 0, 0, sw, sh, 0x0040 | 0x0020)
              except: pass
              try: found_window.set_focus(); time.sleep(0.2); found_window.maximize()
              except: pass
              return found_window

          def force_maximize_and_focus_target(desktop, target_window, software_type, label=""):
              dismiss_interference_windows(desktop, software_type, label=f"{label}-dismiss")
              found_window = target_window or robust_maximize_opera_window(desktop, software_type, label)
              if found_window:
                  try: found_window.set_focus(); time.sleep(0.2); found_window.maximize()
                  except: pass
              return found_window

          def click_opera_button(desktop, opera_window, software_type, button_names, label=""):
              try:
                  target = force_maximize_and_focus_target(desktop, opera_window, software_type, label)
                  if not target: return False
                  target.set_focus(); time.sleep(0.3)
                  for name in button_names:
                      btns = target.descendants(control_type="Button", title=name)
                      if btns: btns[0].click_input(); log_msg("Click", f"Clicked '{name}' exact."); return True
                  for btn in target.descendants(control_type="Button"):
                      txt = btn.window_text()
                      if txt and any(n.lower() in txt.lower() for n in button_names):
                          btn.click_input(); log_msg("Click", f"Clicked '{txt}' partial."); return True
                  return False
              except Exception as e: return False

          def opera_one_post_install_sequence():
              log_msg("PostInstall-OP1", "=== Opera One Post-Install Sequence Starting ===")
              desktop = Desktop(backend="uia")
              
              log_msg("PostInstall-OP1", "Waiting 50 seconds for initialization...")
              for s in range(50): time.sleep(1)
              
              opera_window = robust_maximize_opera_window(desktop, "opera_one", label="fullscreen")
              time.sleep(10)
              
              sw, sh = pyautogui.size(); cx, cy = sw // 2, sh // 2
              log_msg("PostInstall-OP1", f"Clicking center ({cx}, {cy})...")
              opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_one", "pre-click")
              try: pyautogui.click(cx, cy)
              except: pass
              time.sleep(5)

              for i in range(1, 7):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_one", f"NEXT-{i}")
                  if not click_opera_button(desktop, opera_window, "opera_one", ["Next"]):
                      try: pyautogui.click(int(sw * 0.90), int(sh * 0.90))
                      except: pass
                  time.sleep(2)

              opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_one", "DONE")
              if not click_opera_button(desktop, opera_window, "opera_one", ["Done", "Finish"]):
                  try: pyautogui.click(int(sw * 0.90), int(sh * 0.90))
                  except: pass
              time.sleep(5)

              opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_one", "ENTER")
              send_keys('{ENTER}')
              time.sleep(5)

              opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_one", "SUBMIT")
              if not click_opera_button(desktop, opera_window, "opera_one", ["Submit"]):
                  try: pyautogui.click(sw // 2, int(sh * 0.85))
                  except: pass
              time.sleep(5)

              tab_sequence = list(range(8, 19))
              for cycle_idx, tab_count in enumerate(tab_sequence):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_one", f"cycle{cycle_idx}-pre-CtrlT")
                  send_keys('^t'); time.sleep(5)
                  for i in range(tab_count):
                      force_maximize_and_focus_target(desktop, opera_window, "opera_one", f"cycle{cycle_idx}-TAB{i}")
                      send_keys('{TAB}'); time.sleep(1)
                  force_maximize_and_focus_target(desktop, opera_window, "opera_one", f"cycle{cycle_idx}-ENTER")
                  send_keys('{ENTER}'); time.sleep(5)
                  force_maximize_and_focus_target(desktop, opera_window, "opera_one", f"cycle{cycle_idx}-post-CtrlT")
                  send_keys('^t'); time.sleep(5)

              log_msg("PostInstall-OP1", "=== Opera One Post-Install Completed ===")

          def opera_gx_post_install_sequence():
              log_msg("PostInstall-OPGX", "=== Opera GX Post-Install Sequence Starting ===")
              desktop = Desktop(backend="uia")
              time.sleep(40)
              opera_window = robust_maximize_opera_window(desktop, "opera_gx", label="init")
              time.sleep(0.5)

              sw, sh = pyautogui.size(); cx, cy = sw // 2, sh // 2
              opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", "pre-dblclick")
              try: pyautogui.click(cx, cy); time.sleep(0.15); pyautogui.click(cx, cy)
              except: pass
              time.sleep(random.uniform(2.0, 3.0))

              for i in range(4):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", f"TAB4-{i}")
                  send_keys('{TAB}'); time.sleep(random.uniform(1.0, 2.0))
              for i in range(8):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", f"ENTER8-{i}")
                  send_keys('{ENTER}'); time.sleep(random.uniform(1.0, 2.0))
              time.sleep(random.uniform(2.0, 3.0))
              for i in range(6):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", f"TAB6-{i}")
                  send_keys('{TAB}'); time.sleep(random.uniform(1.0, 2.0))

              opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", "post-TAB6-ENTER")
              send_keys('{ENTER}'); time.sleep(5)

              for tab_count in range(7, 17):
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", f"pre-CtrlT-{tab_count}")
                  send_keys('^t')
                  for i in range(tab_count):
                      opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", f"TAB{tab_count}-{i}")
                      send_keys('{TAB}'); time.sleep(random.uniform(1.0, 2.0))
                  opera_window = force_maximize_and_focus_target(desktop, opera_window, "opera_gx", f"post-TAB-ENTER-{tab_count}")
                  send_keys('{ENTER}'); time.sleep(5)

              log_msg("PostInstall-OPGX", "=== Opera GX Post-Install Completed ===")

          def avg_post_install_sequence():
              log_msg("PostInstall-AVG", "=== AVG Post-Install Sequence Starting ===")
              desktop = Desktop(backend="uia")
              time.sleep(60)
              avg_window = robust_maximize_opera_window(desktop, "avg", label="init")
              time.sleep(0.5)

              sw, sh = pyautogui.size(); cx, cy = sw // 2, sh // 2
              avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", "pre-dblclick")
              try: pyautogui.click(cx, cy); time.sleep(0.15); pyautogui.click(cx, cy)
              except: pass
              time.sleep(5)

              tab_count = 6
              while tab_count < 17:
                  avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", f"pre-CtrlT-{tab_count}")
                  send_keys('^t')
                  for i in range(tab_count):
                      avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", f"TAB-{tab_count}-{i}")
                      send_keys('{TAB}'); time.sleep(random.uniform(1.0, 2.0))
                  avg_window = force_maximize_and_focus_target(desktop, avg_window, "avg", f"ENTER-{tab_count}")
                  send_keys('{ENTER}')
                  tab_count += random.randint(1, 2)
                  time.sleep(5)

              log_msg("PostInstall-AVG", "=== AVG Post-Install Completed ===")

          if __name__ == "__main__":
              sw_type = sys.argv[1]
              if sw_type == "opera_one": opera_one_post_install_sequence()
              elif sw_type == "opera_gx": opera_gx_post_install_sequence()
              elif sw_type == "avg": avg_post_install_sequence()
          '@
          $pyScript | Out-File -FilePath "$env:TEMP\win_handler.py" -Encoding utf8

          $dlFolder = "$env:USERPROFILE\Downloads"
          
          while ($true) {
              $files = Get-ChildItem -Path $dlFolder -Filter "*.exe" -ErrorAction SilentlyContinue | 
                       Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' -and $_.Name -notmatch '\.done$' } |
                       Sort-Object LastWriteTime -Descending

              if ($files.Count -gt 0) {
                  $file = $files[0]
                  $swType = ""
                  
                  if ($file.Name -match "(?i)avg") { $swType = "avg" }
                  elseif ($file.Name -match "(?i)Opera.*GX") { $swType = "opera_gx" }
                  elseif ($file.Name -match "(?i)Opera") { $swType = "opera_one" }

                  if ($swType) {
                      Write-Host "[Watcher] ✅ Detected complete download: $($file.Name)"
                      Write-Host "[Watcher] Software Type identified as: $swType"
                      
                      # Wait for file unlock
                      $locked = $true
                      while ($locked) {
                          Start-Sleep -Seconds 2
                          try {
                              $s = [System.IO.File]::Open($file.FullName, 'Open', 'Read', 'None')
                              $s.Close()
                              $locked = $false
                          } catch { }
                      }
                      
                      # Gracefully close GoLogin Browser via UI Automation/Shortcuts
                      Write-Host "[Watcher] Closing GoLogin Browser windows gracefully..."
                      $wsh = New-Object -ComObject WScript.Shell
                      $targetProcs = Get-Process -Name "Orbita", "chrome" -ErrorAction SilentlyContinue | Where-Object { $_.MainWindowHandle -ne 0 }
                      if ($targetProcs) {
                          foreach ($proc in $targetProcs) {
                              $wsh.AppActivate($proc.Id)
                              Start-Sleep -Milliseconds 500
                              $wsh.SendKeys("^+w")  # Ctrl+Shift+W (Close all tabs)
                              Start-Sleep -Milliseconds 800
                              $wsh.SendKeys("%{F4}") # Alt+F4
                          }
                      }
                      Start-Sleep -Seconds 3
                      
                      # Run Installer
                      Write-Host "[Installer] Executing installer payload silently..."
                      try {
                          Start-Process -FilePath $file.FullName -ArgumentList "/silent" -Wait
                      } catch { Write-Host "Error running installer: $_" }
                      
                      # Launch App
                      Write-Host "[Installer] Ensuring application is launched..."
                      if ($swType -eq "opera_gx") {
                          $appPath = "$env:LOCALAPPDATA\Programs\Opera GX\launcher.exe"
                      } elseif ($swType -eq "opera_one") {
                          $appPath = "$env:LOCALAPPDATA\Programs\Opera\launcher.exe"
                      } else {
                          $appPath = "C:\Program Files\AVG\Browser\Application\AVGBrowser.exe"
                          if (-Not (Test-Path $appPath)) { $appPath = "C:\Program Files (x86)\AVG\Browser\Application\AVGBrowser.exe" }
                      }
                      
                      $WaitSecs = 0
                      while (-Not (Test-Path $appPath) -and $WaitSecs -lt 60) { Start-Sleep 2; $WaitSecs += 2 }
                      if (Test-Path $appPath) { Start-Process -FilePath $appPath }
                      else { Write-Host "Warning: Executable not found at $appPath" }
                      
                      # Run Post Install Python Script
                      Write-Host "[Post-Install] Starting robust UI automation routine for $swType..."
                      python "$env:TEMP\win_handler.py" $swType
                      
                      # Rename to prevent loop reprocessing
                      Rename-Item -Path $file.FullName -NewName "$($file.Name).done" -Force
                      Write-Host "==============================================================="
                      Write-Host " Finished processing $swType. Resuming continuous monitoring..."
                      Write-Host "==============================================================="
                  }
              }
              Start-Sleep -Seconds 5
          }

      # =========================================================================================
      # macOS SPECIFIC STEPS
      # =========================================================================================
      - name: Setup GUI Authorization Credentials (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Creating 'admin' user with password 'admin'..."
          sudo sysadminctl -addUser admin -password admin -admin || true
          echo "Setting default runner password to 'admin' as well..."
          sudo sysadminctl -adminUser "$USER" -password admin || true
          
      - name: Install, Bypass Security, and Start Getscreen.me (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Downloading Getscreen.me Agent for macOS..."
          curl -L -o getscreen.dmg "https://getscreen.me/download/getscreen.dmg" --retry 3 --retry-delay 5
          DeviceName="${{ matrix.device }}"
          
          hdiutil attach getscreen.dmg -mountpoint /Volumes/getscreen -nobrowse -quiet
          APP_PATH=$(find /Volumes/getscreen -maxdepth 1 -name "*.app" | head -n 1)
          APP_NAME=$(basename "$APP_PATH")
          
          sudo cp -R "$APP_PATH" /Applications/
          hdiutil detach /Volumes/getscreen -quiet -force
          
          APP_BUNDLE_ID=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleIdentifier)
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" || true
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" || true
          
          EXEC_NAME=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleExecutable)
          EXEC_PATH="/Applications/$APP_NAME/Contents/MacOS/$EXEC_NAME"
          
          sudo "$EXEC_PATH" -install || true
          sudo "$EXEC_PATH" -register "${{ matrix.email }}"
          sudo "$EXEC_PATH" -config "name='$DeviceName' autostart=true nonadmin=true control=true disable_confirmation=true"
          sudo "$EXEC_PATH" -start || true
          echo "✅ Getscreen.me is running!"
          
      - name: Download, Install, and Open GoLogin (macOS)
        if: runner.os == 'macOS'
        run: |
          OS_VERSION="${{ matrix.os }}"
          if [[ "$OS_VERSION" == "macos-13" || "$OS_VERSION" == "macos-26-intel" ]]; then
              curl -L -o gologin.dmg "https://dl.gologin.com/gologin.dmg" --retry 3 --retry-delay 5
          else
              curl -L -o gologin.dmg "https://dl.gologin.com/gologin-arm64.dmg" --retry 3 --retry-delay 5
          fi
          
          hdiutil attach gologin.dmg -mountpoint /Volumes/gologin -nobrowse -quiet
          sudo cp -R /Volumes/gologin/GoLogin.app /Applications/
          hdiutil detach /Volumes/gologin -quiet -force
          open /Applications/GoLogin.app
          echo "✅ GoLogin installed and opened!"
          
      - name: Automate GoLogin Login (macOS Native)
        if: runner.os == 'macOS'
        env:
          GOLOGIN_EMAIL: ${{ inputs.gologin_email }}
          GOLOGIN_PASSWORD: "11223344"
        run: |
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '/usr/bin/osascript', 1, 2, 4, 1, 0);" || true
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', 'com.apple.systemevents', 0, 2, 4, 1, 0);" || true
          
          sleep 30
          osascript <<'EOF'
          set userEmail to system attribute "GOLOGIN_EMAIL"
          set userPass to system attribute "GOLOGIN_PASSWORD"
          tell application "System Events"
              tell application "GoLogin" to activate
              delay 3
              repeat 8 times
                  key code 48
                  delay 0.5
              end repeat
              key code 36 
              delay 4
              set the clipboard to userEmail
              delay 0.5
              keystroke "v" using command down
              delay 1
              key code 48
              delay 1
              set the clipboard to userPass
              delay 0.5
              keystroke "v" using command down
              delay 1
              key code 36
              delay 5
          end tell
          EOF
          echo "✅ Login automation completed."

      - name: Continuous Watcher & Robust Post-Install Execution (macOS)
        if: always() && runner.os == 'macOS'
        shell: bash
        run: |
          echo "==============================================================="
          echo " WAITING FOR MANUAL DOWNLOADS IN GOLOGIN BROWSER (macOS)"
          echo " Monitoring for: Opera One, Opera GX"
          echo "==============================================================="

          # Setup Dependencies for AppleScript interactions & Cliclick
          brew install cliclick --quiet || true
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          python3 -m pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-ApplicationServices --break-system-packages --quiet || true

          # Full robust AppleScript Post-Install from Script 3
          cat > /tmp/mac_handler.py << 'PYEOF'
          import time, sys, os, subprocess, random

          def log(msg): print(f"[{time.strftime('%H:%M:%S')}] {msg}", flush=True)

          def run_as(script, silent=True):
              try:
                  r = subprocess.run(["osascript", "-e", script], capture_output=True, text=True, timeout=20)
                  return r.stdout.strip()
              except: return ""

          def press(key_name):
              km = {"tab": 48, "return": 36, "space": 49}
              if key_name.lower() in km:
                  run_as(f'tell application "System Events" to key code {km[key_name.lower()]}')

          def running_apps():
              r = run_as('tell application "System Events" to get name of every process whose visible is true')
              return[n.strip() for n in r.split(",") if n.strip()]

          def wait_for_app_launch(app_name, timeout=120):
              log(f"Waiting for '{app_name}' to launch...")
              start = time.time()
              while time.time() - start < timeout:
                  if any(app_name.lower() in a.lower() for a in running_apps()): return True
                  time.sleep(2)
              return False

          def dismiss_system_popups():
              result = run_as(r'''
          tell application "System Events"
            set popupClicked to ""
            try
              tell process "CoreServicesUIAgent"
                repeat with win in (every window)
                  if exists button "Allow" of win then click button "Allow" of win
                end repeat
              end tell
            end try
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName is not "Google Chrome" and pName is not "Orbita" then
                try
                  repeat with win in (every window of proc)
                    set winTitle to ""
                    try
                      set winTitle to (title of win) as string
                    end try
                    if winTitle contains "Allow" or winTitle contains "local network" or winTitle contains "Accessibility" then
                      if exists button "Allow" of win then click button "Allow" of win
                    end if
                  end repeat
                end try
              end if
            end repeat
            return popupClicked
          end tell
          ''')
              return result

          def click_accept_and_install(app_name):
              script = f'''
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName contains "{app_name}" or pName contains "Opera" then
                try
                  repeat with win in (every window of proc)
                    if exists button "Accept and Install" of win then
                      click button "Accept and Install" of win
                      return "clicked"
                    end if
                    if exists button "Accept & Install" of win then
                      click button "Accept & Install" of win
                      return "clicked"
                    end if
                    if exists button "Accept" of win then
                      click button "Accept" of win
                      return "clicked"
                    end if
                  end repeat
                end try
              end if
            end repeat
            return "not_found"
          end tell'''
              res = run_as(script)
              if "clicked" in res: return True
              return False

          def click_button_exact(label):
              res = run_as(fr'''
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              if (name of proc as string) contains "Opera" then
                try
                  repeat with win in (every window of proc)
                    if exists button "{label}" of win then
                      click button "{label}" of win
                      return "clicked"
                    end if
                  end repeat
                end try
              end if
            end repeat
            return "not_found"
          end tell
          ''')
              return "clicked" in res

          def opera_one_flow():
              log("=== Opera One Post-Install Starting ===")
              if not wait_for_app_launch("Opera Installer", 60):
                  if not wait_for_app_launch("Opera", 60): log("Opera not found. Aborting."); return

              run_as('tell application "System Events" to tell process "Opera Installer" to set frontmost to true')
              time.sleep(2)

              for _ in range(10): dismiss_system_popups(); time.sleep(1)

              if not click_accept_and_install("Opera"):
                  log("UI Accept button not found. Tab x3 + Enter fallback...")
                  for _ in range(3): press("tab"); time.sleep(0.5)
                  press("return")

              log("Waiting 30s for Opera One install...")
              for _ in range(30): dismiss_system_popups(); time.sleep(1)

              for i in range(1, 8):
                  if click_button_exact("Next"): log(f"Clicked Next ({i})")
                  else: press("tab"); time.sleep(0.3); press("return")
                  time.sleep(3)

              if click_button_exact("Get Started"): log("Clicked Get Started")
              time.sleep(2)
              if not click_button_exact("Submit"): press("return")
              time.sleep(5)

              run_as('tell application "System Events" to keystroke "n" using command down')
              time.sleep(2)

              tab_count = random.randint(6, 12)
              for _ in range(tab_count):
                  press("tab"); time.sleep(random.uniform(1, 2))
                  dismiss_system_popups()
              press("return")
              log("=== Opera One Complete ===")

          def opera_gx_flow():
              log("=== Opera GX Post-Install Starting ===")
              if not wait_for_app_launch("Opera GX", 60): return
              run_as('tell application "Opera GX" to activate')
              time.sleep(2)

              for _ in range(10): dismiss_system_popups(); time.sleep(1)

              if not click_accept_and_install("Opera GX"):
                  for _ in range(3): press("tab"); time.sleep(0.5)
                  press("return")

              log("Waiting 30s for Opera GX install...")
              for _ in range(30): dismiss_system_popups(); time.sleep(1)

              for _ in range(4): press("tab"); time.sleep(0.5)
              for _ in range(8): press("return"); time.sleep(random.uniform(1, 2)); dismiss_system_popups()
              time.sleep(5)

              run_as('tell application "System Events" to keystroke "n" using command down')
              time.sleep(2)
              tab_count = random.randint(6, 14)
              for _ in range(tab_count):
                  press("tab"); time.sleep(random.uniform(1, 2))
                  dismiss_system_popups()
              press("return")
              log("=== Opera GX Complete ===")

          if __name__ == "__main__":
              sw = sys.argv[1]
              if sw == "opera_one": opera_one_flow()
              elif sw == "opera_gx": opera_gx_flow()
          PYEOF

          DL_FOLDER="$HOME/Downloads"
          
          while true; do
              # Scan for installers
              FILE=$(find "$DL_FOLDER" -maxdepth 1 \( -name "*.dmg" -o -name "*.zip" -o -name "*.pkg" \) ! -name "*.download" ! -name "*.crdownload" ! -name "*.part" ! -name "*.done" 2>/dev/null | head -n 1)
              
              if [ -n "$FILE" ]; then
                  echo "[Watcher] ✅ Detected download: $FILE"
                  
                  # Wait for file to finish writing
                  PREV=0
                  for i in $(seq 1 30); do
                      SZ=$(stat -f%z "$FILE" 2>/dev/null || stat -c%s "$FILE" 2>/dev/null || echo 0)
                      if [ "$SZ" = "$PREV" ] &&[ "$SZ" -gt 500000 ]; then break; fi
                      PREV=$SZ; sleep 2
                  done
                  
                  # Gracefully close GoLogin Browser using shortcuts via AppleScript
                  echo "[Watcher] Closing GoLogin Browser windows gracefully..."
                  # Command+Shift+W (Close all tabs in front window)
                  osascript -e 'tell application "System Events" to keystroke "w" using {command down, shift down}' || true
                  sleep 1
                  # Command+Q (Quit App)
                  osascript -e 'tell application "System Events" to keystroke "q" using command down' || true
                  sleep 3
                  
                  # Identify software & Install
                  SW_TYPE=""
                  EXT="${FILE##*.}"
                  APP_NAME=""
                  
                  if[ "$EXT" = "dmg" ]; then
                      MNT=$(hdiutil attach "$FILE" -nobrowse -quiet 2>/dev/null | awk '/\/Volumes\// {print $NF}' | head -n 1)
                      APP_SRC=$(find "$MNT" -maxdepth 2 -name "*.app" | head -n 1)
                      APP_NAME=$(basename "$APP_SRC")
                      sudo cp -R "$APP_SRC" /Applications/ || true
                      sudo xattr -dr com.apple.quarantine "/Applications/$APP_NAME" 2>/dev/null || true
                      hdiutil detach "$MNT" -quiet -force || true
                  elif [ "$EXT" = "zip" ]; then
                      EXTRACT_DIR="${DL_FOLDER}/extracted_$(date +%s)"
                      mkdir -p "$EXTRACT_DIR"
                      unzip -q -o "$FILE" -d "$EXTRACT_DIR" 2>/dev/null || true
                      APP_SRC=$(find "$EXTRACT_DIR" -maxdepth 4 -name "*.app" ! -path "*/__MACOSX/*" | head -n 1)
                      APP_NAME=$(basename "$APP_SRC")
                      sudo cp -R "$APP_SRC" /Applications/ || true
                      sudo xattr -dr com.apple.quarantine "/Applications/$APP_NAME" 2>/dev/null || true
                  elif [ "$EXT" = "pkg" ]; then
                      sudo installer -pkg "$FILE" -target / -verboseR || true
                      # PKG installs directly, we guess the app name
                      if echo "$FILE" | grep -qi "gx"; then APP_NAME="Opera GX.app"; else APP_NAME="Opera.app"; fi
                  fi
                  
                  if echo "$APP_NAME" | grep -qi "gx"; then
                      SW_TYPE="opera_gx"
                  elif echo "$APP_NAME" | grep -qi "opera"; then
                      SW_TYPE="opera_one"
                  fi
                  
                  if[ -n "$SW_TYPE" ]; then
                      echo "[Installer] Detected Type: $SW_TYPE. Launching /Applications/$APP_NAME..."
                      open "/Applications/$APP_NAME" || true
                      
                      echo "[Post-Install] Starting robust UI automation routine for $SW_TYPE..."
                      python3 /tmp/mac_handler.py "$SW_TYPE"
                  else
                      echo "[Installer] Unrecognized application: $APP_NAME"
                  fi
                  
                  # Rename file to prevent loop reprocessing
                  mv "$FILE" "$FILE.done"
                  echo "==============================================================="
                  echo " Finished processing. Resuming continuous monitoring..."
                  echo "==============================================================="
              fi
              sleep 5
          done
