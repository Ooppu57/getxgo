      # ════════════════════════════════════════════════════════════════════

      # ── 1-M: macOS Security Setup ──────────────────────────────────────
      - name: Setup GUI Auth Credentials & Disable Gatekeeper (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== [$(date '+%H:%M:%S')] macOS Security Setup ==="
          sudo sysadminctl -addUser admin -password admin -admin || true
          sudo sysadminctl -adminUser "$USER" -password admin || true
          sudo spctl --master-disable || true
          sudo defaults write /Library/Preferences/com.apple.security GKAutoRearm -bool false || true
          sudo defaults write /Library/Preferences/com.apple.security AssessmentEnable -bool false || true
          defaults write com.apple.LaunchServices LSQuarantine -bool false || true
          defaults write com.apple.Safari AutoOpenSafeDownloads -bool true || true
          echo "[OK] macOS security configured. admin/admin credentials set."

      # ── 2-M: Pre-Grant TCC Permissions ────────────────────────────────
      - name: Pre-Grant TCC Permissions (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== [$(date '+%H:%M:%S')] Pre-Granting TCC Permissions ==="
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          grant_tcc() {
            sudo sqlite3 "$TCC_DB" \
              "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
               VALUES('$1','$2',$3,2,4,1,0);" 2>/dev/null || true
          }
          grant_tcc kTCCServiceAccessibility com.apple.Terminal         0
          grant_tcc kTCCServiceAccessibility com.apple.systemevents     0
          grant_tcc kTCCServiceAccessibility com.google.Chrome          0
          grant_tcc kTCCServiceAccessibility /usr/bin/osascript         1
          grant_tcc kTCCServiceAccessibility /bin/bash                  1
          grant_tcc kTCCServiceAccessibility /usr/bin/python3           1
          grant_tcc kTCCServiceScreenCapture com.apple.Terminal         0
          grant_tcc kTCCServiceScreenCapture com.google.Chrome          0
          grant_tcc kTCCServiceScreenCapture me.getscreen.agent         0
          grant_tcc kTCCServiceScreenCapture com.getscreen.agent        0
          grant_tcc kTCCServiceLocalNetwork  com.google.Chrome          0
          grant_tcc kTCCServiceLocalNetwork  com.apple.Terminal         0
          grant_tcc kTCCServiceLocalNetwork  /usr/bin/osascript         1
          grant_tcc kTCCServiceLocalNetwork  me.getscreen.agent         0
          grant_tcc kTCCServiceLocalNetwork  com.getscreen.agent        0
          echo "[OK] TCC permissions pre-granted."

      # ── 3-M: Install Python venv + cliclick ───────────────────────────
      - name: Install Python Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== [$(date '+%H:%M:%S')] Installing Python + cliclick ==="
          VENV_DIR="/tmp/uienv"
          PYTHON_BIN=""
          for c in python3.12 python3.11 python3.10 python3; do
            if command -v "$c" &>/dev/null; then PYTHON_BIN="$c"; break; fi
          done
          [ -z "$PYTHON_BIN" ] && echo "ERROR: No Python3 found" && exit 1
          rm -rf "$VENV_DIR"
          "$PYTHON_BIN" -m venv "$VENV_DIR"
          source "$VENV_DIR/bin/activate"
          pip install --upgrade pip --quiet
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-ApplicationServices --quiet || true
          pip install atomacos Pillow requests psutil --quiet || true
          deactivate
          echo "UIENV_PYTHON=$VENV_DIR/bin/python3" >> "$GITHUB_ENV"
          if ! command -v brew &>/dev/null; then
            NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || true
            for bp in /opt/homebrew/bin /usr/local/bin; do
              [ -x "$bp/brew" ] && export PATH="$bp:$PATH" && echo "PATH=$bp:$PATH" >> "$GITHUB_ENV" && break
            done
          fi
          brew install cliclick --quiet || true
          echo "CLICLICK_BIN=$(command -v cliclick || echo not_found)" >> "$GITHUB_ENV"
          echo "[OK] Python venv and cliclick ready."

      # ── 4-M: Install & Start Getscreen.me ─────────────────────────────
      - name: Install, Bypass Security, and Start Getscreen.me (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== [$(date '+%H:%M:%S')] Getscreen.me (macOS) ==="
          DEVICE_NAME="${{ matrix.device }}"
          EMAIL="${{ matrix.email }}"
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          curl -L -o getscreen.dmg "https://getscreen.me/download/getscreen.dmg" \
            --retry 3 --retry-delay 5 --silent --show-error || true
          FILE_SIZE=$(stat -f%z getscreen.dmg 2>/dev/null || echo 0)
          [ "$FILE_SIZE" -lt 102400 ] && echo "Getscreen DMG too small, skipping." && exit 0
          hdiutil attach getscreen.dmg -mountpoint /Volumes/getscreen -nobrowse -quiet || true
          APP_PATH=$(find /Volumes/getscreen -maxdepth 1 -name "*.app" | head -n 1 || true)
          [ -z "$APP_PATH" ] && echo "No .app in DMG, skipping." && \
            hdiutil detach /Volumes/getscreen -quiet -force 2>/dev/null && exit 0
          APP_NAME=$(basename "$APP_PATH")
          sudo cp -R "$APP_PATH" /Applications/
          sudo xattr -dr com.apple.quarantine "/Applications/$APP_NAME" 2>/dev/null || true
          hdiutil detach /Volumes/getscreen -quiet -force || true
          APP_BUNDLE_ID=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleIdentifier 2>/dev/null || echo "")
          if [ -n "$APP_BUNDLE_ID" ]; then
            for SVC in kTCCServiceScreenCapture kTCCServiceAccessibility kTCCServiceLocalNetwork; do
              sudo sqlite3 "$TCC_DB" \
                "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
                 VALUES('$SVC','$APP_BUNDLE_ID',0,2,4,1,0);" 2>/dev/null || true
            done
          fi
          EXEC_NAME=$(defaults read "/Applications/$APP_NAME/Contents/Info.plist" CFBundleExecutable 2>/dev/null || echo "")
          EXEC_PATH="/Applications/$APP_NAME/Contents/MacOS/$EXEC_NAME"
          [ ! -x "$EXEC_PATH" ] && EXEC_PATH=$(find "/Applications/$APP_NAME/Contents/MacOS" \
            -maxdepth 1 -type f -perm +111 2>/dev/null | head -n 1 || true)
          [ -z "$EXEC_PATH" ] && echo "Getscreen exec not found, skipping." && exit 0
          sudo "$EXEC_PATH" -install 2>/dev/null || true; sleep 2
          sudo "$EXEC_PATH" -register "$EMAIL" 2>/dev/null || true; sleep 1
          sudo "$EXEC_PATH" -config \
            "name='$DEVICE_NAME' autostart=true nonadmin=true control=true disable_confirmation=true" \
            2>/dev/null || true; sleep 1
          sudo "$EXEC_PATH" -start 2>/dev/null || true
          echo "[OK] Getscreen.me registered as '$DEVICE_NAME' and started."

      # ── 5-M: Download & Open GoLogin ──────────────────────────────────
      - name: Download, Install, and Open GoLogin (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== [$(date '+%H:%M:%S')] GoLogin Setup (macOS) ==="
          OS_VERSION="${{ matrix.os }}"
          if [[ "$OS_VERSION" == "macos-13" || "$OS_VERSION" == "macos-26-intel" ]]; then
            echo "Downloading GoLogin Intel (x64)..."
            curl -L -o gologin.dmg "https://dl.gologin.com/gologin.dmg" --retry 3 --retry-delay 5
          else
            echo "Downloading GoLogin ARM64 (Apple Silicon)..."
            curl -L -o gologin.dmg "https://dl.gologin.com/gologin-arm64.dmg" --retry 3 --retry-delay 5
          fi
          hdiutil attach gologin.dmg -mountpoint /Volumes/gologin -nobrowse -quiet
          sudo cp -R /Volumes/gologin/GoLogin.app /Applications/
          sudo xattr -dr com.apple.quarantine /Applications/GoLogin.app 2>/dev/null || true
          hdiutil detach /Volumes/gologin -quiet -force
          echo "Launching GoLogin..."
          open /Applications/GoLogin.app
          echo "[OK] GoLogin installed and opened."

      # ── 6-M: Automate GoLogin Login ───────────────────────────────────
      - name: Automate GoLogin Login (macOS)
        if: runner.os == 'macOS'
        env:
          GOLOGIN_EMAIL:    ${{ inputs.gologin_email }}
          GOLOGIN_PASSWORD: "11223344"
        run: |
          echo "=== [$(date '+%H:%M:%S')] GoLogin Login Automation (macOS) ==="
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          sudo sqlite3 "$TCC_DB" \
            "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
             VALUES('kTCCServiceAccessibility','/usr/bin/osascript',1,2,4,1,0);" 2>/dev/null || true
          sudo sqlite3 "$TCC_DB" \
            "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
             VALUES('kTCCServiceAccessibility','com.apple.systemevents',0,2,4,1,0);" 2>/dev/null || true
          echo "Waiting 30s for GoLogin to render..."
          sleep 30
          echo "Automating login via AppleScript (clipboard method)..."
          osascript <<'EOF'
          set userEmail to system attribute "GOLOGIN_EMAIL"
          set userPass  to system attribute "GOLOGIN_PASSWORD"
          tell application "System Events"
              tell application "GoLogin" to activate
              delay 3
              repeat 8 times
                  key code 48; delay 0.5
              end repeat
              key code 36; delay 4
              set the clipboard to userEmail
              delay 0.5; keystroke "v" using command down; delay 1
              key code 48; delay 1
              set the clipboard to userPass
              delay 0.5; keystroke "v" using command down; delay 1
              key code 36; delay 5
          end tell
          EOF
          echo "[OK] GoLogin login automation complete."

