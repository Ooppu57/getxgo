          def post_avg(avgwin):
              log("PostAVG","=== AVG Post-Install ===")
              desktop=Desktop(backend="uia"); avgwin=find_sw_window(desktop,"avg")
              focus_max(avgwin); sw2,sh2=pyautogui.size()
              try: pyautogui.click(sw2//2,sh2//2); time.sleep(0.15); pyautogui.click(sw2//2,sh2//2)
              except: pass
              for s in range(1,6): time.sleep(1)
              tab_count=6; tab_ceil=17
              while tab_count<=tab_ceil:
                  desktop=Desktop(backend="uia"); avgwin=find_sw_window(desktop,"avg")
                  focus_max(avgwin); send_keys('^t')
                  for i in range(1,tab_count+1):
                      desktop=Desktop(backend="uia"); avgwin=find_sw_window(desktop,"avg")
                      focus_max(avgwin); send_keys('{TAB}'); time.sleep(random.uniform(1,2))
                  desktop=Desktop(backend="uia"); avgwin=find_sw_window(desktop,"avg")
                  focus_max(avgwin); send_keys('{ENTER}')
                  tab_count+=random.randint(1,2)
                  if tab_count<=tab_ceil:
                      for s in range(1,6): time.sleep(1)
              log("PostAVG","=== Done ===")

          # ════════════════════════════════════════════════════════════════════
          # MAIN LOOP
          # ════════════════════════════════════════════════════════════════════
          def run(sw_type, action_mode, timeout=450):
              if not TARGET_URL or not TARGET_URL.strip():
                  log("Main","FATAL: TARGET_URL empty."); sys.exit(1)

              log("Main",f"START | mode={action_mode} | sw={sw_type} | url={TARGET_URL}")
              t_start = time.time()
              page_load_t = None   # Timestamp when Edge shows real content

              # Launch Edge with URL + proxy
              launch_edge("init"); time.sleep(8)

              # Verify Edge loaded content; relaunch up to 3x if blank
              for chk in range(3):
                  d=Desktop(backend="uia"); loaded=False
                  for w in d.windows(visible_only=True):
                      wt=w.window_text() or ""
                      if ("Microsoft Edge" in wt or "msedge" in wt.lower()) and edge_has_content(wt):
                          log("Main",f"URL verified chk{chk+1}: '{wt}'")
                          page_load_t=time.time(); loaded=True; break
                  if loaded: break
                  log("Main",f"Edge blank on chk{chk+1} — relaunch...")
                  launch_edge(f"retry{chk+2}"); time.sleep(7)
              if page_load_t is None:
                  log("Main","WARNING: URL load unverified. Using current time."); page_load_t=time.time()

              dl_clicked       = False
              dl_confirmed     = False   # True when sentinel appears (file downloaded)
              keep_done        = False
              dl_click_t       = 0
              dl_click_n       = 0
              MAX_DL_CLICKS    = 4       # Max re-attempts if download not confirmed
              last_dl_retry    = 0
              smart_link_done  = False
              smart_link_t     = 0

              op1_t=None;  op1_done=False
              opgx_t=None; opgx_done=False
              avg_t=None;  avg_done=False
              dl_wins_closed=False; actual_sw=sw_type

              last_auth_t=0; AUTH_CD=8
              last_sweep_t=0; SWEEP_I=2

              while time.time()-t_start < timeout:
                  if os.path.exists(SEN_EXIT):
                      log("Main","Exit sentinel found. Stopping."); sys.exit(0)
                  try:
                      desktop=Desktop(backend="uia")
                      edge_win=None; opera_win=None; avg_win=None
                      for w in desktop.windows(visible_only=True):
                          wt=w.window_text() or ""
                          if "Microsoft Edge" in wt or "sudetyj" in wt or wt=="Edge": edge_win=w
                          if ("Opera" in wt or "Speed Dial" in wt or "Start Page" in wt or "Welcome" in wt) \
                             and "Microsoft Edge" not in wt and "Edge" not in wt \
                             and "Chrome Web Store" not in wt: opera_win=w
                          if "AVG" in wt: avg_win=w

                      now=time.time()

                      # Interference sweep
                      if now-last_sweep_t>=SWEEP_I:
                          dismiss_interference(desktop,sw_type); last_sweep_t=now

                      # Blank Edge guard — relaunch if still blank 25s after last load
                      if edge_win and action_mode=="install":
                          wt_c=(edge_win.window_text() or "").strip()
                          if (now-page_load_t)>25 and not edge_has_content(wt_c):
                              log("BlankGuard",f"Edge blank '{wt_c}' after {now-page_load_t:.0f}s. Relaunch.")
                              launch_edge("blank-rl"); page_load_t=time.time()
                              dl_clicked=False; dl_click_n=0; time.sleep(8); continue

                      # Connection/proxy error — relaunch
                      if edge_win and action_mode=="install" and detect_edge_error(edge_win):
                          log("ErrGuard","Edge error. Relaunch.")
                          launch_edge("err-rl")
                          page_load_t=time.time(); t_start=time.time()
                          dl_clicked=False; dl_click_n=0; keep_done=False
                          dl_wins_closed=False; smart_link_done=False; last_auth_t=0
                          time.sleep(8); continue

                      # Proxy auth
                      if USE_PROXY and (now-last_auth_t>AUTH_CD):
                          for aw in desktop.windows(visible_only=True):
                              try:
                                  awt=aw.window_text() or ""
                                  if "Microsoft Edge" in awt and awt!="Microsoft Edge": continue
                                  if is_target_sw(awt,sw_type): continue
                                  if is_proxy_auth(awt):
                                      if inject_auth(aw,f"top-{awt[:15]}"): last_auth_t=now; break
                              except: pass
                          if edge_win and (now-last_auth_t>AUTH_CD):
                              try:
                                  for ch in edge_win.children():
                                      if is_proxy_auth(ch.window_text() or ""):
                                          if inject_auth(ch,"edge-ch"): last_auth_t=now; break
                              except: pass

                      # Download sentinel
                      if not dl_wins_closed and os.path.exists(SEN_DOWNLOAD):
                          log("Sentinel","Download flag found. Closing Edge windows...")
                          for _ in range(7):
                              still=close_dl_windows(desktop); time.sleep(2)
                              if not still: break
                          dl_wins_closed=True; dl_confirmed=True; edge_win=None

                      # Read actual software from installer sentinel
                      if os.path.exists(SEN_INSTALLER):
                          try:
                              with open(SEN_INSTALLER,"r") as f: fc=f.read().strip()
                              if fc in ("opera_one","opera_gx","avg"): actual_sw=fc
                          except: pass

                      # Post-install sequences
                      if action_mode=="install":
                          if actual_sw=="opera_one" and not op1_done:
                              if op1_t is None and os.path.exists(SEN_INSTALLER): op1_t=time.time()
                              elif op1_t and (time.time()-op1_t)>=25: post_opera_one(opera_win,actual_sw); op1_done=True
                          if actual_sw=="opera_gx" and not opgx_done:
                              if opgx_t is None and os.path.exists(SEN_INSTALLER): opgx_t=time.time()
                              elif opgx_t and (time.time()-opgx_t)>=40: post_opera_gx(opera_win); opgx_done=True
                          if actual_sw=="avg" and not avg_done:
                              if avg_t is None and os.path.exists(SEN_INSTALLER): avg_t=time.time()
                              elif avg_t and (time.time()-avg_t)>=60: post_avg(avg_win); avg_done=True

                      # Cookie consent
                      if edge_win:
                          try:
                              for btn in edge_win.descendants(control_type="Button"):
                                  try: bt=(btn.window_text() or "").strip()
                                  except: continue
                                  if bt and kw_match(bt,COOKIE_KW): btn.click_input(); time.sleep(1); break
                          except: pass

                      # Smart link interstitial bypass
                      if edge_win and sw_type=="opera_smart_link" and not smart_link_done:
                          if (now-page_load_t)>40:
                              try:
                                  edge_win.set_focus(); time.sleep(0.5)
                                  send_keys('{TAB}'); time.sleep(1); send_keys('{ENTER}')
                                  log("SmartLink","TAB+ENTER bypass injected.")
                              except: pass
                              smart_link_done=True; smart_link_t=time.time(); page_load_t=time.time()

                      if action_mode=="click":
                          if sw_type=="opera_smart_link":
                              if not smart_link_done or (now-smart_link_t<15): time.sleep(1); continue
                          time.sleep(1); continue

                      can_dl=True
                      if sw_type=="opera_smart_link":
                          if not smart_link_done or (now-smart_link_t<15): can_dl=False

                      elapsed_page=now-page_load_t

                      # PRIMARY download click — after 30s page load, up to MAX_DL_CLICKS re-attempts
                      if edge_win and can_dl and action_mode=="install" and not dl_confirmed:
                          if not dl_clicked and elapsed_page>30:
                              log("Main",f"Page {elapsed_page:.0f}s. Firing download detection...")
                              try: edge_win.set_focus()
                              except: pass
                              click_download_button(edge_win,sw_type)
                              dl_clicked=True; dl_click_n=1; dl_click_t=time.time(); last_dl_retry=time.time()

                          elif (dl_clicked and not dl_confirmed
                                and dl_click_n<MAX_DL_CLICKS
                                and (now-last_dl_retry)>25):
                              log("Main",f"Download not confirmed. Re-attempt {dl_click_n+1}/{MAX_DL_CLICKS}...")
                              try: edge_win.set_focus()
                              except: pass
                              time.sleep(0.5); click_download_button(edge_win,sw_type)
                              dl_click_n+=1; last_dl_retry=time.time()

                      # KEEP button — fires once, 4s after download click
                      if edge_win and dl_clicked and not keep_done and not dl_confirmed:
                          if (now-dl_click_t)>=4:
                              log("Main","Firing Keep button detection...")
                              try: edge_win.set_focus()
                              except: pass
                              result=click_keep_button(edge_win)
                              keep_done=True
                              if result:
                                  dl_confirmed=True
                                  log("Main","Keep clicked — download confirmed.")

                      # Extension addition
                      if edge_win and action_mode=="install":
                          for btitle in ("Add extension","Add to Chrome","Get"):
                              try:
                                  btns=edge_win.descendants(control_type="Button",title=btitle)
                                  if btns: edge_win.set_focus(); time.sleep(0.4); btns[0].click_input(); time.sleep(2); break
                              except: pass

                  except: pass
                  time.sleep(1)

          if __name__=="__main__":
              sw   = sys.argv[1] if len(sys.argv)>1 else "avg"
              mode = sys.argv[2] if len(sys.argv)>2 else "install"
              run(sw, mode)
          '@
          $py | Out-File -FilePath "$env:TEMP\auto_handler.py" -Encoding utf8

          # Start Python in background
          Write-Host "[UI-Engine] Starting background automation..." -ForegroundColor DarkGray
          Start-Process -FilePath "python" `
              -ArgumentList "-u `"$env:TEMP\auto_handler.py`" `"$env:SOFTWARE_TYPE`" `"$env:ACTION_MODE`"" `
              -WindowStyle Hidden

          $dlFolder     = "$env:USERPROFILE\Downloads"
          $timeoutSecs  = 450
          $swType       = $env:SOFTWARE_TYPE
          $exeFilter    = $env:EXE_FILTER
          $senDL        = "$env:TEMP\download_done.flag"
          $senInst      = "$env:TEMP\installer_executed.flag"
          $senExit      = "$env:TEMP\exit_now.flag"
          $senInstRan   = "$env:TEMP\installer_ran_ok.flag"

          # Kill Edge so Python's guaranteed launcher takes over cleanly
          Stop-Process -Name "msedge" -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2

          Write-Host "========== RUNTIME EXECUTION ==========" -ForegroundColor Cyan

          if ($env:ACTION_MODE -eq "install") {
              Write-Host "[Runtime] INSTALL pathway." -ForegroundColor Cyan

              $installJob = Start-Job -ScriptBlock {
                  param($dlFolder,$timeoutSecs,$swType,$exeFilter,$senDL,$senInst,$senExit,$senInstRan)

                  $deadline   = (Get-Date).AddSeconds($timeoutSecs)
                  $installed  = $false
                  # 120s download deadline: starts from job begin + 35s buffer for Edge/proxy load
                  $dlDeadline = (Get-Date).AddSeconds(155)

                  Write-Output "[$($swType.ToUpper())-WATCHER] Dir=$dlFolder | Filter=$exeFilter | DL deadline in ~155s"

                  while (-not $installed -and (Get-Date) -lt $deadline) {

                      $cands = Get-ChildItem -Path $dlFolder -Filter $exeFilter -EA SilentlyContinue |
                               Where-Object { $_.Name -notmatch '\.(crdownload|part|tmp)$' } |
                               Sort-Object LastWriteTime -Descending

                      if ($cands.Count -gt 0) {
                          $file = $cands[0]
                          Write-Output "[$($swType.ToUpper())-WATCHER] Found: $($file.Name)"
                          try { Set-Content -Path $senDL -Value "done" -EA SilentlyContinue } catch {}

                          # Close Edge
                          for ($ca=1; $ca -le 4; $ca++) {
                              try {
                                  $wsh=New-Object -ComObject WScript.Shell
                                  $eps=Get-Process -Name "msedge" -EA SilentlyContinue | Where-Object { $_.MainWindowHandle -ne 0 }
                                  if ($eps) {
                                      foreach ($ep in $eps) {
                                          $wsh.AppActivate($ep.Id); Start-Sleep -Milliseconds 500
                                          $wsh.SendKeys("^w"); Start-Sleep -Milliseconds 400
                                          $wsh.SendKeys("^w"); Start-Sleep -Milliseconds 400
                                      }
                                  } else { $wsh.SendKeys("^w"); Start-Sleep -Milliseconds 500; $wsh.SendKeys("^w") }
                                  Start-Sleep -Milliseconds 700
                                  if (-not (Get-Process -Name "msedge" -EA SilentlyContinue | Where-Object { $_.MainWindowHandle -ne 0 })) { break }
                              } catch {}
                              Start-Sleep -Milliseconds 400
                          }
                          if (Get-Process -Name "msedge" -EA SilentlyContinue) {
                              Stop-Process -Name "msedge" -Force -EA SilentlyContinue
                          }

                          # Fingerprint actual software
                          $actual = $swType
                          if ($swType -in @("ad_mvn","dynamic_opera","opera_smart_link")) {
                              if      ($file.Name -match "OperaGX")             { $actual="opera_gx" }
                              elseif  ($file.Name -match "Opera.*Setup|Opera")  { $actual="opera_one" }
                              elseif  ($file.Name -match "avg")                 { $actual="avg" }
                              else                                               { $actual="opera_one" }
                          } elseif ($swType -eq "opera_gx") {
                              if      ($file.Name -match "OperaGX")             { $actual="opera_gx" }
                              elseif  ($file.Name -match "Opera.*Setup")        { $actual="opera_one" }
                          } elseif ($swType -eq "opera_one") {
                              $actual = if ($file.Name -match "OperaGX") { "opera_gx" } else { "opera_one" }
                          }
                          Write-Output "[$($actual.ToUpper())-INSTALL] Fingerprint: $actual"

                          # Wait for file unlock
                          $locked=$true
                          while ($locked) {
                              Start-Sleep -Seconds 2
                              try { $s=[System.IO.File]::Open($file.FullName,'Open','Read','None'); $s.Close(); $locked=$false
                                    Write-Output "[$($actual.ToUpper())-INSTALL] File ready." } catch {}
                          }

                          try { Set-Content -Path $senInst -Value $actual -EA SilentlyContinue } catch {}
                          Write-Output "[$($actual.ToUpper())-INSTALL] Running installer: $($file.FullName) /silent"
                          try {
                              Start-Process -FilePath $file.FullName -ArgumentList "/silent" -Wait
                              Write-Output "[$($actual.ToUpper())-INSTALL] Complete."
                          } catch { Write-Output "[$($actual.ToUpper())-INSTALL] Error: $_" }

                          # Launch installed app
                          if ($actual -eq "opera_gx") {
                              $appPaths=@("$env:LOCALAPPDATA\Programs\Opera GX\launcher.exe",
                                          "$env:LOCALAPPDATA\Programs\Opera GX\opera.exe",
                                          "C:\Program Files\Opera GX\launcher.exe",
                                          "C:\Program Files (x86)\Opera GX\launcher.exe")
                          } elseif ($actual -eq "opera_one") {
                              $appPaths=@("$env:LOCALAPPDATA\Programs\Opera\launcher.exe",
                                          "$env:LOCALAPPDATA\Programs\Opera\opera.exe",
                                          "C:\Program Files\Opera\launcher.exe",
                                          "C:\Program Files (x86)\Opera\launcher.exe")
                          } else {
                              $appPaths=@("C:\Program Files\AVG\Browser\Application\AVGBrowser.exe",
                                          "C:\Program Files (x86)\AVG\Browser\Application\AVGBrowser.exe",
                                          "C:\Program Files\AVG\Antivirus\AVGUI.exe",
                                          "C:\Program Files (x86)\AVG\Antivirus\AVGUI.exe")
                          }

                          $launched=$false
                          for ($i=0; $i -lt 300; $i++) {
                              foreach ($p in $appPaths) {
                                  if (Test-Path $p) {
                                      Start-Sleep -Seconds 3
                                      Write-Output "[$($actual.ToUpper())-POST] Launching: $p"
                                      Start-Process -FilePath $p; $launched=$true; break
                                  }
                              }
                              if ($launched) { break }
                              Start-Sleep -Seconds 2
                          }

                          if ($launched) {
                              # Signal successful install — enables Keep Runner Alive
                              try { Set-Content -Path $senInstRan -Value "ok" -EA SilentlyContinue } catch {}
                              Write-Output "[$($actual.ToUpper())-POST] installer_ran_ok set."
                          } else {
                              Write-Output "[$($actual.ToUpper())-POST] FATAL: Exe not found in time."
                          }

                          $installed=$true

                      } else {
                          # No download yet — check 120s deadline
                          if ((Get-Date) -gt $dlDeadline) {
                              Write-Output "[$($swType.ToUpper())-WATCHER] 120s download timeout. No file found. Exiting cleanly."
                              try { Set-Content -Path $senExit -Value "exit" -EA SilentlyContinue } catch {}
                              Stop-Process -Name "msedge" -Force -EA SilentlyContinue
                              # Do NOT set installer_ran_ok — no keep-alive will fire
                              $installed=$true
                          } else {
                              Start-Sleep -Seconds 5
                          }
                      }
                  }

                  if (-not $installed) {
                      Write-Output "[$($swType.ToUpper())-WATCHER] Overall timeout. Signalling exit."
                      try { Set-Content -Path $senExit -Value "exit" -EA SilentlyContinue } catch {}
                      Stop-Process -Name "msedge" -Force -EA SilentlyContinue
                  }
              } -ArgumentList $dlFolder,$timeoutSecs,$swType,$exeFilter,$senDL,$senInst,$senExit,$senInstRan

              # Monitor install job
              $deadline=(Get-Date).AddSeconds($timeoutSecs)
              while ($true) {
                  $out=Receive-Job -Job $installJob -EA SilentlyContinue
                  if ($out) { $out | ForEach-Object { Write-Host $_ } }
                  if ($installJob.State -in @('Completed','Failed') -or (Get-Date) -gt $deadline) { break }
                  Start-Sleep -Seconds 5
              }
              $out=Receive-Job -Job $installJob -EA SilentlyContinue
              if ($out) { $out | ForEach-Object { Write-Host $_ } }
              Remove-Job -Job $installJob -Force -EA SilentlyContinue

              # Set env var for next step
              if (Test-Path $senInstRan) {
                  Write-Host "[Runtime] Installer ran successfully — INSTALLER_RAN=true" -ForegroundColor Green
                  "INSTALLER_RAN=true" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
              } else {
                  Write-Host "[Runtime] No installer ran (timeout/failure) — INSTALLER_RAN=false" -ForegroundColor Yellow
                  "INSTALLER_RAN=false" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
              }
              Write-Host "[Runtime] Install pathway complete." -ForegroundColor Green

          } else {
              # ── CLICK pathway ────────────────────────────────────────────────
              Write-Host "[Runtime] CLICK pathway. Waiting 75s..." -ForegroundColor Magenta
              $cs=Get-Date; $tot=75; $step=15; $rf=$false
              $rt=Get-Random -Minimum 20 -Maximum 61
              for ($w=0; $w -lt $tot; $w+=$step) {
                  Write-Host "[$swType] Click: $w/$tot s..." -ForegroundColor Yellow
                  if (-not $rf) {
                      $el=[int]((Get-Date)-$cs).TotalSeconds
                      if ($el -ge $rt) {
                          try { (New-Object -ComObject WScript.Shell).SendKeys('{F5}')
                                Write-Host "[$swType] F5 reload sent." -ForegroundColor Green } catch {}
                          $rf=$true
                      }
                  }
                  Start-Sleep -Seconds $step
              }
              Write-Host "[Runtime] Click pathway complete." -ForegroundColor Magenta
              exit 0
          }

      - name: Keep Runner Alive (Only When Software Was Installed)
        # Fires ONLY in install mode AND only when installer actually ran successfully.
        # If download timed out or failed, INSTALLER_RAN=false and this step is skipped.
        if: always() && matrix.action_mode == 'install' && env.INSTALLER_RAN == 'true'
        shell: pwsh
        run: |
          Write-Host "========== KEEP RUNNER ALIVE ==========" -ForegroundColor Green
          Write-Host "Installer ran OK — keeping runner alive for post-install sequence (480s)..." -ForegroundColor Green
          Start-Sleep -Seconds 480
