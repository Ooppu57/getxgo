name: Parallel macOS Auto-Installer

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Select macOS Runner Version'
        required: true
        type: choice
        options:
          - 'macos-13'
          - 'macos-14'
          - 'macos-15'
          - 'macos-26'
          - 'macos-26-intel'
        default: 'macos-14'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'techx@highmail.site'
      num_devices:
        description: 'Number of Devices to Spawn'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '5'
      num_clicks:
        description: 'Number of Clicks (Click-Only Devices)'
        required: true
        type: choice
        options:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '3'
      software_choice:
        description: 'Select Software & Link'
        required: true
        type: choice
        options:
          - 'Opera - B4Books'
          - 'Opera - Techx'
          - 'Opera - Fatradez'
          - 'Opera - James'
          - 'Opera - Oliver'
          - 'Opera - Mahal'
          - 'Opera-One - Esmeel'
          - 'Opera-One - Harrari'
          - 'Opera-One - Chloe'
          - 'Opera-One - Daisy'
          - 'Opera-One - Jimmy'
          - 'Ad-MVN - Techx'
          - 'Ad-MVN - B4Books'
          - 'Ad-MVN - Orderflowz'
          - 'Ad-MVN - A2Z'
        default: 'Opera - Techx'
      run_manual_url:
        description: 'Run Manual URL (Bypass software choice)'
        required: true
        type: boolean
        default: false
      manual_url:
        description: 'Manual Software URL'
        required: false
        type: string
        default: ''
      scrapeops_api_key:
        description: 'ScrapeOps / FloppyData API Key / Manual Proxies'
        required: false
        type: string
        default: '1IFG1IFjMPZi4DcrQ16KF2ku_fbxeCXI'
      run_without_proxy:
        description: 'Run without proxy (Bypass all proxies)'
        required: true
        type: boolean
        default: false
      proxy_country:
        description: 'Proxy Country Geotargeting'
        required: true
        type: choice
        options:
          - 'USA'
          - 'UK'
          - 'Canada'
          - 'Australia'
          - 'Germany'
          - 'France'
          - 'Brazil'
          - 'Mexico'
          - 'Spain'
          - 'Vietnam'
          - 'Switzerland'
          - 'Indonesia'
          - 'Italy'
          - 'Netherlands'
          - 'Poland'
        default: 'Poland'
      mobile_proxies:
        description: 'Use Mobile Proxies'
        required: true
        type: boolean
        default: false
      sticky_sessions:
        description: 'Enable Unique Sticky Sessions'
        required: true
        type: boolean
        default: true

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Generate Dynamic Matrix & Proxy Config
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          NUM_CLICKS: ${{ inputs.num_clicks }}
          OS_VERSION: ${{ inputs.os_version }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          RUN_MANUAL: ${{ inputs.run_manual_url }}
          MANUAL_URL: ${{ inputs.manual_url }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          RUN_WITHOUT_PROXY: ${{ inputs.run_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import os, json, uuid, random, re, sys, subprocess, time

          print("========== INITIALIZING MATRIX GENERATION ==========")

          try:
              import requests
          except ImportError:
              subprocess.check_call([sys.executable, "-m", "pip", "install", "requests", "--quiet"])
              import requests

          email         = os.environ.get("EMAIL", "").strip()
          num_devices   = int(os.environ.get("NUM_DEVICES", "1"))
          num_clicks_raw = int(os.environ.get("NUM_CLICKS", "0"))
          os_version    = os.environ.get("OS_VERSION", "macos-14")
          proxy_input   = os.environ.get("API_KEY", "").strip()
          without_proxy = os.environ.get("RUN_WITHOUT_PROXY", "false").lower() == "true"

          is_manual_proxy      = False
          manual_proxy_strings = []
          scrapeops_key        = ""
          floppy_key           = ""

          # ── Proxy type detection ─────────────────────────────────────────────
          SCRAPEOPS_KEY_RE = re.compile(
              r'^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$', re.IGNORECASE)
          FLOPPY_KEY_RE    = re.compile(r'^[A-Za-z0-9_]{30,80}$')

          if without_proxy:
              print("[Proxy] 'Run without proxy' checked — disabling proxy.")
              proxy_input = ""
          elif not proxy_input or proxy_input.lower() in ["none", "null", "false", "blank", "empty", "''", '""']:
              print("[Proxy] Proxy input empty or invalid — disabling proxy.")
              proxy_input = ""
          else:
              raw_items        = re.split(r'[\s,;]+', proxy_input)
              proxy_candidates = [
                  item.strip() for item in raw_items
                  if item.strip() and (
                      ('://' in item) or ('@' in item) or
                      (item.count(':') >= 2 and len(item) > 10)
                  )
              ]
              if len(proxy_candidates) >= 1:
                  is_manual_proxy      = True
                  manual_proxy_strings = proxy_candidates
                  print(f"[Proxy] Detected MANUAL PROXY mode with {len(manual_proxy_strings)} entries.")
              elif SCRAPEOPS_KEY_RE.match(proxy_input):
                  scrapeops_key = proxy_input
                  print("[Proxy] Detected SCRAPEOPS API KEY mode.")
              elif FLOPPY_KEY_RE.match(proxy_input):
                  floppy_key = proxy_input
                  print("[Proxy] Detected FLOPPYDATA API KEY mode.")
              else:
                  scrapeops_key = proxy_input
                  print("[Proxy] Could not determine key type — treating as ScrapeOps.")

          def parse_proxy(proxy_str):
              original = proxy_str.strip()
              if not original:
                  return None
              protocol = 'http'
              rest     = original
              if '://' in rest:
                  protocol, rest = rest.split('://', 1)
                  if protocol.lower() == 'geolocation':
                      protocol = 'http'
              # floppy format: user:pass@host:port:country
              floppy_match = re.match(r'^([^:]+):([^@]+)@([^:]+):(\d+):(.+)$', rest)
              if floppy_match:
                  user, pwd, host, port, country_extra = floppy_match.groups()
                  country = country_extra.split(' - ')[0].strip()
                  return {'original': original, 'protocol': protocol,
                          'username': user, 'password': pwd,
                          'host': host, 'port': int(port),
                          'server': f"{host}:{port}",
                          'country_name': country, 'country_code': None,
                          'url': f"http://{user}:{pwd}@{host}:{port}"}
              # standard: user:pass@host:port
              std_match = re.match(r'^([^:]+):([^@]+)@([^:]+):(\d+)$', rest)
              if std_match:
                  user, pwd, host, port = std_match.groups()
                  return {'original': original, 'protocol': protocol,
                          'username': user, 'password': pwd,
                          'host': host, 'port': int(port),
                          'server': f"{host}:{port}",
                          'country_name': None, 'country_code': None,
                          'url': f"{protocol}://{user}:{pwd}@{host}:{port}"}
              # alt: host:port:user:pass
              alt_match = re.match(r'^([^:]+):(\d+):([^:]+):(.+)$', rest)
              if alt_match:
                  host, port, user, pwd = alt_match.groups()
                  return {'original': original, 'protocol': protocol,
                          'username': user, 'password': pwd,
                          'host': host, 'port': int(port),
                          'server': f"{host}:{port}",
                          'country_name': None, 'country_code': None,
                          'url': f"{protocol}://{user}:{pwd}@{host}:{port}"}
              # no-auth: host:port
              simple_match = re.match(r'^([^:]+):(\d+)$', rest)
              if simple_match:
                  host, port = simple_match.groups()
                  return {'original': original, 'protocol': protocol,
                          'username': '', 'password': '',
                          'host': host, 'port': int(port),
                          'server': f"{host}:{port}",
                          'country_name': None, 'country_code': None,
                          'url': f"{protocol}://{host}:{port}"}
              return None

          def validate_proxy(pinfo):
              try:
                  proxies = {'http': pinfo['url'], 'https': pinfo['url']}
                  resp = requests.get('http://ip-api.com/json/', proxies=proxies, timeout=15)
                  data = resp.json()
                  if data.get('status') == 'success':
                      cc      = data.get('countryCode', 'US').lower()
                      country = pinfo.get('country_name') or data.get('country', 'Unknown')
                      return {'working': True, 'country_name': country, 'country_code': cc,
                              'ip': data.get('query', ''),
                              **{k: v for k, v in pinfo.items()
                                 if k not in ['working', 'country_name', 'country_code', 'ip']}}
              except Exception as e:
                  print(f"[ProxyCheck] FAILED {pinfo.get('server','?')}: {e}")
              return {'working': False, **pinfo}

          country_name_to_code = {
              'united states': 'us', 'united kingdom': 'uk', 'canada': 'ca',
              'australia': 'au', 'germany': 'de', 'france': 'fr',
              'brazil': 'br', 'mexico': 'mx', 'spain': 'es',
              'vietnam': 'vn', 'switzerland': 'ch', 'indonesia': 'id',
              'italy': 'it', 'netherlands': 'nl', 'poland': 'pl',
              'usa': 'us', 'uk': 'uk',
          }
          country_map = {
              "USA": "us", "UK": "uk", "Canada": "ca", "Australia": "au",
              "Germany": "de", "France": "fr", "Brazil": "br", "Mexico": "mx",
              "Spain": "es", "Vietnam": "vn", "Switzerland": "ch",
              "Indonesia": "id", "Italy": "it", "Netherlands": "nl", "Poland": "pl"
          }

          active_proxies = []
          use_proxy      = False

          if is_manual_proxy and not without_proxy:
              parsed = []
              for ps in manual_proxy_strings:
                  p = parse_proxy(ps)
                  if p:
                      parsed.append(p)
                  else:
                      print(f"[ProxyParse] Could not parse: {ps[:60]}...")
              print(f"[Proxy] Validating {len(parsed)} parsed proxies...")
              for idx, p in enumerate(parsed):
                  result = validate_proxy(p)
                  if result['working']:
                      if result.get('country_name'):
                          cname = result['country_name'].lower()
                          result['country_code'] = country_name_to_code.get(cname, result.get('country_code', 'us'))
                      active_proxies.append(result)
                      print(f"[Proxy] ACTIVE  -> {result['server']} | {result['country_name']} ({result['country_code']}) | IP: {result['ip']}")
                  else:
                      print(f"[Proxy] DEAD    -> {result.get('server','?')}")
                  if idx < len(parsed) - 1:
                      time.sleep(1)
              if len(active_proxies) < num_devices:
                  print(f"[Proxy] ERROR: Only {len(active_proxies)} active proxies for {num_devices} devices.")
                  exit(1)
              use_proxy = True
              print(f"[Proxy] Manual proxy pool ready: {len(active_proxies)} active for {num_devices} devices.")

          elif floppy_key and not without_proxy:
              use_proxy     = True
              country_input = os.environ.get("COUNTRY", "USA")
              mobile        = os.environ.get("MOBILE", "false").lower() == "true"
              sticky        = os.environ.get("STICKY", "false").lower() == "true"
              cc            = country_map.get(country_input, "us").upper()
              proxy_type    = "mobile" if mobile else "residential"
              FLOPPY_BASE   = "https://client-api.floppy.host"
              headers       = {"X-Api-Key": floppy_key}
              print(f"[FloppyData] Fetching base credentials...")
              try:
                  creds_resp      = requests.get(f"{FLOPPY_BASE}/v1/rotating/smartParamsCredentials",
                                                  headers=headers, timeout=15)
                  creds_data      = creds_resp.json()
                  floppy_base_user = creds_data.get("username", "")
                  floppy_base_pass = creds_data.get("password", "")
                  print(f"[FloppyData] Base credentials fetched. User prefix: {floppy_base_user[:8]}***")
              except Exception as e:
                  print(f"[FloppyData] ERROR fetching credentials: {e}")
                  exit(1)
              print(f"[FloppyData] Building {num_devices} device proxy configs (type={proxy_type}, country={cc})...")
              for i in range(1, num_devices + 1):
                  session_id = str(uuid.uuid4())[:8] if sticky else ""
                  params     = {"type": proxy_type, "country": cc,
                                "protocol": "http", "rotation": "0" if sticky else "-1"}
                  if sticky and session_id:
                      params["session"] = f"dev{i}_{session_id}"
                  try:
                      builder_resp = requests.get(f"{FLOPPY_BASE}/v1/rotating/smartParamsBuilder",
                                                   headers=headers, params=params, timeout=15)
                      builder_data = builder_resp.json()
                      floppy_user  = builder_data.get("username", floppy_base_user)
                      floppy_pass  = builder_data.get("password", floppy_base_pass)
                      floppy_host  = builder_data.get("host", "geo.g-w.info")
                      floppy_port  = str(builder_data.get("port", 10080))
                      print(f"[FloppyData] Device {i}: {floppy_host}:{floppy_port} | user={floppy_user[:16]}... | session={'YES' if sticky else 'NO'}")
                  except Exception as e:
                      print(f"[FloppyData] ERROR building params for device {i}: {e}")
                      exit(1)
                  active_proxies.append({
                      'username': floppy_user, 'password': floppy_pass,
                      'host': floppy_host, 'port': int(floppy_port),
                      'server': f"{floppy_host}:{floppy_port}",
                      'country_code': cc.lower(), 'country_name': country_input,
                      'proxy_type_label': "floppydata",
                      'url': f"http://{floppy_user}:{floppy_pass}@{floppy_host}:{floppy_port}"
                  })
                  time.sleep(0.3)
              print(f"[FloppyData] Proxy pool ready: {len(active_proxies)} entries.")

          elif scrapeops_key and not without_proxy:
              use_proxy = True
              print("[Proxy] ScrapeOps proxy pool ready.")

          # ── Action list (install vs click) ──────────────────────────────────
          num_clicks   = min(num_clicks_raw, num_devices)
          num_installs = num_devices - num_clicks
          action_list  = ["install"] * num_installs + ["click"] * num_clicks
          random.shuffle(action_list)
          print(f"[Action Matrix] Total Devices : {num_devices}")
          print(f"[Action Matrix] Install Paths : {num_installs}")
          print(f"[Action Matrix] Click Paths   : {num_clicks}")
          print(f"[Action Matrix] Randomized Queue: {action_list}")

          run_manual      = os.environ.get("RUN_MANUAL", "false").lower() == "true"
          manual_url_input = os.environ.get("MANUAL_URL", "").strip()
          manual_url      = manual_url_input if run_manual else ""

          opera_urls = {
              "Opera - B4Books":  "https://u.to/opx-b4b/2nh4Ig",
              "Opera - Techx":    "https://u.to/techxsm/xVyFIg",
              "Opera - Fatradez": "https://u.to/fatradezsm/cF2FIg",
              "Opera - James":    "https://u.to/jamesxsm/eV2FIg",
              "Opera - Oliver":   "https://u.to/oliverxsm/f12FIg",
              "Opera - Mahal":    "https://u.to/mahalxsm/iF2FIg",
          }
          opera_one_urls = {
              "Opera-One - Esmeel":  "https://u.to/esmlxopo/cTOGIg",
              "Opera-One - Harrari": "https://u.to/hararixopo/zTOGIg",
              "Opera-One - Chloe":   "https://u.to/chloexopo/_DOGIg",
              "Opera-One - Daisy":   "https://u.to/daisyxopo/LjSGIg",
              "Opera-One - Jimmy":   "https://u.to/jmy/mUZ4Ig",
          }
          ad_mvn_urls = {
              "Ad-MVN - Techx":      "https://u.to/techxadmvnxsmrt/gvd7Ig",
              "Ad-MVN - B4Books":    "https://u.to/b4bxadmvnxsmrt/5-h7Ig",
              "Ad-MVN - Orderflowz": "https://u.to/ordrflzadmvnxsmrt/-fZ7Ig",
              "Ad-MVN - A2Z":        "https://u.to/a2zadmvnxsmrt/Y-t7Ig",
          }
          all_urls = {**opera_urls, **opera_one_urls, **ad_mvn_urls}

          software_choice = os.environ.get("SOFTWARE_CHOICE", "Ad-MVN - Techx")

          dynamic_links = [
              "Opera - Techx", "Opera - Fatradez", "Opera - James",
              "Opera - Oliver", "Opera - Mahal"
          ]

          if manual_url:
              target_url    = manual_url
              software_type = "dynamic_opera"
              dmg_filter    = "*Opera*"
              print(f"[Target] Manual URL selected: {target_url}")
          else:
              target_url = all_urls.get(software_choice, opera_urls.get("Opera - Techx", ""))
              if software_choice in dynamic_links or software_choice.startswith("Ad-MVN"):
                  software_type = "dynamic_opera"
                  dmg_filter    = "*Opera*"
              elif software_choice.startswith("Opera-One"):
                  software_type = "opera_one"
                  dmg_filter    = "*Opera*"
              else:
                  software_type = "dynamic_opera"
                  dmg_filter    = "*Opera*"
              print(f"[Target] Software: {software_choice} -> URL: {target_url}")
              print(f"[Target] Engine Type: {software_type} | Filter: {dmg_filter}")

          def short_os(os_ver):
              mapping = {"macos-15": "M15", "macos-14": "M14", "macos-13": "M13",
                         "macos-15-xlarge": "M15X", "macos-26": "M26", "macos-26-intel": "M26I"}
              return mapping.get(os_ver, "MAC")

          def short_software(choice):
              if run_manual:
                  return "MANUAL"
              prefix_map = {"Opera-One": "OPO", "Ad-MVN": "MVN", "Opera": "OP"}
              for key, prefix in prefix_map.items():
                  if choice.startswith(key):
                      parts     = choice.split(" - ", 1)
                      list_name = parts[1].replace(" ", "") if len(parts) > 1 else ""
                      return f"{prefix}-{list_name}"
              return choice.replace(" ", "").replace("-", "")

          short_os_tag = short_os(os_version)
          short_sw_tag = short_software(software_choice)

          includes = []
          if email:
              for i in range(1, num_devices + 1):
                  action_mode = action_list[i - 1]
                  action_cap  = action_mode.capitalize()

                  if is_manual_proxy and active_proxies:
                      proxy  = active_proxies[i - 1]
                      cc     = proxy['country_code'].upper()
                      device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_cap}-{cc}"
                      includes.append({
                          "device": device_name, "email": email, "os": os_version,
                          "use_proxy": "true",
                          "proxy_server": proxy['server'],
                          "proxy_user": proxy['username'],
                          "proxy_pass": proxy['password'],
                          "proxy_type": "manual",
                          "target_url": target_url,
                          "software_type": software_type,
                          "dmg_filter": dmg_filter,
                          "action_mode": action_mode,
                      })
                      print(f"[Device Added] {device_name} | Proxy: {proxy['server']} ({cc}) | Auth: {'YES' if proxy['username'] else 'NO'}")

                  elif floppy_key and active_proxies:
                      proxy  = active_proxies[i - 1]
                      cc     = proxy['country_code'].upper()
                      device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_cap}-{cc}"
                      includes.append({
                          "device": device_name, "email": email, "os": os_version,
                          "use_proxy": "true",
                          "proxy_server": proxy['server'],
                          "proxy_user": proxy['username'],
                          "proxy_pass": proxy['password'],
                          "proxy_type": "floppydata",
                          "target_url": target_url,
                          "software_type": software_type,
                          "dmg_filter": dmg_filter,
                          "action_mode": action_mode,
                      })
                      print(f"[Device Added] {device_name} | Proxy: FloppyData ({proxy['server']}) ({cc})")

                  elif use_proxy and scrapeops_key:
                      country_input = os.environ.get("COUNTRY", "USA")
                      mobile        = os.environ.get("MOBILE", "false").lower() == "true"
                      sticky        = os.environ.get("STICKY", "false").lower() == "true"
                      cc            = country_map.get(country_input, "us")
                      country_cap   = cc.upper()
                      device_name   = f"{i}-{short_os_tag}-{short_sw_tag}-{action_cap}-{country_cap}"
                      proxy_user    = f"scrapeops.country={cc}"
                      if mobile: proxy_user += ".mobile=true"
                      if sticky:
                          session_id = str(uuid.uuid4())[:8]
                          proxy_user += f".sticky_session={session_id}"
                      includes.append({
                          "device": device_name, "email": email, "os": os_version,
                          "use_proxy": "true",
                          "proxy_server": "residential-proxy.scrapeops.io:8181",
                          "proxy_user": proxy_user,
                          "proxy_pass": scrapeops_key,
                          "proxy_type": "scrapeops",
                          "target_url": target_url,
                          "software_type": software_type,
                          "dmg_filter": dmg_filter,
                          "action_mode": action_mode,
                      })
                      print(f"[Device Added] {device_name} | Proxy: ScrapeOps ({cc})")

                  else:
                      device_name = f"{i}-{short_os_tag}-{short_sw_tag}-{action_cap}-DIRECT"
                      includes.append({
                          "device": device_name, "email": email, "os": os_version,
                          "use_proxy": "false",
                          "proxy_server": "", "proxy_user": "", "proxy_pass": "",
                          "proxy_type": "none",
                          "target_url": target_url,
                          "software_type": software_type,
                          "dmg_filter": dmg_filter,
                          "action_mode": action_mode,
                      })
                      print(f"[Device Added] {device_name} | Proxy: NONE")

          if not includes:
              print("Error: Valid configuration could not be generated. Exiting.")
              exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")
          print("========== MATRIX GENERATION COMPLETE ==========")

      - name: Update Workflow Defaults (Remember Inputs)
        shell: python
        env:
          OS_VERSION: ${{ inputs.os_version }}
          GETSCREEN_EMAIL: ${{ inputs.getscreen_email }}
          NUM_DEVICES: ${{ inputs.num_devices }}
          NUM_CLICKS: ${{ inputs.num_clicks }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          RUN_MANUAL: ${{ inputs.run_manual_url }}
          MANUAL_URL: ${{ inputs.manual_url }}
          API_KEY: ${{ inputs.scrapeops_api_key }}
          RUN_WITHOUT_PROXY: ${{ inputs.run_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
        run: |
          import re, os

          SCRAPEOPS_KEY_RE = re.compile(
              r'^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$', re.IGNORECASE)
          FLOPPY_KEY_RE = re.compile(r'^[A-Za-z0-9_]{30,80}$')

          def update_yaml_default(yaml_str, input_key, new_val, is_bool=False):
              lines = yaml_str.split("\n")
              in_target_block = False
              target_indent   = -1
              for i, line in enumerate(lines):
                  match = re.match(r"^([ \t]*)" + re.escape(input_key) + r":", line)
                  if match:
                      in_target_block = True
                      target_indent   = len(match.group(1))
                      continue
                  if in_target_block:
                      current_indent = len(line) - len(line.lstrip(" \t"))
                      if line.strip() and current_indent <= target_indent:
                          in_target_block = False
                          continue
                      if line.lstrip(" \t").startswith("default:"):
                          indent = line[:len(line) - len(line.lstrip(" \t"))]
                          if is_bool:
                              val_str  = "true" if str(new_val).lower() == "true" else "false"
                              lines[i] = f"{indent}default: {val_str}"
                          else:
                              safe_val = "" if (new_val is None or str(new_val).strip().lower() in
                                                ["none", "null", "blank", "empty", "''", '""']) \
                                         else str(new_val).replace("'", "\\'")
                              lines[i] = f"{indent}default: '{safe_val}'"
                          break
              return "\n".join(lines)

          api_key_input   = os.environ.get("API_KEY", "").strip()
          is_manual_proxy = False
          is_floppy_key   = False
          if api_key_input:
              raw_items        = re.split(r'[\s,;]+', api_key_input)
              proxy_candidates = [
                  item for item in raw_items
                  if ('://' in item) or ('@' in item) or (item.count(':') >= 2 and len(item) > 10)
              ]
              if len(proxy_candidates) >= 1:
                  is_manual_proxy = True
              elif FLOPPY_KEY_RE.match(api_key_input) and not SCRAPEOPS_KEY_RE.match(api_key_input):
                  is_floppy_key = True

          file_path = ".github/workflows/main3_macos.yml"
          if os.path.exists(file_path):
              with open(file_path, "r", encoding="utf-8") as f:
                  content = f.read()
              run_manual = os.environ.get("RUN_MANUAL", "false").lower() == "true"
              content = update_yaml_default(content, "os_version",      os.environ.get("OS_VERSION"))
              content = update_yaml_default(content, "getscreen_email", os.environ.get("GETSCREEN_EMAIL"))
              content = update_yaml_default(content, "num_devices",     os.environ.get("NUM_DEVICES"))
              content = update_yaml_default(content, "num_clicks",      os.environ.get("NUM_CLICKS"))
              content = update_yaml_default(content, "software_choice", os.environ.get("SOFTWARE_CHOICE"))
              manual_url_to_save = os.environ.get("MANUAL_URL") if run_manual else ""
              content = update_yaml_default(content, "manual_url",      manual_url_to_save)
              content = update_yaml_default(content, "run_manual_url",  run_manual, is_bool=True)
              if not is_manual_proxy and api_key_input:
                  content = update_yaml_default(content, "scrapeops_api_key", api_key_input)
                  key_type = "FloppyData" if is_floppy_key else "ScrapeOps"
                  print(f"[Workflow State] Saved {key_type} API key to defaults.")
              else:
                  print("[Workflow State] Manual proxies detected — NOT saving proxy list to defaults.")
              content = update_yaml_default(content, "run_without_proxy", os.environ.get("RUN_WITHOUT_PROXY"), is_bool=True)
              content = update_yaml_default(content, "proxy_country",     os.environ.get("COUNTRY"))
              content = update_yaml_default(content, "mobile_proxies",    os.environ.get("MOBILE"), is_bool=True)
              content = update_yaml_default(content, "sticky_sessions",   os.environ.get("STICKY"), is_bool=True)
              with open(file_path, "w", encoding="utf-8") as f:
                  f.write(content)
              print(f"[Workflow State] Successfully saved new defaults.")
          else:
              print(f"[Workflow State] Warning: File {file_path} not found. Skipping auto-save.")

      - name: Commit and Push New Defaults
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/main3_macos.yml
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Update last used inputs [skip ci]" && git push)

  remote_session:
    name: Session ${{ matrix.device }}
    needs: prepare_matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 8

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      # ================================================================== #
      # STEP 1 — Disable Gatekeeper & macOS security                       #
      # ================================================================== #
      - name: Disable Gatekeeper & Configure macOS Security
        shell: bash
        run: |
          echo "===[$(date '+%H:%M:%S')] Configuring macOS Security Settings ==="
          sudo spctl --master-disable || true
          sudo defaults write /Library/Preferences/com.apple.security GKAutoRearm -bool false || true
          sudo defaults write /Library/Preferences/com.apple.security AssessmentEnable -bool false || true
          defaults write com.apple.LaunchServices LSQuarantine -bool false || true
          defaults write com.apple.Safari AutoOpenSafeDownloads -bool true || true
          defaults write com.apple.Safari DownloadValidation -bool false || true
          sudo spctl --global-disable || true
          echo "[$(date '+%H:%M:%S')] macOS security configuration complete."

      # ================================================================== #
      # STEP 2 — Python venv + Homebrew + cliclick                         #
      # ================================================================== #
      - name: Install Dependencies (Python + Browser Tools)
        shell: bash
        run: |
          echo "===[$(date '+%H:%M:%S')] Installing Python UI Automation Dependencies ==="
          VENV_DIR="/tmp/uienv"
          PYTHON_BIN=""
          for candidate in python3.12 python3.11 python3.10 python3; do
            if command -v "$candidate" &>/dev/null; then
              PYTHON_BIN="$candidate"
              break
            fi
          done
          if [ -z "$PYTHON_BIN" ]; then
            echo "ERROR: No Python3 found on runner."
            exit 1
          fi
          echo "[$(date '+%H:%M:%S')] Using Python: $PYTHON_BIN ($($PYTHON_BIN --version 2>&1))"
          rm -rf "$VENV_DIR"
          "$PYTHON_BIN" -m venv "$VENV_DIR"
          source "$VENV_DIR/bin/activate"
          pip install --upgrade pip --quiet
          pip install pyobjc-core pyobjc-framework-Cocoa \
                      pyobjc-framework-ApplicationServices --quiet || true
          pip install atomacos --quiet || true
          pip install Pillow requests --quiet || true
          deactivate
          echo "UIENV_PYTHON=$VENV_DIR/bin/python3" >> "$GITHUB_ENV"
          echo "[$(date '+%H:%M:%S')] Python venv ready at $VENV_DIR"
          if ! command -v brew &>/dev/null; then
            echo "[$(date '+%H:%M:%S')] Installing Homebrew..."
            NONINTERACTIVE=1 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || true
            for bp in /opt/homebrew/bin /usr/local/bin; do
              if [ -x "$bp/brew" ]; then
                export PATH="$bp:$PATH"
                echo "PATH=$bp:$PATH" >> "$GITHUB_ENV"
                break
              fi
            done
          fi
          brew install cliclick --quiet || true
          CLICLICK_PATH=$(command -v cliclick || echo "not_found")
          echo "[$(date '+%H:%M:%S')] cliclick path: $CLICLICK_PATH"
          echo "CLICLICK_BIN=$CLICLICK_PATH" >> "$GITHUB_ENV"
          echo "[$(date '+%H:%M:%S')] All dependencies installed."

      # ================================================================== #
      # STEP 3 — Pre-Grant ALL TCC permissions upfront                      #
      # ================================================================== #
      - name: Pre-Grant TCC Permissions (CLI-first, comprehensive)
        shell: bash
        run: |
          echo "=== [$(date '+%H:%M:%S')] Pre-Granting TCC Permissions via SQLite ==="
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          grant_tcc() {
            local SERVICE="$1" CLIENT="$2" CLIENT_TYPE="$3"
            sudo sqlite3 "$TCC_DB" \
              "INSERT OR REPLACE INTO access \
               (service, client, client_type, auth_value, auth_reason, auth_version, flags) \
               VALUES ('$SERVICE', '$CLIENT', $CLIENT_TYPE, 2, 4, 1, 0);" 2>/dev/null || true
          }
          grant_tcc kTCCServiceAccessibility com.apple.Terminal          0
          grant_tcc kTCCServiceAccessibility com.apple.systemevents      0
          grant_tcc kTCCServiceAccessibility com.google.Chrome           0
          grant_tcc kTCCServiceAccessibility /usr/bin/osascript          1
          grant_tcc kTCCServiceAccessibility /bin/bash                   1
          grant_tcc kTCCServiceAccessibility /usr/bin/python3            1
          grant_tcc kTCCServiceScreenCapture com.google.Chrome           0
          grant_tcc kTCCServiceScreenCapture com.apple.Terminal          0
          grant_tcc kTCCServiceScreenCapture me.getscreen.agent          0
          grant_tcc kTCCServiceScreenCapture com.getscreen.agent         0
          grant_tcc kTCCServiceScreenCapture com.getscreen.mac           0
          grant_tcc kTCCServiceScreenCapture me.getscreen.mac            0
          grant_tcc kTCCServiceScreenCapture me.getscreen.desktop        0
          grant_tcc kTCCServiceScreenCapture com.getscreen.desktop       0
          grant_tcc kTCCServiceLocalNetwork  com.google.Chrome           0
          grant_tcc kTCCServiceLocalNetwork  com.apple.Terminal          0
          grant_tcc kTCCServiceLocalNetwork  /usr/bin/osascript          1
          grant_tcc kTCCServiceLocalNetwork  me.getscreen.agent          0
          grant_tcc kTCCServiceLocalNetwork  com.getscreen.agent         0
          grant_tcc kTCCServiceLocalNetwork  com.getscreen.mac           0
          grant_tcc kTCCServiceLocalNetwork  me.getscreen.mac            0
          grant_tcc kTCCServiceLocalNetwork  me.getscreen.desktop        0
          grant_tcc kTCCServiceLocalNetwork  com.getscreen.desktop       0
          echo "[$(date '+%H:%M:%S')] Scanning for runner process paths..."
          for RUNNER_DIR in /Users/runner /home/runner /opt/hostedtoolcache /private/var/folders; do
            if [ -d "$RUNNER_DIR" ]; then
              for BIN_NAME in Runner.Worker Runner.Listener Runner.PluginHost run.sh; do
                FOUND_PATH=$(find "$RUNNER_DIR" -name "$BIN_NAME" -maxdepth 6 2>/dev/null | head -n 1 || true)
                if [ -n "$FOUND_PATH" ]; then
                  echo "[$(date '+%H:%M:%S')] Granting TCC to runner binary: $FOUND_PATH"
                  grant_tcc kTCCServiceLocalNetwork  "$FOUND_PATH" 1
                  grant_tcc kTCCServiceScreenCapture "$FOUND_PATH" 1
                  grant_tcc kTCCServiceAccessibility "$FOUND_PATH" 1
                fi
              done
            fi
          done
          ps aux 2>/dev/null | awk '{print $11}' | grep -iE "(runner|hosted|compute|agent)" | sort -u | while read -r PROC_PATH; do
            if [ -x "$PROC_PATH" ]; then
              echo "[$(date '+%H:%M:%S')] Granting TCC to live process: $PROC_PATH"
              grant_tcc kTCCServiceLocalNetwork  "$PROC_PATH" 1
              grant_tcc kTCCServiceScreenCapture "$PROC_PATH" 1
              grant_tcc kTCCServiceAccessibility "$PROC_PATH" 1
            fi
          done || true
          grant_tcc kTCCServiceCamera     com.google.Chrome 0
          grant_tcc kTCCServiceMicrophone com.google.Chrome 0
          echo "[$(date '+%H:%M:%S')] All TCC permissions pre-granted."
          sudo defaults write /Library/Preferences/com.apple.security \
            "SecAssessmentDisableUserApproval" -bool true 2>/dev/null || true
          CHROME_POLICY_DIR="/Library/Managed Preferences"
          sudo mkdir -p "$CHROME_POLICY_DIR"
          sudo /usr/libexec/PlistBuddy -c \
            "Add :AuthServerAllowlist string *" \
            "$CHROME_POLICY_DIR/com.google.Chrome.plist" 2>/dev/null || \
          sudo /usr/libexec/PlistBuddy -c \
            "Set :AuthServerAllowlist *" \
            "$CHROME_POLICY_DIR/com.google.Chrome.plist" 2>/dev/null || true
          sudo /usr/libexec/PlistBuddy -c \
            "Add :AuthNegotiateDelegateAllowlist string *" \
            "$CHROME_POLICY_DIR/com.google.Chrome.plist" 2>/dev/null || true
          echo "[$(date '+%H:%M:%S')] TCC and policy configuration complete."

      # ================================================================== #
      # STEP 4 — Getscreen.me install                                      #
      # ================================================================== #
      - name: Install, Bypass Security, and Start Getscreen.me (macOS)
        shell: bash
        run: |
          echo "===[$(date '+%H:%M:%S')] Installing Getscreen.me via DMG ==="
          DEVICE_NAME="${{ matrix.device }}"
          EMAIL="${{ matrix.email }}"
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          MAX_RETRIES=3
          RETRY=0
          SUCCESS=false
          while [ $RETRY -lt $MAX_RETRIES ]; do
            curl -L -o getscreen.dmg "https://getscreen.me/download/getscreen.dmg" \
              --retry 3 --retry-delay 5 --silent --show-error || true
            FILE_SIZE=$(stat -f%z getscreen.dmg 2>/dev/null || \
                        stat -c%s getscreen.dmg 2>/dev/null || echo 0)
            if [ -f "getscreen.dmg" ] && [ "$FILE_SIZE" -gt 102400 ]; then
              SUCCESS=true
              break
            fi
            echo "[$(date '+%H:%M:%S')] Download attempt $((RETRY+1)) failed (${FILE_SIZE}B), retrying..."
            sleep 5
            RETRY=$((RETRY+1))
          done
          if [ "$SUCCESS" = false ]; then
            echo "[$(date '+%H:%M:%S')] ERROR: Getscreen.me DMG failed to download. Skipping."
            exit 0
          fi
          echo "[$(date '+%H:%M:%S')] Downloaded getscreen.dmg (${FILE_SIZE}B). Mounting..."
          hdiutil attach getscreen.dmg -mountpoint /Volumes/getscreen -nobrowse -quiet || true
          APP_PATH=$(find /Volumes/getscreen -maxdepth 1 -name "*.app" | head -n 1 || true)
          if [ -z "$APP_PATH" ]; then
            echo "[$(date '+%H:%M:%S')] ERROR: No .app found inside Getscreen DMG."
            hdiutil detach /Volumes/getscreen -quiet -force || true
            exit 0
          fi
          APP_NAME=$(basename "$APP_PATH")
          echo "[$(date '+%H:%M:%S')] Found: $APP_NAME"
          sudo cp -R "$APP_PATH" /Applications/
          sudo xattr -dr com.apple.quarantine "/Applications/$APP_NAME" 2>/dev/null || true
          hdiutil detach /Volumes/getscreen -quiet -force || true
          APP_BUNDLE_ID=$(defaults read \
            "/Applications/$APP_NAME/Contents/Info.plist" \
            CFBundleIdentifier 2>/dev/null || echo "")
          echo "[$(date '+%H:%M:%S')] Bundle ID: ${APP_BUNDLE_ID:-<not found>}"
          if [ -n "$APP_BUNDLE_ID" ]; then
            for SVC in kTCCServiceScreenCapture kTCCServiceAccessibility kTCCServiceLocalNetwork; do
              sudo sqlite3 "$TCC_DB" \
                "INSERT OR REPLACE INTO access \
                 (service, client, client_type, auth_value, auth_reason, auth_version, flags) \
                 VALUES ('$SVC', '$APP_BUNDLE_ID', 0, 2, 4, 1, 0);" 2>/dev/null || true
            done
            echo "[$(date '+%H:%M:%S')] TCC permissions granted for $APP_BUNDLE_ID"
          fi
          EXEC_NAME=$(defaults read \
            "/Applications/$APP_NAME/Contents/Info.plist" \
            CFBundleExecutable 2>/dev/null || echo "")
          EXEC_PATH="/Applications/$APP_NAME/Contents/MacOS/$EXEC_NAME"
          if [ ! -x "$EXEC_PATH" ]; then
            EXEC_PATH=$(find "/Applications/$APP_NAME/Contents/MacOS" \
              -maxdepth 1 -type f -perm +111 2>/dev/null | head -n 1 || true)
          fi
          if [ -n "$EXEC_PATH" ] && [ -x "$EXEC_PATH" ]; then
            for SVC in kTCCServiceScreenCapture kTCCServiceAccessibility kTCCServiceLocalNetwork; do
              sudo sqlite3 "$TCC_DB" \
                "INSERT OR REPLACE INTO access \
                 (service, client, client_type, auth_value, auth_reason, auth_version, flags) \
                 VALUES ('$SVC', '$EXEC_PATH', 1, 2, 4, 1, 0);" 2>/dev/null || true
            done
            echo "[$(date '+%H:%M:%S')] TCC path-based permissions granted for $EXEC_PATH"
          fi
          if [ -z "$EXEC_PATH" ] || [ ! -x "$EXEC_PATH" ]; then
            echo "[$(date '+%H:%M:%S')] ERROR: Getscreen executable not found."
            exit 0
          fi
          echo "[$(date '+%H:%M:%S')] Executable: $EXEC_PATH"
          sudo "$EXEC_PATH" -install 2>/dev/null || true
          sleep 2
          sudo "$EXEC_PATH" -register "$EMAIL" 2>/dev/null || true
          sleep 1
          sudo "$EXEC_PATH" -config \
            "name='$DEVICE_NAME' autostart=true nonadmin=true control=true disable_confirmation=true" \
            2>/dev/null || true
          sleep 1
          sudo "$EXEC_PATH" -start 2>/dev/null || true
          echo "[$(date '+%H:%M:%S')] Getscreen.me registered as '$DEVICE_NAME' and started."

      # ================================================================== #
      # STEP 4.5 — Quick popup dismissal                                   #
      # ================================================================== #
      - name: Pre-Dismiss System Popups (Fast)
        shell: bash
        run: |
          echo "===[$(date '+%H:%M:%S')] Pre-dismissing system popups ==="
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          echo "[$(date '+%H:%M:%S')] Restarting TCC daemon to flush cache..."
          sudo launchctl kickstart -k system/com.apple.tccd 2>/dev/null || true
          sudo launchctl kickstart -k user/$(id -u)/com.apple.tccd 2>/dev/null || true
          sleep 2
          ps aux 2>/dev/null | awk '{print $11}' | sort -u | while read -r PROC_PATH; do
            if [ -x "$PROC_PATH" ] 2>/dev/null; then
              PROC_LOWER=$(echo "$PROC_PATH" | tr '[:upper:]' '[:lower:]')
              if echo "$PROC_LOWER" | grep -qE "(compute|hosted|runner|agent|github|actions)"; then
                echo "[$(date '+%H:%M:%S')]   Granting TCC to: $PROC_PATH"
                sudo sqlite3 "$TCC_DB" \
                  "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
                   VALUES('kTCCServiceLocalNetwork','$PROC_PATH',1,2,4,1,0);" 2>/dev/null || true
                sudo sqlite3 "$TCC_DB" \
                  "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
                   VALUES('kTCCServiceScreenCapture','$PROC_PATH',1,2,4,1,0);" 2>/dev/null || true
                sudo sqlite3 "$TCC_DB" \
                  "INSERT OR REPLACE INTO access (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
                   VALUES('kTCCServiceAccessibility','$PROC_PATH',1,2,4,1,0);" 2>/dev/null || true
              fi
            fi
          done || true
          sudo killall -HUP cfprefsd 2>/dev/null || true
          sudo killall UserNotificationCenter 2>/dev/null || true
          sudo killall NotificationCenter 2>/dev/null || true
          sleep 1
          echo "[$(date '+%H:%M:%S')] Starting 15-second GUI popup dismisser..."
          cat > /tmp/early_popup_dismiss.applescript << 'ASEOF'
          set maxRuns to 30
          set runCount to 0
          repeat while runCount < maxRuns
            set runCount to runCount + 1
            try
              tell application "System Events"
                try
                  tell process "CoreServicesUIAgent"
                    repeat with win in (every window)
                      try
                        if exists button "Allow" of win then
                          click button "Allow" of win
                        end if
                      end try
                    end repeat
                  end tell
                end try
                repeat with proc in (every process whose visible is true)
                  set pName to name of proc as string
                  if pName is not "Google Chrome" then
                    try
                      repeat with win in (every window of proc)
                        set winTitle to ""
                        try
                          set winTitle to (title of win) as string
                        end try
                        if winTitle contains "Allow" then
                          try
                            click button "Allow" of win
                          end try
                        end if
                      end repeat
                    end try
                  end if
                end repeat
              end tell
            end try
            delay 0.5
          end repeat
          ASEOF
          osascript /tmp/early_popup_dismiss.applescript > /tmp/early_dismiss.log 2>&1 &
          EARLY_DISMISS_PID=$!
          wait $EARLY_DISMISS_PID 2>/dev/null || true
          echo "[$(date '+%H:%M:%S')] Step 4.5 complete — system ready for Chrome launch."

      # ================================================================== #
      # STEP 5 — Google Chrome                                             #
      # ================================================================== #
      - name: Install Google Chrome (Proxy-capable Browser)
        shell: bash
        run: |
          echo "=== [$(date '+%H:%M:%S')] Installing Google Chrome ==="
          CHROME_DMG="$HOME/Downloads/googlechrome.dmg"
          curl -fsSL \
            "https://dl.google.com/chrome/mac/universal/stable/GGRO/googlechrome.dmg" \
            -o "$CHROME_DMG" 2>/dev/null || \
          curl -fsSL \
            "https://dl.google.com/chrome/mac/stable/GGRO/googlechrome.dmg" \
            -o "$CHROME_DMG" 2>/dev/null || true
          FILE_SIZE=$(stat -f%z "$CHROME_DMG" 2>/dev/null || echo 0)
          if [ -f "$CHROME_DMG" ] && [ "$FILE_SIZE" -gt 1000000 ]; then
            hdiutil attach "$CHROME_DMG" -quiet -nobrowse \
              -mountpoint /Volumes/GoogleChrome || true
            if [ -d "/Volumes/GoogleChrome/Google Chrome.app" ]; then
              sudo cp -R "/Volumes/GoogleChrome/Google Chrome.app" /Applications/ || true
              sudo xattr -dr com.apple.quarantine \
                "/Applications/Google Chrome.app" 2>/dev/null || true
              hdiutil detach /Volumes/GoogleChrome -quiet || true
              echo "[$(date '+%H:%M:%S')] Google Chrome installed."
            else
              hdiutil detach /Volumes/GoogleChrome -quiet || true
              echo "[$(date '+%H:%M:%S')] WARNING: Chrome DMG mounted but .app not found."
            fi
          else
            echo "[$(date '+%H:%M:%S')] WARNING: Chrome DMG download failed ($FILE_SIZE B)."
          fi
          if [ -d "/Applications/Google Chrome.app" ]; then
            echo "CHROME_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "[$(date '+%H:%M:%S')] Chrome confirmed available."
          else
            echo "CHROME_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "[$(date '+%H:%M:%S')] Chrome unavailable."
          fi

      # ================================================================== #
      # STEP 6 — Download, Install & Automate Software                     #
      # ================================================================== #
      - name: Setup Auto-Downloader & Software Installation (macOS)
        shell: bash
        env:
          USE_PROXY:     ${{ matrix.use_proxy }}
          PROXY_SERVER:  ${{ matrix.proxy_server }}
          PROXY_USER:    ${{ matrix.proxy_user }}
          PROXY_PASS:    ${{ matrix.proxy_pass }}
          PROXY_TYPE:    ${{ matrix.proxy_type }}
          TARGET_URL:    ${{ matrix.target_url }}
          SOFTWARE_TYPE: ${{ matrix.software_type }}
          DMG_FILTER:    ${{ matrix.dmg_filter }}
          ACTION_MODE:   ${{ matrix.action_mode }}
        run: |
          echo "============================================================"
          echo " [$(date '+%H:%M:%S')] Zero-Touch Downloader & Installer (macOS)"
          echo " Category  : $SOFTWARE_TYPE"
          echo " Action    : $(echo $ACTION_MODE | tr '[:lower:]' '[:upper:]') PATHWAY ASSIGNED"
          echo " Target URL: $TARGET_URL"
          if [ "$USE_PROXY" = "true" ]; then
            if [ "$PROXY_TYPE" = "manual" ]; then
              echo " Mode      : Manual Proxy ($PROXY_SERVER)"
            elif [ "$PROXY_TYPE" = "floppydata" ]; then
              echo " Mode      : FloppyData Proxy ($PROXY_SERVER)"
            else
              echo " Mode      : ScrapeOps Proxy"
            fi
          else
            echo " Mode      : Direct (no proxy)"
          fi
          echo "============================================================"

          DL_FOLDER="$HOME/Downloads"
          SENTINEL_PATH="/tmp/download_done.flag"
          INSTALLER_SENTINEL="/tmp/installer_executed.flag"
          TIMEOUT_SECS=360

          # ── Write the Python automation handler ──────────────────────────────
          cat > /tmp/macos_handler.py << 'PYEOF'
          import time, sys, os, subprocess, random

          def log(tag, msg):
              ts = time.strftime("%H:%M:%S")
              print(f"[{ts}][{tag}] {msg}", flush=True)

          # ── Timing constants ─────────────────────────────────────────────────
          CHROME_WARMUP_SECS     = 20
          DL_WAIT_AFTER_PROXY    = 30
          INTERSTITIAL_WAIT_SECS = 20   # seconds to wait before TAB+ENTER on dynamic links
          PROXY_RETRY_INTERVAL   = 2
          PROXY_MAX_ATTEMPTS     = 40

          def clipboard_set(text):
              try:
                  proc = subprocess.Popen(['pbcopy'], stdin=subprocess.PIPE,
                      stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                  proc.communicate(input=text.encode('utf-8'), timeout=5)
                  time.sleep(0.15)
                  return proc.returncode == 0
              except Exception as e:
                  log("Clipboard", f"pbcopy error: {e}")
                  return False

          def clipboard_get():
              try:
                  result = subprocess.run(['pbpaste'], capture_output=True, text=True, timeout=5)
                  return result.stdout
              except Exception:
                  return ""

          def clipboard_verify(expected, label="value"):
              actual = clipboard_get()
              if actual != expected:
                  log("Clipboard", f"MISMATCH for {label}: got {actual[:30]!r}, retrying...")
                  clipboard_set(expected)
                  time.sleep(0.2)
                  return clipboard_get() == expected
              return True

          def run_as(script, silent=False, timeout=20):
              try:
                  r = subprocess.run(["osascript", "-e", script],
                      capture_output=True, text=True, timeout=timeout)
                  if r.returncode != 0 and not silent:
                      log("AppleScript", f"stderr: {r.stderr.strip()[:120]}")
                  return r.stdout.strip()
              except subprocess.TimeoutExpired:
                  if not silent: log("AppleScript", "Timed out")
                  return ""
              except Exception as e:
                  if not silent: log("AppleScript", f"Exception: {e}")
                  return ""

          def cliclick(cmd):
              try:
                  result = subprocess.run(['cliclick', cmd],
                      capture_output=True, text=True, timeout=5)
                  return result.returncode == 0
              except Exception as e:
                  log("cliclick", f"Error running '{cmd}': {e}")
                  return False

          def press(key_name):
              key_map = {
                  "tab": 48, "return": 36, "space": 49,
                  "right": 124, "left": 123, "up": 126,
                  "down": 125, "escape": 53
              }
              code = key_map.get(key_name.lower())
              if code:
                  run_as(f'tell application "System Events" to key code {code}', silent=True)

          def running_apps():
              r = run_as(
                  'tell application "System Events" to get name of every process '
                  'whose visible is true', silent=True)
              return [n.strip() for n in r.split(",") if n.strip()]

          def dismiss_compute_host_popup():
              TCC_DB = "/Library/Application Support/com.apple.TCC/TCC.db"
              try:
                  subprocess.run([
                      'sudo', 'sqlite3', TCC_DB,
                      "INSERT OR REPLACE INTO access "
                      "(service,client,client_type,auth_value,auth_reason,auth_version,flags) "
                      "VALUES('kTCCServiceLocalNetwork','com.google.Chrome',0,2,4,1,0);"
                  ], timeout=5, capture_output=True)
              except Exception:
                  pass
              result = run_as(r'''
          tell application "System Events"
            set dismissed to ""
            try
              tell process "CoreServicesUIAgent"
                repeat with win in (every window)
                  try
                    if exists button "Allow" of win then
                      click button "Allow" of win
                      set dismissed to "allowed_in_CoreServicesUIAgent"
                    end if
                  end try
                end repeat
              end tell
            end try
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName is not "Google Chrome" then
                try
                  repeat with win in (every window of proc)
                    set wTitle to ""
                    try
                      set wTitle to (title of win) as string
                    end try
                    if wTitle contains "local network" or wTitle contains "Local Network" or ¬
                       wTitle contains "hosted-compute" or ¬
                       wTitle contains "control \"Google Chrome\"" or ¬
                       wTitle contains "find devices" then
                      try
                        click button "Allow" of win
                        set dismissed to "allowed_in_" & pName
                      end try
                    end if
                  end repeat
                end try
              end if
            end repeat
            return dismissed
          end tell
          ''', silent=True)
              if result and result.strip():
                  log("ComputeHostDismiss", f"GUI dismissed: {result.strip()}")
                  return True
              return False

          def dismiss_system_popups():
              result = run_as(r'''
          tell application "System Events"
            set popupClicked to ""
            try
              tell process "CoreServicesUIAgent"
                repeat with win in (every window)
                  try
                    if exists button "Allow" of win then
                      click button "Allow" of win
                      set popupClicked to "allowed_in_CoreServicesUIAgent"
                    end if
                  end try
                end repeat
              end tell
            end try
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName is not "Google Chrome" then
                try
                  repeat with win in (every window of proc)
                    set winTitle to ""
                    try
                      set winTitle to (title of win) as string
                    end try
                    set combinedText to winTitle as string
                    if pName contains "getscreen" or pName contains "Getscreen" then
                      try
                        if exists button "Allow" of win then
                          click button "Allow" of win
                          set popupClicked to "getscreen_allowed"
                        end if
                      end try
                    end if
                    if combinedText contains "local network" or ¬
                       combinedText contains "Local Network" or ¬
                       combinedText contains "hosted-compute" or ¬
                       combinedText contains "find devices" or ¬
                       combinedText contains "incoming network" then
                      try
                        click button "Allow" of win
                        set popupClicked to "local_network_allowed_in_" & pName
                      end try
                    end if
                    if combinedText contains "screen and audio" or ¬
                       combinedText contains "bypass the system" or ¬
                       combinedText contains "window picker" or ¬
                       combinedText contains "Getscreen.me" then
                      try
                        click button "Allow" of win
                        set popupClicked to "getscreen_screen_allowed"
                      end try
                    end if
                    if combinedText does not contain "Accessibility" and ¬
                       combinedText does not contain "accessibility" then
                      try
                        if (exists button "Allow" of win) and ¬
                           (exists button "Don't Allow" of win) then
                          click button "Allow" of win
                          if popupClicked is "" then
                            set popupClicked to "generic_allowed_in_" & pName
                          end if
                        end if
                      end try
                    end if
                  end repeat
                end try
              end if
            end repeat
            return popupClicked
          end tell
          ''', silent=True)
              if result and result.strip():
                  log("SystemPopup", f"Dismissed: {result.strip()}")
                  return True
              return False

          # ── Proxy auth dialog detection (all visible processes) ───────────────
          def get_proxy_dialog_info():
              result = run_as(r'''
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              try
                repeat with w in (every window of proc)
                  set fieldCount to (count of text field of w)
                  if fieldCount >= 2 then
                    set wTitle to ""
                    try
                      set wTitle to (title of w) as string
                    end try
                    if wTitle contains "Sign" or wTitle contains "proxy" or wTitle contains "Proxy" then
                      set f1pos to position of text field 1 of w
                      set f1sz  to size of text field 1 of w
                      set f1x to ((item 1 of f1pos) + (item 1 of f1sz) / 2) as integer
                      set f1y to ((item 2 of f1pos) + (item 2 of f1sz) / 2) as integer
                      set f2pos to position of text field 2 of w
                      set f2sz  to size of text field 2 of w
                      set f2x to ((item 1 of f2pos) + (item 1 of f2sz) / 2) as integer
                      set f2y to ((item 2 of f2pos) + (item 2 of f2sz) / 2) as integer
                      set btnx to f2x
                      set btny to f2y + 50
                      try
                        repeat with b in (every button of w)
                          set bname to ""
                          try
                            set bname to (name of b) as string
                          end try
                          if bname contains "Sign" or bname contains "OK" then
                            set bpos to position of b
                            set bsz  to size of b
                            set btnx to ((item 1 of bpos) + (item 1 of bsz) / 2) as integer
                            set btny to ((item 2 of bpos) + (item 2 of bsz) / 2) as integer
                          end if
                        end repeat
                      end try
                      return "found|" & f1x & "," & f1y & "|" & f2x & "," & f2y & "|" & btnx & "," & btny & "|" & pName
                    end if
                  end if
                end repeat
              end try
            end repeat
            return "none"
          end tell
          ''', silent=True)
              if not result or result == "none":
                  return None
              try:
                  parts    = result.split("|")
                  f1x, f1y = map(int, parts[1].split(","))
                  f2x, f2y = map(int, parts[2].split(","))
                  btnx, btny = map(int, parts[3].split(","))
                  proc_name = parts[4] if len(parts) > 4 else "unknown"
                  return {"type": parts[0], "f1": (f1x, f1y), "f2": (f2x, f2y),
                          "btn": (btnx, btny), "process": proc_name}
              except Exception as e:
                  log("DialogInfo", f"Parse error: {e}, raw={result[:120]}")
                  return None

          def fill_proxy_auth(user, pwd):
              global PROXY_RETRY_INTERVAL
              info = get_proxy_dialog_info()
              if info is None:
                  log("ProxyAuth", "No dialog detected — keyboard-only fallback")
                  run_as('tell application "Google Chrome" to activate', silent=True)
                  time.sleep(1)
                  clipboard_set(user)
                  clipboard_verify(user, "username")
                  run_as('tell application "System Events" to keystroke "a" using command down', silent=True)
                  time.sleep(0.15)
                  run_as('tell application "System Events" to keystroke "v" using command down', silent=True)
                  time.sleep(0.3)
                  press("tab"); time.sleep(0.2)
                  clipboard_set(pwd)
                  clipboard_verify(pwd, "password")
                  run_as('tell application "System Events" to keystroke "a" using command down', silent=True)
                  time.sleep(0.15)
                  run_as('tell application "System Events" to keystroke "v" using command down', silent=True)
                  time.sleep(0.3)
                  press("return"); time.sleep(0.3)
                  press("return")
                  log("ProxyAuth", "Keyboard fallback executed")
                  return "keyboard_fallback"

              log("ProxyAuth", f"Dialog found in process={info['process']}")

              def _click_sign_in():
                  r = run_as(r'''
          tell application "System Events"
            tell process "''' + info['process'] + '''"
              set frontmost to true
              try
                click button "Sign In" of window 1
                return "clicked_sign_in"
              end try
              try
                click button "Sign in" of window 1
                return "clicked_sign_in_lc"
              end try
              try
                click button "OK" of window 1
                return "clicked_ok"
              end try
              return "no_button"
            end tell
          end tell
          ''', silent=False)
                  if r and "no_button" not in r:
                      return r
                  btnx, btny = info["btn"]
                  cliclick(f'c:{btnx},{btny}')
                  time.sleep(0.3)
                  if not get_proxy_dialog_info():
                      return "cliclick_sign_in"
                  for _ in range(2):
                      press("tab"); time.sleep(0.15)
                  press("space"); time.sleep(0.2)
                  press("return"); time.sleep(0.2)
                  run_as('tell application "System Events" to key code 36', silent=True)
                  return "keyboard_sign_in"

              run_as(f'tell application "System Events" to tell process "{info["process"]}" to set frontmost to true', silent=True)
              time.sleep(0.4)
              f1x, f1y = info["f1"]
              if not cliclick(f'c:{f1x},{f1y}'):
                  run_as(f'tell application "System Events" to click text field 1 of window 1 of process "{info["process"]}"', silent=True)
              time.sleep(0.3)
              clipboard_set(user)
              clipboard_verify(user, "username")
              run_as('tell application "System Events" to keystroke "a" using command down', silent=True)
              time.sleep(0.15)
              run_as('tell application "System Events" to keystroke "v" using command down', silent=True)
              time.sleep(0.3)
              press("tab"); time.sleep(0.2)
              f2x, f2y = info["f2"]
              if not cliclick(f'c:{f2x},{f2y}'):
                  run_as(f'tell application "System Events" to click text field 2 of window 1 of process "{info["process"]}"', silent=True)
              time.sleep(0.3)
              clipboard_set(pwd)
              clipboard_verify(pwd, "password")
              run_as('tell application "System Events" to keystroke "a" using command down', silent=True)
              time.sleep(0.15)
              run_as('tell application "System Events" to keystroke "v" using command down', silent=True)
              time.sleep(0.3)
              result = _click_sign_in()
              log("ProxyAuth", f"Sign In result: {result}")
              time.sleep(0.5)
              return result if result else "submitted"

          # ── Interstitial bypass: 1 TAB + ENTER (for Opera dynamic links) ─────
          def click_interstitial_tab_enter():
              log("Interstitial", "Activating Chrome and waiting 5s to settle...")
              run_as('tell application "Google Chrome" to activate', silent=True)
              time.sleep(5)
              log("Interstitial", "Pressing TAB (1x)...")
              press("tab")
              time.sleep(1)
              log("Interstitial", "Pressing ENTER...")
              press("return")
              time.sleep(1)
              log("Interstitial", "TAB + ENTER interstitial bypass complete.")
              return "tab1_enter"

          # ── Download button click: 3 TAB + ENTER ─────────────────────────────
          def click_dl_button(sw_type):
              log("DLButton", "Activating Chrome and giving page time to settle...")
              run_as('tell application "Google Chrome" to activate', silent=True)
              time.sleep(5)
              for i in range(3):
                  press("tab")
                  log("DLButton", f"Tab {i+1}/3 - waiting 5s...")
                  time.sleep(5)
              press("return")
              log("DLButton", "Pressed Enter after 3 Tabs")
              time.sleep(1)
              return "tab3_enter"

          def accept_cookie():
              for b in ["Accept all", "Accept All", "Accept Cookies",
                        "Allow all", "Accepter tout", "I agree", "Got it"]:
                  r = run_as(f'''
          tell application "System Events"
            tell process "Google Chrome"
              try
                click button "{b}" of window 1
                return "clicked"
              on error
              end try
            end tell
          end tell''', silent=True)
                  if r == "clicked":
                      log("Cookie", f"Accepted with: '{b}'")
                      return True
              return False

          def click_button_in_opera(label, timeout=5):
              result = run_as(fr'''
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName contains "Opera" then
                try
                  repeat with win in (every window of proc)
                    try
                      if exists button "{label}" of win then
                        click button "{label}" of win
                        return "clicked"
                      end if
                    end try
                    repeat with b in (every button of win)
                      set bname to ""
                      try
                        set bname to name of b as string
                      end try
                      ignoring case
                        if bname contains "{label}" then
                          click b
                          return "clicked_partial"
                        end if
                      end ignoring
                    end repeat
                  end repeat
                end try
              end if
            end repeat
            return "not_found"
          end tell
          ''', silent=True, timeout=timeout)
              if result and "clicked" in result:
                  log("ButtonClick", f"Clicked button '{label}' -> {result}")
                  return True
              return False

          def wait_for_app_launch(app_name, timeout=120):
              log("LaunchDetect", f"Waiting for '{app_name}' to launch (up to {timeout}s)...")
              start = time.time()
              while time.time() - start < timeout:
                  apps = running_apps()
                  if any(app_name.lower() in a.lower() for a in apps):
                      log("LaunchDetect", f"✓ '{app_name}' is running!")
                      time.sleep(2)
                      return True
                  elapsed = int(time.time() - start)
                  if elapsed % 15 == 0 and elapsed > 0:
                      log("LaunchDetect", f"Still waiting for '{app_name}'... ({elapsed}s elapsed)")
                  time.sleep(1)
              log("LaunchDetect", f"'{app_name}' did not launch within {timeout}s.")
              return False

          def click_accept_and_install(app_name):
              log(f"{app_name}", "Searching for Accept/Install button...")
              script = f'''
          tell application "System Events"
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName contains "{app_name}" or pName contains "Opera" then
                try
                  repeat with win in (every window of proc)
                    try
                      if exists button "Accept and Install" of win then
                        click button "Accept and Install" of win
                        return "clicked_accept_and_install"
                      end if
                    end try
                    try
                      if exists button "Accept & Install" of win then
                        click button "Accept & Install" of win
                        return "clicked_accept_and_install"
                      end if
                    end try
                    try
                      if exists button "Accept" of win then
                        click button "Accept" of win
                        return "clicked_accept"
                      end if
                    end try
                    try
                      if exists button "Install" of win then
                        click button "Install" of win
                        return "clicked_install"
                      end if
                    end try
                  end repeat
                end try
              end if
            end repeat
            return "not_found"
          end tell'''
              result = run_as(script, silent=True)
              log(f"{app_name}", f"Button click result: {result}")
              return result

          # ── Opera GX post-install flow (macOS) ───────────────────────────────
          def opera_gx_flow():
              log("PostInstall-OPGX", "=== Opera GX Post-Install Sequence Starting ===")
              if not wait_for_app_launch("Opera GX", timeout=120):
                  log("PostInstall-OPGX", "Opera GX did not launch — aborting.")
                  return
              log("PostInstall-OPGX", "STEP 1: Opera GX launched. Dismissing popups for 10s...")
              t0 = time.time()
              while time.time() - t0 < 10:
                  dismiss_system_popups()
                  dismiss_compute_host_popup()
                  time.sleep(0.5)

              log("PostInstall-OPGX", "STEP 2: Activating Opera GX window...")
              run_as('tell application "Opera GX" to activate', silent=True)
              time.sleep(2)

              log("PostInstall-OPGX", "STEP 3: Attempting 'Accept and Install' button click...")
              result = click_accept_and_install("Opera GX")
              if result == "not_found":
                  log("PostInstall-OPGX", "Button not found via UI — Tab+Enter fallback...")
                  for _ in range(3):
                      press("tab"); time.sleep(0.5)
                  press("return")
              else:
                  log("PostInstall-OPGX", f"Accept/Install result: {result}")

              log("PostInstall-OPGX", "STEP 4: Waiting 30s for next screen (dismissing popups during wait)...")
              for s in range(1, 31):
                  dismiss_compute_host_popup()
                  dismiss_system_popups()
                  if s % 5 == 0:
                      log("PostInstall-OPGX", f"  Post-accept wait: {s}/30 seconds...")
                  time.sleep(1)

              log("PostInstall-OPGX", "STEP 5: Pressing TAB x4 then ENTER x8 (setup wizard navigation)...")
              for i in range(1, 5):
                  press("tab")
                  log("PostInstall-OPGX", f"  TAB {i}/4 pressed.")
                  time.sleep(0.5)
              for i in range(1, 9):
                  press("return")
                  d = random.uniform(1.0, 2.0)
                  log("PostInstall-OPGX", f"  ENTER {i}/8 pressed ({d:.2f}s delay).")
                  time.sleep(d)

              time.sleep(5)

              log("PostInstall-OPGX", "STEP 6: TAB cycle — TAB 7 to 16, each followed by ENTER with 5s waits...")
              for tab_count in range(7, 17):
                  run_as('tell application "System Events" to keystroke "n" using command down', silent=True)
                  log("PostInstall-OPGX", f"  Ctrl+N (new tab) before cycle TAB-{tab_count}.")
                  time.sleep(1)
                  log("PostInstall-OPGX", f"  Pressing TAB x{tab_count}...")
                  for i in range(1, tab_count + 1):
                      press("tab")
                      d = random.uniform(1.0, 2.0)
                      log("PostInstall-OPGX", f"    TAB {i}/{tab_count} pressed ({d:.2f}s delay).")
                      time.sleep(d)
                  press("return")
                  log("PostInstall-OPGX", f"  ENTER pressed after TAB x{tab_count}. Waiting 5s...")
                  for s in range(1, 6):
                      dismiss_compute_host_popup()
                      dismiss_system_popups()
                      log("PostInstall-OPGX", f"    Post-ENTER wait: {s}/5 seconds...")
                      time.sleep(1)

              log("PostInstall-OPGX", "=== Opera GX Post-Install Sequence Completed Successfully ===")

          # ── Opera One post-install flow (macOS) ──────────────────────────────
          def opera_one_flow():
              log("PostInstall-OP1", "=== Opera One Post-Install Sequence Starting ===")
              found = False
              for app_name in ["Opera Installer", "Opera"]:
                  if wait_for_app_launch(app_name, timeout=60):
                      found = True
                      break
              if not found:
                  log("PostInstall-OP1", "Installer not seen. Attempting manual launch...")
                  for path in ["/Applications/Opera Installer.app", "/Applications/Opera.app"]:
                      if os.path.exists(path):
                          subprocess.run(["open", path])
                          time.sleep(5)
                          break
                  else:
                      found_path = subprocess.run(
                          "find /Applications -maxdepth 2 -name 'Opera*.app' 2>/dev/null | head -1",
                          shell=True, capture_output=True, text=True).stdout.strip()
                      if found_path:
                          log("PostInstall-OP1", f"Opening {found_path}")
                          subprocess.run(["open", found_path])
                          time.sleep(5)
                  if not wait_for_app_launch("Opera", timeout=60):
                      log("PostInstall-OP1", "Opera still not found — aborting.")
                      return

              log("PostInstall-OP1", "STEP 1: Opera One launched. Dismissing popups for 10s...")
              t0 = time.time()
              while time.time() - t0 < 10:
                  dismiss_system_popups()
                  dismiss_compute_host_popup()
                  time.sleep(0.5)

              log("PostInstall-OP1", "STEP 2: Activating Opera Installer window...")
              run_as('tell application "Opera Installer" to activate', silent=True)
              time.sleep(2)

              log("PostInstall-OP1", "STEP 3: Attempting 'Accept and Install' button click...")
              result = click_accept_and_install("Opera")
              if result == "not_found":
                  log("PostInstall-OP1", "Button not found — Tab+Enter fallback...")
                  for _ in range(3):
                      press("tab"); time.sleep(0.5)
                  press("return")
              else:
                  log("PostInstall-OP1", f"Accept/Install result: {result}")

              log("PostInstall-OP1", "STEP 4: Waiting 30s for next screen (dismissing popups)...")
              for s in range(1, 31):
                  dismiss_compute_host_popup()
                  dismiss_system_popups()
                  if s % 5 == 0:
                      log("PostInstall-OP1", f"  Wait: {s}/30 seconds...")
                  time.sleep(1)

              log("PostInstall-OP1", "STEP 5: Clicking 'Next' 7 times (3s delay each)...")
              for i in range(1, 8):
                  log("PostInstall-OP1", f"  Clicking 'Next' attempt {i}/7...")
                  clicked = click_button_in_opera("Next")
                  if clicked:
                      log("PostInstall-OP1", f"  'Next' clicked successfully on attempt {i}.")
                  else:
                      log("PostInstall-OP1", f"  'Next' not found on attempt {i} — continuing anyway.")
                  dismiss_compute_host_popup()
                  dismiss_system_popups()
                  log("PostInstall-OP1", f"  Waiting 3s after Next click {i}...")
                  time.sleep(3)

              log("PostInstall-OP1", "STEP 6: Looking for 'Get Started' button...")
              if click_button_in_opera("Get Started"):
                  log("PostInstall-OP1", "'Get Started' clicked successfully.")
                  time.sleep(2)
              else:
                  log("PostInstall-OP1", "'Get Started' not found — skipping.")

              log("PostInstall-OP1", "STEP 7: Pressing ENTER...")
              press("return")
              time.sleep(2)

              log("PostInstall-OP1", "STEP 8: Clicking 'Submit' button...")
              if click_button_in_opera("Submit"):
                  log("PostInstall-OP1", "'Submit' clicked successfully.")
              else:
                  log("PostInstall-OP1", "'Submit' not found — keyboard Enter fallback.")
                  press("return")
              time.sleep(2)

              log("PostInstall-OP1", "STEP 9: TAB cycle — TAB 8 to 18, Ctrl+N before & after, 5s waits...")
              tab_sequence = list(range(8, 19))
              log("PostInstall-OP1", f"  TAB sequence plan: {tab_sequence}")
              for cycle_idx, tab_count in enumerate(tab_sequence):
                  log("PostInstall-OP1", f"--- TAB CYCLE {cycle_idx+1}/{len(tab_sequence)}: {tab_count} TAB presses ---")

                  run_as('tell application "System Events" to keystroke "n" using command down', silent=True)
                  log("PostInstall-OP1", f"  Ctrl+N (before TABs). Waiting 5s...")
                  for s in range(1, 6):
                      log("PostInstall-OP1", f"    Pre-TAB wait: {s}/5 seconds...")
                      time.sleep(1)

                  log("PostInstall-OP1", f"  Pressing TAB x{tab_count} (1s delay each)...")
                  for i in range(1, tab_count + 1):
                      press("tab")
                      log("PostInstall-OP1", f"    TAB {i}/{tab_count} pressed.")
                      time.sleep(1)

                  press("return")
                  log("PostInstall-OP1", f"  ENTER pressed after {tab_count} TABs. Waiting 5s...")
                  for s in range(1, 6):
                      log("PostInstall-OP1", f"    Post-ENTER wait: {s}/5 seconds...")
                      time.sleep(1)

                  run_as('tell application "System Events" to keystroke "n" using command down', silent=True)
                  log("PostInstall-OP1", f"  Ctrl+N (after TABs). Waiting 5s...")
                  for s in range(1, 6):
                      log("PostInstall-OP1", f"    Post-CtrlN wait: {s}/5 seconds...")
                      time.sleep(1)
                  log("PostInstall-OP1", f"--- TAB CYCLE {cycle_idx+1} COMPLETE ---")

              log("PostInstall-OP1", "=== Opera One Post-Install Sequence Completed Successfully ===")

          def close_chrome():
              run_as('tell application "Google Chrome" to quit', silent=True)
              log("Chrome", "Quit signal sent.")

          # ────────────────────────────────────────────────────────────────────
          # MAIN HANDLER — click path vs install path
          # ────────────────────────────────────────────────────────────────────
          def handle(user, pwd, sw_type, use_proxy, action_mode, timeout=420):
              global PROXY_RETRY_INTERVAL
              t0 = time.time()
              sentinel          = "/tmp/download_done.flag"
              installer_sentinel = "/tmp/installer_executed.flag"

              chrome_first_seen   = None
              proxy_done          = False
              proxy_done_time     = None
              dl_clicked          = False
              chrome_closed       = False
              setup_done          = False
              op_launch_t         = None
              interstitial_done   = False
              interstitial_time   = None

              proxy_fill_attempts = 0
              proxy_last_try      = 0
              last_popup_dismiss  = 0
              last_cookie_try     = 0
              last_dl_try         = 0

              log("Handler", f"===== HANDLER STARTED =====")
              log("Handler", f"action_mode={action_mode.upper()} | type={sw_type} | proxy={use_proxy}")
              if use_proxy:
                  log("Handler", f"Proxy user : {user}")
                  log("Handler", f"Proxy pass : {pwd[:4]}...{pwd[-4:] if len(pwd)>8 else '****'}")

              # ── CLICK-ONLY PATH ──────────────────────────────────────────────
              if action_mode == "click":
                  log("Handler", "=== CLICK-ONLY PATH: Loading URL — no download/install ===")
                  while time.time() - t0 < timeout:
                      elapsed = int(time.time() - t0)
                      apps    = running_apps()
                      chrome  = "Google Chrome" in apps

                      if chrome and chrome_first_seen is None:
                          chrome_first_seen = time.time()
                          log("Handler", f"*** Chrome detected at t={elapsed}s ***")

                      warmup_done = (chrome_first_seen is not None and
                                     (time.time() - chrome_first_seen) >= CHROME_WARMUP_SECS)

                      # Always dismiss popups
                      if time.time() - last_popup_dismiss > 3:
                          dismiss_system_popups()
                          dismiss_compute_host_popup()
                          last_popup_dismiss = time.time()

                      # Proxy auth while warming up
                      if (use_proxy and chrome and warmup_done and not proxy_done
                              and proxy_fill_attempts < PROXY_MAX_ATTEMPTS
                              and time.time() - proxy_last_try > PROXY_RETRY_INTERVAL):
                          proxy_last_try = time.time()
                          proxy_fill_attempts += 1
                          log("ProxyAuth", f"Click-path attempt #{proxy_fill_attempts} (t={elapsed}s)")
                          result = fill_proxy_auth(user, pwd)
                          log("ProxyAuth", f"Result: {result}")
                          if any(k in result.lower() for k in ("sign", "ok", "submitted", "keyboard", "cliclick", "return")):
                              log("ProxyAuth", "✓ Proxy auth complete (click path)")
                              proxy_done      = True
                              proxy_done_time = time.time()
                              PROXY_RETRY_INTERVAL = 999
                          else:
                              PROXY_RETRY_INTERVAL = 2

                      # Cookie acceptance
                      if chrome and time.time() - last_cookie_try > 12:
                          accept_cookie()
                          last_cookie_try = time.time()

                      # For dynamic/Opera links: TAB+ENTER interstitial after 20s of proxy-done (or page load)
                      page_ready_time = proxy_done_time if use_proxy and proxy_done else chrome_first_seen
                      if (sw_type in ["dynamic_opera", "opera_smart_link"] and chrome and
                              not interstitial_done and page_ready_time is not None and
                              (time.time() - page_ready_time) >= INTERSTITIAL_WAIT_SECS):
                          log("Interstitial", f"[Click Path] {INTERSTITIAL_WAIT_SECS}s elapsed — firing TAB+ENTER interstitial bypass...")
                          click_interstitial_tab_enter()
                          interstitial_done = True
                          interstitial_time = time.time()
                          log("Interstitial", "[Click Path] Interstitial bypass executed. Staying alive for 75s total...")

                      if elapsed % 15 == 0 and elapsed > 0:
                          log("Handler", f"[Click Path] Alive t={elapsed}s | chrome={chrome} | proxy_done={proxy_done} | interstitial={interstitial_done}")

                      # Exit after 75s of page being loaded (leaves runner alive)
                      if chrome_first_seen and (time.time() - chrome_first_seen) > 75:
                          log("Handler", "[Click Path] 75s page load window complete — click path exiting cleanly.")
                          break

                      time.sleep(1)

                  log("Handler", "===== CLICK-ONLY PATH FINISHED =====")
                  return

              # ── INSTALL PATH ─────────────────────────────────────────────────
              log("Handler", "=== INSTALL PATH: Full download + install + post-install ===")
              if use_proxy:
                  clipboard_set(user)
                  log("Handler", "Username pre-loaded to clipboard.")

              while time.time() - t0 < timeout:
                  try:
                      elapsed = int(time.time() - t0)
                      apps    = running_apps()
                      chrome  = "Google Chrome" in apps
                      op_gx   = any("Opera GX" in a for a in apps)
                      op_one  = any(
                          ("Opera" in a and "Opera GX" not in a) or
                          "Opera Installer" in a or "Opera Setup" in a
                          for a in apps
                      )

                      if chrome and chrome_first_seen is None:
                          chrome_first_seen = time.time()
                          log("Handler", f"*** Chrome detected at t={elapsed}s ***")

                      warmup_done = (chrome_first_seen is not None and
                                     (time.time() - chrome_first_seen) >= CHROME_WARMUP_SECS)

                      if chrome_first_seen and not warmup_done:
                          dismiss_compute_host_popup()
                          dismiss_system_popups()
                          last_popup_dismiss = time.time()
                          time.sleep(0.5)
                          continue

                      if time.time() - last_popup_dismiss > 3:
                          dismiss_system_popups()
                          last_popup_dismiss = time.time()

                      if chrome and time.time() - last_cookie_try > 12:
                          accept_cookie()
                          last_cookie_try = time.time()

                      # Proxy auth
                      if (use_proxy and warmup_done and chrome and not proxy_done
                              and proxy_fill_attempts < PROXY_MAX_ATTEMPTS
                              and time.time() - proxy_last_try > PROXY_RETRY_INTERVAL):
                          proxy_last_try = time.time()
                          proxy_fill_attempts += 1
                          log("ProxyAuth", f"=== Attempt #{proxy_fill_attempts}/{PROXY_MAX_ATTEMPTS} (t={elapsed}s) ===")
                          result = fill_proxy_auth(user, pwd)
                          log("ProxyAuth", f"Result: {result}")
                          if any(k in result.lower() for k in ("sign", "ok", "submitted", "keyboard", "cliclick", "return")):
                              log("ProxyAuth", "✓ Proxy auth complete!")
                              proxy_done      = True
                              proxy_done_time = time.time()
                              log("ProxyAuth", f"Will wait {DL_WAIT_AFTER_PROXY}s before interstitial/download...")
                              PROXY_RETRY_INTERVAL = 999
                          else:
                              log("ProxyAuth", f"Uncertain result — retrying in 2s")
                              PROXY_RETRY_INTERVAL = 2

                      # Interstitial bypass for dynamic Opera links (TAB+ENTER after 20s)
                      page_ready_time = proxy_done_time if use_proxy and proxy_done else chrome_first_seen
                      if (sw_type in ["dynamic_opera", "opera_smart_link"] and chrome and
                              warmup_done and not interstitial_done and
                              page_ready_time is not None):
                          wait_time = DL_WAIT_AFTER_PROXY if use_proxy else INTERSTITIAL_WAIT_SECS
                          if (time.time() - page_ready_time) >= wait_time:
                              log("Interstitial", f"{wait_time}s elapsed — firing TAB+ENTER interstitial bypass...")
                              click_interstitial_tab_enter()
                              interstitial_done = True
                              interstitial_time = time.time()
                              log("Interstitial", f"Interstitial bypass done. Waiting {DL_WAIT_AFTER_PROXY}s before download button click...")

                      # Download button click (3 TAB + ENTER) — after interstitial (dynamic) or after proxy wait (others)
                      if chrome and not dl_clicked and warmup_done:
                          ready_to_click = False
                          if sw_type in ["dynamic_opera", "opera_smart_link"]:
                              if interstitial_done and interstitial_time and (time.time() - interstitial_time) >= DL_WAIT_AFTER_PROXY:
                                  ready_to_click = True
                                  wait_left = 0
                              elif interstitial_done and interstitial_time:
                                  wait_left = int(DL_WAIT_AFTER_PROXY - (time.time() - interstitial_time))
                                  if wait_left % 5 == 0 and wait_left > 0:
                                      log("Handler", f"Waiting {wait_left}s more before download button click...")
                          elif use_proxy:
                              if proxy_done and proxy_done_time and (time.time() - proxy_done_time) >= DL_WAIT_AFTER_PROXY:
                                  ready_to_click = True
                              elif proxy_done and proxy_done_time:
                                  wait_left = int(DL_WAIT_AFTER_PROXY - (time.time() - proxy_done_time))
                                  if wait_left % 5 == 0 and wait_left > 0:
                                      log("Handler", f"Waiting {wait_left}s more before download button click...")
                          else:
                              if chrome_first_seen and (time.time() - chrome_first_seen) > 5:
                                  ready_to_click = True

                          if ready_to_click and time.time() - last_dl_try > 10:
                              last_dl_try = time.time()
                              log("DLButton", f"=== Attempting download button click (t={elapsed}s) ===")
                              result = click_dl_button(sw_type)
                              if result != "not_found":
                                  dl_clicked = True
                                  log("DLButton", f"✓ Download triggered! ({result})")
                              else:
                                  log("DLButton", "Not found yet — retrying in 10s")

                      # Close Chrome once download sentinel detected
                      if not chrome_closed and os.path.exists(sentinel):
                          log("Handler", "✓ Download sentinel detected — closing Chrome...")
                          close_chrome()
                          time.sleep(2)
                          chrome_closed = True

                      # Opera GX post-install
                      if sw_type in ["opera_gx", "dynamic_opera", "opera_smart_link"] and op_gx and not setup_done:
                          if not op_launch_t:
                              op_launch_t = time.time()
                              log("Handler", "*** Opera GX detected — starting installer sequence in 5s ***")
                              run_as('tell application "Opera GX" to activate', silent=True)
                          if time.time() - op_launch_t > 5:
                              opera_gx_flow()
                              setup_done = True
                              break

                      # Opera One post-install
                      if sw_type in ["opera_one", "dynamic_opera", "opera_smart_link"] and op_one and not op_gx and not setup_done:
                          if not op_launch_t:
                              op_launch_t = time.time()
                              log("Handler", "*** Opera One detected — starting installer sequence in 5s ***")
                              run_as('tell application "Opera Installer" to activate', silent=True)
                              time.sleep(1)
                          if time.time() - op_launch_t > 5:
                              opera_one_flow()
                              setup_done = True
                              break

                      if elapsed % 30 == 0 and elapsed > 0:
                          log("Handler", f"--- Status t={elapsed}s | chrome={chrome} | warmup={warmup_done} | proxy_done={proxy_done} | interstitial={interstitial_done} | dl_clicked={dl_clicked} | sentinel={os.path.exists(sentinel)} ---")

                  except Exception as e:
                      log("Handler", f"Exception in main loop: {e}")

                  time.sleep(1)

              if setup_done:
                  log("Handler", "===== HANDLER FINISHED SUCCESSFULLY =====")
              else:
                  log("Handler", f"===== HANDLER TIMEOUT after {int(time.time()-t0)}s =====")
                  log("Handler", f"Final state: proxy_done={proxy_done}, dl_clicked={dl_clicked}, interstitial={interstitial_done}, sentinel={os.path.exists('/tmp/download_done.flag')}")

          if __name__ == "__main__":
              u   = sys.argv[1] if len(sys.argv) > 1 else ""
              p   = sys.argv[2] if len(sys.argv) > 2 else ""
              sw  = sys.argv[3] if len(sys.argv) > 3 else "dynamic_opera"
              px  = (sys.argv[4].lower() == "true") if len(sys.argv) > 4 else False
              act = sys.argv[5] if len(sys.argv) > 5 else "install"
              handle(u, p, sw, px, act)
          PYEOF

          # ── Shell helpers ─────────────────────────────────────────────────────
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          grant_tcc() {
            sudo sqlite3 "$TCC_DB" \
              "INSERT OR REPLACE INTO access \
               (service,client,client_type,auth_value,auth_reason,auth_version,flags) \
               VALUES('$1','$2',$3,2,4,1,0);" 2>/dev/null || true
          }
          grant_tcc kTCCServiceAccessibility com.apple.Terminal          0
          grant_tcc kTCCServiceAccessibility com.apple.systemevents      0
          grant_tcc kTCCServiceAccessibility com.google.Chrome           0
          grant_tcc kTCCServiceAccessibility /usr/bin/osascript          1
          grant_tcc kTCCServiceLocalNetwork  com.google.Chrome           0
          grant_tcc kTCCServiceLocalNetwork  com.apple.Terminal          0
          grant_tcc kTCCServiceLocalNetwork  /usr/bin/osascript          1
          echo "[$(date '+%H:%M:%S')] TCC grants refreshed for automation tools."

          # ── Background popup dismisser ─────────────────────────────────────────
          cat > /tmp/popup_dismisser.sh << 'DISMISSEOF'
          #!/bin/bash
          COUNT=0
          while true; do
            COUNT=$((COUNT+1))
            osascript << 'ASEOF' 2>/dev/null || true
          tell application "System Events"
            try
              tell process "CoreServicesUIAgent"
                repeat with win in (every window)
                  try
                    if exists button "Allow" of win then
                      click button "Allow" of win
                    end if
                  end try
                end repeat
              end tell
            end try
            repeat with proc in (every process whose visible is true)
              set pName to name of proc as string
              if pName is not "Google Chrome" then
                try
                  repeat with win in (every window of proc)
                    set wT to ""
                    try
                      set wT to (title of win) as string
                    end try
                    set combined to wT as string
                    if pName contains "etscreen" then
                      try
                        if exists button "Allow" of win then
                          click button "Allow" of win
                        end if
                      end try
                    end if
                    if combined contains "local network" or ¬
                       combined contains "Local Network" or ¬
                       combined contains "hosted-compute" or ¬
                       combined contains "control \"Google Chrome\"" or ¬
                       combined contains "find devices" or ¬
                       combined contains "incoming network" or ¬
                       combined contains "would like to find" then
                      try
                        click button "Allow" of win
                      end try
                    end if
                    if combined contains "screen and audio" or ¬
                       combined contains "bypass the system" or ¬
                       combined contains "window picker" then
                      try
                        click button "Allow" of win
                      end try
                    end if
                    if combined does not contain "Accessibility" and ¬
                       combined does not contain "accessibility" then
                      try
                        if (exists button "Allow" of win) and (exists button "Don't Allow" of win) then
                          click button "Allow" of win
                        end if
                      end try
                    end if
                  end repeat
                end try
              end if
            end repeat
          end tell
          ASEOF
            sleep 2
          done
          DISMISSEOF
          chmod +x /tmp/popup_dismisser.sh
          /tmp/popup_dismisser.sh > /tmp/popup_dismisser.log 2>&1 &
          DISMISSER_PID=$!
          echo "[$(date '+%H:%M:%S')] Background popup dismisser started (PID $DISMISSER_PID)"
          echo "Waiting 5s before Chrome launch..."
          sleep 5

          # ── Start Python handler ──────────────────────────────────────────────
          HANDLER_PYTHON="${UIENV_PYTHON:-python3}"
          echo "[$(date '+%H:%M:%S')] Starting UI automation handler..."
          echo "[$(date '+%H:%M:%S')] Handler: proxy=$USE_PROXY | sw_type=$SOFTWARE_TYPE | action=$ACTION_MODE"
          "$HANDLER_PYTHON" -u /tmp/macos_handler.py \
            "$PROXY_USER" "$PROXY_PASS" "$SOFTWARE_TYPE" "$USE_PROXY" "$ACTION_MODE" \
            2>&1 | tee /tmp/handler_output.log &
          HANDLER_PID=$!
          echo "[$(date '+%H:%M:%S')] Handler started (PID $HANDLER_PID)"

          # ── Watcher: only active for INSTALL path ─────────────────────────────
          if [ "$ACTION_MODE" = "install" ]; then
            touch /tmp/watcher_start_marker
            (
              DEADLINE=$(($(date +%s) + TIMEOUT_SECS))
              INSTALLED=false
              echo "[$(date '+%H:%M:%S')] [Watcher] Started. Monitoring $DL_FOLDER for downloads..."
              LAST_STATUS=$(($(date +%s)))
              while [ "$INSTALLED" = false ] && [ "$(date +%s)" -lt "$DEADLINE" ]; do
                NOW=$(date +%s)
                if [ $((NOW - LAST_STATUS)) -ge 20 ]; then
                  echo "[$(date '+%H:%M:%S')] [Watcher] Still monitoring... ($(( DEADLINE - NOW ))s remaining)"
                  LAST_STATUS=$NOW
                fi
                FILE=$(find "$DL_FOLDER" -maxdepth 1 \
                       \( -name "*.dmg" -o -name "*.zip" -o -name "*.pkg" \) \
                       ! -name "*.download" ! -name "*.crdownload" ! -name "*.part" \
                       -newer /tmp/watcher_start_marker 2>/dev/null | head -n 1 || true)
                if [ -z "$FILE" ]; then
                  FILE=$(find "$DL_FOLDER" -maxdepth 1 -type d -name "*.app" \
                         -newer /tmp/watcher_start_marker 2>/dev/null | head -n 1 || true)
                fi
                if [ -n "$FILE" ]; then
                  echo "[$(date '+%H:%M:%S')] [Watcher] ✓ Download detected: $FILE"
                  touch "$SENTINEL_PATH"
                  BASENAME=$(basename "$FILE")
                  EXT="${BASENAME##*.}"
                  if [ "$EXT" != "app" ]; then
                    echo "[$(date '+%H:%M:%S')] [Watcher] Waiting for download to complete..."
                    PREV=0
                    for i in $(seq 1 30); do
                      SZ=$(stat -f%z "$FILE" 2>/dev/null || \
                           stat -c%s "$FILE" 2>/dev/null || echo 0)
                      if [ "$SZ" = "$PREV" ] && [ "$SZ" -gt 500000 ]; then
                        echo "[$(date '+%H:%M:%S')] [Watcher] File stable at ${SZ}B"
                        break
                      fi
                      echo "[$(date '+%H:%M:%S')] [Watcher] Size=${SZ}B (try $i/30)..."
                      PREV=$SZ; sleep 2
                    done
                  else
                    sleep 5
                  fi
                  xattr -dr com.apple.quarantine "$FILE" 2>/dev/null || true
                  echo "[$(date '+%H:%M:%S')] [Watcher] 4s cleanup delay..."
                  sleep 4
                  INSTALLED_APP_NAME=""
                  if [ "$EXT" = "dmg" ]; then
                    echo "[$(date '+%H:%M:%S')] [Installer] Mounting DMG: $FILE"
                    MNT=$(hdiutil attach "$FILE" -nobrowse -quiet 2>/dev/null \
                          | awk '/\/Volumes\// {print $NF}' | head -n 1 || true)
                    if [ -n "$MNT" ]; then
                      APP_SRC=$(find "$MNT" -maxdepth 2 -name "*.app" | head -n 1 || true)
                      if [ -n "$APP_SRC" ]; then
                        AN=$(basename "$APP_SRC")
                        sudo cp -R "$APP_SRC" /Applications/ || true
                        sudo xattr -dr com.apple.quarantine "/Applications/$AN" 2>/dev/null || true
                        echo "[$(date '+%H:%M:%S')] [Installer] ✓ $AN installed from DMG."
                        INSTALLED_APP_NAME="$AN"
                      else
                        echo "[$(date '+%H:%M:%S')] [Installer] WARNING: No .app in DMG."
                      fi
                      hdiutil detach "$MNT" -quiet || true
                    else
                      echo "[$(date '+%H:%M:%S')] [Installer] ERROR: DMG mount failed."
                    fi
                  elif [ "$EXT" = "zip" ]; then
                    echo "[$(date '+%H:%M:%S')] [Installer] Extracting ZIP: $FILE"
                    EXTRACT_DIR="${DL_FOLDER}/extracted_$(date +%s)"
                    mkdir -p "$EXTRACT_DIR"
                    if ! ditto -xk "$FILE" "$EXTRACT_DIR" 2>/dev/null; then
                      unzip -q -o "$FILE" -d "$EXTRACT_DIR" 2>/dev/null || true
                    fi
                    find "$EXTRACT_DIR" -name "__MACOSX" -exec rm -rf {} + 2>/dev/null || true
                    APP_IN_ZIP=$(find "$EXTRACT_DIR" -maxdepth 4 -name "*.app" ! -path "*/__MACOSX/*" | head -n 1 || true)
                    if [ -n "$APP_IN_ZIP" ]; then
                      AN=$(basename "$APP_IN_ZIP")
                      sudo cp -R "$APP_IN_ZIP" /Applications/ || true
                      sudo xattr -dr com.apple.quarantine "/Applications/$AN" 2>/dev/null || true
                      sudo codesign --force --deep --sign - "/Applications/$AN" 2>/dev/null || true
                      echo "[$(date '+%H:%M:%S')] [Installer] ✓ $AN installed from ZIP."
                      INSTALLED_APP_NAME="$AN"
                      rm -rf "$EXTRACT_DIR" 2>/dev/null || true
                    else
                      echo "[$(date '+%H:%M:%S')] [Installer] WARNING: No .app in ZIP."
                      ls -laR "$EXTRACT_DIR" || true
                    fi
                  elif [ "$EXT" = "pkg" ]; then
                    echo "[$(date '+%H:%M:%S')] [Installer] Installing PKG: $FILE"
                    sudo installer -pkg "$FILE" -target / -verboseR || true
                  elif [ "$EXT" = "app" ]; then
                    echo "[$(date '+%H:%M:%S')] [Installer] Direct .app: $BASENAME"
                    sudo cp -R "$FILE" /Applications/ || true
                    sudo xattr -dr com.apple.quarantine "/Applications/$BASENAME" 2>/dev/null || true
                    sudo codesign --force --deep --sign - "/Applications/$BASENAME" 2>/dev/null || true
                    INSTALLED_APP_NAME="$BASENAME"
                  fi

                  # Determine actual software type from filename
                  ACTUAL="$SOFTWARE_TYPE"
                  if [ "$ACTUAL" = "dynamic_opera" ] || [ "$ACTUAL" = "opera_smart_link" ]; then
                    if echo "$INSTALLED_APP_NAME$BASENAME" | grep -qi "gx"; then
                      ACTUAL="opera_gx"
                    else
                      ACTUAL="opera_one"
                    fi
                  fi
                  echo "[$(date '+%H:%M:%S')] [Watcher] Determined app type: $ACTUAL"

                  # Write installer executed sentinel
                  touch "$INSTALLER_SENTINEL"
                  echo "[$(date '+%H:%M:%S')] [Watcher] Installer sentinel written: $INSTALLER_SENTINEL"

                  echo "[$(date '+%H:%M:%S')] [Watcher] Quitting Chrome..."
                  osascript -e 'tell application "Google Chrome" to quit' >/dev/null 2>&1 || true
                  sleep 2

                  # Build search paths
                  if [ "$ACTUAL" = "opera_gx" ]; then
                    SEARCH_PATHS=(
                      "/Applications/$INSTALLED_APP_NAME"
                      "/Applications/Opera GX.app"
                      "$HOME/Applications/Opera GX.app"
                    )
                  else
                    SEARCH_PATHS=(
                      "/Applications/$INSTALLED_APP_NAME"
                      "/Applications/Opera.app"
                      "/Applications/Opera Installer.app"
                      "$HOME/Applications/Opera Installer.app"
                      "$HOME/Applications/Opera.app"
                    )
                  fi

                  echo "[$(date '+%H:%M:%S')] [Watcher] Waiting for app to appear on disk..."
                  LAUNCHED=false
                  for i in $(seq 1 60); do
                    for P in "${SEARCH_PATHS[@]}"; do
                      if [ -d "$P" ]; then
                        sleep 3
                        echo "[$(date '+%H:%M:%S')] [Watcher] Launching: $P"
                        open "$P" || true
                        sleep 5
                        LAUNCHED=true
                        break 2
                      fi
                    done
                    sleep 2
                  done
                  if [ "$LAUNCHED" = false ]; then
                    FOUND=$(find /Applications "$HOME/Applications" -maxdepth 2 -name "Opera*.app" 2>/dev/null | head -n 1 || true)
                    if [ -n "$FOUND" ]; then
                      echo "[$(date '+%H:%M:%S')] [Watcher] Fallback launch: $FOUND"
                      open "$FOUND" || true
                    fi
                  fi
                  INSTALLED=true
                  echo "[$(date '+%H:%M:%S')] [Watcher] ✓ Install + launch sequence complete."
                else
                  sleep 5
                fi
              done
              echo "[$(date '+%H:%M:%S')] [Watcher] Exiting."
            ) &
            WATCHER_PID=$!
            echo "[$(date '+%H:%M:%S')] Watcher started (PID $WATCHER_PID)"
          else
            WATCHER_PID=0
            echo "[$(date '+%H:%M:%S')] [Click Path] Watcher NOT started — click-only mode."
          fi

          # ── Launch Chrome ─────────────────────────────────────────────────────
          CHROME_BIN="/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
          CHROME_FLAGS=(
            --no-first-run
            --no-default-browser-check
            --disable-sync
            --disable-translate
            --disable-infobars
            --disable-notifications
            --disable-background-networking
            --disable-client-side-phishing-detection
            --safebrowsing-disable-download-protection
            "--disable-features=SafeBrowsingEnhancedProtection,MediaRouter,DialMediaRouteProvider"
            --disable-extensions
            --disable-default-apps
            --password-store=basic
            --use-mock-keychain
          )

          if [ "$USE_PROXY" = "true" ]; then
            if [ "$PROXY_TYPE" = "manual" ] || [ "$PROXY_TYPE" = "floppydata" ]; then
              PROXY_SRV="$PROXY_SERVER"
              echo "[$(date '+%H:%M:%S')] Using $PROXY_TYPE proxy (auth via dialog): $PROXY_SRV"
            else
              PROXY_SRV="residential-proxy.scrapeops.io:8181"
              echo "[$(date '+%H:%M:%S')] Using ScrapeOps proxy: $PROXY_SRV"
            fi
            echo "[$(date '+%H:%M:%S')] Launching Chrome WITH proxy → $TARGET_URL"
            if [ -f "$CHROME_BIN" ]; then
              "$CHROME_BIN" \
                "${CHROME_FLAGS[@]}" \
                --proxy-server="http://$PROXY_SRV" \
                "$TARGET_URL" &
              CHROME_PID=$!
              echo "[$(date '+%H:%M:%S')] Chrome launched (PID $CHROME_PID)"
            else
              echo "[$(date '+%H:%M:%S')] ERROR: Chrome binary not found at $CHROME_BIN"
              exit 1
            fi
          else
            echo "[$(date '+%H:%M:%S')] Launching Chrome DIRECT (no proxy) → $TARGET_URL"
            if [ -f "$CHROME_BIN" ]; then
              "$CHROME_BIN" \
                "${CHROME_FLAGS[@]}" \
                "$TARGET_URL" &
              CHROME_PID=$!
              echo "[$(date '+%H:%M:%S')] Chrome launched (PID $CHROME_PID)"
            else
              echo "[$(date '+%H:%M:%S')] Chrome not found — Safari fallback."
              open -a Safari "$TARGET_URL" || true
            fi
          fi

          echo "[$(date '+%H:%M:%S')] Chrome launch complete. Handler automation running."
          echo "[$(date '+%H:%M:%S')] Monitoring handler output:"
          echo "------------------------------------------------------------"

          HANDLER_TIMEOUT=600
          POLL_START=$(date +%s)
          while kill -0 $HANDLER_PID 2>/dev/null; do
            ELAPSED=$(($(date +%s) - POLL_START))
            if [ $ELAPSED -gt $HANDLER_TIMEOUT ]; then
              echo "[$(date '+%H:%M:%S')] Handler timeout (${ELAPSED}s) — killing."
              kill $HANDLER_PID 2>/dev/null || true
              break
            fi
            sleep 5
          done

          echo "------------------------------------------------------------"
          echo "[$(date '+%H:%M:%S')] Handler process finished."
          [ "$WATCHER_PID" -ne 0 ] && kill $WATCHER_PID 2>/dev/null || true
          kill $DISMISSER_PID 2>/dev/null || true
          echo "[$(date '+%H:%M:%S')] === Installation workflow complete ==="

      # ================================================================== #
      # STEP 7 — Keep runner alive (install path only)                     #
      # ================================================================== #
      - name: Keep Runner Alive
        if: always() && matrix.action_mode == 'install'
        shell: bash
        run: |
          echo "[$(date '+%H:%M:%S')] Session active. Runner stays online until job timeout."
          sleep 360
